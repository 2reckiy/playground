<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Water - High Visibility</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #111; /* Very dark gray, not pure black */
        font-family: monospace;
      }
      canvas {
        display: block;
      }
      #debug {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #00f2ff;
        pointer-events: none;
        text-shadow: 1px 1px #000;
      }
    </style>
  </head>
  <body>
    <div id="debug">
      DRAG MOUSE TO POUR<br />POOL HEIGHT: <span id="h-val">0</span>
    </div>
    <canvas id="canvas"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const hVal = document.getElementById("h-val");

      const PX = 20; // Size of each "pixel" block
      let width, height;
      let drops = [];
      let splashes = [];

      // Pool Stats
      let poolH = 2; // Initial visible base (2 pixels high)
      let poolW = 0;
      let isFull = false;
      let surfaceJitter = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        width = Math.ceil(canvas.width / PX);
        height = Math.ceil(canvas.height / PX);
        surfaceJitter = new Array(width).fill(0);
      }

      window.addEventListener("resize", resize);
      resize();

      class Drop {
        constructor(x) {
          this.gx = Math.floor(x / PX);
          this.gy = 0;
          this.vel = 0.5;
        }
        update() {
          this.gy += this.vel;
          this.vel += 0.15; // Gravity acceleration

          // Collision: check if we hit the water surface
          const currentSurfaceY = height - poolH;
          if (this.gy >= currentSurfaceY) {
            this.impact();
            return false;
          }
          return true;
        }
        impact() {
          // Splash particles
          for (let i = 0; i < 4; i++) {
            splashes.push({
              x: this.gx,
              y: height - poolH,
              vx: (Math.random() - 0.5) * 1.5,
              vy: -Math.random() * 1.5,
              life: 1.0,
            });
          }

          // Add Jitter to the hit spot
          if (surfaceJitter[this.gx] !== undefined) {
            surfaceJitter[this.gx] = 2; // Bounce effect
          }

          // Volume Logic
          if (!isFull) {
            poolW += 3; // Spread wider
            if (poolW >= width) {
              poolW = width;
              isFull = true;
            }
          } else {
            poolH += 0.4; // Rise higher
          }
          hVal.innerText = Math.floor(poolH * PX) + "px";
        }
        draw() {
          ctx.fillStyle = "#00f2ff"; // Neon Blue Drop
          ctx.fillRect(this.gx * PX, Math.floor(this.gy) * PX, PX, PX);
        }
      }

      function loop() {
        // 1. Clear Screen
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Update Surface Jitter (Simulating "Waving")
        for (let i = 0; i < surfaceJitter.length; i++) {
          surfaceJitter[i] *= 0.8; // Damping
          // Wave propagation to neighbors
          if (i > 0)
            surfaceJitter[i - 1] +=
              (surfaceJitter[i] - surfaceJitter[i - 1]) * 0.1;
          if (i < width - 1)
            surfaceJitter[i + 1] +=
              (surfaceJitter[i] - surfaceJitter[i + 1]) * 0.1;
        }

        // 3. Draw Pool (Water at the bottom)
        const startX = Math.floor((width - poolW) / 2);
        for (let i = 0; i < poolW; i++) {
          const x = startX + i;
          const jitter = surfaceJitter[x] || 0;

          const drawX = x * PX;
          const drawY = (height - poolH + jitter) * PX;
          const drawW = PX;
          const drawH = (poolH - jitter) * PX;

          // Main Pool Body
          ctx.fillStyle = "#004466"; // Deep visible blue
          ctx.fillRect(drawX, drawY, drawW, drawH);

          // Bright Surface Line
          ctx.fillStyle = "#00f2ff";
          ctx.fillRect(drawX, drawY, drawW, PX / 4);
        }

        // 4. Update and Draw Drops
        drops = drops.filter((d) => d.update());
        drops.forEach((d) => d.draw());

        // 5. Update and Draw Splashes
        splashes = splashes.filter((s) => {
          s.x += s.vx;
          s.y += s.vy;
          s.vy += 0.1;
          s.life -= 0.05;
          ctx.fillStyle = `rgba(0, 242, 255, ${s.life})`;
          ctx.fillRect(
            Math.floor(s.x) * PX,
            Math.floor(s.y) * PX,
            PX / 3,
            PX / 3,
          );
          return s.life > 0;
        });

        requestAnimationFrame(loop);
      }

      // Interaction
      let holding = false;
      window.addEventListener("mousedown", () => (holding = true));
      window.addEventListener("mouseup", () => (holding = false));
      window.addEventListener("mousemove", (e) => {
        if (holding && Math.random() > 0.6) {
          drops.push(new Drop(e.clientX));
        }
      });

      loop();
    </script>
  </body>
</html>
