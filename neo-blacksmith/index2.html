<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-SMITHY | FLEX EDITION</title>
    <style>
        :root {
            --bg: #bcff2e;
            --primary: #ff0054;
            --secondary: #00f5d4;
            --accent: #fee440;
            --dark: #000;
            --border: 5px solid #000;
            --shadow: 8px 8px 0px #000;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            background-color: var(--bg);
            /* Main Horizontal Layout */
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        header {
            height: 100px;
            background: white;
            border-bottom: var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0;
            /* Don't squash */
            z-index: 10;
        }

        /* Middle Section: Forge + Inventory */
        #main-container {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            /* Take remaining vertical space */
            overflow: hidden;
            /* Important for the scroll child */
        }

        /* Forge Area - Center */
        #forge-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: repeating-linear-gradient(45deg, #a2d2ff, #a2d2ff 10px, #bde0fe 10px, #bde0fe 20px);
            position: relative;
        }

        #item-reveal-zone {
            width: 320px;
            height: 320px;
            flex-shrink: 0;
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            visibility: hidden;
            transform: rotate(-1deg);
        }

        .reveal-active {
            visibility: visible !important;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% {
                transform: scale(0.8) rotate(5deg);
            }

            100% {
                transform: scale(1) rotate(-1deg);
            }
        }

        #controls {
            margin-top: 40px;
        }

        .btn-forge {
            background: var(--primary);
            color: white;
            border: var(--border);
            padding: 20px 60px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            text-transform: uppercase;
        }

        /* Sidebar - Fixed Width */
        #inventory-sidebar {
            width: 380px;
            background: white;
            border-left: var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100%;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: var(--border);
            background: var(--accent);
            flex-shrink: 0;
        }

        .btn-sell-all {
            background: var(--secondary);
            border: var(--border);
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-family: 'Arial Black';
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
        }

        /* The Scrollable Area */
        .inventory-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f0f0f0;
            min-height: 0;
            /* Critical flexbox fix for scrolling */
        }

        /* Using Flex for the internal grid-like look */
        .inventory-flex-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
        }

        .item-slot {
            width: calc(33.33% - 7px);
            /* Simulating a 3-column grid with flex */
            aspect-ratio: 1 / 1;
            border: 3px solid #000;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            font-size: 0.8rem;
        }

        .stat-box {
            background: white;
            border: 4px solid #000;
            padding: 10px;
            box-shadow: 4px 4px 0 #000;
            font-size: 1rem;
            font-family: 'Arial Black';
        }
    </style>
</head>

<body>

    <header>
        <div class="stat-box">💰 $<span id="gold">100</span></div>
        <div class="stat-box">⚒️ LVL: <span id="lvl">1.0</span></div>
        <div class="stat-box">🧱 IRON: <span id="iron">10</span></div>
        <button class="stat-box" style="cursor:pointer; background: var(--secondary);" onclick="engine.buyIron()">+IRON
            ($20)</button>
    </header>

    <div id="main-container">
        <main id="forge-area">
            <div id="item-reveal-zone">
                <h2 id="reveal-name" style="margin:0">READY?</h2>
                <div style="font-size: 5rem; margin: 10px 0;" id="reveal-icon">⚒️</div>
                <p id="reveal-stats" style="background: black; color: white; padding: 5px 10px;">CRAFT SOMETHING</p>
            </div>

            <div id="controls">
                <button class="btn-forge" onclick="engine.forge()">FORGE</button>
            </div>
        </main>

        <aside id="inventory-sidebar">
            <div class="sidebar-header">
                <button class="btn-sell-all" onclick="engine.sellAll()">SELL ALL</button>
            </div>
            <div class="inventory-scroll">
                <div class="inventory-flex-grid" id="inv-grid">
                </div>
            </div>
        </aside>
    </div>

    <script>
        class Item {
            constructor(name, value, quality, icon) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.value = value;
                this.quality = quality;
                this.icon = icon;
            }
        }

        class GameEngine {
            constructor() {
                this.gold = 100;
                this.lvl = 1.0;
                this.iron = 10;
                this.inventory = [];
                this.types = [
                    { name: 'AXE', icon: '🪓', base: 25 },
                    { name: 'BLADE', icon: '⚔️', base: 20 },
                    { name: 'PLATE', icon: '🛡️', base: 40 },
                    { name: 'RING', icon: '💍', base: 50 },
                    { name: 'MACE', icon: '🔨', base: 30 }
                ];
                this.updateUI();
            }

            buyIron() {
                if (this.gold >= 20) {
                    this.gold -= 20;
                    this.iron += 5;
                    this.updateUI();
                }
            }

            forge() {
                if (this.iron < 1) return alert("NO IRON!");
                this.iron -= 1;
                const b = this.types[Math.floor(Math.random() * this.types.length)];
                const q = (Math.random() * this.lvl).toFixed(1);
                const v = Math.floor(b.base * (1 + parseFloat(q)));

                const newItem = new Item(b.name, v, q, b.icon);
                this.inventory.push(newItem);
                this.lvl = parseFloat((this.lvl + 0.05).toFixed(2));
                this.showReveal(newItem);
                this.updateUI();
            }

            sellAll() {
                this.gold += this.inventory.reduce((s, i) => s + i.value, 0);
                this.inventory = [];
                this.updateUI();
            }

            showReveal(item) {
                const el = document.getElementById('item-reveal-zone');
                document.getElementById('reveal-name').innerText = item.name;
                document.getElementById('reveal-stats').innerText = `$${item.value} | Q: ${item.quality}`;
                document.getElementById('reveal-icon').innerText = item.icon;
                el.classList.remove('reveal-active');
                void el.offsetWidth;
                el.classList.add('reveal-active');
            }

            updateUI() {
                document.getElementById('gold').innerText = Math.floor(this.gold);
                document.getElementById('lvl').innerText = this.lvl;
                document.getElementById('iron').innerText = this.iron;

                const grid = document.getElementById('inv-grid');
                grid.innerHTML = '';
                this.inventory.forEach(item => {
                    const slot = document.createElement('div');
                    slot.className = 'item-slot';
                    slot.innerHTML = `<div>${item.icon}</div><div>$${item.value}</div>`;
                    grid.appendChild(slot);
                });
            }
        }

        const engine = new GameEngine();
    </script>
</body>

</html>
