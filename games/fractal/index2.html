<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursive Dragon Curve</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #020205; cursor: crosshair; }
        canvas { display: block; }
        #info { 
            position: absolute; top: 20px; left: 20px; 
            color: #00ffcc; font-family: 'Courier New', monospace; 
            pointer-events: none; text-shadow: 0 0 5px #00ffcc;
        }
    </style>
</head>
<body>
    <div id="info">Level: 1 | Click to Unfold</div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let level = 1;
        let angle = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }

        /**
         * The Dragon Curve uses a recursive "Left/Right" logic.
         * @param {number} x1, y1 - Start coordinates
         * @param {number} x2, y2 - End coordinates
         * @param {number} k - Current recursion depth
         * @param {boolean} turnLeft - Direction of the bend
         */
        function drawDragon(x1, y1, x2, y2, k, turnLeft) {
            if (k === 0) {
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                // Color based on level for a "shifting" look
                ctx.strokeStyle = `hsl(${(level * 25 + x1/5) % 360}, 80%, 60%)`;
                ctx.stroke();
                return;
            }

            // Calculate the midpoint (the "fold" point)
            // Using a 90-degree offset for the dragon fold
            const dx = x2 - x1;
            const dy = y2 - y1;
            
            const nx = x1 + (dx + (turnLeft ? dy : -dy)) / 2;
            const ny = y1 + (dy - (turnLeft ? dx : -dx)) / 2;

            drawDragon(x1, y1, nx, ny, k - 1, true);
            drawDragon(x2, y2, nx, ny, k - 1, false);
        }

        function draw() {
            ctx.fillStyle = 'rgba(2, 2, 5, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const size = Math.min(canvas.width, canvas.height) * 0.5;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Positioning the dragon in the center
            ctx.lineWidth = Math.max(1, 3 - level/4);
            ctx.lineCap = 'round';
            
            drawDragon(
                centerX - size/1.5, centerY + size/3, 
                centerX + size/1.5, centerY + size/3, 
                level, true
            );
            
            document.getElementById('info').innerText = `Level: ${level} | Click to Unfold`;
        }

        window.addEventListener('mousedown', () => {
            level = (level + 1) % 15; // Limit to 14 to prevent lag
            if (level === 0) level = 1;
            draw();
        });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
