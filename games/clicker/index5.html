<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ultimate Juicy Clicker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff44f;
        overflow: hidden;
        font-family: system-ui;
      }
      canvas {
        display: block;
        position: absolute;
        inset: 0;
      }
      #score {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 48px;
        font-weight: 900;
        color: #000;
      }
      #button {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: #ff4d6d;
        border: 6px solid #000;
        box-shadow: 8px 8px 0 #000;
        font-size: 32px;
        font-weight: 900;
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        cursor: pointer;
        transition: background 0.15s linear, transform 0.1s ease-out;
      }
      #button:active {
        transform: translate(-46%, -46%) scale(0.95);
        box-shadow: 4px 4px 0 #000;
      }
      #comboText {
        position: absolute;
        top: 100px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 48px;
        font-weight: 900;
        color: #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="score">0</div>
    <div id="button">CLICK</div>
    <div id="comboText"></div>

    <script>
      /* ======= CANVAS SETUP ======= */
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      let shakeOffset = { x: 0, y: 0 };
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      /* ======= PARTICLE CLASS ======= */
      class Particle {
        constructor() {
          this.active = false;
        }
        init(x, y, options = {}) {
          this.active = true;
          this.startX = x + (Math.random() - 0.5) * (options.spawnSpread || 40);
          this.x = this.startX;
          this.y = y;
          this.age = 0;
          this.life = options.life || 1.2;
          this.speedY = options.speedY || 220;
          this.swayAmp = options.swayAmp || 18;
          this.swayFreq = options.swayFreq || 6;
          this.phase = Math.random() * Math.PI * 2;
          this.text = options.text || "+1";
          this.font = options.font || "900 32px system-ui";
          this.color = options.color || "#4d96ff";
          this.strokeColor = options.strokeColor || "#000";
          this.type = options.type || "text"; // text,spark,trail,explosion
          this.size = options.size || 1;
          this.vx = options.vx || 0;
          this.vy = options.vy || 0;
        }
        update(dt) {
          if (!this.active) return;
          this.age += dt;
          if (this.type === "text") {
            this.y -= this.speedY * dt;
          } else if (this.type === "spark") {
            this.x += this.vx * dt;
            this.y += this.vy * dt;
          } else if (this.type === "trail") {
            this.y -= this.speedY * dt * 0.5;
            this.x += Math.sin(this.age * 20 + this.phase) * 15 * dt;
          } else if (this.type === "explosion") {
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.vx *= 0.95;
            this.vy *= 0.95;
          }
          if (this.age >= this.life || this.y < -50) this.active = false;
        }
        draw(ctx) {
          if (!this.active) return;
          const alpha = 1 - this.age / this.life;
          if (this.type === "explosion")
            ctx.globalCompositeOperation = "lighter";
          else ctx.globalCompositeOperation = "source-over";
          ctx.globalAlpha = alpha;
          ctx.fillStyle = this.color;
          ctx.strokeStyle = this.strokeColor;
          ctx.lineWidth = 3;
          if (this.type === "text") {
            ctx.font = this.font;
            const sway =
              Math.sin(this.age * this.swayFreq + this.phase) * this.swayAmp;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.strokeText(this.text, this.startX + sway, this.y);
            ctx.fillText(this.text, this.startX + sway, this.y);
          } else {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2 * this.size, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      }

      /* ======= PARTICLE POOL ======= */
      class ParticlePool {
        constructor(size) {
          this.pool = Array.from({ length: size }, () => new Particle());
        }
        spawn(x, y, options = {}) {
          for (const p of this.pool)
            if (!p.active) {
              p.init(x, y, options);
              return;
            }
        }
        update(dt) {
          for (const p of this.pool) if (p.active) p.update(dt);
        }
        draw(ctx) {
          for (const p of this.pool) if (p.active) p.draw(ctx);
        }
      }
      const pool = new ParticlePool(2048);

      /* ======= GAME VARIABLES ======= */
      const button = document.getElementById("button");
      const scoreEl = document.getElementById("score");
      const comboTextEl = document.getElementById("comboText");
      let score = 0,
        combo = 0,
        lastClickTime = 0;
      const comboTimeout = 1000;

      /* ======= HELPERS ======= */
      function getRandomColor() {
        const r = 150 + Math.floor(Math.random() * 105);
        const g = 150 + Math.floor(Math.random() * 105);
        const b = 150 + Math.floor(Math.random() * 105);
        return `rgb(${r},${g},${b})`;
      }
      function flashButton() {
        const color = getRandomColor();
        button.style.background = color;
        button.style.transform = "translate(-50%,-50%) scale(1.1)";
        setTimeout(() => {
          button.style.background = "#ff4d6d";
          button.style.transform = "translate(-50%,-50%) scale(1)";
        }, 100);
      }
      function screenShake(strength) {
        shakeOffset.x = (Math.random() - 0.5) * strength;
        shakeOffset.y = (Math.random() - 0.5) * strength;
        button.style.transform = `translate(calc(-50% + ${shakeOffset.x}px), calc(-50% + ${shakeOffset.y}px)) scale(1.05)`;
      }
      function decayShake() {
        shakeOffset.x *= 0.8;
        shakeOffset.y *= 0.8;
        if (Math.abs(shakeOffset.x) < 0.5 && Math.abs(shakeOffset.y) < 0.5) {
          button.style.transform = "translate(-50%, -50%) scale(1)";
        }
      }

      /* ======= CLICK HANDLER ======= */
      function addClick(x, y) {
        const now = performance.now();
        if (now - lastClickTime < comboTimeout) combo++;
        else combo = 1;
        lastClickTime = now;

        let multiplier = 1,
          text = "+1",
          color = "#4d96ff",
          shake = 2;
        if (combo >= 5) {
          multiplier = 2;
          text = "+2";
          color = getRandomColor();
          flashButton();
          shake = 5;
        }
        if (combo >= 10) {
          multiplier = 5;
          text = "+5";
          color = getRandomColor();
          flashButton();
          shake = 8;
        }
        if (combo >= 20) {
          multiplier = 10;
          text = "+10";
          color = getRandomColor();
          flashButton();
          shake = 12;
        }

        score += multiplier;
        scoreEl.textContent = score;

        // Combo streak text
        if (combo >= 5) {
          comboTextEl.textContent = `COMBO x${combo}`;
          setTimeout(() => {
            comboTextEl.textContent = "";
          }, 500);
        }

        // Text particle
        pool.spawn(x, y, { type: "text", text, color });

        // Sparks
        for (let i = 0; i < 8; i++) {
          pool.spawn(x, y, {
            type: "spark",
            color: getRandomColor(),
            life: Math.random() * 0.6 + 0.4,
            vx: (Math.random() - 0.5) * 200,
            vy: (Math.random() - 0.5) * 200,
            size: Math.random() * 1.5 + 0.5,
          });
        }

        // Trails
        for (let i = 0; i < 3; i++) {
          pool.spawn(x, y, {
            type: "trail",
            color: getRandomColor(),
            life: Math.random() * 0.6 + 0.4,
            size: Math.random() * 1.2 + 0.5,
            speedY: Math.random() * 150 + 50,
          });
        }

        // Explosions
        for (let i = 0; i < 5; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 150 + 50;
          pool.spawn(x, y, {
            type: "explosion",
            color: getRandomColor(),
            life: Math.random() * 0.6 + 0.4,
            size: Math.random() * 2 + 1,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
          });
        }

        screenShake(shake);
      }

      button.addEventListener("click", () => {
        const rect = button.getBoundingClientRect();
        addClick(rect.left + rect.width / 2, rect.top);
      });

      /* ======= MAIN LOOP ======= */
      let lastTime = performance.now();
      function loop(now) {
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        pool.update(dt);

        ctx.save();
        // Motion blur: draw semi-transparent rectangle over canvas
        ctx.fillStyle = "rgba(255,244,79,0.25)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.translate(shakeOffset.x, shakeOffset.y);
        pool.draw(ctx);
        ctx.restore();

        decayShake();
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
