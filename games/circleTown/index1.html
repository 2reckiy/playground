<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>The Circular Forge - Engineer Mode</title>
    <style>
        body {
            margin: 0;
            background: #050508;
            color: #fff;
            font-family: 'Consolas', monospace;
            overflow: hidden;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            padding: 15px;
            border: 1px solid #00f2ff;
            pointer-events: none;
        }

        .stat {
            color: #00f2ff;
            margin-bottom: 5px;
            text-shadow: 0 0 5px #00f2ff;
        }

        .hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div class="stat">GOLD: <span id="gold-val">100</span></div>
        <div class="stat">ROADS: <span id="road-count">0</span></div>
        <div class="hint">ЛКМ на Центрі + тягнути: Будувати дорогу</div>
        <div class="hint">ЛКМ на Кільці: Будувати споруду</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let state = {
            gold: 100,
            citadelRadius: 10,
            rings: [
                { radius: 80, buildings: [] },
                { radius: 110, buildings: [] },
                { radius: 140, buildings: [] },
                { radius: 170, buildings: [] },
                { radius: 200, buildings: [] },
                { radius: 230, buildings: [] },
                { radius: 260, buildings: [] },
            ],
            roads: [], // { angle, length }
            isDraggingRoad: false,
            dragAngle: 0,
            dragDist: 0,
            mouseAngle: 0,
            mouseDist: 0,
            hoverRing: -1,
            snapAngle: null
        };
        window.state = state; // Для дебагу в консолі

        const BUILD_ARC = 40 * (Math.PI / 180);
        const SNAP_THRESHOLD = 10 * (Math.PI / 180);

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        canvas.addEventListener('mousedown', (e) => {
            const { x, y } = getMousePos(e);
            const dist = Math.sqrt(x * x + y * y);
            if (dist < state.citadelRadius + 10) {
                state.isDraggingRoad = true;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const { x, y } = getMousePos(e);
            state.mouseDist = Math.sqrt(x * x + y * y);
            state.mouseAngle = (Math.atan2(y, x) + Math.PI * 2) % (Math.PI * 2);

            state.hoverRing = -1;
            state.snapAngle = null;

            state.rings.forEach((r, i) => {
                if (Math.abs(state.mouseDist - r.radius) < 25) {
                    state.hoverRing = i;
                    // Magnetic effect
                    r.buildings.forEach(b => {
                        const distToEdge = Math.abs(state.mouseAngle - b.angle) - (BUILD_ARC + b.arc) / 2;
                        if (distToEdge < SNAP_THRESHOLD && distToEdge > -0.1) {
                            const direction = state.mouseAngle > b.angle ? 1 : -1;
                            state.snapAngle = b.angle + direction * (BUILD_ARC + b.arc) / 2;
                        }
                    });
                }
            });
        });

        canvas.addEventListener('mouseup', () => {
            if (state.isDraggingRoad) {
                if (state.mouseDist > state.citadelRadius + 20) {
                    state.roads.push({ angle: state.mouseAngle, length: state.mouseDist });
                    state.gold -= 10;
                }
                state.isDraggingRoad = false;
            } else if (state.hoverRing !== -1) {
                placeBuilding(state.hoverRing);
            }
        });

        function getMousePos(e) {
            return { x: e.clientX - canvas.width / 2, y: e.clientY - canvas.height / 2 };
        }

        function placeBuilding(idx) {
            const ring = state.rings[idx];
            const angle = state.snapAngle !== null ? state.snapAngle : state.mouseAngle;

            const collision = ring.buildings.some(b => {
                const diff = Math.abs(angle - b.angle);
                const dist = Math.min(diff, Math.PI * 2 - diff);
                return dist < (BUILD_ARC + b.arc) / 2 - 0.01;
            });

            if (!collision && state.gold >= 20) {
                state.gold -= 20;
                ring.buildings.push({ angle, arc: BUILD_ARC });
            }
        }

        function drawBuilding(cx, cy, radius, angle, arc, ringBuildings) {
            // Перевірка сусіда для зміни стилю країв (Cap)
            let leftMerged = ringBuildings.some(b => Math.abs((angle - arc / 2) - (b.angle + b.arc / 2)) < 0.02);
            let rightMerged = ringBuildings.some(b => Math.abs((angle + arc / 2) - (b.angle - b.arc / 2)) < 0.02);

            ctx.beginPath();
            ctx.arc(cx, cy, radius, angle - arc / 2, angle + arc / 2);
            ctx.lineWidth = 14;
            ctx.lineCap = (leftMerged || rightMerged) ? 'butt' : 'round'; // Butt для стикування

            // Малюємо основну частину
            ctx.strokeStyle = '#00f2ff';
            ctx.stroke();

            // Якщо закруглення лише з одного боку, ми малюємо кастомно
            if (leftMerged && !rightMerged) drawCap(cx, cy, radius, angle + arc / 2, 'round');
            if (rightMerged && !leftMerged) drawCap(cx, cy, radius, angle - arc / 2, 'round');
        }

        function drawCap(cx, cy, r, a, type) {
            ctx.beginPath();
            ctx.arc(cx, cy, r, a - 0.01, a + 0.01);
            ctx.lineCap = type;
            ctx.stroke();
        }

        function draw() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // Центр
            ctx.beginPath();
            ctx.arc(cx, cy, state.citadelRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Кільця
            state.rings.forEach((ring, i) => {
                ctx.beginPath();
                ctx.arc(cx, cy, ring.radius, 0, Math.PI * 2);
                ctx.strokeStyle = (state.hoverRing === i) ? '#333' : '#111';
                ctx.lineWidth = 2;
                ctx.stroke();

                ring.buildings.forEach(b => drawBuilding(cx, cy, ring.radius, b.angle, b.arc, ring.buildings));
            });

            // Дороги
            state.roads.forEach(r => {
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(r.angle) * state.citadelRadius, cy + Math.sin(r.angle) * state.citadelRadius);
                ctx.lineTo(cx + Math.cos(r.angle) * r.length, cy + Math.sin(r.angle) * r.length);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 4;
                ctx.stroke();
            });

            // Дорога-привид
            if (state.isDraggingRoad) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + Math.cos(state.mouseAngle) * state.mouseDist, cy + Math.sin(state.mouseAngle) * state.mouseDist);
                ctx.strokeStyle = 'rgba(0, 242, 255, 0.3)';
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Привид будівлі з магнітом
            if (state.hoverRing !== -1 && !state.isDraggingRoad) {
                const r = state.rings[state.hoverRing];
                const a = state.snapAngle !== null ? state.snapAngle : state.mouseAngle;
                ctx.globalAlpha = 0.3;
                drawBuilding(cx, cy, r.radius, a, BUILD_ARC, r.buildings);
                ctx.globalAlpha = 1.0;
            }

            document.getElementById('gold-val').innerText = Math.floor(state.gold);
            document.getElementById('road-count').innerText = state.roads.length;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>

</html>
