<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LEGO Pixelizer — Pro Crop</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 18px;
        background: #f4f4f9;
        color: #333;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: center;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
      }
      label {
        font-size: 13px;
        font-weight: 600;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      input[type="number"],
      select {
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      canvas {
        background: #fff;
        border: 1px solid #ddd;
        image-rendering: pixelated;
      }
      .row {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
      .col {
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex: 1;
        min-width: 400px;
      }

      .canvas-container {
        position: relative;
        cursor: move;
        user-select: none;
        border: 2px solid #333;
        overflow: hidden;
      }
      #selector {
        position: absolute;
        border: 2px dashed #00ff88;
        background: rgba(0, 255, 136, 0.1);
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4); /* Dim the rest of the image */
        pointer-events: none;
      }
      .hint {
        font-size: 12px;
        color: #666;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>LEGO Pixelizer: Масштабований Кроп</h1>

    <div class="controls">
      <label
        >Зображення: <input id="file" type="file" accept="image/*"
      /></label>

      <label
        >Ширина кропу (px):
        <input id="cropW" type="number" value="200" step="10"
      /></label>
      <label
        >Висота кропу (px):
        <input id="cropH" type="number" value="200" step="10"
      /></label>

      <label
        >К-сть блоків (Target W): <input id="targetW" type="number" value="64"
      /></label>
      <label
        >К-сть блоків (Target H): <input id="targetH" type="number" value="64"
      /></label>

      <label
        >Деталізація (Pixel Size):
        <input id="pixelSize" type="number" min="1" value="8" style="width: 50px"
      /></label>

      <label
        >Відтінки:
        <select id="shades">
          <option value="4">4</option>
          <option value="5" selected>5</option>
          <option value="6">6</option>
          <option value="8">8</option>
        </select>
      </label>

      <button
        id="downloadBtn"
        style="
          padding: 10px 20px;
          background: #007bff;
          color: #fff;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        "
      >
        Завантажити PNG
      </button>
    </div>

    <div class="row">
      <div class="col">
        <div class="hint">1. Перетягуйте область для вибору композиції</div>
        <div class="canvas-container" id="canvasWrapper">
          <canvas id="origCanvas"></canvas>
          <div id="selector"></div>
        </div>
      </div>

      <div class="col">
        <div class="hint">
          2. Результат (<span id="finalSizeDisplay">0x0</span> px)
        </div>
        <canvas id="outCanvas"></canvas>
      </div>
    </div>

    <script>
      (() => {
        const fileInput = document.getElementById("file");
        const cropWIn = document.getElementById("cropW");
        const cropHIn = document.getElementById("cropH");
        const targetWIn = document.getElementById("targetW");
        const targetHIn = document.getElementById("targetH");
        const pixelSizeIn = document.getElementById("pixelSize");
        const shadesSelect = document.getElementById("shades");
        const downloadBtn = document.getElementById("downloadBtn");
        const finalSizeText = document.getElementById("finalSizeDisplay");

        const origCanvas = document.getElementById("origCanvas");
        const outCanvas = document.getElementById("outCanvas");
        const origCtx = origCanvas.getContext("2d");
        const outCtx = outCanvas.getContext("2d");
        const wrapper = document.getElementById("canvasWrapper");
        const selector = document.getElementById("selector");

        let img = new Image();
        let loaded = false;
        let isDragging = false;
        let selectorPos = { x: 0, y: 0 };

        // Handle Inputs
        [
          cropWIn,
          cropHIn,
          targetWIn,
          targetHIn,
          pixelSizeIn,
          shadesSelect,
        ].forEach((el) => {
          el.oninput = () => {
            updateSelectorUI();
            process();
          };
        });

        fileInput.onchange = (e) => {
          const f = e.target.files[0];
          if (!f) return;
          const url = URL.createObjectURL(f);
          img.onload = () => {
            loaded = true;
            // Display scale: fix original preview to 600px width for usability
            const displayScale = 600 / img.width;
            origCanvas.width = 600;
            origCanvas.height = img.height * displayScale;
            origCtx.drawImage(img, 0, 0, origCanvas.width, origCanvas.height);

            updateSelectorUI();
            process();
          };
          img.src = url;
        };

        function updateSelectorUI() {
          if (!loaded) return;
          selector.style.width = cropWIn.value + "px";
          selector.style.height = cropHIn.value + "px";
          selector.style.display = "block";

          // Constrain position
          let x = parseFloat(selector.style.left || 0);
          let y = parseFloat(selector.style.top || 0);
          x = Math.max(0, Math.min(x, origCanvas.width - cropWIn.value));
          y = Math.max(0, Math.min(y, origCanvas.height - cropHIn.value));
          selector.style.left = x + "px";
          selector.style.top = y + "px";
          selectorPos = { x, y };
        }

        // Dragging Logic
        wrapper.onmousedown = (e) => {
          isDragging = true;
          handleMouse(e);
        };
        window.onmousemove = (e) => {
          if (isDragging) handleMouse(e);
        };
        window.onmouseup = () => {
          isDragging = false;
        };

        function handleMouse(e) {
          if (!loaded) return;
          const rect = wrapper.getBoundingClientRect();
          let x = e.clientX - rect.left - selector.offsetWidth / 2;
          let y = e.clientY - rect.top - selector.offsetHeight / 2;

          x = Math.max(0, Math.min(x, origCanvas.width - selector.offsetWidth));
          y = Math.max(
            0,
            Math.min(y, origCanvas.height - selector.offsetHeight),
          );

          selector.style.left = x + "px";
          selector.style.top = y + "px";
          selectorPos = { x, y };
          process();
        }

        function process() {
          if (!loaded) return;

          const blocksW = parseInt(targetWIn.value);
          const blocksH = parseInt(targetHIn.value);
          const pSize = parseInt(pixelSizeIn.value); // This is the final scale factor
          const shades = parseInt(shadesSelect.value);

          // Output Size calculation
          const finalW = blocksW * pSize;
          const finalH = blocksH * pSize;
          outCanvas.width = finalW;
          outCanvas.height = finalH;
          finalSizeText.textContent = `${finalW}x${finalH}`;

          // Step 1: Extract selection to an intermediate "grid" canvas
          // This represents the number of "bricks" we are sampling
          const grid = document.createElement("canvas");
          grid.width = blocksW;
          grid.height = blocksH;
          const gctx = grid.getContext("2d");

          gctx.imageSmoothingEnabled = true;
          // DRAW from selection area TO blocks grid
          gctx.drawImage(
            origCanvas,
            selectorPos.x,
            selectorPos.y,
            cropWIn.value,
            cropHIn.value, // Chosen area
            0,
            0,
            blocksW,
            blocksH, // Resized to block count
          );

          // Step 2: Grayscale Quantization
          const imgData = gctx.getImageData(0, 0, blocksW, blocksH);
          const data = imgData.data;
          const step = 255 / (shades - 1);

          for (let i = 0; i < data.length; i += 4) {
            const lum =
              0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2];
            const v = Math.round(Math.round(lum / step) * step);
            data[i] = data[i + 1] = data[i + 2] = v;
          }
          gctx.putImageData(imgData, 0, 0);

          // Step 3: Draw back to main canvas at pSize scale
          outCtx.imageSmoothingEnabled = false;
          outCtx.drawImage(grid, 0, 0, blocksW, blocksH, 0, 0, finalW, finalH);

          // Step 4: Draw Grid
          outCtx.strokeStyle = "rgba(0,0,0,0.15)";
          for (let x = 0; x <= finalW; x += pSize) {
            outCtx.beginPath();
            outCtx.moveTo(x + 0.5, 0);
            outCtx.lineTo(x + 0.5, finalH);
            outCtx.stroke();
          }
          for (let y = 0; y <= finalH; y += pSize) {
            outCtx.beginPath();
            outCtx.moveTo(0, y + 0.5);
            outCtx.lineTo(finalW, y + 0.5);
            outCtx.stroke();
          }
        }

        downloadBtn.onclick = () => {
          const link = document.createElement("a");
          link.download = "lego_scheme.png";
          link.href = outCanvas.toDataURL();
          link.click();
        };
      })();
    </script>
  </body>
</html>
