<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-SMITHY | RARITY UPDATE</title>
    <style>
        :root {
            --bg: #bcff2e;
            --primary: #ff0054;
            --secondary: #00f5d4;
            --accent: #fee440;
            --dark: #000;
            --border: 5px solid #000;
            --shadow: 8px 8px 0px #000;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
        }

        header {
            height: 100px;
            background: white;
            border-bottom: var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left,
        .header-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .xp-container {
            width: 300px;
            height: 50px;
            background: #eee;
            border: var(--border);
            position: relative;
            box-shadow: 4px 4px 0 #000;
            overflow: hidden;
        }

        #xp-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-right: 4px solid #000;
        }

        .xp-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 40px;
            font-size: 0.9rem;
            z-index: 2;
            pointer-events: none;
        }

        .stat-box {
            background: white;
            border: 4px solid #000;
            padding: 10px;
            box-shadow: 4px 4px 0 #000;
            width: 160px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .stat-box span {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .btn-buy-iron {
            cursor: pointer;
            background: var(--secondary);
            width: 180px;
        }

        #main-container {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            overflow: hidden;
        }

        #forge-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: repeating-linear-gradient(45deg, #a2d2ff, #a2d2ff 10px, #bde0fe 10px, #bde0fe 20px);
        }

        /* Reveal Zone Rarity styling */
        #item-reveal-zone {
            width: 340px;
            height: 340px;
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            visibility: hidden;
            transition: background-color 0.3s;
        }

        #reveal-rarity-tag {
            font-size: 0.8rem;
            padding: 2px 10px;
            border: 2px solid #000;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .reveal-active {
            visibility: visible !important;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% {
                transform: scale(0.8) rotate(5deg);
            }

            100% {
                transform: scale(1) rotate(-1deg);
            }
        }

        .btn-forge {
            margin-top: 40px;
            background: var(--primary);
            color: white;
            border: var(--border);
            padding: 20px 60px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        #inventory-sidebar {
            width: 380px;
            background: white;
            border-left: var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: var(--border);
            background: var(--accent);
            flex-shrink: 0;
        }

        .btn-sell-all {
            background: var(--secondary);
            border: var(--border);
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-family: 'Arial Black';
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
        }

        .inventory-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f0f0f0;
            min-height: 0;
        }

        .inventory-flex-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-slot {
            width: calc(33.33% - 7px);
            aspect-ratio: 1 / 1;
            border: 3px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            position: relative;
        }

        /* Tooltip for value on hover */
        .item-slot:hover::after {
            content: attr(data-val);
            position: absolute;
            top: -20px;
            background: #000;
            color: #fff;
            font-size: 0.6rem;
            padding: 2px 5px;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <div class="stat-box"><span>💰</span><span id="gold">100</span></div>
            <div class="xp-container">
                <div class="xp-text">LVL <span id="lvl">1</span> (<span id="xp-val">0</span>/<span
                        id="xp-max">100</span>)</div>
                <div id="xp-bar"></div>
            </div>
        </div>
        <div class="header-right">
            <div class="stat-box"><span>🧱</span><span id="iron">10</span></div>
            <button class="stat-box btn-buy-iron" onclick="engine.buyIron()"><span>+IRON</span><span>$20</span></button>
        </div>
    </header>

    <div id="main-container">
        <main id="forge-area">
            <div id="item-reveal-zone">
                <div id="reveal-rarity-tag">Common</div>
                <h2 id="reveal-name" style="margin:0">READY?</h2>
                <div style="font-size: 5rem; margin: 10px 0;" id="reveal-icon">⚒️</div>
                <p id="reveal-stats" style="background: black; color: white; padding: 5px 10px;">CRAFT</p>
            </div>
            <button class="btn-forge" onclick="engine.forge()">FORGE</button>
        </main>
        <aside id="inventory-sidebar">
            <div class="sidebar-header"><button class="btn-sell-all" onclick="engine.sellAll()">SELL ALL</button></div>
            <div class="inventory-scroll">
                <div class="inventory-flex-grid" id="inv-grid"></div>
            </div>
        </aside>
    </div>

    <script>
        // --- DATA CONFIGURATION ---
        const RARITIES = {
            COMMON: { label: 'Common', weight: 60, multiplier: 1, color: '#ffffff' },
            RARE: { label: 'Rare', weight: 25, multiplier: 2.5, color: '#3a86ff' },
            EPIC: { label: 'Epic', weight: 10, multiplier: 5, color: '#8338ec' },
            LEGENDARY: { label: 'Legendary', weight: 5, multiplier: 15, color: '#ffbe0b' }
        };

        class Item {
            constructor(name, value, rarity, icon) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.value = value;
                this.rarity = rarity; // The rarity object
                this.icon = icon;
            }
        }

        class GameEngine {
            constructor() {
                this.gold = 100;
                this.iron = 10;
                this.inventory = [];
                this.lvl = 1;
                this.xp = 0;
                this.xpToNext = 100;
                this.types = [
                    { name: 'AXE', icon: '🪓', base: 10 },
                    { name: 'BLADE', icon: '⚔️', base: 8 },
                    { name: 'PLATE', icon: '🛡️', base: 15 },
                    { name: 'RING', icon: '💍', base: 20 },
                    { name: 'MACE', icon: '🔨', base: 12 }
                ];
                this.updateUI();
            }

            // Weighted random selection
            getRarity() {
                const rand = Math.random() * 100;
                let cumulative = 0;
                for (const key in RARITIES) {
                    cumulative += RARITIES[key].weight;
                    if (rand <= cumulative) return RARITIES[key];
                }
                return RARITIES.COMMON;
            }

            buyIron() {
                if (this.gold >= 20) {
                    this.gold -= 20;
                    this.iron += 5;
                    this.updateUI();
                }
            }

            forge() {
                if (this.iron < 1) return;
                this.iron -= 1;

                const blueprint = this.types[Math.floor(Math.random() * this.types.length)];
                const rarity = this.getRarity();

                // Value logic: (Base * Rarity Multiplier) * (1 + Player Level Impact)
                const levelBonus = 1 + (this.lvl * 0.1);
                const finalValue = Math.floor((blueprint.base * rarity.multiplier) * levelBonus);

                const newItem = new Item(blueprint.name, finalValue, rarity, blueprint.icon);
                this.inventory.push(newItem);

                this.addXP(30);
                this.showReveal(newItem);
            }

            addXP(amount) {
                this.xp += amount;
                if (this.xp >= this.xpToNext) {
                    this.renderXP(true);
                    setTimeout(() => {
                        this.lvl++;
                        this.xp = this.xp - this.xpToNext;
                        this.xpToNext = Math.floor(this.xpToNext * 1.3);
                        this.updateUI();
                    }, 350);
                } else {
                    this.updateUI();
                }
            }

            renderXP(forceFull = false) {
                const xpPct = forceFull ? 100 : (this.xp / this.xpToNext) * 100;
                document.getElementById('xp-bar').style.width = xpPct + "%";
                document.getElementById('lvl').innerText = this.lvl;
                document.getElementById('xp-val').innerText = forceFull ? this.xpToNext : this.xp;
                document.getElementById('xp-max').innerText = this.xpToNext;
            }

            sellAll() {
                this.gold += this.inventory.reduce((s, i) => s + i.value, 0);
                this.inventory = [];
                this.updateUI();
            }

            showReveal(item) {
                const zone = document.getElementById('item-reveal-zone');
                const tag = document.getElementById('reveal-rarity-tag');

                zone.style.backgroundColor = item.rarity.color;
                tag.innerText = item.rarity.label;
                tag.style.backgroundColor = item.rarity.color === '#ffffff' ? '#eee' : '#fff';

                document.getElementById('reveal-name').innerText = item.name;
                document.getElementById('reveal-stats').innerText = `$${item.value}`;
                document.getElementById('reveal-icon').innerText = item.icon;

                zone.classList.remove('reveal-active');
                void zone.offsetWidth;
                zone.classList.add('reveal-active');
            }

            updateUI() {
                document.getElementById('gold').innerText = Math.floor(this.gold);
                document.getElementById('iron').innerText = this.iron;
                this.renderXP();

                const grid = document.getElementById('inv-grid');
                grid.innerHTML = '';
                this.inventory.forEach(item => {
                    const slot = document.createElement('div');
                    slot.className = 'item-slot';
                    slot.style.backgroundColor = item.rarity.color;
                    slot.setAttribute('data-val', `$${item.value}`);
                    slot.innerHTML = `<div>${item.icon}</div>`;
                    grid.appendChild(slot);
                });
            }
        }
        const engine = new GameEngine();
    </script>
</body>

</html>
