<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TileScout</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #080c12;
        --panel-bg: rgba(8, 14, 22, 0.92);
        --panel-border: rgba(255, 255, 255, 0.07);
        --text-primary: #c8d8e8;
        --text-muted: #566878;
        --accent: #c8a84a;
        --accent-dim: rgba(200, 168, 74, 0.18);
        --error: #e05050;
        --error-dim: rgba(224, 80, 80, 0.18);
        --bonus: #50c878;
        --bonus-dim: rgba(80, 200, 120, 0.15);
        --font: "Share Tech Mono", "Courier New", monospace;
      }
      body {
        background: var(--bg);
        overflow: hidden;
        font-family: var(--font);
        color: var(--text-primary);
        user-select: none;
      }
      #gameCanvas {
        display: block;
        cursor: grab;
        position: fixed;
        inset: 0;
      }
      #gameCanvas.dragging {
        cursor: grabbing;
      }

      /* Breadcrumb */
      #breadcrumb {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(8px);
        padding: 6px 14px;
        z-index: 10;
        font-size: 11px;
        letter-spacing: 0.1em;
        white-space: nowrap;
      }
      .bc-item {
        color: var(--text-muted);
        cursor: pointer;
        transition: color 0.2s;
        padding: 0 2px;
      }
      .bc-item:hover {
        color: var(--accent);
      }
      .bc-item.active {
        color: var(--text-primary);
      }
      .bc-sep {
        color: var(--panel-border);
      }

      /* Right HUD */
      #hud {
        position: fixed;
        top: 12px;
        right: 12px;
        width: 240px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(8px);
        padding: 12px 14px;
        z-index: 10;
      }
      #hud-title {
        font-size: 11px;
        letter-spacing: 0.22em;
        color: var(--accent);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--panel-border);
      }
      #tick-indicator {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        transition: background 0.1s;
      }
      #tick-indicator.pulse {
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
      }
      #res-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .res-row {
        display: grid;
        grid-template-columns: 14px 60px 1fr 58px;
        align-items: center;
        gap: 5px;
        font-size: 11px;
      }
      .res-icon {
        text-align: center;
        font-size: 12px;
      }
      .res-name {
        color: var(--text-muted);
        letter-spacing: 0.04em;
      }
      .res-bar-wrap {
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
      }
      .res-bar-fill {
        height: 100%;
        position: absolute;
        left: 0;
        top: 0;
        transition: width 0.4s ease;
        opacity: 0.75;
      }
      .res-val {
        text-align: right;
        font-size: 10px;
      }
      .res-max {
        color: var(--text-muted);
      }
      #hud-divider {
        height: 1px;
        background: var(--panel-border);
        margin: 10px 0;
      }
      #stats {
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.04em;
      }
      #stats b {
        color: var(--text-primary);
      }

      /* Left Plot HUD */
      #plot-hud {
        position: fixed;
        top: 12px;
        left: 12px;
        width: 190px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(8px);
        padding: 12px 14px;
        z-index: 10;
        display: none;
      }
      #plot-hud.visible {
        display: block;
      }
      #plot-hud-title {
        font-size: 11px;
        letter-spacing: 0.18em;
        color: #90b060;
        text-transform: uppercase;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--panel-border);
      }
      .ph-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        margin-bottom: 6px;
      }
      .ph-label {
        color: var(--text-muted);
      }
      .ph-val {
        font-size: 11px;
      }
      .ph-val.warn {
        color: #e09050;
      }
      .ph-val.good {
        color: var(--bonus);
      }
      .ph-val.neutral {
        color: var(--text-primary);
      }
      #eval-btn {
        width: 100%;
        margin-top: 10px;
        padding: 7px 0;
        font-family: var(--font);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: rgba(144, 176, 96, 0.15);
        border: 1px solid #90b060;
        color: #90b060;
        cursor: pointer;
        transition: background 0.2s;
      }
      #eval-btn:hover {
        background: rgba(144, 176, 96, 0.3);
      }
      #eval-btn:disabled {
        opacity: 0.3;
        cursor: default;
      }

      /* Card Tray */
      #card-tray {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 8px;
        z-index: 10;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(8px);
        padding: 10px 14px;
        align-items: center;
      }
      #tray-label {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        margin-right: 2px;
      }
      .plot-card {
        width: 70px;
        height: 88px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--panel-border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        cursor: pointer;
        position: relative;
        transition:
          border-color 0.2s,
          background 0.2s;
        padding: 4px;
      }
      .plot-card:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .plot-card.selected {
        border-color: var(--accent);
        background: var(--accent-dim);
        box-shadow: 0 0 10px rgba(200, 168, 74, 0.3);
      }
      .plot-card.empty-slot {
        cursor: default;
        border-style: dashed;
        opacity: 0.4;
      }
      .plot-card.empty-slot:hover {
        border-color: var(--panel-border);
        background: rgba(255, 255, 255, 0.04);
      }
      .pc-grade {
        position: absolute;
        top: 3px;
        right: 5px;
        font-size: 9px;
      }
      .pc-icon {
        font-size: 20px;
        margin-bottom: 2px;
      }
      .pc-name {
        font-size: 8px;
        color: var(--text-muted);
        text-align: center;
        line-height: 1.3;
        margin-bottom: 2px;
      }
      .pc-pop {
        font-size: 9px;
        color: #a0c0e0;
      }
      .pc-rare {
        font-size: 8px;
        color: var(--accent);
        text-align: center;
        line-height: 1.2;
        margin-top: 2px;
      }

      /* Evaluation Modal */
      #eval-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(4px);
        z-index: 50;
      }
      #eval-modal.visible {
        display: flex;
      }
      #eval-box {
        width: 380px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        padding: 22px 26px;
      }
      #eval-title {
        font-size: 12px;
        letter-spacing: 0.2em;
        color: #90b060;
        text-transform: uppercase;
        margin-bottom: 18px;
      }
      .eval-section-title {
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        margin-bottom: 8px;
        text-transform: uppercase;
      }
      #eval-bars {
        display: flex;
        flex-direction: column;
        gap: 7px;
        margin-bottom: 16px;
      }
      .eval-res-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
      }
      .eval-res-label {
        width: 90px;
        color: var(--text-muted);
        font-size: 10px;
      }
      .eval-res-bar {
        flex: 1;
        height: 5px;
        background: rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
      }
      .eval-res-fill {
        height: 100%;
        position: absolute;
        left: 0;
        top: 0;
        transition: width 0.8s ease;
      }
      .eval-res-val {
        width: 50px;
        text-align: right;
        font-size: 10px;
      }
      #eval-timeline {
        margin-bottom: 16px;
      }
      #eval-tick-row {
        display: flex;
        gap: 3px;
        margin-top: 6px;
      }
      .eval-tick {
        flex: 1;
        height: 8px;
        background: rgba(255, 255, 255, 0.05);
        transition: background 0.05s;
      }
      .eval-tick.alive {
        background: #50c878;
      }
      .eval-tick.dead {
        background: #e05050;
      }
      #eval-result {
        font-size: 12px;
        margin-bottom: 16px;
        padding: 10px;
        border: 1px solid var(--panel-border);
        line-height: 1.6;
      }
      #eval-result.success {
        border-color: var(--bonus);
        color: var(--bonus);
        background: var(--bonus-dim);
      }
      #eval-result.fail {
        border-color: var(--error);
        color: var(--error);
        background: var(--error-dim);
      }
      #eval-close {
        width: 100%;
        padding: 9px;
        font-family: var(--font);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: var(--accent-dim);
        border: 1px solid var(--accent);
        color: var(--accent);
        cursor: pointer;
      }
      #eval-close:hover {
        background: rgba(200, 168, 74, 0.3);
      }

      /* Tooltip */
      #tooltip {
        position: fixed;
        display: none;
        width: 204px;
        background: rgba(6, 10, 18, 0.97);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(6px);
        padding: 10px 12px;
        z-index: 20;
        pointer-events: none;
      }
      .tt-title {
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 0.08em;
        margin-bottom: 2px;
      }
      .tt-coords {
        font-size: 10px;
        color: var(--text-muted);
        margin-bottom: 5px;
      }
      .tt-desc {
        font-size: 10px;
        color: var(--text-muted);
        line-height: 1.5;
        margin-bottom: 5px;
      }
      .tt-row {
        font-size: 11px;
        margin-bottom: 3px;
      }
      .tt-affordable {
        color: var(--bonus);
      }
      .tt-expensive {
        color: var(--error);
      }
      .tt-hint {
        font-size: 10px;
        color: var(--text-muted);
      }
      .tt-bonus {
        font-size: 10px;
        color: var(--bonus);
      }
      .tt-slot {
        font-size: 10px;
        color: #a0c0e0;
      }

      /* Notification */
      #notification {
        position: fixed;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 18px;
        font-size: 12px;
        letter-spacing: 0.06em;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 30;
        border: 1px solid transparent;
      }
      #notification.error {
        color: var(--error);
        background: var(--error-dim);
        border-color: var(--error);
      }
      #notification.bonus {
        color: var(--bonus);
        background: var(--bonus-dim);
        border-color: var(--bonus);
      }
      #notification.info {
        color: var(--accent);
        background: var(--accent-dim);
        border-color: var(--accent);
      }

      /* Scale placeholder overlay */
      #scale-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        z-index: 40;
        background: rgba(8, 12, 18, 0.94);
        backdrop-filter: blur(6px);
      }
      #scale-overlay.visible {
        display: flex;
      }
      #scale-icon {
        font-size: 48px;
        opacity: 0.3;
        margin-bottom: 8px;
      }
      #scale-label {
        font-size: 28px;
        letter-spacing: 0.3em;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      #scale-sub {
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.15em;
      }
      #scale-note {
        font-size: 10px;
        color: var(--text-muted);
        opacity: 0.5;
        margin-top: 4px;
      }
      #scale-back {
        margin-top: 12px;
        padding: 8px 24px;
        font-family: var(--font);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        background: var(--accent-dim);
        border: 1px solid var(--accent);
        color: var(--accent);
        cursor: pointer;
      }
      #scale-back:hover {
        background: rgba(200, 168, 74, 0.3);
      }

      /* Controls hint */
      #controls-hint {
        position: fixed;
        bottom: 12px;
        right: 12px;
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        line-height: 1.7;
        text-align: right;
      }

      /* Zoom flash */
      #zoom-flash {
        position: fixed;
        inset: 0;
        background: rgba(200, 168, 74, 0.06);
        pointer-events: none;
        opacity: 0;
        z-index: 45;
        transition: opacity 0.25s;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="breadcrumb">
      <span class="bc-item" data-scale="MULTIVERSE">Multiverse</span
      ><span class="bc-sep">›</span>
      <span class="bc-item" data-scale="UNIVERSE">Universe</span
      ><span class="bc-sep">›</span>
      <span class="bc-item" data-scale="SYSTEM">System</span
      ><span class="bc-sep">›</span>
      <span class="bc-item" data-scale="WORLD">World</span
      ><span class="bc-sep">›</span>
      <span class="bc-item" data-scale="REGION">Region</span
      ><span class="bc-sep">›</span>
      <span class="bc-item active" data-scale="DISTRICT">District</span
      ><span class="bc-sep">›</span>
      <span class="bc-item" data-scale="PLOT" id="bc-plot">—</span>
    </div>

    <div id="plot-hud">
      <div id="plot-hud-title">Settlement</div>
      <div class="ph-row">
        <span class="ph-label">Turns left</span
        ><span class="ph-val neutral" id="ph-turns">—</span>
      </div>
      <div class="ph-row">
        <span class="ph-label">Population</span
        ><span class="ph-val neutral" id="ph-pop">—</span>
      </div>
      <div class="ph-row">
        <span class="ph-label">Food bal/tick</span
        ><span class="ph-val" id="ph-food">—</span>
      </div>
      <div class="ph-row">
        <span class="ph-label">Brush bal/tick</span
        ><span class="ph-val" id="ph-brush">—</span>
      </div>
      <div class="ph-row">
        <span class="ph-label">Est. grade</span
        ><span class="ph-val neutral" id="ph-grade">—</span>
      </div>
      <button id="eval-btn">Evaluate Settlement</button>
    </div>

    <div id="hud">
      <div id="hud-title">
        <span id="hud-scale-name">District</span>
        <div id="tick-indicator"></div>
      </div>
      <div id="res-list"></div>
      <div id="hud-divider"></div>
      <div id="stats"></div>
    </div>

    <div id="card-tray">
      <div id="tray-label">Cards</div>
    </div>

    <div id="eval-modal">
      <div id="eval-box">
        <div id="eval-title">Settlement Evaluation</div>
        <div class="eval-section-title">Production Balance</div>
        <div id="eval-bars"></div>
        <div id="eval-timeline">
          <div class="eval-section-title">Simulation (20 ticks)</div>
          <div id="eval-tick-row"></div>
        </div>
        <div id="eval-result"></div>
        <button id="eval-close">Accept &amp; Convert to Card</button>
      </div>
    </div>

    <div id="scale-overlay">
      <div id="scale-icon">◎</div>
      <div id="scale-label"></div>
      <div id="scale-sub"></div>
      <div id="scale-note">— Placeholder · Coming in future update —</div>
      <button id="scale-back">← Return to District</button>
    </div>

    <div id="tooltip"></div>
    <div id="notification"></div>
    <div id="zoom-flash"></div>
    <div id="controls-hint">Drag · Scroll zoom · Click to interact</div>

    <script>
      "use strict";

      // ═══════════════════════════════════════════════════════
      //  SCALE LAYER DEFINITIONS
      // ═══════════════════════════════════════════════════════
      const ScaleLayer = Object.freeze({
        PLOT: "PLOT",
        DISTRICT: "DISTRICT",
        REGION: "REGION",
        WORLD: "WORLD",
        SYSTEM: "SYSTEM",
        UNIVERSE: "UNIVERSE",
        MULTIVERSE: "MULTIVERSE",
      });

      const SCALE_META = Object.freeze({
        PLOT: {
          name: "Settlement",
          subtitle: "Survival · Tactical Puzzle",
          icon: "🔥",
          color: "#90b060",
          placeholder: false,
        },
        DISTRICT: {
          name: "District",
          subtitle: "Organization · Town Building",
          icon: "⌂",
          color: "#c8a84a",
          placeholder: false,
        },
        REGION: {
          name: "Region",
          subtitle: "Territory · Kingdom Expansion",
          icon: "⚑",
          color: "#6080c0",
          placeholder: true,
        },
        WORLD: {
          name: "World",
          subtitle: "Civilization · Planetary Scale",
          icon: "◎",
          color: "#50a0d0",
          placeholder: true,
        },
        SYSTEM: {
          name: "Planetary System",
          subtitle: "Expansion · Star Empire",
          icon: "✦",
          color: "#c050a0",
          placeholder: true,
        },
        UNIVERSE: {
          name: "Universe",
          subtitle: "Cosmology · Coming Soon",
          icon: "∞",
          color: "#8060e0",
          placeholder: true,
        },
        MULTIVERSE: {
          name: "Multiverse",
          subtitle: "Prestige · Meta Layer",
          icon: "⧫",
          color: "#e06080",
          placeholder: true,
        },
      });

      // ═══════════════════════════════════════════════════════
      //  CONSTANTS
      // ═══════════════════════════════════════════════════════
      const CONST = Object.freeze({
        MAP_SEED: 0xdeadbeef,
        CHUNK_SIZE: 8,
        TILE_SIZE: 72,

        // District economy
        DISTRICT_BASE_COST: 12,
        OPEN_COUNT_SCALE: 0.07,
        DISTANCE_SCALE: 0.38,
        GOVERNANCE_TRICKLE: 2, // governance gained per tick passively

        // Plot session params
        PLOT_TURNS_MIN: 8,
        PLOT_TURNS_MAX: 14,
        PLOT_GRID_MIN: 5,
        PLOT_GRID_MAX: 9,
        PLOT_EVAL_TICKS: 20,
        PLOT_SUSTAIN_TICKS: 10,
        PLOT_POP_BASE: 10,
        PLOT_POP_SURPLUS_MUL: 0.5,
        BONFIRE_BRUSH_COST: 1,
        POP_FOOD_COST: 1,

        // District slots
        DISTRICT_PLOT_SLOTS: 3,

        ZOOM_MIN: 0.3,
        ZOOM_MAX: 3.5,
        ZOOM_SPEED: 0.0012,
        TICK_INTERVAL_MS: 1000,
        TILE_PAD: 1,
        GRID_ALPHA: 0.04,
        FOG_ALPHA: 0.62,
        DRAG_THRESHOLD_PX: 4,
        NOTIFICATION_MS: 2600,

        DISTRICT_TILE_WEIGHTS: Object.freeze({
          TOWN_CENTER: 0.02,
          MARKET: 0.16,
          WORKSHOP: 0.15,
          FARM_QUARTER: 0.13,
          RESIDENTIAL: 0.12,
          WAREHOUSE: 0.07,
          TAVERN: 0.07,
          ROAD: 0.1,
          RUINS: 0.06,
          PLOT_SLOT: 0.12,
        }),
        PLOT_TILE_WEIGHTS: Object.freeze({
          FOREST: 0.27,
          FARMLAND: 0.26,
          HUNTING_GROUND: 0.14,
          FRESH_WATER: 0.1,
          CLAY_PIT: 0.1,
          FLINT_OUTCROP: 0.08,
          ANCIENT_CAMP: 0.05,
        }),
      });

      // ═══════════════════════════════════════════════════════
      //  TILE TYPE REGISTRIES
      // ═══════════════════════════════════════════════════════
      const DISTRICT_TILE_TYPES = Object.freeze({
        TOWN_CENTER: {
          id: "TOWN_CENTER",
          name: "Town Center",
          color: "#c8a84a",
          darkColor: "#4a3a18",
          symbol: "⌂",
          resource: "governance",
          amountPerTick: 2,
          popCost: 0,
          isSlot: false,
          description: "Administrative core. Generates Governance passively.",
        },
        MARKET: {
          id: "MARKET",
          name: "Market",
          color: "#4a9868",
          darkColor: "#182f22",
          symbol: "₪",
          resource: "commerce",
          amountPerTick: 3,
          popCost: 5,
          isSlot: false,
          description: "Trade hub producing Commerce each tick.",
        },

      const GRADE_TABLE = [
        { min: 90, grade: "S", color: "#ffd700" },
        { min: 75, grade: "A", color: "#c8a84a" },
        { min: 55, grade: "B", color: "#70c080" },
