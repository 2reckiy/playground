<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />
  <title>Math Clicker</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f2f2f2;
      color: #333;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    #number {
      font-size: 2em;
      margin: 20px 0;
      transition: all 0.2s ease;
    }

    button {
      font-size: 1.2em;
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background-color: #45a049;
    }

    .upgrade {
      background-color: #2196F3;
    }

    .upgrade:hover {
      background-color: #1976D2;
    }

    #equation {
      margin: 20px;
      font-size: 1.2em;
    }

    #status {
      margin-top: 20px;
      font-size: 0.9em;
      color: #666;
    }

    .pop {
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }

      100% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <h1>🧮 Math Clicker</h1>
  <div id="number">Numbers: 0</div>
  <button onclick="clickNumber()"
          id="clickBtn">Click +1</button>
  <div>
    <button class="upgrade"
            onclick="buyAutoClick()">Buy Auto Clicker (+1/s) [Cost: <span id="autoCost">10</span>]</button><br />
    <button class="upgrade"
            onclick="buyMultiplier()">Buy Multiplier (x2) [Cost: <span id="multCost">25</span>]</button><br />
    <button class="upgrade"
            onclick="buySolver()">Buy Solver Bot (+Bonus every 10s) [Cost: <span id="solverCost">50</span>]</button>
  </div>
  <div id="equation">
    Solve for bonus: <span id="question"></span><br />
    <input type="text"
           id="answer"
           placeholder="Answer"
           onkeydown="checkEnter(event)">
    <button onclick="checkAnswer()">Submit</button>
  </div>
  <div id="status"></div>

  <script>
    let numbers = 0;
    let displayNumbers = 0;

    let autoClickers = 0;
    let multiplier = 1;
    let solvers = 0;

    let autoCost = 10;
    let multCost = 25;
    let solverCost = 50;

    let question = {};
    let bonus = 10;

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playTone(freq, duration = 0.1, type = 'square', vol = 0.2) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = vol;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function clickNumber() {
      numbers += 1 * multiplier;
      animateClick();
      playTone(440, 0.05, 'square', 0.1);
    }

    function animateClick() {
      const btn = document.getElementById('clickBtn');
      btn.classList.remove('pop');
      void btn.offsetWidth;
      btn.classList.add('pop');
    }

    function buyAutoClick() {
      if (numbers >= autoCost) {
        numbers -= autoCost;
        autoClickers++;
        autoCost = Math.floor(autoCost * 1.5);
        document.getElementById("status").innerText = `Bought Auto Clicker. Total: ${autoClickers}`;
        playTone(660, 0.1, 'triangle');
        updateUI();
      } else {
        playTone(120, 0.1, 'sawtooth');
      }
    }

    function buyMultiplier() {
      if (numbers >= multCost) {
        numbers -= multCost;
        multiplier *= 2;
        multCost = Math.floor(multCost * 2);
        document.getElementById("status").innerText = `Multiplier upgraded! Now: x${multiplier}`;
        playTone(880, 0.15, 'triangle');
        updateUI();
      } else {
        playTone(120, 0.1, 'sawtooth');
      }
    }

    function buySolver() {
      if (numbers >= solverCost) {
        numbers -= solverCost;
        solvers++;
        solverCost = Math.floor(solverCost * 2);
        document.getElementById("status").innerText = `Solver Bot added! Total: ${solvers}`;
        playTone(1000, 0.2, 'triangle');
        updateUI();
      } else {
        playTone(120, 0.1, 'sawtooth');
      }
    }

    function autoGain() {
      numbers += autoClickers * multiplier;
    }

    function solverGain() {
      if (solvers > 0) {
        const gain = solvers * bonus * multiplier;
        numbers += gain;
        document.getElementById("status").innerText = `Solver Bots solved math! +${gain}`;
        playTone(940, 0.1, 'sine');
      }
    }

    function updateUI() {
      document.getElementById("autoCost").innerText = autoCost;
      document.getElementById("multCost").innerText = multCost;
      document.getElementById("solverCost").innerText = solverCost;
    }

    function generateQuestion() {
      const a = Math.floor(Math.random() * 10) + 1;
      const b = Math.floor(Math.random() * 10) + 1;
      question = {
        text: `${a} × ${b}`,
        answer: a * b
      };
      document.getElementById("question").innerText = question.text;
    }

    function checkAnswer() {
      const input = parseInt(document.getElementById("answer").value);
      if (input === question.answer) {
        numbers += bonus;
        document.getElementById("status").innerText = `✅ Correct! +${bonus} Numbers!`;
        playTone(880, 0.15, 'sine');
        generateQuestion();
        document.getElementById("answer").value = '';
      } else {
        document.getElementById("status").innerText = `❌ Incorrect. Try again.`;
        playTone(100, 0.2, 'sawtooth');
      }
      updateUI();
    }

    function checkEnter(e) {
      if (e.key === 'Enter') checkAnswer();
    }

    function smoothDisplay() {
      displayNumbers += (numbers - displayNumbers) * 0.2;
      document.getElementById("number").innerText = `Numbers: ${Math.floor(displayNumbers)}`;
      requestAnimationFrame(smoothDisplay);
    }

    // Init
    generateQuestion();
    setInterval(autoGain, 1000);      // Auto clickers every second
    setInterval(solverGain, 10000);   // Solver bots every 10 seconds
    smoothDisplay();
  </script>
</body>

</html>
