<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mystery Minimal Game with Classes and Game Over</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #111;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #gameOver {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #0ff;
        font-family: monospace;
        font-size: 32px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="gameOver">GAME OVER</div>
    <canvas id="game"></canvas>
    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let energy = 50; // starting energy
      const DOT_CONSUME = 0.05; // per second
      const PAIR_CONSUME = 0.1; // per second
      const MAX_PARTICLES = 100;

      // --- Classes ---
      class Dot {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.baseX = x;
          this.baseY = y;
          this.connected = false;
          this.vx = 0;
          this.vy = 0;
        }
        update(delta, energyFactor) {
          const movement = 1 + energyFactor;
          this.vx += (Math.random() - 0.5) * 0.1 * movement;
          this.vy += (Math.random() - 0.5) * 0.1 * movement;
          this.vx += (this.baseX - this.x) * 0.01;
          this.vy += (this.baseY - this.y) * 0.01;
          this.x += this.vx;
          this.y += this.vy;
          this.vx *= 0.9;
          this.vy *= 0.9;
        }
        draw(alpha) {
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      class Pair {
        constructor(dotA, dotB) {
          this.dotA = dotA;
          this.dotB = dotB;
        }
        update(tension = 0.02) {
          const dx = this.dotB.x - this.dotA.x;
          const dy = this.dotB.y - this.dotA.y;
          this.dotA.vx += dx * tension;
          this.dotA.vy += dy * tension;
          this.dotB.vx -= dx * tension;
          this.dotB.vy -= dy * tension;
        }
        draw(alpha) {
          ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(this.dotA.x, this.dotA.y);
          ctx.lineTo(this.dotB.x, this.dotB.y);
          ctx.stroke();
        }
      }

      class AmbientParticle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.alpha = Math.random() * 0.5 + 0.1;
          this.fade = Math.random() * 0.02 + 0.005;
        }
        update() {
          this.x += (Math.random() - 0.5) * 1.5;
          this.y += (Math.random() - 0.5) * 1.5;
          this.alpha += (Math.random() - 0.5) * this.fade;
          if (this.alpha < 0) this.alpha = 0;
          if (this.alpha > 1) this.alpha = 1;
        }
        draw() {
          ctx.fillStyle = `rgba(0,255,255,${this.alpha})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // --- Game State ---
      let dots = [];
      let pairs = [];
      let particles = [];
      let lastTime = performance.now();
      let gameOver = false;

      // --- Game Logic ---
      canvas.addEventListener("click", (e) => {
        if (!gameOver) {
          dots.push(new Dot(e.clientX, e.clientY));
        }
      });

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function createParticles() {
        const particleCount = Math.min(MAX_PARTICLES, Math.floor(energy));
        while (particles.length < particleCount) {
          particles.push(new AmbientParticle());
        }
        if (particles.length > particleCount) particles.splice(particleCount);
      }

      function update() {
        if (gameOver) return;

        const now = performance.now();
        const delta = (now - lastTime) / 1000;
        lastTime = now;

        // Consume energy per element
        energy -= dots.length * DOT_CONSUME * delta;
        energy -= pairs.length * PAIR_CONSUME * delta;
        if (energy <= 0) {
          energy = 0;
          gameOver = true;
          document.getElementById("gameOver").style.display = "block";
        }

        // Update particles
        createParticles();
        particles.forEach((p) => p.update());

        // Update dots
        dots.forEach((dot) => dot.update(delta, energy / 50));

        // Create new pairs
        for (let i = 0; i < dots.length; i++) {
          const a = dots[i];
          if (a.connected) continue;
          for (let j = i + 1; j < dots.length; j++) {
            const b = dots[j];
            if (b.connected) continue;
            if (distance(a, b) < 100) {
              const pair = new Pair(a, b);
              pairs.push(pair);
              a.connected = true;
              b.connected = true;
              break;
            }
          }
        }

        // Update pairs
        pairs.forEach((pair) => pair.update());
      }

      function draw() {
        // Background based on energy
        const bgAlpha = 0.05 + Math.min(1, energy / 50) * 0.2;
        ctx.fillStyle = `rgba(17,17,17,${1 - bgAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw particles
        particles.forEach((p) => p.draw());

        // Draw pairs
        const lineAlpha = 0.1 + Math.min(1, energy / 50) * 0.9;
        pairs.forEach((pair) => pair.draw(lineAlpha));

        // Draw dots
        const dotAlpha = 0.2 + Math.min(1, energy / 50) * 0.8;
        dots.forEach((dot) => dot.draw(dotAlpha));
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      loop();

      // Resize
      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    </script>
  </body>
</html>
