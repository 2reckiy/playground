<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Minimal Racing - Single File</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #111;
        color: #ddd;
        font-family: Inter, system-ui, sans-serif;
      }
      canvas {
        display: block;
        background: linear-gradient(#0b1220, #08111a);
        margin: 0 auto;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        border-radius: 8px;
      }
      #ui {
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.35);
        padding: 8px 12px;
        border-radius: 8px;
        backdrop-filter: blur(4px);
        color: #dfe;
        font-size: 13px;
      }
      #help {
        position: fixed;
        right: 16px;
        top: 16px;
        color: #cfe;
        background: rgba(0, 0, 0, 0.25);
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 13px;
      }
      .big {
        font-weight: 700;
        font-size: 18px;
      }
      button {
        margin-left: 6px;
      }
      #footer {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 12px;
        color: #99a;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="ui">
      <div class="big">Minimal Racing</div>
      <div>Time: <span id="time">0.000</span>s</div>
      <div>Best: <span id="best">—</span>s</div>
      <div>Lap: <span id="lap">0</span></div>
      <div>Position: <span id="pos">1 / 1</span></div>
      <div style="margin-top: 6px">
        Controls: ↑/W accelerate • ↓/S brake • ←/→ turn • R regenerate • N
        restart
      </div>
    </div>
    <div id="help">
      <div style="font-weight: 600">Keys</div>
      <div>R - new track</div>
      <div>N - new race</div>
      <div>G - toggle debug</div>
    </div>
    <div id="footer">
      Random track, smooth path, AI followers, saved best to localStorage
    </div>

    <script>
      /* Minimal Racing Game - Single File
        - Player car + simple AI following centerline
        - Random radial track generation + smoothing
        - Lap timer and best time saved to localStorage
      */

      // ---- Config ----
      const CONFIG = {
        canvasWidth: Math.min(window.innerWidth - 40, 1200),
        canvasHeight: Math.min(window.innerHeight - 80, 800),
        trackPoints: 18, // control points around circle
        trackDetail: 600, // points on the interpolated centerline
        trackRadius: Math.min(window.innerWidth, window.innerHeight) * 0.22,
        trackWidth: 60,
        aiCount: 3,
        maxSpeed: 300, // px/s
        dtLimit: 0.033,
      };

      // ---- Utilities ----
      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }
      function mod(a, m) {
        return ((a % m) + m) % m;
      }
      function lerp(a, b, t) {
        return a + (b - a) * t;
      }
      function dist(a, b) {
        const dx = a.x - b.x,
          dy = a.y - b.y;
        return Math.hypot(dx, dy);
      }
      function angleDiff(a, b) {
        let d = mod(b - a + Math.PI, 2 * Math.PI) - Math.PI;
        return d;
      }

      // ---- Canvas setup ----
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      function resizeCanvas() {
        canvas.width = CONFIG.canvasWidth;
        canvas.height = CONFIG.canvasHeight;
      }
      resizeCanvas();

      // ---- DOM UI ----
      const elTime = document.getElementById("time");
      const elBest = document.getElementById("best");
      const elLap = document.getElementById("lap");
      const elPos = document.getElementById("pos");

      // ---- Track generation ----
      function generateControlPoints(seed) {
        // create radial points with random radius variance
        const cx = canvas.width / 2,
          cy = canvas.height / 2;
        const n = CONFIG.trackPoints;
        const pts = [];
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2;
          const r =
            CONFIG.trackRadius *
            (0.7 + Math.sin(i * 1.3) * 0.05 + rand(-0.18, 0.18));
          pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r });
        }
        return pts;
      }

      // Catmull-Rom interpolation for smooth closed curve
      function catmullRom(points, detail) {
        const pts = [];
        const n = points.length;
        // closed: for i from 0..n-1 use p[i-1], p[i], p[i+1], p[i+2]
        for (let i = 0; i < n; i++) {
          const p0 = points[(i - 1 + n) % n];
          const p1 = points[i];
          const p2 = points[(i + 1) % n];
          const p3 = points[(i + 2) % n];
          for (let t = 0; t < detail / n; t++) {
            const tt = t / (detail / n);
            // Catmull-Rom spline formula
            const t2 = tt * tt,
              t3 = t2 * tt;
            const x =
              0.5 *
              (2 * p1.x +
                (-p0.x + p2.x) * tt +
                (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
                (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
            const y =
              0.5 *
              (2 * p1.y +
                (-p0.y + p2.y) * tt +
                (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
                (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3);
            pts.push({ x, y });
          }
        }
        return pts;
      }

      // create offset polygon (approx) using normals
      function createTrack(centerline, width) {
        const L = centerline.length;
        const left = [];
        const right = [];
        for (let i = 0; i < L; i++) {
          const a = i,
            b = (i + 1) % L;
          const p = centerline[i],
            q = centerline[b];
          const dx = q.x - p.x,
            dy = q.y - p.y;
          const len = Math.hypot(dx, dy) || 1;
          const nx = -dy / len,
            ny = dx / len; // normal
          left.push({ x: p.x + nx * (width / 2), y: p.y + ny * (width / 2) });
          right.push({ x: p.x - nx * (width / 2), y: p.y - ny * (width / 2) });
        }
        return { left, right };
      }

      // checkpoints: every Nth centerline index
      function createCheckpoints(centerline, gap) {
        const cps = [];
        for (let i = 0; i < centerline.length; i += gap) {
          cps.push({ idx: i, p: centerline[i] });
        }
        return cps;
      }

      // ---- Cars ----
      class Car {
        constructor(x, y, color = "red") {
          this.pos = { x, y };
          this.vel = 0;
          this.angle = 0;
          this.steer = 0;
          this.color = color;
          this.width = 14;
          this.length = 28;
          this.maxSteer = Math.PI / 3.2;
          this.maxAccel = 500; // px/s^2
          this.brakeDecel = 700;
          this.friction = 200;
          this.targetIdx = 0; // for AI
          this.laps = 0;
          this.checkNext = 0;
          this.time = 0;
          this.finished = false;
        }
        step(dt, inputAccel = 0, inputSteer = 0) {
          // inputAccel: -1..1, inputSteer: -1..1
          // simple bicycle-like update
          const accel =
            inputAccel > 0
              ? inputAccel * this.maxAccel
              : inputAccel * this.brakeDecel;
          this.vel += accel * dt;
          // friction + clamp
          if (this.vel > 0)
            this.vel = Math.max(0, this.vel - this.friction * dt);
          if (this.vel < 0)
            this.vel = Math.min(0, this.vel + this.friction * dt);
          this.vel = Math.max(-80, Math.min(CONFIG.maxSpeed, this.vel));
          // steering scaled with speed
          const steerAmt =
            inputSteer * this.maxSteer * Math.min(Math.abs(this.vel) / 150, 1);
          this.angle += steerAmt * dt;
          // position integration
          this.pos.x += Math.cos(this.angle) * this.vel * dt;
          this.pos.y += Math.sin(this.angle) * this.vel * dt;
          if (!this.finished) this.time += dt;
        }
        draw(ctx) {
          ctx.save();
          ctx.translate(this.pos.x, this.pos.y);
          ctx.rotate(this.angle);
          ctx.fillStyle = this.color;
          ctx.beginPath();
          roundRectPath(
            ctx,
            -this.length / 2,
            -this.width / 2,
            this.length,
            this.width,
            3
          );
          ctx.fill();
          // windows
          ctx.fillStyle = "rgba(255,255,255,0.12)";
          ctx.fillRect(-6, -this.width / 2 + 2, 12, this.width - 4);
          ctx.restore();
        }
      }

      // small helper for rounded rect path
      function roundRectPath(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      // ---- Game State ----
      let state = {
        centerline: [],
        trackPolys: null,
        checkpoints: [],
        seed: Math.floor(Math.random() * 1e9),
        player: null,
        ais: [],
        running: false,
        debug: false,
        bestTime: parseFloat(
          localStorage.getItem("minimal_racer_best") || "NaN"
        ),
        startTime: 0,
        currentLapStart: 0,
        lapCount: 1,
      };

      // ---- Input ----
      const keys = {};
      window.addEventListener("keydown", (e) => {
        if (e.key === "r" || e.key === "R") {
          generateNewTrack();
          e.preventDefault();
        }
        if (e.key === "n" || e.key === "N") {
          restartRace();
          e.preventDefault();
        }
        if (e.key === "g" || e.key === "G") {
          state.debug = !state.debug;
        }
        keys[e.key.toLowerCase()] = true;
      });
      window.addEventListener("keyup", (e) => {
        keys[e.key.toLowerCase()] = false;
      });

      // ---- Initialization ----
      function initGame() {
        generateTrack();
        placeCars();
        state.running = true;
        state.startTime = performance.now() / 1000;
        state.currentLapStart = state.startTime;
        state.lapCount = 1;
        updateUI();
      }
      function generateNewTrack() {
        state.seed = Math.floor(Math.random() * 1e9);
        generateTrack();
        placeCars();
        state.startTime = performance.now() / 1000;
        state.currentLapStart = state.startTime;
        state.lapCount = 1;
        updateUI();
      }
      function restartRace() {
        placeCars();
        state.running = true;
        state.startTime = performance.now() / 1000;
        state.currentLapStart = state.startTime;
        state.lapCount = 1;
        updateUI();
      }

      function generateTrack() {
        const ctrl = generateControlPoints(state.seed);
        const center = catmullRom(ctrl, CONFIG.trackDetail);
        state.centerline = center;
        state.trackPolys = createTrack(center, CONFIG.trackWidth);
        state.checkpoints = createCheckpoints(
          center,
          Math.floor(center.length / 12)
        );
      }

      function placeCars() {
        // put player and AI at start of centerline
        const start = state.centerline[0];
        state.player = new Car(start.x, start.y - 30, "#ff5555");
        state.player.angle = Math.atan2(
          state.centerline[1].y - start.y,
          state.centerline[1].x - start.x
        );
        state.ais = [];
        const colors = ["#55ff55", "#5599ff", "#ffcc55", "#ff77ff"];
        for (let i = 0; i < CONFIG.aiCount; i++) {
          const c = new Car(
            start.x + (i + 1) * 18,
            start.y + (i + 1) * 6,
            colors[(i + 1) % colors.length]
          );
          c.angle = state.player.angle;
          c.vel = 80 + i * 20;
          c.targetIdx = Math.floor(
            i * (state.centerline.length / (CONFIG.aiCount + 1))
          );
          state.ais.push(c);
        }
        // reset best read
        state.bestTime = parseFloat(
          localStorage.getItem("minimal_racer_best") || "NaN"
        );
      }

      function updateUI() {}

      // ---- AI logic ----
      function aiStep(ai, dt) {
        const center = state.centerline;
        const L = center.length;
        // target is currently targetIdx, move to next when close
        const target = center[ai.targetIdx % L];
        const d = dist(ai.pos, target);
        // if close, advance
        if (d < 18) {
          ai.targetIdx = (ai.targetIdx + 1) % L;
        }
        const next = center[(ai.targetIdx + 6) % L]; // lookahead
        // heading to next
        const desired = Math.atan2(next.y - ai.pos.y, next.x - ai.pos.x);
        const steer = Math.max(
          -1,
          Math.min(1, angleDiff(ai.angle, desired) * -2)
        );
        // speed control: higher on straights, lower on curves
        // estimate curvature by angle to lookahead ahead and further ahead
        const look1 = center[(ai.targetIdx + 4) % L];
        const look2 = center[(ai.targetIdx + 12) % L];
        const a1 = Math.atan2(look1.y - ai.pos.y, look1.x - ai.pos.x);
        const a2 = Math.atan2(look2.y - ai.pos.y, look2.x - ai.pos.x);
        const curvature = Math.abs(angleDiff(a1, a2));
        const targetSpeed = lerp(
          CONFIG.maxSpeed * 0.65,
          CONFIG.maxSpeed * 0.4,
          Math.min(1, curvature / 0.8)
        );
        // accelerate or brake to reach targetSpeed
        const accel = ai.vel < targetSpeed ? 1 : -0.6;
        ai.step(dt, accel, steer);
      }

      // ---- Collision with track (off-track penalty) ----
      function offTrackPenalty(car) {
        // distance to nearest centerline point
        let nearest = 9999;
        for (let i = 0; i < state.centerline.length; i++) {
          const d = dist(car.pos, state.centerline[i]);
          if (d < nearest) nearest = d;
        }
        const halfWidth = CONFIG.trackWidth / 2;
        if (nearest > halfWidth + 6) {
          // off track: heavy friction and slow down
          car.vel *= 0.985;
          // push back toward track center a tiny amount
          // find nearest center index quickly (approx)
          // no extra code here: just slowed
        }
      }

      // ---- Checkpoint & lap detection ----
      function updateCheckpoints(car) {
        // check if passed the next checkpoint (by distance to centerline point index)
        const nextCp =
          state.checkpoints[car.checkNext % state.checkpoints.length];
        if (!nextCp) return;
        if (dist(car.pos, nextCp.p) < 30) {
          car.checkNext++;
          if (car.checkNext >= state.checkpoints.length) {
            // lap complete
            car.checkNext = 0;
            car.laps++;
            // Only consider player's lap for timer and best
            if (car === state.player) {
              const now = performance.now() / 1000;
              const lapTime = now - state.currentLapStart;
              state.currentLapStart = now;
              state.lapCount++;
              // update best
              if (!isFinite(state.bestTime) || lapTime < state.bestTime) {
                state.bestTime = lapTime;
                localStorage.setItem("minimal_racer_best", lapTime.toFixed(3));
              }
            }
          }
        }
      }

      // ---- Drawing ----
      function drawTrack(ctx) {
        const left = state.trackPolys.left,
          right = state.trackPolys.right;
        // fill track
        ctx.save();
        // track fill
        ctx.beginPath();
        ctx.moveTo(left[0].x, left[0].y);
        for (let p of left) ctx.lineTo(p.x, p.y);
        for (let i = right.length - 1; i >= 0; i--)
          ctx.lineTo(right[i].x, right[i].y);
        ctx.closePath();
        const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        g.addColorStop(0, "#1b2a36");
        g.addColorStop(1, "#152029");
        ctx.fillStyle = g;
        ctx.fill();
        // inner darker
        ctx.globalAlpha = 0.6;
        ctx.strokeStyle = "rgba(0,0,0,0.18)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.globalAlpha = 1;
        // outer grass
        ctx.beginPath();
        ctx.rect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0b1a12";
        ctx.fill();
        // draw track again on top
        ctx.beginPath();
        ctx.moveTo(left[0].x, left[0].y);
        for (let p of left) ctx.lineTo(p.x, p.y);
        for (let i = right.length - 1; i >= 0; i--)
          ctx.lineTo(right[i].x, right[i].y);
        ctx.closePath();
        ctx.fillStyle = g;
        ctx.fill();
        // borders
        ctx.strokeStyle = "#dfe";
        ctx.lineWidth = 1.2;
        ctx.setLineDash([6, 8]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      function drawCenterline(ctx) {
        ctx.save();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        for (let i = 0; i < state.centerline.length; i++) {
          const p = state.centerline[i];
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }

      function drawCheckpoints(ctx) {
        ctx.save();
        for (let i = 0; i < state.checkpoints.length; i++) {
          const cp = state.checkpoints[i];
          ctx.beginPath();
          ctx.arc(cp.p.x, cp.p.y, 8, 0, Math.PI * 2);
          ctx.fillStyle =
            i % 2 ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.03)";
          ctx.fill();
        }
        ctx.restore();
      }

      // ---- Main loop ----
      let lastT = performance.now() / 1000;
      function loop() {
        const now = performance.now() / 1000;
        let dt = now - lastT;
        lastT = now;
        if (dt > CONFIG.dtLimit) dt = CONFIG.dtLimit;
        update(dt);
        render();
        requestAnimationFrame(loop);
      }

      function update(dt) {
        if (!state.running) return;
        // player controls
        const accel =
          keys["arrowup"] || keys["w"]
            ? 1
            : keys["arrowdown"] || keys["s"]
            ? -1
            : 0;
        const steer =
          keys["arrowleft"] || keys["a"]
            ? -1
            : keys["arrowright"] || keys["d"]
            ? 1
            : 0;
        state.player.step(dt, accel, steer);
        offTrackPenalty(state.player);
        updateCheckpoints(state.player);
        // AIs
        for (let ai of state.ais) {
          aiStep(ai, dt);
          offTrackPenalty(ai);
          updateCheckpoints(ai);
        }
        // update display time for player current lap (not total time)
        const nowSec = performance.now() / 1000;
        const curLap = nowSec - state.currentLapStart;
        elTime.textContent = curLap.toFixed(3);
        elLap.textContent = state.lapCount;
        elPos.textContent =
          (
            1 +
            state.ais.filter(
              (a) =>
                a.laps > state.player.laps ||
                (a.laps === state.player.laps && a.time < state.player.time)
            )
          ).toString() +
          " / " +
          (1 + state.ais.length);
        if (isFinite(state.bestTime))
          elBest.textContent = state.bestTime.toFixed(3);
        else elBest.textContent = "—";
      }

      function render() {
        // clear
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // background
        ctx.fillStyle = "#0b1116";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // track
        drawTrack(ctx);
        if (state.debug) drawCenterline(ctx);
        if (state.debug) drawCheckpoints(ctx);
        // draw AIs behind player maybe
        const allCars = [...state.ais, state.player];
        // sort by y for simple depth
        allCars.sort((a, b) => a.pos.y - b.pos.y);
        for (let car of allCars) car.draw(ctx);
        // HUD: minimap-ish, best label
        drawMiniMap(ctx);
      }

      // small minimap showing centerline and cars
      function drawMiniMap(ctx) {
        const w = 160,
          h = 120;
        const pad = 14;
        const x = canvas.width - w - pad,
          y = canvas.height - h - pad;
        ctx.save();
        ctx.globalAlpha = 0.9;
        // background
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        roundRect(ctx, x - 6, y - 6, w + 12, h + 12, 10);
        ctx.fill();
        // map transform: compute bounding box of centerline
        const minx = Math.min(...state.centerline.map((p) => p.x));
        const maxx = Math.max(...state.centerline.map((p) => p.x));
        const miny = Math.min(...state.centerline.map((p) => p.y));
        const maxy = Math.max(...state.centerline.map((p) => p.y));
        const sx = (w - 12) / (maxx - minx || 1),
          sy = (h - 12) / (maxy - miny || 1);
        const s = Math.min(sx, sy);
        ctx.translate(x + 6, y + 6);
        ctx.scale(s, s);
        ctx.translate(-minx, -miny);
        // draw centerline
        ctx.lineWidth = 1 / s;
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.beginPath();
        for (let i = 0; i < state.centerline.length; i++) {
          const p = state.centerline[i];
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.stroke();
        // draw cars as dots
        function drawDot(car, col) {
          ctx.beginPath();
          ctx.fillStyle = col;
          ctx.arc(car.pos.x, car.pos.y, 3 / s, 0, Math.PI * 2);
          ctx.fill();
        }
        for (let ai of state.ais) drawDot(ai, ai.color);
        drawDot(state.player, state.player.color);
        ctx.restore();
      }

      // small helper to draw rounded rect
      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      // ---- Start ----
      initGame();
      lastT = performance.now() / 1000;
      requestAnimationFrame(loop);

      // ---- Responsive handling ----
      window.addEventListener("resize", () => {
        CONFIG.canvasWidth = Math.min(window.innerWidth - 40, 1200);
        CONFIG.canvasHeight = Math.min(window.innerHeight - 80, 800);
        resizeCanvas();
        generateTrack();
        placeCars();
      });

      // ---- Misc: expose debug controls in console ----
      window.MINR = {
        state,
        regenerate: generateNewTrack,
        restart: restartRace,
      };
    </script>
  </body>
</html>
