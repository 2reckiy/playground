<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blacksmith Tycoon: Master Forge</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --border: #3d3d3d;
            --accent: #e67e22;
            --text: #e0e0e0;
            --header-h: 70px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: var(--header-h);
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }

        /* Quantity Selector Bar */
        .qty-selector {
            background: #2a2a2a;
            padding: 5px;
            display: flex;
            justify-content: center;
            gap: 5px;
            border-bottom: 1px solid var(--border);
        }

        .qty-btn {
            background: #333;
            color: #fff;
            border: 1px solid var(--border);
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .qty-btn.active {
            background: var(--accent);
            color: #000;
            border-color: #fff;
        }

        main {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 10px;
            padding: 10px;
            flex: 1;
            height: calc(100vh - var(--header-h) - 40px - 40px);
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            border-radius: 4px;
            overflow: hidden;
        }

        .panel-header {
            background: #2a2a2a;
            padding: 10px;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.8em;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .stat-val {
            display: block;
            font-size: 1.2em;
            font-weight: bold;
            color: var(--accent);
        }

        .card {
            background: #252525;
            border: 1px solid #333;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            position: relative;
        }

        .recipe-cost {
            font-size: 0.75em;
            color: #aaa;
            margin: 5px 0;
        }

        .qty-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: black;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            z-index: 2;
        }

        button {
            background: #333;
            color: white;
            border: 1px solid var(--border);
            padding: 8px;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            font-weight: bold;
            margin-top: 5px;
        }

        button:hover:not(:disabled) {
            background: var(--accent);
            color: black;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Forge Specifics */
        .progress-container {
            background: #111;
            height: 12px;
            border-radius: 6px;
            margin: 10px 0;
            overflow: hidden;
            border: 1px solid #444;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #d35400, #e67e22);
            width: 0%;
        }

        .queue-item {
            font-size: 0.8em;
            background: #1a1a1a;
            padding: 5px;
            margin-top: 5px;
            border-left: 3px solid var(--accent);
            display: flex;
            justify-content: space-between;
        }

        .quality-Fine {
            color: #5dade2;
        }

        .quality-Masterwork {
            color: #f4d03f;
            text-shadow: 0 0 5px #f4d03f;
        }

        footer {
            height: 40px;
            background: #000;
            font-size: 0.85em;
            padding: 0 20px;
            display: flex;
            align-items: center;
            border-top: 1px solid var(--border);
            color: #888;
        }
    </style>
</head>

<body>

    <header>
        <div style="text-align:center">GOLD <span id="gold" class="stat-val">0</span></div>
        <div style="text-align:center">LEVEL <span id="level" class="stat-val">0</span></div>
        <div style="text-align:center">XP <span id="xp-text" class="stat-val">0/0</span></div>
    </header>

    <div class="qty-selector">
        <span style="align-self:center; font-size:0.8em; margin-right:10px; color:#aaa;">ACTION AMOUNT:</span>
        <button class="qty-btn active" onclick="setQty(1)">1</button>
        <button class="qty-btn" onclick="setQty(10)">10</button>
        <button class="qty-btn" onclick="setQty(25)">25</button>
        <button class="qty-btn" onclick="setQty(100)">100</button>
        <button class="qty-btn" onclick="setQty(1000)">1k</button>
    </div>

    <main>
        <div class="panel">
            <div class="panel-header">The Marketplace</div>
            <div class="scroll-area" id="shop-list"></div>
        </div>

        <div class="panel">
            <div class="panel-header">The Forge & Anvil</div>
            <div class="scroll-area">
                <div id="forge-status"
                    style="text-align:center; padding: 15px; background: #1a1a1a; border-radius: 8px; margin-bottom:15px;">
                    <h3 id="active-item-name" style="margin:0; font-size:1em;">Forge Idle</h3>
                    <div class="progress-container">
                        <div id="forge-fill" class="progress-bar"></div>
                    </div>
                    <div id="queue-display"></div>
                </div>
                <div id="recipe-list"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">Warehouse</div>
            <div class="scroll-area" id="inventory-list"></div>
        </div>
    </main>

    <footer>
        <div id="log">Welcome, Master Smith. Current market: Prices are stable.</div>
    </footer>

    <script>
        const state = {
            gold: 150, level: 1, xp: 0, nextLevelXp: 100,
            resources: { iron: 0, wood: 0 },
            inventory: [],
            queue: [], // {id, name, time, xp, val, cost}
            isCrafting: false,
            selectedQty: 1,
            marketModifiers: { iron: 1, wood: 1, sell: 1 }
        };

        const DATA = {
            resources: {
                iron: { name: "Iron Ore", price: 10 },
                wood: { name: "Wood Planks", price: 5 }
            },
            recipes: [
                { id: 'dagger', name: "Iron Dagger", lv: 1, cost: { iron: 2 }, time: 1500, xp: 15, val: 30 },
                { id: 'shield', name: "Round Shield", lv: 1, cost: { wood: 5 }, time: 3000, xp: 25, val: 55 },
                { id: 'sword', name: "Longsword", lv: 2, cost: { iron: 5, wood: 1 }, time: 6000, xp: 60, val: 140 },
                { id: 'axe', name: "Battle Axe", lv: 3, cost: { iron: 8, wood: 3 }, time: 9000, xp: 120, val: 280 }
            ]
        };

        function setQty(n) {
            state.selectedQty = n;
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.innerText.replace('k', '000')) === n);
            });
            updateUI();
        }

        function updateUI() {
            document.getElementById('gold').innerText = Math.floor(state.gold).toLocaleString();
            document.getElementById('level').innerText = state.level;
            document.getElementById('xp-text').innerText = `${state.xp}/${state.nextLevelXp}`;

            // Market
            let shopHTML = '';
            for (let r in DATA.resources) {
                let unitPrice = Math.ceil(DATA.resources[r].price * state.marketModifiers[r]);
                let totalPrice = unitPrice * state.selectedQty;
                shopHTML += `<div class="card">
                <strong>${DATA.resources[r].name}</strong>
                <br><small>Storage: ${state.resources[r]} | Price: ${unitPrice}g</small>
                <button onclick="buy('${r}', ${unitPrice})" ${state.gold < totalPrice ? 'disabled' : ''}>
                    Buy ${state.selectedQty} (${totalPrice}g)
                </button>
            </div>`;
            }
            document.getElementById('shop-list').innerHTML = shopHTML;

            // Recipes
            let recipeHTML = '';
            DATA.recipes.forEach(r => {
                if (state.level >= r.lv) {
                    let costStr = Object.entries(r.cost).map(([m, qty]) => `${qty * state.selectedQty} ${m}`).join(", ");
                    recipeHTML += `<div class="card">
                    <strong>${r.name}</strong>
                    <div class="recipe-cost">Needs: ${costStr}</div>
                    <button onclick="addToQueue('${r.id}')">Queue ${state.selectedQty}</button>
                </div>`;
                }
            });
            document.getElementById('recipe-list').innerHTML = recipeHTML;

            // Inventory
            const grouped = state.inventory.reduce((acc, item) => {
                const key = `${item.id}-${item.q}`;
                if (!acc[key]) acc[key] = { ...item, count: 0 };
                acc[key].count++;
                return acc;
            }, {});

            let invHTML = '';
            Object.values(grouped).forEach(item => {
                let unitPrice = Math.floor(item.val * state.marketModifiers.sell);
                let sellCount = Math.min(item.count, state.selectedQty);
                invHTML += `<div class="card">
                <span class="qty-badge">x${item.count}</span>
                <span class="quality-${item.q}">${item.q}</span> ${item.name}
                <button onclick="sellGrouped('${item.id}', '${item.q}', ${unitPrice})">
                    Sell ${sellCount} for ${unitPrice * sellCount}g
                </button>
            </div>`;
            });
            document.getElementById('inventory-list').innerHTML = invHTML || "<p style='text-align:center; opacity:0.5; margin-top:20px;'>Warehouse is empty</p>";

            // Queue Display
            let qHTML = '';
            if (state.queue.length > 0) {
                qHTML = `<div style="margin-top:10px; border-top:1px solid #333; padding-top:5px;">
                <small>UPCOMING QUEUE (${state.queue.length}):</small>`;
                // Show first 3 in queue
                state.queue.slice(0, 3).forEach((iq, idx) => {
                    qHTML += `<div class="queue-item"><span>${iq.name}</span> <span onclick="removeFromQueue(${idx})" style="cursor:pointer; color:red">×</span></div>`;
                });
                if (state.queue.length > 3) qHTML += `<small>...and ${state.queue.length - 3} more</small>`;
                qHTML += `</div>`;
            }
            document.getElementById('queue-display').innerHTML = qHTML;
        }

        function buy(res, unitPrice) {
            let total = unitPrice * state.selectedQty;
            if (state.gold >= total) {
                state.gold -= total;
                state.resources[res] += state.selectedQty;
                updateUI();
            }
        }

        function addToQueue(id) {
            const r = DATA.recipes.find(x => x.id === id);
            // Check if we can afford at least one to start? 
            // No, let's allow queueing and check resources at the moment of forging.
            for (let i = 0; i < state.selectedQty; i++) {
                state.queue.push({ ...r });
            }
            if (!state.isCrafting) processQueue();
            updateUI();
        }

        function removeFromQueue(idx) {
            state.queue.splice(idx, 1);
            updateUI();
        }

        function processQueue() {
            if (state.queue.length === 0) {
                state.isCrafting = false;
                document.getElementById('active-item-name').innerText = "Forge Idle";
                document.getElementById('forge-fill').style.width = "0%";
                updateUI();
                return;
            }

            const nextItem = state.queue[0];

            // Resource Check
            for (let mat in nextItem.cost) {
                if (state.resources[mat] < nextItem.cost[mat]) {
                    log(`Paused: Missing ${mat} for ${nextItem.name}`);
                    state.isCrafting = false;
                    return; // Stop until resources added or manual restart
                }
            }

            // Consume
            for (let mat in nextItem.cost) state.resources[mat] -= nextItem.cost[mat];

            state.isCrafting = true;
            state.queue.shift(); // Remove from queue
            document.getElementById('active-item-name').innerText = `Forging: ${nextItem.name}`;

            let start = null;
            let duration = nextItem.time / (1 + (state.level * 0.15));

            function step(ts) {
                if (!start) start = ts;
                let elapsed = ts - start;
                let pc = Math.min((elapsed / duration) * 100, 100);
                document.getElementById('forge-fill').style.width = pc + "%";
                if (elapsed < duration) {
                    requestAnimationFrame(step);
                } else {
                    finishCraft(nextItem);
                }
            }
            requestAnimationFrame(step);
            updateUI();
        }

        function finishCraft(item) {
            const roll = Math.random() * state.level;
            let q = "Common";
            if (roll > 8) q = "Masterwork";
            else if (roll > 4) q = "Fine";

            state.inventory.push({ ...item, q: q });
            addXp(item.xp);
            processQueue(); // Automatically start next
        }

        function sellGrouped(id, quality, unitPrice) {
            const qtyToSell = state.selectedQty;
            let sold = 0;
            // Loop backwards to remove items
            for (let i = state.inventory.length - 1; i >= 0; i--) {
                if (state.inventory[i].id === id && state.inventory[i].q === quality && sold < qtyToSell) {
                    state.inventory.splice(i, 1);
                    state.gold += unitPrice;
                    sold++;
                }
            }
            updateUI();
        }

        function addXp(v) {
            state.xp += v;
            if (state.xp >= state.nextLevelXp) {
                state.level++;
                state.xp = 0;
                state.nextLevelXp = Math.floor(state.nextLevelXp * 1.8);
                log(`Rank Up! Level ${state.level} smith.`);
            }
        }

        function log(m) { document.getElementById('log').innerText = m; }

        // Market shifts
        setInterval(() => {
            state.marketModifiers.iron = 0.5 + Math.random() * 1;
            state.marketModifiers.sell = 0.7 + Math.random() * 0.7;
            updateUI();
        }, 15000);

        updateUI();
    </script>
</body>

</html>
