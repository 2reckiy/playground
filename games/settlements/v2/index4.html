<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settlement - Grid Control</title>
    <style>
        :root {
            --bg-panel: rgba(255, 255, 255, 0.95);
            --border-color: #d1d8e0;
            --text-main: #2d3436;
            --accent: #0984e3;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #dfe4ea;
            /* Darker background to see map edges */
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-main);
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #stockpile {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-panel);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        #sidebar {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 280px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.05);
        }

        #sidebar.minimized {
            transform: translateX(240px);
        }

        #toggle-sidebar {
            width: 40px;
            height: 40px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 4px 0 0 4px;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        #settler-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .settler-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .settler-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: #dfe6e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .settler-name {
            font-weight: bold;
            flex-grow: 1;
        }

        .stat-row {
            margin-bottom: 4px;
        }

        .progress-bg {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 2px;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .role-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            color: white;
            text-transform: uppercase;
        }

        .role-food {
            background: #27ae60;
        }

        .role-wood {
            background: #7f8c8d;
        }
    </style>
</head>

<body>

    <div id="stockpile">
        <div style="font-size: 0.7rem; color: #636e72; text-transform: uppercase;">Stockpile</div>
        🍎 Food: <span id="ui-food">0</span> | 🪵 Wood: <span id="ui-wood">0</span>
        <div style="font-size: 0.6rem; margin-top:5px; color:#a4b0be">Grid Size: <span id="ui-grid-size"></span></div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <button id="toggle-sidebar">◀</button>
            <span style="margin-left: 10px;">Population</span>
        </div>
        <div id="settler-list"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /** * GRID CONFIGURATION 
         * Edit these values to change map size 
         */
        const GRID_WIDTH = 16;
        const GRID_HEIGHT = 8;
        const TILE_SIZE = 32;

        const NAMES = ["Aria", "Boran", "Cael", "Dara", "Ewan", "Fia", "Garek", "Hilda"];
        const AVATARS = ["👨‍🌾", "👩‍🌾", "🧑‍🌾", "🧔", "👱‍♀️", "👵", "👴"];
        const PALETTE = {
            bg: '#ffffff',
            gridLine: '#bcab9616',
            tiles: {
                'GRASS': '#ffffff3f',
                'FOREST': '#a3b18a3f',
                'BUSH': '#e9edc93f',
            },
            bonfire: '#f973163f',
            settler: '#ff112f'
        };

        class Tile {
            constructor(type) {
                this.type = type;
                this.amount = (type === 'GRASS') ? 0 : 20 + Math.random() * 30;
                this.maxAmount = this.amount;
            }
        }

        class Settler {
            constructor(x, y, role) {
                this.x = x;
                this.y = y;
                this.role = role;
                this.name = NAMES[Math.floor(Math.random() * NAMES.length)] + " " + (Math.floor(Math.random() * 99));
                this.avatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
                this.type = 'settler';
                this.speed = Math.random() * 0.7;
                this.strength = 5 + Math.random() * 5;
                this.attentiveness = 0.2 + Math.random() * 0.4;
                this.hunger = 0;
                this.fatigue = 0;
                this.inventory = 0;
                this.state = 'searching';
                this.velocity = { x: 0, y: 0 };
                this.domElement = this.createUI();
            }

            update(engine) {
                this.hunger += 0.015;
                if (this.state !== 'resting') this.fatigue += 0.01;

                if ((this.hunger > 85 || this.fatigue > 90) && this.state !== 'resting') this.state = 'returning';

                switch (this.state) {
                    case 'searching': this.wander(engine); break;
                    case 'gathering': this.work(engine); break;
                    case 'returning':
                        this.moveTowards(engine.bonfirePos.x, engine.bonfirePos.y);
                        if (this.isNear(engine.bonfirePos)) {
                            engine.resources[this.role] += Math.floor(this.inventory);
                            this.inventory = 0;
                            if (this.hunger > 40 && engine.resources.food > 0) { engine.resources.food--; this.hunger = 0; }
                            if (this.fatigue > 60) this.state = 'resting';
                            else if (this.hunger < 40) this.state = 'searching';
                        }
                        break;
                    case 'resting':
                        this.fatigue -= 0.15;
                        if (this.fatigue <= 0) { this.fatigue = 0; this.state = 'searching'; }
                        break;
                }
                this.updateUI();
            }

            wander(engine) {
                if (Math.random() < 0.02) {
                    const angle = Math.random() * Math.PI * 2;
                    this.velocity.x = Math.cos(angle) * this.speed;
                    this.velocity.y = Math.sin(angle) * this.speed;
                }

                // Bounds checking for specific grid area
                const mapW = GRID_WIDTH * TILE_SIZE;
                const mapH = GRID_HEIGHT * TILE_SIZE;
                const nextX = engine.offsetX + this.x + this.velocity.x;
                const nextY = engine.offsetY + this.y + this.velocity.y;

                if (nextX < engine.offsetX || nextX > engine.offsetX + mapW) this.velocity.x *= -1;
                if (nextY < engine.offsetY || nextY > engine.offsetY + mapH) this.velocity.y *= -1;

                this.x += this.velocity.x;
                this.y += this.velocity.y;

                const gx = Math.floor((this.x) / TILE_SIZE);
                const gy = Math.floor((this.y) / TILE_SIZE);
                const tile = engine.getTile(gx, gy);

                const target = this.role === 'food' ? 'BUSH' : 'FOREST';
                if (tile && tile.type === target && tile.amount > 0) this.state = 'gathering';
            }

            work(engine) {
                const gx = Math.floor((this.x) / TILE_SIZE);
                const gy = Math.floor((this.y) / TILE_SIZE);
                const tile = engine.getTile(gx, gy);
                if (tile && tile.amount > 0) {
                    const harvest = 0.01 * this.attentiveness;
                    tile.amount -= harvest;
                    this.inventory += harvest;
                    this.fatigue += 0.04;
                    if (this.inventory >= this.strength) this.state = 'returning';
                } else { this.state = 'searching'; }
            }

            moveTowards(tx, ty) {
                const dx = tx - this.x;
                const dy = ty - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 5) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }

            isNear(pos) { return Math.abs(this.x - pos.x) < 20 && Math.abs(this.y - pos.y) < 20; }

            createUI() {
                const div = document.createElement('div');
                div.className = 'settler-card';
                div.innerHTML = `
                    <div class="settler-header">
                        <div class="avatar">${this.avatar}</div>
                        <div class="settler-name">${this.name}</div>
                        <span class="role-badge role-${this.role === 'food' ? 'food' : 'wood'}">${this.role}</span>
                    </div>
                     <div class="stat-row">
                        <div style="display:flex; justify-content:space-between; font-size: 0.7rem;"><span>Strength</span><span class="val-strength">0</span></div>
                        <div style="display:flex; justify-content:space-between; font-size: 0.7rem;"><span>Speed</span><span class="val-speed">0</span></div>
                    </div>
                    <div class="stat-row">
                        <div style="display:flex; justify-content:space-between; font-size: 0.7rem;"><span>Hunger</span><span class="val-hunger">0%</span></div>
                        <div class="progress-bg"><div class="progress-fill fill-hunger" style="background:#e67e22; width:0%"></div></div>
                    </div>
                    <div class="stat-row">
                        <div style="display:flex; justify-content:space-between; font-size: 0.7rem;"><span>Fatigue</span><span class="val-fatigue">0%</span></div>
                        <div class="progress-bg"><div class="progress-fill fill-fatigue" style="background:#9b59b6; width:0%"></div></div>
                    </div>
                    <div style="font-size: 0.7rem; color: #636e72; margin-top:5px;">State: <span class="val-state">Searching</span></div>
                `;
                document.getElementById('settler-list').appendChild(div);
                return div;
            }

            updateUI() {
                this.domElement.querySelector('.val-strength').innerText = `${Math.floor(this.strength)}`;
                this.domElement.querySelector('.val-speed').innerText = `${this.speed.toFixed(2)}`;

                this.domElement.querySelector('.fill-hunger').style.width = `${Math.min(100, this.hunger)}%`;
                this.domElement.querySelector('.val-hunger').innerText = `${Math.floor(this.hunger)}%`;
                this.domElement.querySelector('.fill-fatigue').style.width = `${Math.min(100, this.fatigue)}%`;
                this.domElement.querySelector('.val-fatigue').innerText = `${Math.floor(this.fatigue)}%`;
                this.domElement.querySelector('.val-state').innerText = this.state.charAt(0).toUpperCase() + this.state.slice(1);
            }
        }

        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.entities = [];
                this.grid = [];
                this.resources = { food: 10, brushwood: 0 };
                this.bonfirePlaced = false;
                this.bonfirePos = { x: 0, y: 0 };

                // Centering calculations
                this.offsetX = 0;
                this.offsetY = 0;

                const btn = document.getElementById('toggle-sidebar');
                btn.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('minimized');
                    btn.innerText = document.getElementById('sidebar').classList.contains('minimized') ? '▶' : '◀';
                });

                this.init();
            }

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.generateWorld();
                document.getElementById('ui-grid-size').innerText = `${GRID_WIDTH} x ${GRID_HEIGHT}`;
                this.canvas.addEventListener('click', (e) => this.handleInput(e));
                requestAnimationFrame(() => this.loop());
            }

            resize() {
                const dpr = window.devicePixelRatio || 1;
                // Set logical size (CSS)
                this.canvas.style.width = window.innerWidth + 'px';
                this.canvas.style.height = window.innerHeight + 'px';

                // Set actual internal resolution (Physical pixels)
                this.canvas.width = window.innerWidth * dpr;
                this.canvas.height = window.innerHeight * dpr;

                // Scale all drawing operations by the dpr
                this.ctx.scale(dpr, dpr);

                // Calculate offsets (Logical)
                this.offsetX = Math.floor((window.innerWidth - GRID_WIDTH * TILE_SIZE) / 2);
                this.offsetY = Math.floor((window.innerHeight - GRID_HEIGHT * TILE_SIZE) / 2);

                // Disable image smoothing for a crisp, pixel-art look
                this.ctx.imageSmoothingEnabled = false;
            }

            generateWorld() {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    this.grid[x] = [];
                    for (let y = 0; y < GRID_HEIGHT; y++) {
                        const r = Math.random();
                        let type = 'GRASS';
                        if (r > 0.90) type = 'FOREST';
                        else if (r > 0.85) type = 'BUSH';
                        this.grid[x][y] = new Tile(type);
                    }
                }
            }

            getTile(x, y) { return (this.grid[x] && this.grid[x][y]) ? this.grid[x][y] : null; }

            handleInput(e) {
                // Ensure click is inside map bounds
                if (e.clientX < this.offsetX || e.clientX > this.offsetX + (GRID_WIDTH * TILE_SIZE) ||
                    e.clientY < this.offsetY || e.clientY > this.offsetY + (GRID_HEIGHT * TILE_SIZE)) {
                    return;
                }

                if (!this.bonfirePlaced) {
                    const gx = Math.floor((e.clientX - this.offsetX) / TILE_SIZE);
                    const gy = Math.floor((e.clientY - this.offsetY) / TILE_SIZE);

                    // Formula: (GridIndex * Size) + (Half Size)
                    this.bonfirePos = {
                        x: Math.floor(gx * TILE_SIZE + TILE_SIZE / 2),
                        y: Math.floor(gy * TILE_SIZE + TILE_SIZE / 2)
                    };
                    this.bonfirePlaced = true;
                    for (let i = 0; i < 4; i++) {
                        this.entities.push(new Settler(this.bonfirePos.x, this.bonfirePos.y, i % 2 === 0 ? 'food' : 'brushwood'));
                    }
                }
            }

            update() {
                this.entities.forEach(ent => ent.update(this));
                document.getElementById('ui-food').innerText = Math.floor(this.resources.food);
                document.getElementById('ui-wood').innerText = Math.floor(this.resources.brushwood);
            }

            render() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                Renderer.drawWorld(this.ctx, this.grid, this.offsetX, this.offsetY);
                if (this.bonfirePlaced) Renderer.drawBonfire(this.ctx, this.bonfirePos, this.offsetX, this.offsetY);
                this.entities.forEach(ent => Renderer.drawSettler(this.ctx, ent, this.offsetX, this.offsetY));
            }

            loop() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.loop());
            }
        }

        class Renderer {
            static drawWorld(ctx, grid, ox, oy) {
                ctx.save();
                ctx.fillStyle = PALETTE.bg;
                ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);

                for (let x = 0; x < GRID_WIDTH; x++) {
                    for (let y = 0; y < GRID_HEIGHT; y++) {
                        const tile = grid[x][y];

                        ctx.fillStyle = PALETTE.tiles[tile.type];
                        ctx.fillRect(Math.floor(ox + (x * TILE_SIZE)), Math.floor(oy + (y * TILE_SIZE)), TILE_SIZE, TILE_SIZE);

                        ctx.strokeStyle = PALETTE.gridLine;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(Math.floor(ox + (x * TILE_SIZE)), Math.floor(oy + (y * TILE_SIZE)), TILE_SIZE, TILE_SIZE);
                    }
                }
                ctx.restore();
            }
            static drawBonfire(ctx, pos, ox, oy) {
                const tileMid = TILE_SIZE / 2;
                ctx.save();
                ctx.fillStyle = PALETTE.bonfire;
                ctx.fillRect(ox + pos.x - tileMid, oy + pos.y - tileMid, TILE_SIZE, TILE_SIZE);

                ctx.font = `${TILE_SIZE * 0.7}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = "#000000";
                ctx.fillText('🔥', ox + pos.x, oy + pos.y + tileMid);

                ctx.restore();
            }
            static drawSettler(ctx, ent, ox, oy) {
                ctx.save();
                ctx.fillStyle = ent.role === 'food' ? '#27ae60' : '#7f8c8d';
                ctx.beginPath();
                ctx.arc(ox + ent.x, oy + ent.y, TILE_SIZE * 0.1, 0, Math.PI * 2);
                ctx.fill();
                if (ent.inventory > 1) {
                    ctx.fillStyle = '#2d3436';
                    ctx.beginPath(); ctx.arc(ox + ent.x + 4, oy + ent.y - 4, 2, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }

        new GameEngine();
    </script>
</body>

</html>
