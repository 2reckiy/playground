<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry of War Prototype</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --primary: #00f2ff;
            --secondary: #ff0055;
            --panel: #1a1a20;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #ui-top {
            padding: 15px;
            background: var(--panel);
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid #333;
        }

        .stat {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .mana {
            color: var(--primary);
        }

        #game-container {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle, #15151a 0%, #0a0a0c 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #controls {
            padding: 20px;
            background: var(--panel);
            display: flex;
            gap: 20px;
            justify-content: center;
            border-top: 2px solid #333;
        }

        .lane-btn {
            padding: 10px 20px;
            background: #333;
            border: 1px solid var(--primary);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
        }

        .lane-btn:hover {
            background: var(--primary);
            color: black;
        }

        .lane-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .unit-selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body>

    <div id="ui-top">
        <div class="stat">Святиня Гравця: <span id="player-hp">1000</span></div>
        <div class="stat mana">Енергія: <span id="mana-val">0</span></div>
        <div class="stat">Святиня Ворога: <span id="enemy-hp">1000</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controls">
        <div class="unit-selector">
            <span>Витрати: 20 енергії</span>
            <div>
                <button class="lane-btn" onclick="spawnUnit('top')">Top Lane</button>
                <button class="lane-btn" onclick="spawnUnit('mid')">Mid Lane</button>
                <button class="lane-btn" onclick="spawnUnit('bot')">Bot Lane</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Стан гри
        let state = {
            playerHP: 1000,
            enemyHP: 1000,
            mana: 0,
            units: [],
            lastEnemySpawn: 0
        };

        const CONFIG = {
            unitCost: 20,
            manaRate: 0.1,
            enemySpawnRate: 3000, // 3 секунди
            unitSpeed: 1.5,
            unitSize: 8
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Координати ключових точок
        const getPoints = () => ({
            pBase: { x: 50, y: canvas.height - 50 },
            eBase: { x: canvas.width - 50, y: 50 },
            topCorner: { x: 50, y: 50 },
            botCorner: { x: canvas.width - 50, y: canvas.height - 50 }
        });

        class Unit {
            constructor(owner, lane) {
                this.owner = owner; // 'player' або 'enemy'
                this.lane = lane;   // 'top', 'mid', 'bot'
                this.hp = 50;
                this.atk = 10;
                this.progress = 0; // 0 to 1
                this.isDead = false;
                this.color = owner === 'player' ? '#00f2ff' : '#ff0055';
            }

            getPosition() {
                const p = getPoints();
                const start = this.owner === 'player' ? p.pBase : p.eBase;
                const end = this.owner === 'player' ? p.eBase : p.pBase;

                let t = this.progress;

                if (this.lane === 'mid') {
                    return {
                        x: start.x + (end.x - start.x) * t,
                        y: start.y + (end.y - start.y) * t
                    };
                } else if (this.lane === 'top') {
                    const corner = p.topCorner;
                    if (t < 0.5) {
                        let subT = t * 2;
                        return { x: start.x + (corner.x - start.x) * subT, y: start.y + (corner.y - start.y) * subT };
                    } else {
                        let subT = (t - 0.5) * 2;
                        return { x: corner.x + (end.x - corner.x) * subT, y: corner.y + (end.y - corner.y) * subT };
                    }
                } else { // bot
                    const corner = p.botCorner;
                    if (t < 0.5) {
                        let subT = t * 2;
                        return { x: start.x + (corner.x - start.x) * subT, y: start.y + (corner.y - start.y) * subT };
                    } else {
                        let subT = (t - 0.5) * 2;
                        return { x: corner.x + (end.x - corner.x) * subT, y: corner.y + (end.y - corner.y) * subT };
                    }
                }
            }

            update() {
                // Перевірка зіткнень з ворогами на тій же лінії
                let blocked = false;
                state.units.forEach(other => {
                    if (other.owner !== this.owner && other.lane === this.lane && !other.isDead) {
                        const pos1 = this.getPosition();
                        const pos2 = other.getPosition();
                        const dist = Math.hypot(pos1.x - pos2.x, pos1.y - pos2.y);

                        if (dist < 20) {
                            blocked = true;
                            other.hp -= 0.5; // Бій
                            if (other.hp <= 0) other.isDead = true;
                        }
                    }
                });

                if (!blocked) {
                    this.progress += 0.002 * CONFIG.unitSpeed;
                }

                if (this.progress >= 1) {
                    if (this.owner === 'player') state.enemyHP -= this.atk;
                    else state.playerHP -= this.atk;
                    this.isDead = true;
                }
            }

            draw() {
                const pos = this.getPosition();
                ctx.fillStyle = this.color;
                ctx.beginPath();
                if (this.owner === 'player') {
                    ctx.arc(pos.x, pos.y, CONFIG.unitSize, 0, Math.PI * 2);
                } else {
                    ctx.rect(pos.x - 6, pos.y - 6, 12, 12);
                }
                ctx.fill();
                // HP Bar
                ctx.fillStyle = "red";
                ctx.fillRect(pos.x - 10, pos.y - 15, 20, 3);
                ctx.fillStyle = "lime";
                ctx.fillRect(pos.x - 10, pos.y - 15, (this.hp / 50) * 20, 3);
            }
        }

        function spawnUnit(lane) {
            if (state.mana >= CONFIG.unitCost) {
                state.mana -= CONFIG.unitCost;
                state.units.push(new Unit('player', lane));
            }
        }

        function enemyAI(time) {
            if (time - state.lastEnemySpawn > CONFIG.enemySpawnRate) {
                const lanes = ['top', 'mid', 'bot'];
                const randomLane = lanes[Math.floor(Math.random() * 3)];
                state.units.push(new Unit('enemy', randomLane));
                state.lastEnemySpawn = time;
            }
        }

        function drawLanes() {
            const p = getPoints();
            ctx.strokeStyle = '#333';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;

            // Mid
            ctx.beginPath(); ctx.moveTo(p.pBase.x, p.pBase.y); ctx.lineTo(p.eBase.x, p.eBase.y); ctx.stroke();
            // Top
            ctx.beginPath(); ctx.moveTo(p.pBase.x, p.pBase.y); ctx.lineTo(p.topCorner.x, p.topCorner.y);
            ctx.lineTo(p.eBase.x, p.eBase.y); ctx.stroke();
            // Bot
            ctx.beginPath(); ctx.moveTo(p.pBase.x, p.pBase.y); ctx.lineTo(p.botCorner.x, p.botCorner.y);
            ctx.lineTo(p.eBase.x, p.eBase.y); ctx.stroke();

            ctx.setLineDash([]);

            // Bases
            ctx.fillStyle = varColor('--primary');
            ctx.beginPath(); ctx.arc(p.pBase.x, p.pBase.y, 30, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = varColor('--secondary');
            ctx.fillRect(p.eBase.x - 30, p.eBase.y - 30, 60, 60);
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function loop(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            state.mana += CONFIG.manaRate;
            document.getElementById('mana-val').innerText = Math.floor(state.mana);
            document.getElementById('player-hp').innerText = Math.floor(state.playerHP);
            document.getElementById('enemy-hp').innerText = Math.floor(state.enemyHP);

            drawLanes();
            enemyAI(time);

            state.units = state.units.filter(u => !u.isDead);
            state.units.forEach(u => {
                u.update();
                u.draw();
            });

            if (state.playerHP <= 0) alert("Ви програли!");
            else if (state.enemyHP <= 0) alert("Ви перемогли!");
            else requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>

</body>

</html>
