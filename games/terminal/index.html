<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mystery Terminal</title>
  <style>
    body {
      background: #0d0d0d;
      color: #00ff99;
      font-family: monospace;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #log {
      flex-grow: 1;
      padding: 1rem;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    #input-wrapper {
      padding: 0.5rem 1rem;
      border-top: 1px solid #00ff99;
    }

    input {
      width: 100%;
      background: #0d0d0d;
      color: #00ff99;
      border: none;
      font-family: monospace;
      font-size: 1rem;
      outline: none;
    }

    .log-entry {
      margin-bottom: 0.5rem;
    }

    .system {
      color: #00ccff;
    }

    .error {
      color: #ff0066;
    }

    /* width */
    ::-webkit-scrollbar {
      width: 10px;
    }

    /* Track */
    ::-webkit-scrollbar-track {
      background: #0d0d0d;
    }

    /* Handle */
    ::-webkit-scrollbar-thumb {
      background: #353535;
      border-radius: 10px;
    }

    /* Handle on hover */
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div id="log"></div>
  <div id="input-wrapper">
    <input id="command-input" type="text" autocomplete="off" placeholder="> Type a command..." />
  </div>

  <script>
    const log = document.getElementById('log');
    const input = document.getElementById('command-input');

    function print(text, className = '') {
      const div = document.createElement('div');
      div.textContent = text;
      div.className = `log-entry ${className}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function parseCommand(cmd) {
      const chunks = cmd.split(' ');
      if (chunks.length === 0) return { command: cmd.trim().toLowerCase(), args: '' };

      const command = chunks[0].trim().toLowerCase();
      const args = chunks.slice(1).join(' ').trim();
      return { command, args };
    }

    async function runCommand(cmd) {
      const { command, args } = parseCommand(cmd);
      print('> ' + cmd);

      if (command === 'help') {
        print('Available commands:\n  help\n  connect\n  use <token>');
      } else if (command === 'connect') {
        // print('Connecting to remote node...', 'system');
        // // Fake "network call" — inspect DevTools > Network to find secret token
        // const res = await fetch('/api/handshake');
        // const data = await res.json();
        // print('Connected. Analyze network data.', 'system');
        print('Connecting to remote node...', 'system');
        const res = await fetch('token.json'); // real file
        const data = await res.json();
        print('Connected. Analyze network data.', 'system');
      } else if (command === 'use') {
        if (!args) {
          print('Usage: use <token>', 'error');
          return;
        }
        print('Using token: ' + args, 'system');
        // Simulate token validation
        // In a real scenario, you would validate the token against a backend service
        const token = args;
        if (token === 'TOKEN123') {
          print('Access granted. Welcome, operator.', 'system');
        } else {
          print('Invalid token.', 'error');
        }
      } else if (command === '') {
        // do nothing
      } else {
        print('Unknown command. Try "help".', 'error');
      }
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        runCommand(input.value);
        input.value = '';
      }
    });

    // Fake backend handler — intercept fetch for "/api/handshake"
    const originalFetch = window.fetch;
    window.fetch = async (url, options) => {
      if (url === '/api/handshake') {
        return new Response(JSON.stringify({
          token: 'TOKEN123',
          message: 'Shh. This token is your key: TOKEN123'
        }), {
          headers: { 'Content-Type': 'application/json' }
        });
      }
      return originalFetch(url, options);
    };

    print('Welcome to the terminal. Type "help" to begin.', 'system');
  </script>
</body>
</html>
