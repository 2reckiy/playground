<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinding Efficiency Lab</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #020205;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .hud {
            position: absolute;
            top: 15px;
            width: 45%;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            border-top: 3px solid;
            color: white;
            pointer-events: none;
        }

        #hud-a {
            left: 2.5%;
            border-color: #00ffcc;
        }

        #hud-b {
            right: 2.5%;
            border-color: #ff00ff;
        }

        .stat {
            font-size: 14px;
            margin: 2px 0;
        }

        .val {
            color: #fff;
            font-weight: bold;
        }

        #speed-ctrl {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #00ffcc;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #333;
        }
    </style>
</head>

<body>
    <div id="hud-a" class="hud">
        <div style="color:#00ffcc; font-weight:bold;">A* (MANHATTAN)</div>
        <div class="stat">Cells Explored: <span id="count-a" class="val">0</span></div>
    </div>
    <div id="hud-b" class="hud">
        <div style="color:#ff00ff; font-weight:bold;">BFS (BREADTH-FIRST)</div>
        <div class="stat">Cells Explored: <span id="count-b" class="val">0</span></div>
    </div>
    <div id="speed-ctrl">
        SPEED: <input type="range" id="speed" min="1" max="100" value="15">
    </div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const speedSlider = document.getElementById('speed');
        const countA = document.getElementById('count-a');
        const countB = document.getElementById('count-b');

        let cols, rows, cellSize = 16;
        let mazes = [], solvers = [];

        function setup() {

            cellSize = Math.max(10, Math.min(16, Math.floor(Math.min(window.innerWidth, window.innerHeight) / 20)));
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const halfW = canvas.width / 2;
            cols = Math.floor((halfW - 60) / cellSize);
            rows = Math.floor((canvas.height - 140) / cellSize);

            const wallsData = generateMazeLayout();
            mazes = [
                { x: 30, grid: createGrid(wallsData), type: 'astar' },
                { x: halfW + 30, grid: createGrid(wallsData), type: 'bfs' }
            ];
            solvers = mazes.map(m => initSolver(m));
        }

        function createGrid(data) {
            return data.map(d => ({ ...d, open: false, closed: false, parent: null, g: 0, f: 0 }));
        }

        function generateMazeLayout() {
            let temp = [];
            for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) temp.push({ c, r, walls: [true, true, true, true], v: false });
            let stack = [], curr = temp[0]; curr.v = true;
            while (true) {
                let neighbors = [];
                [[0, -1, 0, 2], [1, 0, 1, 3], [0, 1, 2, 0], [-1, 0, 3, 1]].forEach(d => {
                    let nc = curr.c + d[0], nr = curr.r + d[1];
                    if (nc >= 0 && nr >= 0 && nc < cols && nr < rows) {
                        let n = temp[nc + nr * cols];
                        if (!n.v) neighbors.push({ n, a: d[2], b: d[3] });
                    }
                });
                if (neighbors.length > 0) {
                    let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    next.n.v = true; curr.walls[next.a] = false; next.n.walls[next.b] = false;
                    stack.push(curr); curr = next.n;
                } else if (stack.length > 0) curr = stack.pop(); else break;
            }
            return temp;
        }

        function initSolver(m) {
            const start = m.grid[0];
            start.open = true;
            return {
                type: m.type,
                set: [start],
                visited: new Set([start]),
                path: [],
                done: false,
                counter: 0
            };
        }

        function step(m, s) {
            if (s.done || s.set.length === 0) return;
            const end = m.grid[m.grid.length - 1];

            let curr;
            if (s.type === 'astar') {
                let win = 0;
                for (let i = 0; i < s.set.length; i++) if (s.set[i].f < s.set[win].f) win = i;
                curr = s.set.splice(win, 1)[0];
            } else {
                curr = s.set.shift();
            }

            if (curr === end) {
                let t = curr; while (t) { s.path.push(t); t = t.parent; }
                s.done = true; return;
            }

            s.counter++;
            curr.closed = true;

            [[0, -1, 0], [1, 0, 1], [0, 1, 2], [-1, 0, 3]].forEach(d => {
                if (!curr.walls[d[2]]) {
                    let n = m.grid[(curr.c + d[0]) + (curr.r + d[1]) * cols];
                    if (s.type === 'astar') {
                        if (!s.visited.has(n)) {
                            n.g = curr.g + 1;
                            n.f = n.g + (Math.abs(n.c - end.c) + Math.abs(n.r - end.r));
                            n.parent = curr; n.open = true;
                            s.visited.add(n); s.set.push(n);
                        }
                    } else {
                        if (!s.visited.has(n)) {
                            n.parent = curr; n.open = true;
                            s.visited.add(n); s.set.push(n);
                        }
                    }
                }
            });
        }

        function render() {
            ctx.fillStyle = "#020205"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < speedSlider.value; i++) {
                mazes.forEach((m, idx) => step(m, solvers[idx]));
            }
            countA.innerText = solvers[0].counter;
            countB.innerText = solvers[1].counter;

            mazes.forEach((m, idx) => {
                const s = solvers[idx];
                ctx.save(); ctx.translate(m.x, 90);
                m.grid.forEach(c => {
                    let x = c.c * cellSize, y = c.r * cellSize;
                    if (c.open) {
                        ctx.fillStyle = (idx === 0) ? "rgba(0,255,204,0.1)" : "rgba(255,0,255,0.08)";
                        ctx.fillRect(x, y, cellSize, cellSize);
                    }
                    if (c.closed) {
                        ctx.fillStyle = (idx === 0) ? "rgba(0,255,204,0.2)" : "rgba(255,0,255,0.15)";
                        ctx.fillRect(x, y, cellSize, cellSize);
                    }
                    ctx.strokeStyle = "#fff"; ctx.beginPath();
                    if (c.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); }
                    if (c.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); }
                    if (c.walls[2]) { ctx.moveTo(x + cellSize, y + cellSize); ctx.lineTo(x, y + cellSize); }
                    if (c.walls[3]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x, y); }
                    ctx.stroke();
                });
                if (s.path.length) {
                    ctx.strokeStyle = (idx === 0) ? "#00ffcc" : "#ff00ff";
                    ctx.lineWidth = 3; ctx.beginPath();
                    s.path.forEach((p, i) => {
                        let px = p.c * cellSize + cellSize / 2, py = p.r * cellSize + cellSize / 2;
                        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                    });
                    ctx.stroke();
                }
                ctx.restore();
            });

            if (solvers.every(s => s.done)) {
                setTimeout(() => {
                    setup();
                    requestAnimationFrame(render);
                }, 5000);
            }
            else requestAnimationFrame(render);
        }

        window.addEventListener('resize', setup);
        setup();
        render();
    </script>
</body>

</html>
