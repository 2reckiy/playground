<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pro-Miner: Mouse Selection</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #020202;
        font-family: "Courier New", monospace;
        color: #0f0;
      }
      canvas {
        display: block;
        cursor: crosshair;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        pointer-events: none;
        background: rgba(0, 15, 0, 0.9);
        padding: 12px;
        border: 1px solid #0f0;
        width: 220px;
      }
      .res-row {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        margin-bottom: 2px;
      }
      #mining-status {
        visibility: hidden;
        margin-top: 10px;
      }
      .progress-bar {
        width: 100%;
        height: 6px;
        border: 1px solid #0f0;
        background: #000;
      }
      #mine-fill {
        width: 0%;
        height: 100%;
        background: #0f0;
      }
      .btn-group {
        pointer-events: auto;
        margin-top: 10px;
        display: flex;
        gap: 5px;
      }
      button {
        background: #040;
        color: #0f0;
        border: 1px solid #0f0;
        cursor: pointer;
        font-family: monospace;
        font-size: 10px;
        padding: 4px;
      }
      button:hover {
        background: #0f0;
        color: #000;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div
        style="
          font-size: 14px;
          border-bottom: 1px solid #0f0;
          margin-bottom: 8px;
        ">
        PHASE <span id="ui-phase">1</span>
      </div>
      <div id="ui-inventory"></div>
      <div
        style="margin-top: 8px; border-top: 1px solid #040; padding-top: 4px">
        <b>CREDITS:</b> $<span id="ui-credits">0</span>
      </div>
      <div id="mining-status">
        <small id="status-text">DRILLING...</small>
        <div class="progress-bar"><div id="mine-fill"></div></div>
      </div>
      <div class="btn-group">
        <button onclick="engine.saveGame()">SAVE</button>
        <button onclick="engine.resetGame()">WIPE</button>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
      const CHUNK_SIZE = 16;
      const MASK_TYPE = 0b00001111;
      const MASK_MINED = 0b00010000;
      const MASK_EXPLORED = 0b00100000;

      const CONFIG = {
        phases: [
          { id: 0, gridCount: 20, threshold: 100, fog: 4 },
          { id: 1, gridCount: 60, threshold: 2500, fog: 8 },
          { id: 2, gridCount: 150, threshold: 20000, fog: 15 },
        ],
        rocks: [
          { id: 0, key: "soil", color: "#2d1f16", hardness: 5, value: 1 },
          { id: 1, key: "copper", color: "#b87333", hardness: 35, value: 15 },
          { id: 2, key: "iron", color: "#777777", hardness: 80, value: 45 },
          { id: 3, key: "gold", color: "#ffd700", hardness: 250, value: 200 },
        ],
      };

      class World {
        constructor() {
          this.chunks = new Map();
        }
        _getCoords(x, y) {
          return {
            cx: Math.floor(x / CHUNK_SIZE),
            cy: Math.floor(y / CHUNK_SIZE),
            lx: ((x % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE,
            ly: ((y % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE,
          };
        }
        getTile(x, y) {
          const { cx, cy, lx, ly } = this._getCoords(x, y);
          const key = `${cx},${cy}`;
          if (!this.chunks.has(key)) this.generateChunk(cx, cy);
          const byte = this.chunks.get(key)[ly * CHUNK_SIZE + lx];
          const typeId = byte & MASK_TYPE;
          return {
            ...CONFIG.rocks[typeId],
            mined: (byte & MASK_MINED) !== 0,
            explored: (byte & MASK_EXPLORED) !== 0,
          };
        }
        setTileState(x, y, mask) {
          const { cx, cy, lx, ly } = this._getCoords(x, y);
          const key = `${cx},${cy}`;
          if (!this.chunks.has(key)) this.generateChunk(cx, cy);
          this.chunks.get(key)[ly * CHUNK_SIZE + lx] |= mask;
        }
        generateChunk(cx, cy) {
          const data = new Uint8Array(CHUNK_SIZE * CHUNK_SIZE);
          for (let i = 0; i < data.length; i++) {
            const lx = i % CHUNK_SIZE,
              ly = Math.floor(i / CHUNK_SIZE);
            const gx = cx * CHUNK_SIZE + lx,
              gy = cy * CHUNK_SIZE + ly;
            if (gx === 0 && gy === 0) {
              data[i] = 0 | MASK_MINED | MASK_EXPLORED;
              continue;
            }
            const dist = Math.abs(gx) + Math.abs(gy);
            const roll = Math.random();
            let typeId = 0;
            if (dist > 45 && roll < 0.08) typeId = 3;
            else if (dist > 22 && roll < 0.12) typeId = 2;
            else if (dist > 8 && roll < 0.18) typeId = 1;
            data[i] = typeId;
          }
          this.chunks.set(`${cx},${cy}`, data);
        }
        serialize() {
          const obj = {};
          this.chunks.forEach((v, k) => (obj[k] = Array.from(v)));
          return obj;
        }
        deserialize(data) {
          this.chunks.clear();
          for (const k in data) this.chunks.set(k, new Uint8Array(data[k]));
        }
      }

      class GameEngine {
        findPath(start, target) {
          const frontier = [{ x: start.x, y: start.y, priority: 0 }];
          const cameFrom = new Map();
          const costSoFar = new Map();

          const startKey = `${start.x},${start.y}`;
          cameFrom.set(startKey, null);
          costSoFar.set(startKey, 0);

          while (frontier.length > 0) {
            // Get tile with lowest priority (cost + heuristic)
            frontier.sort((a, b) => a.priority - b.priority);
            const current = frontier.shift();

            if (current.x === target.x && current.y === target.y) break;

            const neighbors = [
              { x: current.x + 1, y: current.y },
              { x: current.x - 1, y: current.y },
              { x: current.x, y: current.y + 1 },
              { x: current.x, y: current.y - 1 },
            ];

            for (let next of neighbors) {
              const nextKey = `${next.x},${next.y}`;
              const tile = this.world.getTile(next.x, next.y);

              // A* only traverses MINED tiles or the final TARGET tile
              const isTarget = next.x === target.x && next.y === target.y;
              if (!tile.mined && !isTarget) continue;

              const newCost = costSoFar.get(`${current.x},${current.y}`) + 1;
              if (!costSoFar.has(nextKey) || newCost < costSoFar.get(nextKey)) {
                costSoFar.set(nextKey, newCost);
                // Priority = cost + Manhattan distance
                const priority =
                  newCost +
                  Math.abs(target.x - next.x) +
                  Math.abs(target.y - next.y);
                frontier.push({ ...next, priority });
                cameFrom.set(nextKey, current);
              }
            }
          }

          // Reconstruct path
          let path = [];
          let curr = target;
          while (curr) {
            path.push(curr);
            curr = cameFrom.get(`${curr.x},${curr.y}`);
          }
          path.pop(); // Remove the start tile
          return path.reverse();
        }

        constructor() {
          this.canvas = document.getElementById("gameCanvas");
          this.ctx = this.canvas.getContext("2d");
          this.world = new World();
          this.miner = {
            x: 0,
            y: 0,
            credits: 0,
            inventory: { soil: 0, copper: 0, iron: 0, gold: 0 },
            state: "IDLE",
            progress: 0,
            target: null,
          };
          this.phaseIdx = 0;
          this.tileSize = 1;
          this.camX = 0;
          this.camY = 0;
          this.mousePos = { x: 0, y: 0 };
          this.hoveredTile = { x: 0, y: 0 };

          this.keys = {};

          window.addEventListener("keydown", (e) => (this.keys[e.code] = true));
          window.addEventListener("keyup", (e) => (this.keys[e.code] = false));
          window.addEventListener("resize", () => this.resize());
          this.canvas.addEventListener("mousemove", (e) =>
            this.handleMouseMove(e),
          );
          this.canvas.addEventListener("mousedown", () =>
            this.handleMouseClick(),
          );

          this.loadGame();
          this.resize();
          setInterval(() => this.saveGame(), 30000);
          requestAnimationFrame((t) => this.loop(t));
        }

        handleMouseMove(e) {
          this.mousePos.x = e.clientX;
          this.mousePos.y = e.clientY;

          // Projection: Screen -> World
          const offX = this.canvas.width / 2 - this.camX;
          const offY = this.canvas.height / 2 - this.camY;
          this.hoveredTile.x = Math.floor((e.clientX - offX) / this.tileSize);
          this.hoveredTile.y = Math.floor((e.clientY - offY) / this.tileSize);
        }

        handleMouseClick() {
          const tile = this.world.getTile(
            this.hoveredTile.x,
            this.hoveredTile.y,
          );
          if (tile.explored && !tile.mined) {
            const path = this.findPath(
              { x: this.miner.x, y: this.miner.y },
              { x: this.hoveredTile.x, y: this.hoveredTile.y },
            );
            if (path.length > 0) {
              this.miner.path = path;
              this.miner.target = {
                x: this.hoveredTile.x,
                y: this.hoveredTile.y,
                tile,
              };
              this.miner.state = "PATHING";
            }
          }
        }

        resize() {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
          const phase = CONFIG.phases[this.phaseIdx];
          this.targetTS =
            Math.max(this.canvas.width, this.canvas.height) / phase.gridCount;
        }

        saveGame() {
          const data = {
            miner: this.miner,
            phaseIdx: this.phaseIdx,
            world: this.world.serialize(),
          };
          localStorage.setItem("miner_data", JSON.stringify(data));
        }

        loadGame() {
          const saved = localStorage.getItem("miner_data");
          if (!saved) return;
          const data = JSON.parse(saved);
          this.miner = data.miner;
          this.miner.state = "IDLE"; // Reset state on load to prevent locks
          this.phaseIdx = data.phaseIdx;
          this.world.deserialize(data.world);
        }

        resetGame() {
          localStorage.removeItem("miner_data");
          location.reload();
        }

        update(dt) {
          this.tileSize += (this.targetTS - this.tileSize) * 0.05;

          if (this.miner.state === "MINING") this.doMining(dt);
          else if (this.miner.state === "PATHING") this.doPathing();
          else this.doMove();

          this.revealFog();
          this.checkBase();

          this.camX += (this.miner.x * this.tileSize - this.camX) * 0.1;
          this.camY += (this.miner.y * this.tileSize - this.camY) * 0.1;
        }

        doMove() {
          let dx = 0,
            dy = 0;
          if (this.keys["KeyW"]) dy = -1;
          else if (this.keys["KeyS"]) dy = 1;
          else if (this.keys["KeyA"]) dx = -1;
          else if (this.keys["KeyD"]) dx = 1;

          if (dx || dy) {
            const tx = this.miner.x + dx,
              ty = this.miner.y + dy;
            const tile = this.world.getTile(tx, ty);
            if (tile.mined) {
              this.miner.x = tx;
              this.miner.y = ty;
              this.keys = {};
            } else {
              this.miner.state = "MINING";
              this.miner.target = { x: tx, y: ty, tile };
            }
          }
        }

        doPathing() {
          const m = this.miner;
          if (!m.path || m.path.length === 0) {
            m.state = "IDLE";
            return;
          }

          const nextStep = m.path[0];

          // If next step is the target and it's solid, start mining
          if (nextStep.x === m.target.x && nextStep.y === m.target.y) {
            m.state = "MINING";
            m.path = [];
            return;
          }

          // Move to next tile in path
          m.x = nextStep.x;
          m.y = nextStep.y;
          m.path.shift();
        }

        doMining(dt) {
          const m = this.miner;
          m.progress += 40 * (dt / 1000);
          document.getElementById("mining-status").style.visibility = "visible";
          document.getElementById("mine-fill").style.width =
            Math.min((m.progress / m.target.tile.hardness) * 100, 100) + "%";

          if (m.progress >= m.target.tile.hardness) {
            this.world.setTileState(m.target.x, m.target.y, MASK_MINED);
            m.progress = 0;
            m.inventory[m.target.tile.key]++;
            m.x = m.target.x;
            m.y = m.target.y;
            m.state = "IDLE";
            document.getElementById("mining-status").style.visibility =
              "hidden";
            this.updateUI();
          }
        }

        checkBase() {
          if (this.miner.x === 0 && this.miner.y === 0) {
            let gains = 0;
            for (const rock of CONFIG.rocks) {
              gains += this.miner.inventory[rock.key] * rock.value;
              this.miner.inventory[rock.key] = 0;
            }
            if (gains > 0) {
              this.miner.credits += gains;
              this.updateUI();
              this.checkPhase();
            }
          }
        }

        checkPhase() {
          const p = CONFIG.phases[this.phaseIdx];
          if (
            this.miner.credits >= p.threshold &&
            this.phaseIdx < CONFIG.phases.length - 1
          ) {
            this.phaseIdx++;
            this.resize();
            this.updateUI();
          }
        }

        revealFog() {
          const r = CONFIG.phases[this.phaseIdx].fog;
          for (let x = -r; x <= r; x++) {
            for (let y = -r; y <= r; y++) {
              if (x * x + y * y <= r * r)
                this.world.setTileState(
                  this.miner.x + x,
                  this.miner.y + y,
                  MASK_EXPLORED,
                );
            }
          }
        }

        draw() {
          const { ctx, canvas, tileSize: ts } = this;
          ctx.fillStyle = "#050505";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          const offX = canvas.width / 2 - this.camX,
            offY = canvas.height / 2 - this.camY;

          const startX = Math.floor((this.camX - canvas.width / 2) / ts);
          const endX = Math.ceil((this.camX + canvas.width / 2) / ts);
          const startY = Math.floor((this.camY - canvas.height / 2) / ts);
          const endY = Math.ceil((this.camY + canvas.height / 2) / ts);

          for (let x = startX; x <= endX; x++) {
            for (let y = startY; y <= endY; y++) {
              const tile = this.world.getTile(x, y);
              if (!tile.explored) continue;
              if (x === 0 && y === 0) {
                ctx.fillStyle = "#0044ff";
                ctx.fillRect(x * ts + offX, y * ts + offY, ts, ts);
              } else {
                ctx.fillStyle = tile.mined ? "#111" : tile.color;
                ctx.fillRect(
                  x * ts + offX,
                  y * ts + offY,
                  ts - (ts > 10 ? 1 : 0),
                  ts - (ts > 10 ? 1 : 0),
                );
              }
            }
          }

          // Highlight Hovered Tile
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 2;
          ctx.strokeRect(
            this.hoveredTile.x * ts + offX,
            this.hoveredTile.y * ts + offY,
            ts,
            ts,
          );

          // Miner
          ctx.fillStyle = "#0f0";
          const mS = Math.max(ts * 0.7, 2);
          ctx.fillRect(
            this.miner.x * ts + offX + (ts - mS) / 2,
            this.miner.y * ts + offY + (ts - mS) / 2,
            mS,
            mS,
          );
        }

        updateUI() {
          const inv = document.getElementById("ui-inventory");
          inv.innerHTML = "";
          for (const rock of CONFIG.rocks) {
            const count = this.miner.inventory[rock.key];
            if (count > 0)
              inv.innerHTML += `<div class="res-row"><span>${rock.key.toUpperCase()}</span> <span>${count}</span></div>`;
          }
          document.getElementById("ui-credits").innerText = this.miner.credits;
          document.getElementById("ui-phase").innerText = this.phaseIdx + 1;
        }

        loop(time) {
          const dt = time - (this.lastTime || time);
          this.lastTime = time;
          this.update(dt);
          this.draw();
          requestAnimationFrame((t) => this.loop(t));
        }
      }
      const engine = new GameEngine();
    </script>
  </body>
</html>
