<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pro-Miner Prototype</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #111;
        font-family: "Courier New", monospace;
        color: #0f0;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        pointer-events: none;
        background: rgba(0, 20, 0, 0.8);
        padding: 15px;
        border: 1px solid #0f0;
      }
      .progress-bar {
        width: 100px;
        height: 10px;
        border: 1px solid #0f0;
        margin-top: 5px;
      }
      #mine-fill {
        width: 0%;
        height: 100%;
        background: #0f0;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div>CARGO: <span id="cargo">0</span>/<span id="cap">0</span></div>
      <div>CREDITS: $<span id="credits">0</span></div>
      <div>MINING POWER: <span id="m-pow">0</span></div>
      <div id="mining-status" style="visibility: hidden">
        MINING...
        <div class="progress-bar"><div id="mine-fill"></div></div>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
      /** * DATA-DRIVEN SETTINGS
       */
      const CONFIG = {
        tileSize: 50,
        fogRadius: 4,
        cameraLerp: 0.1, // Smoothness of camera
        cameraDeadzone: 0.25, // 25% margin before camera moves
        rocks: {
          soil: { color: "#443322", hardness: 10, value: 0, rarity: 0 },
          copper: { color: "#b87333", hardness: 40, value: 10, rarity: 0.1 },
          iron: { color: "#777777", hardness: 80, value: 25, rarity: 0.08 },
          gold: { color: "#ffd700", hardness: 200, value: 100, rarity: 0.03 },
        },
      };

      class Miner {
        constructor() {
          this.x = 0; // Grid X
          this.y = 0; // Grid Y
          this.cargo = [];
          this.capacity = 10;
          this.miningPower = 20; // Progress per second
          this.state = "IDLE"; // IDLE or MINING
          this.miningTarget = null;
          this.miningProgress = 0;
        }
      }

      class World {
        constructor() {
          this.chunks = new Map();
        }

        getTile(x, y) {
          const key = `${x},${y}`;
          if (!this.chunks.has(key)) {
            this.chunks.set(key, this.generateTile(x, y));
          }
          return this.chunks.get(key);
        }

        generateTile(x, y) {
          const dist = Math.sqrt(x * x + y * y);
          let type = CONFIG.rocks.soil;

          // Simple depth-based generation
          if (dist > 5) {
            const roll = Math.random();
            if (roll < 0.05) type = CONFIG.rocks.gold;
            else if (roll < 0.15) type = CONFIG.rocks.iron;
            else if (roll < 0.3) type = CONFIG.rocks.copper;
          }

          return { ...type, mined: x === 0 && y === 0, explored: false };
        }
      }

      class GameEngine {
        constructor() {
          this.canvas = document.getElementById("gameCanvas");
          this.ctx = this.canvas.getContext("2d");
          this.miner = new Miner();
          this.world = new World();

          // Camera state (world pixel coordinates)
          this.camX = 0;
          this.camY = 0;

          this.keys = {};
          this.lastTime = 0;

          window.addEventListener("keydown", (e) => (this.keys[e.code] = true));
          window.addEventListener("keyup", (e) => (this.keys[e.code] = false));
          window.addEventListener("resize", () => this.resize());

          this.resize();
          requestAnimationFrame((t) => this.loop(t));
        }

        resize() {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
        }

        update(dt) {
          if (this.miner.state === "MINING") {
            this.continueMining(dt);
          } else {
            this.handleInput();
          }
          this.updateFog();
          this.updateCamera();
        }

        handleInput() {
          let dx = 0,
            dy = 0;
          if (this.keys["KeyW"]) dy = -1;
          else if (this.keys["KeyS"]) dy = 1;
          else if (this.keys["KeyA"]) dx = -1;
          else if (this.keys["KeyD"]) dx = 1;

          if (dx !== 0 || dy !== 0) {
            const tx = this.miner.x + dx;
            const ty = this.miner.y + dy;
            const tile = this.world.getTile(tx, ty);

            if (tile.mined) {
              // Move freely
              this.miner.x = tx;
              this.miner.y = ty;
              this.keys = {}; // Prevent sliding
            } else {
              // Start mining
              if (this.miner.cargo.length < this.miner.capacity) {
                this.miner.state = "MINING";
                this.miner.miningTarget = { x: tx, y: ty, tile };
                this.miner.miningProgress = 0;
              }
            }
          }
        }

        continueMining(dt) {
          const target = this.miner.miningTarget;
          this.miner.miningProgress += this.miner.miningPower * (dt / 1000);

          // UI Update
          const percent =
            (this.miner.miningProgress / target.tile.hardness) * 100;
          document.getElementById("mining-status").style.visibility = "visible";
          document.getElementById("mine-fill").style.width =
            Math.min(percent, 100) + "%";

          if (this.miner.miningProgress >= target.tile.hardness) {
            target.tile.mined = true;
            if (target.tile.value > 0) this.miner.cargo.push(target.tile.value);

            this.miner.x = target.x;
            this.miner.y = target.y;
            this.miner.state = "IDLE";
            document.getElementById("mining-status").style.visibility =
              "hidden";
            this.updateUI();
          }
        }

        updateFog() {
          for (let x = -CONFIG.fogRadius; x <= CONFIG.fogRadius; x++) {
            for (let y = -CONFIG.fogRadius; y <= CONFIG.fogRadius; y++) {
              if (Math.sqrt(x * x + y * y) <= CONFIG.fogRadius) {
                this.world.getTile(
                  this.miner.x + x,
                  this.miner.y + y,
                ).explored = true;
              }
            }
          }
        }

        updateCamera() {
          const ts = CONFIG.tileSize;
          const pX = this.miner.x * ts;
          const pY = this.miner.y * ts;

          // Boundary check: If miner is near edge of screen, push camera
          const marginW = this.canvas.width * CONFIG.cameraDeadzone;
          const marginH = this.canvas.height * CONFIG.cameraDeadzone;

          const screenX = pX - this.camX + this.canvas.width / 2;
          const screenY = pY - this.camY + this.canvas.height / 2;

          if (screenX < marginW) this.camX -= marginW - screenX;
          if (screenX > this.canvas.width - marginW)
            this.camX += screenX - (this.canvas.width - marginW);
          if (screenY < marginH) this.camY -= marginH - screenY;
          if (screenY > this.canvas.height - marginH)
            this.camY += screenY - (this.canvas.height - marginH);
        }

        draw() {
          const { ctx, canvas, miner, world } = this;
          ctx.fillStyle = "#000";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const ts = CONFIG.tileSize;
          const offsetX = canvas.width / 2 - this.camX;
          const offsetY = canvas.height / 2 - this.camY;

          // Draw visible tiles
          const startX = Math.floor((this.camX - canvas.width / 2) / ts);
          const endX = Math.ceil((this.camX + canvas.width / 2) / ts);
          const startY = Math.floor((this.camY - canvas.height / 2) / ts);
          const endY = Math.ceil((this.camY + canvas.height / 2) / ts);

          for (let x = startX; x <= endX; x++) {
            for (let y = startY; y <= endY; y++) {
              const tile = world.getTile(x, y);
              if (!tile.explored) continue;

              ctx.fillStyle = tile.mined ? "#111" : tile.color;
              ctx.fillRect(x * ts + offsetX, y * ts + offsetY, ts - 1, ts - 1);
            }
          }

          // Miner
          ctx.fillStyle = "#0f0";
          ctx.fillRect(
            miner.x * ts + offsetX + 10,
            miner.y * ts + offsetY + 10,
            ts - 20,
            ts - 20,
          );
        }

        updateUI() {
          document.getElementById("cargo").innerText = this.miner.cargo.length;
          document.getElementById("cap").innerText = this.miner.capacity;
          document.getElementById("m-pow").innerText = this.miner.miningPower;
        }

        loop(time) {
          const dt = time - this.lastTime;
          this.lastTime = time;

          this.update(dt);
          this.draw();
          requestAnimationFrame((t) => this.loop(t));
        }
      }

      const engine = new GameEngine();
    </script>
  </body>
</html>
