<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Bullet Heaven Prototype</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <script>
      const PLAYER_SIZE = 12;
      const GRID_SIZE = 80;
      const spatialGrid = new Map();

      function gridKey(x, y) {
        return ((x / GRID_SIZE) | 0) + "," + ((y / GRID_SIZE) | 0);
      }

      function gridClear() {
        spatialGrid.clear();
      }

      function gridInsert(entity) {
        const key = gridKey(entity.x, entity.y);
        let cell = spatialGrid.get(key);
        if (!cell) spatialGrid.set(key, (cell = []));
        cell.push(entity);
      }

      function gridQuery(x, y) {
        const cx = (x / GRID_SIZE) | 0;
        const cy = (y / GRID_SIZE) | 0;
        let results = [];

        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            const cell = spatialGrid.get(cx + dx + "," + (cy + dy));
            if (cell) results.push(...cell);
          }
        }
        return results;
      }

      function triggerLevelUp() {
        gameState = GameState.LEVEL_UP;
        upgradeOptions = generateUpgrades();
      }

      function generateUpgrades() {
        const choices = [];
        const used = new Set();

        while (choices.length < 3) {
          const idx = Math.floor(Math.random() * UPGRADES.length);
          if (used.has(idx)) continue;
          used.add(idx);
          choices.push(UPGRADES[idx]);
        }
        return choices;
      }

      /* =========================
         CANVAS
      ========================= */
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      const PLAYER = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        r: PLAYER_SIZE,

        speed: 260,
        accel: 12,
        stopRadius: 6,

        vx: 0,
        vy: 0,
        tx: null,
        ty: null,

        bulletDamage: 1,
        fireRate: 0.25,
        fireTimer: 0,

        xpRadius: PLAYER_SIZE * 3,

        // HEALTH
        hp: 100,
        maxHp: 100,
        invuln: 0,
        invulnTime: 0.6,

        // LEVEL
        level: 1,
        xp: 0,
        xpNext: 10,
      };

      const UPGRADES = [
        {
          name: "Attack Speed",
          apply() {
            player.fireRate = Math.max(0.05, player.fireRate * 0.85);
          },
        },
        {
          name: "Move Speed",
          apply() {
            player.speed *= 1.15;
          },
        },
        {
          name: "Max HP",
          apply() {
            player.maxHp += 20;
            player.hp += 20;
          },
        },
        {
          name: "Bullet Damage",
          apply() {
            player.bulletDamage = (player.bulletDamage || 1) + 1;
          },
        },
        {
          name: "XP Magnet",
          apply() {
            player.xpRadius = player.xpRadius + 40;
          },
        },
      ];

      /* =========================
         GAME OBJECTS
      ========================= */

      let player = { ...PLAYER };
      const GameState = {
        PLAYING: 0,
        DEAD: 1,
        LEVEL_UP: 2,
      };
      const MAX_ENEMIES = 5000;
      const MAX_BULLETS = 2000;

      const enemies = [];
      const bullets = [];
      const xpOrbs = [];
      let upgradeOptions = [];

      for (let i = 0; i < MAX_ENEMIES; i++) {
        enemies.push({ active: false });
      }
      for (let i = 0; i < MAX_BULLETS; i++) {
        bullets.push({ active: false });
      }

      let gameState = GameState.PLAYING;
      /* =========================
         INPUT
      ========================= */
      canvas.addEventListener("click", (e) => {
        if (gameState === GameState.DEAD) {
          restartGame();
          return;
        }

        if (gameState === GameState.LEVEL_UP) {
          const rect = canvas.getBoundingClientRect();
          const mx = e.clientX - rect.left;
          const my = e.clientY - rect.top;

          const startY = canvas.height / 2 - 60;

          for (let i = 0; i < upgradeOptions.length; i++) {
            const y = startY + i * 60;
            if (
              mx > canvas.width / 2 - 150 &&
              mx < canvas.width / 2 + 150 &&
              my > y - 20 &&
              my < y + 20
            ) {
              upgradeOptions[i].apply();
              gameState = GameState.PLAYING;
              return;
            }
          }
          return;
        }

        // Normal movement
        const r = canvas.getBoundingClientRect();
        player.tx = e.clientX - r.left;
        player.ty = e.clientY - r.top;
      });

      /* =========================
         SPAWNERS
      ========================= */
      function spawnEnemy() {
        for (const e of enemies) {
          if (!e.active) {
            const a = Math.random() * Math.PI * 2;
            const d = Math.max(canvas.width, canvas.height) * 0.7;

            const isElite = Math.random() < 0.05; // 5% chance

            e.x = player.x + Math.cos(a) * d;
            e.y = player.y + Math.sin(a) * d;
            e.r = isElite ? 16 : 10;
            e.hp = isElite ? 20 : 3;
            e.speed = isElite ? 90 : 60;
            e.damage = isElite ? 25 : 10;
            e.elite = isElite;
            e.active = true;

            return;
          }
        }
      }

      function spawnBullet(dx, dy) {
        for (const b of bullets) {
          if (!b.active) {
            b.x = player.x;
            b.y = player.y;
            b.vx = dx * 420;
            b.vy = dy * 420;
            b.life = 1.2;
            b.active = true;
            return;
          }
        }
      }

      /* =========================
         SYSTEMS
      ========================= */
      function updatePlayer(dt) {
        if (player.tx !== null) {
          const dx = player.tx - player.x;
          const dy = player.ty - player.y;
          const d = Math.hypot(dx, dy);

          if (d < player.stopRadius) {
            player.vx *= 0.8;
            player.vy *= 0.8;
            if (Math.hypot(player.vx, player.vy) < 5) {
              player.vx = player.vy = 0;
              player.tx = player.ty = null;
            }
          } else {
            const dirX = dx / d;
            const dirY = dy / d;
            const slow = Math.min(d / 120, 1);

            const dvx = dirX * player.speed * slow;
            const dvy = dirY * player.speed * slow;

            player.vx += (dvx - player.vx) * player.accel * dt;
            player.vy += (dvy - player.vy) * player.accel * dt;
          }
        }

        player.x += player.vx * dt;
        player.y += player.vy * dt;
      }

      function updateEnemies(dt) {
        gridClear();

        for (const e of enemies) {
          if (!e.active) continue;

          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const inv = 1 / Math.sqrt(dx * dx + dy * dy);

          e.x += dx * inv * e.speed * dt;
          e.y += dy * inv * e.speed * dt;

          gridInsert(e);
        }
      }

      function autoFire(dt) {
        player.fireTimer -= dt;
        if (player.fireTimer > 0) return;

        const nearby = gridQuery(player.x, player.y);
        let nearest = null;
        let minD = Infinity;

        for (const e of nearby) {
          if (!e.active) continue;
          const dx = e.x - player.x;
          const dy = e.y - player.y;
          const d = dx * dx + dy * dy;

          if (d < minD) {
            minD = d;
            nearest = e;
          }
        }

        if (!nearest) return;

        const inv = 1 / Math.sqrt(minD);
        spawnBullet((nearest.x - player.x) * inv, (nearest.y - player.y) * inv);
        player.fireTimer = player.fireRate;
      }

      function updateBullets(dt) {
        for (const b of bullets) {
          if (!b.active) continue;

          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.life -= dt;

          const nearby = gridQuery(b.x, b.y);

          for (const e of nearby) {
            if (!e.active) continue;

            const dx = b.x - e.x;
            const dy = b.y - e.y;

            if (dx * dx + dy * dy < e.r * e.r) {
              e.hp -= player.bulletDamage;
              b.active = false;

              if (e.hp <= 0) {
                e.active = false;

                const drops = e.elite ? 5 : 1;
                for (let k = 0; k < drops; k++) {
                  xpOrbs.push({
                    x: e.x + (Math.random() - 0.5) * 8,
                    y: e.y + (Math.random() - 0.5) * 8,
                  });
                }
              }
              break;
            }
          }

          if (b.life <= 0) b.active = false;
        }
      }

      function updateXP(dt) {
        for (let i = xpOrbs.length - 1; i >= 0; i--) {
          const o = xpOrbs[i];
          const dx = player.x - o.x;
          const dy = player.y - o.y;
          const d = Math.hypot(dx, dy);

          if (d < player.r) {
            xpOrbs.splice(i, 1);
            gainXP(1);
            continue;
          }

          if (d <= player.xpRadius) {
            o.x += (dx / d) * player.speed * dt;
            o.y += (dy / d) * player.speed * dt;
          }
        }
      }

      function handlePlayerDamage(dt) {
        if (player.invuln > 0) {
          player.invuln -= dt;
          return;
        }

        const nearby = gridQuery(player.x, player.y);

        for (const e of nearby) {
          if (!e.active) continue;

          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const rr = (player.r + e.r) ** 2;

          if (dx * dx + dy * dy < rr) {
            e.active = false;

            // APPLY DAMAGE
            player.hp -= e.damage;
            player.invuln = player.invulnTime;

            // KNOCKBACK
            // const inv = 1 / Math.sqrt(dx * dx + dy * dy || 1);
            // player.vx += dx * inv * 240;
            // player.vy += dy * inv * 240;

            if (player.hp <= 0) {
              player.hp = 0;
              gameState = GameState.DEAD;
            }
            break;
          }
        }
      }

      function gainXP(amount) {
        player.xp += amount;

        if (player.xp >= player.xpNext) {
          player.xp -= player.xpNext;
          player.level++;
          player.xpNext = Math.floor(player.xpNext * 1.4);
          triggerLevelUp();
        }
      }

      function restartGame() {
        // Reset player
        player = { ...PLAYER };

        // Reset enemies
        for (const e of enemies) {
          e.active = false;
        }

        // Reset bullets
        for (const b of bullets) {
          b.active = false;
        }

        // Reset XP
        xpOrbs.length = 0;

        // Reset timers
        spawnTimer = 0;

        gameState = GameState.PLAYING;
      }

      /* =========================
         RENDER
      ========================= */
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // XP
        ctx.fillStyle = "#44f";
        for (const o of xpOrbs) {
          ctx.beginPath();
          ctx.arc(o.x, o.y, 4, 0, Math.PI * 2);
          ctx.fill();
        }

        // Enemies
        for (const e of enemies) {
          if (!e.active) continue;

          // Elite aura
          if (e.elite) {
            ctx.strokeStyle = "#ffeb3b";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r + 4, 0, Math.PI * 2);
            ctx.stroke();
          }

          ctx.fillStyle = e.elite ? "#ff9800" : "#e53935";
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
          ctx.fill();
        }

        // Bullets
        ctx.fillStyle = "#ffd54f";
        for (const b of bullets) {
          if (!b.active) continue;
          ctx.beginPath();
          ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
          ctx.fill();
        }

        // Player
        if (player.invuln > 0 && Math.floor(player.invuln * 10) % 2 === 0) {
          ctx.globalAlpha = 0.4;
        }

        ctx.fillStyle = "#4caf50";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;

        // health bar
        const padding = 2;
        const w = canvas.width - padding * 2;
        const h = 6;
        const x = padding;
        const y = padding;
        ctx.fillStyle = "#333";
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = "#4caf50";
        ctx.fillRect(x, y, (player.hp / player.maxHp) * w, h);
        ctx.strokeStyle = "#000";
        ctx.strokeRect(x, y, w, h);

        // XP bar
        const xpW = canvas.width - padding * 2;
        const xpH = 6;
        const xpX = padding;
        const xpY = canvas.height - xpH - padding;
        ctx.fillStyle = "#333";
        ctx.fillRect(xpX, xpY, xpW, xpH);
        ctx.fillStyle = "#2196f3";
        ctx.fillRect(xpX, xpY, (player.xp / player.xpNext) * xpW, xpH);

        // States
        if (gameState === GameState.LEVEL_UP) {
          ctx.fillStyle = "rgba(0,0,0,0.7)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = "#fff";
          ctx.font = "32px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("LEVEL UP!", canvas.width / 2, canvas.height / 2 - 100);

          ctx.font = "20px sans-serif";
          const startY = canvas.height / 2 - 60;

          for (let i = 0; i < upgradeOptions.length; i++) {
            const y = startY + i * 60;

            ctx.fillStyle = "#222";
            ctx.fillRect(canvas.width / 2 - 150, y - 20, 300, 40);

            ctx.strokeStyle = "#fff";
            ctx.strokeRect(canvas.width / 2 - 150, y - 20, 300, 40);

            ctx.fillStyle = "#fff";
            ctx.fillText(upgradeOptions[i].name, canvas.width / 2, y + 7);
          }

          ctx.textAlign = "left";
        }

        if (gameState === GameState.DEAD) {
          ctx.fillStyle = "rgba(0,0,0,0.65)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = "#fff";
          ctx.font = "48px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("YOU DIED", canvas.width / 2, canvas.height / 2 - 20);

          ctx.font = "20px sans-serif";
          ctx.fillText(
            "Click to Restart",
            canvas.width / 2,
            canvas.height / 2 + 30
          );

          ctx.textAlign = "left";
        }
      }

      /* =========================
         LOOP
      ========================= */
      let last = performance.now();
      let spawnTimer = 0;

      function loop(now) {
        const dt = (now - last) / 1000;
        last = now;

        if (gameState === GameState.PLAYING) {
          spawnTimer -= dt;
          if (spawnTimer <= 0) {
            spawnEnemy();
            spawnTimer = 0.8;
          }

          updatePlayer(dt);
          updateEnemies(dt);
          handlePlayerDamage(dt);
          autoFire(dt);
          updateBullets(dt);
          updateXP(dt);
        }

        draw();
        requestAnimationFrame(loop);
      }

      requestAnimationFrame(loop);
    </script>
  </body>
</html>
