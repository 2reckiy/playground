    <canvas id="gameCanvas"></canvas>

    <script>
      const DEFAULT_SETTINGS = {
        canvasId: "gameCanvas",
        fullScreen: true,
        centered: true,
        scaleToFit: true,
        width: 800, // Used if fullScreen is false
        height: 600, // Used if fullScreen is false
        padding: 0, // Internal canvas margin
        fpsCap: 60,
        debug: true,
        clearColor: "rgba(0, 0, 0, 1)",
        timeScale: 1.0,
        paused: false,

        customCursor: true,
        cursorColor: "#00ff00",
        hideSystemCursor: false,
      };

      /** --- GAME UTILS --- **/

      class EventEmitter {
        constructor() {
          this.events = {};
        }

        on(event, callback) {
          if (!this.events[event]) this.events[event] = [];
          this.events[event].push(callback);
        }

        emit(event, data) {
          if (!this.events[event]) return;
          this.events[event].forEach((callback) => callback(data));
        }
      }

      class Cooldown {
        constructor(seconds) {
          this.duration = seconds;
          this.timer = 0;
        }

        update(dt) {
          if (this.timer > 0) this.timer = Math.max(0, this.timer - dt);
        }

        trigger() {
          if (this.timer > 0) return false;
          this.timer = this.duration;
          return true;
        }

        get isReady() {
          return this.timer === 0;
        }

        get progress() {
          // Returns 0.0 to 1.0
          return this.timer / this.duration;
        }
      }

      /** --- GAME ENTITIES --- **/

      class Tower {
        static zIndex = 10;

        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.hp = 3;
          this.maxHp = 3;
          this.range = 200;
          this.damage = 0;
          this.fireRate = new Cooldown(0.6);
        }
        update() {} // Logic handled by Orchestrator
        draw(ctx) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(0, 255, 0, 0.15)";
          ctx.stroke();
          ctx.fillStyle = "#0f0";
          ctx.fillRect(this.x - 20, this.y - 20, 40, 40);
        }
      }

      class Enemy {
        static zIndex = 9;

        constructor(w, h, diff, target) {
          const side = Math.floor(Math.random() * 4);
          if (side === 0) {
            this.x = Math.random() * w;
            this.y = -20;
          } else if (side === 1) {
            this.x = w + 20;
            this.y = Math.random() * h;
          } else if (side === 2) {
            this.x = Math.random() * w;
            this.y = h + 20;
          } else {
            this.x = -20;
            this.y = Math.random() * h;
          }

          this.target = target;

          this.speed = 40 + diff * 5;
          this.hp = 1 + diff * 3;
          this.attackPower = 5 + diff;
          this.isDead = false;
        }
        update(dt, w, h) {
          const angle = Math.atan2(
            this.target.y - this.y,
            this.target.x - this.x,
          );
          this.x += Math.cos(angle) * this.speed * dt;
          this.y += Math.sin(angle) * this.speed * dt;
        }
        draw(ctx) {
          ctx.fillStyle = "#f44";
          ctx.beginPath();
          ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      class Bullet {
        static zIndex = 8;

        constructor(x, y, target, damage) {
          this.x = x;
          this.y = y;
          this.target = target;
          this.damage = damage;
          this.speed = 500;
          this.isDead = false;
        }

        update(dt) {
          if (this.target.isDead) {
            this.isDead = true;
            return;
          }
          const angle = Math.atan2(
            this.target.y - this.y,
            this.target.x - this.x,
          );

          this.x += Math.cos(angle) * this.speed * dt;
          this.y += Math.sin(angle) * this.speed * dt;
        }

        draw(ctx) {
          if (this.isDead) return;

          ctx.fillStyle = "#ff0";
          ctx.fillRect(this.x - 2, this.y - 2, 5, 5);
        }
      }

      /** --- GAME STORE --- **/

      class GameStore {
        constructor() {
          this.storageKey = "tower_defense_data";
          this.data = this.load();
        }

        load() {
          const saved = localStorage.getItem(this.storageKey);
          return saved
            ? JSON.parse(saved)
            : {
                totalScrap: 0,
                highScore: 0,
                runsCompleted: 0,
                // New: Permanent Upgrades
                upgrades: {
                  startHp: 0, // Level of upgrade
                  startDamage: 0, // Level of upgrade
                },
              };
        }

        save() {
          localStorage.setItem(this.storageKey, JSON.stringify(this.data));
        }

        addScrap(amount) {
          this.data.totalScrap += amount;
          this.save();
        }

        // New: Purchase logic
        purchaseUpgrade(type, cost) {
          if (this.data.totalScrap >= cost) {
            this.data.totalScrap -= cost;
            this.data.upgrades[type]++;
            this.save();
            return true;
          }
          return false;
        }

        updateHighScore(level) {
          if (level > this.data.highScore) {
            this.data.highScore = level;
            this.save();
          }
        }
      }

      /** --- GAME CORE --- **/

      class GameEngine {
        constructor(userSettings) {
          this.settings = { ...DEFAULT_SETTINGS, ...userSettings };

          this.canvas = document.getElementById(this.settings.canvasId);
          this.ctx = this.canvas.getContext("2d");

          this.events = new EventEmitter();
          this.manager = new EntityManager(this.events);
          this.lastTime = 0;

          this.gameOver = false;

          this.init();
        }

        init() {
          if (this.settings.hideSystemCursor) {
            this.canvas.style.cursor = "none";
          }

          this.setupEvents();
          this.setupInputs();
          this.resize();

          requestAnimationFrame((t) => this.loop(t));
        }

        setupEvents() {
          this.events.on("ENGINE_PAUSE", (state) => {
            if (this.gameOver) return;

            this.settings.paused = state;
            this.canvas.style.cursor = state ? "default" : "none";
          });

          this.events.on("GAME_START", () => {
            this.canvas.style.cursor = "none";
            this.settings.paused = false;
            this.gameOver = false;
          });

          this.events.on("GAME_OVER", () => {
            this.canvas.style.cursor = "default";
            this.settings.paused = true;
            this.gameOver = true;
          });
        }

        setupInputs() {
          window.addEventListener("resize", () => this.resize());

          window.addEventListener("blur", () => {
            // Only pause if the game isn't already over
            if (!this.settings.paused) {
              this.events.emit("ENGINE_PAUSE", true);
              console.log("Window lost focus: Game Paused");
            }
          });

          window.addEventListener("focus", () => {
            // Optional: Auto-resume when coming back
            // Warning: Many players prefer to click a "Resume" button
            // rather than having the game jump back into action immediately.
            this.events.emit("ENGINE_PAUSE", false);
          });

          window.addEventListener("mousemove", (e) => {
            const rect = this.canvas.getBoundingClientRect();

            // Divide by the actual rendered width vs internal width to get the correct scale
            const scaleX = this.canvas.width / rect.width;
            const scaleY = this.canvas.height / rect.height;

            this.manager.broadcast("onMouseMove", {
              x: (e.clientX - rect.left) * scaleX,
              y: (e.clientY - rect.top) * scaleY,
            });
          });

          window.addEventListener("keydown", (e) => {
            if (e.key === "p") this.settings.paused = !this.settings.paused;
            if (e.key === "s") this.settings.timeScale = 0.2;
            if (e.key === "f") this.settings.timeScale = 2;
            this.manager.broadcast("onKeyDown", e.code);
          });

          window.addEventListener("keyup", (e) => {
            if (e.key === "s" || e.key === "f") this.settings.timeScale = 1.0; // Return to Normal
          });
        }

        resize() {
          // 1. Determine Internal Resolution
          if (this.settings.fullScreen) {
            this.width = window.innerWidth;
            this.height = window.innerHeight;
          } else {
            this.width = this.settings.width;
            this.height = this.settings.height;
          }

          // Set the buffer size (Internal resolution)
          this.canvas.width = this.width;
          this.canvas.height = this.height;

          // 2. Handle Visual Scaling (CSS)
          let scale = 1;

          if (this.settings.scaleToFit && !this.settings.fullScreen) {
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;

            // Calculate the ratio of screen to canvas
            const scaleX = screenW / this.width;
            const scaleY = screenH / this.height;

            // Use the smaller ratio to ensure it fits both width and height
            scale = Math.min(scaleX, scaleY, 1); // We use 1 to prevent "scaling up" and getting blurry
          }

          // 3. Apply Positioning and Scale
          if (this.settings.centered) {
            this.canvas.style.position = "absolute";
            this.canvas.style.left = "50%";
            this.canvas.style.top = "50%";
            // Combine centering translate with our calculated scale
            this.canvas.style.transform = `translate(-50%, -50%) scale(${scale})`;
          } else {
            this.canvas.style.transformOrigin = "top left";
            this.canvas.style.transform = `scale(${scale})`;
          }

          // Notify entities of the INTERNAL resolution
          this.manager.broadcast("onResize", { w: this.width, h: this.height });
        }

        loop(now) {
          const deltaTime = (now - this.lastTime) / 1000;
          const minFrameTime = 1 / this.settings.fpsCap;

          if (deltaTime >= minFrameTime) {
            this.lastTime = now - (deltaTime % minFrameTime);

            // --- TIME SCALING LOGIC ---
            // If paused, we set effective dt to 0.
            // Otherwise, we multiply the real dt by our scale factor.
            let effectiveDt = this.settings.paused
              ? 0
              : deltaTime * this.settings.timeScale;

            this.ctx.fillStyle = this.settings.clearColor;
            this.ctx.fillRect(0, 0, this.width, this.height);

            // Entities receive the 'scaled' time
            this.manager.update(effectiveDt, this.width, this.height);
            this.manager.draw(this.ctx, this.width, this.height);

            if (this.settings.debug) this.drawDebug(deltaTime, effectiveDt);
          }

          requestAnimationFrame((t) => this.loop(t));
        }

        drawDebug(dt) {
          this.ctx.fillStyle = "white";
          this.ctx.font = "12px monospace";
          this.ctx.fillText(`FPS: ${Math.round(1 / dt)}`, 10, 20);
          this.ctx.fillText(
            `Entities: ${this.manager.entities.length}`,
            10,
            35,
          );
        }
      }

      class EntityManager {
        constructor(events) {
          this.events = events;

          this.entities = [];
          this._needsSort = false;
        }

        add(entity, zIndex = 0) {
          entity.zIndex = zIndex;
          this.entities.push(entity);
          this._needsSort = true;

          // Trigger initial setup for the entity immediately
          if (typeof entity.onMount === "function") {
            entity.onMount();
          }
          return entity;
        }

        sortEntities() {
          if (this._needsSort) {
            this.entities.sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));
            this._needsSort = false;
          }
        }

        update(dt, w, h) {
          this.sortEntities();

          for (let i = this.entities.length - 1; i >= 0; i--) {
            this.entities[i].update(dt, w, h, this);
            if (this.entities[i].isDead) this.entities.splice(i, 1);
          }
        }

        draw(ctx, w, h) {
          for (let entity of this.entities) {
            entity.draw(ctx, w, h);
          }
        }

        onResize(w, h) {
          for (let entity of this.entities) {
            if (typeof entity.resize === "function") {
              entity.resize(w, h);
            }
          }
        }

        broadcast(eventName, data) {
          for (let entity of this.entities) {
            if (typeof entity[eventName] === "function") {
              entity[eventName](data);
            }
          }
        }
      }

      class GameController {
        constructor({ manager, width, height, store }) {
          this.manager = manager;
          this.store = store;
          this.width = width;
          this.height = height;
          this.isRunning = false;
        }

        // Lifecycle methods to be overridden by the specific game
        onStart() {
          throw new Error("onStart() must be implemented by subclass");
        }

        update(dt, w, h) {
          // Shared logic like global timers could go here
        }

        draw(ctx) {
          // Shared screen-space overlays
        }

        // Common helper for resetting the world
        resetManager() {
          this.manager.entities = this.manager.entities.filter(
            (e) => e === this,
          );
        }
      }

      /** --- TOWER DEFENCE SPECIFIC --- **/

      class CombatOrchestrator {
        constructor(manager, gameController) {
          this.manager = manager;
          this.gameController = gameController;
        }

        update(dt) {
          const tower = this.gameController.tower;
          const entities = this.manager.entities;

          const enemies = entities.filter(
            (e) => e instanceof Enemy && !e.isDead,
          );
          const bullets = entities.filter(
            (b) => b instanceof Bullet && !b.isDead,
          );

          if (!tower || tower.hp <= 0) return;

          // 1. Tower Logic: Find targets and fire
          tower.fireRate.update(dt);
          if (tower.fireRate.isReady) {
            let nearest = null;
            let minDist = tower.range;

            for (let e of enemies) {
              const d = Math.hypot(e.x - tower.x, e.y - tower.y);
              if (d < minDist) {
                minDist = d;
                nearest = e;
              }
            }

            if (nearest && tower.fireRate.trigger()) {
              this.manager.add(
                new Bullet(tower.x, tower.y, nearest, tower.damage),
                Bullet.zIndex,
              );
            }
          }

          // 2. Enemy Logic: Collision with Tower
          for (let e of enemies) {
            const distToTower = Math.hypot(e.x - tower.x, e.y - tower.y);
            if (distToTower < 30) {
              tower.hp -= e.attackPower;
              e.isDead = true;
            }
          }

          // 3. BULLET LOGIC: Collision with Enemies (The Solution)
          for (let b of bullets) {
            const dist = Math.hypot(b.x - b.target.x, b.y - b.target.y);

            if (dist < 15) {
              b.isDead = true;
              b.target.hp -= b.damage;

              if (b.target.hp <= 0 && !b.target.isDead) {
                b.target.isDead = true;

                this.gameController.addXP(20);
              }
            }
          }
        }
      }

      class TowerDefenseController extends GameController {
        constructor(config) {
          super(config); // Pass everything to the base GameController
          this.orchestrator = new CombatOrchestrator(this.manager, this);

          this.showMetaShop();
        }

        onStart() {
          this.resetManager();
          document.getElementById("meta-shop").style.display = "none";
          document.getElementById("death-screen").style.display = "none";

          this.isRunning = true;
          this.level = 1;
          this.xp = 0;
          this.xpToNext = 100;
          this.difficulty = 1;
          this.spawnTimer = new Cooldown(2);

          // 3. Re-create Tower with META BONUSES
          const bonusHp = this.store.data.upgrades.startHp * 20;
          const bonusDmg = this.store.data.upgrades.startDamage * 2;

          this.tower = this.manager.add(
            new Tower(this.width * 0.5, this.height * 0.5),
            Tower.zIndex,
          );

          this.tower.maxHp += bonusHp;
          this.tower.hp = this.tower.maxHp;
          this.tower.damage += bonusDmg;

          this.manager.events.emit("GAME_START");

          this.updateUI();
        }

        update(dt, w, h) {
          if (!this.isRunning) return;

          this.orchestrator.update(dt);
          this.spawnTimer.update(dt);

          if (this.spawnTimer.trigger()) {
            this.manager.add(
              new Enemy(w, h, this.difficulty, this.tower),
              Enemy.zIndex,
            );
          }

          this.updateUI();
          this.checkGameOver();
        }

        draw() {
          /* Optional: Draw global overlays or screen-space FX */
        }

        addXP(amt) {
          this.xp += amt;
          if (this.xp >= this.xpToNext) this.levelUp();
        }

        levelUp() {
          this.level++;
          this.xp = 0;
          this.xpToNext *= 1.2;
          this.difficulty++;

          this.spawnTimer.duration *= 0.9;

          this.manager.events.emit("ENGINE_PAUSE", true);
          this.showUpgradeMenu();
        }

        checkGameOver() {
          if (this.tower.hp <= 0 && this.isRunning) {
            console.log("Tower Fallen!");
            this.isRunning = false;

            this.manager.events.emit("GAME_OVER");

            const results = this.saveRunData();

            this.showDeathUI(results);
          }
        }

        saveRunData() {
          const earnedThisRun = Math.floor(
            this.level * 50 + this.difficulty * 10,
          );

          // Use the GameStore
          this.store.addScrap(earnedThisRun);
          this.store.updateHighScore(this.level);
          this.store.data.runsCompleted++;
          this.store.save();

          return earnedThisRun;
        }

        showUpgradeMenu() {
          const menu = document.getElementById("upgrade-menu");
          const container = document.getElementById("upgrade-options");
          container.innerHTML = "";
          menu.style.display = "flex";

          const upgrades = [
            {
              name: "Heavy Shells",
              desc: "+5 Damage",
              run: () => (this.tower.damage += 5),
            },
            {
              name: "Scouter Lens",
              desc: "+40 Range",
              run: () => (this.tower.range += 40),
            },
            {
              name: "Rapid Fire",
              desc: "-15% Reload Time",
              run: () => (this.tower.fireRate.duration *= 0.85),
            },
            {
              name: "Emergency Repairs",
              desc: "Restore 50 HP",
              run: () =>
                (this.tower.hp = Math.min(
                  this.tower.maxHp,
                  this.tower.hp + 50,
                )),
            },
          ];

          // Pick 3 random
          upgrades
            .sort(() => Math.random() - 0.5)
            .slice(0, 3)
            .forEach((up) => {
              const btn = document.createElement("button");
              btn.className = "upgrade-btn";
              btn.innerHTML = `<b>${up.name}</b><br>${up.desc}`;
              btn.onclick = () => {
                up.run();
                menu.style.display = "none";
                this.manager.events.emit("ENGINE_PAUSE", false);
              };
              container.appendChild(btn);
            });
        }

        showDeathUI(earned) {
          const deathScreen = document.getElementById("death-screen");
          const stats = document.getElementById("death-stats");
          const meta = document.getElementById("meta-stats");
          const btn = document.getElementById("meta-shop-btn");

          deathScreen.style.display = "flex";

          stats.innerHTML = `SURVIVED TO LEVEL: ${this.level}<br>SCRAP EARNED: ${earned}`;
          meta.innerHTML = `TOTAL SCRAP: ${this.store.data.totalScrap}<br>BEST: LVL ${this.store.data.highScore}`;

          // Set up the button to trigger a new run
          btn.innerText = "RETURN TO COMMAND CENTER";
          btn.onclick = () => {
            document.getElementById("death-screen").style.display = "none";
            this.showMetaShop();
          };
        }

        showMetaShop() {
          const shop = document.getElementById("meta-shop");
          const container = document.getElementById("shop-items");
          const currency = document.getElementById("shop-currency");
          const retryBtn = document.getElementById("retry-btn");

          shop.style.display = "flex";
          currency.innerText = `SCRAP AVAILABLE: ${this.store.data.totalScrap}`;
          container.innerHTML = "";

          const metaUpgrades = [
            { id: "startHp", name: "Fortified Hull", bonus: 20, baseCost: 100 },
            {
              id: "startDamage",
              name: "Pre-calibrated Rounds",
              bonus: 2,
              baseCost: 150,
            },
          ];

          metaUpgrades.forEach((up) => {
            const level = this.store.data.upgrades[up.id];
            const cost = up.baseCost + level * 100;
            const btn = document.createElement("button");
            btn.className = "upgrade-btn";
            btn.innerHTML = `
              <b>${up.name} (Lv. ${level})</b><br>
              +${up.bonus} Starting Stat | Cost: ${cost} Scrap
            `;
            btn.disabled = this.store.data.totalScrap < cost;
            btn.style.opacity = btn.disabled ? "0.5" : "1";

            btn.onclick = () => {
              if (this.store.purchaseUpgrade(up.id, cost)) {
                this.showMetaShop(); // Refresh shop UI
              }
            };
            container.appendChild(btn);
          });

          retryBtn.onclick = () => {
            document.getElementById("meta-shop").style.display = "none";
            this.onStart();
          };
        }

        updateUI() {
          document.getElementById("lvl-display").innerText =
            `LVL: ${this.level}`;
          document.getElementById("hp-display").innerText =
            `Tower HP: ${Math.ceil(this.tower.hp)}`;
          document.getElementById("xp-fill").style.width =
            `${(this.xp / this.xpToNext) * 100}%`;
        }
      }

      /** --- INITIALIZATION --- **/
      const store = new GameStore();
      const engine = new GameEngine();

      // The "Brain" of the game is just another entity!
      const gameController = new TowerDefenseController({
        manager: engine.manager,
        width: engine.width,
        height: engine.height,
        store: store,
      });

      engine.manager.add(gameController);
    </script>
  </body>
</html>
