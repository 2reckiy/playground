<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Water Game - Fixed</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Courier New", Courier, monospace;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #00ff00;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      CLICK TO DROP WATER<br />STATUS: <span id="status">SPREADING</span>
    </div>
    <canvas id="canvas"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");

      const PIXEL_SIZE = 10; // Larger pixels for better visibility
      let width, height;
      let drops = [];
      let splashes = [];

      // Water State
      let poolVolume = 0;
      let poolWidthInPixels = 0;
      let poolHeightInPixels = 2; // Start with a visible base height
      let isFullWidth = false;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        width = Math.ceil(canvas.width / PIXEL_SIZE);
        height = Math.ceil(canvas.height / PIXEL_SIZE);
      }

      window.addEventListener("resize", resize);
      resize();

      class Drop {
        constructor(x) {
          this.gridX = Math.floor(x / PIXEL_SIZE);
          this.gridY = 0;
          this.fallSpeed = 0.5;
        }
        update() {
          this.gridY += this.fallSpeed;
          this.fallSpeed += 0.1; // Gravity

          // Detect hitting the water surface
          const surfaceY = height - poolHeightInPixels;
          if (this.gridY >= surfaceY) {
            this.onHit();
            return false;
          }
          return true;
        }
        onHit() {
          // Create splash particles
          for (let i = 0; i < 5; i++) {
            splashes.push({
              x: this.gridX,
              y: height - poolHeightInPixels,
              vx: (Math.random() - 0.5) * 0.8,
              vy: -Math.random() * 1,
              life: 1.0,
            });
          }

          // Add Volume
          poolVolume += 2; // Increase "mass"

          if (!isFullWidth) {
            poolWidthInPixels += 4; // Spread outward
            if (poolWidthInPixels >= width) {
              poolWidthInPixels = width;
              isFullWidth = true;
              statusEl.innerText = "RISING";
            }
          } else {
            poolHeightInPixels += 0.5; // Rise upward
          }
        }
        draw() {
          ctx.fillStyle = "#00d4ff";
          ctx.fillRect(
            this.gridX * PIXEL_SIZE,
            Math.floor(this.gridY) * PIXEL_SIZE,
            PIXEL_SIZE,
            PIXEL_SIZE,
          );
        }
      }

      function drawApp() {
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Falling Drops
        drops = drops.filter((d) => d.update());
        drops.forEach((d) => d.draw());

        // 2. Draw Splashes
        splashes = splashes.filter((s) => {
          s.x += s.vx;
          s.y += s.vy;
          s.vy += 0.1;
          s.life -= 0.05;

          ctx.fillStyle = `rgba(0, 212, 255, ${s.life})`;
          ctx.fillRect(
            Math.floor(s.x) * PIXEL_SIZE,
            Math.floor(s.y) * PIXEL_SIZE,
            PIXEL_SIZE / 2,
            PIXEL_SIZE / 2,
          );
          return s.life > 0;
        });

        // 3. Draw Water Pool (The big blue rectangle)
        ctx.fillStyle = "#00d4ff"; // Darker blue for depth
        const startX = Math.floor((width - poolWidthInPixels) / 2);
        const drawX = startX * PIXEL_SIZE;
        const drawY = (height - poolHeightInPixels) * PIXEL_SIZE;
        const drawW = poolWidthInPixels * PIXEL_SIZE;
        const drawH = poolHeightInPixels * PIXEL_SIZE;

        ctx.fillRect(drawX, drawY, drawW, drawH);

        // 4. Draw Light Surface Edge
        ctx.fillStyle = "#00d4ff";
        ctx.fillRect(drawX, drawY, drawW, PIXEL_SIZE / 2);

        requestAnimationFrame(drawApp);
      }

      // Mouse Listeners
      let isMouseDown = false;
      window.addEventListener("mousedown", () => (isMouseDown = true));
      window.addEventListener("mouseup", () => (isMouseDown = false));
      window.addEventListener("mousemove", (e) => {
        if (isMouseDown && Math.random() > 0.8) {
          drops.push(new Drop(e.clientX));
        }
      });

      drawApp();
    </script>
  </body>
</html>
