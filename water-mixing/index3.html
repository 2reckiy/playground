<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hex Lab | Ordered Discovery</title>
    <style>
      :root {
        --bg: #09090b;
        --surface: #18181b;
        --border: #27272a;
        --accent: #38bdf8;
        --text: #fafafa;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #app {
        display: flex;
        width: 95vw;
        height: 90vh;
        background: var(--surface);
        border-radius: 12px;
        border: 1px solid var(--border);
        overflow: hidden;
      }

      /* Collection Panel */
      .sidebar {
        width: 320px;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 24px;
      }

      /* Mixing Lab */
      .main {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #020617;
        position: relative;
      }

      .slots-container {
        display: flex;
        gap: 12px;
        margin-bottom: 40px;
      }

      .slot {
        width: 70px;
        height: 100px;
        border: 2px solid var(--border);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        background: rgba(255, 255, 255, 0.03);
      }
      .slot.active {
        border-color: var(--accent);
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
      }

      .chip {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.2);
      }

      .gallery {
        flex-grow: 1;
        overflow-y: auto;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        margin-top: 15px;
        padding-right: 5px;
      }
      .collected-hex {
        aspect-ratio: 1;
        border-radius: 6px;
        cursor: help;
        transition:
          transform 0.2s,
          border 0.2s;
        border: 1px solid transparent;
      }
      .collected-hex:hover {
        transform: scale(1.1);
        z-index: 10;
        border-color: white;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .color-btn {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: transform 0.1s;
      }
      .color-btn:active {
        transform: scale(0.9);
      }

      .discovery-alert {
        position: absolute;
        top: 40px;
        color: var(--accent);
        font-weight: bold;
        font-size: 1.2rem;
        opacity: 0;
        transition: opacity 0.5s;
        pointer-events: none;
      }
      .show-alert {
        opacity: 1;
        animation: slideUp 2s forwards;
      }

      @keyframes slideUp {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-20px);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <h2 style="margin: 0; font-size: 1.2rem">Library</h2>
        <div
          id="stat-count"
          style="color: var(--accent); margin-bottom: 10px; font-size: 0.8rem">
          Unique Colors: 0
        </div>
        <div class="gallery" id="gallery"></div>
        <button
          onclick="resetSlots()"
          style="
            margin-top: 20px;
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
          ">
          Reset Machine
        </button>
      </aside>

      <main class="main">
        <div id="alert" class="discovery-alert">NEW DISCOVERY!</div>
        <div
          id="result-hex"
          style="
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 5px;
            font-family: monospace;
          ">
          #000000
        </div>
        <p id="slot-info" style="color: #64748b; margin-bottom: 30px">
          Mix and match to unlock slots
        </p>

        <div class="slots-container" id="slots-ui"></div>

        <div class="btn-group">
          <button
            class="color-btn"
            style="background: #ff0000"
            onclick="fillSlot('#FF0000')"></button>
          <button
            class="color-btn"
            style="background: #00ff00"
            onclick="fillSlot('#00FF00')"></button>
          <button
            class="color-btn"
            style="background: #0000ff"
            onclick="fillSlot('#0000FF')"></button>
          <button
            class="color-btn"
            style="background: #ffff00"
            onclick="fillSlot('#FFFF00')"></button>
          <button
            class="color-btn"
            style="background: #ff00ff"
            onclick="fillSlot('#FF00FF')"></button>
          <button
            class="color-btn"
            style="background: #00ffff"
            onclick="fillSlot('#00FFFF')"></button>
          <button
            class="color-btn"
            style="background: #ffffff"
            onclick="fillSlot('#FFFFFF')"></button>
          <button
            class="color-btn"
            style="background: #000000"
            onclick="fillSlot('#000000')"></button>
        </div>
      </main>
    </div>

    <script>
      let discovered = []; // Changed to Array to allow sorting
      let slots = [null, null];
      let activeSlotIndex = 0;

      // Helper: Convert Hex to HSL for sorting
      function getHSL(hex) {
        let r = parseInt(hex.slice(1, 3), 16) / 255;
        let g = parseInt(hex.slice(3, 5), 16) / 255;
        let b = parseInt(hex.slice(5, 7), 16) / 255;
        let max = Math.max(r, g, b),
          min = Math.min(r, g, b);
        let h,
          s,
          l = (max + min) / 2;

        if (max === min) h = s = 0;
        else {
          let d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r:
              h = (g - b) / d + (g < b ? 6 : 0);
              break;
            case g:
              h = (b - r) / d + 2;
              break;
            case b:
              h = (r - g) / d + 4;
              break;
          }
          h /= 6;
        }
        return { h, s, l };
      }

      function fillSlot(hex) {
        slots[activeSlotIndex] = hex;
        activeSlotIndex = (activeSlotIndex + 1) % slots.length;
        updateProcess();
      }

      function calculateMix() {
        const filled = slots.filter((s) => s !== null);
        if (filled.length === 0) return "#000000";

        let r2 = 0,
          g2 = 0,
          b2 = 0;
        filled.forEach((hex) => {
          r2 += parseInt(hex.slice(1, 3), 16) ** 2;
          g2 += parseInt(hex.slice(3, 5), 16) ** 2;
          b2 += parseInt(hex.slice(5, 7), 16) ** 2;
        });

        const avg = (sum) =>
          Math.round(Math.sqrt(sum / filled.length))
            .toString(16)
            .padStart(2, "0");
        return `#${avg(r2)}${avg(g2)}${avg(b2)}`.toUpperCase();
      }

      function updateProcess() {
        const currentHex = calculateMix();
        document.getElementById("result-hex").innerText = currentHex;
        document.getElementById("result-hex").style.color = currentHex;

        const filledCount = slots.filter((s) => s !== null).length;
        if (filledCount === slots.length && !discovered.includes(currentHex)) {
          discover(currentHex);
        }
        renderSlots();
      }

      function discover(hex) {
        discovered.push(hex);

        // Sorting Logic: Sort by Hue (H), then Saturation (S), then Lightness (L)
        discovered.sort((a, b) => {
          const hslA = getHSL(a);
          const hslB = getHSL(b);
          return hslA.h - hslB.h || hslA.s - hslB.s || hslA.l - hslB.l;
        });

        // UI Feedback
        const alertBox = document.getElementById("alert");
        alertBox.classList.remove("show-alert");
        void alertBox.offsetWidth;
        alertBox.classList.add("show-alert");

        updateGallery();

        document.getElementById("stat-count").innerText =
          `Unique Colors: ${discovered.length}`;

        if (discovered.length % 5 === 0 && slots.length < 10) {
          slots.push(null);
          alertBox.innerText = "SLOT UNLOCKED!";
        } else {
          alertBox.innerText = "NEW DISCOVERY!";
        }
      }

      function updateGallery() {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";
        discovered.forEach((hex) => {
          const node = document.createElement("div");
          node.className = "collected-hex";
          node.style.backgroundColor = hex;
          node.title = hex;
          gallery.appendChild(node);
        });
      }

      function renderSlots() {
        const ui = document.getElementById("slots-ui");
        ui.innerHTML = "";
        slots.forEach((color, i) => {
          const div = document.createElement("div");
          div.className = `slot ${i === activeSlotIndex ? "active" : ""}`;
          div.onclick = () => {
            activeSlotIndex = i;
            renderSlots();
          };
          if (color) {
            div.innerHTML = `<div class="chip" style="background:${color}"></div>`;
          }
          ui.appendChild(div);
        });
      }

      function resetSlots() {
        slots = slots.map(() => null);
        activeSlotIndex = 0;
        updateProcess();
      }

      renderSlots();
    </script>
  </body>
</html>
