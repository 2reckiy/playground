<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pro-Miner: Chunked & Optimized</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #020202;
        font-family: "Courier New", monospace;
        color: #0f0;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        pointer-events: none;
        background: rgba(0, 15, 0, 0.9);
        padding: 12px;
        border: 1px solid #0f0;
        width: 220px;
      }
      .res-row {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        margin-bottom: 2px;
      }
      #mining-status {
        visibility: hidden;
        margin-top: 10px;
      }
      .progress-bar {
        width: 100%;
        height: 6px;
        border: 1px solid #0f0;
        background: #000;
      }
      #mine-fill {
        width: 0%;
        height: 100%;
        background: #0f0;
      }
      #phase-notice {
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #0f0;
        color: #000;
        padding: 15px;
        font-weight: bold;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="phase-notice">SECTOR EXPANDED: ZOOMING OUT</div>

    <div id="ui">
      <div
        style="
          font-size: 14px;
          border-bottom: 1px solid #0f0;
          margin-bottom: 8px;
        ">
        PHASE <span id="ui-phase">1</span>
      </div>
      <div id="ui-inventory"></div>
      <div
        style="margin-top: 8px; border-top: 1px solid #040; padding-top: 4px">
        <b>VALUE:</b> $<span id="ui-credits">0</span>
      </div>
      <div id="mining-status">
        <small>DRILLING...</small>
        <div class="progress-bar"><div id="mine-fill"></div></div>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
      /** * BITMASK CONSTANTS (8-bit storage)
       * 0-3: Type ID | 4: Mined (1) | 5: Explored (1)
       */
      const CHUNK_SIZE = 16;
      const MASK_TYPE = 0b00001111;
      const MASK_MINED = 0b00010000;
      const MASK_EXPLORED = 0b00100000;

      const CONFIG = {
        phases: [
          { id: 0, gridCount: 20, threshold: 1, fog: 4 },
          { id: 1, gridCount: 40, threshold: 2, fog: 8 },
          { id: 2, gridCount: 80, threshold: 3, fog: 15 },
          { id: 3, gridCount: 120, threshold: 4, fog: 15 },
          { id: 4, gridCount: 160, threshold: 5, fog: 15 },
          { id: 5, gridCount: 240, threshold: 6, fog: 15 },
          { id: 6, gridCount: 360, threshold: 7, fog: 15 },
          { id: 7, gridCount: 480, threshold: 8, fog: 15 },
        ],
        rocks: [
          { id: 0, key: "soil", color: "#2d1f16", hardness: 5, value: 1 },
          { id: 1, key: "copper", color: "#b87333", hardness: 30, value: 15 },
          { id: 2, key: "iron", color: "#777777", hardness: 80, value: 40 },
          { id: 3, key: "gold", color: "#ffd700", hardness: 250, value: 200 },
        ],
      };

      /**
       * WORLD MANAGER: Handles Chunking & Typed Arrays
       */
      class World {
        constructor() {
          this.chunks = new Map(); // "cx,cy" -> Uint8Array
        }

        _getCoords(x, y) {
          return {
            cx: Math.floor(x / CHUNK_SIZE),
            cy: Math.floor(y / CHUNK_SIZE),
            lx: ((x % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE,
            ly: ((y % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE,
          };
        }

        getTile(x, y) {
          const { cx, cy, lx, ly } = this._getCoords(x, y);
          const key = `${cx},${cy}`;
          if (!this.chunks.has(key)) this.generateChunk(cx, cy);

          const chunk = this.chunks.get(key);
          const byte = chunk[ly * CHUNK_SIZE + lx];

          const typeId = byte & MASK_TYPE;
          return {
            ...CONFIG.rocks[typeId],
            mined: (byte & MASK_MINED) !== 0,
            explored: (byte & MASK_EXPLORED) !== 0,
            raw: byte, // useful for quick checks
          };
        }

        setTileState(x, y, mask) {
          const { cx, cy, lx, ly } = this._getCoords(x, y);
          const key = `${cx},${cy}`;

          // Check if chunk exists; if not, generate it first
          if (!this.chunks.has(key)) {
            this.generateChunk(cx, cy);
          }

          const chunk = this.chunks.get(key);
          chunk[ly * CHUNK_SIZE + lx] |= mask;
        }

        generateChunk(cx, cy) {
          const data = new Uint8Array(CHUNK_SIZE * CHUNK_SIZE);
          for (let i = 0; i < data.length; i++) {
            const lx = i % CHUNK_SIZE;
            const ly = Math.floor(i / CHUNK_SIZE);
            const gx = cx * CHUNK_SIZE + lx;
            const gy = cy * CHUNK_SIZE + ly;

            if (gx === 0 && gy === 0) {
              data[i] = 0 | MASK_MINED | MASK_EXPLORED;
              continue;
            }

            const dist = Math.abs(gx) + Math.abs(gy);
            const roll = Math.random();
            let typeId = 0; // Soil
            if (dist > 40 && roll < 0.08)
              typeId = 3; // Gold
            else if (dist > 20 && roll < 0.12)
              typeId = 2; // Iron
            else if (dist > 8 && roll < 0.18) typeId = 1; // Copper

            data[i] = typeId;
          }
          this.chunks.set(`${cx},${cy}`, data);
        }
      }

      /**
       * GAME ENGINE
       */
      class GameEngine {
        constructor() {
          this.canvas = document.getElementById("gameCanvas");
          this.ctx = this.canvas.getContext("2d");
          this.world = new World();

          this.miner = {
            x: 0,
            y: 0,
            power: 350000,
            inventory: { soil: 0, copper: 0, iron: 0, gold: 0 },
            state: "IDLE",
            progress: 0,
            target: null,
          };

          this.phaseIdx = 0;
          this.tileSize = 0;
          this.targetTS = 0;
          this.camX = 0;
          this.camY = 0;
          this.keys = {};
          this.lastTime = 0;

          window.addEventListener("keydown", (e) => (this.keys[e.code] = true));
          window.addEventListener("keyup", (e) => (this.keys[e.code] = false));
          window.addEventListener("resize", () => this.resize());

          this.resize();
          this.tileSize = this.targetTS;
          this.updateUI();
          requestAnimationFrame((t) => this.loop(t));
        }

        resize() {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
          const phase = CONFIG.phases[this.phaseIdx];
          this.targetTS =
            Math.max(this.canvas.width, this.canvas.height) / phase.gridCount;
        }

        update(dt) {
          // Semantic Zoom Lerp
          this.tileSize += (this.targetTS - this.tileSize) * 0.05;

          if (this.miner.state === "MINING") {
            this.doMining(dt);
          } else {
            this.doMove();
          }

          this.checkPhase();
          this.revealFog();

          // Camera Follow
          this.camX += (this.miner.x * this.tileSize - this.camX) * 0.1;
          this.camY += (this.miner.y * this.tileSize - this.camY) * 0.1;
        }

        doMove() {
          let dx = 0,
            dy = 0;
          if (this.keys["KeyW"]) dy = -1;
          else if (this.keys["KeyS"]) dy = 1;
          else if (this.keys["KeyA"]) dx = -1;
          else if (this.keys["KeyD"]) dx = 1;

          if (dx !== 0 || dy !== 0) {
            const tx = this.miner.x + dx;
            const ty = this.miner.y + dy;
            const tile = this.world.getTile(tx, ty);

            if (tile.mined) {
              this.miner.x = tx;
              this.miner.y = ty;
              this.keys = {};
            } else {
              this.miner.state = "MINING";
              this.miner.target = { x: tx, y: ty, tile };
              this.miner.progress = 0;
            }
          }
        }

        doMining(dt) {
          const m = this.miner;
          m.progress += m.power * (dt / 1000);

          document.getElementById("mining-status").style.visibility = "visible";
          document.getElementById("mine-fill").style.width =
            Math.min((m.progress / m.target.tile.hardness) * 100, 100) + "%";

          if (m.progress >= m.target.tile.hardness) {
            this.world.setTileState(m.target.x, m.target.y, MASK_MINED);
            m.inventory[m.target.tile.key]++;
            m.x = m.target.x;
            m.y = m.target.y;
            m.state = "IDLE";
            document.getElementById("mining-status").style.visibility =
              "hidden";
            this.updateUI();
          }
        }

        revealFog() {
          const r = CONFIG.phases[this.phaseIdx].fog;
          for (let x = -r; x <= r; x++) {
            for (let y = -r; y <= r; y++) {
              if (x * x + y * y <= r * r) {
                this.world.setTileState(
                  this.miner.x + x,
                  this.miner.y + y,
                  MASK_EXPLORED,
                );
              }
            }
          }
        }

        checkPhase() {
          const credits = Object.keys(this.miner.inventory).reduce((s, k) => {
            const rock = CONFIG.rocks.find((r) => r.key === k);
            return s + this.miner.inventory[k] * rock.value;
          }, 0);

          const phase = CONFIG.phases[this.phaseIdx];
          if (
            credits >= phase.threshold &&
            this.phaseIdx < CONFIG.phases.length - 1
          ) {
            this.phaseIdx++;
            this.resize();
            const notice = document.getElementById("phase-notice");
            notice.style.display = "block";
            setTimeout(() => (notice.style.display = "none"), 3000);
          }
        }

        draw() {
          const { ctx, canvas, tileSize: ts } = this;
          ctx.fillStyle = "#050505";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const offX = canvas.width / 2 - this.camX;
          const offY = canvas.height / 2 - this.camY;

          const startX = Math.floor((this.camX - canvas.width / 2) / ts);
          const endX = Math.ceil((this.camX + canvas.width / 2) / ts);
          const startY = Math.floor((this.camY - canvas.height / 2) / ts);
          const endY = Math.ceil((this.camY + canvas.height / 2) / ts);

          for (let x = startX; x <= endX; x++) {
            for (let y = startY; y <= endY; y++) {
              const tile = this.world.getTile(x, y);
              if (!tile.explored) continue;

              ctx.fillStyle = tile.mined ? "#111" : tile.color;
              const border = ts > 10 ? 1 : 0;
              ctx.fillRect(
                x * ts + offX,
                y * ts + offY,
                ts - border,
                ts - border,
              );
            }
          }

          // Miner
          ctx.fillStyle = "#0f0";
          const mSize = Math.max(ts * 0.7, 2);
          ctx.fillRect(
            this.miner.x * ts + offX + (ts - mSize) / 2,
            this.miner.y * ts + offY + (ts - mSize) / 2,
            mSize,
            mSize,
          );
        }

        updateUI() {
          const inv = document.getElementById("ui-inventory");
          let total = 0;
          inv.innerHTML = "";
          for (const rock of CONFIG.rocks) {
            const count = this.miner.inventory[rock.key];
            total += count * rock.value;
            if (count > 0) {
              inv.innerHTML += `<div class="res-row"><span>${rock.key.toUpperCase()}</span> <span>${count}</span></div>`;
            }
          }
          document.getElementById("ui-credits").innerText = total;
          document.getElementById("ui-phase").innerText = this.phaseIdx + 1;
        }

        loop(time) {
          const dt = time - this.lastTime;
          this.lastTime = time || 0;
          this.update(dt);
          this.draw();
          requestAnimationFrame((t) => this.loop(t));
        }
      }

      const engine = new GameEngine();
    </script>
  </body>
</html>
