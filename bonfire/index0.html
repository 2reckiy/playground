<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Canvas Settlement Prototype</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial;
        background: #f8f8f8;
      }
      #canvas {
        display: block;
        background: white;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
      }
      .ui {
        position: absolute;
        left: 16px;
        top: 16px;
        background: rgba(255, 255, 255, 0.9);
        padding: 8px 12px;
        border-radius: 8px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.33);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal {
        background: white;
        border-radius: 10px;
        padding: 16px;
        width: 320px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.2);
      }
      .build-grid {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .build-card {
        cursor: pointer;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #eee;
        width: 100px;
        text-align: center;
      }
      .build-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      }
      .popup {
        position: absolute;
        transform: translate(-50%, -100%);
        background: white;
        padding: 8px 10px;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        pointer-events: auto;
      }
      .small {
        font-size: 13px;
        color: #444;
      }
      .muted {
        color: #666;
        font-size: 12px;
      }
      button {
        background: #2b7cff;
        color: white;
        border: 0;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
      }
      button.secondary {
        background: #eee;
        color: #222;
      }
      .hint {
        opacity: 0.9;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="ui">
      <div class="hint">
        Click empty space to build • Click an object to view info • Press
        <strong>D</strong> to toggle radii
      </div>
    </div>

    <!-- Build modal (hidden until needed) -->
    <div
      id="buildModal"
      style="display: none"
      class="modal-backdrop"
      role="dialog"
      aria-modal="true">
      <div class="modal">
        <h3 style="margin: 0 0 8px 0">Place building</h3>
        <div id="buildDesc" class="small muted" style="margin-bottom: 8px">
          Choose a building to place at the selected location.
        </div>
        <div class="build-grid" id="buildGrid"></div>
        <div style="margin-top: 12px; text-align: right">
          <button id="cancelBuild" class="secondary">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Info popup -->
    <div
      id="infoPopup"
      style="display: none; pointer-events: none; position: absolute"></div>

    <script>
      /* --- Prototype state and config --- */

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let dpr = Math.max(1, window.devicePixelRatio || 1);

      function resizeCanvas() {
        dpr = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      // Toggle show radii
      let showRadii = true;
      let showGrid = false;

      // Basic building types
      const BUILD_TYPES = [
        {
          id: "hut",
          name: "Hut",
          icon: "🏠",
          radius: 120,
          base: { comfort: 5, production: 1 },
          effect: { comfort: 1 }, // Affects others by giving comfort bonus
        },
        {
          id: "farm",
          name: "Farm",
          icon: "🌾",
          radius: 160,
          base: { comfort: -1, production: 4 },
          effect: { production: 2 },
        },
        {
          id: "forge",
          name: "Forge",
          icon: "🔨",
          radius: 100,
          base: { comfort: -2, production: 3 },
          effect: { production: 3 },
        },
        {
          id: "garden",
          name: "Garden",
          icon: "🌳",
          radius: 200,
          base: { comfort: 3, production: 0 },
          effect: { comfort: 2 },
        },
      ];

      // In-game placed objects
      const objects = [];

      // Center bonfire object (fixed)
      const bonfire = {
        id: "bonfire",
        typeId: "bonfire",
        name: "Bonfire",
        x: 0,
        y: 0, // will be set to canvas center
        emoji: "🔥",
        radius: 240,
        base: { comfort: 10, production: 0 },
        effect: { comfort: 4 },
      };

      // Helper: convert client positions to canvas coordinates (accounting for CSS size)
      function clientToCanvas(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      // Place bonfire in center of canvas
      function recalcBonfirePos() {
        bonfire.x = canvas.width / dpr / 2;
        bonfire.y = canvas.height / dpr / 2;
      }
      recalcBonfirePos();
      window.addEventListener("resize", recalcBonfirePos);

      // Create a unique id
      function uid(prefix = "o") {
        return prefix + Math.random().toString(36).slice(2, 9);
      }

      // Compute distance
      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      // Compute bonuses for each object based on nearby objects and bonfire
      function computeBonuses() {
        const all = [bonfire, ...objects];
        // Initialize computed object values
        for (const o of all) {
          o.computed = {
            comfort: o.base?.comfort || 0,
            production: o.base?.production || 0,
          };
        }

        // For each donor object, apply its effect to targets inside donor.radius (including donor's own radius affecting others)
        for (const donor of all) {
          if (!donor.effect) continue;
          for (const target of all) {
            if (target === donor) continue;
            const d = dist(donor, target);
            if (d <= donor.radius) {
              // linear falloff factor from 1 at d=0 to 0 at d=radius
              const factor = Math.max(0, 1 - d / donor.radius);
              // apply effects
              for (const key in donor.effect) {
                // amount = donor.effect[key] * factor
                const amount = donor.effect[key] * factor;
                // Some effect keys map to stats: comfort -> comfort, production -> production
                if (key === "comfort") target.computed.comfort += amount;
                if (key === "production") target.computed.production += amount;
              }
            }
          }
        }
      }

      // UI: Build modal
      const buildModal = document.getElementById("buildModal");
      const buildGrid = document.getElementById("buildGrid");
      const buildDesc = document.getElementById("buildDesc");
      const cancelBuild = document.getElementById("cancelBuild");

      let pendingBuildPos = null; // {x,y} in canvas coords

      function openBuildModal(x, y) {
        pendingBuildPos = { x, y };
        buildModal.style.display = "flex";
        buildDesc.textContent = `Place building at x:${Math.round(
          x
        )}, y:${Math.round(y)}`;
      }
      function closeBuildModal() {
        buildModal.style.display = "none";
        pendingBuildPos = null;
      }

      cancelBuild.addEventListener("click", closeBuildModal);

      // populate build grid
      function renderBuildGrid() {
        buildGrid.innerHTML = "";
        for (const t of BUILD_TYPES) {
          const card = document.createElement("div");
          card.className = "build-card";
          card.innerHTML = `<div style="font-size:26px">${t.icon}</div><div style="font-weight:600">${t.name}</div><div class="muted small">radius: ${t.radius}px</div>`;
          card.onclick = () => {
            if (!pendingBuildPos) {
              closeBuildModal();
              return;
            }
            const o = {
              id: uid("b"),
              typeId: t.id,
              name: t.name,
              x: pendingBuildPos.x,
              y: pendingBuildPos.y,
              emoji: t.icon,
              radius: t.radius,
              base: t.base,
              effect: t.effect,
              createdAt: Date.now(),
            };
            objects.push(o);
            computeBonuses();
            closeBuildModal();
          };
          buildGrid.appendChild(card);
        }
      }
      renderBuildGrid();

      // Info popup logic
      const infoPopup = document.getElementById("infoPopup");
      let selectedObject = null;

      function showInfoFor(obj, screenX, screenY) {
        selectedObject = obj;
        computeBonuses();
        const computed = obj.computed || obj.base || {};
        infoPopup.style.display = "block";
        infoPopup.style.pointerEvents = "auto";
        infoPopup.innerHTML = `
    <div class="popup" style="min-width:180px;">
      <div style="font-size:18px">${obj.emoji || ""} <strong>${
          obj.name
        }</strong></div>
      <div class="small muted" style="margin-bottom:6px">radius: ${Math.round(
        obj.radius
      )} px</div>
      <div><strong>Comfort:</strong> ${Number(
        (computed.comfort || 0).toFixed(2)
      )}</div>
      <div><strong>Production:</strong> ${Number(
        (computed.production || 0).toFixed(2)
      )}</div>
      <div style="margin-top:8px; text-align:right;"><button id="closeInfo">Close</button></div>
    </div>
  `;
        // position popup above the clicked position (screen coords)
        infoPopup.style.left = screenX + "px";
        infoPopup.style.top = screenY + "px";

        // close handler
        document.getElementById("closeInfo").onclick = () => closeInfoPopup();
      }

      function closeInfoPopup() {
        selectedObject = null;
        infoPopup.style.display = "none";
        infoPopup.style.pointerEvents = "none";
      }

      // Canvas interactions
      canvas.addEventListener("mousedown", onPointerDown);
      canvas.addEventListener("touchstart", (e) => {
        if (e.touches && e.touches[0]) onPointerDown(e.touches[0]);
      });

      function findObjectAt(x, y) {
        // iterate in reverse so topmost (most recently placed) is found first
        for (let i = objects.length - 1; i >= 0; i--) {
          const o = objects[i];
          const r = 18; // clickable radius
          const d = Math.hypot(x - o.x, y - o.y);
          if (d <= r) return o;
        }
        // check bonfire
        const bfDist = Math.hypot(x - bonfire.x, y - bonfire.y);
        if (bfDist <= 24) return bonfire;
        return null;
      }

      function onPointerDown(ev) {
        const c = clientToCanvas(ev.clientX, ev.clientY);
        const x = c.x,
          y = c.y;
        const found = findObjectAt(x, y);
        if (found) {
          // show info popup. Use client coords for popup.
          showInfoFor(found, ev.clientX, ev.clientY);
        } else {
          closeInfoPopup();
          // open build modal
          openBuildModal(x, y);
        }
      }

      // keyboard toggle radii
      document.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "d") {
          showRadii = !showRadii;
        }
        if (e.key.toLowerCase() === "g") {
          showGrid = !showGrid;
        }
      });

      // Main draw loop
      function draw() {
        // clear
        ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

        // background white already, but ensure fill
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

        // Optional: draw grid (subtle)
        if (showGrid) {
          drawGrid(32);
        }

        // draw influence radii if toggled
        if (showRadii) {
          // draw bonfire radius with highlight
          ctx.save();
          ctx.globalAlpha = 0.09;
          ctx.fillStyle = "#ffbb66";
          ctx.beginPath();
          ctx.arc(bonfire.x, bonfire.y, bonfire.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // draw placed objects radii
        if (showRadii) {
          ctx.save();
          ctx.globalAlpha = 0.06;
          for (const o of objects) {
            ctx.beginPath();
            ctx.arc(o.x, o.y, o.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#99ccff";
            ctx.fill();
          }
          ctx.restore();
        }

        // draw bonfire
        drawEmoji(bonfire.emoji, bonfire.x, bonfire.y, 36);
        // label
        ctx.font = "12px system-ui, Arial";
        ctx.fillStyle = "#444";
        ctx.textAlign = "center";
        ctx.fillText("Bonfire", bonfire.x, bonfire.y + 30);

        // draw objects
        for (const o of objects) {
          drawEmoji(o.emoji, o.x, o.y, 28);
        }

        computeBonuses();

        // if a selected object, draw lines to nearby donors that affect it
        if (selectedObject) {
          ctx.save();
          ctx.lineWidth = 1.5;
          for (const donor of [bonfire, ...objects]) {
            if (donor === selectedObject) continue;
            const d = dist(donor, selectedObject);
            if (d <= donor.radius) {
              const strength = Math.max(0, 1 - d / donor.radius);
              ctx.strokeStyle = `rgba(60,120,220, ${0.25 + 0.6 * strength})`;
              ctx.beginPath();
              ctx.moveTo(selectedObject.x, selectedObject.y);
              ctx.lineTo(donor.x, donor.y);
              ctx.stroke();
            }
          }
          ctx.restore();
        }

        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);

      // helpers
      function drawEmoji(ch, x, y, size = 28) {
        ctx.save();
        ctx.font = size + "px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(ch, x, y);
        ctx.restore();
      }

      function drawGrid(cell = 32) {
        ctx.save();
        ctx.strokeStyle = "rgba(0,0,0,0.03)";
        ctx.lineWidth = 1;
        const w = canvas.width / dpr,
          h = canvas.height / dpr;
        for (let gx = 0; gx <= w; gx += cell) {
          ctx.beginPath();
          ctx.moveTo(gx, 0);
          ctx.lineTo(gx, h);
          ctx.stroke();
        }
        for (let gy = 0; gy <= h; gy += cell) {
          ctx.beginPath();
          ctx.moveTo(0, gy);
          ctx.lineTo(w, gy);
          ctx.stroke();
        }
        ctx.restore();
      }

      // Helper: clicking anywhere while modal open should close modal if outside
      buildModal.addEventListener("click", (ev) => {
        if (ev.target === buildModal) closeBuildModal();
      });

      // Simple demo: add an initial hut near the bonfire
      objects.push({
        id: uid("b"),
        typeId: "hut",
        name: "Hut",
        x: bonfire.x + 80,
        y: bonfire.y - 20,
        emoji: "🏠",
        radius: 120,
        base: { comfort: 5, production: 1 },
        effect: { comfort: 1 },
      });
      computeBonuses();
    </script>
  </body>
</html>
