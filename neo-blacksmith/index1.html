<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-SMITHY | PROTOTYPE</title>
    <style>
        :root {
            --bg: #bcff2e;
            /* Neon Lime */
            --primary: #ff0054;
            /* Electric Pink */
            --secondary: #00f5d4;
            /* Teal */
            --accent: #fee440;
            /* Yellow */
            --dark: #000;
            --border: 5px solid #000;
            --shadow: 8px 8px 0px #000;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            background-color: var(--bg);
        }

        #game-world {
            display: grid;
            grid-template-areas:
                "header header header"
                "main main inventory";
            grid-template-rows: 100px 1fr;
            grid-template-columns: 1fr 1fr 380px;
            height: 100vh;
        }

        header {
            grid-area: header;
            background: white;
            border-bottom: var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        /* Center Stage */
        #forge-area {
            grid-area: main;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: repeating-linear-gradient(45deg, #a2d2ff, #a2d2ff 10px, #bde0fe 10px, #bde0fe 20px);
        }

        #item-reveal-zone {
            width: 320px;
            height: 320px;
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            visibility: hidden;
            transform: rotate(-1deg);
        }

        .reveal-active {
            visibility: visible !important;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% {
                transform: scale(0.8) rotate(5deg);
            }

            100% {
                transform: scale(1) rotate(-1deg);
            }
        }

        #controls {
            position: absolute;
            bottom: 50px;
        }

        .btn-forge {
            background: var(--primary);
            color: white;
            border: var(--border);
            padding: 25px 80px;
            font-size: 2.5rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            text-transform: uppercase;
        }

        .btn-forge:active {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0 #000;
        }

        /* Sidebar & Sell All Logic */
        #inventory-sidebar {
            grid-area: inventory;
            background: white;
            border-left: var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: var(--border);
            background: var(--accent);
        }

        .btn-sell-all {
            background: var(--secondary);
            border: var(--border);
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            font-family: 'Arial Black';
            cursor: pointer;
            box-shadow: 5px 5px 0 #000;
        }

        .btn-sell-all:hover {
            background: #00d1b2;
        }

        .btn-sell-all:active {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 #000;
        }

        .inventory-scroll {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f0f0f0;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .item-slot {
            aspect-ratio: 1 / 1;
            border: 4px solid #000;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            box-shadow: 4px 4px 0 #000;
        }

        .item-slot:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .stat-box {
            background: white;
            border: 4px solid #000;
            padding: 10px 20px;
            box-shadow: 5px 5px 0 #000;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div id="game-world">
        <header>
            <div class="stat-box">💰 $<span id="gold">100</span></div>
            <div class="stat-box">⚒️ LVL: <span id="lvl">1.0</span></div>
            <div class="stat-box">🧱 IRON: <span id="iron">10</span></div>
            <button class="stat-box" style="cursor:pointer; background: var(--secondary);"
                onclick="engine.buyIron()">GET IRON ($20)</button>
        </header>

        <main id="forge-area">
            <div id="item-reveal-zone">
                <h2 id="reveal-name" style="margin:0">---</h2>
                <div style="font-size: 5rem; margin: 10px 0;" id="reveal-icon">⚒️</div>
                <p id="reveal-stats" style="background: black; color: white; padding: 5px 10px;">Value: $0</p>
            </div>

            <div id="controls">
                <button class="btn-forge" onclick="engine.forge()">FORGE</button>
            </div>
        </main>

        <aside id="inventory-sidebar">
            <div class="sidebar-header">
                <button class="btn-sell-all" onclick="engine.sellAll()">SELL ALL ITEMS</button>
            </div>
            <div class="inventory-scroll">
                <div class="inventory-grid" id="inv-grid">
                </div>
            </div>
        </aside>
    </div>

    <script>
        class Item {
            constructor(name, value, quality, icon) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.value = value;
                this.quality = quality;
                this.icon = icon;
            }
        }

        class GameEngine {
            constructor() {
                this.gold = 100;
                this.lvl = 1.0;
                this.iron = 10;
                this.inventory = [];
                this.types = [
                    { name: 'AXE', icon: '🪓', base: 25 },
                    { name: 'BLADE', icon: '⚔️', base: 20 },
                    { name: 'PLATE', icon: '🛡️', base: 40 },
                    { name: 'RING', icon: '💍', base: 50 },
                    { name: 'MACE', icon: '🔨', base: 30 }
                ];
                this.updateUI();
            }

            buyIron() {
                if (this.gold >= 20) {
                    this.gold -= 20;
                    this.iron += 5;
                    this.updateUI();
                }
            }

            forge() {
                if (this.iron < 1) return;

                this.iron -= 1;
                const blueprint = this.types[Math.floor(Math.random() * this.types.length)];
                const quality = (Math.random() * this.lvl).toFixed(1);
                const value = Math.floor(blueprint.base * (1 + parseFloat(quality)));

                const newItem = new Item(blueprint.name, value, quality, blueprint.icon);
                this.inventory.push(newItem);
                this.lvl = parseFloat((this.lvl + 0.05).toFixed(2));

                this.showReveal(newItem);
                this.updateUI();
            }

            sellItem(id) {
                const index = this.inventory.findIndex(i => i.id === id);
                if (index > -1) {
                    this.gold += this.inventory[index].value;
                    this.inventory.splice(index, 1);
                    this.updateUI();
                }
            }

            sellAll() {
                const totalValue = this.inventory.reduce((sum, item) => sum + item.value, 0);
                this.gold += totalValue;
                this.inventory = [];
                this.updateUI();
            }

            showReveal(item) {
                const el = document.getElementById('item-reveal-zone');
                document.getElementById('reveal-name').innerText = item.name;
                document.getElementById('reveal-stats').innerText = `VALUE: $${item.value} | Q: ${item.quality}`;
                document.getElementById('reveal-icon').innerText = item.icon;

                el.classList.remove('reveal-active');
                void el.offsetWidth;
                el.classList.add('reveal-active');
            }

            updateUI() {
                document.getElementById('gold').innerText = Math.floor(this.gold);
                document.getElementById('lvl').innerText = this.lvl;
                document.getElementById('iron').innerText = this.iron;

                const grid = document.getElementById('inv-grid');
                grid.innerHTML = '';
                this.inventory.forEach(item => {
                    const slot = document.createElement('div');
                    slot.className = 'item-slot';
                    slot.innerHTML = `
                    <div style="font-size:1.5rem">${item.icon}</div>
                    <div style="font-size:0.8rem; font-weight:bold">$${item.value}</div>
                `;
                    slot.onclick = () => this.sellItem(item.id);
                    grid.appendChild(slot);
                });
            }
        }

        const engine = new GameEngine();
    </script>
</body>

</html>
