<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rounded Track Example</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #78c06b;
      }
      #ui {
        position: absolute;
        left: 10px;
        top: 10px;
        background: rgba(255, 255, 255, 0.9);
        padding: 8px;
        border-radius: 6px;
        font-family: sans-serif;
      }
      label {
        font-size: 13px;
        margin-right: 6px;
      }
      input[type="range"] {
        width: 180px;
        vertical-align: middle;
      }
      button {
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <div id="ui">
      <label>Points</label
      ><input id="points" type="range" min="4" max="64" value="20" />
      <label>Noise</label
      ><input
        id="noise"
        type="range"
        min="0"
        max="0.6"
        step="0.01"
        value="0.2" />
      <label>Width</label
      ><input id="width" type="range" min="20" max="200" value="80" />
      <button id="regen">Regenerate</button>
    </div>

    <script>
      (() => {
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d", { alpha: false });

        // UI
        const pointsEl = document.getElementById("points");
        const noiseEl = document.getElementById("noise");
        const widthEl = document.getElementById("width");
        const regenBtn = document.getElementById("regen");

        // Resize canvas to device pixels
        function resize() {
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.floor(window.innerWidth * dpr);
          canvas.height = Math.floor(window.innerHeight * dpr);
          canvas.style.width = window.innerWidth + "px";
          canvas.style.height = window.innerHeight + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          render();
        }
        window.addEventListener("resize", resize);
        resize();

        // Generate perturbed circular points
        function generatePoints(n, radius, noise) {
          const pts = [];
          for (let i = 0; i < n; i++) {
            const a = (i / n) * Math.PI * 2;
            // radial noise as fraction of radius
            const r = radius * (1 + (Math.random() * 2 - 1) * noise);
            pts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
          }
          return pts;
        }

        // Convert Catmull-Rom segment to Bezier control points
        // p0,p1,p2,p3 are points {x,y}; returns {cp1, cp2}
        function catmullRomToBezier(p0, p1, p2, p3, t = 0.5) {
          // standard conversion: cp1 = p1 + (p2 - p0) / 6*t; cp2 = p2 - (p3 - p1) / 6*t
          const cp1 = {
            x: p1.x + ((p2.x - p0.x) / 6) * t,
            y: p1.y + ((p2.y - p0.y) / 6) * t,
          };
          const cp2 = {
            x: p2.x - ((p3.x - p1.x) / 6) * t,
            y: p2.y - ((p3.y - p1.y) / 6) * t,
          };
          return { cp1, cp2 };
        }

        // Draw a smooth closed path from points using Catmull-Rom -> cubic Bezier segments
        function pathFromPoints(ctx, points) {
          if (points.length < 3) return;
          const n = points.length;
          ctx.beginPath();
          // start at p0
          const p0 = points[0];
          ctx.moveTo(p0.x, p0.y);

          for (let i = 0; i < n; i++) {
            // indices with wrap-around
            const p_prev = points[(i - 1 + n) % n];
            const p_curr = points[i];
            const p_next = points[(i + 1) % n];
            const p_next2 = points[(i + 2) % n];

            // compute bezier control points for segment p_curr -> p_next
            const { cp1, cp2 } = catmullRomToBezier(
              p_prev,
              p_curr,
              p_next,
              p_next2,
              1
            );
            ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, p_next.x, p_next.y);
          }
          ctx.closePath();
        }

        // Create a set of points positioned, scaled, and smoothed for drawing
        function createTrackPoints(nPoints, noise, trackRadius) {
          // base points
          const raw = generatePoints(nPoints, trackRadius, noise);

          // optional smoothing by averaging neighbors to reduce sharp noise (pre-smooth)
          const smooth = raw.map((p, i) => {
            const prev = raw[(i - 1 + raw.length) % raw.length];
            const next = raw[(i + 1) % raw.length];
            return {
              x: (prev.x + p.x + next.x) / 3,
              y: (prev.y + p.y + next.y) / 3,
            };
          });

          // return smoothed points
          return smooth;
        }

        // Draw track: layered strokes for rim, surface, and dashed center line
        function drawTrack(centerPts, options = {}) {
          const { trackWidth = 80 } = options;
          const canvasW = canvas.width / (window.devicePixelRatio || 1);
          const canvasH = canvas.height / (window.devicePixelRatio || 1);

          // clear with "grass" color
          ctx.fillStyle = "#78c06b";
          ctx.fillRect(0, 0, canvasW, canvasH);

          ctx.save();
          ctx.translate(canvasW / 2, canvasH / 2); // center the track

          // Outer rim (dark edge)
          ctx.lineWidth = trackWidth + 14;
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          ctx.strokeStyle = "#2b2b2b"; // outer rim
          pathFromPoints(ctx, centerPts);
          ctx.stroke();

          // Track surface
          ctx.lineWidth = trackWidth;
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          ctx.strokeStyle = "#4b4b4b";
          pathFromPoints(ctx, centerPts);
          ctx.stroke();

          // Center dashed line (optional)
          ctx.setLineDash([trackWidth / 6, trackWidth / 6]);
          ctx.lineWidth = Math.max(2, trackWidth / 20);
          ctx.strokeStyle = "rgba(255,255,255,0.9)";
          ctx.lineDashOffset = 0;
          pathFromPoints(ctx, centerPts);
          ctx.stroke();
          ctx.setLineDash([]);

          ctx.restore();
        }

        // Main render
        function render() {
          const n = parseInt(pointsEl.value, 10);
          const noise = parseFloat(noiseEl.value);
          const tw = parseFloat(widthEl.value);

          const canvasW = canvas.width / (window.devicePixelRatio || 1);
          const canvasH = canvas.height / (window.devicePixelRatio || 1);
          const baseRadius = Math.min(canvasW, canvasH) * 0.28;

          const pts = createTrackPoints(n, noise, baseRadius);

          drawTrack(pts, { trackWidth: tw });
        }

        // attach UI
        regenBtn.addEventListener("click", render);
        [pointsEl, noiseEl, widthEl].forEach((el) =>
          el.addEventListener("input", render)
        );

        // initial draw and simple auto-regenerate periodically for variety
        render();

        // Optional: regenerate every 7s to see variety (comment out if you don't want)
        // setInterval(render, 7000);
      })();
    </script>
  </body>
</html>
