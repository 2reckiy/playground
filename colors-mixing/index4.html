<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hex Factory | Full-Screen Evolution</title>
    <style>
      :root {
        --bg: #000000;
        --surface: #0a0a0a;
        --border: #222;
        --accent: #38bdf8;
        --text: #ffffff;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* Top Mixing Area */
      #header {
        flex-shrink: 0;
        padding: 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      #result-hex {
        font-size: 5rem;
        font-weight: 900;
        font-family: monospace;
        line-height: 1;
        margin-bottom: 15px;
        letter-spacing: -4px;
        transition: color 0.2s;
      }

      .slots-container {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      .slot {
        width: 50px;
        height: 70px;
        border: 2px solid var(--border);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
        background: rgba(255, 255, 255, 0.02);
      }

      .slot.active {
        border-color: var(--accent);
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        transform: translateY(-2px);
      }

      .chip {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      /* HUD & Controls */
      .hud {
        display: flex;
        gap: 20px;
        align-items: center;
        font-size: 0.8rem;
        color: #666;
      }

      .auto-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: 800;
        cursor: pointer;
        font-size: 0.7rem;
        text-transform: uppercase;
      }
      .auto-btn.on {
        background: #22c55e;
        color: #fff;
      }

      /* Bottom Palette Area */
      #palette-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
        grid-auto-rows: 40px;
        gap: 4px;
        align-content: start;
      }

      .ingredient {
        width: 100%;
        height: 100%;
        border-radius: 2px;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .ingredient:hover {
        transform: scale(1.2);
        z-index: 5;
        outline: 2px solid white;
      }

      /* Scrollbar Styling */
      #palette-container::-webkit-scrollbar {
        width: 8px;
      }
      #palette-container::-webkit-scrollbar-track {
        background: var(--bg);
      }
      #palette-container::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <header id="header">
      <div id="result-hex">#000000</div>

      <div class="slots-container" id="slots-ui"></div>

      <div class="hud">
        <button id="auto-toggle" class="auto-btn" onclick="toggleAuto()">
          Auto-Evolve
        </button>
        <div id="stats">COLLECTED: 8</div>
        <div id="slot-count">SLOTS: 2</div>
        <div
          id="alert"
          style="
            color: var(--accent);
            font-weight: bold;
            min-width: 120px;
            text-align: center;
          "></div>
      </div>
    </header>

    <main id="palette-container"></main>

    <script>
      /** GLOBAL SETTINGS **/
      const MAX_SLOTS = 15; // Set your desired maximum slot limit here
      const INITIAL_COLORS = [
        "#FF0000",
        "#00FF00",
        "#0000FF",
        "#FFFF00",
        "#FF00FF",
        "#00FFFF",
        "#FFFFFF",
        "#000000",
      ];

      let palette = [...INITIAL_COLORS];
      let slots = [null, null];
      let activeSlotIndex = 0;
      let autoInterval = null;

      // Helper: HSL for sorting
      function getHSL(hex) {
        let r = parseInt(hex.slice(1, 3), 16) / 255,
          g = parseInt(hex.slice(3, 5), 16) / 255,
          b = parseInt(hex.slice(5, 7), 16) / 255;
        let max = Math.max(r, g, b),
          min = Math.min(r, g, b),
          h,
          s,
          l = (max + min) / 2;
        if (max === min) h = s = 0;
        else {
          let d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
          else if (max === g) h = (b - r) / d + 2;
          else h = (r - g) / d + 4;
          h /= 6;
        }
        return { h, s, l };
      }

      function useIngredient(hex) {
        slots[activeSlotIndex] = hex;
        activeSlotIndex = (activeSlotIndex + 1) % slots.length;
        updateLogic();
      }

      function calculateMix() {
        const filled = slots.filter((s) => s !== null);
        if (filled.length === 0) return "#000000";
        let r2 = 0,
          g2 = 0,
          b2 = 0;
        filled.forEach((hex) => {
          r2 += parseInt(hex.slice(1, 3), 16) ** 2;
          g2 += parseInt(hex.slice(3, 5), 16) ** 2;
          b2 += parseInt(hex.slice(5, 7), 16) ** 2;
        });
        const avg = (sum) =>
          Math.round(Math.sqrt(sum / filled.length))
            .toString(16)
            .padStart(2, "0");
        return `#${avg(r2)}${avg(g2)}${avg(b2)}`.toUpperCase();
      }

      function updateLogic() {
        const hex = calculateMix();
        const hexDisplay = document.getElementById("result-hex");
        hexDisplay.innerText = hex;
        hexDisplay.style.color = hex;

        if (slots.every((s) => s !== null) && !palette.includes(hex)) {
          discover(hex);
        }
        renderSlots();
      }

      function discover(hex) {
        palette.push(hex);
        // Sort by Hue, then Lightness
        palette.sort(
          (a, b) => getHSL(a).h - getHSL(b).h || getHSL(a).l - getHSL(b).l,
        );

        showAlert("NEW COLOR");
        renderPalette();

        document.getElementById("stats").innerText =
          `COLLECTED: ${palette.length}`;

        // Progression: Add a slot every 10 unique colors
        if (palette.length % 10 === 0 && slots.length < MAX_SLOTS) {
          slots.push(null);
          showAlert("SLOT UNLOCKED");
          document.getElementById("slot-count").innerText =
            `SLOTS: ${slots.length}`;
        }
      }

      function showAlert(msg) {
        const a = document.getElementById("alert");
        a.innerText = msg;
        setTimeout(() => (a.innerText = ""), 1500);
      }

      function renderPalette() {
        const grid = document.getElementById("palette-container");
        grid.innerHTML = "";
        palette.forEach((hex) => {
          const div = document.createElement("div");
          div.className = "ingredient";
          div.style.backgroundColor = hex;
          div.title = hex;
          div.onclick = () => useIngredient(hex);
          grid.appendChild(div);
        });
      }

      function renderSlots() {
        const ui = document.getElementById("slots-ui");
        ui.innerHTML = "";
        slots.forEach((color, i) => {
          const div = document.createElement("div");
          div.className = `slot ${i === activeSlotIndex ? "active" : ""}`;
          div.onclick = () => {
            activeSlotIndex = i;
            renderSlots();
          };
          if (color)
            div.innerHTML = `<div class="chip" style="background:${color}"></div>`;
          ui.appendChild(div);
        });
      }

      function toggleAuto() {
        const btn = document.getElementById("auto-toggle");
        if (autoInterval) {
          clearInterval(autoInterval);
          autoInterval = null;
          btn.innerText = "Start Auto-Evolve";
          btn.classList.remove("on");
        } else {
          btn.innerText = "Auto-Evolving";
          btn.classList.add("on");
          autoInterval = setInterval(() => {
            const rand = palette[Math.floor(Math.random() * palette.length)];
            useIngredient(rand);
          }, 50);
        }
      }

      // Initialize
      renderPalette();
      renderSlots();
    </script>
  </body>
</html>
