<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry of War - Upgrade System</title>
    <style>
        :root {
            --bg: #0d0d12;
            --primary: #00f2ff;
            --secondary: #ff0055;
            --panel: #1a1a24;
            --gold: #ffcc00;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #ui-top {
            padding: 10px 20px;
            background: var(--panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        .stat-group {
            display: flex;
            gap: 20px;
        }

        .stat {
            font-size: 1rem;
        }

        .gold-val {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .timer {
            background: #333;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--gold);
        }

        #game-container {
            flex-grow: 1;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #upgrade-panel {
            padding: 15px;
            background: var(--panel);
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 2px solid #333;
        }

        .up-btn {
            padding: 10px 15px;
            background: #2a2a35;
            border: 1px solid #444;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
            transition: 0.2s;
        }

        .up-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #353545;
        }

        .up-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .up-btn .cost {
            font-size: 0.8rem;
            color: var(--gold);
            margin-top: 5px;
        }

        .up-btn .lvl {
            font-size: 0.7rem;
            color: #888;
        }
    </style>
</head>

<body>

    <div id="ui-top">
        <div class="stat-group">
            <div class="stat">Святиня: <span id="p-hp" style="color:var(--primary)">1000</span></div>
            <div class="stat">Золото: <span id="gold-val" class="gold-val">0</span></div>
        </div>
        <div class="timer">Хвиля через: <span id="timer-val">10</span>с</div>
        <div class="stat">Ворог: <span id="e-hp" style="color:var(--secondary)">1000</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="upgrade-panel">
        <button class="up-btn" id="up-hp" onclick="buyUpgrade('hp')">
            <span>+HP (Мілі)</span>
            <span class="lvl" id="lvl-hp">Lvl: 1</span>
            <span class="cost" id="cost-hp">50 🪙</span>
        </button>
        <button class="up-btn" id="up-atk" onclick="buyUpgrade('atk')">
            <span>+ATK (Всі)</span>
            <span class="lvl" id="lvl-atk">Lvl: 1</span>
            <span class="cost" id="cost-atk">60 🪙</span>
        </button>
        <button class="up-btn" id="up-income" onclick="buyUpgrade('income')">
            <span>+Дохід</span>
            <span class="lvl" id="lvl-income">Lvl: 1</span>
            <span class="cost" id="cost-income">40 🪙</span>
        </button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let state = {
            playerHP: 1000,
            enemyHP: 1000,
            gold: 50,
            units: [],
            waveTimer: 10,
            lastTime: 0,
            upgrades: {
                hp: { lvl: 1, cost: 50 },
                atk: { lvl: 1, cost: 60 },
                income: { lvl: 1, cost: 40 }
            }
        };

        const CONFIG = {
            waveInterval: 10000,
            baseSpeed: 0.5,
            meleeHP: 60,
            rangeHP: 30,
            meleeAtk: 0.4,
            rangeAtk: 0.5,
            rangeDist: 80,
            killReward: 10
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const getPoints = () => ({
            pBase: { x: 70, y: canvas.height - 70 },
            eBase: { x: canvas.width - 70, y: 70 },
            topCorner: { x: 70, y: 70 },
            botCorner: { x: canvas.width - 70, y: canvas.height - 70 }
        });

        class Unit {
            constructor(owner, lane, type, offset = 0) {
                this.owner = owner;
                this.lane = lane;
                this.type = type;

                // Застосування апгрейдів для гравця
                let hpBonus = owner === 'player' ? (state.upgrades.hp.lvl - 1) * 15 : 0;
                let atkBonus = owner === 'player' ? (state.upgrades.atk.lvl - 1) * 0.15 : 0;

                this.maxHp = (type === 'melee' ? CONFIG.meleeHP + hpBonus : CONFIG.rangeHP);
                this.hp = this.maxHp;
                this.atk = (type === 'melee' ? CONFIG.meleeAtk : CONFIG.rangeAtk) + atkBonus;

                this.progress = -offset;
                this.isDead = false;
            }

            getPosition() {
                const p = getPoints();
                const start = this.owner === 'player' ? p.pBase : p.eBase;
                const end = this.owner === 'player' ? p.eBase : p.pBase;
                let t = Math.max(0, this.progress);
                if (this.lane === 'mid') return { x: start.x + (end.x - start.x) * t, y: start.y + (end.y - start.y) * t };
                const corner = (this.lane === 'top') ? p.topCorner : p.botCorner;
                return t < 0.5 ?
                    { x: start.x + (corner.x - start.x) * (t * 2), y: start.y + (corner.y - start.y) * (t * 2) } :
                    { x: corner.x + (end.x - corner.x) * ((t - 0.5) * 2), y: corner.y + (end.y - corner.y) * ((t - 0.5) * 2) };
            }

            update() {
                if (this.progress < 0) { this.progress += 0.0004; return; }
                let blocked = false;
                const myPos = this.getPosition();

                for (let other of state.units) {
                    if (other.owner !== this.owner && other.lane === this.lane && !other.isDead) {
                        const oPos = other.getPosition();
                        const dist = Math.hypot(myPos.x - oPos.x, myPos.y - oPos.y);
                        if (dist < (this.type === 'range' ? CONFIG.rangeDist : 20)) {
                            blocked = true;
                            other.hp -= this.atk;
                            if (other.hp <= 0) {
                                other.isDead = true;
                                if (this.owner === 'player') {
                                    state.gold += CONFIG.killReward + (state.upgrades.income.lvl - 1) * 5;
                                }
                            }
                            break;
                        }
                    }
                }
                if (!blocked) this.progress += 0.001 * CONFIG.baseSpeed;
                if (this.progress >= 1) {
                    if (this.owner === 'player') state.enemyHP -= 10; else state.playerHP -= 10;
                    this.isDead = true;
                }
            }

            draw() {
                if (this.progress < 0) return;
                const pos = this.getPosition();
                ctx.fillStyle = this.owner === 'player' ? '#00f2ff' : '#ff0055';
                ctx.beginPath();
                if (this.type === 'melee') ctx.arc(pos.x, pos.y, 7, 0, Math.PI * 2);
                else { ctx.moveTo(pos.x, pos.y - 7); ctx.lineTo(pos.x - 6, pos.y + 6); ctx.lineTo(pos.x + 6, pos.y + 6); ctx.closePath(); }
                ctx.fill();
                ctx.fillStyle = "#444"; ctx.fillRect(pos.x - 10, pos.y - 14, 20, 3);
                ctx.fillStyle = "#0f0"; ctx.fillRect(pos.x - 10, pos.y - 14, (this.hp / this.maxHp) * 20, 3);
            }
        }

        function buyUpgrade(type) {
            let up = state.upgrades[type];
            if (state.gold >= up.cost) {
                state.gold -= up.cost;
                up.lvl++;
                up.cost = Math.floor(up.cost * 1.5);
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('gold-val').innerText = Math.floor(state.gold);
            ['hp', 'atk', 'income'].forEach(type => {
                const up = state.upgrades[type];
                document.getElementById(`lvl-${type}`).innerText = `Lvl: ${up.lvl}`;
                document.getElementById(`cost-${type}`).innerText = `${up.cost} 🪙`;
                document.getElementById(`up-${type}`).disabled = state.gold < up.cost;
            });
        }

        function spawnWave() {
            ['top', 'mid', 'bot'].forEach(lane => {
                ['player', 'enemy'].forEach(owner => {
                    for (let i = 0; i < 3; i++) state.units.push(new Unit(owner, lane, 'melee', i * 0.03));
                    state.units.push(new Unit(owner, lane, 'range', 3 * 0.03));
                });
            });
        }

        function loop(time) {
            const delta = time - (state.lastTime || time);
            state.lastTime = time;
            ctx.fillStyle = '#0d0d12'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            state.waveTimer -= delta / 1000;
            if (state.waveTimer <= 0) { spawnWave(); state.waveTimer = 10; }

            document.getElementById('timer-val').innerText = Math.ceil(state.waveTimer);
            document.getElementById('p-hp').innerText = state.playerHP;
            document.getElementById('e-hp').innerText = state.enemyHP;
            updateUI();

            // Малюємо лінії
            const p = getPoints();
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
            [null, p.topCorner, p.botCorner].forEach(c => {
                ctx.beginPath(); ctx.moveTo(p.pBase.x, p.pBase.y);
                if (c) ctx.lineTo(c.x, c.y); ctx.lineTo(p.eBase.x, p.eBase.y); ctx.stroke();
            });

            state.units = state.units.filter(u => !u.isDead);
            state.units.forEach(u => { u.update(); u.draw(); });

            if (state.playerHP > 0 && state.enemyHP > 0) requestAnimationFrame(loop);
            else {
                ctx.fillStyle = "white"; ctx.font = "30px Arial"; ctx.textAlign = "center";
                ctx.fillText(state.playerHP <= 0 ? "Гру закінчено: Поразка" : "Перемога!", canvas.width / 2, canvas.height / 2);
            }
        }
        spawnWave();
        requestAnimationFrame(loop);
    </script>
</body>

</html>
