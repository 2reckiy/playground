<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Archery Game</title>
    <style>
      body {
        margin: 0;
        background: #f0f0f0;
        overflow: hidden;
        font-family: sans-serif;
      }
      canvas {
        display: block;
        margin: 0 auto;
        background: linear-gradient(to top, #6ab04c, #badc58);
      }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255, 255, 255, 0.8);
        padding: 10px;
        border-radius: 6px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="800" height="400"></canvas>
    <div id="info">
      <b>Archery Game</b><br />
      ↑ ↓ to aim<br />
      SPACE to shoot<br />
    </div>
    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const bow = {
        x: 100,
        y: canvas.height / 2,
        angle: -Math.PI / 8,
        angleSpeed: (Math.PI / 180) * 2,
      };

      const arrows = [];
      const gravity = 0.2;
      const speed = 10.2;

      const target = {
        x: 700,
        y: canvas.height / 2 - 50,
        width: 20,
        height: 100,
      };

      let keys = {};

      document.addEventListener("keydown", (e) => {
        keys[e.key] = true;
      });
      document.addEventListener("keyup", (e) => {
        keys[e.key] = false;
      });

      function shootArrow() {
        arrows.push({
          x: bow.x,
          y: bow.y,
          vx: Math.cos(bow.angle) * speed,
          vy: Math.sin(bow.angle) * speed,
          hit: false,
        });
      }

      function update() {
        if (keys["ArrowUp"]) bow.angle -= bow.angleSpeed;
        if (keys["ArrowDown"]) bow.angle += bow.angleSpeed;
        if (keys[" "] && !keys["_lastShoot"]) {
          shootArrow();
          keys["_lastShoot"] = true;
        }
        if (!keys[" "]) keys["_lastShoot"] = false;

        for (let arrow of arrows) {
          if (!arrow.hit) {
            arrow.vy += gravity;
            arrow.x += arrow.vx;
            arrow.y += arrow.vy;

            if (
              arrow.x > target.x &&
              arrow.x < target.x + target.width &&
              arrow.y > target.y &&
              arrow.y < target.y + target.height
            ) {
              arrow.hit = true;
            }
          }
        }
      }

      function drawBow() {
        ctx.save();
        ctx.translate(bow.x, bow.y);
        ctx.rotate(bow.angle);
        ctx.strokeStyle = "brown";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(0, 20);
        ctx.stroke();

        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(40, 0);
        ctx.stroke();
        ctx.restore();
      }

      function drawArrows() {
        for (let arrow of arrows) {
          ctx.save();
          ctx.translate(arrow.x, arrow.y);
          const angle = Math.atan2(arrow.vy, arrow.vx);
          ctx.rotate(angle);
          ctx.strokeStyle = arrow.hit ? "gray" : "black";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(20, 0);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawTarget() {
        ctx.fillStyle = "red";
        ctx.fillRect(target.x, target.y, target.width, target.height);
      }

      function drawTrajectory() {
        let x = bow.x;
        let y = bow.y;
        let vx = Math.cos(bow.angle) * speed;
        let vy = Math.sin(bow.angle) * speed;

        ctx.beginPath();
        ctx.strokeStyle = "rgba(0, 0, 0, 0.4)";
        ctx.setLineDash([3, 6]);
        ctx.moveTo(x, y);

        for (let t = 0; t < 30; t++) {
          vx = vx;
          vy += gravity;
          x += vx;
          y += vy;
          ctx.lineTo(x, y);

          if (x > canvas.width || y > canvas.height) break;
        }

        ctx.stroke();
        ctx.setLineDash([]);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawTrajectory();
        drawBow();
        drawArrows();
        drawTarget();
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      loop();
    </script>
  </body>
</html>
