<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Generator & Solver</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #050505; font-family: monospace; }
        canvas { display: block; }
        #status {
            position: absolute; top: 15px; left: 15px;
            color: #00ffcc; background: rgba(0,0,0,0.7);
            padding: 8px 15px; border-radius: 4px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="status">STATUS: GENERATING...</div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        let cols, rows;
        let cellSize = 25;
        let grid = [];
        let stack = [];
        let current;
        let generating = true;
        let solving = false;
        
        // Solver variables
        let queue = [];
        let visited = new Set();
        let parentMap = new Map();
        let solutionPath = [];

        function setup() {
            cellSize = Math.max(10, Math.min(40, Math.floor(Math.min(window.innerWidth, window.innerHeight) / 20)));
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / cellSize);
            rows = Math.floor(canvas.height / cellSize);
            grid = []; stack = []; queue = []; visited.clear(); 
            parentMap.clear(); solutionPath = [];
            generating = true; solving = false;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    grid.push(new Cell(c, r));
                }
            }
            current = grid[0];
            document.getElementById('status').innerText = "STATUS: GENERATING MAZE...";
        }

        class Cell {
            constructor(c, r) {
                this.c = c; this.r = r;
                this.walls = [true, true, true, true]; // T, R, B, L
                this.visited = false;
            }
            index(c, r) {
                if (c < 0 || r < 0 || c >= cols || r >= rows) return -1;
                return c + r * cols;
            }
            getNeighbors() {
                let neighbors = [];
                let directions = [[0,-1],[1,0],[0,1],[-1,0]];
                for (let d of directions) {
                    let neighbor = grid[this.index(this.c + d[0], this.r + d[1])];
                    if (neighbor && !neighbor.visited) neighbors.push(neighbor);
                }
                return neighbors.length > 0 ? neighbors[Math.floor(Math.random()*neighbors.length)] : undefined;
            }
        }

        function removeWalls(a, b) {
            let x = a.c - b.c;
            if (x === 1) { a.walls[3] = false; b.walls[1] = false; }
            else if (x === -1) { a.walls[1] = false; b.walls[3] = false; }
            let y = a.r - b.r;
            if (y === 1) { a.walls[0] = false; b.walls[2] = false; }
            else if (y === -1) { a.walls[2] = false; b.walls[0] = false; }
        }

        function startSolver() {
            generating = false;
            solving = true;
            document.getElementById('status').innerText = "STATUS: SOLVING...";
            queue = [grid[0]];
            visited.add(grid[0]);
        }

        function draw() {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- GENERATION LOGIC ---
            if (generating) {
                for(let i=0; i<5; i++) { // Speed multiplier
                    current.visited = true;
                    let next = current.getNeighbors();
                    if (next) {
                        next.visited = true;
                        stack.push(current);
                        removeWalls(current, next);
                        current = next;
                    } else if (stack.length > 0) {
                        current = stack.pop();
                    } else {
                        startSolver();
                        break;
                    }
                }
            }

            // --- SOLVER LOGIC (BFS) ---
            if (solving && solutionPath.length === 0) {
                for(let i=0; i<2; i++) {
                    if (queue.length > 0) {
                        let cell = queue.shift();
                        if (cell === grid[grid.length - 1]) {
                            // Path found! Backtrack to get solution
                            let curr = cell;
                            while(curr) {
                                solutionPath.push(curr);
                                curr = parentMap.get(curr);
                            }
                            document.getElementById('status').innerText = "STATUS: PATH FOUND!";
                            setTimeout(setup, 4000);
                            break;
                        }

                        let directions = [[0,-1,0],[1,0,1],[0,1,2],[-1,0,3]]; // dx, dy, wallIndex
                        for (let d of directions) {
                            let neighbor = grid[cell.index(cell.c + d[0], cell.r + d[1])];
                            if (neighbor && !cell.walls[d[2]] && !visited.has(neighbor)) {
                                visited.add(neighbor);
                                parentMap.set(neighbor, cell);
                                queue.push(neighbor);
                            }
                        }
                    }
                }
            }

            // --- RENDERING ---
            grid.forEach(cell => {
                let x = cell.c * cellSize;
                let y = cell.r * cellSize;
                ctx.strokeStyle = "#333";
                ctx.beginPath();
                if (cell.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x+cellSize, y); }
                if (cell.walls[1]) { ctx.moveTo(x+cellSize, y); ctx.lineTo(x+cellSize, y+cellSize); }
                if (cell.walls[2]) { ctx.moveTo(x+cellSize, y+cellSize); ctx.lineTo(x, y+cellSize); }
                if (cell.walls[3]) { ctx.moveTo(x, y+cellSize); ctx.lineTo(x, y); }
                ctx.stroke();
                
                if (visited.has(cell) && solving) {
                    ctx.fillStyle = "rgba(0, 255, 204, 0.15)";
                    ctx.fillRect(x, y, cellSize, cellSize);
                }
            });

            if (solutionPath.length > 0) {
                ctx.strokeStyle = "#ff0066";
                ctx.lineWidth = 4;
                ctx.beginPath();
                solutionPath.forEach((c, i) => {
                    let px = c.c * cellSize + cellSize/2;
                    let py = c.r * cellSize + cellSize/2;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                });
                ctx.stroke();
            }

            if (generating) {
                ctx.fillStyle = "#00ffcc";
                ctx.fillRect(current.c * cellSize + 4, current.r * cellSize + 4, cellSize - 8, cellSize - 8);
            }

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', setup);
        setup();
        draw();
    </script>
</body>
</html>
