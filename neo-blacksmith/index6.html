<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMITHY | QUICK SELL</title>
    <style>
        :root {
            --bg: #bcff2e;
            --primary: #ff0054;
            --secondary: #00f5d4;
            --accent: #fee440;
            --dark: #000;
            --border: 5px solid #000;
            --shadow: 8px 8px 0px #000;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
        }

        header {
            height: 100px;
            background: white;
            border-bottom: var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left,
        .header-right {
            display: flex;
            gap: 15px;
        }

        .stat-box {
            background: white;
            border: 4px solid #000;
            padding: 10px;
            box-shadow: 4px 4px 0 #000;
            width: 150px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .stat-box span {
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        #main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* FORGE AREA */
        #forge-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: repeating-linear-gradient(45deg, #a2d2ff, #a2d2ff 10px, #bde0fe 10px, #bde0fe 20px);
        }

        #item-reveal-zone {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            min-height: 350px;
        }

        .reveal-card {
            width: 220px;
            height: 300px;
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .forge-panel {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 400px;
            height: 150px;
            /* Reserved space so content never moves */
            position: relative;
        }

        .btn-forge {
            background: var(--primary);
            color: white;
            border: var(--border);
            padding: 20px 80px;
            font-size: 2.5rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 2;
        }

        .btn-forge:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0 #000;
        }

        .work-progress-container {
            width: 100%;
            height: 25px;
            background: white;
            border: var(--border);
            box-shadow: 4px 4px 0 #000;
            margin-top: 20px;
            /* Bar appears UNDER button */
            overflow: hidden;
            visibility: hidden;
            /* Use visibility to keep the space occupied */
        }

        #work-bar {
            height: 100%;
            width: 0%;
            background: var(--dark);
            transition: width 0.1s linear;
        }

        /* SIDEBAR & INVENTORY */
        #inventory-sidebar {
            width: 380px;
            background: white;
            border-left: var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: var(--border);
            background: var(--accent);
        }

        .btn-sell-all {
            background: var(--secondary);
            border: var(--border);
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            font-family: 'Arial Black';
            margin-bottom: 10px;
        }

        .inventory-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f0f0f0;
            min-height: 0;
        }

        .inventory-flex-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* INVENTORY SLOTS WITH SELL BUTTON */
        .item-slot {
            width: calc(33.33% - 6px);
            aspect-ratio: 1 / 1;
            border: 3px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 2px 2px 0 #000;
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        .item-slot .sell-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 84, 0.9);
            /* var(--primary) with opacity */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
        }

        .item-slot:hover .sell-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-quick-sell {
            background: white;
            border: 2px solid #000;
            padding: 2px 5px;
            font-size: 0.7rem;
            font-family: 'Arial Black';
            cursor: pointer;
            box-shadow: 2px 2px 0 #000;
        }

        .btn-quick-sell:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #000;
        }

        .price-tag {
            font-size: 0.6rem;
            color: white;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <div class="stat-box"><span>💰</span><span id="gold">100</span></div>
            <div class="stat-box" style="width:120px"><span>LVL</span><span id="lvl">1</span></div>
        </div>
        <div class="header-right">
            <div class="stat-box"><span>🧱</span><span id="iron">50</span></div>
            <button class="stat-box" style="background:var(--secondary); cursor:pointer"
                onclick="engine.buyIron()">+IRON $20</button>
        </div>
    </header>

    <div id="main-container">
        <main id="forge-area">
            <div id="item-reveal-zone"></div>


            <div class="forge-panel">
                <button class="btn-forge" id="forge-btn" onclick="engine.startForge()">FORGE</button>

                <div class="work-progress-container" id="p-container">
                    <div id="work-bar"></div>
                </div>
            </div>
        </main>

        <aside id="inventory-sidebar">
            <div class="sidebar-header">
                <button class="btn-sell-all" onclick="engine.sellAll()">SELL ALL</button>
            </div>
            <div class="inventory-scroll">
                <div class="inventory-flex-grid" id="inv-grid"></div>
            </div>
        </aside>
    </div>

    <script>
        const RARITIES = {
            COMMON: { label: 'Common', weight: 70, multi: 1, color: '#ffffff' },
            RARE: { label: 'Rare', weight: 20, multi: 3, color: '#3a86ff' },
            LEGENDARY: { label: 'Legendary', weight: 10, multi: 10, color: '#ffbe0b' }
        };

        class Item {
            constructor(name, val, rarity, icon) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.val = val;
                this.rarity = rarity;
                this.icon = icon;
            }
        }

        class GameEngine {
            constructor() {
                this.gold = 100; this.iron = 50; this.lvl = 1;
                this.inventory = [];
                this.blueprints = [
                    { name: 'AXE', icon: '🪓', base: 10 },
                    { name: 'SWORD', icon: '⚔️', base: 12 },
                    { name: 'SHIELD', icon: '🛡️', base: 15 }
                ];
                this.updateUI();
            }

            buyIron() { if (this.gold >= 20) { this.gold -= 20; this.iron += 10; this.updateUI(); } }

            startForge() {
                if (this.iron < 1 || this.isForging) return;

                this.isForging = true;
                this.iron -= 1;
                this.updateUI();

                const btn = document.getElementById('forge-btn');
                const pContainer = document.getElementById('p-container');
                const pBar = document.getElementById('work-bar');

                btn.disabled = true;
                btn.innerText = "WORKING...";
                pContainer.style.visibility = "visible"; // Show without moving elements

                let progress = 0;
                const forgeTime = 1200;
                const intervalTime = 40;

                const timer = setInterval(() => {
                    progress += (intervalTime / forgeTime) * 100;
                    pBar.style.width = progress + "%";

                    if (progress >= 100) {
                        clearInterval(timer);
                        this.completeForge();
                    }
                }, intervalTime);
            }

            completeForge() {
                this.isForging = false;
                document.getElementById('forge-btn').disabled = false;
                document.getElementById('forge-btn').innerText = "FORGE";
                document.getElementById('p-container').style.visibility = "hidden";
                document.getElementById('work-bar').style.width = "0%";

                let count = (Math.random() < 0.2) ? 2 : 1;
                const currentBatch = [];
                for (let i = 0; i < count; i++) {
                    const bp = this.blueprints[Math.floor(Math.random() * this.blueprints.length)];
                    const r = Math.random() * 100;
                    let rar = RARITIES.COMMON;
                    if (r < 10) rar = RARITIES.LEGENDARY; else if (r < 30) rar = RARITIES.RARE;
                    const item = new Item(bp.name, Math.floor(bp.base * rar.multi), rar, bp.icon);
                    this.inventory.push(item);
                    currentBatch.push(item);
                }
                this.displayRevealBatch(currentBatch);
                this.updateUI();
            }

            displayRevealBatch(batch) {
                const zone = document.getElementById('item-reveal-zone');
                zone.innerHTML = '';
                batch.forEach((item, i) => {
                    const card = document.createElement('div');
                    card.className = 'reveal-card';
                    card.style.backgroundColor = item.rarity.color;
                    card.style.animationDelay = `${i * 0.1}s`;
                    card.innerHTML = `
                    <div style="font-size:0.7rem; border:2px solid #000; padding:2px 8px; margin-bottom:10px; background:white">${item.rarity.label}</div>
                    <div style="font-size:4rem">${item.icon}</div>
                    <div style="background:black; color:white; padding:2px 10px">$${item.val}</div>
                `;
                    zone.appendChild(card);
                });
            }

            // NEW: Sell individual item
            sellItem(id) {
                const index = this.inventory.findIndex(i => i.id === id);
                if (index !== -1) {
                    this.gold += this.inventory[index].val;
                    this.inventory.splice(index, 1);
                    this.updateUI();
                }
            }

            sellAll() {
                this.gold += this.inventory.reduce((s, i) => s + i.val, 0);
                this.inventory = [];
                this.updateUI();
            }

            updateUI() {
                document.getElementById('gold').innerText = this.gold;
                document.getElementById('iron').innerText = this.iron;
                document.getElementById('lvl').innerText = this.lvl;

                const grid = document.getElementById('inv-grid');
                grid.innerHTML = '';
                this.inventory.forEach(item => {
                    const slot = document.createElement('div');
                    slot.className = 'item-slot';
                    slot.style.backgroundColor = item.rarity.color;

                    slot.innerHTML = `
                    <span>${item.icon}</span>
                    <div class="sell-overlay">
                        <div class="price-tag">$${item.val}</div>
                        <button class="btn-quick-sell" onclick="engine.sellItem('${item.id}')">SELL</button>
                    </div>
                `;
                    grid.appendChild(slot);
                });
            }
        }
        const engine = new GameEngine();
    </script>
</body>

</html>
