<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Minimal Racing — Drift only while accelerating</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #111;
        color: #ddd;
        font-family: Inter, system-ui, Arial;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(#0b1220, #08111a);
      }
      #hud {
        position: absolute;
        left: 12px;
        top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.35);
        font-family: monospace;
        font-size: 14px;
        color: #dfe;
      }
      #ui {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 6px;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="hud">
      <div>Track: <span id="trackHash">-</span></div>
      <div>
        Lap: <span id="lap">0.000</span>s · Best: <span id="best">—</span>
      </div>
      Car:
      <div id="car"></div>
    </div>
    <div id="ui">
      <button id="start">Start</button>
    </div>
    <script>
      // ----------------- Helpers -----------------
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const length = (x, y) => Math.hypot(x, y);

      function getUrlParameter(name) {
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        return urlParams.get(name);
      }

      function mulberry32(seed) {
        let t = seed + 0x6d2b79f5;
        return function () {
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function angle(p1, p2) {
        const deltaY = p2.y - p1.y;
        const deltaX = p2.x - p1.x;
        const radians = Math.atan2(deltaY, deltaX);
        return radians; //* (180 / Math.PI);
      }

      // ----------------- Config -----------------
      const CONFIG = {
        ACC: 0.16,
        BRAKE: 0.12,
        MAX_SPEED: 4.5,

        DRIFT_FACTOR: 0.8,
        FAST_DECAY: 0.58,
        ROLL_FRICTION: 0.96,

        TURN_SPEED: 0.01,
        TURN_RATE_LOW: 0.03,
        TURN_RATE_HIGH: 0.022,
        SPEED_FOR_MAX_TURN: 4.0,
      };
      const TRACK_WIDTH = 40;
      const PENALTY = 3;

      // ----------------- Car state -----------------
      let TRACK = [];
      let CAR = {
        x: 0,
        y: 0,
        angle: 0,
        vx: 0,
        vy: 0,
        inTrackColor: "#00916b",
        outOfTrackColor: "#ff6b6b",
        outOfTrack: false,
      };

      // ----------------- Track integrity timers -----------------
      let timeInsideTrack = 0; // total time in track for current lap
      let timeOutsideTrack = 0; // total time outside track for current lap
      let penaltyTime = 0; // computed penalty

      // Coverage sampling: how much of the track was visited
      let visitedSegments = new Set();
      let totalSegments = 0; // one segment = p[i] -> p[i+1]

      let lapStart = 0;
      let bestLap = parseFloat(localStorage.getItem("miniracer_best") || "NaN");

      // ----------------- HUD UI -----------------
      const elCar = document.getElementById("car");
      const elTrackHash = document.getElementById("trackHash");
      const elLap = document.getElementById("lap");
      const elBest = document.getElementById("best");

      // ----------------- Canvas -----------------
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
      }
      addEventListener("resize", resize);
      resize();

      // ----------------- Track (simple circle + wobble) -----------------
      function toTrackHash(trackConfig) {
        return btoa(JSON.stringify(trackConfig));
      }

      function fromTrackHash(trackHash) {
        return JSON.parse(atob(trackHash));
      }

      // Generate perturbed circular points
      function generateTrackPoints(n, radius, noise, rnd) {
        const pts = [];
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2;
          // radial noise as fraction of radius
          const r = radius * (1 + (rnd() * 2 - 1) * noise);
          pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r });
        }
        return pts;
      }

      function generateTrack(trackHash) {
        try {
          const { n, radius, noise, seed } = fromTrackHash(trackHash);
          const trackSeed = Math.floor(n * radius * noise * seed);
          console.log({ trackSeed });
          rnd = mulberry32(trackSeed);

          const raw = generateTrackPoints(n, radius, noise, rnd);

          // optional smoothing by averaging neighbors to reduce sharp noise (pre-smooth)
          const smooth = raw.map((p, i) => {
            const prev = raw[(i - 1 + raw.length) % raw.length];
            const next = raw[(i + 1) % raw.length];
            return {
              x: (prev.x + p.x + next.x) / 3,
              y: (prev.y + p.y + next.y) / 3,
            };
          });

          // return smoothed points
          return smooth;
        } catch (error) {
          console.error("Wrong Track!!!");
        }
      }

      // Convert Catmull-Rom segment to Bezier control points
      // p0,p1,p2,p3 are points {x,y}; returns {cp1, cp2}
      function catmullRomToBezier(p0, p1, p2, p3, t = 0.5) {
        // standard conversion: cp1 = p1 + (p2 - p0) / 6*t; cp2 = p2 - (p3 - p1) / 6*t
        const cp1 = {
          x: p1.x + ((p2.x - p0.x) / 6) * t,
          y: p1.y + ((p2.y - p0.y) / 6) * t,
        };
        const cp2 = {
          x: p2.x - ((p3.x - p1.x) / 6) * t,
          y: p2.y - ((p3.y - p1.y) / 6) * t,
        };
        return { cp1, cp2 };
      }

      // Draw a smooth closed path from points using Catmull-Rom -> cubic Bezier segments
      function pathFromPoints(ctx, points) {
        if (points.length < 3) return;
        const n = points.length;
        ctx.beginPath();
        // start at p0
        const p0 = points[0];
        ctx.moveTo(p0.x, p0.y);

        for (let i = 0; i < n; i++) {
          // indices with wrap-around
          const p_prev = points[(i - 1 + n) % n];
          const p_curr = points[i];
          const p_next = points[(i + 1) % n];
          const p_next2 = points[(i + 2) % n];

          // compute bezier control points for segment p_curr -> p_next
          const { cp1, cp2 } = catmullRomToBezier(
            p_prev,
            p_curr,
            p_next,
            p_next2,
            1
          );
          ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, p_next.x, p_next.y);
        }
        ctx.closePath();
      }

      function distPointToSegment(px, py, x1, y1, x2, y2) {
        const vx = x2 - x1;
        const vy = y2 - y1;
        const wx = px - x1;
        const wy = py - y1;

        const c1 = vx * wx + vy * wy;
        if (c1 <= 0) {
          // Closest to first endpoint
          return Math.hypot(px - x1, py - y1);
        }

        const c2 = vx * vx + vy * vy;
        if (c2 <= c1) {
          // Closest to second endpoint
          return Math.hypot(px - x2, py - y2);
        }

        // Projection: perpendicular distance
        const b = c1 / c2;
        const bx = x1 + b * vx;
        const by = y1 + b * vy;

        return Math.hypot(px - bx, py - by);
      }

      function isCarOnTrack(car, track) {
        const px = car.x;
        const py = car.y;
        let minDist = Infinity;

        for (let i = 0; i < track.length; i++) {
          const p1 = track[i];
          const p2 = track[(i + 1) % track.length]; // loop

          const d = distPointToSegment(px, py, p1.x, p1.y, p2.x, p2.y);
          if (d < minDist) minDist = d;
        }

        return minDist <= TRACK_WIDTH * 0.5;
      }

      // ----------------- Core physics update -----------------
      function physicsStep(dt) {
        // Controls
        const throttle = !!(keys["ArrowUp"] || keys["w"]);
        const braking = !!(keys["ArrowDown"] || keys["s"]);
        const steerL = !!(keys["ArrowLeft"] || keys["a"]);
        const steerR = !!(keys["ArrowRight"] || keys["d"]);

        // ===== Steering controllability =====
        const speed = Math.hypot(CAR.vx, CAR.vy);
        const t = clamp(speed / CONFIG.SPEED_FOR_MAX_TURN, 0, 1);

        // speed-dependent steering
        const turnRate =
          CONFIG.TURN_RATE_LOW * (1 - t) + CONFIG.TURN_RATE_HIGH * t;

        // Only turn while moving
        if (speed > 0.15) {
          if (steerL) CAR.angle -= turnRate * dt * 60;
          if (steerR) CAR.angle += turnRate * dt * 60;
        }

        // forward unit vector
        const fx = Math.cos(CAR.angle),
          fy = Math.sin(CAR.angle);

        // Project current velocity onto forward/side axes
        const forward = CAR.vx * fx + CAR.vy * fy; // signed forward speed
        const side = -CAR.vx * fy + CAR.vy * fx; // signed lateral speed

        // Apply throttle / brake to forward component
        let forwardNew = forward;
        if (throttle) forwardNew += CONFIG.ACC * dt * 60; // scaled by frame
        if (braking) forwardNew -= CONFIG.BRAKE * dt * 60;

        // Cap forward speed
        forwardNew = clamp(
          forwardNew,
          -CONFIG.MAX_SPEED * 0.6,
          CONFIG.MAX_SPEED
        );

        // Drift behavior:
        // - If accelerating or braking -> allow lateral slip to remain (reduced by DRIFT_FACTOR)
        // - If neither (no accel/brake) -> set lateral slip to 0 (snap velocity to forward dir)
        let sideNew;

        if (throttle || braking) {
          // When accelerating or braking, allow some drift
          sideNew = side * CONFIG.DRIFT_FACTOR;
        } else {
          // When coasting: apply fast lateral decay
          const FAST_DECAY = 1; // 0.0 = instant snap, 1.0 = no decay
          sideNew = side * Math.pow(FAST_DECAY, dt * 60);
        }

        // Reconstruct velocity in world coords from forwardNew and sideNew
        CAR.vx = fx * forwardNew - fy * sideNew;
        CAR.vy = fy * forwardNew + fx * sideNew;

        // Apply rolling friction (global speed damping)
        CAR.vx *= Math.pow(CONFIG.ROLL_FRICTION, dt * 60);
        CAR.vy *= Math.pow(CONFIG.ROLL_FRICTION, dt * 60);

        // Steering: steering effect scales with forward speed (and direction sign)
        const speedForSteer = forwardNew; // signed forward speed
        let steerInput = 0;
        if (steerL) steerInput -= 1;
        if (steerR) steerInput += 1;
        // only apply steering when CAR has some forward/back speed
        if (Math.abs(speedForSteer) > 0.05) {
          // When reversing, steering should invert (optional)
          const dir = speedForSteer >= 0 ? 1 : -1;
          CAR.angle +=
            steerInput *
            CONFIG.TURN_SPEED *
            dir *
            (Math.abs(speedForSteer) / CONFIG.MAX_SPEED) *
            dt *
            60;
        }

        // Integrate position
        CAR.x += CAR.vx * dt * 60;
        CAR.y += CAR.vy * dt * 60;

        // Safety clamps — avoid runaway numeric growth
        if (
          !isFinite(CAR.x) ||
          !isFinite(CAR.y) ||
          !isFinite(CAR.vx) ||
          !isFinite(CAR.vy) ||
          !isFinite(CAR.angle)
        ) {
          CAR.x = TRACK[0].x;
          CAR.y = TRACK[0].y;
          CAR.vx = 0;
          CAR.vy = 0;
          CAR.angle = 0;
        }

        // Off-track penalty
        CAR.outOfTrack = !isCarOnTrack(CAR, TRACK);

        // Track time accumulation
        if (CAR.outOfTrack) {
          timeOutsideTrack += dt;
        } else {
          timeInsideTrack += dt;
        }

        // TRACK COVERAGE CHECK:
        // Find closest segment and mark it visited
        let closestIndex = -1;
        let closestDist = Infinity;

        for (let i = 0; i < TRACK.length; i++) {
          const p1 = TRACK[i];
          const p2 = TRACK[(i + 1) % TRACK.length];
          const d = distPointToSegment(CAR.x, CAR.y, p1.x, p1.y, p2.x, p2.y);
          if (d < closestDist) {
            closestDist = d;
            closestIndex = i;
          }
        }

        if (closestDist <= TRACK_WIDTH * 0.6) {
          visitedSegments.add(closestIndex);
        }

        // LAP DETECTION (simple: passing near first track point)
        const start = TRACK[0];
        const d = length(CAR.x - start.x, CAR.y - start.y);
        if (d < 32) {
          if (!CAR._wasNearStart) {
            const now = performance.now();
            const lap = (now - lapStart) / 1000;

            if (lap > 1.2) {
              // Check if lap is valid (player visited at least 80% of track)
              const coverage = visitedSegments.size / totalSegments;

              // Penalty: 1 second for each second outside track
              penaltyTime = timeOutsideTrack * PENALTY;

              const finalLap = lap + penaltyTime;

              // Save best only for valid laps
              if (coverage >= 0.8) {
                if (!isFinite(bestLap) || finalLap < bestLap) {
                  bestLap = finalLap;
                  localStorage.setItem("miniracer_best", bestLap.toFixed(3));
                }
              }

              console.log(
                "Lap:",
                lap.toFixed(3),
                "Inside:",
                timeInsideTrack.toFixed(3),
                "Outside:",
                timeOutsideTrack.toFixed(3),
                "Coverage:",
                (coverage * 100).toFixed(1) + "%",
                "Penalty:",
                penaltyTime.toFixed(3),
                "Final:",
                finalLap.toFixed(3)
              );
            }

            // Reset lap timers and coverage for new lap
            timeInsideTrack = 0;
            timeOutsideTrack = 0;
            penaltyTime = 0;
            visitedSegments.clear();

            lapStart = now;
            CAR._wasNearStart = true;
          }
        } else {
          CAR._wasNearStart = false;
        }
      }

      // ----------------- Draw -----------------
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // draw outer background
        ctx.fillStyle = "#08111a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // draw track (thick stroked loop)
        drawTrack(ctx);

        // draw start point
        ctx.save();
        ctx.translate(TRACK[0].x, TRACK[0].y);
        ctx.rotate(angle(TRACK[0], TRACK[1]) + Math.PI / 2);
        ctx.fillStyle = "#ffd54d";
        roundRect(ctx, -TRACK_WIDTH * 0.5, 0, TRACK_WIDTH, 4, 0);
        ctx.fill();
        ctx.restore();

        // draw CAR
        drawCar(ctx);

        // HUD
        drawHUD();
      }

      function drawTrack(ctx) {
        ctx.save();
        // Outer rim (dark edge)
        ctx.lineWidth = TRACK_WIDTH + 14;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.strokeStyle = "#2b2b2b"; // outer rim
        pathFromPoints(ctx, TRACK);
        ctx.stroke();

        // Track surface
        ctx.lineWidth = TRACK_WIDTH;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.strokeStyle = "#4b4b4b";
        pathFromPoints(ctx, TRACK);
        ctx.stroke();

        // Center dashed line (optional)
        ctx.setLineDash([TRACK_WIDTH / 6, TRACK_WIDTH / 6]);
        ctx.lineWidth = Math.max(2, TRACK_WIDTH / 20);
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineDashOffset = 0;
        pathFromPoints(ctx, TRACK);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.restore();

        // ctx.save();
        // ctx.lineWidth = TRACK_WIDTH;
        // ctx.lineJoin = "round";
        // ctx.lineCap = "round";
        // ctx.strokeStyle = "#1b2a36";
        // ctx.beginPath();
        // TRACK.forEach((p, i) =>
        //   i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)
        // );
        // ctx.closePath();
        // ctx.stroke();

        // // draw track edges (thin dashed)
        // ctx.lineWidth = 2;
        // ctx.strokeStyle = "rgba(255,255,255,0.06)";
        // ctx.setLineDash([8, 10]);
        // ctx.beginPath();
        // TRACK.forEach((p, i) =>
        //   i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)
        // );
        // ctx.closePath();
        // ctx.stroke();
        // ctx.setLineDash([]);
        // ctx.restore();
      }

      function drawCar(ctx) {
        ctx.save();
        ctx.translate(CAR.x, CAR.y);
        ctx.rotate(CAR.angle);
        // body
        ctx.fillStyle = CAR.outOfTrack ? CAR.outOfTrackColor : CAR.inTrackColor;
        roundRect(ctx, -18, -9, 36, 18, 4);
        ctx.fill();
        // window
        ctx.fillStyle = "rgba(255,255,255,0.12)";
        ctx.fillRect(0, -6, 8, 12);
        ctx.restore();
      }

      function drawHUD() {
        const lapNow = ((performance.now() - lapStart) / 1000).toFixed(3);
        elLap.textContent = lapNow;

        elCar.innerHTML =
          `Inside: ${timeInsideTrack.toFixed(2)}s<br>` +
          `Outside: ${timeOutsideTrack.toFixed(2)}s<br>` +
          `Penalty: ${penaltyTime.toFixed(2)}s<br>` +
          `Visited: ${((visitedSegments.size / totalSegments) * 100).toFixed(
            1
          )}%`;

        if (isFinite(bestLap)) elBest.textContent = bestLap.toFixed(3);
      }

      // simple rounded rect path helper
      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      // ----------------- Main loop -----------------
      let last = performance.now();
      function frame() {
        const now = performance.now();
        let dt = (now - last) / 1000; // seconds
        last = now;

        // clamp dt to avoid huge steps after tab switch
        if (dt > 0.06) dt = 0.06;

        physicsStep(dt);
        draw();
        requestAnimationFrame(frame);
      }

      function start() {
        const th = getUrlParameter("th");
        const trackHash =
          th ??
          toTrackHash({
            n: 24,
            radius: Math.min(innerWidth, innerHeight) * 0.3,
            noise: 0.5,
            seed: Math.random(),
          });
        TRACK = generateTrack(trackHash);

        CAR = {
          x: TRACK[0].x,
          y: TRACK[0].y,
          angle: angle(TRACK[0], TRACK[1]),
          vx: 0,
          vy: 0,
          inTrackColor: "#00916b",
          outOfTrackColor: "#ff6b6b",
          outOfTrack: false,
        };
        timeInsideTrack = 0; // total time in track for current lap
        timeOutsideTrack = 0; // total time outside track for current lap
        penaltyTime = 0;
        visitedSegments = new Set();
        totalSegments = TRACK.length; // one segment = p[i] -> p[i+1]

        lapStart = performance.now();

        elTrackHash.textContent = trackHash;

        requestAnimationFrame(frame);
      }

      document.getElementById("start").onclick = start;

      // ----------------- Input -----------------
      const keys = {};
      addEventListener("keydown", (e) => (keys[e.key] = true));
      addEventListener("keyup", (e) => (keys[e.key] = false));

      // ----------------- Prevent runaway on page hide -----------------
      addEventListener("visibilitychange", () => {
        console.log("visibilitychange", document.hidden);
        if (document.hidden) {
          CAR.vx = 0;
          CAR.vy = 0;
        }
      });
    </script>
  </body>
</html>
