<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Minimalist Rocket Dev</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a0c;
            font-family: monospace;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #modal-content {
            background: #1a1a1f;
            border: 2px solid #00ff41;
            padding: 40px;
            color: #00ff41;
            text-align: center;
            box-shadow: 0 0 20px #00ff4144;
        }

        #retry-btn {
            background: #00ff41;
            color: #0a0a0c;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        #retry-btn:hover {
            background: #00cc33;
        }

        #hangar-btn {
            background: #ffffff;
            color: #0a0a0c;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        #hangar-btn:hover {
            background: #cdcdcd;
        }
    </style>

    <style>
        #hangar-screen {
            position: absolute;
            top: 0;
            right: 0;

            width: 100%;
            height: 100%;
            background: rgb(10, 15, 10);
            border: 2px solid #00ff41;
            padding: 20px;
            color: #00ff41;
            font-family: monospace;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            box-sizing: border-box;
        }

        .hangar-layout {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }

        /* The Grid */
        .constructor-grid {
            position: relative;
            /* Keep this for the CoM/CoT markers */
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            padding: 10px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px inset #00ff41;
            margin: 15px 0;
            /* Width of 3 columns (60px * 3) + gaps (5px * 2) + padding (10px * 2) */
            width: 210px;
        }

        .grid-slot {
            /* Using flex-basis to control the size */
            flex: 0 0 60px;
            height: 60px;
            margin: 2.5px;
            /* Half of your 5px gap */
            border: 1px solid rgba(0, 255, 65, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-sizing: border-box;
            /* Ensures border doesn't grow the 60px width */
        }

        .grid-slot:hover {
            background: rgba(0, 255, 65, 0.1);
        }

        .grid-slot.occupied {
            border-color: #00ff41;
            background: rgba(0, 255, 65, 0.2);
            font-size: 20px;
        }

        /* Stages and Palette and Stats */
        .stage-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stage-btn.selected {
            background: #00ff41;
            color: #000;
        }

        #parts-palette {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom scrollbar for that retro look */
        #parts-palette::-webkit-scrollbar {
            width: 4px;
        }

        #parts-palette::-webkit-scrollbar-thumb {
            background: #00ff41;
        }

        .palette-item {
            border: 1px solid #00ff41;
            padding: 8px 4px;
            margin-bottom: 10px;
            font-size: 11px;
            background: rgba(0, 255, 65, 0.05);
            cursor: pointer;
            text-align: center;
        }

        .palette-item.selected {
            background: #00ff41;
            color: #000;
        }

        .stats-view {
            flex: 1;
        }

        .stats-card {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            line-height: 1.6;
        }

        .launch-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            cursor: pointer;
            font-weight: bold;
        }

        .launch-btn:hover {
            background: #00ff41;
            color: #000;
        }

        .marker {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            /* Don't block clicks on slots */
            z-index: 10;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
        }

        .marker-com {
            background: #ffcc00;
            color: #000;
            border: 1px solid white;
        }

        .marker-cot {
            background: #00ffff;
            color: #000;
            border: 1px solid white;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="modal-overlay" style="display: none;">
        <div id="modal-content">
            <h1 id="modal-title">MISSION REPORT</h1>
            <p id="modal-msg"></p>
            <div id="modal-stats"></div>
            <button id="retry-btn">RELAUNCH</button>
            <button id="hangar-btn">HANGAR</button>
        </div>
    </div>

    <div id="ui">
        <button id="hangar-btn" onclick="game.renderHangar()">HANGAR</button>
        <h2>MISSION CONTROL</h2>
        <div id="stats">ALTITUDE: 0m<br>FUEL: 100%<br>SPEED: 0 m/s</div>
    </div>

    <div id="hangar-screen" style="display: none;">
        <div class="hangar-header">
            <h2>ROCKET ASSEMBLY HANGAR</h2>
            <div class="credits-display">
                CREDITS: <span id="hangar-credits">0</span>
            </div>
        </div>

        <div class="hangar-layout">
            <div class="stats-view">
                <h3>ANALYSIS</h3>
                <div id="rocket-stats" class="stats-card"></div>
            </div>

            <div class="blueprint-view">
                <h3>SCHEMATIC</h3>
                <div id="constructor-grid" class="constructor-grid"></div>
                <button class="launch-btn">IGNITION SEQUENCE</button>
            </div>

            <div class="inventory">
                <h3>STAGES</h3>
                <div id="stages-list"></div>
                <h3>COMPONENTS</h3>
                <div id="parts-palette"></div>
            </div>
        </div>
    </div>

    <script>
        const STARS_COUNT = 100;
        const GROUND_INIT_ALTITUDE = 50;
        const ROCKET_INIT_ALTITUDE = 70;
        const WIND_TORUQE_FACTOR = 0.1

        const PARTS_CATALOG = {
            // --- ENGINES: The powerhouses ---
            // TWR Focus: High thrust, but very heavy and thirsty.
            ENGINE_STD: {
                name: "Kestrel-1", type: "ENGINE", symbol: "|_|",
                weight: 400, thrust: 18000, consumption: 0.05, cost: 500
            },
            // Efficiency Focus: Lighter, very low consumption, but can't lift heavy loads alone.
            ENGINE_EFF: {
                name: "Viper Vacuum", type: "ENGINE", symbol: "|_e|",
                weight: 600, thrust: 8000, consumption: 0.02, cost: 1200
            },
            // Brute Force: Massive thrust for first stages.
            ENGINE_HVY: {
                name: "Mammoth", type: "ENGINE", symbol: "|#|",
                weight: 2500, thrust: 55000, consumption: 0.15, cost: 2500
            },

            // --- FUEL TANKS: The weight management ---
            // Note: 'weight' is the DRY MASS (the container). 
            // 'fuel' adds to the total mass until burned.
            FUEL_TANK: {
                name: "Basic Tank", type: "FUEL_TANK", symbol: "[ ]",
                weight: 400, fuel: 2000, grade: 1.0, cost: 100
            },
            TANK_LOX: {
                name: "Cryo Tank", type: "FUEL_TANK", symbol: "[L]",
                weight: 600, fuel: 4500, grade: 1.2, cost: 400
            },
            // Nuclear: Extremely dense fuel, but the tank is shielded (heavy).
            TANK_NUC: {
                name: "Nuke Cell", type: "FUEL_TANK", symbol: "[N]",
                weight: 1500, fuel: 8000, grade: 2.5, cost: 3000
            },
            // Small Tank: For upper stages or side-balancing.
            TANK_SMALL: {
                name: "Micro Tank", type: "FUEL_TANK", symbol: "[.]",
                weight: 150, fuel: 600, grade: 1.0, cost: 50
            },

            // --- BOOSTERS: One-way tickets ---
            // High thrust, low weight, but comes with its own fuel (cannot be refilled).
            BOOSTER_SRB: {
                name: "SRB-Sledge", type: "BOOSTER", symbol: "!|!",
                weight: 800, thrust: 15000, fuel: 1200, consumption: 0.1, cost: 600
            },

            // --- AERODYNAMICS: Stability vs Weight ---
            NOSE_CONE: {
                name: "AeroPoint", type: "NOSE_CONE", symbol: "/\\",
                weight: 100, thrust: 0, fuel: 0, stability: 0, cost: 200
            },
            // Heavy Nose: Lower center of mass, higher stability.
            NOSE_HEAVY: {
                name: "Shielded Nose", type: "NOSE_CONE", symbol: "/#\\",
                weight: 500, thrust: 0, fuel: 0, stability: 2, cost: 500
            },
            FIN_LEFT: {
                name: "Grid Fin L", type: "FIN", symbol: "<|",
                weight: 150, thrust: 0, fuel: 0, stability: 5, cost: 150
            },
            FIN_RIGHT: {
                name: "Grid Fin R", type: "FIN", symbol: "|>",
                weight: 150, thrust: 0, fuel: 0, stability: 5, cost: 150
            },

            // --- UTILITY: Special modules ---
            REACTION_WHEEL: {
                name: "Gyro-Stabilizer", type: "UTILITY", symbol: "(o)",
                weight: 300, thrust: 0, fuel: 0, stability: 10, cost: 800
            }
        };

        class PhysicsLogger {
            constructor() {
                this.data = {};
                this.lastLogTime = 0;
                this.logInterval = 500; // Log to console every 500ms

                // Create a basic overlay for the screen
                this.overlay = document.createElement('div');
                Object.assign(this.overlay.style, {
                    position: 'absolute',
                    bottom: '10px',
                    right: '10px',
                    backgroundColor: 'rgba(0, 0, 0, 0.7)',
                    color: '#00ff00',
                    fontFamily: 'monospace',
                    padding: '10px',
                    fontSize: '12px',
                    pointerEvents: 'none',
                    zIndex: '1000'
                });
                document.body.appendChild(this.overlay);
            }

            log(key, value) {
                // Format numbers for readability
                this.data[key] = typeof value === 'number' ? value.toFixed(3) : value;
            }

            update(currentTime) {
                if (!window.DEBUG) {
                    this.overlay.style.display = 'none';
                    return;
                }
                this.overlay.style.display = 'block';
                // Update Screen Overlay
                let html = "<b>PHYSICS DEBUG</b><br>";
                for (const [key, val] of Object.entries(this.data)) {
                    html += `${key}: ${val}<br>`;
                }
                this.overlay.innerHTML = html;

                // Throttled Console Log
                if (currentTime - this.lastLogTime > this.logInterval) {
                    console.clear();
                    console.table(this.data);
                    this.lastLogTime = currentTime;
                }
            }
        }

        // Global instance
        const logger = new PhysicsLogger();

        class Star {
            constructor(canvas) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                // Stars at different "depths" move at different speeds
                this.depth = Math.random() * 0.5 + 0.1;
            }

            draw(ctx, canvas, rocketX, rocketY, velocityX, velocityY) {
                const xSensitivity = 1; // Tune this to match the "feel" of your speed
                let relativeX = (this.x - (rocketX * this.depth * xSensitivity * Math.abs(velocityX))) % canvas.width;

                let relativeY = (this.y + (rocketY * this.depth)) % canvas.height;

                ctx.fillStyle = `rgba(255, 255, 255, ${this.depth})`;
                ctx.beginPath();
                ctx.arc(relativeX, relativeY, this.size, 0, Math.PI * 2);

                // if (Math.abs(velocityX) > 2) {
                //     ctx.strokeStyle = `rgba(255, 255, 255, ${this.depth * 0.5})`;
                //     ctx.lineWidth = this.size *2;
                //     ctx.beginPath();
                //     ctx.moveTo(relativeX, relativeY);
                //     // Draw a line in the direction the star is "flowing"
                //     ctx.lineTo(relativeX + (velocityX * 0.9), relativeY - (velocityY * 0.1));
                //     ctx.stroke();
                // }

                ctx.fill();
            }
        }

        /**
         * BASE MODULE CLASS
         * Every part of the rocket inherits from this.
         */
        class Module {
            constructor({ name, symbol, weight, fuel = 0, thrust = 0, stability = 0, consumption = 0, grade = 0 }) {
                this.name = name;
                this.weight = weight;
                this.fuel = fuel;
                this.currentFuel = fuel;
                this.thrust = thrust;
                this.stability = stability;
                this.symbol = symbol;
                this.consumption = consumption;
                this.grade = grade;
            }
        }

        /**
         * ROCKET CLASS
         * Manages the assembly and physics of the modules.
         */
        class Rocket {
            constructor() {
                this.modules = [];
                this.blueprintModules = [];
                this.y = 0;
                this.x = 0;
                this.velocityY = 0;      // Vertical Speed
                this.velocityX = 0;     // Horizontal Speed (Inertia!)
                this.fuel = 0;
                this.acceleration = 0;
                this.tilt = 0;
                this.angularVelocity = 0;
                this.stages = 0;
                this.activeStage = 1;
                this.debris = []; // To animate falling parts

                this.thrustOffset = 0; // How far the CoT is from the CoM (for torque calculations)

                this.isCrashed = false;
                this.isIgnited = false;
                this.crashTimer = 0;

                this.maxAltitude = 0;
            }

            buildFromBlueprint(blueprint) {
                this.stages = 0;
                this.modules = blueprint.map(p => {
                    this.stages = Math.max(this.stages, p.stage);
                    return {
                        ...new Module(PARTS_CATALOG[p.key]),
                        gridR: p.r,
                        gridC: p.c,
                        stage: p.stage
                    }
                });

                this.blueprintModules = JSON.parse(JSON.stringify(this.modules));

                this.reset();
            }

            isModuleActive(module) {
                return this.stages === 0 || module.stage === this.activeStage || this.stages === this.activeStage - 1;
            }

            getStageTanks() {
                return this.modules.filter(module => this.isModuleActive(module) && module.fuel > 0);
            }

            getWeight() {
                const hardwareWeight = this.modules.reduce((sum, module) => sum + module.weight, 0);
                return hardwareWeight + (this.fuel * 0.5);
            }

            getThrust() {
                return this.modules.reduce((s, module) => s + module.thrust, 0);
            }

            getStageThrust() {
                return this.modules.reduce((s, module) => this.isModuleActive(module) ? s + module.thrust : s, 0);
            }

            getFuel() {
                return this.modules.reduce((s, module) => s + module.fuel, 0);
            }

            getStageCurrentFuel() {
                return this.modules.reduce((s, module) => this.isModuleActive(module) ? s + module.currentFuel : s, 0);
            }

            getConsumption() {
                return this.modules.reduce((s, module) => s + (module.consumption || 0), 0)
            }

            getStageConsumption() {
                return this.modules.reduce((s, module) => this.isModuleActive(module) ? s + (module.consumption || 0) : s, 0)
            }

            getStabilityRating() {
                // Higher stability = harder to tilt. Fins help!
                return this.modules.reduce((sum, module) => sum + (module.stability || 0), 0);
            }

            refillFuel() {
                this.modules.forEach(module => module.currentFuel = module.fuel);
                this.fuel = this.getFuel();
            }

            separateNextStage() {
                if (this.stages < this.activeStage) return; // No more stages to drop!

                // Find all parts in the current stage
                const partsToDrop = this.modules.filter(module => module.stage === this.activeStage);

                // Calculate initial world position relative to rocket center
                const slotSize = 18;
                const centerCol = 4;
                const bottomRow = 9;

                // Add them to debris for a cool visual effect
                partsToDrop.forEach(module => {
                    // Relative offsets
                    const relX = (module.gridC - centerCol) * slotSize;
                    const relY = (module.gridR - bottomRow) * slotSize;

                    // Add to debris array with physics properties
                    this.debris.push({
                        symbol: module.symbol,
                        // World positions
                        x: relX,
                        y: relY,
                        // Velocity: inherit rocket velocity + small random "pop"
                        vx: (Math.random() - 0.5) * 5,
                        vy: Math.random() - 0.5,
                        angle: this.tilt,
                        angularVelocity: (Math.random() - 0.5) * 0.2,
                        life: 1.0 // Fade out over time
                    });
                });

                // Keep only parts from HIGHER stages
                this.modules = this.modules.filter(module => module.stage === 0 || module.stage > this.activeStage);
                this.activeStage++;

                // TODO: recalculate CoM/CoT and adjust thrustOffset accordingly
            }

            reset() {
                this.x = 0;
                this.y = 0;
                this.velocityY = 0;
                this.velocityX = 0;
                this.tilt = 0;
                this.angularVelocity = 0;
                this.acceleration = 0;
                this.activeStage = 1;
                this.maxAltitude = 0;
                this.crashTimer = 0;
                this.isIgnited = false;
                this.isCrashed = false;

                this.debris = [];
                this.modules = JSON.parse(JSON.stringify(this.blueprintModules));

                this.refillFuel();
            }

            // F = ma -> a = F / m
            update(dt, windForce) {
                if (!this.isIgnited || this.isCrashed) return;

                const fastDt = dt;
                const PLANET_RADIUS = 6371000; // Earth radius in meters
                const G_ZERO = 9.8;            // Gravity at sea level
                const ATMOSPHERE_CEILING = 50000;
                // Calculate dynamic gravity based on current altitude (this.y)
                // As this.y increases, gravity decreases
                let currentG = G_ZERO * Math.pow(PLANET_RADIUS / (PLANET_RADIUS + this.y), 2);

                // Velocity factor now accounts for BOTH vertical and horizontal movement
                // Vertical air speed is just rocket velocity (assuming no vertical wind)
                const airSpeedY = this.velocityY;
                // Horizontal air speed is the rocket's speed MINUS the wind's speed
                // If rocket is moving 50 right and wind is 50 right, relative speed is 0
                const airSpeedX = this.velocityX - windForce;

                // Calculate Total Magnitude of Relative Airspeed
                const totalAirSpeed = Math.sqrt(Math.pow(airSpeedY, 2) + Math.pow(airSpeedX, 2));
                const velocityFactor = 1 + (totalAirSpeed / 100);
                // Calculate dynamic pressure factor
                const density = Math.max(0, 1 - (this.y / ATMOSPHERE_CEILING));
                // Aerodynamic Drag: Fd = 0.5 * rho * v^2 * Cd * A
                // TODO: Make Cd and A depend on the rocket's design and orientation. For now, we'll use a simple constant.
                const dragForce = 0.5 * 1.225 * density * Math.pow(airSpeedY, 2) * 0.3 * 0.1;
                const effectiveAirPressure = density * velocityFactor;

                const M = this.getWeight();
                const stageFuel = this.getStageCurrentFuel();
                const T = stageFuel ? this.getStageThrust() : 0;

                // Fy = T * cos(theta) - (M * g)
                const thrustY = T * Math.cos(this.tilt);
                const weightForce = M * currentG;
                const netForceY = (this.velocityY > 0)
                    ? thrustY - weightForce - dragForce
                    : thrustY - weightForce + dragForce;

                this.acceleration = netForceY / M;
                this.velocityY += this.acceleration * fastDt;

                // --- LOG ENVIRONMENT ---
                logger.log("Gravity", currentG);
                logger.log("Density", density);
                logger.log("AirSpeedX", airSpeedX);
                logger.log("AirSpeedY", airSpeedY);
                logger.log("TotalAirSpeed", totalAirSpeed);
                // --- LOG VERTICAL ---
                logger.log("Y ThrustY", thrustY);
                logger.log("Y WeightF", weightForce);
                logger.log("Y DragF", dragForce);
                logger.log("Y netForceY", netForceY);
                logger.log("Y AccY", this.acceleration);
                logger.log("Y VelocityY", this.velocityY);

                if (this.y <= 0 && this.velocityY <= 0) {
                    this.y = 0;
                    this.velocityY = 0;
                    this.acceleration = 0;
                    // Don't allow tilt/horizontal movement on the pad
                    this.velocityX = 0;
                    this.angularVelocity = 0;
                    this.tilt = 0;
                } else {

                    // 2. HORIZONTAL & TILT (Only unlock once we leave the ground)
                    // windLateralForce is the direct push on the rocket's X position
                    // Scaled down from 50 to match velocityFactor
                    const windLateralForce = airSpeedX * effectiveAirPressure * 5.0;
                    const thrustX = T * Math.sin(this.tilt);
                    const netForceX = thrustX - windLateralForce;
                    const accX = netForceX / M;
                    this.velocityX += accX * fastDt;
                    // Lateral air resistance (stops the rocket from drifting infinitely)
                    this.velocityX *= 0.98;

                    // 3. ROTATION CALCULATIONS
                    const stability = this.getStabilityRating();
                    const stabilityMultiplier = stageFuel ? 1.0 : 0.5;

                    // - Torque from wind
                    // scale the windForce down significantly (0.01 to 0.05) 
                    const windTorque = windForce * effectiveAirPressure * WIND_TORUQE_FACTOR; //* Math.cos(this.tilt);

                    // - Torque from thrust asymmetry
                    const thrustTorque = this.thrustOffset * (T * 0.005);

                    // - Restoring force (Gravity/Aerodynamics)
                    // This pulls the rocket back toward 0 (upright) based on stability.
                    // The more it tilts, the harder stability pulls it back.
                    const moveAngle = Math.atan2(this.velocityX, Math.abs(this.velocityY) + 0.1);
                    const restoringTorque = (moveAngle - this.tilt) * (stability * stabilityMultiplier * effectiveAirPressure * 0.2);

                    const dragFlipTorque = Math.sin(this.tilt) * (effectiveAirPressure * 0.1);

                    // - Apply to angular velocity
                    // Force = Torque / "Inertia" (We'll use mass as a proxy for inertia)
                    const netTorque = (windTorque + restoringTorque + thrustTorque + dragFlipTorque) / (M / 100);

                    this.angularVelocity += netTorque * fastDt;
                    // Add a bit of 'Damping' so it doesn't spin forever
                    this.angularVelocity *= 0.98;
                    this.tilt += this.angularVelocity * fastDt;

                    logger.log("X windLateralForce", windLateralForce);
                    logger.log("X thrustX", thrustX);
                    logger.log("X netForceX", netForceX);
                    logger.log("X accX", accX);
                    logger.log("X VelocityX", this.velocityX);
                    logger.log("Torque_Wind", windTorque);
                    logger.log("Torque_Restoring", restoringTorque);
                    logger.log("Torque_Thrust", thrustTorque);
                    logger.log("Torque_DragFlip", dragFlipTorque);
                    logger.log("Torque_Net", netTorque);
                    logger.log("angularVelocity", this.angularVelocity);
                    logger.log("Tilt", this.tilt);
                    logger.log("Tilt_Deg", (this.tilt * 180 / Math.PI));
                }

                this.y += this.velocityY * fastDt;
                this.x += this.velocityX * fastDt;

                if (stageFuel > 0 && T > 0) {
                    // // Calculate weighted average of consumption and grade
                    // const avgConsumption = this.getConsumption() /
                    //     this.modules.filter(module => module.thrust > 0 && module.stage === this.activeStage).length;
                    // const avgGrade = this.modules.reduce((s, module) => module.stage === this.activeStage ? s + (module.grade || 0) : s, 0) /
                    //     this.modules.filter(module => module.fuel > 0 && module.stage === this.activeStage).length || 1;
                    // // The formula: better fuel (grade) reduces the burn rate
                    // const burnAmount = (T * avgConsumption) / avgGrade;
                    // this.fuel -= burnAmount * dt;
                    // if (this.fuel < 0) this.fuel = 0;

                    const consumption = this.getStageConsumption();
                    const tanks = this.getStageTanks();

                    let fuelNeeded = T * consumption * dt;
                    tanks.forEach(t => {
                        if (fuelNeeded > 0 && t.currentFuel > 0) {
                            const drain = Math.min(t.currentFuel, fuelNeeded / tanks.length);
                            t.currentFuel -= drain;
                            fuelNeeded -= drain;
                        }
                    });

                    this.fuel = this.modules.reduce((s, mod) => s + mod.currentFuel, 0);
                    if (this.fuel < 0) this.fuel = 0;
                }

                if (this.y > this.maxAltitude) this.maxAltitude = this.y;

                this.debris.forEach((d, index) => {
                    // 1. Gravity
                    d.vy += 9.8 * dt;

                    // 2. Wind & Air Resistance
                    d.vx += windForce * 0.05;
                    d.vx *= 0.5;
                    d.vy *= 0.99;

                    // 3. Apply Velocity to Position
                    d.x += d.vx;
                    d.y += d.vy;

                    // 4. Tumble
                    d.angle += d.angularVelocity;

                    // 5. Lifespan (Optional: remove debris far below the rocket to save memory)
                    d.life -= dt * 0.5;
                    if (d.y < -500 || d.life <= 0) this.debris.splice(index, 1);
                });
            }

            draw(ctx, canvas, cameraScale) {
                // 2. Determine screen center
                const screenX = Math.floor((canvas.width / 2) + this.x);
                const screenY = canvas.height - ROCKET_INIT_ALTITUDE;

                ctx.save();
                // Move to the rocket's position on screen
                ctx.translate(screenX, screenY);

                // APPLY SCALE EFFECT HERE
                ctx.scale(cameraScale, cameraScale);

                if (this.isCrashed) {
                    this.drawCrashAnimation(ctx);
                } else {
                    this.drawDebris(ctx);

                    ctx.save();
                    ctx.rotate(this.tilt);
                    this.drawNormal(ctx);
                    ctx.restore();
                }

                ctx.restore();
            }

            drawNormal(ctx) {
                const slotSize = 18; // Size of each module on canvas
                const centerCol = 4; // Math.floor(this.rocketBuilder.cols / 2); // Center of your 9-column grid
                const bottomRow = 9; // this.rocketBuilder.rows - 1; // Bottom of your 10-row grid
                ctx.textAlign = "center";
                ctx.font = "bold 14px monospace";

                const stageFuel = this.getStageCurrentFuel();

                this.modules.forEach((mod) => {
                    // Calculate position relative to the rocket's pivot point
                    const drawX = (mod.gridC - centerCol) * slotSize;
                    const drawY = (mod.gridR - bottomRow) * slotSize;

                    if (this.isModuleActive(mod) && mod.thrust > 0 && stageFuel > 0 && this.isIgnited) {
                        ctx.fillStyle = "#ff5839";
                        const fSize = 10 + Math.random() * 10;
                        ctx.beginPath();
                        ctx.moveTo(drawX - 5, drawY + 5);
                        ctx.lineTo(drawX, drawY + 5 + fSize);
                        ctx.lineTo(drawX + 5, drawY + 5);
                        ctx.fill();
                    }

                    ctx.fillStyle = this.isModuleActive(mod) ? "#00ff41" : "#008822"; // Dim inactive stages
                    ctx.fillText(mod.symbol, drawX, drawY);
                });
            }

            drawDebris(ctx) {
                ctx.save();
                ctx.font = "bold 14px monospace";
                ctx.textAlign = "center";
                const floorY = 10; // The "floor" level for debris relative to the rocket's pivot point
                this.debris.forEach((d) => {
                    ctx.save();
                    // Move to the piece's independent physics position
                    let yOffset = d.y;
                    // if (yOffset > floorY) {
                    //     yOffset = floorY; // Don't fall through the floor
                    // }
                    ctx.translate(d.x, yOffset);
                    ctx.rotate(d.angle);

                    // Make debris slightly dimmer or redder
                    ctx.fillStyle = "rgba(255, 65, 65, 0.8)";
                    ctx.fillText(d.symbol, 0, 0);
                    ctx.restore();
                });
                ctx.restore();
            }

            drawCrashAnimation(ctx) {
                // crashTimer controls the progression of the collapse
                this.crashTimer = Math.min(this.crashTimer + 0.05, 6);

                ctx.font = "bold 14px monospace";
                ctx.fillStyle = "#ff4141";
                ctx.textAlign = "center";

                // The floor level relative to the rocket's translation point (0,0)
                // Since we translated to the ground level, 0 is the floor.
                const floorY = 10;

                this.modules.forEach((mod, index) => {
                    ctx.save();

                    // 1. HORIZONTAL SLIDE
                    // Pieces slide outward based on their index (left/right)
                    const direction = (index % 2 === 0) ? 1 : -1;
                    const slideDist = direction * (index + 1) * this.crashTimer * 7;

                    // 2. VERTICAL COLLAPSE
                    // Gravity pulls them down, but we clamp it at the floorY
                    let yOffset = (this.crashTimer * 50); // Falling speed

                    // This is the "Stay on ground" logic:
                    if (yOffset > floorY) {
                        yOffset = floorY; // Don't fall through the floor
                    }

                    ctx.translate(slideDist, yOffset);

                    // 3. THE TUMBLED ROTATION
                    // Stop spinning once the piece hits the ground (timer > some value)
                    // or just let them settle at a fixed random-looking angle
                    const rotationAngle = Math.min(this.crashTimer * 2, 10) * (index + 1) * direction;
                    ctx.rotate(rotationAngle);

                    // 4. DRAW SYMBOL
                    ctx.fillText(mod.symbol, 0, 0);

                    ctx.restore();
                });
            }
        }

        class RocketBuilder {
            constructor(game) {
                this.game = game;
                this.rows = 10;
                this.cols = 9;
                // 2D Array to store part keys
                this.grid = Array(this.rows)
                    .fill(null)
                    .map(() => Array(this.cols).fill(null));
                this.currentStage = 0;
                this.selectedPart = "FUEL_TANK";

                // Initial Rocket
                const center = Math.floor(this.cols / 2);

                this.grid[this.rows - 3][center] = {
                    key: "NOSE_CONE",
                    stage: this.currentStage
                };
                this.grid[this.rows - 2][center] = {
                    key: "FUEL_TANK",
                    stage: this.currentStage
                };
                this.grid[this.rows - 1][center] = {
                    key: "ENGINE_STD",
                    stage: this.currentStage
                };

            }

            getBlueprint() {
                const blueprint = [];
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (this.grid[r][c]) {
                            blueprint.push({
                                key: this.grid[r][c].key,
                                stage: this.grid[r][c].stage,
                                r,
                                c,
                            });
                        }
                    }
                }
                return blueprint;
            }

            selectPart(key) {
                this.selectedPart = key;
                this.render();
            }

            setStage(s) {
                this.currentStage = s;
                this.render();
            }

            toggleSlot(r, c) {
                if (this.grid[r][c]) {
                    this.grid[r][c] = null;
                } else {
                    // Store as an object now
                    this.grid[r][c] = {
                        key: this.selectedPart,
                        stage: this.currentStage
                    };
                }
                this.render();
            }

            // TODO: This is where the real magic happens.
            // We need to analyze the blueprint and give feedback on how it will perform.
            getEfficiencyRating() {
                // const totalThrust = this.getTotalThrust();
                // const totalWeight = this.getTotalWeight();
                // const avgConsumption = this.modules.reduce((s, mod) => s + (mod.consumption || 0), 0) /
                //     this.modules.filter(mod => mod.thrust > 0).length;

                // // A simple score: Higher is better
                // const score = (totalThrust / totalWeight) / avgConsumption;
                // return score;
            }

            calculatePhysicsCenters() {
                let totalMass = 0;
                let weightedX = 0;
                let weightedY = 0;

                let totalThrust = 0;
                let thrustX = 0;
                let thrustY = 0;

                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        const partKey = this.grid[r][c]?.key;
                        if (partKey) {
                            const part = PARTS_CATALOG[partKey];

                            const weight = part.weight + (part.fuel || 0) * 0.5;
                            // Mass Calculation (Center of each grid slot)
                            totalMass += weight;
                            weightedX += (c + 0.5) * weight;
                            weightedY += (r + 0.5) * weight;

                            // Thrust Calculation
                            if (part.thrust > 0) {
                                totalThrust += part.thrust;
                                thrustX += (c + 0.5) * part.thrust;
                                thrustY += (r + 0.5) * part.thrust;
                            }
                        }
                    }
                }

                return {
                    com:
                        totalMass > 0
                            ? { x: weightedX / totalMass, y: weightedY / totalMass }
                            : null,
                    cot:
                        totalThrust > 0
                            ? { x: thrustX / totalThrust, y: thrustY / totalThrust }
                            : null,
                    totalMass,
                    totalThrust,
                };
            }

            validate() {
                const errors = [];
                const grid = this.grid;
                const rows = this.rows;
                const cols = this.cols;

                // Helper: Find all occupied slots
                let parts = [];
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const part = PARTS_CATALOG[grid[r][c]?.key];
                        if (part) parts.push({ ...part, r, c, stage: grid[r][c].stage });
                    }
                }

                if (parts.length === 0)
                    return { valid: false, errors: ["ROCKET IS EMPTY"] };

                // Check 1: No modules under ENGINE
                parts.forEach((p) => {
                    if (p.type === "ENGINE" || p.thrust > 0) {
                        for (let r = p.r + 1; r < rows; r++) {
                            const partBelow = grid[r][p.c];
                            if (partBelow) {
                                // ONLY an error if the part below is in the same stage or a LATER stage
                                if (partBelow.stage >= p.stage && p.stage !== 0) {
                                    errors.push(`BLOCKAGE: ${partBelow.key} under Engine at [${r}, ${p.c}] in Stage ${p.stage}`);
                                }
                            }
                        }
                    }
                });

                // Check 2: No modules above NOSE_CONE
                parts.forEach((p) => {
                    if (p.type === "NOSE_CONE") {
                        for (let r = p.r - 1; r >= 0; r--) {
                            if (grid[r][p.c]) {
                                errors.push(
                                    `AERO-FAIL: Part detected above Nose Cone at [${r}, ${p.c}]`,
                                );
                            }
                        }
                    }
                });

                // Check 3: Connectivity (Flood Fill)
                // Start from the first part found and see if we can reach all others
                const visited = new Set();
                const stack = [parts[0]];
                while (stack.length > 0) {
                    const { r, c } = stack.pop();
                    const key = `${r},${c}`;
                    if (visited.has(key)) continue;
                    visited.add(key);

                    // Check neighbors (up, down, left, right)
                    const neighbors = [
                        [r - 1, c],
                        [r + 1, c],
                        [r, c - 1],
                        [r, c + 1],
                    ];
                    neighbors.forEach(([nr, nc]) => {
                        if (
                            nr >= 0 &&
                            nr < rows &&
                            nc >= 0 &&
                            nc < cols &&
                            grid[nr][nc]
                        ) {
                            stack.push({ r: nr, c: nc });
                        }
                    });
                }

                if (visited.size < parts.length) {
                    errors.push("STRUCTURAL FAILURE: Floating modules detected");
                }

                return {
                    valid: errors.length === 0,
                    errors: errors,
                };
            }

            render() {
                const stages = document.getElementById("stages-list");
                stages.innerHTML = "";

                [0, 1, 2, 3].map(s => {
                    const btn = document.createElement("button");
                    btn.className = `stage-btn ${this.currentStage === s ? "selected" : ""}`;
                    btn.innerText = s === 0 ? "ROCKET" : `STAGE ${s}`;
                    btn.onclick = () => this.setStage(s);
                    stages.appendChild(btn);
                })

                // 1. Render Stages List
                const palette = document.getElementById("parts-palette");
                palette.innerHTML = "";

                Object.keys(PARTS_CATALOG).map((key) => {
                    const item = document.createElement("div");
                    item.className = `palette-item ${this.selectedPart === key ? "selected" : ""}`;
                    item.innerHTML = `${key}<br>${PARTS_CATALOG[key].symbol}`;
                    item.onclick = () => this.selectPart(key);

                    palette.appendChild(item);
                });

                // 2. Render Grid
                const gridEl = document.getElementById("constructor-grid");
                const slotSize = 65; // 60px + 5px margin total
                gridEl.style.width = `${slotSize * this.cols + 20}px`;

                gridEl.innerHTML = "";
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        const cell = this.grid[r][c];
                        const slot = document.createElement('div');
                        slot.className = `grid-slot ${cell ? 'occupied' : ''}`;
                        // Show Symbol + Stage Number (e.g., "|_| [0]")
                        slot.innerHTML = cell ? `${PARTS_CATALOG[cell.key].symbol}<br><small>S${cell.stage}</small>` : "";
                        slot.onclick = () => this.toggleSlot(r, c);
                        gridEl.appendChild(slot);
                    }
                }

                const centers = this.calculatePhysicsCenters();

                if (centers.com) {
                    const comMarker = document.createElement("div");
                    comMarker.className = "marker marker-com";
                    comMarker.style.left = `${(centers.com.x / this.cols) * 100}%`;
                    comMarker.style.top = `${(centers.com.y / this.rows) * 100}%`;
                    comMarker.innerText = "M";
                    gridEl.appendChild(comMarker);
                }

                if (centers.cot) {
                    const cotMarker = document.createElement("div");
                    cotMarker.className = "marker marker-cot";
                    cotMarker.style.left = `${(centers.cot.x / this.cols) * 100}%`;
                    cotMarker.style.top = `${(centers.cot.y / this.rows) * 100}%`;
                    cotMarker.innerText = "T";
                    gridEl.appendChild(cotMarker);
                }

                this.updateRocketStats();
            }

            updateRocketStats() {
                const blueprint = [];
                const centers = this.calculatePhysicsCenters();

                // Pass the thrust offset for physics (CoT.x - CoM.x)
                this.game.rocket.thrustOffset = centers.cot ? (centers.cot.x - centers.com.x) : 0;

                const stats = document.getElementById("rocket-stats");
                const launchBtn = document.querySelector(".launch-btn");
                const m = centers.totalMass;
                const t = centers.totalThrust;
                const twr = (t / (m * 9.8)).toFixed(2);

                let errorHTML = "";
                const validation = this.validate();
                if (!validation.valid) {
                    errorHTML = `<div style="color: #ff4141; margin-top: 10px; font-size: 11px;"> ${validation.errors.map((e) => `> ${e}`).join("<br>")} </div>`;
                    launchBtn.style.borderColor = "#ff4141";
                    launchBtn.style.color = "#ff4141";
                    launchBtn.disabled = true;
                    launchBtn.innerText = "SYSTEM ERROR";
                } else {
                    launchBtn.style.borderColor = "#00ff41";
                    launchBtn.style.color = "#00ff41";
                    launchBtn.disabled = false;
                    launchBtn.innerText = "IGNITION SEQUENCE";
                }

                stats.innerHTML = `
                    MASS: ${m}kg<br>
                    THRUST: ${t}kN<br>
                    TWR: <span style="color: ${twr > 1 ? "#00ff41" : "#ff4141"}">${twr}</span><br>
                    STB: ${this.game.rocket.getStabilityRating().toFixed(2)}<br>
                    ${errorHTML}
                `;
            }
        }


        /**
         * ENGINE / CORE GAME LOOP
         */
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.rocket = new Rocket();
                this.rocketBuilder = new RocketBuilder(this);

                this.stars = [];
                this.lastTime = 0;

                this.wind = 0;
                this.windTarget = 0;
                this.windTimer = 0;

                this.credits = 0;

                window.addEventListener('resize', () => this.resize());
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') this.rocket.isIgnited = true;
                    if (e.code === 'KeyS') this.rocket.separateNextStage();
                });

                this.resize();
                this.initRocket();

                requestAnimationFrame((t) => this.loop(t));
            }

            generateStars() {
                this.stars = [];
                for (let i = 0; i < STARS_COUNT; i++) {
                    this.stars.push(new Star(this.canvas));
                }
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.generateStars(); // Regrow stars on resize
            }

            initRocket() {
                this.rocket.buildFromBlueprint(this.rocketBuilder.getBlueprint());

                const centers = this.rocketBuilder.calculatePhysicsCenters();
                this.rocket.thrustOffset = centers.cot ? (centers.cot.x - centers.com.x) : 0;
            }

            checkFlightStatus() {
                const rocket = this.rocket;
                if (rocket.isCrashed) return; // Don't check status if already exploding

                // A. OFF-SCREEN CHECK
                const margin = 2;
                const halfWidth = this.canvas.width / 2;
                if (rocket.x < -halfWidth - margin || rocket.x > halfWidth + margin) {
                    this.triggerCrash("LOST IN SECTOR X: Out of Bounds");
                }

                // B. GROUND CHECK
                if (rocket.y <= 0) {
                    if (rocket.velocityY < -15 || Math.abs(rocket.tilt) > 0.5) {
                        this.triggerCrash("CRITICAL FAILURE: Impact Detected");
                    } else if (rocket.isIgnited && rocket.velocityY <= 0 && rocket.fuel <= 0) {
                        this.endRun("MISSION COMPLETE: Return to Hangar", rocket.maxAltitude);
                    }
                }
            }

            triggerCrash(message) {
                this.rocket.isCrashed = true;
                this.rocket.isIgnited = false;

                // Pause briefly to show the "Explosion" before the modal pops up
                setTimeout(() => {
                    this.endRun(message, this.rocket.maxAltitude);
                }, 1500); // 2 second delay
            }

            endRun(message, maxAltitude) {
                this.rocket.isIgnited = false;

                // Show the Modal
                const overlay = document.getElementById('modal-overlay');
                const msg = document.getElementById('modal-msg');
                const stats = document.getElementById('modal-stats');

                const retryBtn = document.getElementById('retry-btn');
                const hangarBtn = document.getElementById('hangar-btn');

                retryBtn.onclick = () => {
                    overlay.style.display = 'none';
                    this.retry();
                };
                hangarBtn.onclick = () => {
                    overlay.style.display = 'none';
                    this.renderHangar();
                };

                overlay.style.display = 'flex';
                msg.innerText = message;
                stats.innerHTML = `MAX ALTITUDE: ${Math.floor(maxAltitude)}m`;
            }

            retry() {
                this.rocket.reset();
            }

            updateWind(dt) {
                this.windTimer -= dt;

                // 1. Calculate Atmospheric Density (1.0 at ground, 0.0 at 25km)
                const atmosphereCeiling = 25000;
                const density = Math.max(0, 1 - (this.rocket.y / atmosphereCeiling));

                if (this.windTimer <= 0) {
                    // 2. The base wind speed is now multiplied by density
                    // Higher up = much weaker gusts
                    const baseForce = (Math.random() - 0.5) * 15;
                    this.windTarget = baseForce * density;

                    this.windTimer = 2 + Math.random() * 3;
                }

                // 3. Smooth transition
                this.wind += (this.windTarget - this.wind) * dt;
            }

            updateCamera() {
                const altitude = this.rocket.y;
                // Base scale is 3.0 (on ground). 
                // It will shrink as altitude increases.
                // At 10,000m, the scale will be 0.4
                const maxScale = 3.0;
                const minScale = 0.3;
                const maxAltitude = 15000;

                let targetScale = maxScale - (altitude / maxAltitude);
                this.cameraScale = Math.max(minScale, targetScale);
            }

            loop(time) {
                const dt = (time - this.lastTime) / 1000;
                this.lastTime = time;

                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.updateCamera();

                this.updateWind(dt);

                // Update Physics
                this.rocket.update(dt, this.wind);

                // Referee Check
                this.checkFlightStatus();

                // Rendering
                this.drawSky();
                this.stars.forEach(star => star.draw(this.ctx, this.canvas, this.rocket.x, this.rocket.y, this.rocket.velocityX, this.rocket.velocityY));
                this.drawGround(this.rocket.y);
                this.drawWindIndicator();
                this.rocket.draw(this.ctx, this.canvas, this.cameraScale);

                // UPDATE UI
                document.getElementById('stats').innerHTML = `
                    ALTITUDE: ${Math.floor(this.rocket.y)}m<br>
                    FUEL: ${Math.max(0, Math.floor(this.rocket.fuel))} units<br>
                    SPEED: ${Math.floor(this.rocket.velocityY)} m/s<br>
                    ACCEL: ${this.rocket.acceleration.toFixed(2)} m/s²<br>
                    WEIGHT: ${Math.floor(this.rocket.getWeight())} kg<br>
                    THRUST: ${Math.floor(this.rocket.getThrust())} kN<br>
                    STABILITY: ${this.rocket.getStabilityRating().toFixed(2)}
                `;

                logger.update(performance.now());

                requestAnimationFrame((t) => this.loop(t));
            }


            drawSky() {
                const alt = this.rocket.y;

                // Darkness factor: 0 at ground, 1 at 10k meters
                let darkness = Math.min(alt / 10000, 1);

                // Start with a Deep Atmospheric Blue: RGB(20, 30, 60)
                // Fade to Space Black: RGB(0, 0, 0)
                let r = Math.floor(20 * (1 - darkness));
                let g = Math.floor(30 * (1 - darkness));
                let b = Math.floor(60 * (1 - darkness));

                // Fill the background
                this.ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Subtle Horizon Glow (White/Light Blue)
                if (alt < 5000) {
                    let glowOpacity = (1 - (alt / 5000)) * 0.2;
                    let gradient = this.ctx.createLinearGradient(0, this.canvas.height - 400, 0, this.canvas.height - 150);

                    gradient.addColorStop(0, "rgba(0, 0, 0, 0)"); // Clear at the top
                    gradient.addColorStop(1, `rgba(100, 150, 255, ${glowOpacity})`); // Soft Blue at the bottom

                    this.ctx.fillStyle = gradient;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
            }

            drawGround(rocketY) {
                const groundBaseY = this.canvas.height - GROUND_INIT_ALTITUDE;
                const currentGroundY = groundBaseY + rocketY; // Moves down as rocket goes up

                // Only draw the ground if it's still visible on screen
                if (currentGroundY < this.canvas.height + 200) {
                    this.ctx.strokeStyle = "#00ff41";
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, currentGroundY);
                    this.ctx.lineTo(this.canvas.width, currentGroundY);
                    this.ctx.stroke();

                    // Draw the "Dirt" under the line so stars don't show through
                    this.ctx.fillStyle = "#0a0a0c";
                    this.ctx.fillRect(0, currentGroundY + 2, this.canvas.width, this.canvas.height);

                    // Draw some "Launch Pad" details
                    for (let i = -2; i <= 2; i++) {
                        let padX = (this.canvas.width / 2) + (i * 40);
                        this.ctx.strokeRect(padX - 10, currentGroundY - 6, 20, 5);
                    }
                }
            }

            drawWindIndicator() {
                const anchorX = this.canvas.width / 2; // The fixed position of the "|"
                const anchorY = 20;

                const maxLen = 3;
                const absWind = Math.abs(this.wind);
                const force = Math.min(Math.round(absWind), maxLen);

                this.ctx.fillStyle = "#00ff41";
                this.ctx.font = "12px monospace";
                this.ctx.textAlign = "center";
                this.ctx.fillText("WIND", anchorX, anchorY - 10);

                this.ctx.font = "bold 12px monospace";

                const len = this.ctx.measureText(`${absWind.toFixed(1)} kN`).width;


                if (this.wind > 0.5 && force > 0) {
                    const arrow = "|" + "=".repeat(force) + ">";
                    // this.ctx.textAlign = "left";
                    // this.ctx.fillText(arrow, anchorX, anchorY + 10);

                    this.ctx.fillText(`${absWind.toFixed(1)} kN`, anchorX, anchorY + 10);
                    this.ctx.textAlign = "left";
                    this.ctx.fillText(arrow, anchorX + len / 2, anchorY + 10);
                } else if (this.wind < -0.5 && force > 0) {
                    const arrow = "<" + "=".repeat(force) + "|";
                    // this.ctx.textAlign = "right";
                    // this.ctx.fillText(arrow, anchorX, anchorY + 10);

                    this.ctx.fillText(`${absWind.toFixed(1)} kN`, anchorX, anchorY + 10);
                    this.ctx.textAlign = "right";
                    this.ctx.fillText(arrow, anchorX - len / 2, anchorY + 10);
                } else {
                    // this.ctx.textAlign = "center";
                    // this.ctx.fillText("|", anchorX, anchorY + 10);
                    this.ctx.fillText(`${absWind.toFixed(1)} kN`, anchorX, anchorY + 10);
                }

                // Numerical readout centered under the anchor
                // this.ctx.textAlign = "center";
                // this.ctx.font = "10px monospace";
                // this.ctx.fillText(`${absWind.toFixed(1)} kN`, anchorX, anchorY + 35);
            }

            // HANGAR SCREEN
            renderHangar() {
                document.getElementById('hangar-screen').style.display = 'block';
                document.querySelector('.launch-btn').onclick = () => this.startMission();
                this.rocketBuilder.render();
            }

            startMission() {
                const validation = this.rocketBuilder.validate();
                if (!validation.valid) return;

                this.rocket.buildFromBlueprint(this.rocketBuilder.getBlueprint());

                document.getElementById('hangar-screen').style.display = 'none';
            }
        }

        const game = new Game();
    </script>
</body>

</html>
