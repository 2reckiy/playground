<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mystery Minimal Game with Abstract Energy</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #111;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // Dots and connections
      let dots = [];
      let connections = [];
      const CONNECT_DIST = 100;

      // Energy (abstract)
      let energy = 50; // max 50
      const energyCost = 5;

      // Ambient particles
      let particles = [];
      const MAX_PARTICLES = 100; // max at full energy

      // Create dot
      canvas.addEventListener("click", (e) => {
        if (energy >= energyCost) {
          dots.push({
            x: e.clientX,
            y: e.clientY,
            baseX: e.clientX,
            baseY: e.clientY,
            connected: false,
            vx: 0,
            vy: 0,
          });
          energy -= energyCost;
        }
      });

      // Distance helper
      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      // Particle helper
      function createParticles() {
        const particleCount = Math.floor((energy / 50) * MAX_PARTICLES);
        while (particles.length < particleCount) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            alpha: Math.random() * 0.5 + 0.1,
            fade: Math.random() * 0.02 + 0.005,
          });
        }
        if (particles.length > particleCount) particles.splice(particleCount);
      }

      // Update
      function update() {
        const tension = 0.02;
        const maxDeviation = 2;

        // Update particles
        createParticles();
        particles.forEach((p) => {
          p.alpha += (Math.random() - 0.5) * p.fade;
          if (p.alpha < 0) p.alpha = 0;
          if (p.alpha > 1) p.alpha = 1;
        });

        // Move dots slightly around base
        dots.forEach((dot) => {
          const movement = 1 + energy / 50; // movement amplitude depends on energy
          dot.vx += (Math.random() - 0.5) * 0.1 * movement;
          dot.vy += (Math.random() - 0.5) * 0.1 * movement;
          dot.vx += (dot.baseX - dot.x) * 0.01;
          dot.vy += (dot.baseY - dot.y) * 0.01;
          dot.x += dot.vx;
          dot.y += dot.vy;
          dot.vx *= 0.9;
          dot.vy *= 0.9;
        });

        // Find new connections
        for (let i = 0; i < dots.length; i++) {
          const a = dots[i];
          if (a.connected) continue;
          for (let j = i + 1; j < dots.length; j++) {
            const b = dots[j];
            if (b.connected) continue;
            if (distance(a, b) < CONNECT_DIST) {
              connections.push([a, b]);
              a.connected = true;
              b.connected = true;
              break;
            }
          }
        }

        // Attraction for connected dots
        connections.forEach((pair) => {
          const [a, b] = pair;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          a.vx += dx * tension;
          a.vy += dy * tension;
          b.vx -= dx * tension;
          b.vy -= dy * tension;
        });
      }

      // Draw
      function draw() {
        // Background brightness based on energy
        const bgAlpha = 0.05 + (energy / 50) * 0.2;
        ctx.fillStyle = `rgba(17,17,17,${1 - bgAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw ambient particles
        particles.forEach((p) => {
          ctx.fillStyle = `rgba(0,255,255,${p.alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          ctx.fill();
        });

        // Draw connections
        const lineAlpha = 0.1 + (energy / 50) * 0.9;
        ctx.strokeStyle = `rgba(0,255,255,${lineAlpha})`;
        ctx.lineWidth = 2;
        connections.forEach((pair) => {
          const [a, b] = pair;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        });

        // Draw dots with subtle alpha depending on energy
        const dotAlpha = 0.2 + (energy / 50) * 0.8;
        ctx.fillStyle = `rgba(255,255,255,${dotAlpha})`;
        dots.forEach((dot) => {
          ctx.beginPath();
          ctx.arc(dot.x, dot.y, 5, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      // Loop
      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }
      loop();

      // Resize
      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    </script>
  </body>
</html>
