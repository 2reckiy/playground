<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Master - Prototype</title>
    <style>
        :root {
            --bg: #0f0f13;
            --window: #1c1c24;
            --border: #343442;
            --accent: #ff9f43;
            --text: #d1d1e0;
            --panel-header: #252530;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
            font-size: 14px;
        }

        /* --- Stats Bar --- */
        header {
            height: 50px;
            background: #000;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .stat-pill {
            background: #222;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #444;
            font-weight: bold;
        }

        .stat-pill span {
            color: var(--accent);
        }

        /* --- Action Bar --- */
        .qty-bar {
            background: var(--panel-header);
            padding: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .qty-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 2px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
        }

        .qty-btn.active {
            background: var(--accent);
            color: #000;
            border-color: #fff;
        }

        /* --- Main Layout --- */
        main {
            display: grid;
            grid-template-columns: 260px 220px 1fr;
            gap: 10px;
            padding: 10px;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--window);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .panel-h {
            background: var(--panel-header);
            padding: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
        }

        .scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* --- Icon Grid --- */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 10px;
        }

        .icon-item {
            aspect-ratio: 1/1;
            background: #2a2a35;
            border: 2px solid #3f3f4f;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: 0.1s;
        }

        .icon-item:hover {
            border-color: var(--accent);
            background: #353545;
        }

        .icon-item span.emoji {
            font-size: 24px;
        }

        .icon-item .badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: #000;
            color: #fff;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 4px;
            border: 1px solid #555;
        }

        /* --- Forge Area (The Center) --- */
        .forge-active {
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .progress-wrap {
            background: #000;
            height: 8px;
            border-radius: 4px;
            margin: 8px 0;
            overflow: hidden;
            border: 1px solid #333;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9f43, #ff6b6b);
            width: 0%;
        }

        .q-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 11px;
            opacity: 0.7;
        }

        /* --- Buttons & Labels --- */
        .recipe-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            background: #2a2a35;
            border: 1px solid var(--border);
            color: #fff;
            padding: 5px;
            border-radius: 4px;
            margin-bottom: 5px;
            cursor: pointer;
            text-align: left;
        }

        .recipe-btn:hover {
            background: #3a3a4a;
        }

        .recipe-btn .emoji {
            font-size: 18px;
        }

        .recipe-btn div {
            font-size: 11px;
            line-height: 1.2;
        }

        /* Qualities */
        .q-Common {
            border-color: #555;
        }

        .q-Fine {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .q-Masterwork {
            border-color: #f1c40f;
            box-shadow: 0 0 8px rgba(241, 196, 15, 0.4);
        }

        footer {
            height: 30px;
            background: #000;
            font-size: 11px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            color: #666;
        }
    </style>
</head>

<body>

    <header>
        <div class="stat-pill">💰 <span id="gold">0</span></div>
        <div class="stat-pill">LVL <span id="level">1</span></div>
        <div class="stat-pill">XP <span id="xp-text">0/100</span></div>
    </header>

    <div class="qty-bar">
        <button class="qty-btn active" onclick="setQty(1)">x1</button>
        <button class="qty-btn" onclick="setQty(10)">x10</button>
        <button class="qty-btn" onclick="setQty(25)">x25</button>
        <button class="qty-btn" onclick="setQty(100)">x100</button>
    </div>

    <main>
        <div class="panel">
            <div class="panel-h">Market & Resources</div>
            <div class="scroll">
                <div class="icon-grid" id="market-grid"></div>
                <div class="panel-h" style="margin: 15px -10px 10px -10px; border-top: 1px solid var(--border);">
                    Automation</div>
                <div id="staff-list"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-h">The Forge</div>
            <div class="forge-active">
                <div id="active-icon" style="font-size: 30px; margin-bottom: 5px;">🔥</div>
                <div id="active-name" style="font-size: 12px; font-weight: bold;">Forge Idle</div>
                <div class="progress-wrap">
                    <div id="forge-fill" class="progress-fill"></div>
                </div>
                <ul id="queue-list" class="q-list"></ul>
            </div>
            <div class="scroll" id="recipe-list"></div>
        </div>

        <div class="panel">
            <div class="panel-h">Warehouse</div>
            <div class="scroll">
                <div class="icon-grid" id="inventory-grid"></div>
            </div>
        </div>
    </main>

    <footer>
        <div id="log">Awaiting orders, Master Smith.</div>
    </footer>

    <script>
        const state = {
            gold: 200, level: 1, xp: 0, nextLevelXp: 100,
            resources: { iron: 0, wood: 0 },
            inventory: [], queue: [], isCrafting: false, selectedQty: 1,
            marketModifiers: { iron: 1, wood: 1, sell: 1 }
        };

        const DATA = {
            resources: {
                iron: { id: 'iron', name: "Iron", emoji: "🪨", price: 10 },
                wood: { id: 'wood', name: "Wood", emoji: "🪵", price: 5 }
            },
            recipes: [
                { id: 'dagger', name: "Dagger", emoji: "🗡️", lv: 1, cost: { iron: 2 }, time: 1200, xp: 10, val: 30 },
                { id: 'axe', name: "Axe", emoji: "🪓", lv: 1, cost: { iron: 2, wood: 2 }, time: 2500, xp: 20, val: 55 },
                { id: 'shield', name: "Shield", emoji: "🛡️", lv: 1, cost: { wood: 6 }, time: 3500, xp: 30, val: 80 },
                { id: 'sword', name: "Sword", emoji: "⚔️", lv: 2, cost: { iron: 5, wood: 1 }, time: 5000, xp: 50, val: 150 },
                { id: 'helm', name: "Helmet", emoji: "🪖", lv: 3, cost: { iron: 8 }, time: 8000, xp: 100, val: 280 }
            ]
        };

        function setQty(n) {
            state.selectedQty = n;
            document.querySelectorAll('.qty-btn').forEach(btn =>
                btn.classList.toggle('active', parseInt(btn.innerText.replace('x', '')) === n)
            );
            updateUI();
        }

        function updateUI() {
            document.getElementById('gold').innerText = Math.floor(state.gold);
            document.getElementById('level').innerText = state.level;
            document.getElementById('xp-text').innerText = `${state.xp}/${state.nextLevelXp}`;

            // Market Icons
            let marketHTML = '';
            for (let r in DATA.resources) {
                let res = DATA.resources[r];
                let price = Math.ceil(res.price * state.marketModifiers[r]);
                marketHTML += `
                <div class="icon-item" onclick="buy('${r}', ${price})">
                    <span class="emoji">${res.emoji}</span>
                    <span class="badge" style="background:#444">x${state.resources[r]}</span>
                    <div style="font-size:9px; margin-top:2px;">${price * state.selectedQty}g</div>
                </div>`;
            }
            document.getElementById('market-grid').innerHTML = marketHTML;

            // Recipes (List)
            let recipeHTML = '';
            DATA.recipes.forEach(r => {
                if (state.level >= r.lv) {
                    let costs = Object.entries(r.cost).map(([m, q]) => `${ DATA.resources[m].emoji} ${q * state.selectedQty}`).join(" ");
                    recipeHTML += `
                    <div class="recipe-btn" onclick="addToQueue('${r.id}')">
                        <span class="emoji">${r.emoji}</span>
                        <div><strong>${r.name}</strong><br>${costs}</div>
                    </div>`;
                }
            });
            document.getElementById('recipe-list').innerHTML = recipeHTML;

            // Inventory Grid
            const grouped = state.inventory.reduce((acc, item) => {
                const key = `${item.id}-${item.q}`;
                if (!acc[key]) acc[key] = { ...item, count: 0 };
                acc[key].count++;
                return acc;
            }, {});

            let invHTML = '';
            Object.values(grouped).forEach(item => {
                let price = Math.floor(item.val * state.marketModifiers.sell);
                invHTML += `
                <div class="icon-item q-${item.q}" onclick="sell('${item.id}', '${item.q}', ${price})">
                    <span class="emoji">${item.emoji}</span>
                    <span class="badge">x${item.count}</span>
                    <div style="font-size:9px; margin-top:2px; color:#aaa">${price}g</div>
                </div>`;
            });
            document.getElementById('inventory-grid').innerHTML = invHTML;

            // Queue
            document.getElementById('queue-list').innerHTML = state.queue.slice(0, 5).map(i => `<li>${i.name}</li>`).join("");
        }

        function buy(res, price) {
            let total = price * state.selectedQty;
            if (state.gold >= total) {
                state.gold -= total;
                state.resources[res] += state.selectedQty;
                updateUI();
            }
        }

        function addToQueue(id) {
            const r = DATA.recipes.find(x => x.id === id);
            for (let i = 0; i < state.selectedQty; i++) state.queue.push({ ...r });
            if (!state.isCrafting) processQueue();
            updateUI();
        }

        function processQueue() {
            if (state.queue.length === 0) {
                state.isCrafting = false;
                document.getElementById('active-name').innerText = "Forge Idle";
                document.getElementById('active-icon').innerText = "🔥";
                updateUI();
                return;
            }

            const item = state.queue[0];
            for (let m in item.cost) {
                if (state.resources[m] < item.cost[m]) {
                    log(`Missing ${m}!`);
                    state.isCrafting = false;
                    return;
                }
            }

            for (let m in item.cost) state.resources[m] -= item.cost[m];
            state.queue.shift();
            state.isCrafting = true;

            document.getElementById('active-name').innerText = item.name;
            document.getElementById('active-icon').innerText = item.emoji;

            let start = null;
            let dur = item.time / (1 + (state.level * 0.2));

            function step(ts) {
                if (!start) start = ts;
                let pc = Math.min(((ts - start) / dur) * 100, 100);
                document.getElementById('forge-fill').style.width = pc + "%";
                if (ts - start < dur) requestAnimationFrame(step);
                else {
                    finish(item);
                    processQueue();
                }
            }
            requestAnimationFrame(step);
            updateUI();
        }

        function finish(item) {
            const roll = Math.random() * state.level;
            let q = roll > 8 ? "Masterwork" : (roll > 4 ? "Fine" : "Common");
            state.inventory.push({ ...item, q });
            state.xp += item.xp;
            if (state.xp >= state.nextLevelXp) {
                state.level++; state.xp = 0; state.nextLevelXp *= 2;
            }
            updateUI();
        }

        function sell(id, q, price) {
            let count = 0;
            for (let i = state.inventory.length - 1; i >= 0; i--) {
                if (state.inventory[i].id === id && state.inventory[i].q === q && count < state.selectedQty) {
                    state.inventory.splice(i, 1);
                    state.gold += price;
                    count++;
                }
            }
            updateUI();
        }

        function log(m) { document.getElementById('log').innerText = `[LOG]: ${m}`; }

        setInterval(() => {
            state.marketModifiers.iron = 0.7 + Math.random();
            state.marketModifiers.sell = 0.8 + Math.random() * 0.5;
            updateUI();
        }, 10000);

        updateUI();
    </script>
</body>

</html>
