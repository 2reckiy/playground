<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Racing Game</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #111;
      }
      canvas {
        background: #333;
        display: block;
        margin: 0 auto;
      }
      #hud {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-family: monospace;
        font-size: 14px;
        background: rgba(0, 0, 0, 0.4);
        padding: 6px 10px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud"></div>

    <script>
      // Canvas setup
      const canvas = document.getElementById("game");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const ctx = canvas.getContext("2d");

      const hud = document.getElementById("hud");

      // Track colors
      const TRACK_COLOR = "#555";
      const GRASS_COLOR = "#2b5";

      // Track generation
      const track = {
        w: canvas.width,
        h: canvas.height,
        innerRadius: 150,
        outerRadius: 250,
        cx: canvas.width / 2,
        cy: canvas.height / 2,
      };

      // Car state
      const car = {
        x: track.cx,
        y: track.cy - 50,
        angle: 0,
        vx: 0,
        vy: 0,
        speed: 0,
        maxSpeed: 4.5,
        accel: 0.15,
        turnSpeedBase: 0.045, // base turn
      };

      // Input state
      const keys = {};

      // Listen keyboard
      document.addEventListener("keydown", (e) => (keys[e.key] = true));
      document.addEventListener("keyup", (e) => (keys[e.key] = false));

      // Utility
      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      // Check if car is inside track (simple radius-based donut)
      function isCarOnTrack() {
        const dx = car.x - track.cx;
        const dy = car.y - track.cy;
        const d = Math.sqrt(dx * dx + dy * dy);

        return d > track.innerRadius && d < track.outerRadius;
      }

      // Draw track (simple circular track)
      function drawTrack() {
        // Grass
        ctx.fillStyle = GRASS_COLOR;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Outer circle
        ctx.beginPath();
        ctx.fillStyle = TRACK_COLOR;
        ctx.arc(track.cx, track.cy, track.outerRadius, 0, Math.PI * 2);
        ctx.fill();

        // Inner grass
        ctx.beginPath();
        ctx.fillStyle = GRASS_COLOR;
        ctx.arc(track.cx, track.cy, track.innerRadius, 0, Math.PI * 2);
        ctx.fill();
      }

      function update() {
        // INPUT AND SPEED
        let accelerating = keys["ArrowUp"] || keys["w"];
        let braking = keys["ArrowDown"] || keys["s"];
        let steeringLeft = keys["ArrowLeft"] || keys["a"];
        let steeringRight = keys["ArrowRight"] || keys["d"];

        if (accelerating) car.speed += car.accel;
        if (braking) car.speed -= car.accel * 0.7;

        car.speed = clamp(car.speed, -2, car.maxSpeed);

        // CONTROLLABILITY (speed reduces steering ability)
        let controllability = 1.0 - Math.abs(car.speed) / car.maxSpeed;
        controllability = clamp(controllability, 0.2, 1.0);

        let turnPower = car.turnSpeedBase * controllability;

        if (steeringLeft) car.angle -= turnPower;
        if (steeringRight) car.angle += turnPower;

        // Apply velocity from speed + angle
        car.vx = Math.cos(car.angle) * car.speed;
        car.vy = Math.sin(car.angle) * car.speed;

        // Drift decay (fast)
        if (!accelerating && !braking) {
          car.speed *= 0.88; // rapid decay
          if (Math.abs(car.speed) < 0.05) car.speed = 0;
        }

        // Position update
        car.x += car.vx;
        car.y += car.vy;

        // TRACK CHECK
        if (!isCarOnTrack()) {
          // Off-track penalty
          car.speed *= 0.85;
          car.vx *= 0.85;
          car.vy *= 0.85;
        }
      }

      function drawCar() {
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);

        ctx.fillStyle = "#f22";
        ctx.fillRect(-10, -20, 20, 40);

        ctx.restore();
      }

      function updateUI() {
        hud.innerHTML =
          "x: " +
          car.x.toFixed(2) +
          "<br>" +
          "y: " +
          car.y.toFixed(2) +
          "<br>" +
          "angle: " +
          car.angle.toFixed(2) +
          "<br>" +
          "speed: " +
          car.speed.toFixed(2) +
          "<br>" +
          "onTrack: " +
          isCarOnTrack();
      }

      function gameLoop() {
        update();
        drawTrack();
        drawCar();
        updateUI();

        requestAnimationFrame(gameLoop);
      }

      gameLoop();
    </script>
  </body>
</html>
