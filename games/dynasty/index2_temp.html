          // Avatar canvas
          const av = this._els.pmAvatar;
          av.width = 80;
          av.height = 80;
          const axc = av.getContext("2d");
          axc.clearRect(0, 0, 80, 80);
          axc.fillStyle = "#f2ead8";
          axc.fillRect(0, 0, 80, 80);
          renderer._drawFace(axc, 4, 3, 72, person, person.dead);

          // Traits
          const p = person.ph;
          const traits = [
            { n: "Health", v: p.health },
            { n: "Intelligence", v: p.intel },
            { n: "Charisma", v: p.charm },
            { n: "Aggression", v: p.aggr },
            { n: "Fertility", v: p.fert },
            { n: "Height", v: p.height },
          ];

          let html = traits
            .map(
              (t) => `
      <div class="trait-row">
        <span class="trait-label">${t.n}</span>
        <div class="trait-bar"><div class="trait-fill" style="width:${t.v}%"></div></div>
        <span class="trait-val">${Math.floor(t.v)}</span>
      </div>`,
            )
            .join("");

          // Physical appearance summary
          html += `<div style="margin-top:10px;font-size:11.5px;color:var(--clr-ink-faint);display:flex;gap:12px;flex-wrap:wrap;">
      <span>Hair: <strong style="color:var(--clr-ink-mid)">${p.hairName}</strong></span>
      <span>Eyes: <strong style="color:var(--clr-ink-mid)">${p.eyeName}</strong></span>
      <span>Skin: <strong style="color:var(--clr-ink-mid)">${p.skinName}</strong></span>
    </div>`;

          // Lifespan bar (living only)
          if (person.alive) {
            const pct = Math.min(100, person.lifeFraction(yr) * 100);
            html += `<div class="trait-row" style="margin-top:8px">
        <span class="trait-label">Lifespan</span>
        <div class="trait-bar"><div class="trait-fill" style="width:${pct}%;background:linear-gradient(90deg,#2a6e3a,#8b2020)"></div></div>
        <span class="trait-val">${Math.floor(person.age(yr))}/${Math.floor(person.lifespan)}</span>
      </div>`;
          }

          this._els.pmTraits.innerHTML = html;

          // Actions
          const actions = this._els.pmActions;
          actions.innerHTML = "";

          if (isPlayer && person.alive) {
            if (!person.married && person.age(yr) >= CONFIG.MARRY_AGE_MIN) {
              const mb = document.createElement("button");
              mb.className = "action-btn";
              mb.textContent = "⚭ Arrange Marriage";
              mb.addEventListener("click", () =>
                this._cb.onArrangeMarriage(person, world, renderer),
              );
              actions.appendChild(mb);
            }
            const rb = document.createElement("button");
            rb.className = "action-btn";
            rb.textContent = "✎ Rename";
            rb.addEventListener("click", () => {
              const newName = prompt("Enter new name:", person.name);
              if (newName?.trim()) {
                this._cb.onRename(person, newName.trim());
                this.openPersonModal(person, world, renderer);
              }
            });
            actions.appendChild(rb);
          }

          // Spouse
          if (person.spouseId) {
            const sp = world.getPerson(person.spouseId);
            if (sp) {
              const sb = document.createElement("button");
              sb.className = "action-btn";
              sb.textContent = `♥ ${sp.name}`;
              sb.addEventListener("click", () =>
                this.openPersonModal(sp, world, renderer),
              );
              actions.appendChild(sb);
            }
          }

          // Children
          if (person.childrenIds.length > 0) {
            const cb = document.createElement("button");
            cb.className = "action-btn";
            cb.textContent = `⚘ Children (${person.childrenIds.length})`;
            cb.addEventListener("click", () => {
              const lines = person.childrenIds.map((id) => {
                const c = world.getPerson(id);
                return c
                  ? `${c.name}  ${c.alive ? `(age ${Math.floor(c.age(yr))})` : "(deceased)"}`
                  : "?";
              });
              alert("Children of " + person.name + ":\n\n" + lines.join("\n"));
            });
            actions.appendChild(cb);
          }

          this._els.personModal.classList.add("visible");
          this._els.overlay.classList.add("visible");
        }

        closePersonModal() {
          this._els.personModal.classList.remove("visible");
          this._els.overlay.classList.remove("visible");
        }

        // ── Milestone Banner ──────────────────────────────────────────
        showMilestone(title, body) {
          this._els.msTitle.textContent = title;
          this._els.msBody.textContent = body;
          const b = this._els.msBanner;
          b.classList.remove("visible");
          void b.offsetWidth; // reflow
          b.classList.add("visible");
          setTimeout(() => b.classList.remove("visible"), 3800);
        }

        // ── Setup Screen ──────────────────────────────────────────────
        hideSetupScreen() {
          const s = document.getElementById("setup-screen");
          s.style.transition = "opacity 0.4s ease";
          s.style.opacity = "0";
          setTimeout(() => {
            s.style.display = "none";
          }, 420);
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   INPUT MANAGER  — keyboard, mouse, touch.
   Communicates via callback map.
═══════════════════════════════════════════════════════════════ */
      class InputManager {
        /**
         * @param {HTMLCanvasElement} canvas
         * @param {Object} callbacks — { onSpeed, onHome, onClick, onDrag, onZoom }
         */
        constructor(canvas, callbacks) {
          this._canvas = canvas;
          this._cb = callbacks;
          this._drag = false;
          this._didDrag = false;
          this._last = { x: 0, y: 0 };
          this._touchDist = 0;

          this._bindKeyboard();
          this._bindMouse();
          this._bindTouch();
        }

        _bindKeyboard() {
          window.addEventListener("keydown", (e) => {
            switch (e.key) {
              case " ":
                e.preventDefault();
                this._cb.onSpeed("toggle");
                break;
              case "1":
                this._cb.onSpeed(1);
                break;
              case "2":
                this._cb.onSpeed(2);
                break;
              case "3":
                this._cb.onSpeed(3);
                break;
              case "4":
                this._cb.onSpeed(4);
                break;
              case "h":
              case "H":
                this._cb.onHome();
                break;
            }
          });
        }

        _bindMouse() {
          const cv = this._canvas;

          cv.addEventListener("mousedown", (e) => {
            this._drag = true;
            this._didDrag = false;
            this._last = { x: e.clientX, y: e.clientY };
            cv.classList.add("dragging");
          });

          cv.addEventListener("mousemove", (e) => {
            if (!this._drag) return;
            const dx = e.clientX - this._last.x;
            const dy = e.clientY - this._last.y;
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) this._didDrag = true;
            this._cb.onDrag(dx, dy);
            this._last = { x: e.clientX, y: e.clientY };
          });

          cv.addEventListener("mouseup", (e) => {
            cv.classList.remove("dragging");
            if (!this._didDrag) this._cb.onClick(e.clientX, e.clientY);
            this._drag = false;
            this._didDrag = false;
          });

          cv.addEventListener("mouseleave", () => {
            this._drag = false;
            cv.classList.remove("dragging");
          });

          cv.addEventListener(
            "wheel",
            (e) => {
              e.preventDefault();
              const factor =
                e.deltaY < 0
                  ? 1 + CONFIG.ZOOM_SPEED
                  : 1 / (1 + CONFIG.ZOOM_SPEED);
              this._cb.onZoom(factor, e.clientX, e.clientY);
            },
            { passive: false },
          );
        }

        _bindTouch() {
          const cv = this._canvas;

          cv.addEventListener(
            "touchstart",
            (e) => {
              if (e.touches.length === 1) {
                this._drag = true;
                this._didDrag = false;
                this._last = {
                  x: e.touches[0].clientX,
                  y: e.touches[0].clientY,
                };
              } else if (e.touches.length === 2) {
                this._touchDist = Math.hypot(
                  e.touches[0].clientX - e.touches[1].clientX,
                  e.touches[0].clientY - e.touches[1].clientY,
                );
              }
            },
            { passive: true },
          );

          cv.addEventListener(
            "touchmove",
            (e) => {
              if (e.touches.length === 1 && this._drag) {
                const dx = e.touches[0].clientX - this._last.x;
                const dy = e.touches[0].clientY - this._last.y;
                if (Math.abs(dx) > 2) this._didDrag = true;
                this._cb.onDrag(dx, dy);
                this._last = {
                  x: e.touches[0].clientX,
                  y: e.touches[0].clientY,
                };
              } else if (e.touches.length === 2) {
                const d = Math.hypot(
                  e.touches[0].clientX - e.touches[1].clientX,
                  e.touches[0].clientY - e.touches[1].clientY,
                );
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                this._cb.onZoom(d / this._touchDist, midX, midY);
                this._touchDist = d;
              }
            },
            { passive: true },
          );

          cv.addEventListener(
            "touchend",
            (e) => {
              if (e.touches.length === 0) {
                if (!this._didDrag && e.changedTouches.length === 1) {
                  const t = e.changedTouches[0];
                  this._cb.onClick(t.clientX, t.clientY);
                }
                this._drag = false;
              }
            },
            { passive: true },
          );
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   GAME ENGINE  — orchestrator.
   Owns World, Sim, Renderer, UIManager, InputManager.
   Manages RAF loop, speed, game lifecycle.
═══════════════════════════════════════════════════════════════ */
      class GameEngine {
        constructor() {
          this.world = null;
          this.sim = null;
          this.renderer = null;
          this.ui = null;
          this.input = null;

          this._running = false;
          this._speedIdx = 0; // index into CONFIG.SPEEDS (0 = paused)
          this._lastTick = 0;
          this._raf = null;
        }

        // ── Initialise ────────────────────────────────────────────────
        /**
         * Called once from setup screen.
         * @param {Object} cfg  — { dynastyName, founderName, npcCount, startYear, winDominance, difficulty }
         */
        init(cfg) {
          // Apply to CONFIG
          CONFIG.NPC_HOUSES = cfg.npcCount;
          CONFIG.START_YEAR = cfg.startYear;
          CONFIG.WIN_DOMINANCE = cfg.winDominance;
          CONFIG.DIFFICULTY = cfg.difficulty;

          RNG.setSeed(Date.now() & 0xffffff || 1);

          // World
          this.world = new World();
          this.world.year = cfg.startYear;

          this._buildWorld(cfg);

          // Subsystems
          this.sim = new Sim(this.world, (msg, type) => {
            this.ui?.pushEvent(msg, type, this.world.year);
          });

          this.renderer = new Renderer(document.getElementById("canvas"));
          this.renderer.camera.x = this.world.getPlayerHouse().worldX;
          this.renderer.camera.y = this.world.getPlayerHouse().worldY;
          this.renderer.camera.z = 0.4;

          this.ui = new UIManager({
            onAcceptProposal: (aid, bid) => {
              this.sim.acceptProposal(aid, bid);
              this.renderer.markDirty();
            },
            onDeclineProposal: (aid, bid) => {
              this.world.proposals = this.world.proposals.filter(
                (pr) => !(pr.proposerId === aid && pr.candidateId === bid),
              );
              this.ui.updateHUD(this.world);
            },
            onArrangeMarriage: (person, world, renderer) => {
              this._openMarriageSelection(person);
            },
            onRename: (person, name) => {
              person.name = name;
            },
          });

          this.input = new InputManager(document.getElementById("canvas"), {
            onSpeed: (s) => this._handleSpeed(s),
            onHome: () => this._goHome(),
            onClick: (sx, sy) => this._handleClick(sx, sy),
            onDrag: (dx, dy) => {
              this.renderer.camera.pan(dx, dy);
            },
            onZoom: (factor, sx, sy) => {
              const c = this.renderer.camera;
              c.zoomAt(
                factor,
                sx,
                sy,
                this.renderer.canvas.width,
                this.renderer.canvas.height,
              );
            },
          });

          this._bindSpeedButtons();
          this.ui.hideSetupScreen();

          // Initial layout + HUD
          this.renderer.rebuildLayouts(this.world);
          this.ui.updateHUD(this.world);
          this.ui.pushEvent(
            `House ${cfg.dynastyName} is founded by ${cfg.founderName}. The dynasty begins.`,
            "gold",
            cfg.startYear,
          );
          this.ui.pushEvent(
            `${cfg.npcCount} rival houses stand across the realm.`,
            "n",
            cfg.startYear,
          );

          // Start
          this._setSpeed(CONFIG.DEFAULT_SPEED);
          this._running = true;
          this._lastTick = performance.now();
          this._raf = requestAnimationFrame((ts) => this._loop(ts));
        }

        // ── World construction ────────────────────────────────────────
        _buildWorld(cfg) {
          const W = this.world;
          const usedNames = new Set([cfg.dynastyName]);

          // Player house
          const ph = new House({
            name: cfg.dynastyName,
            colour: CONFIG.HOUSE_COLOURS[0],
            isPlayer: true,
          });
          W.houses.push(ph);
          W.playerHouseId = ph.id;

          // Founder
          const founder = new Person({
            name: cfg.founderName,
            gender: "M",
            birthYear: cfg.startYear - RNG.int(24, 38),
            houseId: ph.id,
            genome: new Genome(),
          });
          W.addPerson(founder);
          ph.founderId = founder.id;

          // NPC houses
          const houseNamePool = NAMES.house.filter(
            (n) => n !== cfg.dynastyName,
          );

          for (let i = 0; i < cfg.npcCount; i++) {
            let hn;
            do {
              hn = RNG.pick(houseNamePool);
            } while (usedNames.has(hn));
            usedNames.add(hn);

            const house = new House({
              name: hn,
              colour:
                CONFIG.HOUSE_COLOURS[(i + 1) % CONFIG.HOUSE_COLOURS.length],
            });
            W.houses.push(house);

            // Seed members
            const count = RNG.int(3, 9);
            const males = [],
              females = [];

            for (let j = 0; j < count; j++) {
              const g = j === 0 ? "M" : RNG.bool(0.5) ? "M" : "F";
              const age = j === 0 ? RNG.int(24, 48) : RNG.int(1, 44);
              const p = new Person({
                name: RNG.pick(g === "M" ? NAMES.male : NAMES.female),
                gender: g,
                birthYear: cfg.startYear - age,
                houseId: house.id,
                genome: new Genome(),
              });
              W.addPerson(p);
              if (j === 0) house.founderId = p.id;
              if (g === "M" && age >= CONFIG.MARRY_AGE_MIN) males.push(p);
              if (g === "F" && age >= CONFIG.MARRY_AGE_MIN) females.push(p);
            }

            // Initial marriages within house
            const pairs = Math.min(males.length, females.length);
            for (let k = 0; k < pairs; k++) {
              if (RNG.bool(0.65))
                this.sim?._doMarry(males[k], females[k]) ??
                  (() => {
                    // sim not yet constructed; do manually
                    males[k].spouseId = females[k].id;
                    females[k].spouseId = males[k].id;
                  })();
            }
          }

          // Assign world positions
          this._assignPositions();
        }

        _assignPositions() {
          const W = this.world;
          const ph = W.getPlayerHouse();
          ph.worldX = 0;
          ph.worldY = 0;

          const others = W.houses.filter((h) => !h.isPlayer);
          others.forEach((h, i) => {
            const angle =
              (i / others.length) * Math.PI * 2 + RNG.float(-0.1, 0.1);
            const tier = Math.floor(i / 8);
            const radius =
              CONFIG.HOUSE_RING * (1 + tier * 0.7) + RNG.float(-200, 200);
            h.worldX = Math.cos(angle) * radius;
            h.worldY = Math.sin(angle) * radius;
          });
        }

        // ── RAF loop ──────────────────────────────────────────────────
        _loop(timestamp) {
          if (!this._running) return;

          const interval = CONFIG.SPEEDS[this._speedIdx];

          if (interval > 0 && timestamp - this._lastTick >= interval) {
            this._lastTick = timestamp;

            this.sim.tick();
            this.renderer.markDirty();
            this.ui.updateHUD(this.world);
            this.ui.renderProposals(this.world);

            // Milestone check (sim.tick returns milestone info via _checkMilestones)
            // We re-check here for banner
            const age = this.world.year - CONFIG.START_YEAR;
            for (const ms of CONFIG.MILESTONES) {
              if (age === ms) {
                const ph = this.world.getPlayerHouse();
                this.ui.showMilestone(
                  `${ms} Years`,
                  `House ${ph?.name ?? ""} endures — ${ph?.getSize(this.world) ?? 0} members living`,
                );
              }
            }

            // Win/lose
            const cond = this.sim.checkConditions();
            if (cond) this._gameOver(cond);
          }

          this.renderer.draw(this.world);
          this._raf = requestAnimationFrame((ts) => this._loop(ts));
        }

        // ── Speed ─────────────────────────────────────────────────────
        _handleSpeed(s) {
          if (s === "toggle") {
            this._setSpeed(this._speedIdx === 0 ? CONFIG.DEFAULT_SPEED : 0);
          } else {
            this._setSpeed(s);
          }
        }

        _setSpeed(idx) {
          this._speedIdx = Math.max(0, Math.min(CONFIG.SPEEDS.length - 1, idx));
          this._lastTick = performance.now();

          document
            .querySelectorAll(".speed-btn")
            .forEach((b) => b.classList.remove("active"));
          const ids = {
            0: "btn-pause",
            1: "btn-s1",
            2: "btn-s2",
            3: "btn-s3",
            4: "btn-s4",
          };
          const target = document.getElementById(ids[this._speedIdx]);
          if (target) target.classList.add("active");

          const labels = {
            0: "— paused",
            1: "1 yr/s",
            2: "2 yr/s",
            3: "5 yr/s",
            4: "10 yr/s",
          };
          document.getElementById("speed-label").textContent =
            labels[this._speedIdx] ?? "";
        }

        _bindSpeedButtons() {
          document
            .getElementById("btn-pause")
            .addEventListener("click", () => this._setSpeed(0));
          document
            .getElementById("btn-s1")
            .addEventListener("click", () => this._setSpeed(1));
          document
            .getElementById("btn-s2")
            .addEventListener("click", () => this._setSpeed(2));
          document
            .getElementById("btn-s3")
            .addEventListener("click", () => this._setSpeed(3));
          document
            .getElementById("btn-s4")
            .addEventListener("click", () => this._setSpeed(4));
        }

        // ── Camera ────────────────────────────────────────────────────
        _goHome() {
          const ph = this.world?.getPlayerHouse();
          if (!ph) return;
          this.renderer.camera.x = ph.worldX;
          this.renderer.camera.y = ph.worldY;
          this.renderer.camera.z = 0.45;
        }

        // ── Click / Hit-test ──────────────────────────────────────────
        _handleClick(sx, sy) {
          if (!this.world) return;
          const person = this.renderer.hitTest(sx, sy, this.world);
          if (person) {
            this.ui.openPersonModal(person, this.world, this.renderer);
          }
        }

        // ── Marriage selection ────────────────────────────────────────
        _openMarriageSelection(person) {
          const W = this.world;
          const candidates = [];

          for (const house of W.houses) {
            if (house.isPlayer) continue;
            for (const p of house.getLiving(W)) {
              if (
                p.gender !== person.gender &&
                !p.married &&
                p.age(W.year) >= CONFIG.MARRY_AGE_MIN &&
                p.age(W.year) <= CONFIG.MARRY_AGE_MAX
              ) {
                candidates.push({ person: p, house });
              }
            }
          }

          if (!candidates.length) {
            alert("No suitable candidates are available at this time.");
            return;
          }

          // Sort by combined fitness
          candidates.sort(
            (a, b) =>
              b.person.ph.charm +
              b.person.ph.fert +
              b.person.ph.health -
              (a.person.ph.charm + a.person.ph.fert + a.person.ph.health),
          );

          // Build a simple modal (reuse overlay + a quick inline panel)
          // For now: prompt-based selection (full marriage UI comes in next step)
          const topN = candidates.slice(0, 12);
          const lines = topN.map(
            (c, i) =>
              `${i + 1}. ${c.person.name} — House ${c.house.name}  ` +
              `(♥${Math.floor(c.person.ph.charm)} ✦${Math.floor(c.person.ph.intel)} ` +
              `⚘${Math.floor(c.person.ph.fert)}) age ${Math.floor(c.person.age(W.year))}`,
          );
          const choice = prompt(
            `Choose a spouse for ${person.name}:\n\n${lines.join("\n")}\n\nEnter number (1–${topN.length}):`,
          );
          const idx = parseInt(choice) - 1;
          if (idx >= 0 && idx < topN.length) {
            const { person: cand } = topN[idx];
            this.sim.arrangeMarriage(person.id, cand.id);
            this.renderer.markDirty();
            this.ui.closePersonModal();
          }
        }

        // ── Game Over ─────────────────────────────────────────────────
        _gameOver(reason) {
          this._setSpeed(0);
          const ph = this.world.getPlayerHouse();
          const years = this.world.year - CONFIG.START_YEAR;
          const score = Math.floor(this.world.legacyScore).toLocaleString();

          setTimeout(() => {
            if (reason === "extinction") {
              alert(
                `✝ Dynasty Extinct\n\n` +
                  `House ${ph?.name ?? ""} has died out after ${years} years.\n` +
                  `Legacy Score: ${score}`,
              );
            } else {
              alert(
                `✦ Victory — Gene Dominance\n\n` +
                  `Your bloodline flows through ${CONFIG.WIN_DOMINANCE}%+ of all nobles.\n` +
                  `Years of rule: ${years}\n` +
                  `Legacy Score: ${score}`,
              );
            }
          }, 200);
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   SETUP  — reads form, boots GameEngine
═══════════════════════════════════════════════════════════════ */
      const GE = new GameEngine();

      document.getElementById("start-btn").addEventListener("click", () => {
        const dynastyName =
          document.getElementById("in-dynasty").value.trim() || "Aldric";
        const founderName =
          document.getElementById("in-founder").value.trim() || "Edmund";
        const npcCount = Math.max(
          2,
          Math.min(30, parseInt(document.getElementById("in-npc").value) || 8),
        );
        const startYear = Math.max(
          0,
          parseInt(document.getElementById("in-year").value) || 900,
        );
        const winDominance = Math.max(
          10,
          Math.min(95, parseInt(document.getElementById("in-win").value) || 60),
        );
        const difficulty = document.getElementById("in-diff").value || "normal";

        GE.init({
          dynastyName,
          founderName,
          npcCount,
          startYear,
          winDominance,
          difficulty,
        });
      });
    </script>
  </body>
</html>
