<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tile Build & Gather Prototype</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, Segoe UI, Roboto, Arial;
        background: #111;
        color: #eee;
      }
      #container {
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #left {
        flex: 1;
        position: relative;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
        cursor: crosshair;
      }
      #ui {
        width: 320px;
        background: #0f1720;
        padding: 12px;
        box-sizing: border-box;
        border-left: 1px solid rgba(255, 255, 255, 0.04);
      }
      h1 {
        font-size: 16px;
        margin: 4px 0 12px;
      }
      .resources {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .res {
        background: #071018;
        padding: 8px 10px;
        border-radius: 6px;
        min-width: 90px;
        text-align: center;
      }
      .palette {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .palette button {
        background: #0b1220;
        border: 1px solid rgba(255, 255, 255, 0.04);
        color: #e6eef5;
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
        text-align: left;
      }
      .palette button.selected {
        outline: 2px solid #6ee7b7;
      }
      .legend {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tilekey {
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 6px 8px;
        background: #071018;
        border-radius: 6px;
        font-size: 13px;
      }
      .tilecolor {
        width: 18px;
        height: 18px;
        border-radius: 3px;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      footer {
        margin-top: 12px;
        font-size: 12px;
        opacity: 0.8;
        color: #a7b0be;
      }
      #tooltip {
        position: absolute;
        pointer-events: none;
        padding: 6px 8px;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 6px;
        font-size: 13px;
        color: #fff;
        transform: translate(6px, 6px);
        display: none;
        z-index: 10;
      }
      .hint {
        font-size: 13px;
        opacity: 0.9;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="left">
        <canvas id="c"></canvas>
        <div id="tooltip"></div>
      </div>
      <div id="ui">
        <h1>Build & Gather — Prototype</h1>
        <div class="resources" id="resources"></div>

        <div style="margin-bottom: 8px">Select a building to place:</div>
        <div class="palette" id="palette"></div>

        <div class="hint">
          Left-click tile to build. Right-click to remove. Hover tiles for info.
        </div>

        <div class="legend" id="legend"></div>

        <footer>Prototype — procedural map & resource generation</footer>
      </div>
    </div>

    <script>
      /* ---------- Simple value-noise (smoothed) for terrain generation ---------- */
      // Small seeded PRNG
      function createRNG(seed) {
        let s = seed >>> 0;
        return function () {
          s = (s + 0x6d2b79f5) >>> 0;
          let t = Math.imul(s ^ (s >>> 15), 1 | s);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      function lerp(a, b, t) {
        return a + (b - a) * t;
      }
      function smoothstep(t) {
        return t * t * (3 - 2 * t);
      }
      function valueNoise2D(x, y, rng) {
        // grid cell
        const xi = Math.floor(x),
          yi = Math.floor(y);
        const xf = x - xi,
          yf = y - yi;
        // pseudo-random values at corners using rng seeded by coords
        function v(ix, iy) {
          // simple integer hash to seed small RNG
          const seed = ((ix * 374761393) ^ (iy * 668265263)) >>> 0;
          const r = createRNG(seed);
          return r();
        }
        const v00 = v(xi, yi),
          v10 = v(xi + 1, yi),
          v01 = v(xi, yi + 1),
          v11 = v(xi + 1, yi + 1);
        const sx = smoothstep(xf),
          sy = smoothstep(yf);
        const a = lerp(v00, v10, sx);
        const b = lerp(v01, v11, sx);
        return lerp(a, b, sy);
      }

      /* ---------- Map & tiles ---------- */
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d", { alpha: false });
      let DPR = window.devicePixelRatio || 1;

      let TILE_SIZE = 28; // pixels (CSS)
      let MAP_W = 40; // tiles
      let MAP_H = 28;
      let seed = Math.floor(Math.random() * 999999);
      const rng = createRNG(seed);

      let map = []; // tiles
      const TERRAIN = [
        { id: "water", thresh: 0.25, color: "#1f4b8f", name: "Water" },
        { id: "sand", thresh: 0.33, color: "#c9a66b", name: "Sand" },
        { id: "grass", thresh: 0.62, color: "#6abb6a", name: "Grass" },
        { id: "soil", thresh: 0.72, color: "#6b4b2b", name: "Soil" },
        { id: "wood", thresh: 0.82, color: "#2f6b3b", name: "Wood" }, // forest/wood
        { id: "mountain", thresh: 0.92, color: "#8b8f95", name: "Mountain" },
        { id: "ore", thresh: 1.01, color: "#7a5a53", name: "Ore" }, // high noise -> ore veins
      ];

      // Building definitions
      const BUILDINGS = {
        Farm: {
          id: "farm",
          cost: { food: 0, wood: 2, stone: 0, ore: 0 },
          allowed: ["grass", "soil"],
          produce: { food: 1 },
          interval: 2000,
          icon: "🌾",
          desc: "Produces food from grass/soil.",
        },
        Lumbermill: {
          id: "lumber",
          cost: { food: 0, wood: 0, stone: 0, ore: 0 },
          allowed: ["wood"],
          produce: { wood: 1 },
          interval: 1800,
          icon: "🪵",
          desc: "Produces wood on wood tiles.",
        },
        Mine: {
          id: "mine",
          cost: { food: 0, wood: 2, stone: 1, ore: 0 },
          allowed: ["ore", "mountain"],
          produce: { ore: 1 },
          interval: 3000,
          icon: "⛏️",
          desc: "Produces ore from ore or mountain tiles.",
        },
        Quarry: {
          id: "quarry",
          cost: { food: 0, wood: 1, stone: 0, ore: 0 },
          allowed: ["mountain", "soil"],
          produce: { stone: 1 },
          interval: 2500,
          icon: "🪨",
          desc: "Produces stone.",
        },
      };

      // Resources state
      let resources = { food: 5, wood: 6, stone: 3, ore: 0 };

      // Buildings on tiles
      // tile.building -> { key: 'Farm', builtAt:time, timerAcc:0 }
      function generateMap() {
        map = [];
        // scale controls the "zoom" of noise
        const scale = 0.09 + rng() * 0.06;
        for (let y = 0; y < MAP_H; y++) {
          const row = [];
          for (let x = 0; x < MAP_W; x++) {
            // Combine multiple octaves for richer terrain
            let n = 0;
            let amp = 1,
              freq = 1,
              max = 0;
            for (let o = 0; o < 4; o++) {
              n += valueNoise2D(x * freq * scale, y * freq * scale) * amp;
              max += amp;
              amp *= 0.5;
              freq *= 2;
            }
            n /= max;
            // add small coastline bias
            const cx = Math.abs(x - MAP_W / 2) / (MAP_W / 2);
            const cy = Math.abs(y - MAP_H / 2) / (MAP_H / 2);
            const dist = Math.sqrt(cx * cx + cy * cy) / Math.sqrt(2);
            // make center slightly more landy
            n = n * (1 - 0.35 * dist) + 0.02;
            const t = TERRAIN.find((ti) => n <= ti.thresh);
            row.push({
              x,
              y,
              noise: n,
              terrain: t.id,
              terrainName: t.name,
              building: null,
            });
          }
          map.push(row);
        }
      }

      // Drawing
      function resizeCanvas() {
        // adjust tile size to fit container responsively
        const left = document.getElementById("left");
        const rect = left.getBoundingClientRect();
        // set tile size so map fills most of left area but keeps tiles square
        const maxTileX = Math.floor(rect.width / TILE_SIZE);
        // keep tile size constant for now; or adapt if window small
        canvas.width = Math.floor(rect.width * DPR);
        canvas.height = Math.floor(rect.height * DPR);
        canvas.style.width = rect.width + "px";
        canvas.style.height = rect.height + "px";
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      }
      window.addEventListener("resize", () => {
        DPR = window.devicePixelRatio || 1;
        resizeCanvas();
      });

      // map->screen transform helpers
      function tileToScreen(tx, ty) {
        const left = 0,
          top = 0;
        return {
          sx: tx * TILE_SIZE + left,
          sy: ty * TILE_SIZE + top,
          sw: TILE_SIZE,
          sh: TILE_SIZE,
        };
      }
      function screenToTile(px, py) {
        const tx = Math.floor(px / TILE_SIZE);
        const ty = Math.floor(py / TILE_SIZE);
        if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return null;
        return { tx, ty };
      }

      // Render loop
      let lastRender = 0;
      function draw(now) {
        // clear
        ctx.fillStyle = "#041018";
        ctx.fillRect(0, 0, canvas.width / DPR, canvas.height / DPR);

        // center the map in canvas
        const mapPixelW = MAP_W * TILE_SIZE;
        const mapPixelH = MAP_H * TILE_SIZE;
        const cx = Math.max(0, (canvas.width / DPR - mapPixelW) / 2);
        const cy = Math.max(0, (canvas.height / DPR - mapPixelH) / 2);

        ctx.save();
        ctx.translate(cx, cy);

        // draw tiles
        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            const tile = map[y][x];
            const s = tileToScreen(x, y);
            // find color
            const tinfo = TERRAIN.find((t) => t.id === tile.terrain);
            ctx.fillStyle = tinfo.color;
            ctx.fillRect(s.sx, s.sy, s.sw, s.sh);

            // draw subtle noise overlay for texture
            // ctx.fillStyle = "rgba(0,0,0,0.06)";
            // if (tile.noise > 0.85) ctx.fillStyle = "rgba(0,0,0,0.12)";
            // ctx.fillRect(s.sx, s.sy + s.sh - 4, s.sw, 2);

            // grid
            ctx.strokeStyle = "rgba(0,0,0,0.12)";
            ctx.lineWidth = 1;
            ctx.strokeRect(s.sx + 0.5, s.sy + 0.5, s.sw - 1, s.sh - 1);

            // if building present, draw icon
            if (tile.building) {
              // background plate
              ctx.fillStyle = "rgba(0,0,0,0.4)";
              ctx.fillRect(s.sx + 4, s.sy + 4, s.sw - 8, s.sh - 8);
              ctx.font = s.sw - 8 + "px sans-serif";
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillStyle = "#fff";
              ctx.fillText(
                tile.building.icon || "B",
                s.sx + s.sw / 2,
                s.sy + s.sh / 2 + 1
              );
            }
          }
        }

        // hover highlight
        if (hoverTile) {
          const s = tileToScreen(hoverTile.tx, hoverTile.ty);
          ctx.strokeStyle = "rgba(110,231,183,0.95)";
          ctx.lineWidth = 2;
          ctx.strokeRect(s.sx + 1.5, s.sy + 1.5, s.sw - 3, s.sh - 3);
          // transparent overlay
          ctx.fillStyle = "rgba(110,231,183,0.06)";
          ctx.fillRect(s.sx, s.sy, s.sw, s.sh);
        }

        ctx.restore();

        lastRender = now;
        requestAnimationFrame(draw);
      }

      /* ---------- UI building and interactions ---------- */
      const paletteEl = document.getElementById("palette");
      const resourcesEl = document.getElementById("resources");
      const legendEl = document.getElementById("legend");
      const tooltip = document.getElementById("tooltip");

      let selectedBuildingKey = null;
      function buildPalette() {
        paletteEl.innerHTML = "";
        Object.keys(BUILDINGS).forEach((k) => {
          const b = BUILDINGS[k];
          const btn = document.createElement("button");
          btn.innerHTML = `<strong style="margin-right:8px">${b.icon}</strong> <div style="display:inline-block"><div style="font-weight:600">${k}</div><div style="font-size:12px;opacity:0.8">${b.desc}</div></div>`;
          btn.onclick = () => {
            selectedBuildingKey = selectedBuildingKey === k ? null : k;
            refreshPalette();
          };
          paletteEl.appendChild(btn);
        });
        refreshPalette();
      }
      function refreshPalette() {
        Array.from(paletteEl.children).forEach((btn) => {
          const isSel = btn.textContent.includes(
            BUILDINGS[selectedBuildingKey]?.id || ""
          );
          // detect via innerText first word matching icon may be unreliable; instead set attribute when clicked
        });
        // simpler: toggle selected class by comparing button index
        Array.from(paletteEl.children).forEach((btn, idx) => {
          const name = Object.keys(BUILDINGS)[idx];
          if (name === selectedBuildingKey) btn.classList.add("selected");
          else btn.classList.remove("selected");
        });
      }
      function renderResources() {
        resourcesEl.innerHTML = "";
        for (const k of Object.keys(resources)) {
          const d = document.createElement("div");
          d.className = "res";
          d.innerHTML = `<div style="font-size:12px;opacity:0.85">${k}</div><div style="font-weight:700;font-size:18px">${resources[k]}</div>`;
          resourcesEl.appendChild(d);
        }
      }
      function buildLegend() {
        legendEl.innerHTML = "";
        TERRAIN.forEach((t) => {
          const el = document.createElement("div");
          el.className = "tilekey";
          el.innerHTML = `<div class="tilecolor" style="background:${t.color}"></div><div style="font-size:13px">${t.name}</div>`;
          legendEl.appendChild(el);
        });
      }

      /* ---------- Tile placement logic ---------- */
      function canPlaceBuildingOn(tile, buildingKey) {
        if (!tile || !buildingKey) return false;
        const b = BUILDINGS[buildingKey];
        if (!b) return false;
        if (tile.building) return false;
        // check allowed terrains
        return b.allowed.includes(tile.terrain);
      }

      function placeBuilding(tile, buildingKey) {
        if (!buildingKey) return false;
        if (!canPlaceBuildingOn(tile, buildingKey)) return false;
        const b = BUILDINGS[buildingKey];
        // check cost
        for (const r in b.cost) {
          if ((resources[r] || 0) < b.cost[r]) return false;
        }
        for (const r in b.cost) resources[r] -= b.cost[r];
        tile.building = {
          key: buildingKey,
          builtAt: Date.now(),
          timerAcc: 0,
          icon: b.icon,
        };
        return true;
      }

      function removeBuilding(tile) {
        if (!tile || !tile.building) return false;
        // optional: refund partial cost? not now
        tile.building = null;
        return true;
      }

      /* ---------- Resource production tick ---------- */
      let lastTick = Date.now();
      function resourceTick() {
        const now = Date.now();
        const dt = now - lastTick;
        lastTick = now;
        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            const tile = map[y][x];
            if (tile.building) {
              const b = BUILDINGS[tile.building.key];
              tile.building.timerAcc += dt;
              const produceInterval = b.interval;
              while (tile.building.timerAcc >= produceInterval) {
                // add produced resources
                for (const r in b.produce) {
                  resources[r] = (resources[r] || 0) + b.produce[r];
                }
                tile.building.timerAcc -= produceInterval;
              }
            }
          }
        }
        renderResources();
      }
      setInterval(resourceTick, 500);

      /* ---------- Input handling ---------- */
      canvas.addEventListener("contextmenu", (e) => {
        e.preventDefault();
      });
      let hoverTile = null;

      function getCanvasMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        return { x, y };
      }

      canvas.addEventListener("mousemove", (e) => {
        const pos = getCanvasMousePos(e);
        const mapPixelW = MAP_W * TILE_SIZE;
        const mapPixelH = MAP_H * TILE_SIZE;
        const cx = Math.max(0, (canvas.width / DPR - mapPixelW) / 2);
        const cy = Math.max(0, (canvas.height / DPR - mapPixelH) / 2);
        const mx = pos.x - cx,
          my = pos.y - cy;
        const t = screenToTile(mx, my);
        if (t) {
          hoverTile = t;
          // tooltip
          const tile = map[t.ty][t.tx];
          tooltip.style.display = "block";
          tooltip.style.left = e.clientX + 8 + "px";
          tooltip.style.top = e.clientY + 8 + "px";
          tooltip.innerHTML = `<div style="font-weight:700">${
            tile.terrainName
          }</div><div style="font-size:13px;opacity:0.9">Noise ${tile.noise.toFixed(
            2
          )}</div>
      <div style="margin-top:6px;font-size:13px">${
        tile.building
          ? "<strong>" + tile.building.key + "</strong>"
          : '<span style="opacity:0.9">Empty</span>'
      }</div>`;
        } else {
          hoverTile = null;
          tooltip.style.display = "none";
        }
      });

      canvas.addEventListener("mouseleave", () => {
        hoverTile = null;
        tooltip.style.display = "none";
      });

      canvas.addEventListener("mousedown", (e) => {
        const pos = getCanvasMousePos(e);
        const mapPixelW = MAP_W * TILE_SIZE;
        const mapPixelH = MAP_H * TILE_SIZE;
        const cx = Math.max(0, (canvas.width / DPR - mapPixelW) / 2);
        const cy = Math.max(0, (canvas.height / DPR - mapPixelH) / 2);
        const mx = pos.x - cx,
          my = pos.y - cy;
        const t = screenToTile(mx, my);
        if (!t) return;
        const tile = map[t.ty][t.tx];
        if (e.button === 0) {
          // left click: build if selected building
          if (selectedBuildingKey) {
            const success = placeBuilding(tile, selectedBuildingKey);
            if (!success) {
              // if cannot place, quick shake / indicator - use console
              // temporary visual: flash tile border
              flashTile(t.tx, t.ty);
            }
          } else {
            // if no selection, maybe show details or do nothing
          }
        } else if (e.button === 2) {
          // right click: remove building
          removeBuilding(tile);
        }
      });

      /* ---------- small fancy flash effect ---------- */
      let flashes = [];
      function flashTile(tx, ty) {
        flashes.push({ tx, ty, t: Date.now() });
      }
      function drawFlashes() {
        const now = Date.now();
        const mapPixelW = MAP_W * TILE_SIZE;
        const mapPixelH = MAP_H * TILE_SIZE;
        const cx = Math.max(0, (canvas.width / DPR - mapPixelW) / 2);
        const cy = Math.max(0, (canvas.height / DPR - mapPixelH) / 2);
        ctx.save();
        ctx.translate(cx, cy);
        flashes = flashes.filter((f) => {
          const age = now - f.t;
          if (age > 400) return false;
          const alpha = 1 - age / 400;
          const s = tileToScreen(f.tx, f.ty);
          ctx.strokeStyle = `rgba(255,80,60, ${alpha})`;
          ctx.lineWidth = 2 + (1 - alpha) * 3;
          ctx.strokeRect(s.sx + 2, s.sy + 2, s.sw - 4, s.sh - 4);
          return true;
        });
        ctx.restore();
      }

      /* ---------- initial setup ---------- */
      function init() {
        // adjust map size to window a bit (optional)
        // fit tiles to canvas height if needed
        const leftRect = document
          .getElementById("left")
          .getBoundingClientRect();
        // scale tile size to fit height; keep simple constraints
        const maxTileH = Math.floor(leftRect.height / TILE_SIZE);
        if (MAP_H > maxTileH) {
          TILE_SIZE = Math.max(18, Math.floor(leftRect.height / MAP_H));
        }
        resizeCanvas();
        generateMap();
        buildPalette();
        renderResources();
        buildLegend();
        requestAnimationFrame(draw);
      }
      // inject an overlay that draws flashes after main draw via RAF
      (function attachPostDraw() {
        const orig = requestAnimationFrame;
        // we won't monkeypatch; instead start a small loop to draw flashes on top
        function overlayLoop() {
          // draw flashes on top by calling drawFlashes; but ensure it uses same ctx transforms
          drawFlashes();
          requestAnimationFrame(overlayLoop);
        }
        requestAnimationFrame(overlayLoop);
      })();

      init();

      /* ---------- small helper: keyboard shortcuts ---------- */
      window.addEventListener("keydown", (e) => {
        if (e.key === "1") selectedBuildingKey = Object.keys(BUILDINGS)[0];
        if (e.key === "2") selectedBuildingKey = Object.keys(BUILDINGS)[1];
        if (e.key === "3") selectedBuildingKey = Object.keys(BUILDINGS)[2];
        if (e.key === "4") selectedBuildingKey = Object.keys(BUILDINGS)[3];
        if (e.key === "Escape") selectedBuildingKey = null;
        refreshPalette();
      });

      /* ---------- Resize observer to adapt tile size if container changes ---------- */
      const ro = new ResizeObserver(() => {
        resizeCanvas();
      });
      ro.observe(document.getElementById("left"));
    </script>
  </body>
</html>
