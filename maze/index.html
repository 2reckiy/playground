<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labyrinth Generation Lab</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #0a0a0a; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        let cols, rows;
        let cellSize = 30;
        let grid = [];
        let stack = [];
        let current;
        let hue = 0;

        function setup() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Calculate grid based on screen size
            cols = Math.floor(canvas.width / cellSize);
            rows = Math.floor(canvas.height / cellSize);
            
            grid = [];
            stack = [];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    grid.push(new Cell(c, r));
                }
            }

            current = grid[0];
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function index(c, r) {
            if (c < 0 || r < 0 || c > cols - 1 || r > rows - 1) return -1;
            return c + r * cols;
        }

        class Cell {
            constructor(c, r) {
                this.c = c;
                this.r = r;
                this.walls = [true, true, true, true]; // Top, Right, Bottom, Left
                this.visited = false;
            }

            checkNeighbors() {
                let neighbors = [];
                let top    = grid[index(this.c, this.r - 1)];
                let right  = grid[index(this.c + 1, this.r)];
                let bottom = grid[index(this.c, this.r + 1)];
                let left   = grid[index(this.c - 1, this.r)];

                if (top && !top.visited) neighbors.push(top);
                if (right && !right.visited) neighbors.push(right);
                if (bottom && !bottom.visited) neighbors.push(bottom);
                if (left && !left.visited) neighbors.push(left);

                if (neighbors.length > 0) {
                    let r = Math.floor(Math.random() * neighbors.length);
                    return neighbors[r];
                } else {
                    return undefined;
                }
            }

            highlight() {
                let x = this.c * cellSize;
                let y = this.r * cellSize;
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.fillRect(x + 2, y + 2, cellSize - 4, cellSize - 4);
            }

            show() {
                let x = this.c * cellSize;
                let y = this.r * cellSize;
                ctx.strokeStyle = `hsl(${(this.c + this.r) * 2 + hue}, 70%, 50%)`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                if (this.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); }
                if (this.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); }
                if (this.walls[2]) { ctx.moveTo(x + cellSize, y + cellSize); ctx.lineTo(x, y + cellSize); }
                if (this.walls[3]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x, y); }
                ctx.stroke();

                if (this.visited) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                    ctx.fillRect(x, y, cellSize, cellSize);
                }
            }
        }

        function removeWalls(a, b) {
            let x = a.c - b.c;
            if (x === 1) { a.walls[3] = false; b.walls[1] = false; }
            else if (x === -1) { a.walls[1] = false; b.walls[3] = false; }
            let y = a.r - b.r;
            if (y === 1) { a.walls[0] = false; b.walls[2] = false; }
            else if (y === -1) { a.walls[2] = false; b.walls[0] = false; }
        }

        function draw() {
            // Speed up generation by doing 3 steps per frame
            for(let i = 0; i < 1; i++) {
                current.visited = true;
                let next = current.checkNeighbors();

                if (next) {
                    next.visited = true;
                    stack.push(current);
                    removeWalls(current, next);
                    current = next;
                    hue += 0.5;
                } else if (stack.length > 0) {
                    current = stack.pop();
                } else {
                    // Maze complete
                    setTimeout(() => {
                        cellSize = 15 + Math.random() * 40;
                        setup();
                        requestAnimationFrame(draw);
                    }, 3000);
                    return 
                }
            }

            // Redraw current area
            grid.forEach(cell => cell.show());
            current.highlight();

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', setup);
        setup();
        draw();
    </script>
</body>
</html>
