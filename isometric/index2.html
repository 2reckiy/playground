<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isometric Explorer</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #070b14;
        }

        canvas {
            display: block;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #38bdf8;
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px;
            border-radius: 4px;
            border-left: 4px solid #38bdf8;
            pointer-events: none;
            line-height: 1.5;
        }

        kbd {
            background: #1e293b;
            padding: 2px 4px;
            border-radius: 3px;
            color: white;
        }
    </style>
</head>

<body>
    <div class="ui">
        <b>CONTROLS</b><br>
        <kbd>arrows</kbd> or <kbd>WASD</kbd> to Pan<br>
        <span id="camPos">Cam: 0, 0</span>
    </div>
    <canvas id="isoCanvas"></canvas>

    <script>
        const canvas = document.getElementById('isoCanvas');
        const ctx = canvas.getContext('2d');
        const camDisplay = document.getElementById('camPos');

        const config = {
            tileSize: 22,
            blockH: 10,
            gridSize: 35, // Larger grid for exploration
            waterLevel: 3,
            sunPos: { x: 1, y: -0.5, z: 2 }
        };

        const camera = { x: 0, y: 0, speed: 8 };
        const keys = {};
        const terrain = [];
        const seed = Math.random();

        // Standard Noise functions
        function noise(x, y) {
            let n = Math.sin(x * 12.9898 + y * 78.233 + seed) * 43758.5453;
            return n - Math.floor(n);
        }

        function getZ(u, v) {
            let h = (noise(u * 0.1, v * 0.1) * 8) + (noise(u * 0.05, v * 0.05) * 12);
            return Math.floor(h);
        }

        // Initialize larger map
        for (let u = -config.gridSize; u <= config.gridSize; u++) {
            terrain[u] = [];
            for (let v = -config.gridSize; v <= config.gridSize; v++) {
                terrain[u][v] = getZ(u, v);
            }
        }

        function project(u, v, z) {
            return {
                x: (canvas.width / 2 + camera.x - config.tileSize) + (u - v) * (config.tileSize * 0.866),
                y: (canvas.height / 2 + camera.y - config.tileSize) + (u + v) * (config.tileSize * 0.5) - (z * config.blockH)
            };
        }

        function getFaceColor(nx, ny, nz, z) {
            const dot = (nx * config.sunPos.x + ny * config.sunPos.y + nz * config.sunPos.z) / 2;
            const br = Math.max(0.1, Math.min(1, dot));
            let h, s, l;
            if (z <= config.waterLevel) { h = 45; s = 40; l = 40 + (br * 30); }
            else if (z < 10) { h = 140; s = 35; l = 25 + (br * 25); }
            else { h = 200; s = 10; l = 50 + (br * 40); }
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        function drawCube(u, v, z, isWater = false) {
            const h = config.blockH;
            const p = [
                project(u, v, z), project(u + 1, v, z), project(u + 1, v + 1, z), project(u, v + 1, z),
                project(u, v, z + 1), project(u + 1, v, z + 1), project(u + 1, v + 1, z + 1), project(u, v + 1, z + 1)
            ];

            // Culling: Don't draw if completely off-screen
            if (p[2].x < 0 || p[0].x > canvas.width || p[2].y < 0 || p[0].y > canvas.height) return;

            const drawFace = (indices, color) => {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(p[indices[0]].x, p[indices[0]].y);
                indices.forEach(i => ctx.lineTo(p[i].x, p[i].y));
                ctx.fill();
            };

            if (isWater) {
                drawFace([4, 5, 6, 7], 'rgba(0, 100, 255, 0.4)');
            } else {
                drawFace([1, 2, 6, 5], getFaceColor(1, 0, 0, z));
                drawFace([3, 2, 6, 7], getFaceColor(0, 1, 0, z));
                drawFace([4, 5, 6, 7], getFaceColor(0, 0, 1, z));
            }
        }

        function updateCamera() {
            if (keys['ArrowUp'] || keys['w']) camera.y += camera.speed;
            if (keys['ArrowDown'] || keys['s']) camera.y -= camera.speed;
            if (keys['ArrowLeft'] || keys['a']) camera.x += camera.speed;
            if (keys['ArrowRight'] || keys['d']) camera.x -= camera.speed;
            camDisplay.innerText = `Cam: ${Math.round(camera.x)}, ${Math.round(camera.y)}`;
        }

        function render() {
            updateCamera();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let sum = -config.gridSize * 2; sum <= config.gridSize * 2; sum++) {
                for (let u = -config.gridSize; u <= config.gridSize; u++) {
                    let v = sum - u;
                    if (!terrain[u] || terrain[u][v] === undefined) continue;

                    let maxZ = terrain[u][v];
                    for (let z = 0; z <= maxZ; z++) drawCube(u, v, z);
                    if (maxZ < config.waterLevel) drawCube(u, v, config.waterLevel, true);
                }
            }
            requestAnimationFrame(render);
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    </script>
</body>

</html>
