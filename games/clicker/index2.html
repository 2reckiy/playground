<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Neo Brutalist Clicker – Canvas Particles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff44f;
        overflow: hidden;
      }

      canvas {
        display: block;
      }

      #button {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: #ff4d6d;
        border: 6px solid #000;
        box-shadow: 8px 8px 0 #000;
        font-size: 32px;
        font-weight: 900;
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        cursor: pointer;
      }

      #button:active {
        transform: translate(-46%, -46%);
        box-shadow: 4px 4px 0 #000;
      }
    </style>
  </head>

  <body>
    <canvas id="c"></canvas>
    <div id="button">CLICK</div>

    <script>
      /* =======================
   CANVAS SETUP
======================= */
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      /* =======================
   PARTICLE SYSTEM
======================= */
      class Particle {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.startX = x;

          this.age = 0;
          this.life = 1.2;

          this.speedY = 220;
          this.swayAmp = 18 + Math.random() * 10;
          this.swayFreq = 6 + Math.random() * 3;
          this.phase = Math.random() * Math.PI * 2;
        }

        update(dt) {
          this.age += dt;
          this.y -= this.speedY * dt;
        }

        draw(ctx) {
          const t = this.age;
          const p = t / this.life;

          const sway = Math.sin(t * this.swayFreq + this.phase) * this.swayAmp;
          const alpha = 1 - p;

          ctx.globalAlpha = alpha;
          ctx.fillStyle = "#4d96ff";
          ctx.strokeStyle = "#000";
          ctx.lineWidth = 4;

          ctx.font = "900 32px system-ui";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          ctx.strokeText("+1", this.startX + sway, this.y);
          ctx.fillText("+1", this.startX + sway, this.y);
          ctx.globalAlpha = 1;
        }

        get dead() {
          return this.age >= this.life || this.y < -50;
        }
      }

      class ParticleSystem {
        constructor() {
          this.particles = [];
        }

        spawn(x, y, count = 1) {
          for (let i = 0; i < count; i++) {
            this.particles.push(
              new Particle(x + (Math.random() - 0.5) * 40, y)
            );
          }
        }

        update(dt) {
          for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.update(dt);
            if (p.dead) this.particles.splice(i, 1);
          }
        }

        draw(ctx) {
          for (const p of this.particles) {
            p.draw(ctx);
          }
        }
      }

      /* =======================
   GAME LOOP
======================= */
      const particles = new ParticleSystem();
      let last = performance.now();

      function loop(now) {
        const dt = (now - last) / 1000;
        last = now;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.update(dt);
        particles.draw(ctx);

        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      /* =======================
   INTERACTION
======================= */
      const button = document.getElementById("button");

      button.addEventListener("click", () => {
        const r = button.getBoundingClientRect();
        particles.spawn(r.left + r.width / 2, r.top);
      });
    </script>
  </body>
</html>
