<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hex Factory | Grouped Evolution</title>
    <style>
      :root {
        --bg: #000;
        --surface: #0a0a0a;
        --border: #222;
        --accent: #38bdf8;
        --text: #fff;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #header {
        flex-shrink: 0;
        padding: 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 10;
      }

      #result-hex {
        font-size: 5rem;
        font-weight: 900;
        font-family: monospace;
        line-height: 1;
        margin-bottom: 15px;
        letter-spacing: -4px;
      }

      .slots-container {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }
      .slot {
        width: 50px;
        height: 70px;
        border: 2px solid var(--border);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.02);
      }
      .slot.active {
        border-color: var(--accent);
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
      }
      .chip {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .hud {
        display: flex;
        gap: 20px;
        align-items: center;
        font-size: 0.8rem;
        color: #666;
      }
      .auto-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: 800;
        cursor: pointer;
      }
      .auto-btn.on {
        background: #22c55e;
        color: #fff;
      }

      /* The Palette Grid */
      #palette-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
        grid-auto-rows: 45px;
        gap: 4px;
        align-content: start;
      }

      .ingredient {
        width: 100%;
        height: 100%;
        border-radius: 4px;
        cursor: pointer;
        position: relative;
        transition: transform 0.1s;
      }
      .ingredient:hover {
        transform: scale(1.1);
        z-index: 5;
        outline: 2px solid white;
      }

      /* Badge for grouped colors count */
      .group-count {
        position: absolute;
        bottom: 2px;
        right: 2px;
        font-size: 10px;
        background: rgba(0, 0, 0, 0.6);
        padding: 1px 3px;
        border-radius: 3px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <header id="header">
      <div id="result-hex">#000000</div>
      <div class="slots-container" id="slots-ui"></div>
      <div class="hud">
        <button id="auto-toggle" class="auto-btn" onclick="toggleAuto()">
          Auto-Evolve
        </button>
        <div id="stats">TOTAL: 8 | UNIQUE: 8</div>
        <div
          id="alert"
          style="
            color: var(--accent);
            font-weight: bold;
            min-width: 120px;
            text-align: center;
          "></div>
      </div>
    </header>

    <main id="palette-container"></main>

    <script>
      const MAX_SLOTS = 3;
      const SIMILARITY_THRESHOLD = 55; // Higher = more aggressive grouping (0-255 range)

      // paletteItems stores objects: { hex, r, g, b, count }
      let paletteItems = [];
      let slots = [null, null];
      let activeSlotIndex = 0;
      let autoInterval = null;

      function hexToRgb(hex) {
        return {
          r: parseInt(hex.slice(1, 3), 16),
          g: parseInt(hex.slice(3, 5), 16),
          b: parseInt(hex.slice(5, 7), 16),
        };
      }

      // Initialize with primordial colors
      [
        "#FF0000",
        "#00FF00",
        "#0000FF",
      ].forEach((h) => {
        const rgb = hexToRgb(h);
        paletteItems.push({ hex: h, ...rgb, count: 1 });
      });

      function getHSL(hex) {
        let { r, g, b } = hexToRgb(hex);
        r /= 255;
        g /= 255;
        b /= 255;
        let max = Math.max(r, g, b),
          min = Math.min(r, g, b),
          h,
          s,
          l = (max + min) / 2;
        if (max === min) h = s = 0;
        else {
          let d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
          else if (max === g) h = (b - r) / d + 2;
          else h = (r - g) / d + 4;
          h /= 6;
        }
        return h;
      }

      function useIngredient(hex) {
        slots[activeSlotIndex] = hex;
        activeSlotIndex = (activeSlotIndex + 1) % slots.length;
        updateLogic();
      }

      function calculateMix() {
        const filled = slots.filter((s) => s !== null);
        if (filled.length === 0) return "#000000";
        let r2 = 0,
          g2 = 0,
          b2 = 0;
        filled.forEach((hex) => {
          const rgb = hexToRgb(hex);
          r2 += rgb.r ** 2;
          g2 += rgb.g ** 2;
          b2 += rgb.b ** 2;
        });
        const avg = (sum) =>
          Math.round(Math.sqrt(sum / filled.length))
            .toString(16)
            .padStart(2, "0");
        return `#${avg(r2)}${avg(g2)}${avg(b2)}`.toUpperCase();
      }

      function updateLogic() {
        const hex = calculateMix();
        const hexDisplay = document.getElementById("result-hex");
        hexDisplay.innerText = hex;
        hexDisplay.style.color = hex;

        if (slots.every((s) => s !== null)) {
          processDiscovery(hex);
        }
        renderSlots();
      }

      function processDiscovery(newHex) {
        const newRgb = hexToRgb(newHex);

        // Check if color is similar to any existing item
        let similarItem = paletteItems.find((item) => {
          const distance = Math.sqrt(
            (item.r - newRgb.r) ** 2 +
              (item.g - newRgb.g) ** 2 +
              (item.b - newRgb.b) ** 2,
          );
          return distance < SIMILARITY_THRESHOLD;
        });

        if (similarItem) {
          similarItem.count++;
          renderPalette(); // Update the number badge
        } else {
          paletteItems.push({ hex: newHex, ...newRgb, count: 1 });
          paletteItems.sort((a, b) => getHSL(a.hex) - getHSL(b.hex));
          renderPalette();
          showAlert("NEW SPECIES");
        }

        const totalMixed = paletteItems.reduce(
          (sum, item) => sum + item.count,
          0,
        );
        document.getElementById("stats").innerText =
          `TOTAL: ${totalMixed} | UNIQUE: ${paletteItems.length}`;

        if (paletteItems.length % 10 === 0 && slots.length < MAX_SLOTS) {
          slots.push(null);
          showAlert("SLOT UNLOCKED");
        }
      }

      function renderPalette() {
        const grid = document.getElementById("palette-container");
        grid.innerHTML = "";
        paletteItems.forEach((item) => {
          const div = document.createElement("div");
          div.className = "ingredient";
          div.style.backgroundColor = item.hex;
          div.title = `${item.hex} (Found ${item.count} times)`;
          div.onclick = () => useIngredient(item.hex);
          if (item.count > 1) {
            div.innerHTML = `<span class="group-count">${item.count}</span>`;
          }
          grid.appendChild(div);
        });
      }

      /* ... Remaining UI Logic (renderSlots, toggleAuto, showAlert) ... */
      function showAlert(msg) {
        const a = document.getElementById("alert");
        a.innerText = msg;
        setTimeout(() => (a.innerText = ""), 1000);
      }

      function renderSlots() {
        const ui = document.getElementById("slots-ui");
        ui.innerHTML = "";
        slots.forEach((color, i) => {
          const div = document.createElement("div");
          div.className = `slot ${i === activeSlotIndex ? "active" : ""}`;
          div.onclick = () => {
            activeSlotIndex = i;
            renderSlots();
          };
          if (color)
            div.innerHTML = `<div class="chip" style="background:${color}"></div>`;
          ui.appendChild(div);
        });
      }

      function toggleAuto() {
        const btn = document.getElementById("auto-toggle");
        if (autoInterval) {
          clearInterval(autoInterval);
          autoInterval = null;
          btn.innerText = "Start Auto-Evolve";
          btn.classList.remove("on");
        } else {
          btn.innerText = "Auto-Evolving";
          btn.classList.add("on");
          autoInterval = setInterval(() => {
            const rand =
              paletteItems[Math.floor(Math.random() * paletteItems.length)].hex;
            useIngredient(rand);
          }, 50);
        }
      }

      renderPalette();
      renderSlots();
    </script>
  </body>
</html>
