<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Retro Pixel Studio</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --accent: #00ff88;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
        }

        .controls {
            background: var(--panel);
            padding: 25px;
            border-radius: 12px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        canvas {
            background: #000;
            border: 4px solid #333;
            image-rendering: pixelated;
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        .palette-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        button {
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            transition: 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: #444;
            color: var(--accent);
        }

        button.active {
            background: var(--accent);
            color: #000;
            font-weight: bold;
        }

        #download {
            background: var(--accent);
            color: #000;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>PIXEL_STUDIO v1.0</h1>

    <div class="container">
        <div class="controls">
            <input type="file" id="upload" accept="image/*">

            <label>Pixel Size <span id="val-size">10</span></label>
            <input type="range" id="pixelSize" min="2" max="50" value="10">

            <label>Contrast <span id="val-contrast">0</span></label>
            <input type="range" id="contrast" min="-100" max="100" value="0">

            <label>Brightness <span id="val-bright">0</span></label>
            <input type="range" id="brightness" min="-100" max="100" value="0">

            <div class="palette-grid">
                <button class="pal-btn" data-pal="none">Dynamic</button>
                <button class="pal-btn" data-pal="gameboy">GameBoy</button>
                <button class="pal-btn" data-pal="pico8">PICO-8</button>
                <button class="pal-btn" data-pal="c64">C64</button>
            </div>

            <button id="download">SAVE IMAGE</button>
        </div>

        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const upload = document.getElementById('upload');

        let img = null;
        let currentPalette = null;

        const palettes = {
            gameboy: [{ r: 15, g: 56, b: 15 }, { r: 48, g: 98, b: 48 }, { r: 139, g: 172, b: 15 }, { r: 155, g: 188, b: 15 }],
            pico8: [{ r: 0, g: 0, b: 0 }, { r: 29, g: 43, b: 83 }, { r: 126, g: 37, b: 83 }, { r: 0, g: 135, b: 81 }, { r: 171, g: 82, b: 54 }, { r: 95, g: 87, b: 79 }, { r: 194, g: 195, b: 199 }, { r: 255, g: 241, b: 232 }, { r: 255, g: 0, b: 77 }, { r: 255, g: 163, b: 0 }, { r: 255, g: 236, b: 39 }, { r: 0, g: 228, b: 54 }, { r: 41, g: 173, b: 255 }, { r: 131, g: 118, b: 156 }, { r: 255, g: 119, b: 168 }, { r: 255, g: 204, b: 170 }],
            c64: [{ r: 0, g: 0, b: 0 }, { r: 255, g: 255, b: 255 }, { r: 136, g: 0, b: 0 }, { r: 170, g: 255, b: 238 }, { r: 204, g: 68, b: 204 }, { r: 0, g: 204, b: 85 }, { r: 0, g: 0, b: 170 }, { r: 238, g: 238, b: 119 }, { r: 221, g: 136, b: 85 }, { r: 102, g: 68, b: 0 }, { r: 255, g: 119, b: 119 }, { r: 51, g: 51, b: 51 }, { r: 119, g: 119, b: 119 }, { r: 170, g: 255, b: 102 }, { r: 0, g: 136, b: 255 }, { r: 187, g: 187, b: 187 }]
        };

        const bayer = [[0, 8, 2, 10], [12, 4, 14, 6], [3, 11, 1, 9], [15, 7, 13, 5]];

        upload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                img = new Image();
                img.onload = render;
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.oninput = () => {
                document.getElementById(`val-${input.id.replace('Size', 'size').replace('Contrast', 'contrast').replace('Brightness', 'bright')}`).innerText = input.value;
                render();
            };
        });

        document.querySelectorAll('.pal-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.pal-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPalette = palettes[btn.dataset.pal] || null;
                render();
            };
        });

        function getNearestColor(r, g, b, palette) {
            let minDistance = Infinity, closest = palette[0];
            for (let c of palette) {
                const d = Math.pow(r - c.r, 2) + Math.pow(g - c.g, 2) + Math.pow(b - c.b, 2);
                if (d < minDistance) { minDistance = d; closest = c; }
            }
            return closest;
        }

        function applyFilters(data, contrast, brightness) {
            const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
            for (let i = 0; i < data.length; i += 4) {
                for (let j = 0; j < 3; j++) {
                    data[i + j] = factor * (data[i + j] + brightness - 128) + 128;
                }
            }
        }

        function render() {
            if (!img) return;
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const size = parseInt(document.getElementById('pixelSize').value);
            const contrast = parseInt(document.getElementById('contrast').value);
            const brightness = parseInt(document.getElementById('brightness').value);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            applyFilters(imgData.data, contrast, brightness);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += size) {
                for (let x = 0; x < canvas.width; x += size) {
                    const i = (y * canvas.width + x) * 4;
                    const threshold = (bayer[(y / size) % 4][(x / size) % 4] * 16) - 128;

                    let r = imgData.data[i] + threshold;
                    let g = imgData.data[i + 1] + threshold;
                    let b = imgData.data[i + 2] + threshold;

                    let final;
                    if (currentPalette) {
                        final = getNearestColor(r, g, b, currentPalette);
                    } else {
                        const depth = 8;
                        final = {
                            r: Math.round(r / depth) * depth,
                            g: Math.round(g / depth) * depth,
                            b: Math.round(b / depth) * depth
                        };
                    }
                    ctx.fillStyle = `rgb(${final.r},${final.g},${final.b})`;
                    ctx.fillRect(x, y, size, size);
                }
            }
        }

        document.getElementById('download').onclick = () => {
            const link = document.createElement('a');
            link.download = 'pixel-art.png';
            link.href = canvas.toDataURL();
            link.click();
        };
    </script>
</body>

</html>
