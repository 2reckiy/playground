<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High-Performance Sand</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      } /* Keeps grains sharp */
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #e6c27a;
        font-family: monospace;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="ui">SIMULATING THOUSANDS OF PARTICLES | DRAG TO PAINT</div>
    <canvas id="gameCanvas"></canvas>

    <script>
      const GrainType = {
        SAND: 1,
        STONE: 2,
        COPPER: 3,
        SILVER: 4,
        GOLD: 5,
      };

      const GrainPrices = {
        [GrainType.SAND]: 1,
        [GrainType.STONE]: 3,
        [GrainType.COPPER]: 10,
        [GrainType.SILVER]: 25,
        [GrainType.GOLD]: 100.0,
      };

      /** --- CORE ENGINE --- **/
      class Cooldown {
        constructor(seconds) {
          this.duration = seconds;
          this.timer = 0;
        }

        update(dt) {
          if (this.timer > 0) this.timer = Math.max(0, this.timer - dt);
        }

        trigger() {
          if (this.timer > 0) return false;
          this.timer = this.duration;
          return true;
        }

        get isReady() {
          return this.timer === 0;
        }

        get progress() {
          // Returns 0.0 to 1.0
          return this.timer / this.duration;
        }
      }

      class EntityManager {
        constructor() {
          this.entities = [];
          this.lastW = 0;
          this.lastH = 0;
        }
        add(ent, z = 0) {
          ent.zIndex = z;
          this.entities.push(ent);
          this.entities.sort((a, b) => a.zIndex - b.zIndex);
          if (ent.onResize && this.lastW) ent.onResize(this.lastW, this.lastH);
          return ent;
        }
        update(dt) {
          this.entities.forEach((e) => e.update && e.update(dt));
        }
        draw(ctx) {
          this.entities.forEach((e) => e.draw && e.draw(ctx));
        }
        onResize(w, h) {
          this.lastW = w;
          this.lastH = h;
          this.entities.forEach((e) => e.onResize && e.onResize(w, h));
        }
        broadcast(evt, data) {
          this.entities.forEach((e) => e[evt] && e[evt](data));
        }
      }

      class GameEngine {
        constructor() {
          this.canvas = document.getElementById("gameCanvas");
          this.ctx = this.canvas.getContext("2d");
          this.manager = new EntityManager();
          this.lastTime = performance.now();
          this.isDown = false;
          window.addEventListener("resize", () => this.resize());
          this.setupInput();
          this.resize();
          requestAnimationFrame((t) => this.loop(t));
        }
        setupInput() {
          const getMouse = (e) => {
            const r = this.canvas.getBoundingClientRect();
            return { x: e.clientX - r.left, y: e.clientY - r.top };
          };
          window.addEventListener("mousedown", () => (this.isDown = true));
          window.addEventListener("mouseup", () => (this.isDown = false));
          window.addEventListener("mousemove", (e) => {
            this.manager.broadcast("onMouseMove", {
              ...getMouse(e),
              isDown: this.isDown,
            });
          });
        }
        resize() {
          this.width = window.innerWidth;
          this.height = window.innerHeight;
          this.canvas.width = this.width;
          this.canvas.height = this.height;
          this.manager.onResize(this.width, this.height);
        }
        loop(now) {
          this.manager.update((now - this.lastTime) / 1000);
          this.lastTime = now;
          this.manager.draw(this.ctx);
          requestAnimationFrame((t) => this.loop(t));
        }
      }

      class SandSimulator {
        constructor(config = { cellSize: 32 }) {
          this.config = config;
          this.cols = 0;
          this.rows = 0;
          this.brushRadius = 0;

          this.fountainCooldown = new Cooldown(0.5);

          // --- PARALLEL ARRAYS SETUP ---
          // We store our buffers in a map so we can iterate over them easily
          this.buffers = {
            grid: null, // The color data (Uint32Array)
            typeID: null, // The material ID (Uint8Array)
            age: null, // Example extra property (Uint16Array)
          };

          this.offCanvas = document.createElement("canvas");
          this.offCtx = this.offCanvas.getContext("2d", { alpha: false });

          this.counts = {
            [GrainType.SAND]: 0,
            [GrainType.STONE]: 0,
            [GrainType.COPPER]: 0,
            [GrainType.SILVER]: 0,
            [GrainType.GOLD]: 0,
            total: 0,
          };

          // Define the odds for each type (Higher = more common)
          this.grainWeights = [
            { type: GrainType.SAND, weight: 800 }, // Very common
            { type: GrainType.STONE, weight: 100 }, // Uncommon
            { type: GrainType.COPPER, weight: 50 }, // Rare
            { type: GrainType.SILVER, weight: 30 }, // Very Rare
            { type: GrainType.GOLD, weight: 10 }, // Legendary
          ];

          // Pre-calculate the total weight for the random roll
          this.totalWeight = this.grainWeights.reduce(
            (sum, item) => sum + item.weight,
            0,
          );
        }

        /**
         * Helper to initialize or resize all parallel buffers
         */
        _initBuffers(size) {
          this.buffers.grid = new Uint32Array(size);
          this.buffers.typeID = new Uint8Array(size);
          this.buffers.age = new Uint16Array(size);
          // Add new typed arrays here as needed
        }

        onResize_temp(w, h) {
          let newCols, newRows;

          // Option A: Define by Grid Width (e.g., 100 columns)
          if (this.config.gridW) {
            newCols = this.config.gridW;
            // Calculate height to maintain screen aspect ratio
            const aspect = h / w;
            newRows = Math.floor(this.config.gridW * aspect);
            this.cellSize = w / newCols;
          }
          // Option B: Define by Cell Size (e.g., 32px)
          else {
            this.cellSize = this.config.cellSize || 4;
            newCols = Math.floor(w / this.cellSize);
            newRows = Math.floor(h / this.cellSize);
          }

          // If we already had a grid, migrate the data to the new resolution
          if (this.grid) {
            this.grid = this.rescaleGrid(
              this.grid,
              this.cols,
              this.rows,
              newCols,
              newRows,
            );
          } else {
            this.grid = new Uint32Array(newCols * newRows);
          }

          this.cols = newCols;
          this.rows = newRows;
          this.offCanvas.width = this.cols;
          this.offCanvas.height = this.rows;
        }

        onResize(w, h) {
          let newCols, newRows;
          if (this.config.gridW) {
            newCols = this.config.gridW;
            const aspect = h / w;
            newRows = Math.floor(this.config.gridW * aspect);
            this.cellSize = w / newCols;
          } else {
            this.cellSize = this.config.cellSize || 4;
            newCols = Math.floor(w / this.cellSize);
            newRows = Math.floor(h / this.cellSize);
          }

          const newSize = newCols * newRows;

          if (this.buffers.grid) {
            // Migrate all buffers during resize
            const scaleX = this.cols / newCols;
            const scaleY = this.rows / newRows;

            // Temporary storage for migrated data
            const oldCols = this.cols;
            const oldBuffers = { ...this.buffers };

            this._initBuffers(newSize);

            for (let r = 0; r < newRows; r++) {
              for (let c = 0; c < newCols; c++) {
                const oldC = Math.floor(c * scaleX);
                const oldR = Math.floor(r * scaleY);
                const oldIdx = oldR * oldCols + oldC;
                const newIdx = r * newCols + c;

                // Migrate every buffer entry
                if (oldBuffers.grid[oldIdx] !== 0) {
                  this.buffers.grid[newIdx] = this.getGrainColor();
                  this.buffers.typeID[newIdx] = oldBuffers.typeID[oldIdx];
                  this.buffers.age[newIdx] = oldBuffers.age[oldIdx];
                }
              }
            }
          } else {
            this._initBuffers(newSize);
          }

          this.cols = newCols;
          this.rows = newRows;
          this.offCanvas.width = this.cols;
          this.offCanvas.height = this.rows;

          let total = 0;
          // Reset counts object first...
          for (let i = 0; i < this.buffers.typeID.length; i++) {
            const tid = this.buffers.typeID[i];
            if (tid !== 0) {
              this.counts[tid]++;
              total++;
            }
          }
          this.counts.total = total;
        }

        /**
         * Rescales the simulation data when resolution changes.
         * Uses nearest-neighbor sampling to prevent sand "blurring".
         */
        rescaleGrid(oldGrid, oldW, oldH, newW, newH) {
          const newGrid = new Uint32Array(newW * newH);
          const scaleX = oldW / newW;
          const scaleY = oldH / newH;

          for (let r = 0; r < newH; r++) {
            for (let c = 0; c < newW; c++) {
              const oldC = Math.floor(c * scaleX);
              const oldR = Math.floor(r * scaleY);
              newGrid[r * newW + c] = oldGrid[oldR * oldW + oldC];

              if (newGrid[r * newW + c] !== 0) {
                newGrid[r * newW + c] = this.getGrainColor();
              }
            }
          }
          return newGrid;
        }

        getGrainType() {
          let roll = Math.random() * this.totalWeight;

          for (const item of this.grainWeights) {
            if (roll < item.weight) {
              return item.type;
            }
            roll -= item.weight;
          }
          return GrainType.SAND; // Fallback
        }

        getGrainColor(typeID) {
          let r, g, b;
          const vary = () => Math.random() * 30 - 15; // Small color variation

          switch (typeID) {
            case GrainType.STONE:
              const grey = 100 + vary();
              [r, g, b] = [grey, grey, grey];
              break;
            case GrainType.COPPER:
              [r, g, b] = [184 + vary(), 115 + vary(), 51 + vary()]; // Orangered
              break;
            case GrainType.SILVER:
              const silver = 192 + vary();
              [r, g, b] = [silver, silver, silver + 10]; // Cool grey
              break;
            case GrainType.GOLD:
              [r, g, b] = [255 + vary(), 215 + vary(), 0]; // Bright Gold
              break;
            case GrainType.SAND:
            default:
              r = 210 + vary();
              g = 180 + vary();
              b = 100 + vary();
              break;
          }

          // Format: 0x Alpha Blue Green Red
          return (255 << 24) | (b << 16) | (g << 8) | r;
        }

        onMouseMove({ x, y, isDown }) {
          if (!isDown) return;

          const c = Math.floor(x / this.cellSize);
          const r = Math.floor(y / this.cellSize);
          const radius = this.brushRadius;

          for (let i = -radius; i <= radius; i++) {
            for (let j = -radius; j <= radius; j++) {
              const col = c + i;
              const row = r + j;
              if (col >= 0 && col < this.cols && row >= 0 && row < this.rows) {
                const idx = row * this.cols + col;
                if (this.buffers.grid[idx] === 0) {
                  const typeID = this.getGrainType();
                  this.createGrain({ idx, typeID });
                }
              }
            }
          }
        }

        spawnFountainGrain() {
          // Pick a random spot in the top center (middle 20% of the screen)
          const margin = Math.floor(this.cols * 0.4);
          const randomCol =
            margin + Math.floor(Math.random() * (this.cols * 0.2));
          const idx = Math.floor(this.cols * 0.5); // Row 0, so index is just the column

          const typeID = this.getGrainType();
          this.createGrain({ idx, typeID });
        }

        createGrain({ idx, typeID }) {
          if (this.buffers.grid[idx] !== 0) return;

          this.buffers.grid[idx] = this.getGrainColor(typeID);
          this.buffers.typeID[idx] = typeID; // 1 = Sand
          this.buffers.age[idx] = 0;

          this.counts[typeID]++;
          this.counts.total++;
        }

        removeGrains(typeID, countToRemove) {
          let removed = 0;
          // We iterate backwards to remove the "newest" or "highest" grains first (optional)
          for (let i = this.buffers.grid.length - 1; i >= 0; i--) {
            if (removed >= countToRemove) break;

            if (this.buffers.typeID[i] === typeID) {
              this.buffers.grid[i] = 0;
              this.buffers.typeID[i] = 0;
              this.buffers.age[i] = 0;

              this.counts[typeID]--;
              this.counts.total--;
              removed++;
            }
          }
          return removed;
        }

        clearAll() {
          this.buffers.grid.fill(0);
          this.buffers.typeID.fill(0);
          this.buffers.age.fill(0);
          Object.keys(this.counts).forEach((k) => (this.counts[k] = 0));
        }

        update(dt) {
          // 1. Update the Cooldown timer
          this.fountainCooldown.update(dt);

          // 2. If the timer is ready, trigger it and spawn sand at the top
          if (this.fountainCooldown.trigger()) {
            this.spawnFountainGrain();
          }

          // 3. Regular physics update (Bottom-to-Top)
          for (let r = this.rows - 2; r >= 0; r--) {
            const leftToRight = Math.random() > 0.5;

            for (let i = 0; i < this.cols; i++) {
              const c = leftToRight ? i : this.cols - 1 - i;
              const cur = r * this.cols + c;
              const color = this.buffers.grid[cur];

              if (color !== 0) {
                const below = (r + 1) * this.cols + c;
                const diagL = (r + 1) * this.cols + (c - 1);
                const diagR = (r + 1) * this.cols + (c + 1);

                let nextIdx = -1;

                if (this.buffers.grid[below] === 0) nextIdx = below;
                else if (c > 0 && this.buffers.grid[diagL] === 0)
                  nextIdx = diagL;
                else if (c < this.cols - 1 && this.buffers.grid[diagR] === 0)
                  nextIdx = diagR;

                if (nextIdx !== -1) {
                  // MOVE ALL DATA ACROSS BUFFERS
                  this.buffers.grid[nextIdx] = color;
                  this.buffers.typeID[nextIdx] = this.buffers.typeID[cur];
                  this.buffers.age[nextIdx] = this.buffers.age[cur] + 1; // Example aging

                  this.buffers.grid[cur] = 0;
                  this.buffers.typeID[cur] = 0;
                  this.buffers.age[cur] = 0;
                }
              }
            }
          }
        }

        draw(ctx) {
          const imgData = this.offCtx.createImageData(this.cols, this.rows);
          const data = new Uint32Array(imgData.data.buffer);
          data.set(this.buffers.grid); // Only need to draw the color buffer
          this.offCtx.putImageData(imgData, 0, 0);

          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(
            this.offCanvas,
            0,
            0,
            this.cols,
            this.rows,
            0,
            0,
            ctx.canvas.width,
            ctx.canvas.height,
          );

          // STATS
          ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
          ctx.fillRect(10, 40, 160, 130);

          ctx.fillStyle = "#e6c27a";
          ctx.font = "12px monospace";
          let yOffset = 60;

          for (const [key, val] of Object.entries(GrainType)) {
            const count = this.counts[val];
            ctx.fillText(`${key}: ${count}`, 20, yOffset);
            yOffset += 18;
          }

          ctx.fillStyle = "#fff";
          ctx.fillText(`TOTAL: ${this.counts.total}`, 20, yOffset + 5);
        }
      }

      const engine = new GameEngine();

      // Start with a very low resolution (e.g., 64 columns wide)
      const sandSim = new SandSimulator({ gridW: 64 });
      engine.manager.add(sandSim);

      // Later, scale it up to a high resolution (1000 columns wide)
      function upgradeResolution(gridW) {
        sandSim.config = { gridW };
        // Trigger the resize/recalc logic
        engine.resize();
      }

      function rm(typeID, count) {
        sandSim.removeGrains(typeID, count);
      }
    </script>
  </body>
</html>
