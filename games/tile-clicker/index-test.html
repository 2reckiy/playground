<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TileScout</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #080c12;
        --panel-bg: rgba(8, 14, 22, 0.88);
        --panel-border: rgba(255, 255, 255, 0.07);
        --text-primary: #c8d8e8;
        --text-muted: #566878;
        --accent: #c8a84a;
        --accent-dim: rgba(200, 168, 74, 0.2);
        --error: #e05050;
        --error-dim: rgba(224, 80, 80, 0.2);
        --bonus: #50c878;
        --bonus-dim: rgba(80, 200, 120, 0.15);
        --font: "Share Tech Mono", "Courier New", monospace;
      }

      body {
        background: var(--bg);
        overflow: hidden;
        font-family: var(--font);
        color: var(--text-primary);
        user-select: none;
      }

      #gameCanvas {
        display: block;
        cursor: grab;
        position: fixed;
        inset: 0;
      }
      #gameCanvas.dragging {
        cursor: grabbing;
      }

      /* ── HUD Panel ──────────────────────────────────────────── */
      #hud {
        position: fixed;
        top: 12px;
        right: 12px;
        width: 240px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(8px);
        padding: 12px 14px;
        z-index: 10;
      }

      #hud-title {
        font-size: 11px;
        letter-spacing: 0.22em;
        color: var(--accent);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--panel-border);
      }

      #tick-indicator {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        transition: background 0.1s;
      }
      #tick-indicator.pulse {
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
      }

      #res-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .res-row {
        display: grid;
        grid-template-columns: 14px 48px 1fr 64px;
        align-items: center;
        gap: 5px;
        font-size: 11px;
      }
      .res-icon {
        text-align: center;
        font-size: 12px;
      }
      .res-name {
        color: var(--text-muted);
        letter-spacing: 0.04em;
      }

      .res-bar-wrap {
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
      }
      .res-bar-fill {
        height: 100%;
        position: absolute;
        left: 0;
        top: 0;
        transition: width 0.4s ease;
        opacity: 0.75;
      }

      .res-val {
        text-align: right;
        font-size: 10px;
        color: var(--text-primary);
      }
      .res-max {
        color: var(--text-muted);
      }

      #hud-divider {
        height: 1px;
        background: var(--panel-border);
        margin: 10px 0;
      }

      #stats {
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.04em;
      }
      #stats b {
        color: var(--text-primary);
      }

      /* ── Tooltip ────────────────────────────────────────────── */
      #tooltip {
        position: fixed;
        display: none;
        width: 196px;
        background: rgba(6, 10, 18, 0.96);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(6px);
        padding: 10px 12px;
        z-index: 20;
        pointer-events: none;
      }
      .tt-title {
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 0.08em;
        margin-bottom: 2px;
      }
      .tt-coords {
        font-size: 10px;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      .tt-desc {
        font-size: 10px;
        color: var(--text-muted);
        line-height: 1.5;
        margin-bottom: 6px;
      }
      .tt-prod {
        font-size: 11px;
        margin-bottom: 3px;
      }
      .tt-cost {
        font-size: 11px;
        margin-bottom: 3px;
      }
      .tt-cost.affordable {
        color: var(--bonus);
      }
      .tt-cost.expensive {
        color: var(--error);
      }
      .tt-hint {
        font-size: 10px;
        color: var(--text-muted);
      }
      .tt-bonus {
        font-size: 10px;
        color: var(--bonus);
      }

      /* ── Notification ───────────────────────────────────────── */
      #notification {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 16px;
        font-size: 12px;
        letter-spacing: 0.06em;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 30;
        border: 1px solid transparent;
      }
      #notification.error {
        color: var(--error);
        background: var(--error-dim);
        border-color: var(--error);
      }
      #notification.bonus {
        color: var(--bonus);
        background: var(--bonus-dim);
        border-color: var(--bonus);
      }
      #notification.info {
        color: var(--accent);
        background: var(--accent-dim);
        border-color: var(--accent);
      }

      /* ── Controls hint ──────────────────────────────────────── */
      #controls-hint {
        position: fixed;
        bottom: 12px;
        right: 12px;
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        line-height: 1.7;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div id="hud-title">
        TileScout
        <div id="tick-indicator" title="Tick heartbeat"></div>
      </div>
      <div id="res-list"></div>
      <div id="hud-divider"></div>
      <div id="stats"></div>
    </div>

    <div id="tooltip"></div>
    <div id="notification"></div>
    <div id="controls-hint">Drag · Scroll zoom · Click tile to open</div>

    <script>
      "use strict";

      // ════════════════════════════════════════════════════════════════
      //  CONSTANTS — all magic numbers live here
      // ════════════════════════════════════════════════════════════════
      const CONST = Object.freeze({
        // World
        MAP_SEED: 0xdeadbeef,
        CHUNK_SIZE: 8, // tiles per chunk side
        TILE_SIZE: 72, // px at zoom = 1

        // Economy — cost = BASE * (1 + openedCount * COUNT_SCALE) * (1 + dist * DIST_SCALE)
        BASE_OPEN_COST: 10,
        OPEN_COUNT_SCALE: 0.08,
        DISTANCE_SCALE: 0.4,

        // Camera
        ZOOM_MIN: 0.25,
        ZOOM_MAX: 3.5,
        ZOOM_SPEED: 0.0012,

        // Tick
        TICK_INTERVAL_MS: 1000,

        // Starting gold
        GOLD_START: 30,

        // Visual
        TILE_PAD: 1, // px gap between tiles
        GRID_ALPHA: 0.045, // opacity of hidden-area grid lines
        FOG_ALPHA: 0.65, // darkness overlay on VISIBLE tiles
        DRAG_THRESHOLD_PX: 4, // px moved before click becomes drag
        NOTIFICATION_MS: 2200,

        // Tile type distribution weights (must sum to 1.0)
        TILE_WEIGHTS: Object.freeze({
          PLAINS: 0.28,
          FOREST: 0.22,
          MOUNTAIN: 0.16,
          COAL: 0.13,
          IRON: 0.09,
          COPPER: 0.07,
          RUINS: 0.05,
        }),
      });

      // ════════════════════════════════════════════════════════════════
      //  TILE TYPE REGISTRY — data-driven, single resource per tile
      // ════════════════════════════════════════════════════════════════
      const TILE_TYPE_REGISTRY = Object.freeze({
        PLAINS: {
          id: "PLAINS",
          name: "Plains",
          color: "#5a7a42",
          darkColor: "#263317",
          symbol: "≈",
          resource: "gold",
          amountPerTick: 3,
          oneTimeBonus: null,
          description: "Fertile land, steady gold income.",
        },
        FOREST: {
          id: "FOREST",
          name: "Forest",
          color: "#2d6040",
          darkColor: "#142a1c",
          symbol: "♣",
          resource: "wood",
          amountPerTick: 5,
          oneTimeBonus: null,
          description: "Dense woodland rich in timber.",
        },
        MOUNTAIN: {
          id: "MOUNTAIN",
          name: "Mountain",
          color: "#6a5c52",
          darkColor: "#2e2622",
          symbol: "▲",
          resource: "stone",
          amountPerTick: 4,
          oneTimeBonus: null,
          description: "Rocky peaks, solid stone supply.",
        },
        COAL: {
          id: "COAL",
          name: "Coal Deposit",
          color: "#3a3a50",
          darkColor: "#181820",
          symbol: "◆",
          resource: "coal",
          amountPerTick: 3,
          oneTimeBonus: null,
          description: "Underground coal seams.",
        },
        IRON: {
          id: "IRON",
          name: "Iron Vein",
          color: "#7a5840",
          darkColor: "#361f10",
          symbol: "⬡",
          resource: "iron",
          amountPerTick: 3,
          oneTimeBonus: null,
          description: "Rich iron ore beneath the surface.",
        },
        COPPER: {
          id: "COPPER",
          name: "Copper Vein",
          color: "#9a6030",
          darkColor: "#3e2210",
          symbol: "◉",
          resource: "copper",
          amountPerTick: 3,
          oneTimeBonus: null,
          description: "Glistening veins of copper ore.",
        },
        RUINS: {
          id: "RUINS",
          name: "Ancient Ruins",
          color: "#7060a0",
          darkColor: "#2a2040",
          symbol: "✦",
          resource: "gold",
          amountPerTick: 0,
          oneTimeBonus: { resource: "gold", amount: 60 },
          description: "Forgotten structures, hidden treasure.",
        },
      });

      // ════════════════════════════════════════════════════════════════
      //  RESOURCE REGISTRY — add new resources here, no other changes needed
      // ════════════════════════════════════════════════════════════════
      const RESOURCE_REGISTRY = Object.freeze({
        gold: {
          id: "gold",
          name: "Gold",
          color: "#FFD060",
          icon: "◈",
          max: 500,
        },
        wood: {
          id: "wood",
          name: "Wood",
          color: "#90B060",
          icon: "▮",
          max: 300,
        },
        stone: {
          id: "stone",
          name: "Stone",
          color: "#A0A0B0",
          icon: "▪",
          max: 300,
        },
        coal: {
          id: "coal",
          name: "Coal",
          color: "#7878A0",
          icon: "◆",
          max: 250,
        },
        iron: {
          id: "iron",
          name: "Iron",
          color: "#C09070",
          icon: "⬡",
          max: 250,
        },
        copper: {
          id: "copper",
          name: "Copper",
          color: "#D09040",
          icon: "◉",
          max: 250,
        },
      });

      // ════════════════════════════════════════════════════════════════
      //  TILE STATE
      // ════════════════════════════════════════════════════════════════
      const TileState = Object.freeze({ HIDDEN: 0, VISIBLE: 1, OPEN: 2 });

      // ════════════════════════════════════════════════════════════════
      //  UTILITIES
      // ════════════════════════════════════════════════════════════════

      /** Mulberry32 seeded PRNG — deterministic, fast, good distribution */
      class SeededRandom {
        constructor(seed) {
          this._s = seed >>> 0;
        }

        next() {
          this._s = (this._s + 0x6d2b79f5) >>> 0;
          let t = Math.imul(this._s ^ (this._s >>> 15), 1 | this._s);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        }

        /** Pick a key from { key: weight } map where weights sum to 1 */
        pickWeighted(weights) {
          const r = this.next();
          let acc = 0;
          for (const [key, w] of Object.entries(weights)) {
            acc += w;
            if (r < acc) return key;
          }
          return Object.keys(weights)[0];
        }
      }

      /** Lightweight pub/sub event bus */
      class EventBus {
        constructor() {
          this._h = {};
        }

        on(event, fn) {
          (this._h[event] ??= []).push(fn);
          return () => {
            this._h[event] = (this._h[event] || []).filter((f) => f !== fn);
          };
        }

        emit(event, data) {
          (this._h[event] || []).forEach((fn) => fn(data));
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  DOMAIN CLASSES
      // ════════════════════════════════════════════════════════════════

      class Tile {
        constructor(x, y, typeId) {
          this.x = x;
          this.y = y;
          this.typeId = typeId;
          this.state = TileState.HIDDEN;
          this.oneTimeClaimed = false;
        }
        get type() {
          return TILE_TYPE_REGISTRY[this.typeId];
        }
        get distanceFromCenter() {
          return Math.sqrt(this.x * this.x + this.y * this.y);
        }
      }

      class Chunk {
        constructor(cx, cy) {
          this.cx = cx;
          this.cy = cy;
          this.tiles = new Map(); // `${lx},${ly}` → Tile
          this._generated = false;
        }

        generate() {
          if (this._generated) return;
          // Combine MAP_SEED with chunk coords using large primes → unique seed per chunk
          const seed =
            (CONST.MAP_SEED ^ (this.cx * 73856093) ^ (this.cy * 19349663)) >>>
            0;
          const rng = new SeededRandom(seed);
          const S = CONST.CHUNK_SIZE;

          for (let ly = 0; ly < S; ly++) {
            for (let lx = 0; lx < S; lx++) {
              const gx = this.cx * S + lx;
              const gy = this.cy * S + ly;
              const typeId =
                gx === 0 && gy === 0
                  ? "PLAINS" // center is always Plains
                  : rng.pickWeighted(CONST.TILE_WEIGHTS);
              this.tiles.set(`${lx},${ly}`, new Tile(gx, gy, typeId));
            }
          }
          this._generated = true;
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  RESOURCE MANAGER
      // ════════════════════════════════════════════════════════════════

      class ResourceManager {
        constructor(bus) {
          this._bus = bus;
          /** @type {Map<string, {amount:number, max:number}>} */
          this._res = new Map();
          for (const [id, def] of Object.entries(RESOURCE_REGISTRY)) {
            this._res.set(id, { amount: 0, max: def.max });
          }
          this._res.get("gold").amount = CONST.GOLD_START;
        }

        get(id) {
          return this._res.get(id)?.amount ?? 0;
        }
        getMax(id) {
          return this._res.get(id)?.max ?? 0;
        }

        canAfford(costs) {
          for (const [id, amt] of Object.entries(costs)) {
            if (this.get(id) < amt) return false;
          }
          return true;
        }

        /** Deduct costs atomically. Returns false if insufficient. */
        spend(costs) {
          if (!this.canAfford(costs)) return false;
          for (const [id, amt] of Object.entries(costs))
            this._res.get(id).amount -= amt;
          this._bus.emit("resources:changed", this._snapshot());
          return true;
        }

        /** Add amount capped at max. */
        add(id, amount) {
          const r = this._res.get(id);
          if (!r) return;
          r.amount = Math.min(r.amount + amount, r.max);
          this._bus.emit("resources:changed", this._snapshot());
        }

        /** Batch add (used by tick). Emits a single event. */
        batchAdd(deltas) {
          for (const [id, amount] of Object.entries(deltas)) {
            const r = this._res.get(id);
            if (r) r.amount = Math.min(r.amount + amount, r.max);
          }
          this._bus.emit("resources:changed", this._snapshot());
        }

        getSnapshot() {
          return this._snapshot();
        }

        _snapshot() {
          const out = {};
          for (const [id, r] of this._res)
            out[id] = { amount: r.amount, max: r.max };
          return out;
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  MAP MANAGER
      // ════════════════════════════════════════════════════════════════

      class MapManager {
        constructor(bus) {
          this._bus = bus;
          this._chunks = new Map(); // `${cx},${cy}` → Chunk
          this._open = []; // fast iteration for tick production
          this._openedCount = 0;
        }

        // ── Chunk / tile access ──────────────────────────────────────

        _chunkKey(cx, cy) {
          return `${cx},${cy}`;
        }

        _worldToChunk(gx, gy) {
          const S = CONST.CHUNK_SIZE;
          const cx = Math.floor(gx / S);
          const cy = Math.floor(gy / S);
          const lx = ((gx % S) + S) % S;
          const ly = ((gy % S) + S) % S;
          return { cx, cy, lx, ly };
        }

        _getChunk(cx, cy) {
          const key = this._chunkKey(cx, cy);
          let chunk = this._chunks.get(key);
          if (!chunk) {
            chunk = new Chunk(cx, cy);
            chunk.generate();
            this._chunks.set(key, chunk);
          }
          return chunk;
        }

        getTile(gx, gy) {
          const { cx, cy, lx, ly } = this._worldToChunk(gx, gy);
          return this._getChunk(cx, cy).tiles.get(`${lx},${ly}`);
        }

        // ── Visibility ───────────────────────────────────────────────

        _revealNeighbors(gx, gy) {
          for (const [dx, dy] of [
            [1, 0],
            [-1, 0],
            [0, 1],
            [0, -1],
          ]) {
            const n = this.getTile(gx + dx, gy + dy);
            if (n && n.state === TileState.HIDDEN) {
              n.state = TileState.VISIBLE;
              this._bus.emit("map:tileRevealed", { tile: n });
            }
          }
        }

        // ── Open tile ────────────────────────────────────────────────

        openTile(gx, gy) {
          const tile = this.getTile(gx, gy);
          if (!tile || tile.state === TileState.OPEN) return false;
          tile.state = TileState.OPEN;
          this._open.push(tile);
          this._openedCount++;
          this._revealNeighbors(gx, gy);
          this._bus.emit("map:tileOpened", { tile });
          return true;
        }

        /** Used by GameEngine on start — open center + reveal its neighbors */
        initCenter() {
          const center = this.getTile(0, 0);
          center.state = TileState.OPEN;
          this._open.push(center);
          this._openedCount++;
          this._revealNeighbors(0, 0);
        }

        // ── Cost formula ─────────────────────────────────────────────

        calcOpenCost(gx, gy) {
          const tile = this.getTile(gx, gy);
          const dist = tile.distanceFromCenter;
          const raw =
            CONST.BASE_OPEN_COST *
            (1 + this._openedCount * CONST.OPEN_COUNT_SCALE) *
            (1 + dist * CONST.DISTANCE_SCALE);
          return Math.ceil(raw);
        }

        // ── Tick production ──────────────────────────────────────────

        /** Returns {resourceId: totalAmount} deltas for one tick */
        collectTickDeltas() {
          const deltas = {};
          for (const tile of this._open) {
            const { resource, amountPerTick } = tile.type;
            if (amountPerTick > 0)
              deltas[resource] = (deltas[resource] ?? 0) + amountPerTick;
          }
          return deltas;
        }

        // ── Queries ──────────────────────────────────────────────────

        getOpenedCount() {
          return this._openedCount;
        }

        /** Iterate all non-hidden tiles in a tile-coord bounding box. */
        iterVisibleInRect(x0, y0, x1, y1, callback) {
          for (let gy = y0; gy <= y1; gy++) {
            for (let gx = x0; gx <= x1; gx++) {
              const tile = this.getTile(gx, gy);
              callback(tile, gx, gy);
            }
          }
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  CAMERA
      // ════════════════════════════════════════════════════════════════

      class Camera {
        constructor(startX = 0, startY = 0) {
          this.x = startX; // world-coord at canvas center
          this.y = startY;
          this.zoom = 1.0;
        }

        worldToScreen(wx, wy, cw, ch) {
          return {
            sx: (wx - this.x) * this.zoom + cw / 2,
            sy: (wy - this.y) * this.zoom + ch / 2,
          };
        }

        screenToWorld(sx, sy, cw, ch) {
          return {
            wx: (sx - cw / 2) / this.zoom + this.x,
            wy: (sy - ch / 2) / this.zoom + this.y,
          };
        }

        pan(dx, dy) {
          this.x -= dx / this.zoom;
          this.y -= dy / this.zoom;
        }

        /** Zoom keeping a screen anchor point fixed in world space. */
        zoomAt(sx, sy, delta, cw, ch) {
          const { wx, wy } = this.screenToWorld(sx, sy, cw, ch);
          const factor = 1 - delta * CONST.ZOOM_SPEED;
          this.zoom = Math.max(
            CONST.ZOOM_MIN,
            Math.min(CONST.ZOOM_MAX, this.zoom * factor),
          );
          // Re-anchor: world point must stay at same screen position
          const after = this.worldToScreen(wx, wy, cw, ch);
          this.x += (after.sx - sx) / this.zoom;
          this.y += (after.sy - sy) / this.zoom;
        }

        /** Tile-coord bounding box of what's currently on screen. */
        visibleTileRect(cw, ch) {
          const ts = CONST.TILE_SIZE;
          const tl = this.screenToWorld(0, 0, cw, ch);
          const br = this.screenToWorld(cw, ch, cw, ch);
          return {
            x0: Math.floor(tl.wx / ts) - 1,
            y0: Math.floor(tl.wy / ts) - 1,
            x1: Math.ceil(br.wx / ts) + 1,
            y1: Math.ceil(br.wy / ts) + 1,
          };
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  INPUT MANAGER
      // ════════════════════════════════════════════════════════════════

      class InputManager {
        constructor(canvas, camera, bus) {
          this._canvas = canvas;
          this._camera = camera;
          this._bus = bus;
          this._drag = false;
          this._mx = 0;
          this._my = 0;
          this._dsx = 0;
          this._dsy = 0;
          this._bind();
        }

        _screenTileCoords(e) {
          const rect = this._canvas.getBoundingClientRect();
          const sx = e.clientX - rect.left;
          const sy = e.clientY - rect.top;
          const { wx, wy } = this._camera.screenToWorld(
            sx,
            sy,
            this._canvas.width,
            this._canvas.height,
          );
          const ts = CONST.TILE_SIZE;
          return { gx: Math.floor(wx / ts), gy: Math.floor(wy / ts), sx, sy };
        }

        _bind() {
          const c = this._canvas;
          c.addEventListener("mousedown", (e) => {
            this._drag = false;
            this._dsx = e.clientX;
            this._dsy = e.clientY;
            this._mx = e.clientX;
            this._my = e.clientY;
            c.classList.add("dragging");
          });
          c.addEventListener("mousemove", (e) => this._onMove(e));
          c.addEventListener("mouseup", () => c.classList.remove("dragging"));
          c.addEventListener("mouseleave", () => {
            c.classList.remove("dragging");
            this._bus.emit("input:hoverEnd", {});
          });
          c.addEventListener("click", (e) => {
            if (!this._drag) {
              const { gx, gy } = this._screenTileCoords(e);
              this._bus.emit("input:click", { gx, gy });
            }
          });
          c.addEventListener(
            "wheel",
            (e) => {
              e.preventDefault();
              const rect = c.getBoundingClientRect();
              this._camera.zoomAt(
                e.clientX - rect.left,
                e.clientY - rect.top,
                e.deltaY,
                c.width,
                c.height,
              );
            },
            { passive: false },
          );

          window.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              this._bus.emit("input:KEY:ENTER");
            }
          });
        }

        _onMove(e) {
          if (e.buttons === 1) {
            const moved = Math.hypot(
              e.clientX - this._dsx,
              e.clientY - this._dsy,
            );
            if (moved > CONST.DRAG_THRESHOLD_PX) this._drag = true;
            this._camera.pan(e.clientX - this._mx, e.clientY - this._my);
          }
          this._mx = e.clientX;
          this._my = e.clientY;
          const { gx, gy, sx, sy } = this._screenTileCoords(e);
          this._bus.emit("input:hover", {
            gx,
            gy,
            sx: e.clientX,
            sy: e.clientY,
          });
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  EFFECTS (canvas-layer visual feedback)
      // ════════════════════════════════════════════════════════════════

      class Effect {
        constructor(gx, gy, duration, color) {
          this.gx = gx;
          this.gy = gy;
          this.duration = duration;
          this.elapsed = 0;
          this.color = color;
          this.done = false;
        }
        update(dt) {
          this.elapsed += dt;
          if (this.elapsed >= this.duration) this.done = true;
        }
        get progress() {
          return Math.min(1, this.elapsed / this.duration);
        }
      }

      class EffectManager {
        constructor() {
          this._effects = [];
        }

        spawn(gx, gy, color = "#ffffff") {
          this._effects.push(new Effect(gx, gy, 600, color));
        }

        update(dt) {
          this._effects.forEach((e) => e.update(dt));
          this._effects = this._effects.filter((e) => !e.done);
        }

        render(ctx, camera, cw, ch) {
          const ts = CONST.TILE_SIZE;
          for (const e of this._effects) {
            const { sx, sy } = camera.worldToScreen(
              e.gx * ts,
              e.gy * ts,
              cw,
              ch,
            );
            const sz = ts * camera.zoom;
            const p = e.progress;
            const alpha = Math.max(0, 1 - p * p); // ease-out fade
            const grow = 1 + p * 0.4; // slight expand
            ctx.save();
            ctx.globalAlpha = alpha * 0.6;
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(
              sx + (sz * (1 - grow)) / 2,
              sy + (sz * (1 - grow)) / 2,
              sz * grow,
              sz * grow,
            );
            ctx.restore();
          }
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  RENDERER
      // ════════════════════════════════════════════════════════════════

      class Renderer {
        constructor(canvas) {
          this._canvas = canvas;
          this._ctx = canvas.getContext("2d");
          this._resize();
          window.addEventListener("resize", () => this._resize());
        }

        get width() {
          return this._canvas.width;
        }
        get height() {
          return this._canvas.height;
        }

        _resize() {
          this._canvas.width = window.innerWidth;
          this._canvas.height = window.innerHeight;
        }

        clear() {
          this._ctx.fillStyle = "#080c12";
          this._ctx.fillRect(0, 0, this.width, this.height);
        }

        renderScene(mapManager, camera, hovered, effects) {
          const ctx = this._ctx;
          const ts = CONST.TILE_SIZE;
          const cw = this.width;
          const ch = this.height;
          const rect = camera.visibleTileRect(cw, ch);

          // ── pass 1: grid lines (all tiles, even hidden) ────────────
          ctx.strokeStyle = `rgba(255,255,255,${CONST.GRID_ALPHA})`;
          ctx.lineWidth = 0.5;
          for (let gy = rect.y0; gy <= rect.y1; gy++) {
            for (let gx = rect.x0; gx <= rect.x1; gx++) {
              const { sx, sy } = camera.worldToScreen(gx * ts, gy * ts, cw, ch);
              const sz = ts * camera.zoom;
              ctx.strokeRect(sx + 0.5, sy + 0.5, sz - 1, sz - 1);
            }
          }

          // ── pass 2: tile fills ────────────────────────────────────
          for (let gy = rect.y0; gy <= rect.y1; gy++) {
            for (let gx = rect.x0; gx <= rect.x1; gx++) {
              const tile = mapManager.getTile(gx, gy);
              if (!tile || tile.state === TileState.HIDDEN) continue;
              const { sx, sy } = camera.worldToScreen(gx * ts, gy * ts, cw, ch);
              const sz = ts * camera.zoom;
              const isHov = hovered && hovered.gx === gx && hovered.gy === gy;
              this._drawTile(ctx, tile, sx, sy, sz, isHov);
            }
          }

          // ── pass 3: effects ───────────────────────────────────────
          effects.render(ctx, camera, cw, ch);

          // ── pass 4: center tile glow ──────────────────────────────
          const cTile = mapManager.getTile(0, 0);
          if (cTile && cTile.state === TileState.OPEN) {
            const { sx, sy } = camera.worldToScreen(0, 0, cw, ch);
            const sz = ts * camera.zoom;
            const pad = CONST.TILE_PAD;
            ctx.strokeStyle = "rgba(200,168,74,0.45)";
            ctx.lineWidth = 2;
            ctx.strokeRect(sx + pad, sy + pad, sz - pad * 2, sz - pad * 2);
          }
        }

        _drawTile(ctx, tile, sx, sy, sz, isHovered) {
          const type = tile.type;
          const isOpen = tile.state === TileState.OPEN;
          const pad = CONST.TILE_PAD;
          const px = sx + pad,
            py = sy + pad,
            pw = sz - pad * 2,
            ph = sz - pad * 2;

          // Background
          ctx.fillStyle = isOpen ? type.color : type.darkColor;
          ctx.fillRect(px, py, pw, ph);

          // Fog overlay for VISIBLE (known but not opened)
          if (!isOpen) {
            ctx.fillStyle = `rgba(8,12,18,${CONST.FOG_ALPHA})`;
            ctx.fillRect(px, py, pw, ph);
          }

          // Hover state
          if (isHovered) {
            if (!isOpen) {
              ctx.fillStyle = "rgba(255,255,255,0.06)";
              ctx.fillRect(px, py, pw, ph);
              ctx.strokeStyle = "rgba(200,168,74,0.75)";
              ctx.lineWidth = 1.5;
              ctx.strokeRect(px + 1, py + 1, pw - 2, ph - 2);
            } else {
              ctx.strokeStyle = "rgba(200,168,74,0.35)";
              ctx.lineWidth = 1;
              ctx.strokeRect(px, py, pw, ph);
            }
          }

          if (sz < 14) return; // too small to draw content

          const cx = px + pw / 2;
          const cy = py + ph / 2;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          if (isOpen) {
            // Main symbol
            const symSize = Math.min(sz * 0.38, 24);
            ctx.font = `${symSize}px 'Share Tech Mono', monospace`;
            ctx.fillStyle = "rgba(255,255,255,0.65)";
            ctx.fillText(type.symbol, cx, cy - (sz > 36 ? symSize * 0.35 : 0));

            // Resource label below symbol
            if (sz > 36 && type.amountPerTick > 0) {
              const resColor =
                RESOURCE_REGISTRY[type.resource]?.color ?? "#fff";
              const lblSize = Math.max(8, sz * 0.14);
              ctx.font = `${lblSize}px 'Share Tech Mono', monospace`;
              ctx.fillStyle = resColor;
              ctx.fillText(
                `+${type.amountPerTick} ${type.resource}`,
                cx,
                cy + symSize * 0.55,
              );
            }
          } else {
            // Faint question mark for visible-but-unopened
            const qSize = Math.min(sz * 0.3, 18);
            ctx.font = `${qSize}px 'Share Tech Mono', monospace`;
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.fillText("?", cx, cy);
          }
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  UI MANAGER (HTML overlay)
      // ════════════════════════════════════════════════════════════════

      class UIManager {
        constructor(bus, resourceManager, mapManager) {
          this._bus = bus;
          this._rm = resourceManager;
          this._mm = mapManager;
          this._resList = document.getElementById("res-list");
          this._stats = document.getElementById("stats");
          this._tick = document.getElementById("tick-indicator");
          this._tooltip = document.getElementById("tooltip");
          this._notif = document.getElementById("notification");
          this._notifTimer = null;
          this._hovered = null;
          this._bind();
          this._renderHUD();
        }

        _bind() {
          this._bus.on("resources:changed", () => this._renderHUD());
          this._bus.on("tick", () => this._pulseTick());
          this._bus.on("notification", (d) => this._showNotif(d.text, d.type));
          this._bus.on("input:hover", (d) => {
            this._hovered = d;
            this._renderTooltip();
          });
          this._bus.on("input:hoverEnd", () => {
            this._hovered = null;
            this._tooltip.style.display = "none";
          });
        }

        _renderHUD() {
          const snap = this._rm.getSnapshot();
          this._resList.innerHTML = Object.entries(snap)
            .map(([id, r]) => {
              const def = RESOURCE_REGISTRY[id];
              const pct = ((r.amount / r.max) * 100).toFixed(1);
              return `
        <div class="res-row">
          <span class="res-icon" style="color:${def.color}">${def.icon}</span>
          <span class="res-name">${def.name}</span>
          <div class="res-bar-wrap">
            <div class="res-bar-fill" style="width:${pct}%;background:${def.color}"></div>
          </div>
          <span class="res-val">${Math.floor(r.amount)}<span class="res-max">/${r.max}</span></span>
        </div>`;
            })
            .join("");

          this._stats.innerHTML = `⬡ Tiles explored: <b>${this._mm.getOpenedCount()}</b>`;
        }

        _pulseTick() {
          this._tick.classList.remove("pulse");
          void this._tick.offsetWidth;
          this._tick.classList.add("pulse");
        }

        _renderTooltip() {
          if (!this._hovered) return;
          const { gx, gy, sx, sy } = this._hovered;
          const tile = this._mm.getTile(gx, gy);
          if (!tile || tile.state === TileState.HIDDEN) {
            this._tooltip.style.display = "none";
            return;
          }

          const type = tile.type;
          const isOpen = tile.state === TileState.OPEN;
          const cost = isOpen ? null : this._mm.calcOpenCost(gx, gy);
          const canAff = cost !== null && this._rm.canAfford({ gold: cost });

          let html = `
      <div class="tt-title">${type.name}</div>
      <div class="tt-coords">[${gx}, ${gy}]  ·  dist ${tile.distanceFromCenter.toFixed(1)}</div>
      <div class="tt-desc">${type.description}</div>`;

          if (isOpen) {
            if (type.amountPerTick > 0) {
              const col = RESOURCE_REGISTRY[type.resource]?.color ?? "#fff";
              html += `<div class="tt-prod" style="color:${col}">+${type.amountPerTick} ${type.resource} / tick</div>`;
            }
            if (type.oneTimeBonus && !tile.oneTimeClaimed) {
              html += `<div class="tt-bonus">✦ +${type.oneTimeBonus.amount} ${type.oneTimeBonus.resource} unclaimed</div>`;
            }
          } else {
            html += `<div class="tt-cost ${canAff ? "affordable" : "expensive"}">
                 Open cost: ${cost} gold  ${canAff ? "✓" : "— not enough"}
               </div>`;
            html += `<div class="tt-hint">Click to open</div>`;
          }

          this._tooltip.innerHTML = html;
          this._tooltip.style.display = "block";

          // Smart positioning — avoid screen edges
          const TW = 196,
            TH = 130,
            M = 14;
          let tx = sx + M;
          let ty = sy - TH / 2;
          if (tx + TW > window.innerWidth) tx = sx - TW - M;
          if (ty < M) ty = M;
          if (ty + TH > window.innerHeight) ty = window.innerHeight - TH - M;
          this._tooltip.style.left = tx + "px";
          this._tooltip.style.top = ty + "px";
        }

        _showNotif(text, type = "info") {
          this._notif.textContent = text;
          this._notif.className = `${type}`;
          this._notif.style.opacity = "1";
          clearTimeout(this._notifTimer);
          this._notifTimer = setTimeout(() => {
            this._notif.style.opacity = "0";
          }, CONST.NOTIFICATION_MS);
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  GAME LOOP — separates tick (economy) from render (visual)
      // ════════════════════════════════════════════════════════════════

      class GameLoop {
        constructor(onTick, onRender) {
          this._onTick = onTick;
          this._onRender = onRender;
          this._running = false;
          this._lastTick = 0;
          this._lastFrame = 0;
          this._raf = null;
        }

        start() {
          this._running = true;
          this._lastTick = performance.now();
          this._raf = requestAnimationFrame((t) => this._loop(t));
        }

        stop() {
          this._running = false;
          if (this._raf) cancelAnimationFrame(this._raf);
        }

        _loop(now) {
          if (!this._running) return;
          const elapsed = now - this._lastTick;
          if (elapsed >= CONST.TICK_INTERVAL_MS) {
            this._onTick(now, elapsed);
            this._lastTick = now - (elapsed % CONST.TICK_INTERVAL_MS);
          }
          const dt = now - this._lastFrame;
          this._lastFrame = now;
          this._onRender(now, dt);
          this._raf = requestAnimationFrame((t) => this._loop(t));
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  GAME ENGINE — orchestrates everything
      // ════════════════════════════════════════════════════════════════

      // ════════════════════════════════════════════════════════════════
      //  PLOT — Settlement Simulation Engine
      // ════════════════════════════════════════════════════════════════

      class Plot {
        constructor(config = {}) {
          this.size = config.size ?? 5;
          this.turns = config.turns ?? 12;

          this.tiles = this._generateGrid(this.size);
          this.opened = new Set();

          this.resources = {
            food: 0,
            wood: 0,
          };

          this.population = config.basePopulation ?? 5;

          this.turnsUsed = 0;
          this.finished = false;
        }

        // ──────────────────────────────────────────────────────────────
        //  GRID GENERATION (simplified, can plug your SeededRandom later)
        // ──────────────────────────────────────────────────────────────

        _generateGrid(size) {
          const types = ["FOREST", "FARMLAND", "WATER", "HUNT"];
          const grid = [];

          for (let y = 0; y < size; y++) {
            const row = [];
            for (let x = 0; x < size; x++) {
              row.push({
                x,
                y,
                type: types[Math.floor(Math.random() * types.length)],
                open: false,
              });
            }
            grid.push(row);
          }

          // center = bonfire
          const cx = Math.floor(size / 2);
          const cy = Math.floor(size / 2);
          grid[cy][cx] = { x: cx, y: cy, type: "BONFIRE", open: true };

          return grid;
        }

        getTile(x, y) {
          return this.tiles[y]?.[x];
        }

        openTile(x, y) {
          if (this.finished) return false;
          if (this.turnsUsed >= this.turns) return false;

          const tile = this.getTile(x, y);
          if (!tile || tile.open) return false;

          tile.open = true;
          this.opened.add(`${x},${y}`);
          this.turnsUsed++;

          return true;
        }

        // ──────────────────────────────────────────────────────────────
        //  PRODUCTION LOGIC
        // ──────────────────────────────────────────────────────────────

        _collectProduction(state) {
          for (let row of this.tiles) {
            for (let tile of row) {
              if (!tile.open) continue;

              switch (tile.type) {
                case "FOREST":
                  state.wood += 2;
                  break;
                case "FARMLAND":
                  state.food += 2;
                  break;
                case "HUNT":
                  state.food += 3;
                  break;
                case "WATER":
                  state.food += 1; // simple bonus
                  break;
              }
            }
          }
        }

        // ──────────────────────────────────────────────────────────────
        //  EVALUATION (CORE MECHANIC)
        // ──────────────────────────────────────────────────────────────

        evaluate() {
          const simTicks = 20;

          const state = {
            food: this.resources.food,
            wood: this.resources.wood,
            population: this.population,
          };

          let survivedTicks = 0;
          let collapsed = false;

          for (let t = 0; t < simTicks; t++) {
            this._collectProduction(state);

            // consumption
            state.food -= state.population;
            state.wood -= 1; // bonfire

            if (state.food < 0 || state.wood < 0) {
              collapsed = true;
              break;
            }

            survivedTicks++;
          }

          const result = {
            survivedTicks,
            collapsed,
            finalState: state,
          };

          this.finished = true;
          return this._toCard(result);
        }

        // ──────────────────────────────────────────────────────────────
        //  CARD OUTPUT
        // ──────────────────────────────────────────────────────────────

        _toCard(result) {
          let grade = "D";

          if (!result.collapsed && result.survivedTicks === 20) grade = "B";
          if (!result.collapsed && result.finalState.food > 50) grade = "A";
          if (!result.collapsed && result.finalState.food > 100) grade = "S";

          const populationExport =
            this.population + Math.floor(result.finalState.food / 10);

          return {
            type: "PLOT",
            grade,
            population: populationExport,
            meta: {
              survivedTicks: result.survivedTicks,
              collapsed: result.collapsed,
            },
          };
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  DISTRICT — Aggregation + Early Simulation Layer
      // ════════════════════════════════════════════════════════════════

      class District {
        constructor(config = {}) {
          this.plots = [];
          this.population = 0;

          this.resources = {
            commerce: 0,
            craft: 0,
            food: 0,
          };

          this.specialization = null;
          this.maxPlots = config.maxPlots ?? 3;
        }

        // ──────────────────────────────────────────────────────────────
        //  INPUT: PLOT CARDS
        // ──────────────────────────────────────────────────────────────

        addPlotCard(card) {
          if (this.plots.length >= this.maxPlots) return false;
          if (card.type !== "PLOT") return false;

          this.plots.push(card);
          this.population += card.population;

          return true;
        }

        // ──────────────────────────────────────────────────────────────
        //  SIMULATION (simplified placeholder)
        // ──────────────────────────────────────────────────────────────

        simulate(ticks = 20) {
          let commerce = 0;
          let craft = 0;
          let food = 0;

          for (let t = 0; t < ticks; t++) {
            // basic production rules
            commerce += Math.floor(this.population * 0.3);
            craft += Math.floor(this.population * 0.2);
            food += Math.floor(this.population * 0.25);

            // upkeep
            food -= this.population * 0.2;

            if (food < 0) break;
          }

          this.resources = { commerce, craft, food };
        }

        // ──────────────────────────────────────────────────────────────
        //  SPECIALIZATION
        // ──────────────────────────────────────────────────────────────

        setSpecialization(type) {
          this.specialization = type;
        }

        // ──────────────────────────────────────────────────────────────
        //  OUTPUT CARD
        // ──────────────────────────────────────────────────────────────

        toCard() {
          let bonus = 1;

          if (this.specialization === "TRADE") bonus = 1.5;
          if (this.specialization === "CRAFT") bonus = 1.5;

          return {
            type: "DISTRICT",
            population: this.population,
            commerce: Math.floor(this.resources.commerce * bonus),
            craft: Math.floor(this.resources.craft * bonus),
            specialization: this.specialization,
          };
        }
      }

      class GameEngine {
        constructor() {
          // Core systems
          this.bus = new EventBus();
          this.res = new ResourceManager(this.bus);
          this.map = new MapManager(this.bus);
          this.effects = new EffectManager();

          // Camera centered on tile (0,0)
          const halfTile = CONST.TILE_SIZE / 2;
          this.camera = new Camera(halfTile, halfTile);

          // Rendering
          this._canvas = document.getElementById("gameCanvas");
          this.renderer = new Renderer(this._canvas);

          // Input & UI
          this.input = new InputManager(this._canvas, this.camera, this.bus);
          this.ui = new UIManager(this.bus, this.res, this.map);

          this.plot = new Plot({ size: 5 });
          this.district = new District();

          // Game loop
          this.loop = new GameLoop(
            (now, dt) => this._tick(now, dt),
            (now, dt) => this._render(now, dt),
          );

          this._hovered = null;
          this._bindEvents();
        }

        init() {
          this.map.initCenter();
          this.loop.start();
          this.bus.emit("notification", {
            text: "Click visible tiles to explore",
            type: "info",
          });
        }

        _bindEvents() {
          this.bus.on("input:click", ({ gx, gy }) => this._handleClick(gx, gy));
          this.bus.on("input:hover", (d) => {
            this._hovered = d;
          });
          this.bus.on("input:hoverEnd", () => {
            this._hovered = null;
          });
          this.bus.on("input:KEY:ENTER", () => {
            const card = this.plot.evaluate();
            console.log("Plot card:", card);

            this.district.addPlotCard(card);
            this.district.simulate();

            console.log("District:", this.district.toCard());
          });
        }

        _handleClick(gx, gy) {
          const tile = this.map.getTile(gx, gy);
          if (!tile || tile.state !== TileState.VISIBLE) return;

          const cost = this.map.calcOpenCost(gx, gy);
          if (!this.res.spend({ gold: cost })) {
            this.bus.emit("notification", {
              text: `Need ${cost} gold to open!`,
              type: "error",
            });
            this.effects.spawn(gx, gy, "#e05050");
            return;
          }

          this.map.openTile(gx, gy);
          this.effects.spawn(gx, gy, tile.type.color);

          // Claim one-time bonus
          if (tile.type.oneTimeBonus && !tile.oneTimeClaimed) {
            tile.oneTimeClaimed = true;
            const b = tile.type.oneTimeBonus;
            this.res.add(b.resource, b.amount);
            this.bus.emit("notification", {
              text: `✦ Found +${b.amount} ${b.resource}!`,
              type: "bonus",
            });
          }
        }

        _tick(now, dt) {
          const deltas = this.map.collectTickDeltas();
          if (Object.keys(deltas).length > 0) this.res.batchAdd(deltas);
          this.bus.emit("tick", { now });
        }

        _render(now, dt) {
          this.effects.update(dt);
          this.renderer.clear();
          this.renderer.renderScene(
            this.map,
            this.camera,
            this._hovered,
            this.effects,
          );
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  BOOTSTRAP
      // ════════════════════════════════════════════════════════════════
      const game = new GameEngine();
      game.init();
    </script>
  </body>
</html>
