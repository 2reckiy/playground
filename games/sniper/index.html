<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sniper 3D Real Bullet</title>
    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
        background: #111;
        cursor: none;
        height: 100%;
      }
      canvas {
        display: block;
      }
      #scope {
        position: absolute;
        width: 100px;
        height: 100px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        pointer-events: none;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 40%,
          transparent 80%
        );
      }
      #hud,
      #message {
        position: absolute;
        color: white;
        font-family: sans-serif;
        text-shadow: 0 0 5px black;
      }
      #hud {
        top: 10px;
        left: 10px;
        font-size: 16px;
      }
      #message {
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <div id="scope"></div>
    <div id="message"></div>
    <div id="hud"></div>
    <canvas id="game"></canvas>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scope = document.getElementById("scope");
      const message = document.getElementById("message");
      const hud = document.getElementById("hud");

      let width = window.innerWidth;
      let height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;

      const FOV = 800;
      const BULLET_SPEED = 1000; // m/s
      const GRAVITY = 9.8; // m/s²

      let mouse = { x: width / 2, y: height / 2 };
      let bullets = [];
      let effects = [];
      let wind = (Math.random() - 0.5) * 100;

      function randomTarget() {
        return {
          x: (Math.random() - 0.5) * 1000,
          y: -(Math.random() * 400 + 200),
          z: Math.random() * 2000 + 1000,
          size: 1.5,
        };
      }

      let target = randomTarget();

      function showMessage(text, time = 1000) {
        message.textContent = text;
        clearTimeout(message._timeout);
        message._timeout = setTimeout(() => (message.textContent = ""), time);
      }

      function shoot() {
        // Step 1: Convert mouse to a point in world space at fixed depth
        const depth = 2000;
        const screenX = mouse.x - width / 2;
        const screenY = mouse.y - height; // from bottom center
        const worldX = screenX * (depth / FOV);
        const worldY = screenY * (depth / FOV);

        // Step 2: Calculate direction vector from origin to this point
        const dirX = worldX;
        const dirY = worldY;
        const dirZ = depth;

        const length = Math.sqrt(dirX ** 2 + dirY ** 2 + dirZ ** 2);
        const normX = dirX / length;
        const normY = dirY / length;
        const normZ = dirZ / length;

        // Step 3: Bullet starts at bottom-center
        bullets.push({
          x: 0,
          y: 0,
          z: 0,
          dirX: normX,
          dirY: normY,
          dirZ: normZ,
          time: 0,
          hit: false,
        });

        showMessage("Bang!");
      }

      function project3D(x, y, z) {
        const scale = FOV / (FOV + z);
        return {
          x: width / 2 + x * scale,
          y: height + y * scale,
          r: scale,
        };
      }

      function drawTarget() {
        const proj = project3D(target.x, target.y, target.z);
        const radius = target.size * 30 * proj.r;
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = "red";
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.stroke();
      }

      function drawBullets(dt) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          b.time += dt;

          const d = BULLET_SPEED * b.time;
          b.x = b.dirX * d + wind * b.time;
          b.y = b.dirY * d + 0.5 * GRAVITY * b.time ** 2;
          b.z = b.dirZ * d;

          const proj = project3D(b.x, b.y, b.z);
          ctx.beginPath();
          ctx.arc(proj.x, proj.y, 4 * proj.r, 0, Math.PI * 2);
          ctx.fillStyle = "yellow";
          ctx.fill();

          if (!b.hit && b.z >= target.z) {
            const dx = b.x - target.x;
            const dy = b.y - target.y;
            const dz = b.z - target.z;

            const dist = Math.sqrt(dx ** 2 + dy ** 2 + dz ** 2);

            console.log({
              by: b.y,
              bx: b.x,
              tx: target.x,
              ty: target.y,
              dx,
              dy,
              dy,
              dist,
              size: target.size * 30,
            });
            if (dist < target.size * 30) {
              console.log("Hit");
              showMessage("Hit!");
              const projT = project3D(target.x, target.y, target.z);
              effects.push({ x: projT.x, y: projT.y, r: 0 });
              bullets.splice(i, 1);
              setTimeout(() => target = randomTarget(), 1000)
            } else {
              showMessage("Miss!");
              console.log("Miss");
            }
            b.hit = true;
          }

          if (b.z > target.z + 500) {
            bullets.splice(i, 1);
          }
        }
      }

      function drawEffects() {
        for (let i = effects.length - 1; i >= 0; i--) {
          const e = effects[i];
          e.r += 1.5;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255,255,0,${1 - e.r / 30})`;
          ctx.stroke();
          if (e.r > 30) effects.splice(i, 1);
        }
      }

      function drawScene(dt) {
        ctx.clearRect(0, 0, width, height);
        drawTarget();
        drawBullets(dt);
        drawEffects();
      }

      function updateHud() {
        hud.innerHTML = `Wind: ${wind.toFixed(
          1
        )} px/s<br>Distance: ${target.z.toFixed(0)} m`;
      }

      window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        scope.style.left = mouse.x - 50 + "px";
        scope.style.top = mouse.y - 50 + "px";
      });

      window.addEventListener("click", shoot);

      window.addEventListener("resize", () => {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      });

      let lastTime = performance.now();
      function loop(t) {
        const dt = (t - lastTime) / 1000;
        lastTime = t;
        drawScene(dt);
        updateHud();
        requestAnimationFrame(loop);
      }

      loop(lastTime);
    </script>
  </body>
</html>
