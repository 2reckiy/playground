<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archery Game</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f0f8ff;
        margin: 0;
        padding: 20px;
        overflow-x: hidden;
      }

      #game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0 auto;
        max-width: 1000px;
      }

      #game-title {
        color: #2c3e50;
        margin-bottom: 10px;
      }

      #game-area {
        position: relative;
        width: 800px;
        height: 300px;
        background-color: #87ceeb;
        border: 3px solid #4682b4;
        border-radius: 10px;
        margin: 20px 0;
        overflow: hidden;
      }

      #bow {
        position: absolute;
        left: 50px;
        bottom: 50px;
        width: 80px;
        height: 80px;
        transform-origin: 50% 100%;
        transition: transform 0.2s;
      }

      #arrow {
        position: absolute;
        left: 130px;
        bottom: 90px;
        width: 60px;
        height: 4px;
        background-color: #8b4513;
        display: none;
        transform-origin: left center;
      }

      #arrow-head {
        position: absolute;
        right: -8px;
        top: -3px;
        width: 0;
        height: 0;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        border-left: 10px solid #555;
      }

      #target {
        position: absolute;
        right: 100px;
        bottom: 50px;
        width: 60px;
        height: 60px;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="white" stroke="black"/><circle cx="50" cy="50" r="40" fill="red" stroke="black"/><circle cx="50" cy="50" r="30" fill="white" stroke="black"/><circle cx="50" cy="50" r="20" fill="red" stroke="black"/><circle cx="50" cy="50" r="10" fill="white" stroke="black"/></svg>');
        background-size: contain;
        transition: right 1s;
      }

      #controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 20px;
      }

      #angle-control {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }

      #angle-slider {
        width: 200px;
        margin: 0 10px;
      }

      #angle-value {
        font-weight: bold;
        width: 40px;
      }

      button {
        background-color: #4caf50;
        border: none;
        color: white;
        padding: 10px 20px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 5px;
      }

      button:hover {
        background-color: #45a049;
      }

      #score-display {
        font-size: 18px;
        font-weight: bold;
        margin: 10px 0;
      }

      #message {
        height: 20px;
        color: #e74c3c;
        font-weight: bold;
        margin: 10px 0;
      }

      #wind-display {
        font-style: italic;
        margin: 5px 0;
      }

      .ground {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 50px;
        background-color: #8b4513;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <h1 id="game-title">Archery Challenge</h1>

      <div id="controls">
        <div id="angle-control">
          <span>Bow Angle:</span>
          <input type="range" id="angle-slider" min="-45" max="45" value="0" />
          <span id="angle-value">0°</span>
        </div>
        <div id="wind-display">Wind: 0 m/s</div>
        <button id="shoot-btn">Shoot Arrow</button>
        <div id="message"></div>
      </div>

      <div id="score-display">Score: 0</div>

      <div id="game-area">
        <div class="ground"></div>
        <img
          id="bow"
          src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M20,50 Q50,20 80,50 Q50,80 20,50' fill='none' stroke='brown' stroke-width='8'/><line x1='50' y1='20' x2='50' y2='80' stroke='brown' stroke-width='3'/></svg>"
          alt="Bow" />
        <div id="arrow"><div id="arrow-head"></div></div>
        <div id="target"></div>
      </div>
    </div>

    <script>
      // Game variables
      let score = 0;
      let currentAngle = 0;
      let windSpeed = 0;
      let targetDistance = 0;
      let gameActive = true;

      // DOM elements
      const bow = document.getElementById("bow");
      const arrow = document.getElementById("arrow");
      const target = document.getElementById("target");
      const angleSlider = document.getElementById("angle-slider");
      const angleValue = document.getElementById("angle-value");
      const shootBtn = document.getElementById("shoot-btn");
      const scoreDisplay = document.getElementById("score-display");
      const messageDisplay = document.getElementById("message");
      const windDisplay = document.getElementById("wind-display");
      const gameArea = document.getElementById("game-area");

      // Initialize game
      function initGame() {
        score = 0;
        updateScore();
        setRandomTargetPosition();
        generateWind();
        gameActive = true;
        messageDisplay.textContent = "";
      }

      // Set random target position
      function setRandomTargetPosition() {
        const gameWidth = gameArea.offsetWidth;
        const minDistance = 300;
        const maxDistance = 600;
        targetDistance =
          Math.floor(Math.random() * (maxDistance - minDistance + 1)) +
          minDistance;
        target.style.right = gameWidth - targetDistance - 50 + "px";
      }

      // Generate random wind speed (-5 to 5 m/s)
      function generateWind() {
        windSpeed = (Math.random() * 10 - 5).toFixed(1);
        windDisplay.textContent = `Wind: ${windSpeed} m/s`;
      }

      // Update score display
      function updateScore() {
        scoreDisplay.textContent = `Score: ${score}`;
      }

      // Calculate arrow trajectory
      function shootArrow() {
        if (!gameActive) return;

        gameActive = false;
        arrow.style.display = "block";
        arrow.style.transform = `rotate(${currentAngle}deg)`;

        // Physics constants
        const gravity = 9.8; // m/s^2
        const initialVelocity = 30; // m/s
        const timeStep = 0.05; // seconds
        const pixelsPerMeter = 5; // Scale factor

        // Convert angle to radians
        const angleRad = (currentAngle * Math.PI) / 180;

        // Initial velocity components
        let vx = initialVelocity * Math.cos(angleRad);
        let vy = -initialVelocity * Math.sin(angleRad);

        // Initial position (meters)
        let x = 0;
        let y = 0;

        // Arrow animation
        let time = 0;
        let arrowHit = false;

        const arrowInterval = setInterval(() => {
          time += timeStep;

          // Update position using projectile motion equations
          x = vx * time + (windSpeed * time * time) / 2;
          y = vy * time + 0.5 * gravity * time * time;

          // Convert to pixels
          const arrowX = 130 + x * pixelsPerMeter;
          const arrowY = 90 - y * pixelsPerMeter;

          // Check if arrow is out of bounds
          if (arrowY > 300 || arrowX > 800 || arrowY < 0) {
            clearInterval(arrowInterval);
            messageDisplay.textContent = "Missed!";
            setTimeout(resetArrow, 1500);
            return;
          }

          // Update arrow position
          arrow.style.left = arrowX + "px";
          arrow.style.bottom = arrowY + "px";

          // Calculate current angle for arrow rotation (for visual effect)
          const currentVx = vx + windSpeed * time;
          const currentVy = vy + gravity * time;
          const currentAngleRad = Math.atan2(-currentVy, currentVx);
          arrow.style.transform = `rotate(${
            (currentAngleRad * 180) / Math.PI
          }deg)`;

          // Check for collision with target
          const targetRect = target.getBoundingClientRect();
          const arrowRect = arrow.getBoundingClientRect();

          if (
            arrowRect.right > targetRect.left &&
            arrowRect.left < targetRect.right &&
            arrowRect.bottom > targetRect.top &&
            arrowRect.top < targetRect.bottom &&
            !arrowHit
          ) {
            arrowHit = true;
            clearInterval(arrowInterval);
            calculateScore(arrowX, arrowY);
            setTimeout(resetArrow, 1500);
          }
        }, timeStep * 1000);
      }

      // Calculate score based on arrow position relative to target center
      function calculateScore(arrowX, arrowY) {
        const targetRect = target.getBoundingClientRect();
        const targetCenterX = targetRect.left + targetRect.width / 2;
        const targetCenterY = targetRect.top + targetRect.height / 2;
        const arrowTipX =
          arrowX + 60 * Math.cos((currentAngle * Math.PI) / 180); // Account for arrow rotation
        const arrowTipY =
          arrowY - 60 * Math.sin((currentAngle * Math.PI) / 180);

        // Distance from center (in pixels)
        const distance = Math.sqrt(
          Math.pow(arrowTipX - targetCenterX, 2) +
            Math.pow(arrowTipY - targetCenterY, 2)
        );

        // Calculate score (10 to 1 based on distance from center)
        let points = 0;
        if (distance < 10) points = 10;
        else if (distance < 20) points = 8;
        else if (distance < 30) points = 5;
        else if (distance < 40) points = 3;
        else if (distance < 50) points = 1;

        score += points;
        updateScore();

        if (points > 0) {
          messageDisplay.textContent = `Hit! ${points} points`;
        } else {
          messageDisplay.textContent = "Missed!";
        }
      }

      // Reset arrow and prepare for next shot
      function resetArrow() {
        arrow.style.display = "none";
        arrow.style.left = "130px";
        arrow.style.bottom = "90px";
        arrow.style.transform = "rotate(0deg)";
        setRandomTargetPosition();
        generateWind();
        gameActive = true;
      }

      // Event listeners
      angleSlider.addEventListener("input", function () {
        currentAngle = parseInt(this.value);
        angleValue.textContent = currentAngle + "°";
        bow.style.transform = `rotate(${-currentAngle}deg)`;
      });

      shootBtn.addEventListener("click", shootArrow);

      // Initialize game
      initGame();
    </script>
  </body>
</html>
