<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mystery Minimal Game with Particle Types</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #111;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #gameOver {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #0ff;
        font-family: monospace;
        font-size: 32px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="gameOver">GAME OVER</div>
    <canvas id="game"></canvas>
    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let energy = 50;
      const DOT_CONSUME = 0.05;
      const PAIR_CONSUME = 0.1;
      const MAX_PARTICLES = 100;

      // --- Classes ---
      class ElementaryParticle {
        constructor(x, y, shape, color) {
          this.x = x;
          this.y = y;
          this.baseX = x;
          this.baseY = y;
          this.connected = false;
          this.vx = 0;
          this.vy = 0;
          this.shape = shape; // "circle" or "square"
          this.color = color; // any string
        }
        update(delta, energyFactor) {
          const movement = 1 + energyFactor;
          this.vx += (Math.random() - 0.5) * 0.1 * movement;
          this.vy += (Math.random() - 0.5) * 0.1 * movement;
          this.vx += (this.baseX - this.x) * 0.01;
          this.vy += (this.baseY - this.y) * 0.01;
          this.x += this.vx;
          this.y += this.vy;
          this.vx *= 0.9;
          this.vy *= 0.9;
        }
        draw(alpha) {
          ctx.fillStyle = this.color.replace("ALPHA", alpha);
          if (this.shape === "circle") {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
            ctx.fill();
          } else if (this.shape === "square") {
            ctx.fillRect(this.x - 5, this.y - 5, 10, 10);
          }
        }
      }

      class Pair {
        constructor(p1, p2) {
          this.p1 = p1;
          this.p2 = p2;
        }
        update(tension = 0.02) {
          const dx = this.p2.x - this.p1.x;
          const dy = this.p2.y - this.p1.y;
          this.p1.vx += dx * tension;
          this.p1.vy += dy * tension;
          this.p2.vx -= dx * tension;
          this.p2.vy -= dy * tension;
        }
        draw(alpha) {
          ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(this.p1.x, this.p1.y);
          ctx.lineTo(this.p2.x, this.p2.y);
          ctx.stroke();
        }
      }

      class AmbientParticle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.alpha = Math.random() * 0.5 + 0.1;
          this.fade = Math.random() * 0.02 + 0.005;
        }
        update() {
          this.x += (Math.random() - 0.5) * 1.5;
          this.y += (Math.random() - 0.5) * 1.5;
          this.alpha += (Math.random() - 0.5) * this.fade;
          if (this.alpha < 0) this.alpha = 0;
          if (this.alpha > 1) this.alpha = 1;
        }
        draw() {
          ctx.fillStyle = `rgba(0,255,255,${this.alpha})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // --- Game State ---
      let particles = [];
      let elements = [];
      let pairs = [];
      let lastTime = performance.now();
      let gameOver = false;

      // Particle types
      const shapes = [
        "circle",
        "circle",
        "circle",
        "square",
        "square",
        "square",
      ];
      const colors = [
        "rgba(0,255,255,ALPHA)", // circle 1
        "rgba(255,0,255,ALPHA)", // circle 2
        "rgba(255,255,0,ALPHA)", // circle 3
        "rgba(255,0,0,ALPHA)", // square 1
        "rgba(0,255,0,ALPHA)", // square 2
        "rgba(0,0,255,ALPHA)", // square 3
      ];

      // --- Game Logic ---
      canvas.addEventListener("click", (e) => {
        if (!gameOver) {
          const i = Math.floor(Math.random() * shapes.length);
          elements.push(
            new ElementaryParticle(e.clientX, e.clientY, shapes[i], colors[i])
          );
        }
      });

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function createAmbientParticles() {
        const count = Math.min(MAX_PARTICLES, Math.floor(energy));
        while (particles.length < count) {
          particles.push(new AmbientParticle());
        }
        if (particles.length > count) particles.splice(count);
      }

      function update() {
        if (gameOver) return;

        const now = performance.now();
        const delta = (now - lastTime) / 1000;
        lastTime = now;

        // Consume energy
        energy -= elements.length * DOT_CONSUME * delta;
        energy -= pairs.length * PAIR_CONSUME * delta;
        if (energy <= 0) {
          energy = 0;
          gameOver = true;
          document.getElementById("gameOver").style.display = "block";
        }

        // Update ambient particles
        createAmbientParticles();
        particles.forEach((p) => p.update());

        // Update elements
        elements.forEach((el) => el.update(delta, energy / 50));

        // Create new pairs
        for (let i = 0; i < elements.length; i++) {
          const a = elements[i];
          if (a.connected) continue;
          for (let j = i + 1; j < elements.length; j++) {
            const b = elements[j];
            if (b.connected) continue;
            if (distance(a, b) < 100) {
              const pair = new Pair(a, b);
              pairs.push(pair);
              a.connected = true;
              b.connected = true;
              break;
            }
          }
        }

        // Update pairs
        pairs.forEach((p) => p.update());
      }

      function draw() {
        // Background
        const bgAlpha = 0.05 + Math.min(1, energy / 50) * 0.2;
        ctx.fillStyle = `rgba(17,17,17,${1 - bgAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Ambient particles
        particles.forEach((p) => p.draw());

        // Pairs
        const lineAlpha = 0.1 + Math.min(1, energy / 50) * 0.9;
        pairs.forEach((p) => p.draw(lineAlpha));

        // Elements
        const dotAlpha = 0.2 + Math.min(1, energy / 50) * 0.8;
        elements.forEach((el) => el.draw(dotAlpha));
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      loop();

      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    </script>
  </body>
</html>
