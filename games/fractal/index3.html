<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfectly Centered Fractals</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #050508; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1); color: white;
            padding: 15px; border-radius: 10px; backdrop-filter: blur(5px);
            pointer-events: none; border: 1px solid rgba(255,255,255,0.2);
        }
        #btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 12px 30px; background: white; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        #btn:hover { background: #00ffcc; transform: translateX(-50%) scale(1.1); }
    </style>
</head>
<body>
    <div id="ui"><h2 id="name" style="margin:0;">Loading...</h2></div>
    <button id="btn" onclick="nextPattern()">Next Pattern</button>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        
        const patterns = [
            { name: "Sierpinski Arrowhead", axiom: "F", rules: {"F":"G-F-G", "G":"F+G+F"}, angle: 60, iter: 7, step: 5 },
            { name: "Koch Snowflake", axiom: "F++F++F", rules: {"F":"F-F++F-F"}, angle: 60, iter: 4, step: 6 },
            { name: "Dragon Curve", axiom: "FX", rules: {"X":"X+YF+", "Y":"-FX-Y"}, angle: 90, iter: 11, step: 6 },
            { name: "Hilbert Curve", axiom: "A", rules: {"A":"-BF+AFA+FB-", "B":"+AF-BFB-FA+"}, angle: 90, iter: 5, step: 15 },
            { name: "Levy C Curve", axiom: "F", rules: {"F":"+F--F+"}, angle: 45, iter: 11, step: 8 }
        ];

        let currentIndex = 0;
        let path = "";
        let progress = 0;
        let offset = { x: 0, y: 0 };
        let animationFrame;

        function generateLSystem(config) {
            let current = config.axiom;
            for (let i = 0; i < config.iter; i++) {
                let next = "";
                for (let char of current) next += config.rules[char] || char;
                current = next;
            }
            return current;
        }

        /**
         * Calculates the bounds of the fractal to find the center
         */
        function calculateBounds(p) {
            let x = 0, y = 0, angle = 0;
            let minX = 0, maxX = 0, minY = 0, maxY = 0;

            for (let char of path) {
                if (char === "F" || char === "G") {
                    x += Math.cos(angle * Math.PI / 180) * p.step;
                    y += Math.sin(angle * Math.PI / 180) * p.step;
                    minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                    minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                } else if (char === "+") angle += p.angle;
                else if (char === "-") angle -= p.angle;
            }

            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;
            
            return {
                x: (canvas.width / 2) - centerX,
                y: (canvas.height / 2) - centerY
            };
        }

        function initPattern() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const p = patterns[currentIndex];
            document.getElementById('name').innerText = p.name;
            path = generateLSystem(p);
            offset = calculateBounds(p);
            progress = 0;
            cancelAnimationFrame(animationFrame);
            drawLoop();
        }

        function drawLoop() {
            const p = patterns[currentIndex];
            let x = offset.x;
            let y = offset.y;
            let angle = 0;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 1.5;
            ctx.lineCap = "round";

            ctx.beginPath();
            ctx.moveTo(x, y);
            
            for (let i = 0; i < progress; i++) {
                let char = path[i];
                if (char === "F" || char === "G") {
                    x += Math.cos(angle * Math.PI / 180) * p.step;
                    y += Math.sin(angle * Math.PI / 180) * p.step;
                    ctx.lineTo(x, y);
                } else if (char === "+") angle += p.angle;
                else if (char === "-") angle -= p.angle;
                
                if (i % 200 === 0) {
                    ctx.strokeStyle = `hsl(${(i / 100 + (currentIndex * 70)) % 360}, 80%, 60%)`;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                }
            }
            ctx.stroke();

            if (progress < path.length) {
                progress += Math.ceil(path.length / 150); 
                animationFrame = requestAnimationFrame(drawLoop);
            }
        }

        function nextPattern() {
            currentIndex = (currentIndex + 1) % patterns.length;
            initPattern();
        }

        window.addEventListener('resize', initPattern);
        initPattern();
    </script>
</body>
</html>
