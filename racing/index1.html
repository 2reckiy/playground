<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mini Racing</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #111;
        font-family: Arial;
        color: white;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.4);
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 14px;
        line-height: 1.4em;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui">
      <div>Lap Time: <span id="lap">0.00</span>s</div>
      <div>Best Time: <span id="best">--</span></div>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      resize();
      window.addEventListener("resize", resize);

      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
      }

      // ==========================
      // Track Generation
      // ==========================
      function generateTrack() {
        const pts = [];
        const COUNT = 24;
        const R = 350;

        for (let i = 0; i < COUNT; i++) {
          const angle = (i / COUNT) * Math.PI * 2;
          const rr = R + Math.random() * 120 - 60;
          pts.push({ x: rr * Math.cos(angle), y: rr * Math.sin(angle) });
        }
        return pts;
      }
      const track = generateTrack();

      // ==========================
      // Car
      // ==========================
      let car = {
        x: 0,
        y: -300,
        angle: 0,
        speed: 0,
        maxSpeed: 3.2,
        accel: 0.02,
        friction: 0.03,
        turnSpeed: 0.04,
      };

      const keys = {};
      window.onkeydown = (e) => (keys[e.key] = true);
      window.onkeyup = (e) => (keys[e.key] = false);

      // ==========================
      // Lap Timing
      // ==========================
      let lapTime = 0;
      let bestTime = localStorage.getItem("minirace-best") || null;
      let lastTimestamp = performance.now();

      function updateLap(dt) {
        lapTime += dt / 1000;

        // Check if car crosses start/finish line (y < -290 → y > -290)
        if (car.y > -290 && car.y < -280 && Math.abs(car.x) < 40) {
          if (lapTime > 1.0) {
            if (!bestTime || lapTime < bestTime) {
              bestTime = lapTime.toFixed(2);
              localStorage.setItem("minirace-best", bestTime);
            }
          }
          lapTime = 0;
        }
      }

      // ==========================
      // Update UI
      // ==========================
      function updateUI() {
        document.getElementById("lap").innerText = lapTime.toFixed(2);
        document.getElementById("best").innerText = bestTime ? bestTime : "--";
      }

      // ==========================
      // Game Loop
      // ==========================
      function loop(ts) {
        const dt = ts - lastTimestamp;
        lastTimestamp = ts;

        update(dt);
        draw();
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      function update(dt) {
        updateLap(dt);
        updateUI();

        // movement
        if (keys["ArrowUp"]) car.speed += car.accel;
        if (keys["ArrowDown"]) car.speed -= car.accel;

        if (keys["ArrowLeft"])
          car.angle -= car.turnSpeed * (car.speed / car.maxSpeed);
        if (keys["ArrowRight"])
          car.angle += car.turnSpeed * (car.speed / car.maxSpeed);

        // friction
        car.speed *= 1 - car.friction;
        car.speed = Math.min(car.speed, car.maxSpeed);
        if (car.speed < 0) car.speed = 0;

        // position
        car.x += Math.cos(car.angle) * car.speed;
        car.y += Math.sin(car.angle) * car.speed;
      }

      // ==========================
      // Draw
      // ==========================
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Camera center on car
        ctx.save();
        ctx.translate(canvas.width / 2 - car.x, canvas.height / 2 - car.y);

        drawTrack();
        drawCar();

        ctx.restore();
      }

      function drawTrack() {
        ctx.lineWidth = 40;
        ctx.strokeStyle = "#333";

        ctx.beginPath();
        for (let i = 0; i < track.length; i++) {
          const p = track[i];
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(track[i].x, track[i].y);
        }
        ctx.closePath();
        ctx.stroke();
      }

      function drawCar() {
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        ctx.fillStyle = "red";
        ctx.fillRect(-10, -6, 20, 12);
        ctx.restore();
      }
    </script>
  </body>
</html>
