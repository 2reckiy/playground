<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Minimalist Rocket Dev</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a0c;
            font-family: monospace;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff41;
            pointer-events: none;
            text-shadow: 0 0 5px #00ff41;
        }
    </style>
</head>

<body>
    <div id="ui">
        <h2>MISSION CONTROL</h2>
        <div id="stats">ALTITUDE: 0m<br>FUEL: 100%<br>SPEED: 0 m/s</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * BASE MODULE CLASS
         * Every part of the rocket inherits from this.
         */
        class Module {
            constructor(name, weight, fuelCapacity = 0, thrust = 0, stability = 1) {
                this.name = name;
                this.weight = weight;
                this.fuelCapacity = fuelCapacity;
                this.thrust = thrust;
                this.stability = stability;
            }
        }

        /**
         * ROCKET CLASS
         * Manages the assembly and physics of the modules.
         */
        class Rocket {
            constructor() {
                this.modules = [];
                this.y = 0; // Altitude
                this.x = 0; // Horizontal position
                this.velocity = 0;
                this.fuel = 0;
                this.acceleration = 0;
                this.isIgnited = false;

                this.tilt = 0; // 0 is straight up
                this.angularVelocity = 0;
            }

            addModule(mod) {
                this.modules.push(mod);
                this.fuel += mod.fuelCapacity;
            }

            getTotalWeight() {
                // Sum weight of modules + current fuel weight (fuel has mass!)
                const hardwareWeight = this.modules.reduce((sum, m) => sum + m.weight, 0);
                return hardwareWeight + (this.fuel * 0.5);
            }

            getTotalThrust() {
                return this.modules.reduce((sum, m) => sum + m.thrust, 0);
            }

            getStabilityRating() {
                // Higher stability = harder to tilt. Fins help!
                return this.modules.reduce((sum, m) => sum + (m.stability || 0), 0);
            }
            // F = ma -> a = F/m
            update(dt) {
                if (!this.isIgnited) return;

                const weight = this.getTotalWeight();
                const thrust = (this.fuel > 0) ? this.getTotalThrust() : 0;
                const gravity = 9.8;
                const stability = this.getStabilityRating();

                // 1. CALCULATE FORCES
                // We only calculate acceleration if thrust > gravity OR if we are already in the air
                let netForceY = 0;

                if (this.y <= 0) {
                    // On the ground: acceleration is only positive (lift off) or zero (stuck)
                    netForceY = Math.max(0, (thrust * Math.cos(this.tilt)) - (weight * gravity));
                } else {
                    // In the air: Gravity always pulls down
                    netForceY = (thrust * Math.cos(this.tilt)) - (weight * gravity);
                }

                this.acceleration = netForceY / weight;
                this.velocity += this.acceleration * dt;

                // 2. DRIFT & ROTATION (Only if moving or in the air)
                if (this.y > 0 || thrust > 0) {
                    let windForce = (Math.random() - 0.5) * 5.0; // Increased for visibility
                    let tiltChange = (windForce / (stability + 1)); // +1 to avoid div by zero
                    this.angularVelocity += tiltChange * dt;
                    this.tilt += this.angularVelocity * dt;

                    let thrustX = thrust * Math.sin(this.tilt);
                    this.x += (thrustX / weight) * dt;
                }

                // 3. POSITION UPDATE
                this.y += this.velocity * dt;
                this.fuel -= (thrust * 0.01) * dt;

                // 4. IMPROVED CRASH/LANDING CONDITION
                if (this.y < 0) {
                    this.y = 0;
                    // Only reset if falling hard (a crash)
                    if (this.velocity < -5) {
                        console.log("Crashed!");
                        this.isIgnited = false;
                    }
                    this.velocity = 0;
                    this.tilt = 0;
                    this.angularVelocity = 0;
                    this.acceleration = 0;
                }
            }

            draw(ctx, canvas) {
                // Calculate screen position
                const screenX = (canvas.width / 2) + this.x;
                const screenY = canvas.height - 100;

                ctx.save();
                ctx.translate(screenX, screenY);
                ctx.rotate(this.tilt); // ROTATE THE ENTIRE CANVAS CONTEXT

                ctx.fillStyle = "#00ff41";
                ctx.textAlign = "center";

                let offset = 0;
                this.modules.forEach((mod, index) => {
                    let symbol = "|[ ]|";
                    if (index === this.modules.length - 1) symbol = "^"; // Nose is last in array (top)

                    // Draw Flame
                    if (index === 0 && this.fuel > 0 && this.isIgnited) {
                        ctx.fillText("vvv", 0, 40 + (Math.random() * 5));
                    }

                    ctx.fillText(symbol, 0, -offset);
                    offset += 20;
                });

                ctx.restore(); // Reset rotation for UI
            }
        }

        class Star {
            constructor(canvas) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                // Stars at different "depths" move at different speeds
                this.depth = Math.random() * 0.5 + 0.1;
            }

            draw(ctx, canvas, rocketY) {
                // This is the magic: we use modulo to make stars loop infinitely
                let relativeY = (this.y + (rocketY * this.depth)) % canvas.height;

                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(this.x, relativeY, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        /**
         * ENGINE / CORE GAME LOOP
         */
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.rocket = new Rocket();
                this.stars = [];
                this.lastTime = 0;

                window.addEventListener('resize', () => this.resize());
                window.addEventListener('keydown', (e) => { if (e.code === 'Space') this.rocket.isIgnited = true; });

                this.resize();
                this.initRocket();
                this.generateStars();
                requestAnimationFrame((t) => this.loop(t));
            }

            generateStars() {
                this.stars = [];
                for (let i = 0; i < 100; i++) {
                    this.stars.push(new Star(this.canvas));
                }
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.generateStars(); // Regrow stars on resize
            }

            initRocket() {
                // Boosted Engine so it actually lifts off!
                this.rocket.addModule(new Module("Engine", 50, 0, 8000));
                this.rocket.addModule(new Module("Tank", 100, 1000));
                this.rocket.addModule(new Module("Nose", 20, 0, 0, 5)); // Added some stability
            }

            drawGround(rocketY) {
                const groundLevel = this.canvas.height - 100;
                const currentGroundY = groundLevel + rocketY;

                // Only draw if it's on screen
                if (currentGroundY < this.canvas.height + 50) {
                    this.ctx.strokeStyle = "#00ff41";
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, currentGroundY);
                    this.ctx.lineTo(this.canvas.width, currentGroundY);
                    this.ctx.stroke();

                    // Draw some "Launch Pad" details
                    for (let i = -2; i <= 2; i++) {
                        let padX = (this.canvas.width / 2) + (i * 40);
                        this.ctx.strokeRect(padX - 10, currentGroundY - 5, 20, 5);
                    }
                }
            }

            loop(time) {
                const dt = (time - this.lastTime) / 1000;
                this.lastTime = time;

                // 1. CLEAR
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // 2. DRAW BACKGROUND (Stars)
                this.stars.forEach(star => star.draw(this.ctx, this.canvas, this.rocket.y));

                // 3. DRAW GROUND
                this.drawGround(this.rocket.y);

                // 4. UPDATE & DRAW ROCKET
                this.rocket.update(dt);
                this.rocket.draw(this.ctx, this.canvas);

                // 5. UPDATE UI
                document.getElementById('stats').innerHTML = `
                    ALTITUDE: ${Math.floor(this.rocket.y)}m<br>
                    FUEL: ${Math.max(0, Math.floor(this.rocket.fuel))} units<br>
                    SPEED: ${Math.floor(this.rocket.velocity)} m/s<br>
                    ACCEL: ${this.rocket.acceleration.toFixed(2)} m/s²<br>
                    WEIGHT: ${Math.floor(this.rocket.getTotalWeight())} kg
                `;

                requestAnimationFrame((t) => this.loop(t));
            }
        }
        new Game();
    </script>
</body>

</html>
