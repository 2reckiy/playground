<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Volume-Based Color Mixer</title>
    <style>
      body {
        margin: 0;
        background: #050505;
        color: #eee;
        font-family: system-ui;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      .stats {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        padding: 20px;
        border-radius: 10px;
        border: 1px solid #333;
      }
      .hex-display {
        font-family: monospace;
        font-size: 1.1em;
        margin-top: 10px;
        padding: 5px;
        border-radius: 4px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="stats">
      <div style="color: #00ffff">Liquid A: 1L (#00ffff)</div>
      <div style="color: #ff00ff">Liquid B: 10L (#ff00ff)</div>
      <hr style="border: 0; border-top: 1px solid #444; margin: 10px 0" />
      <div>Mixed Result:</div>
      <div id="resultHex" class="hex-display">#000000</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      // Configuration
      const liquidA = { hex: "#00FFFF", r: 0, g: 255, b: 255, vol: 1 };
      const liquidB = { hex: "#FF00FF", r: 255, g: 0, b: 255, vol: 10 };

      function calculateWeightedMix(c1, c2) {
        const totalVol = c1.vol + c2.vol;

        // Weighted Square Root Average (Luminance-preserving)
        const r = Math.sqrt(
          (c1.r ** 2 * c1.vol + c2.r ** 2 * c2.vol) / totalVol,
        );
        const g = Math.sqrt(
          (c1.g ** 2 * c1.vol + c2.g ** 2 * c2.vol) / totalVol,
        );
        const b = Math.sqrt(
          (c1.b ** 2 * c1.vol + c2.b ** 2 * c2.vol) / totalVol,
        );

        const toHex = (v) => Math.round(v).toString(16).padStart(2, "0");
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`.toUpperCase();
      }

      const mixedColor = calculateWeightedMix(liquidA, liquidB);
      const display = document.getElementById("resultHex");
      display.innerText = mixedColor;
      display.style.backgroundColor = mixedColor;
      display.style.color =
        parseInt(mixedColor.slice(1), 16) > 0xffffff / 2 ? "black" : "white";

      let angle = 0;

      function draw() {
        const w = (canvas.width = window.innerWidth);
        const h = (canvas.height = window.innerHeight);
        ctx.clearRect(0, 0, w, h);

        const centerX = w / 2;
        const centerY = h / 2;

        // Visualizing volume by size
        const radiusA = 40 * Math.sqrt(liquidA.vol); // Area proportional to volume
        const radiusB = 40 * Math.sqrt(liquidB.vol);

        const xA = centerX + Math.cos(angle) * 100;
        const xB = centerX + Math.cos(angle + Math.PI) * 100;

        // Draw Liquid A
        ctx.fillStyle = liquidA.hex;
        ctx.beginPath();
        ctx.arc(xA, centerY - 50, radiusA, 0, Math.PI * 2);
        ctx.fill();

        // Draw Liquid B
        ctx.fillStyle = liquidB.hex;
        ctx.beginPath();
        ctx.arc(xB, centerY + 50, radiusB, 0, Math.PI * 2);
        ctx.fill();

        // Draw the Mixed Result as a "Bucket"
        ctx.fillStyle = mixedColor;
        ctx.fillRect(centerX - 100, h - 150, 200, 100);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.strokeRect(centerX - 100, h - 150, 200, 100);

        angle += 0.01;
        requestAnimationFrame(draw);
      }

      draw();
    </script>
  </body>
</html>
