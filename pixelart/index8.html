<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <title>LEGO Mosaic Studio — Professional Schema</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 20px;
        background: #eef2f3;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        align-items: flex-end;
      }
      label {
        font-size: 11px;
        font-weight: bold;
        color: #666;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      input,
      select {
        padding: 8px;
        border: 1px solid #dfe6e9;
        border-radius: 6px;
      }

      .main-layout {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 25px;
      }
      .canvas-area {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }

      .canvas-container {
        position: relative;
        border: 2px solid #2d3436;
        display: inline-block;
        background: #000;
        overflow: hidden;
      }
      #selector {
        position: absolute;
        border: 2px solid #00b894;
        background: rgba(0, 184, 148, 0.1);
        cursor: move;
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.7);
        z-index: 5;
      }
      .handle {
        position: absolute;
        width: 16px;
        height: 16px;
        background: #00b894;
        border: 2px solid #fff;
        border-radius: 50%;
        bottom: -8px;
        right: -8px;
        cursor: se-resize;
      }

      .preview-box {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #outCanvas {
        image-rendering: pixelated;
        width: 100%;
        max-width: 600px;
        border: 1px solid #b2bec3;
        background: #fff;
        cursor: crosshair;
      }

      .inventory-panel {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        height: fit-content;
      }
      .inventory-title {
        font-size: 18px;
        font-weight: 800;
        border-bottom: 2px solid #f1f2f6;
        padding-bottom: 10px;
        margin-bottom: 15px;
      }
      .color-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
        padding: 8px;
        border-radius: 8px;
        background: #f9f9f9;
      }
      .color-swatch {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: bold;
      }
      .count-badge {
        font-weight: bold;
        margin-left: auto;
        color: #2d3436;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }
      #dl {
        background: #0984e3;
        color: white;
      }
      #dl:hover {
        background: #74b9ff;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <label>Файл: <input id="file" type="file" accept="image/*" /></label>
      <label
        >Zoom фото:
        <input
          id="zoomSlider"
          type="range"
          min="0.1"
          max="2"
          step="0.1"
          value="0.6"
      /></label>
      <label
        >Палітра:
        <select id="paletteSelect">
          <option value="lego_grayscale">LEGO Grayscale (Linear)</option>
          <option value="lego_primary">Classic Primary</option>
        </select>
      </label>
      <label
        >Ширина (цеглин):
        <input id="targetW" type="number" value="32" style="width: 50px"
      /></label>
      <label
        >Висота (цеглин):
        <input id="targetH" type="number" value="32" style="width: 50px"
      /></label>
      <button id="dl">💾 Скачати Схему (PNG)</button>
    </div>

    <div class="main-layout">
      <div class="canvas-area">
        <div style="display: flex; flex-direction: row; gap: 30px">
          <div class="canvas-container" id="wrapper">
            <canvas id="origCanvas"></canvas>
            <div id="selector"><div class="handle"></div></div>
          </div>
          <div class="preview-box">
            <div
              style="
                font-size: 12px;
                font-weight: bold;
                margin-bottom: 10px;
                color: #636e72;
              "
            >
              План збірки (Координати кожні 10 пікселів)
            </div>
            <canvas id="outCanvas"></canvas>
          </div>
        </div>
      </div>

      <div class="inventory-panel">
        <div class="inventory-title">🧩 Деталі</div>
        <div id="inventoryList">Очікування...</div>
      </div>
    </div>

    <script>
      const PALETTES = {
        lego_grayscale: [
          { r: 255, g: 255, b: 255, n: "White", id: "W" },
          { r: 178, g: 190, b: 195, n: "L.Gray", id: "LG" },
          { r: 120, g: 120, b: 120, n: "D.Gray", id: "g" },
          { r: 99, g: 110, b: 114, n: "D.Gray", id: "DG" },
          { r: 0, g: 0, b: 0, n: "Black", id: "B" },
        ],
        lego_primary: [
          { r: 255, g: 255, b: 255, n: "White", id: "1" },
          { r: 0, g: 0, b: 0, n: "Black", id: "2" },
          { r: 214, g: 48, b: 49, n: "Red", id: "3" },
          { r: 9, g: 132, b: 227, n: "Blue", id: "4" },
          { r: 253, g: 203, b: 110, n: "Yellow", id: "5" },
          { r: 0, g: 184, b: 148, n: "Green", id: "6" },
        ],
      };

      let img = new Image(),
        loaded = false,
        isDragging = false,
        isResizing = false;
      let selX = 20,
        selY = 20,
        selW = 150,
        selH = 150;
      let startMouseX, startMouseY, startX, startY, startW;

      const ui = {
        file: document.getElementById("file"),
        zoom: document.getElementById("zoomSlider"),
        palette: document.getElementById("paletteSelect"),
        tw: document.getElementById("targetW"),
        th: document.getElementById("targetH"),
        orig: document.getElementById("origCanvas"),
        out: document.getElementById("outCanvas"),
        inv: document.getElementById("inventoryList"),
        sel: document.getElementById("selector"),
        wrap: document.getElementById("wrapper"),
      };

      ui.file.onchange = (e) => {
        const url = URL.createObjectURL(e.target.files[0]);
        img.onload = () => {
          loaded = true;
          updateCanvas();
        };
        img.src = url;
      };

      ui.zoom.oninput = updateCanvas;
      [ui.palette, ui.tw, ui.th].forEach(
        (el) =>
          (el.oninput = () => {
            const r = parseInt(ui.tw.value) / parseInt(ui.th.value);
            selH = selW / r;
            updateUI();
            process();
          }),
      );

      function updateCanvas() {
        if (!loaded) return;
        const z = parseFloat(ui.zoom.value);
        ui.orig.width = img.width * z;
        ui.orig.height = img.height * z;
        ui.orig
          .getContext("2d")
          .drawImage(img, 0, 0, ui.orig.width, ui.orig.height);
        const r = parseInt(ui.tw.value) / parseInt(ui.th.value);
        selH = selW / r;
        updateUI();
        process();
      }

      ui.wrap.onmousedown = (e) => {
        if (!loaded) return;
        if (e.target.classList.contains("handle")) isResizing = true;
        else if (e.target === ui.sel) isDragging = true;
        else return;
        startMouseX = e.clientX;
        startMouseY = e.clientY;
        startX = selX;
        startY = selY;
        startW = selW;
      };

      window.onmousemove = (e) => {
        if (!loaded || (!isDragging && !isResizing)) return;
        const dx = e.clientX - startMouseX;
        const ratio = parseInt(ui.tw.value) / parseInt(ui.th.value);
        if (isDragging) {
          selX = Math.max(0, Math.min(startX + dx, ui.orig.width - selW));
          selY = Math.max(
            0,
            Math.min(startY + (e.clientY - startMouseY), ui.orig.height - selH),
          );
        }
        if (isResizing) {
          selW = Math.max(30, Math.min(startW + dx, ui.orig.width - selX));
          selH = selW / ratio;
        }
        updateUI();
        process();
      };

      window.onmouseup = () => (isDragging = isResizing = false);

      function updateUI() {
        ui.sel.style.left = selX + "px";
        ui.sel.style.top = selY + "px";
        ui.sel.style.width = selW + "px";
        ui.sel.style.height = selH + "px";
        ui.sel.style.display = loaded ? "block" : "none";
      }

      function process() {
        if (!loaded) return;
        const tw = parseInt(ui.tw.value),
          th = parseInt(ui.th.value);
        ui.out.width = tw;
        ui.out.height = th;
        const ctx = ui.out.getContext("2d");
        ctx.drawImage(ui.orig, selX, selY, selW, selH, 0, 0, tw, th);

        const imgData = ctx.getImageData(0, 0, tw, th),
          d = imgData.data;
        const palette = PALETTES[ui.palette.value];
        const counts = {};

        for (let i = 0; i < d.length; i += 4) {
          let minD = Infinity,
            closest = palette[0];
          for (const c of palette) {
            const dist =
              Math.pow(d[i] - c.r, 2) +
              Math.pow(d[i + 1] - c.g, 2) +
              Math.pow(d[i + 2] - c.b, 2);
            if (dist < minD) {
              minD = dist;
              closest = c;
            }
          }
          d[i] = closest.r;
          d[i + 1] = closest.g;
          d[i + 2] = closest.b;
          counts[closest.n] = (counts[closest.n] || 0) + 1;
        }
        ctx.putImageData(imgData, 0, 0);
        updateInventory(counts, palette);
      }

      function updateInventory(counts, palette) {
        ui.inv.innerHTML = palette
          .map(
            (c) => `
          <div class="color-row">
            <div class="color-swatch" style="background:rgb(${c.r},${c.g},${c.b}); color:${c.r + c.g + c.b < 380 ? "#fff" : "#000"}">${c.id}</div>
            <span style="font-size:12px; font-weight:bold;">${c.n}</span>
            <span class="count-badge">${counts[c.n] || 0} шт.</span>
          </div>`,
          )
          .join("");
      }

      document.getElementById("dl").onclick = () => {
        // High-res schema logic
        const tw = parseInt(ui.tw.value),
          th = parseInt(ui.th.value);
        const cellSize = 30; // pixels for a high-res print
        const schema = document.createElement("canvas");
        schema.width = tw * cellSize + 50;
        schema.height = th * cellSize + 50;
        const sctx = schema.getContext("2d");
        sctx.fillStyle = "#fff";
        sctx.fillRect(0, 0, schema.width, schema.height);

        const pixels = ui.out.getContext("2d").getImageData(0, 0, tw, th).data;
        const palette = PALETTES[ui.palette.value];

        sctx.font = "10px sans-serif";
        sctx.textAlign = "center";
        sctx.textBaseline = "middle";

        for (let y = 0; y < th; y++) {
          for (let x = 0; x < tw; x++) {
            const i = (y * tw + x) * 4;
            const r = pixels[i],
              g = pixels[i + 1],
              b = pixels[i + 2];
            const colorObj = palette.find(
              (p) => p.r == r && p.g == g && p.b == b,
            );

            const px = x * cellSize + 40;
            const py = y * cellSize + 40;

            sctx.fillStyle = `rgb(${r},${g},${b})`;
            sctx.fillRect(px, py, cellSize, cellSize);
            sctx.strokeStyle = "#dfe6e9";
            sctx.strokeRect(px, py, cellSize, cellSize);

            // Add text label
            sctx.fillStyle = r + g + b < 380 ? "#fff" : "#000";
            sctx.fillText(colorObj.id, px + cellSize / 2, py + cellSize / 2);

            // Draw coordinates on edges
            if (x === 0) {
              sctx.fillStyle = "#000";
              sctx.fillText(y + 1, 20, py + cellSize / 2);
            }
            if (y === 0) {
              sctx.fillStyle = "#000";
              sctx.fillText(x + 1, px + cellSize / 2, 20);
            }
          }
        }

        const link = document.createElement("a");
        link.download = "lego_blueprint.png";
        link.href = schema.toDataURL();
        link.click();
      };
    </script>
  </body>
</html>
