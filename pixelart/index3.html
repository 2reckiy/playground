<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LEGO Pixelizer — single file</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        margin: 18px;
        color: #111;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 12px;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      label {
        font-size: 13px;
      }
      input[type="range"] {
        width: 180px;
      }
      canvas {
        background: #fff;
        border: 1px solid #ddd;
        image-rendering: pixelated;
        display: block;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .col {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #f5f5f5;
        cursor: pointer;
      }
      small {
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>LEGO Pixelizer — зображення → піксель-схема (4–8 сірих відтінків)</h1>

    <div class="controls">
      <label>
        <input id="file" type="file" accept="image/*" />
        <small>Завантажити зображення</small>
      </label>

      <label
        >Розмір цеглинки:
        <input id="pixelSize" type="range" min="2" max="80" value="16" />
        <span id="pixelSizeVal">16</span> px
      </label>

      <label
        >Result Width:
        <input id="targetW" type="number" value="128" style="width: 50px" />
        px</label
      >
      <label
        >Result Height:
        <input id="targetH" type="number" value="128" style="width: 50px" />
        px</label
      >

      <label
        >Кількість відтінків:
        <select id="shades">
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6" selected>6</option>
          <option value="7">7</option>
          <option value="8">8</option>
        </select>
      </label>

      <label><input id="grid" type="checkbox" checked /> Показати сітку</label>

      <button id="processBtn">Застосувати</button>
      <button id="downloadBtn" disabled>Завантажити PNG</button>
    </div>

    <div class="row">
      <div class="col">
        <div>Оригінал</div>
        <canvas id="origCanvas" width="320" height="240"></canvas>
      </div>

      <div class="col">
        <div>Результат (піксель + сірі відтінки)</div>
        <canvas id="outCanvas" width="320" height="240"></canvas>
      </div>
    </div>

    <script>
      (() => {
        const fileInput = document.getElementById("file");
        const pixelSizeInput = document.getElementById("pixelSize");
        const pixelSizeVal = document.getElementById("pixelSizeVal");
        const shadesSelect = document.getElementById("shades");
        const gridCheckbox = document.getElementById("grid");
        const processBtn = document.getElementById("processBtn");
        const downloadBtn = document.getElementById("downloadBtn");

        const origCanvas = document.getElementById("origCanvas");
        const outCanvas = document.getElementById("outCanvas");
        const origCtx = origCanvas.getContext("2d");
        const outCtx = outCanvas.getContext("2d");

        let img = new Image();
        let loaded = false;

        // Показати значення ползунка
        pixelSizeInput.addEventListener("input", () => {
          pixelSizeVal.textContent = pixelSizeInput.value;
        });

        // Завантаження з файлу
        fileInput.addEventListener("change", (e) => {
          const f = e.target.files && e.target.files[0];
          if (!f) return;
          const url = URL.createObjectURL(f);
          img = new Image();
          img.onload = () => {
            loaded = true;
            URL.revokeObjectURL(url);
            // Встановимо розміри canvas для відображення (обмежимо для зручності)
            const maxW = 640;
            const maxH = 480;
            let w = img.width;
            let h = img.height;
            const ratio = w / h;
            if (w > maxW) {
              w = maxW;
              h = Math.round(w / ratio);
            }
            if (h > maxH) {
              h = maxH;
              w = Math.round(h * ratio);
            }
            origCanvas.width = w;
            origCanvas.height = h;
            outCanvas.width = w;
            outCanvas.height = h;
            // Малюємо оригінал (з smoothing)
            origCtx.imageSmoothingEnabled = true;
            origCtx.clearRect(0, 0, w, h);
            origCtx.drawImage(img, 0, 0, w, h);
            // Вмикаємо кнопку
            downloadBtn.disabled = true;
          };
          img.onerror = () => alert("Не вдалося завантажити зображення.");
          img.src = url;
        });

        // Основна функція: пікселізація + квантизація в сірі відтінки
        function process() {
          if (!loaded) {
            alert("Завантажте зображення.");
            return;
          }

          // 1. Get user inputs
          const targetW = parseInt(
            document.getElementById("targetW").value,
            10,
          );
          const targetH = parseInt(
            document.getElementById("targetH").value,
            10,
          );
          const pixelSize = parseInt(pixelSizeInput.value, 10);
          const shades = parseInt(shadesSelect.value, 10);

          // 2. Set the Output Canvas
          outCanvas.width = targetW;
          outCanvas.height = targetH;

          // 3. Calculate grid dimensions
          const cols = Math.floor(targetW / pixelSize);
          const rows = Math.floor(targetH / pixelSize);

          // 4. Center-Crop Calculation (Zoom-to-Fill)
          const imgRatio = img.width / img.height;
          const gridRatio = cols / rows;

          let sourceX = 0,
            sourceY = 0,
            sourceW = img.width,
            sourceH = img.height;

          if (imgRatio > gridRatio) {
            // Image is wider than the target aspect ratio: Crop the sides
            sourceW = img.height * gridRatio;
            sourceX = (img.width - sourceW) / 2;
          } else {
            // Image is taller than the target aspect ratio: Crop the top/bottom
            sourceH = img.width / gridRatio;
            sourceY = (img.height - sourceH) / 2;
          }

          // 5. Create offscreen canvas for processing
          const small = document.createElement("canvas");
          small.width = cols;
          small.height = rows;
          const sctx = small.getContext("2d");

          // Draw the CROPPED section of the original image into the small grid
          sctx.imageSmoothingEnabled = true;
          sctx.drawImage(
            img,
            sourceX,
            sourceY,
            sourceW,
            sourceH,
            0,
            0,
            cols,
            rows,
          );

          // 6. Grayscale & Quantization
          const imgData = sctx.getImageData(0, 0, cols, rows);
          const data = imgData.data;
          const step = 255 / (shades - 1);

          for (let i = 0; i < data.length; i += 4) {
            const lum =
              0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2];
            const v = Math.round(Math.round(lum / step) * step);
            data[i] = data[i + 1] = data[i + 2] = v;
          }
          sctx.putImageData(imgData, 0, 0);

          // 7. Draw to Main Canvas (Upscale)
          outCtx.imageSmoothingEnabled = false;
          outCtx.drawImage(
            small,
            0,
            0,
            cols,
            rows,
            0,
            0,
            cols * pixelSize,
            rows * pixelSize,
          );

          // 8. Draw Grid
          if (gridCheckbox.checked) {
            outCtx.strokeStyle = "rgba(0,0,0,0.15)";
            outCtx.lineWidth = 1;
            for (let x = 0; x <= targetW; x += pixelSize) {
              outCtx.beginPath();
              outCtx.moveTo(x + 0.5, 0);
              outCtx.lineTo(x + 0.5, targetH);
              outCtx.stroke();
            }
            for (let y = 0; y <= targetH; y += pixelSize) {
              outCtx.beginPath();
              outCtx.moveTo(0, y + 0.5);
              outCtx.lineTo(targetW, y + 0.5);
              outCtx.stroke();
            }
          }

          downloadBtn.disabled = false;
        }
        processBtn.addEventListener("click", process);

        downloadBtn.addEventListener("click", () => {
          const link = document.createElement("a");
          link.download = "lego_pixel_map.png";
          link.href = outCanvas.toDataURL("image/png");
          link.click();
        });

        // Дозволимо обробляти double-click на оригіналі щоб клонувати у результат
        origCanvas.addEventListener("dblclick", () => {
          if (loaded) process();
        });

        // Початкові підказки
        // Якщо хочеш — можна також автоматично пікселізувати при завантаженні:
        // img.onload -> process();
      })();
    </script>
  </body>
</html>
