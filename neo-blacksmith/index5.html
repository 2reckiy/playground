<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMITHY | MULTI-REVEAL</title>
    <style>
        :root {
            --bg: #bcff2e;
            --primary: #ff0054;
            --secondary: #00f5d4;
            --accent: #fee440;
            --dark: #000;
            --border: 5px solid #000;
            --shadow: 8px 8px 0px #000;
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
        }

        header {
            height: 100px;
            background: white;
            border-bottom: var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left,
        .header-right {
            display: flex;
            gap: 15px;
        }

        .stat-box {
            background: white;
            border: 4px solid #000;
            padding: 10px;
            box-shadow: 4px 4px 0 #000;
            width: 150px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .stat-box span {
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        #main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* --- UPDATED REVEAL AREA --- */
        #forge-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: repeating-linear-gradient(45deg, #a2d2ff, #a2d2ff 10px, #bde0fe 10px, #bde0fe 20px);
        }

        #multicraft-badge {
            position: absolute;
            top: 20%;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border: var(--border);
            box-shadow: var(--shadow);
            transform: rotate(-10deg);
            font-size: 1.5rem;
            display: none;
            z-index: 5;
        }

        #item-reveal-zone {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            min-height: 350px;
        }

        .reveal-card {
            width: 220px;
            height: 300px;
            background: white;
            border: var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes pop {
            0% {
                transform: scale(0) rotate(-10deg);
                opacity: 0;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .btn-forge {
            margin-top: 50px;
            background: var(--primary);
            color: white;
            border: var(--border);
            padding: 20px 80px;
            font-size: 2.5rem;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        /* --- SIDEBAR --- */
        #inventory-sidebar {
            width: 380px;
            background: white;
            border-left: var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: var(--border);
            background: var(--accent);
        }

        .btn-sell-all {
            background: var(--secondary);
            border: var(--border);
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            font-family: 'Arial Black';
        }

        .inventory-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f0f0f0;
            min-height: 0;
        }

        .inventory-flex-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .item-slot {
            width: calc(33.33% - 6px);
            aspect-ratio: 1 / 1;
            border: 3px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 2px 2px 0 #000;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <div class="stat-box"><span>💰</span><span id="gold">100</span></div>
            <div class="stat-box" style="width:120px"><span>LVL</span><span id="lvl">1</span></div>
        </div>
        <div class="header-right">
            <div class="stat-box"><span>🧱</span><span id="iron">50</span></div>
            <button class="stat-box" style="background:var(--secondary); cursor:pointer"
                onclick="engine.buyIron()">+IRON $20</button>
        </div>
    </header>

    <div id="main-container">
        <main id="forge-area">
            <div id="multicraft-badge">X2 MULTICRAFT!</div>
            <div id="item-reveal-zone"></div>

            <button class="btn-forge" onclick="engine.forge()">FORGE</button>
        </main>

        <aside id="inventory-sidebar">
            <div class="sidebar-header"><button class="btn-sell-all" onclick="engine.sellAll()">SELL ALL</button></div>
            <div class="inventory-scroll">
                <div class="inventory-flex-grid" id="inv-grid"></div>
            </div>
        </aside>
    </div>

    <script>
        const RARITIES = {
            COMMON: { label: 'Common', weight: 70, multi: 1, color: '#ffffff' },
            RARE: { label: 'Rare', weight: 20, multi: 3, color: '#3a86ff' },
            LEGENDARY: { label: 'Legendary', weight: 10, multi: 10, color: '#ffbe0b' }
        };

        const FORGE_ODDS = [
            { count: 3, chance: 0.10 },
            { count: 2, chance: 0.30 },
            { count: 1, chance: 1.00 }
        ];

        class Item {
            constructor(name, val, rarity, icon) {
                this.id = Math.random();
                this.name = name;
                this.val = val;
                this.rarity = rarity;
                this.icon = icon;
            }
        }

        class GameEngine {
            constructor() {
                this.gold = 100; this.iron = 50; this.lvl = 1;
                this.inventory = [];
                this.blueprints = [
                    { name: 'AXE', icon: '🪓', base: 10 },
                    { name: 'SWORD', icon: '⚔️', base: 12 },
                    { name: 'SHIELD', icon: '🛡️', base: 15 }
                ];
                this.updateUI();
            }

            buyIron() { if (this.gold >= 20) { this.gold -= 20; this.iron += 10; this.updateUI(); } }

            forge() {
                if (this.iron < 1) return;
                this.iron -= 1;

                let count = 1;
                const roll = Math.random();
                for (let odd of FORGE_ODDS) {
                    if (roll <= odd.chance) {
                        count = odd.count;
                        break;
                    }
                }

                const currentBatch = [];
                for (let i = 0; i < count; i++) {
                    const item = this.generateSingleItem();
                    this.inventory.push(item);
                    currentBatch.push(item);
                }

                this.displayRevealBatch(currentBatch);
                this.updateUI();
            }

            generateSingleItem() {
                const bp = this.blueprints[Math.floor(Math.random() * this.blueprints.length)];
                const rar = this.pickRarity();
                const val = Math.floor(bp.base * rar.multi * (1 + this.lvl * 0.1));
                return new Item(bp.name, val, rar, bp.icon);
            }

            pickRarity() {
                const r = Math.random() * 100;
                let sum = 0;
                for (let k in RARITIES) {
                    sum += RARITIES[k].weight;
                    if (r <= sum) return RARITIES[k];
                }
                return RARITIES.COMMON;
            }

            displayRevealBatch(batch) {
                const zone = document.getElementById('item-reveal-zone');
                zone.innerHTML = ''; // Clear previous

                batch.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'reveal-card';
                    card.style.backgroundColor = item.rarity.color;
                    card.style.animationDelay = `${index * 0.1}s`; // Staggered entry

                    card.innerHTML = `
                    <div style="font-size:0.7rem; border:2px solid #000; padding:2px 8px; margin-bottom:10px; background:white">${item.rarity.label}</div>
                    <div style="font-size:4rem">${item.icon}</div>
                    <div style="margin:5px 0">${item.name}</div>
                    <div style="background:black; color:white; padding:2px 10px">$${item.val}</div>
                `;
                    zone.appendChild(card);
                });

                const badge = document.getElementById('multicraft-badge');
                if (batch.length > 1) {
                    badge.innerText = `X${batch.length} MULTICRAFT!`;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            }

            sellAll() {
                this.gold += this.inventory.reduce((s, i) => s + i.val, 0);
                this.inventory = [];
                this.updateUI();
            }

            updateUI() {
                document.getElementById('gold').innerText = this.gold;
                document.getElementById('iron').innerText = this.iron;
                document.getElementById('lvl').innerText = this.lvl;

                const grid = document.getElementById('inv-grid');
                grid.innerHTML = '';
                this.inventory.forEach(item => {
                    const slot = document.createElement('div');
                    slot.className = 'item-slot';
                    slot.style.backgroundColor = item.rarity.color;
                    slot.innerHTML = `<span>${item.icon}</span>`;
                    grid.appendChild(slot);
                });
            }
        }
        const engine = new GameEngine();
    </script>
</body>

</html>
