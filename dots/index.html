<!DOCTYPE html>
<html>

<head>
  <title>Dot Loop Capture (Final Rules)</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    canvas {
      border: 1px solid black;
      margin: 20px auto;
      display: block;
    }

    #status {
      font-size: 24px;
      margin: 10px;
    }

    button {
      padding: 8px 16px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <h1>Dot Loop Capture</h1>
  <div id="status">Player 1's Turn (Black)</div>
  <canvas id="gameCanvas"
          width="600"
          height="600"></canvas>
  <button id="reset">Reset Game</button>
  <button id="pass">Pass Turn</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const passBtn = document.getElementById('pass');

    // Game settings
    const GRID_SIZE = 20;
    const CELL_SIZE = canvas.width / (GRID_SIZE + 1);
    const DOT_RADIUS = CELL_SIZE * 0.2;
    const CONNECTION_COLOR = 'rgba(0, 0, 255, 0.7)';
    const CAPTURED_COLOR = 'rgba(200, 200, 200, 0.5)';
    const CAPTURE_HIGHLIGHT = 'rgba(255, 0, 0, 0.3)';

    // Game state
    let intersections = Array(GRID_SIZE + 1).fill().map(() => Array(GRID_SIZE + 1).fill(null));
    let captured = Array(GRID_SIZE + 1).fill().map(() => Array(GRID_SIZE + 1).fill(false));
    let currentPlayer = 1;
    let connections = [];
    let gameOver = false;
    let showConnections = false;
    let lastCaptured = [];
    let tempConnections = [];

    // Initialize game
    function init() {
      intersections = Array(GRID_SIZE + 1).fill().map(() => Array(GRID_SIZE + 1).fill(null));
      captured = Array(GRID_SIZE + 1).fill().map(() => Array(GRID_SIZE + 1).fill(false));
      currentPlayer = 1;
      connections = [];
      gameOver = false;
      showConnections = false;
      lastCaptured = [];
      tempConnections = [];
      statusDiv.textContent = `Player ${currentPlayer}'s Turn (${currentPlayer === 1 ? 'Black' : 'White'})`;
      drawBoard();
    }

    // Draw the board
    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw grid lines
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i++) {
        // Vertical
        ctx.beginPath();
        ctx.moveTo((i + 1) * CELL_SIZE, CELL_SIZE);
        ctx.lineTo((i + 1) * CELL_SIZE, canvas.height - CELL_SIZE);
        ctx.stroke();
        // Horizontal
        ctx.beginPath();
        ctx.moveTo(CELL_SIZE, (i + 1) * CELL_SIZE);
        ctx.lineTo(canvas.width - CELL_SIZE, (i + 1) * CELL_SIZE);
        ctx.stroke();
      }

      // Highlight last captured dots
      if (lastCaptured.length > 0) {
        ctx.fillStyle = CAPTURE_HIGHLIGHT;
        lastCaptured.forEach(pos => {
          ctx.beginPath();
          ctx.arc(pos.x * CELL_SIZE, pos.y * CELL_SIZE, DOT_RADIUS * 1.5, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      // Draw connections (only when showConnections is true)
      if (showConnections) {
        ctx.strokeStyle = CONNECTION_COLOR;
        ctx.lineWidth = 3;
        [...connections, ...tempConnections].forEach(conn => {
          ctx.beginPath();
          ctx.moveTo(conn.from.x * CELL_SIZE, conn.from.y * CELL_SIZE);
          ctx.lineTo(conn.to.x * CELL_SIZE, conn.to.y * CELL_SIZE);
          ctx.stroke();
        });
      }

      // Draw all dots
      for (let y = 0; y <= GRID_SIZE; y++) {
        for (let x = 0; x <= GRID_SIZE; x++) {
          if (intersections[y][x]) {
            // Draw captured dots differently
            if (captured[y][x]) {
              ctx.fillStyle = CAPTURED_COLOR;
              ctx.beginPath();
              ctx.arc(x * CELL_SIZE, y * CELL_SIZE, DOT_RADIUS, 0, Math.PI * 2);
              ctx.fill();
            } else {
              ctx.fillStyle = intersections[y][x] === 1 ? 'black' : 'white';
              ctx.beginPath();
              ctx.arc(x * CELL_SIZE, y * CELL_SIZE, DOT_RADIUS, 0, Math.PI * 2);
              ctx.fill();
              if (intersections[y][x] === 2) {
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;
                ctx.stroke();
              }
            }
          }
        }
      }
    }

    // Get adjacent same-color dots
    function getAdjacentDots(x, y) {
      const dots = [];
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          const nx = x + dx;
          const ny = y + dy;
          if (nx >= 0 && nx <= GRID_SIZE && ny >= 0 && ny <= GRID_SIZE) {
            if (intersections[ny][nx] === currentPlayer && !captured[ny][nx]) {
              dots.push({ x: nx, y: ny });
            }
          }
        }
      }
      return dots;
    }

    // Check if connection exists
    function connectionExists(from, to) {
      return connections.some(conn =>
        (conn.from.x === from.x && conn.from.y === from.y &&
          conn.to.x === to.x && conn.to.y === to.y) ||
        (conn.from.x === to.x && conn.from.y === to.y &&
          conn.to.x === from.x && conn.to.y === from.y)
      );
    }

    // Find all loops in the connection graph
    function findCaptureLoops() {
      const graph = new Map();

      // Build adjacency graph (including temp connections)
      [...connections, ...tempConnections].forEach(conn => {
        const fromStr = `${conn.from.x},${conn.from.y}`;
        const toStr = `${conn.to.x},${conn.to.y}`;

        if (!graph.has(fromStr)) graph.set(fromStr, []);
        if (!graph.has(toStr)) graph.set(toStr, []);

        graph.get(fromStr).push(conn.to);
        graph.get(toStr).push(conn.from);
      });

      // DFS to find cycles
      const visited = new Set();
      const loops = [];

      function dfs(node, path) {
        const nodeStr = `${node.x},${node.y}`;
        if (visited.has(nodeStr)) return;

        visited.add(nodeStr);
        path.push(nodeStr);

        for (const neighbor of graph.get(nodeStr) || []) {
          const neighborStr = `${neighbor.x},${neighbor.y}`;
          const cycleStart = path.indexOf(neighborStr);

          if (cycleStart !== -1 && path.length - cycleStart >= 3) {
            // Found a cycle
            loops.push(path.slice(cycleStart).map(s => {
              const [x, y] = s.split(',').map(Number);
              return { x, y };
            }));
          } else if (!path.includes(neighborStr)) {
            dfs(neighbor, [...path]);
          }
        }
      }

      // Start DFS from each node
      for (const nodeStr of graph.keys()) {
        const [x, y] = nodeStr.split(',').map(Number);
        dfs({ x, y }, []);
      }

      return loops;
    }

    // Check if point is inside polygon
    function isInsidePolygon(point, polygon) {
      const x = point.x, y = point.y;
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i].x, yi = polygon[i].y;
        const xj = polygon[j].x, yj = polygon[j].y;

        const intersect = ((yi > y) !== (yj > y)) &&
          (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    // Check for captures
    function checkCaptures() {
      const loops = findCaptureLoops();
      let capturedAny = false;
      lastCaptured = [];

      loops.forEach(loop => {
        // Find bounding box of loop
        const minX = Math.min(...loop.map(p => p.x));
        const maxX = Math.max(...loop.map(p => p.x));
        const minY = Math.min(...loop.map(p => p.y));
        const maxY = Math.max(...loop.map(p => p.y));

        // Check all dots within bounding box
        for (let y = minY; y <= maxY; y++) {
          for (let x = minX; x <= maxX; x++) {
            // Only check opponent dots that aren't already captured
            if (intersections[y][x] && intersections[y][x] !== currentPlayer && !captured[y][x]) {
              if (isInsidePolygon({ x, y }, loop)) {
                // Capture this dot
                captured[y][x] = true;
                lastCaptured.push({ x, y });
                capturedAny = true;
              }
            }
          }
        }
      });

      return capturedAny;
    }

    // Handle clicks
    canvas.addEventListener('click', (e) => {
      if (gameOver) return;

      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      // Find nearest intersection
      let minDist = Infinity;
      let targetX = -1, targetY = -1;

      for (let y = 0; y <= GRID_SIZE; y++) {
        for (let x = 0; x <= GRID_SIZE; x++) {
          const dist = Math.sqrt(
            Math.pow(clickX - x * CELL_SIZE, 2) +
            Math.pow(clickY - y * CELL_SIZE, 2)
          );
          if (dist < minDist && dist < DOT_RADIUS * 1.5) {
            minDist = dist;
            targetX = x;
            targetY = y;
          }
        }
      }

      if (targetX !== -1 && !intersections[targetY][targetX]) {
        // Place dot
        intersections[targetY][targetX] = currentPlayer;

        // Find adjacent same-color dots
        const adjacent = getAdjacentDots(targetX, targetY);
        tempConnections = [];

        // Create temporary connections
        adjacent.forEach(dot => {
          if (!connectionExists({ x: targetX, y: targetY }, dot)) {
            tempConnections.push({
              from: { x: targetX, y: targetY },
              to: { x: dot.x, y: dot.y }
            });
          }
        });

        // Check for captures
        showConnections = true;
        const capturedAny = checkCaptures();

        if (capturedAny) {
          // If captured, make temp connections permanent
          connections.push(...tempConnections);
          statusDiv.textContent = `Player ${currentPlayer} captured ${lastCaptured.length} dots!`;
          setTimeout(() => {
            showConnections = false;
            drawBoard();
          }, 1500);
        } else {
          // If no captures, discard temp connections
          tempConnections = [];
          showConnections = false;
          currentPlayer = currentPlayer === 1 ? 2 : 1;
          statusDiv.textContent = `Player ${currentPlayer}'s Turn (${currentPlayer === 1 ? 'Black' : 'White'})`;
        }

        drawBoard();
        checkGameOver();
      }
    });

    // Pass turn
    passBtn.addEventListener('click', () => {
      if (gameOver) return;
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      statusDiv.textContent = `Player ${currentPlayer}'s Turn (${currentPlayer === 1 ? 'Black' : 'White'})`;
      lastCaptured = [];
      drawBoard();
    });

    // Check if game is over
    function checkGameOver() {
      let emptyCount = 0;
      for (let y = 0; y <= GRID_SIZE; y++) {
        for (let x = 0; x <= GRID_SIZE; x++) {
          if (!intersections[y][x]) emptyCount++;
        }
      }

      if (emptyCount === 0) {
        gameOver = true;
        const p1 = intersections.flat().filter((v, i) => v === 1 && !captured.flat()[i]).length;
        const p2 = intersections.flat().filter((v, i) => v === 2 && !captured.flat()[i]).length;
        statusDiv.textContent = `Game Over! ${p1 > p2 ? 'Black' : 'White'} wins ${p1}-${p2}`;
      }
    }

    resetBtn.addEventListener('click', init);
    init();
  </script>
</body>

</html>
