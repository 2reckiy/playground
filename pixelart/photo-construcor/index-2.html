<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LEGO Pixelizer — Advanced (single file)</title>
<style>
  :root{--bg:#fff;--muted:#666}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;margin:18px;color:#111;background:#fafafa}
  h1{font-size:20px;margin:0 0 12px}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px}
  label{font-size:13px}
  input[type="range"]{width:160px}
  canvas{background:var(--bg);border:1px solid #ddd;image-rendering:pixelated;display:block}
  .row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  button{padding:8px 12px;border-radius:6px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer}
  small{color:var(--muted)}
  table{border-collapse:collapse}
  th,td{padding:6px 8px;border:1px solid #eee;font-size:13px}
  .legend-item{display:flex;align-items:center;gap:8px}
  .swatch{width:22px;height:14px;border:1px solid #ccc}
  .controls .group{display:flex;gap:8px;align-items:center}
  footer{margin-top:14px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
  <h1>LEGO Pixelizer — Advanced</h1>

  <div class="controls">
    <label>
      <input id="file" type="file" accept="image/*">
      <small>Завантажити зображення</small>
    </label>

    <label>Розмір цеглинки:
      <input id="pixelSize" type="range" min="2" max="80" value="16">
      <span id="pixelSizeVal">16</span> px
    </label>

    <label>Кількість кольорів:
      <select id="k">
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6" selected>6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </label>

    <label><input id="mapToLegos" type="checkbox" checked> Мапити на LEGO палітру</label>
    <label><input id="grid" type="checkbox" checked> Показати сітку</label>

    <div class="group">
      <button id="processBtn">Застосувати</button>
      <button id="downloadPng" disabled>Завантажити PNG</button>
      <button id="downloadSvg" disabled>Завантажити SVG</button>
      <button id="downloadCsv" disabled>Завантажити CSV</button>
    </div>
  </div>

  <div class="row">
    <div class="col" style="min-width:320px">
      <div>Оригінал</div>
      <canvas id="origCanvas" width="360" height="240"></canvas>
    </div>

    <div class="col" style="min-width:360px">
      <div>Результат</div>
      <canvas id="outCanvas" width="360" height="240"></canvas>
    </div>

    <div class="col" style="min-width:300px">
      <div>Легенда і підрахунок</div>
      <div id="legend"></div>
      <div id="countsTableWrap"></div>
    </div>
  </div>

  <footer>Клікни «Застосувати» після завантаження зображення. SVG містить прямокутники для кожної «цеглинки» — готово для друку або подальшої обробки.</footer>

<script>
(() => {
  // --- Налаштування LEGO палітри (поширені кольори) ---
  // Список: {name, hex}
  const LEGO_PALETTE = [
    {name:'White', hex:'#FFFFFF'},
    {name:'Black', hex:'#000000'},
    {name:'Light Bluish Gray', hex:'#CFCFD4'},
    {name:'Dark Bluish Gray', hex:'#6D6F72'},
    {name:'Red', hex:'#C91A09'},
    {name:'Blue', hex:'#0055BF'},
    {name:'Yellow', hex:'#F2CD37'},
    {name:'Green', hex:'#237841'},
    {name:'Reddish Brown', hex:'#6B4C3B'},
    {name:'Tan', hex:'#D9C3A0'},
    {name:'Orange', hex:'#FF7F2A'},
    {name:'Pink', hex:'#FF9DB2'},
    {name:'Purple', hex:'#7B2FBE'},
    {name:'Medium Blue', hex:'#3A6EA5'}
  ];

  // --- UI elements ---
  const fileInput = document.getElementById('file');
  const pixelSizeInput = document.getElementById('pixelSize');
  const pixelSizeVal = document.getElementById('pixelSizeVal');
  const kSelect = document.getElementById('k');
  const mapToLegosCheckbox = document.getElementById('mapToLegos');
  const gridCheckbox = document.getElementById('grid');
  const processBtn = document.getElementById('processBtn');
  const downloadPng = document.getElementById('downloadPng');
  const downloadSvg = document.getElementById('downloadSvg');
  const downloadCsv = document.getElementById('downloadCsv');

  const origCanvas = document.getElementById('origCanvas');
  const outCanvas = document.getElementById('outCanvas');
  const origCtx = origCanvas.getContext('2d');
  const outCtx = outCanvas.getContext('2d');

  const legendWrap = document.getElementById('legend');
  const countsTableWrap = document.getElementById('countsTableWrap');

  let img = new Image();
  let loaded = false;

  pixelSizeInput.addEventListener('input', ()=> pixelSizeVal.textContent = pixelSizeInput.value);

  fileInput.addEventListener('change', e => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const url = URL.createObjectURL(f);
    img = new Image();
    img.onload = () => {
      loaded = true;
      URL.revokeObjectURL(url);
      // Resize canvases to reasonable display size (limit)
      const maxW = 720, maxH = 540;
      let w = img.width, h = img.height;
      const r = w/h;
      if (w > maxW){ w = maxW; h = Math.round(w / r); }
      if (h > maxH){ h = maxH; w = Math.round(h * r); }
      origCanvas.width = w; origCanvas.height = h;
      outCanvas.width = w; outCanvas.height = h;
      origCtx.imageSmoothingEnabled = true;
      origCtx.clearRect(0,0,w,h);
      origCtx.drawImage(img, 0,0,w,h);
      // clear outputs
      outCtx.clearRect(0,0,outCanvas.width,outCanvas.height);
      legendWrap.innerHTML = '';
      countsTableWrap.innerHTML = '';
      downloadPng.disabled = downloadSvg.disabled = downloadCsv.disabled = true;
    };
    img.onerror = ()=> alert('Не вдалося завантажити зображення.');
    img.src = url;
  });

  // --- Утиліти кольорів ---
  function hexToRgb(hex){
    const h = hex.replace('#','');
    const v = h.length === 3 ? h.split('').map(s=>s+s).join('') : h;
    const r = parseInt(v.slice(0,2),16);
    const g = parseInt(v.slice(2,4),16);
    const b = parseInt(v.slice(4,6),16);
    return [r,g,b];
  }
  function rgbToHex([r,g,b]){
    const to2 = v => v.toString(16).padStart(2,'0');
    return '#' + to2(r)+to2(g)+to2(b);
  }
  function dist2(a,b){ // squared distance
    const dr = a[0]-b[0], dg=a[1]-b[1], db=a[2]-b[2];
    return dr*dr+dg*dg+db*db;
  }

  // --- K-means (simple) ---
  function kmeans(samples, k, maxIter=12){
    // samples: array of [r,g,b]
    if (samples.length === 0) return {centroids:[], labels:[]};
    // init centroids by picking random distinct samples
    const centroids = [];
    const used = new Set();
    while (centroids.length < k){
      const i = Math.floor(Math.random()*samples.length);
      if (!used.has(i)){
        used.add(i);
        centroids.push(samples[i].slice());
      }
    }
    let labels = new Array(samples.length).fill(0);
    for (let iter=0; iter<maxIter; iter++){
      // assign
      let changed = false;
      for (let i=0;i<samples.length;i++){
        let best = 0, bestd = Infinity;
        for (let c=0;c<k;c++){
          const d = dist2(samples[i], centroids[c]);
          if (d < bestd){ bestd=d; best=c; }
        }
        if (labels[i] !== best){ labels[i]=best; changed=true; }
      }
      // recompute centroids
      const sums = Array.from({length:k}, ()=>[0,0,0]);
      const counts = new Array(k).fill(0);
      for (let i=0;i<samples.length;i++){
        const l = labels[i];
        sums[l][0]+=samples[i][0];
        sums[l][1]+=samples[i][1];
        sums[l][2]+=samples[i][2];
        counts[l]++;
      }
      for (let c=0;c<k;c++){
        if (counts[c] > 0){
          centroids[c][0] = Math.round(sums[c][0]/counts[c]);
          centroids[c][1] = Math.round(sums[c][1]/counts[c]);
          centroids[c][2] = Math.round(sums[c][2]/counts[c]);
        } else {
          // reinit empty centroid to random sample
          centroids[c] = samples[Math.floor(Math.random()*samples.length)].slice();
        }
      }
      if (!changed) break;
    }
    return {centroids, labels};
  }

  // --- Основна обробка ---
  function process(){
    if (!loaded){ alert('Спочатку завантажте зображення.'); return; }
    const pixelSize = Math.max(1, parseInt(pixelSizeInput.value,10));
    const k = Math.max(2, Math.min(12, parseInt(kSelect.value,10)));
    const mapToLegos = mapToLegosCheckbox.checked;
    const showGrid = gridCheckbox.checked;

    const displayW = outCanvas.width, displayH = outCanvas.height;
    const cols = Math.max(1, Math.floor(displayW / pixelSize));
    const rows = Math.max(1, Math.floor(displayH / pixelSize));

    // Create small canvas of size cols x rows to sample (this is the pixel-grid)
    const small = document.createElement('canvas');
    small.width = cols; small.height = rows;
    const sctx = small.getContext('2d');
    sctx.imageSmoothingEnabled = true;
    sctx.clearRect(0,0,cols,rows);
    sctx.drawImage(origCanvas, 0,0,origCanvas.width,origCanvas.height, 0,0,cols,rows);

    // get samples
    const imgData = sctx.getImageData(0,0,cols,rows);
    const data = imgData.data;
    const samples = [];
    for (let y=0;y<rows;y++){
      for (let x=0;x<cols;x++){
        const i = (y*cols + x)*4;
        const r = data[i], g = data[i+1], b = data[i+2];
        samples.push([r,g,b]);
      }
    }

    // Run kmeans on samples (limit sample size if huge)
    let runSamples = samples;
    const MAX_KMEANS_SAMPLES = 6000;
    if (samples.length > MAX_KMEANS_SAMPLES){
      // sample uniformly indices
      const step = Math.ceil(samples.length / MAX_KMEANS_SAMPLES);
      runSamples = [];
      for (let i=0;i<samples.length;i+=step) runSamples.push(samples[i]);
    }

    const km = kmeans(runSamples, k, 20);
    // If we ran kmeans on subset, assign full samples to nearest centroids
    const centroids = km.centroids.slice();
    // If we used subset, ensure centroids length k; otherwise fallback
    if (centroids.length < k){
      while (centroids.length < k) centroids.push(samples[Math.floor(Math.random()*samples.length)].slice());
    }

    // Assign full grid to nearest centroid
    const labels = new Array(samples.length);
    for (let i=0;i<samples.length;i++){
      let best=0, bd=Infinity;
      for (let c=0;c<centroids.length;c++){
        const d = dist2(samples[i], centroids[c]);
        if (d < bd){ bd=d; best=c; }
      }
      labels[i]=best;
    }

    // If mapToLegos -> for each centroid find nearest LEGO palette color and replace centroid
    const mapped = [];
    if (mapToLegos){
      for (let c=0;c<centroids.length;c++){
        let best=0, bd=Infinity;
        for (let p=0;p<LEGO_PALETTE.length;p++){
          const rgb = hexToRgb(LEGO_PALETTE[p].hex);
          const d = dist2(centroids[c], rgb);
          if (d < bd){ bd=d; best=p; }
        }
        mapped[c] = {legoIndex: best, hex: LEGO_PALETTE[best].hex, name: LEGO_PALETTE[best].name, rgb: hexToRgb(LEGO_PALETTE[best].hex)};
      }
    } else {
      for (let c=0;c<centroids.length;c++){
        mapped[c] = {legoIndex: null, hex: rgbToHex(centroids[c]), name: 'Cluster '+(c+1), rgb: centroids[c].slice()};
      }
    }

    // Count bricks per label
    const counts = new Array(centroids.length).fill(0);
    for (let i=0;i<labels.length;i++) counts[labels[i]]++;

    // Build legend and counts table
    legendWrap.innerHTML = '';
    countsTableWrap.innerHTML = '';
    const legendFrag = document.createDocumentFragment();

    const rowsArr = [];
    for (let c=0;c<centroids.length;c++){
      const colorHex = mapped[c].hex;
      const name = mapped[c].name;
      const cnt = counts[c];
      // legend item
      const div = document.createElement('div');
      div.className = 'legend-item';
      div.innerHTML = `<div class="swatch" style="background:${colorHex}"></div>
        <div><strong>${name}</strong><br><small>${colorHex} — ${cnt} шт.</small></div>`;
      legendFrag.appendChild(div);
      rowsArr.push({index:c,name,hex:colorHex,count:cnt,legoIndex:mapped[c].legoIndex,legoName:mapped[c].legoIndex!==null ? LEGO_PALETTE[mapped[c].legoIndex].name : null});
    }
    legendWrap.appendChild(legendFrag);

    // counts table (CSV-ready)
    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>№</th><th>Назва/Cluster</th><th>HEX</th><th>LEGO</th><th>Кількість</th></tr></thead>`;
    const tbody = document.createElement('tbody');
    rowsArr.forEach((r,idx)=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${idx+1}</td><td>${r.name}</td><td>${r.hex}</td><td>${r.legoName ?? '-'}</td><td style="text-align:right">${r.count}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    countsTableWrap.appendChild(table);

    // Render output canvas: each grid cell as mapped color
    outCtx.clearRect(0,0,displayW,displayH);
    outCtx.imageSmoothingEnabled = false;
    // compute top-left to center grid if needed
    const realW = cols * pixelSize, realH = rows * pixelSize;
    const dx = Math.round((displayW - realW)/2);
    const dy = Math.round((displayH - realH)/2);

    // draw rectangles
    let idx = 0;
    for (let y=0;y<rows;y++){
      for (let x=0;x<cols;x++){
        const label = labels[idx++];
        outCtx.fillStyle = mapped[label].hex;
        outCtx.fillRect(dx + x*pixelSize, dy + y*pixelSize, pixelSize, pixelSize);
      }
    }
    // grid
    if (showGrid){
      outCtx.save();
      outCtx.strokeStyle = 'rgba(0,0,0,0.12)';
      outCtx.lineWidth = 1;
      for (let c=0;c<=cols;c++){
        const x = dx + c*pixelSize + 0.5;
        outCtx.beginPath();
        outCtx.moveTo(x, dy);
        outCtx.lineTo(x, dy + rows*pixelSize);
        outCtx.stroke();
      }
      for (let r=0;r<=rows;r++){
        const y = dy + r*pixelSize + 0.5;
        outCtx.beginPath();
        outCtx.moveTo(dx, y);
        outCtx.lineTo(dx + cols*pixelSize, y);
        outCtx.stroke();
      }
      outCtx.restore();
    }

    // Enable downloads
    downloadPng.disabled = false;
    downloadSvg.disabled = false;
    downloadCsv.disabled = false;

    // Prepare data for SVG and CSV generation closures
    const svgPayload = {cols, rows, pixelSize, dx, dy, labels: labels.slice(), mapped, width: displayW, height: displayH};
    downloadPng.onclick = ()=> {
      const link = document.createElement('a');
      link.download = 'lego_pixel_map.png';
      link.href = outCanvas.toDataURL('image/png');
      link.click();
    };
    downloadCsv.onclick = ()=> {
      // CSV: index, name, hex, legoName, count
      let csv = 'index,name,hex,legoName,count\n';
      rowsArr.forEach((r,idx)=>{
        csv += `${idx+1},"${r.name.replace(/"/g,'""')}",${r.hex},"${(r.legoName??'')}",${r.count}\n`;
      });
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'lego_counts.csv'; a.click();
      URL.revokeObjectURL(url);
    };
    downloadSvg.onclick = ()=> {
      const svg = buildSVG(svgPayload, mapped);
      const blob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'lego_pixel_map.svg'; a.click();
      URL.revokeObjectURL(url);
    };
  }

  // Build SVG string: each rect with fill color; include optional legend
  function buildSVG({cols,rows,pixelSize,dx,dy,labels,mapped,width,height}, mappedArr){
    // produce viewbox sized to canvas width/height
    const svgW = width, svgH = height;
    // header
    let svg = `<?xml version="1.0" encoding="utf-8"?>\n`;
    svg += `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">\n`;
    svg += `<rect width="100%" height="100%" fill="#ffffff"/>\n`;
    // group for bricks
    svg += `<g id="bricks">\n`;
    let idx = 0;
    for (let y=0;y<rows;y++){
      for (let x=0;x<cols;x++){
        const label = labels[idx++];
        const color = mapped[label].hex;
        const rx = dx + x*pixelSize;
        const ry = dy + y*pixelSize;
        // add rect with small stroke for clarity
        svg += `<rect x="${rx}" y="${ry}" width="${pixelSize}" height="${pixelSize}" fill="${color}" stroke="#000000" stroke-opacity="0.08" stroke-width="0.5"/>\n`;
      }
    }
    svg += `</g>\n`;

    // legend: show cluster colors and counts to the right if there's room
    const legendX = svgW - 180;
    let ly = 8;
    svg += `<g id="legend" font-family="sans-serif" font-size="12">\n`;
    for (let i=0;i<mapped.length;i++){
      const m = mapped[i];
      svg += `<rect x="${legendX}" y="${ly}" width="20" height="12" fill="${m.hex}" stroke="#ccc"/>\n`;
      const labelText = m.name ? `${m.name}` : `Cluster ${i+1}`;
      svg += `<text x="${legendX+26}" y="${ly+11}" fill="#111">${labelText}</text>\n`;
      ly += 18;
    }
    svg += `</g>\n`;

    // optional grid lines (thin)
    svg += `<g stroke="#000" stroke-opacity="0.06" stroke-width="0.5">\n`;
    for (let c=0;c<=cols;c++){
      const x = dx + c*pixelSize + 0.25;
      svg += `<line x1="${x}" y1="${dy}" x2="${x}" y2="${dy+rows*pixelSize}"/>\n`;
    }
    for (let r=0;r<=rows;r++){
      const y = dy + r*pixelSize + 0.25;
      svg += `<line x1="${dx}" y1="${y}" x2="${dx+cols*pixelSize}" y2="${y}"/>\n`;
    }
    svg += `</g>\n`;

    svg += `</svg>`;
    return svg;
  }

  processBtn.addEventListener('click', process);

})();
</script>
</body>
</html>
