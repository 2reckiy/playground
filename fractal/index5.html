<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Pattern Filler</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        
        let tileSize = 40;
        let x = 0;
        let y = 0;
        let hue = Math.random() * 360;
        let mode = Math.random() > 0.5 ? 'arc' : 'line';

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3;
            reset();
        }

        function reset() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            x = 0;
            y = 0;
            hue = Math.random() * 360;
            // Randomize size and style for each "pass"
            tileSize = 20 + Math.random() * 60;
            mode = Math.random() > 0.5 ? 'arc' : 'line';
        }

        function drawTile(x, y, size) {
            ctx.strokeStyle = `hsl(${hue}, 80%, 60%)`;
            // Subtle color drift as we fill
            hue += 0.1;

            ctx.beginPath();
            if (mode === 'arc') {
                // Randomly choose between two orientations of arcs
                if (Math.random() > 0.5) {
                    ctx.arc(x, y, size / 2, 0, Math.PI / 2);
                    ctx.moveTo(x + size, y + size / 2);
                    ctx.arc(x + size, y + size, size / 2, Math.PI, Math.PI * 1.5);
                } else {
                    ctx.arc(x + size, y, size / 2, Math.PI / 2, Math.PI);
                    ctx.moveTo(x, y + size / 2);
                    ctx.arc(x, y + size, size / 2, Math.PI * 1.5, Math.PI * 2);
                }
            } else {
                // Randomly choose between two orientations of diagonal lines
                if (Math.random() > 0.5) {
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + size, y + size);
                } else {
                    ctx.moveTo(x + size, y);
                    ctx.lineTo(x, y + size);
                }
            }
            ctx.stroke();
        }

        function animate() {
            // Draw a few tiles per frame to show progress
            const tilesPerFrame = 5;
            
            for (let i = 0; i < tilesPerFrame; i++) {
                drawTile(x, y, tileSize);
                
                x += tileSize;
                if (x >= canvas.width) {
                    x = 0;
                    y += tileSize;
                }

                if (y >= canvas.height) {
                    // Screen is full! Wait a moment and reset
                    setTimeout(() => {
                        reset();
                        requestAnimationFrame(animate);
                    }, 1000);
                    return; // Stop the loop until reset
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
