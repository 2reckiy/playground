<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forge Master: Refined Classes</title>
    <style>
        :root {
            --bg: #0f0f13;
            --window: #1c1c24;
            --border: #343442;
            --accent: #ff9f43;
            --text: #d1d1e0;
            --panel-h: #252530;
            --disabled: #444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px;
        }

        header {
            height: 50px;
            background: #000;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        .stat {
            background: #222;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        .stat span {
            color: var(--accent);
            font-weight: bold;
        }

        .qty-bar {
            background: var(--panel-h);
            padding: 8px;
            display: flex;
            justify-content: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .qty-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 2px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .qty-btn.active {
            background: var(--accent);
            color: #000;
        }

        main {
            display: grid;
            grid-template-columns: 280px 260px 1fr;
            gap: 10px;
            padding: 10px;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--window);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: var(--panel-h);
            padding: 8px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
        }

        .scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
        }

        .icon-item {
            aspect-ratio: 1/1;
            background: #2a2a35;
            border: 2px solid #3f3f4f;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .icon-item:hover {
            border-color: var(--accent);
        }

        .icon-item .emoji {
            font-size: 24px;
        }

        .icon-item .badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #000;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 4px;
        }

        .forge-display {
            text-align: center;
            padding: 10px;
            background: #14141b;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .prog-bg {
            background: #000;
            height: 10px;
            border-radius: 5px;
            margin: 10px 0;
            border: 1px solid #333;
            overflow: hidden;
        }

        .prog-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9f43, #ff6b6b);
            width: 0%;
            transition: width 0.1s linear;
        }

        .row-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #2a2a35;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            width: 100%;
            text-align: left;
            color: inherit;
        }

        .row-item:hover:not(:disabled) {
            border-color: var(--accent);
            background: #353545;
        }

        .row-item:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: transparent;
        }

        .req-tag {
            font-size: 10px;
            background: #1a1a20;
            padding: 2px 4px;
            border-radius: 3px;
            margin-right: 2px;
            border: 1px solid #333;
        }

        .q-Common {
            border-color: #444;
        }

        .q-Fine {
            border-color: #3498db;
            box-shadow: 0 0 5px #3498db55;
        }

        .q-Masterwork {
            border-color: #f1c40f;
            box-shadow: 0 0 8px #f1c40f55;
        }

        footer {
            height: 30px;
            background: #000;
            font-size: 11px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            color: #666;
        }
    </style>
</head>

<body>

    <header>
        <div class="stat">💰 <span id="ui-gold">0</span></div>
        <div class="stat">Rank <span id="ui-lvl">1</span></div>
        <div class="stat">XP <span id="ui-xp">0/100</span></div>
    </header>

    <div class="qty-bar" id="ui-qty-bar">
        <button class="qty-btn active" onclick="game.setQty(1)">x1</button>
        <button class="qty-btn" onclick="game.setQty(10)">x10</button>
        <button class="qty-btn" onclick="game.setQty(25)">x25</button>
        <button class="qty-btn" onclick="game.setQty(100)">x100</button>
    </div>

    <main>
        <div class="panel">
            <div class="panel-header">Buy Resources</div>
            <div class="scroll" id="ui-market"></div>
        </div>

        <div class="panel">
            <div class="panel-header">Forge</div>
            <div class="scroll">
                <div class="forge-display">
                    <div id="forge-icon" style="font-size:32px">🔥</div>
                    <div id="forge-name" style="font-weight:bold; margin-top:5px">Forge Idle</div>
                    <div class="prog-bg">
                        <div id="forge-fill" class="prog-fill"></div>
                    </div>
                    <div id="ui-queue" style="font-size:10px; opacity:0.6">Queue: Empty</div>
                </div>
                <div id="ui-recipes"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">Warehouse</div>
            <div class="scroll">
                <div class="icon-grid" id="ui-inventory"></div>
            </div>
        </div>
    </main>

    <footer>
        <div id="ui-log">Ready for work.</div>
    </footer>

    <script>
        const CONFIG = {
            resources: [
                { id: 'iron', name: 'Iron', emoji: '🪨', basePrice: 10 },
                { id: 'wood', name: 'Wood', emoji: '🪵', basePrice: 5 }
            ],
            recipes: [
                { id: 'dagger', name: 'Dagger', emoji: '🗡️', lv: 1, cost: { iron: 2 }, time: 1500, xp: 15, val: 35 },
                { id: 'axe', name: 'Hatchet', emoji: '🪓', lv: 1, cost: { iron: 1, wood: 3 }, time: 2500, xp: 25, val: 60 },
                { id: 'sword', name: 'Broadsword', emoji: '⚔️', lv: 2, cost: { iron: 6 }, time: 5000, xp: 60, val: 160 },
                { id: 'shield', name: 'Plate Shield', emoji: '🛡️', lv: 2, cost: { iron: 4, wood: 4 }, time: 6000, xp: 80, val: 210 }
            ]
        };

        // --- HELPER ---
        const getResEmoji = (id) => CONFIG.resources.find(r => r.id === id)?.emoji || '';

        class Player {
            constructor() {
                this.gold = 300; this.level = 1; this.xp = 0; this.nextLevelXp = 100;
                this.resources = { iron: 0, wood: 0 };
                this.inventory = [];
            }
            addXp(amt) {
                this.xp += amt;
                if (this.xp >= this.nextLevelXp) {
                    this.level++; this.xp = 0; this.nextLevelXp = Math.floor(this.nextLevelXp * 1.8);
                    return true;
                }
                return false;
            }
        }

        class Forge {
            constructor(player) {
                this.player = player;
                this.queue = [];
                this.isBusy = false;
                this.onUpdate = null;
            }

            add(recipe, qty) {
                for (let i = 0; i < qty; i++) this.queue.push(recipe);
                if (!this.isBusy) this.next();
            }

            resetForgeUI() {
                document.getElementById('forge-fill').style.width = "0%";
                document.getElementById('forge-icon').innerText = "🔥";
                document.getElementById('forge-name').innerText = "Forge Idle";
                document.getElementById('ui-queue').innerText = "Queue: Empty";
            }

            next() {
                if (this.queue.length === 0) {
                    this.isBusy = false;
                    this.resetForgeUI();
                    this.onUpdate();
                    return;
                }

                const recipe = this.queue[0];
                for (let res in recipe.cost) {
                    if (this.player.resources[res] < recipe.cost[res]) {
                        game.log(`Paused: Missing ${res}`);
                        this.isBusy = false;
                        this.onUpdate();
                        return;
                    }
                }

                for (let res in recipe.cost) this.player.resources[res] -= recipe.cost[res];
                this.queue.shift();
                this.isBusy = true;
                this.startCraft(recipe);
            }

            startCraft(recipe) {
                let start = null;
                const duration = recipe.time / (1 + (this.player.level * 0.25));

                const step = (ts) => {
                    if (!start) start = ts;
                    const progress = (ts - start) / duration;
                    document.getElementById('forge-fill').style.width = Math.min(progress * 100, 100) + "%";
                    document.getElementById('forge-icon').innerText = recipe.emoji;
                    document.getElementById('forge-name').innerText = recipe.name;
                    document.getElementById('ui-queue').innerText = `Queue: ${this.queue.length} items`;

                    if (progress < 1) requestAnimationFrame(step);
                    else {
                        const roll = Math.random() * this.player.level;
                        const q = roll > 8 ? "Masterwork" : (roll > 4 ? "Fine" : "Common");
                        this.player.inventory.push({ ...recipe, quality: q });
                        if (this.player.addXp(recipe.xp)) game.log("Level Up!");
                        this.onUpdate();
                        this.next();
                    }
                };
                requestAnimationFrame(step);
            }
        }

        class GameEngine {
            constructor() {
                this.player = new Player();
                this.forge = new Forge(this.player);
                this.mods = { iron: 1, wood: 1, sell: 1 };
                this.qty = 1;

                this.forge.onUpdate = () => this.updateUI();
                setInterval(() => {
                    this.mods.iron = 0.5 + Math.random();
                    this.mods.wood = 0.5 + Math.random();
                    this.mods.sell = 0.7 + Math.random() * 0.8;
                    this.updateUI();
                }, 15000);
                this.updateUI();
            }

            setQty(n) {
                this.qty = n;
                document.querySelectorAll('.qty-btn').forEach(b =>
                    b.classList.toggle('active', parseInt(b.innerText.replace('x', '')) === n));
                this.updateUI();
            }

            buy(id) {
                const price = Math.ceil(CONFIG.resources.find(r => r.id === id).basePrice * this.mods[id]) * this.qty;
                if (this.player.gold >= price) {
                    this.player.gold -= price;
                    this.player.resources[id] += this.qty;
                    this.updateUI();
                }
            }

            sell(id, quality) {
                let sold = 0;
                const val = Math.floor(CONFIG.recipes.find(r => r.id === id).val * this.mods.sell);
                for (let i = this.player.inventory.length - 1; i >= 0; i--) {
                    if (this.player.inventory[i].id === id && this.player.inventory[i].quality === quality && sold < this.qty) {
                        this.player.inventory.splice(i, 1);
                        this.player.gold += val;
                        sold++;
                    }
                }
                this.updateUI();
            }

            log(m) { document.getElementById('ui-log').innerText = m; }

            updateUI() {
                document.getElementById('ui-gold').innerText = Math.floor(this.player.gold).toLocaleString();
                document.getElementById('ui-lvl').innerText = this.player.level;
                document.getElementById('ui-xp').innerText = `${this.player.xp}/${this.player.nextLevelXp}`;

                // Market
                document.getElementById('ui-market').innerHTML = CONFIG.resources.map(res => {
                    const price = Math.ceil(res.basePrice * this.mods[res.id]) * this.qty;
                    const canAfford = this.player.gold >= price;
                    return `
                <button class="row-item" onclick="game.buy('${res.id}')" ${!canAfford ? 'disabled' : ''}>
                    <span style="font-size:24px">${res.emoji}</span>
                    <div style="flex:1"><strong>${res.name}</strong><br><small>Stock: ${this.player.resources[res.id]}</small></div>
                    <div style="text-align:right"><strong>${price}g</strong><br><small>x${this.qty}</small></div>
                </button>`;
                }).join('');

                // Recipes
                document.getElementById('ui-recipes').innerHTML = CONFIG.recipes.filter(r => this.player.level >= r.lv).map(r => {
                    const canCraftOne = Object.entries(r.cost).every(([id, amt]) => this.player.resources[id] * this.qty >= amt);
                    return `
                <button class="row-item" onclick="game.forge.add(CONFIG.recipes.find(x=>x.id==='${r.id}'), game.qty)" ${!canCraftOne ? 'disabled' : ''}>
                    <span style="font-size:20px">${r.emoji}</span>
                    <div style="flex:1">
                        <strong>${r.name}</strong><br>
                        ${Object.entries(r.cost).map(([id, amt]) => `<span class="req-tag">${getResEmoji(id)}${amt * this.qty}</span>`).join('')}
                    </div>
                    <small>Queue ${this.qty}</small>
                </button>`;
                }).join('');

                // Inventory
                const groups = this.player.inventory.reduce((acc, item) => {
                    const key = item.id + item.quality;
                    if (!acc[key]) acc[key] = { ...item, count: 0 };
                    acc[key].count++;
                    return acc;
                }, {});
                document.getElementById('ui-inventory').innerHTML = Object.values(groups).map(item => `
            <div class="icon-item q-${item.quality}" onclick="game.sell('${item.id}', '${item.quality}')">
                <span class="emoji">${item.emoji}</span>
                <span class="badge">x${item.count}</span>
                <div style="font-size:9px; color:#aaa; margin-top:2px;">${Math.floor(item.val * this.mods.sell)}g</div>
            </div>`).join('');
            }
        }

        const game = new GameEngine();
    </script>
</body>

</html>
