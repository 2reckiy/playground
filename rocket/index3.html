<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Minimalist Rocket Dev</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a0c;
            font-family: monospace;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff41;
            pointer-events: none;
            text-shadow: 0 0 5px #00ff41;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #modal-content {
            background: #1a1a1f;
            border: 2px solid #00ff41;
            padding: 40px;
            color: #00ff41;
            text-align: center;
            box-shadow: 0 0 20px #00ff4144;
        }

        #retry-btn {
            background: #00ff41;
            color: #0a0a0c;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        #retry-btn:hover {
            background: #00cc33;
        }
    </style>
</head>

<body>
    <div id="ui">
        <h2>MISSION CONTROL</h2>
        <div id="stats">ALTITUDE: 0m<br>FUEL: 100%<br>SPEED: 0 m/s</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="modal-overlay" style="display: none;">
        <div id="modal-content">
            <h1 id="modal-title">MISSION REPORT</h1>
            <p id="modal-msg"></p>
            <div id="modal-stats"></div>
            <button id="retry-btn" onclick="game.retry()">RETURN TO HANGAR</button>
        </div>
    </div>

    <script>
        const GROUND_INIT_ALTITUDE = 50;
        const ROCKET_INIT_ALTITUDE = 70;

        /**
         * BASE MODULE CLASS
         * Every part of the rocket inherits from this.
         */
        class Module {
            constructor(name, weight, fuelCapacity = 0, thrust = 0, stability = 1) {
                this.name = name;
                this.weight = weight;
                this.fuelCapacity = fuelCapacity;
                this.thrust = thrust;
                this.stability = stability;
            }
        }

        /**
         * ROCKET CLASS
         * Manages the assembly and physics of the modules.
         */
        class Rocket {
            constructor() {
                this.modules = [];
                this.y = 0;
                this.x = 0;
                this.velocity = 0;      // Vertical Speed
                this.velocityX = 0;     // Horizontal Speed (Inertia!)
                this.fuel = 0;
                this.acceleration = 0;
                this.isIgnited = false;
                this.tilt = 0;
                this.angularVelocity = 0;

                this.maxAltitude = 0;
            }

            addModule(mod) {
                this.modules.push(mod);
                this.fuel += mod.fuelCapacity;
            }

            getTotalWeight() {
                // Sum weight of modules + current fuel weight (fuel has mass!)
                const hardwareWeight = this.modules.reduce((sum, m) => sum + m.weight, 0);
                return hardwareWeight + (this.fuel * 0.5);
            }

            getTotalThrust() {
                return this.modules.reduce((sum, m) => sum + m.thrust, 0);
            }

            getStabilityRating() {
                // Higher stability = harder to tilt. Fins help!
                return this.modules.reduce((sum, m) => sum + (m.stability || 0), 0);
            }

            reset() {
                this.x = 0;
                this.y = 0;
                this.velocity = 0;
                this.velocityX = 0;
                this.tilt = 0;
                this.angularVelocity = 0;
                this.acceleration = 0;
                this.isIgnited = false;
                // Refill fuel based on modules
                this.fuel = this.modules.reduce((sum, m) => sum + m.fuelCapacity, 0);
                this.maxAltitude = 0;
            }

            // F = ma -> a = F/m
            update(dt) {
                if (!this.isIgnited) return;

                const fastDt = dt * 2.5;
                const weight = this.getTotalWeight();
                const thrust = (this.fuel > 0) ? this.getTotalThrust() : 0;
                const gravity = 20.0;
                const stability = this.getStabilityRating();

                // Thrust Vectors
                let thrustY = thrust * Math.cos(this.tilt);
                let thrustX = thrust * Math.sin(this.tilt);

                // 1. VERTICAL LOGIC
                let netForceY = (this.y <= 0) ? (thrustY - (weight * gravity)) : (thrustY - (weight * gravity));

                // Safety: If on ground and thrust isn't enough to lift, don't accumulate negative velocity
                if (this.y <= 0 && netForceY <= 0) {
                    this.velocity = 0;
                    this.acceleration = 0;
                } else {
                    this.acceleration = netForceY / weight;
                    this.velocity += this.acceleration * fastDt;
                }

                // 2. HORIZONTAL & TILT (Only unlock once we leave the ground)
                if (this.y > 0) {
                    let stabilityMultiplier = (this.fuel > 0) ? 1 : 0.5;
                    let windForce = (Math.random() - 0.5) * 12.0;
                    let tiltChange = (windForce / (stability * stabilityMultiplier + 1));

                    this.angularVelocity += tiltChange * fastDt;
                    this.tilt += this.angularVelocity * fastDt;

                    let accX = thrustX / weight;
                    this.velocityX += accX * fastDt;
                } else {
                    // Stay upright on the pad
                    this.velocityX = 0;
                    this.tilt = 0;
                    this.angularVelocity = 0;
                }

                this.y += this.velocity * fastDt;
                this.x += this.velocityX * fastDt;

                // Snap to zero if landing
                if (this.y < 0) this.y = 0;

                if (this.fuel > 0) {
                    this.fuel -= (thrust * 0.02) * fastDt;
                }

                if (this.y > this.maxAltitude) this.maxAltitude = this.y;
            }

            draw(ctx, canvas) {
                // Calculate screen position
                const screenX = Math.floor((canvas.width / 2) + this.x);
                const screenY = canvas.height - ROCKET_INIT_ALTITUDE;

                ctx.save();
                ctx.translate(screenX, screenY);
                ctx.rotate(this.tilt); // ROTATE THE ENTIRE CANVAS CONTEXT

                ctx.fillStyle = "#00ff41";
                ctx.textAlign = "center";

                let offset = 0;
                this.modules.forEach((mod, index) => {
                    let symbol = "|[ ]|";
                    if (index === this.modules.length - 1) symbol = "^"; // Nose is last in array (top)

                    // Draw Flame
                    if (index === 0 && this.fuel > 0 && this.isIgnited) {
                        ctx.fillText("vvv", 0, 10 + (Math.random() * 5));
                    }

                    ctx.fillText(symbol, 0, -offset);
                    offset += 20;
                });

                ctx.restore(); // Reset rotation for UI
            }
        }

        class Star {
            constructor(canvas) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                // Stars at different "depths" move at different speeds
                this.depth = Math.random() * 0.5 + 0.1;
            }

            draw(ctx, canvas, rocketY) {
                // 1. Calculate the star's position based on altitude
                // Note: We subtract because as we go UP, the stars move DOWN.
                let relativeY = (this.y + (rocketY * this.depth)) % canvas.height;

                // 2. The ground line moves DOWN as rocketY increases
                const currentGroundY = (canvas.height - GROUND_INIT_ALTITUDE) + rocketY;

                // 3. Only draw if the star is above the ground line
                if (relativeY < currentGroundY) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.depth})`;
                    ctx.beginPath();
                    ctx.arc(this.x, relativeY, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        /**
         * ENGINE / CORE GAME LOOP
         */
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.rocket = new Rocket();
                this.stars = [];
                this.lastTime = 0;

                window.addEventListener('resize', () => this.resize());
                window.addEventListener('keydown', (e) => { if (e.code === 'Space') this.rocket.isIgnited = true; });

                this.resize();
                this.initRocket();
                this.generateStars();
                requestAnimationFrame((t) => this.loop(t));
            }

            generateStars() {
                this.stars = [];
                for (let i = 0; i < 100; i++) {
                    this.stars.push(new Star(this.canvas));
                }
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.generateStars(); // Regrow stars on resize
            }

            initRocket() {
                // Boosted Engine so it actually lifts off!
                this.rocket.addModule(new Module("Engine", 50, 0, 8000));
                this.rocket.addModule(new Module("Tank", 100, 1000));
                this.rocket.addModule(new Module("Nose", 20, 0, 0, 5)); // Added some stability
            }

            // drawGround(rocketY) {
            //     const groundLevel = this.canvas.height - 100;
            //     const currentGroundY = groundLevel + rocketY;

            //     // Only draw if it's on screen
            //     if (currentGroundY < this.canvas.height + 50) {
            //         this.ctx.strokeStyle = "#00ff41";
            //         this.ctx.lineWidth = 2;
            //         this.ctx.beginPath();
            //         this.ctx.moveTo(0, currentGroundY);
            //         this.ctx.lineTo(this.canvas.width, currentGroundY);
            //         this.ctx.stroke();

            //         // Draw some "Launch Pad" details
            //         for (let i = -2; i <= 2; i++) {
            //             let padX = (this.canvas.width / 2) + (i * 40);
            //             this.ctx.strokeRect(padX - 10, currentGroundY - 5, 20, 5);
            //         }
            //     }
            // }

            drawGround(rocketY) {
                const groundBaseY = this.canvas.height - GROUND_INIT_ALTITUDE;
                const currentGroundY = groundBaseY + rocketY; // Moves down as rocket goes up

                // Only draw the ground if it's still visible on screen
                if (currentGroundY < this.canvas.height + 200) {
                    this.ctx.strokeStyle = "#00ff41";
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, currentGroundY);
                    this.ctx.lineTo(this.canvas.width, currentGroundY);
                    this.ctx.stroke();

                    // Draw the "Dirt" under the line so stars don't show through
                    this.ctx.fillStyle = "#0a0a0c";
                    this.ctx.fillRect(0, currentGroundY + 2, this.canvas.width, this.canvas.height);

                    // Draw some "Launch Pad" details
                    for (let i = -2; i <= 2; i++) {
                        let padX = (this.canvas.width / 2) + (i * 40);
                        this.ctx.strokeRect(padX - 10, currentGroundY - 6, 20, 5);
                    }
                }
            }

            checkFlightStatus() {
                const rocket = this.rocket;
                const margin = 150; // Distance off-screen before failing
                const halfWidth = this.canvas.width / 2;

                // A. OFF-SCREEN CHECK (Side failure)
                if (rocket.x < -halfWidth - margin || rocket.x > halfWidth + margin) {
                    this.endRun("LOST IN SECTOR X: Out of Bounds", rocket.maxAltitude);
                }

                // B. GROUND CHECK (Landing or Crashing)
                if (rocket.y <= 0) {
                    rocket.y = 0;
                    if (rocket.velocity < -15) {
                        this.endRun("CRITICAL FAILURE: Impact Detected", rocket.maxAltitude);
                    } else if (rocket.isIgnited && rocket.velocity <= 0 && rocket.fuel <= 0) {
                        // Out of fuel and touched down safely
                        this.endRun("MISSION COMPLETE: Return to Hangar", rocket.maxAltitude);
                    }
                }
            }

            endRun(message, maxAltitude) {
                this.rocket.isIgnited = false;

                // Show the Modal
                const overlay = document.getElementById('modal-overlay');
                const msg = document.getElementById('modal-msg');
                const stats = document.getElementById('modal-stats');

                overlay.style.display = 'flex';
                msg.innerText = message;
                stats.innerHTML = `MAX ALTITUDE: ${Math.floor(maxAltitude)}m`;
            }

            retry() {
                // Use the new class method!
                this.rocket.reset();

                // Hide modal
                document.getElementById('modal-overlay').style.display = 'none';
            }

            resetRocket() {
                this.rocket.reset();
            }

            loop(time) {
                const dt = (time - this.lastTime) / 1000;
                this.lastTime = time;

                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Update Physics
                this.rocket.update(dt);

                // Referee Check
                this.checkFlightStatus();

                // Rendering
                this.stars.forEach(star => star.draw(this.ctx, this.canvas, this.rocket.y));
                this.drawGround(this.rocket.y);
                this.rocket.draw(this.ctx, this.canvas);

                // UPDATE UI
                document.getElementById('stats').innerHTML = `
                    ALTITUDE: ${Math.floor(this.rocket.y)}m<br>
                    FUEL: ${Math.max(0, Math.floor(this.rocket.fuel))} units<br>
                    SPEED: ${Math.floor(this.rocket.velocity)} m/s<br>
                    ACCEL: ${this.rocket.acceleration.toFixed(2)} m/s²<br>
                    WEIGHT: ${Math.floor(this.rocket.getTotalWeight())} kg
                `;

                requestAnimationFrame((t) => this.loop(t));
            }
        }
        const game = new Game();
    </script>
</body>

</html>
