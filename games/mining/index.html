<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pro-Miner: Fullscreen Scale</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #050505;
        font-family: "Courier New", monospace;
        color: #0f0;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        pointer-events: none;
        background: rgba(0, 20, 0, 0.85);
        padding: 12px;
        border: 1px solid #0f0;
        width: 220px;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
      }
      .res-row {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        margin-bottom: 2px;
      }
      #phase-alert {
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        background: #0f0;
        color: #000;
        padding: 10px 20px;
        font-weight: bold;
        display: none;
        border: 2px solid #fff;
      }
      .progress-bar {
        width: 100%;
        height: 6px;
        border: 1px solid #0f0;
        margin-top: 4px;
        background: #010;
      }
      #mine-fill {
        width: 0%;
        height: 100%;
        background: #0f0;
      }
    </style>
  </head>
  <body>
    <div id="phase-alert">
      ZOOMING OUT TO PHASE <span id="alert-phase"></span>
    </div>

    <div id="ui">
      <div
        style="
          font-size: 14px;
          border-bottom: 1px solid #0f0;
          margin-bottom: 8px;
          padding-bottom: 4px;
        ">
        SECTOR: <span id="current-phase">1</span>
      </div>
      <div id="inventory-list"></div>
      <div
        style="margin-top: 8px; border-top: 1px solid #040; padding-top: 4px">
        <b>CREDITS:</b> $<span id="total-val">0</span>
      </div>
      <div id="mining-status" style="visibility: hidden">
        <small>DRILLING...</small>
        <div class="progress-bar"><div id="mine-fill"></div></div>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
      const CONFIG = {
        phases: [
          { id: 0, gridCount: 20, threshold: 100, fog: 4 },
          { id: 1, gridCount: 60, threshold: 2000, fog: 8 },
          { id: 2, gridCount: 150, threshold: 15000, fog: 15 },
        ],
        rocks: {
          soil: { color: "#2d1f16", hardness: 5, value: 1 },
          copper: { color: "#b87333", hardness: 30, value: 15 },
          iron: { color: "#777777", hardness: 80, value: 40 },
          gold: { color: "#ffd700", hardness: 250, value: 200 },
        },
        zoomSpeed: 0.05, // How fast the zoom lerps
      };

      class World {
        constructor() {
          this.grid = new Map();
        }
        getTile(x, y) {
          const key = `${x},${y}`;
          if (!this.grid.has(key)) this.grid.set(key, this.generateTile(x, y));
          return this.grid.get(key);
        }
        generateTile(x, y) {
          const dist = Math.abs(x) + Math.abs(y);
          let type = "soil";
          const roll = Math.random();
          if (dist > 50 && roll < 0.07) type = "gold";
          else if (dist > 25 && roll < 0.12) type = "iron";
          else if (dist > 10 && roll < 0.18) type = "copper";
          return {
            type,
            ...CONFIG.rocks[type],
            mined: x === 0 && y === 0,
            explored: false,
          };
        }
      }

      class GameEngine {
        constructor() {
          this.canvas = document.getElementById("gameCanvas");
          this.ctx = this.canvas.getContext("2d");
          this.world = new World();

          this.miner = {
            x: 0,
            y: 0,
            miningPower: 35,
            inventory: { soil: 0, copper: 0, iron: 0, gold: 0 },
            state: "IDLE",
            miningProgress: 0,
            target: null,
          };

          this.phaseIndex = 0;
          this.targetTileSize = 0;
          this.currentTileSize = 0; // For smooth zooming

          this.camX = 0;
          this.camY = 0;
          this.keys = {};
          this.lastTime = 0;

          window.addEventListener("keydown", (e) => (this.keys[e.code] = true));
          window.addEventListener("keyup", (e) => (this.keys[e.code] = false));
          window.addEventListener("resize", () => this.handleResize());

          this.handleResize();
          this.currentTileSize = this.targetTileSize; // Start without zoom effect
          this.updateUI();
          requestAnimationFrame((t) => this.loop(t));
        }

        handleResize() {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
          this.updateTargetScale();
        }

        updateTargetScale() {
          // Fullscreen: The shorter axis fits the gridCount exactly.
          // The longer axis shows MORE tiles to fill the screen.
          const gridCount = CONFIG.phases[this.phaseIndex].gridCount;
          this.targetTileSize =
            Math.max(this.canvas.width, this.canvas.height) / gridCount;
        }

        update(dt) {
          // Smooth Zoom Lerp
          this.currentTileSize +=
            (this.targetTileSize - this.currentTileSize) * CONFIG.zoomSpeed;

          if (this.miner.state === "MINING") {
            this.processMining(dt);
          } else {
            this.handleInput();
          }

          this.checkProgression();
          this.updateFog();
          this.updateCamera();
        }

        handleInput() {
          let dx = 0,
            dy = 0;
          if (this.keys["KeyW"] || this.keys["ArrowUp"]) dy = -1;
          else if (this.keys["KeyS"] || this.keys["ArrowDown"]) dy = 1;
          else if (this.keys["KeyA"] || this.keys["ArrowLeft"]) dx = -1;
          else if (this.keys["KeyD"] || this.keys["ArrowRight"]) dx = 1;

          if (dx !== 0 || dy !== 0) {
            const tx = this.miner.x + dx;
            const ty = this.miner.y + dy;
            const tile = this.world.getTile(tx, ty);

            if (tile.mined) {
              this.miner.x = tx;
              this.miner.y = ty;
              this.keys = {};
            } else {
              this.miner.state = "MINING";
              this.miner.target = { x: tx, y: ty, tile };
              this.miner.miningProgress = 0;
            }
          }
        }

        processMining(dt) {
          const m = this.miner;
          m.miningProgress += m.miningPower * (dt / 1000);

          document.getElementById("mining-status").style.visibility = "visible";
          document.getElementById("mine-fill").style.width =
            Math.min((m.miningProgress / m.target.tile.hardness) * 100, 100) +
            "%";

          if (m.miningProgress >= m.target.tile.hardness) {
            m.target.tile.mined = true;
            m.inventory[m.target.tile.type]++;
            m.x = m.target.x;
            m.y = m.target.y;
            m.state = "IDLE";
            document.getElementById("mining-status").style.visibility =
              "hidden";
            this.updateUI();
          }
        }

        checkProgression() {
          const totalValue = Object.keys(this.miner.inventory).reduce(
            (s, k) => s + this.miner.inventory[k] * CONFIG.rocks[k].value,
            0,
          );
          const phase = CONFIG.phases[this.phaseIndex];

          if (
            totalValue >= phase.threshold &&
            this.phaseIndex < CONFIG.phases.length - 1
          ) {
            this.phaseIndex++;
            this.updateTargetScale();
            this.showPhaseAlert();
            this.updateUI();
          }
        }

        showPhaseAlert() {
          const el = document.getElementById("phase-alert");
          document.getElementById("alert-phase").innerText =
            this.phaseIndex + 1;
          el.style.display = "block";
          setTimeout(() => (el.style.display = "none"), 3000);
        }

        updateFog() {
          const r = CONFIG.phases[this.phaseIndex].fog;
          for (let x = -r; x <= r; x++) {
            for (let y = -r; y <= r; y++) {
              if (Math.sqrt(x * x + y * y) <= r) {
                this.world.getTile(
                  this.miner.x + x,
                  this.miner.y + y,
                ).explored = true;
              }
            }
          }
        }

        updateCamera() {
          const pX = this.miner.x * this.currentTileSize;
          const pY = this.miner.y * this.currentTileSize;

          // Follow miner smoothly
          this.camX += (pX - this.camX) * 0.1;
          this.camY += (pY - this.camY) * 0.1;
        }

        draw() {
          const { ctx, canvas, world, miner, currentTileSize: ts } = this;
          ctx.fillStyle = "#050505";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const offX = canvas.width / 2 - this.camX;
          const offY = canvas.height / 2 - this.camY;

          // Render visible range
          const startX = Math.floor((this.camX - canvas.width / 2) / ts);
          const endX = Math.ceil((this.camX + canvas.width / 2) / ts);
          const startY = Math.floor((this.camY - canvas.height / 2) / ts);
          const endY = Math.ceil((this.camY + canvas.height / 2) / ts);

          for (let x = startX; x <= endX; x++) {
            for (let y = startY; y <= endY; y++) {
              const tile = world.getTile(x, y);
              if (!tile.explored) continue;

              ctx.fillStyle = tile.mined ? "#111" : tile.color;
              // As cells get tiny, remove borders to prevent visual noise
              const border = ts > 15 ? 1 : 0;
              ctx.fillRect(
                x * ts + offX,
                y * ts + offY,
                ts - border,
                ts - border,
              );
            }
          }

          // Miner
          ctx.fillStyle = "#0f0";
          const mSize = Math.max(ts * 0.7, 3);
          ctx.fillRect(
            miner.x * ts + offX + (ts - mSize) / 2,
            miner.y * ts + offY + (ts - mSize) / 2,
            mSize,
            mSize,
          );
        }

        updateUI() {
          const inv = document.getElementById("inventory-list");
          let val = 0;
          inv.innerHTML = "";
          for (const [res, count] of Object.entries(this.miner.inventory)) {
            const rVal = count * CONFIG.rocks[res].value;
            val += rVal;
            if (count > 0) {
              inv.innerHTML += `<div class="res-row"><span>${res.toUpperCase()}</span> <span>${count}</span></div>`;
            }
          }
          document.getElementById("total-val").innerText = val;
          document.getElementById("current-phase").innerText =
            this.phaseIndex + 1;
        }

        loop(time) {
          const dt = time - this.lastTime;
          this.lastTime = time || 0;
          this.update(dt);
          this.draw();
          requestAnimationFrame((t) => this.loop(t));
        }
      }

      const engine = new GameEngine();
    </script>
  </body>
</html>
