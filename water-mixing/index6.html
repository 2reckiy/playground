<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hex Factory | Species Evolution</title>
    <style>
      :root {
        --bg: #000;
        --surface: #0a0a0a;
        --border: #222;
        --accent: #38bdf8;
        --text: #fff;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #header {
        flex-shrink: 0;
        padding: 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 10;
      }

      #result-hex {
        font-size: 5rem;
        font-weight: 900;
        font-family: monospace;
        line-height: 1;
        margin-bottom: 15px;
        letter-spacing: -4px;
      }

      .slots-container {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }
      .slot {
        width: 55px;
        height: 75px;
        border: 2px solid var(--border);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.02);
        transition: 0.2s;
      }
      .slot.active {
        border-color: var(--accent);
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
      }
      .chip {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .hud {
        display: flex;
        gap: 20px;
        align-items: center;
        font-size: 0.8rem;
        color: #666;
      }
      .auto-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: 800;
        cursor: pointer;
      }
      .auto-btn.on {
        background: #22c55e;
        color: #fff;
      }

      /* Palette Grid */
      #palette-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
        grid-auto-rows: 50px;
        gap: 5px;
        align-content: start;
      }

      .species-group {
        width: 100%;
        height: 100%;
        border-radius: 6px;
        cursor: pointer;
        position: relative;
        transition: transform 0.1s;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .species-group:hover {
        transform: scale(1.15);
        z-index: 5;
        outline: 2px solid white;
      }

      .shade-badge {
        position: absolute;
        top: 2px;
        left: 2px;
        font-size: 9px;
        background: rgba(0, 0, 0, 0.7);
        padding: 1px 4px;
        border-radius: 10px;
        color: #aaa;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <header id="header">
      <div id="result-hex">#000000</div>
      <div class="slots-container" id="slots-ui"></div>
      <div class="hud">
        <button id="auto-toggle" class="auto-btn" onclick="toggleAuto()">
          Auto-Evolve
        </button>
        <div id="stats">SPECIES: 3 | TOTAL SHADES: 0</div>
      </div>
    </header>

    <main id="palette-container"></main>

    <script>
      /** CONFIG **/
      const MAX_SLOTS = 3;
      const SIMILARITY_THRESHOLD = 18;
      const STARTING_HEXES = ["#FF0000", "#00FF00", "#0000FF"];

      /** STATE **/
      let speciesList = []; // Array of { mainHex, r, g, b, shades: [] }
      let slots = Array(MAX_SLOTS).fill(null);
      let activeSlotIndex = 0;
      let autoInterval = null;

      function hexToRgb(hex) {
        return {
          r: parseInt(hex.slice(1, 3), 16),
          g: parseInt(hex.slice(3, 5), 16),
          b: parseInt(hex.slice(5, 7), 16),
        };
      }

      // Initialize with 3 colors
      STARTING_HEXES.forEach((h) => {
        const rgb = hexToRgb(h);
        speciesList.push({ mainHex: h, ...rgb, shades: [] });
      });

      function getSortValue(hex) {
        let { r, g, b } = hexToRgb(hex);
        r /= 255;
        g /= 255;
        b /= 255;
        let max = Math.max(r, g, b),
          min = Math.min(r, g, b),
          h,
          l = (max + min) / 2;
        if (max === min) h = 0;
        else {
          let d = max - min;
          if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
          else if (max === g) h = (b - r) / d + 2;
          else h = (r - g) / d + 4;
          h /= 6;
        }
        return ((h + 0.15) % 1) * 100 + l;
      }

      function useIngredient(hex) {
        slots[activeSlotIndex] = hex;
        activeSlotIndex = (activeSlotIndex + 1) % slots.length;
        updateLogic();
      }

      function calculateMix() {
        const filled = slots.filter((s) => s !== null);
        if (filled.length === 0) return "#000000";
        let r2 = 0,
          g2 = 0,
          b2 = 0;
        filled.forEach((hex) => {
          const rgb = hexToRgb(hex);
          r2 += rgb.r ** 2;
          g2 += rgb.g ** 2;
          b2 += rgb.b ** 2;
        });
        const avg = (sum) =>
          Math.round(Math.sqrt(sum / filled.length))
            .toString(16)
            .padStart(2, "0");
        return `#${avg(r2)}${avg(g2)}${avg(b2)}`.toUpperCase();
      }

      function updateLogic() {
        const currentHex = calculateMix();
        const display = document.getElementById("result-hex");
        display.innerText = currentHex;
        display.style.color = currentHex;

        if (slots.every((s) => s !== null)) {
          processDiscovery(currentHex);
        }
        renderSlots();
      }

      function processDiscovery(newHex) {
        const newRgb = hexToRgb(newHex);

        // Find existing species group
        let group = speciesList.find((s) => {
          const distance = Math.sqrt(
            (s.r - newRgb.r) ** 2 +
              (s.g - newRgb.g) ** 2 +
              (s.b - newRgb.b) ** 2,
          );
          return distance < SIMILARITY_THRESHOLD;
        });

        if (group) {
          // Add to shades if it's not the exact mainHex
          if (group.mainHex !== newHex && !group.shades.includes(newHex)) {
            group.shades.push(newHex);
          }
        } else {
          // Create new Species
          speciesList.push({ mainHex: newHex, ...newRgb, shades: [] });
          speciesList.sort(
            (a, b) => getSortValue(a.mainHex) - getSortValue(b.mainHex),
          );
        }

        renderPalette();
        updateStats();
      }

      function updateStats() {
        const totalShades = speciesList.reduce(
          (sum, s) => sum + s.shades.length,
          0,
        );
        document.getElementById("stats").innerText =
          `SPECIES: ${speciesList.length} | TOTAL SHADES: ${totalShades}`;
      }

      function renderPalette() {
        const grid = document.getElementById("palette-container");
        grid.innerHTML = "";
        speciesList.forEach((group) => {
          const div = document.createElement("div");
          div.className = "species-group";
          div.style.backgroundColor = group.mainHex;
          div.onclick = () => useIngredient(group.mainHex);

          if (group.shades.length > 0) {
            const badge = document.createElement("span");
            badge.className = "shade-badge";
            badge.innerText = group.shades.length;
            div.appendChild(badge);
          }
          grid.appendChild(div);
        });
      }

      function renderSlots() {
        const ui = document.getElementById("slots-ui");
        ui.innerHTML = "";
        slots.forEach((color, i) => {
          const div = document.createElement("div");
          div.className = `slot ${i === activeSlotIndex ? "active" : ""}`;
          div.onclick = () => {
            activeSlotIndex = i;
            renderSlots();
          };
          if (color)
            div.innerHTML = `<div class="chip" style="background:${color}"></div>`;
          ui.appendChild(div);
        });
      }

      function toggleAuto() {
        const btn = document.getElementById("auto-toggle");
        if (autoInterval) {
          clearInterval(autoInterval);
          autoInterval = null;
          btn.innerText = "Auto-Evolve";
          btn.classList.remove("on");
        } else {
          btn.innerText = "Evolving...";
          btn.classList.add("on");
          autoInterval = setInterval(() => {
            // Pick from any species mainHex
            const rand =
              speciesList[Math.floor(Math.random() * speciesList.length)]
                .mainHex;
            useIngredient(rand);
          }, 60);
        }
      }

      renderPalette();
      renderSlots();
    </script>
  </body>
</html>
