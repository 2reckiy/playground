<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      #hangar-screen {
        position: absolute;
        top: 50%;
        right: 50%;
        transform: translate(50%, -50%);
        width: 100%;
        height: 100%;
        background: rgba(10, 15, 10, 0.95);
        border: 2px solid #00ff41;
        padding: 20px;
        color: #00ff41;
        font-family: monospace;
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        box-sizing: border-box;
      }

      .hangar-layout {
        display: flex;
        gap: 20px;
        justify-content: space-between;
      }

      /* The Grid */
      .constructor-grid {
        position: relative; /* Keep this for the CoM/CoT markers */
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        justify-content: center;
        padding: 10px;
        background: rgba(0, 255, 65, 0.05);
        border: 1px inset #00ff41;
        margin: 15px 0;
        /* Width of 3 columns (60px * 3) + gaps (5px * 2) + padding (10px * 2) */
        width: 210px;
      }

      .grid-slot {
        /* Using flex-basis to control the size */
        flex: 0 0 60px;
        height: 60px;
        margin: 2.5px; /* Half of your 5px gap */
        border: 1px solid rgba(0, 255, 65, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
        box-sizing: border-box; /* Ensures border doesn't grow the 60px width */
      }

      .grid-slot:hover {
        background: rgba(0, 255, 65, 0.1);
      }

      .grid-slot.occupied {
        border-color: #00ff41;
        background: rgba(0, 255, 65, 0.2);
        font-size: 20px;
      }

      /* Palette and Stats */
      .palette-item {
        border: 1px solid #00ff41;
        padding: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        text-align: center;
      }
      .palette-item.selected {
        background: #00ff41;
        color: #000;
      }

      .stats-view {
        flex: 1;
      }

      .stats-card {
        background: rgba(0, 0, 0, 0.5);
        padding: 10px;
        line-height: 1.6;
      }
      .launch-btn {
        width: 100%;
        padding: 15px;
        background: transparent;
        border: 2px solid #00ff41;
        color: #00ff41;
        cursor: pointer;
        font-weight: bold;
      }
      .launch-btn:hover {
        background: #00ff41;
        color: #000;
      }

      .marker {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none; /* Don't block clicks on slots */
        z-index: 10;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
      }
      .marker-com {
        background: #ffcc00;
        color: #000;
        border: 1px solid white;
      }
      .marker-cot {
        background: #00ffff;
        color: #000;
        border: 1px solid white;
      }
    </style>
  </head>
  <body>
    <div id="hangar-screen">
      <div class="hangar-header">
        <h2>ROCKET ASSEMBLY HANGAR</h2>
        <div class="credits-display">
          CREDITS: <span id="hangar-credits">0</span>
        </div>
      </div>

      <div class="hangar-layout">
        <div class="stats-view">
          <h3>ANALYSIS</h3>
          <div id="rocket-stats" class="stats-card"></div>
        </div>

        <div class="blueprint-view">
          <h3>SCHEMATIC</h3>
          <div id="constructor-grid" class="constructor-grid"></div>
          <button class="launch-btn">IGNITION SEQUENCE</button>
        </div>

        <div class="inventory">
          <h3>COMPONENTS</h3>
          <div id="parts-palette"></div>
        </div>
      </div>
    </div>

    <script>
      const PARTS_CATALOG = {
        ENGINE: { symbol: "|_|", weight: 800, fuel: 0, thrust: 12000 },
        FUEL_TANK: { symbol: "| |", weight: 400, fuel: 1000, thrust: 0 },
        NOSE_CONE: { symbol: "/\\", weight: 200, fuel: 0, thrust: 0 },
      };
      class RocketBuilder {
        constructor(game) {
          this.game = game;
          this.rows = 10;
          this.cols = 9;
          // 2D Array to store part keys
          this.grid = Array(this.rows)
            .fill(null)
            .map(() => Array(this.cols).fill(null));
          this.selectedPart = "FUEL_TANK";

          // Initial Rocket
          const center = Math.floor(this.cols/2);
          this.grid[this.rows-1][center] = "ENGINE";
          this.grid[this.rows-2][center] = "FUEL_TANK";
          this.grid[this.rows-3][center] = "NOSE_CONE";
        }

        render() {
          // 1. Render Palette
          const palette = document.getElementById("parts-palette");
          palette.innerHTML = "";

          Object.keys(PARTS_CATALOG).map((key) => {
            const item = document.createElement("div");
            item.className = `palette-item ${this.selectedPart === key ? "selected" : ""}`;
            item.innerHTML = `${key}<br>${PARTS_CATALOG[key].symbol}`;
            item.onclick = () => this.selectPart(key);

            palette.appendChild(item);
          });

          // 2. Render Grid
          const gridEl = document.getElementById("constructor-grid");
          const slotSize = 65; // 60px + 5px margin total
          gridEl.style.width = `${slotSize * this.cols + 20}px`;

          gridEl.innerHTML = "";
          for (let r = 0; r < this.rows; r++) {
            for (let c = 0; c < this.cols; c++) {
              const partKey = this.grid[r][c];
              const slot = document.createElement("div");
              slot.className = `grid-slot ${partKey ? "occupied" : ""}`;
              slot.innerHTML = partKey ? PARTS_CATALOG[partKey].symbol : "";
              slot.onclick = () => this.toggleSlot(r, c);
              gridEl.appendChild(slot);
            }
          }

          const centers = this.calculatePhysicsCenters();

          if (centers.com) {
            const comMarker = document.createElement("div");
            comMarker.className = "marker marker-com";
            comMarker.style.left = `${(centers.com.x / this.cols) * 100}%`;
            comMarker.style.top = `${(centers.com.y / this.rows) * 100}%`;
            comMarker.innerText = "M";
            gridEl.appendChild(comMarker);
          }

          if (centers.cot) {
            const cotMarker = document.createElement("div");
            cotMarker.className = "marker marker-cot";
            cotMarker.style.left = `${(centers.cot.x / this.cols) * 100}%`;
            cotMarker.style.top = `${(centers.cot.y / this.rows) * 100}%`;
            cotMarker.innerText = "T";
            gridEl.appendChild(cotMarker);
          }

          this.updateRocketStats();
        }

        selectPart(key) {
          this.selectedPart = key;
          this.render();
        }

        toggleSlot(r, c) {
          if (this.grid[r][c]) {
            this.grid[r][c] = null;
          } else {
            this.grid[r][c] = this.selectedPart;
          }
          this.render();
        }

        calculatePhysicsCenters() {
          let totalMass = 0;
          let weightedX = 0;
          let weightedY = 0;

          let totalThrust = 0;
          let thrustX = 0;
          let thrustY = 0;

          for (let r = 0; r < this.rows; r++) {
            for (let c = 0; c < this.cols; c++) {
              const partKey = this.grid[r][c];
              if (partKey) {
                const part = PARTS_CATALOG[partKey];

                const weight = part.weight + part.fuel * 0.5;
                // Mass Calculation (Center of each grid slot)
                totalMass += weight;
                weightedX += (c + 0.5) * weight;
                weightedY += (r + 0.5) * weight;

                // Thrust Calculation
                if (part.thrust > 0) {
                  totalThrust += part.thrust;
                  thrustX += (c + 0.5) * part.thrust;
                  thrustY += (r + 0.5) * part.thrust;
                }
              }
            }
          }

          return {
            com:
              totalMass > 0
                ? { x: weightedX / totalMass, y: weightedY / totalMass }
                : null,
            cot:
              totalThrust > 0
                ? { x: thrustX / totalThrust, y: thrustY / totalThrust }
                : null,
            totalMass,
            totalThrust,
          };
        }

        validate() {
          const errors = [];
          const grid = this.grid;
          const rows = this.rows;
          const cols = this.cols;

          // Helper: Find all occupied slots
          let parts = [];
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              if (grid[r][c]) parts.push({ r, c, type: grid[r][c] });
            }
          }

          if (parts.length === 0)
            return { valid: false, errors: ["ROCKET IS EMPTY"] };

          // Check 1: No modules under ENGINE
          parts.forEach((p) => {
            if (p.type === "ENGINE") {
              for (let r = p.r + 1; r < rows; r++) {
                if (grid[r][p.c]) {
                  errors.push(
                    `BLOCKAGE: Part detected under Engine at [${r}, ${p.c}]`,
                  );
                }
              }
            }
          });

          // Check 2: No modules above NOSE_CONE
          parts.forEach((p) => {
            if (p.type === "NOSE_CONE") {
              for (let r = p.r - 1; r >= 0; r--) {
                if (grid[r][p.c]) {
                  errors.push(
                    `AERO-FAIL: Part detected above Nose Cone at [${r}, ${p.c}]`,
                  );
                }
              }
            }
          });

          // Check 3: Connectivity (Flood Fill)
          // Start from the first part found and see if we can reach all others
          const visited = new Set();
          const stack = [parts[0]];
          while (stack.length > 0) {
            const { r, c } = stack.pop();
            const key = `${r},${c}`;
            if (visited.has(key)) continue;
            visited.add(key);

            // Check neighbors (up, down, left, right)
            const neighbors = [
              [r - 1, c],
              [r + 1, c],
              [r, c - 1],
              [r, c + 1],
            ];
            neighbors.forEach(([nr, nc]) => {
              if (
                nr >= 0 &&
                nr < rows &&
                nc >= 0 &&
                nc < cols &&
                grid[nr][nc]
              ) {
                stack.push({ r: nr, c: nc });
              }
            });
          }

          if (visited.size < parts.length) {
            errors.push("STRUCTURAL FAILURE: Floating modules detected");
          }

          return {
            valid: errors.length === 0,
            errors: errors,
          };
        }

        updateRocketStats() {
          const blueprint = [];
          let m = 0;
          let t = 0;
          let s = 0;

          // Flatten grid for the Rocket class (reading bottom to top)
          for (let r = this.rows - 1; r >= 0; r--) {
            for (let c = 0; c < this.cols; c++) {
              if (this.grid[r][c]) {
                const partKey = this.grid[r][c];
                const part = PARTS_CATALOG[partKey];

                m += part.weight + part.fuel * 0.5;
                t += part.thrust || 0;
                s += part.stability || 0;

                blueprint.push(this.grid[r][c]);
              }
            }
          }


          const stats = document.getElementById("rocket-stats");
          const launchBtn = document.querySelector(".launch-btn");
          const twr = (t / (m * 9.8)).toFixed(2);

          let errorHTML = "";
          const validation = this.validate();
          if (!validation.valid) {
            errorHTML = `<div style="color: #ff4141; margin-top: 10px; font-size: 11px;">
                ${validation.errors.map((e) => `> ${e}`).join("<br>")}
              </div>`;
            launchBtn.style.borderColor = "#ff4141";
            launchBtn.style.color = "#ff4141";
            launchBtn.disabled = true;
            launchBtn.innerText = "SYSTEM ERROR";
          } else {
            launchBtn.style.borderColor = "#00ff41";
            launchBtn.style.color = "#00ff41";
            launchBtn.disabled = false;
            launchBtn.innerText = "IGNITION SEQUENCE";
          }

          stats.innerHTML = `
            MASS: ${m}kg<br>
            THRUST: ${t}kN<br>
            TWR: <span style="color: ${twr > 1 ? "#00ff41" : "#ff4141"}">${twr}</span><br>
            STB: ${s.toFixed(2)}<br>
            ${errorHTML}
          `;
        }
      }

      const builder = new RocketBuilder();
      builder.render();
    </script>
  </body>
</html>
