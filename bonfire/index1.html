<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Canvas Settlement — Drag & Rotate + Resources</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, Segoe UI, Roboto, Arial;
      }
      body {
        background: #f4f6f8;
      }
      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: white;
        cursor: crosshair;
      }
      .ui {
        position: absolute;
        left: 16px;
        top: 16px;
        background: rgba(255, 255, 255, 0.95);
        padding: 10px 12px;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }
      .resources {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .res-item {
        min-width: 110px;
      }
      .muted {
        color: #666;
        font-size: 13px;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.33);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal {
        background: #fff;
        border-radius: 10px;
        padding: 16px;
        width: 340px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }
      .build-grid {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .build-card {
        cursor: pointer;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #eee;
        width: 100px;
        text-align: center;
      }
      .build-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
      }
      .popup {
        position: absolute;
        transform: translate(-50%, -100%);
        background: white;
        padding: 8px 10px;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        pointer-events: auto;
      }
      button {
        background: #2b7cff;
        color: white;
        border: 0;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
      }
      button.secondary {
        background: #eee;
        color: #222;
      }
      .hint {
        font-size: 13px;
        opacity: 0.95;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="ui">
      <div class="resources">
        <div class="res-item">
          <strong>Goods:</strong> <span id="goods">0</span>
        </div>
        <div class="res-item">
          <strong>Production/s:</strong> <span id="prodPerSec">0</span>
        </div>
        <div class="res-item">
          <strong>Comfort avg:</strong> <span id="comfortAvg">0</span>
        </div>
      </div>
      <div style="margin-top: 8px" class="hint">
        Click empty space → build • Click object → info • Drag object to move •
        Drag rotate handle to rotate • R = rotate +15°
      </div>
    </div>

    <!-- Build modal -->
    <div
      id="buildModal"
      style="display: none"
      class="modal-backdrop"
      role="dialog"
      aria-modal="true">
      <div class="modal">
        <h3 style="margin: 0 0 8px 0">Place building</h3>
        <div id="buildDesc" class="muted" style="margin-bottom: 8px">
          Choose building to place.
        </div>
        <div class="build-grid" id="buildGrid"></div>
        <div style="margin-top: 12px; text-align: right">
          <button id="cancelBuild" class="secondary">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Info popup -->
    <div id="infoPopup" style="display: none; pointer-events: none; position: absolute;"></div>

    <script>
      /* ---------- Game config & state ---------- */
      let showRadii = true;
      const BUILD_TYPES = [
        {
          id: "hut",
          name: "Hut",
          icon: "🏠",
          radius: 120,
          base: { comfort: 5, production: 1 },
          effect: { comfort: 1 },
        },
        {
          id: "farm",
          name: "Farm",
          icon: "🌾",
          radius: 160,
          base: { comfort: -1, production: 4 },
          effect: { production: 2 },
        },
        {
          id: "forge",
          name: "Forge",
          icon: "🔨",
          radius: 100,
          base: { comfort: -2, production: 3 },
          effect: { production: 3 },
        },
        {
          id: "garden",
          name: "Garden",
          icon: "🌳",
          radius: 200,
          base: { comfort: 3, production: 0 },
          effect: { comfort: 2 },
        },
      ];

      const objects = []; // placed objects
      const bonfire = {
        id: "bonfire",
        typeId: "bonfire",
        name: "Bonfire",
        x: 0,
        y: 0,
        emoji: "🔥",
        radius: 240,
        base: { comfort: 10, production: 0 },
        effect: { comfort: 4 },
        rotation: 0,
      };

      function uid(p = "o") {
        return p + Math.random().toString(36).slice(2, 9);
      }
      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      /* ---------- Setup ---------- */
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      let dpr = Math.max(1, window.devicePixelRatio || 1);
      function resize() {
        dpr = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        recalcBonfire();
      }
      window.addEventListener("resize", resize);
      resize();

      /* ---------- Bonuses calculation ---------- */
      function computeBonuses() {
        const all = [bonfire, ...objects];
        for (const o of all)
          o.computed = {
            comfort: o.base?.comfort || 0,
            production: o.base?.production || 0,
          };
        for (const donor of all) {
          if (!donor.effect) continue;
          for (const target of all) {
            if (target === donor) continue;
            const d = dist(donor, target);
            if (d <= donor.radius) {
              const factor = Math.max(0, 1 - d / donor.radius);
              for (const key in donor.effect) {
                const amount = donor.effect[key] * factor;
                if (key === "comfort") target.computed.comfort += amount;
                if (key === "production") target.computed.production += amount;
              }
            }
          }
        }
      }

      /* ---------- Build modal ---------- */
      const buildModal = document.getElementById("buildModal");
      const buildGrid = document.getElementById("buildGrid");
      const buildDesc = document.getElementById("buildDesc");
      const cancelBuild = document.getElementById("cancelBuild");
      let pendingBuildPos = null;
      function openBuildModal(x, y) {
        pendingBuildPos = { x, y };
        buildModal.style.display = "flex";
        buildDesc.textContent = `Place building at x:${Math.round(
          x
        )}, y:${Math.round(y)}`;
      }
      function closeBuildModal() {
        buildModal.style.display = "none";
        pendingBuildPos = null;
      }
      cancelBuild.addEventListener("click", closeBuildModal);
      function renderBuildGrid() {
        buildGrid.innerHTML = "";
        for (const t of BUILD_TYPES) {
          const card = document.createElement("div");
          card.className = "build-card";
          card.innerHTML = `<div style="font-size:26px">${t.icon}</div><div style="font-weight:600">${t.name}</div><div class="muted" style="font-size:12px">radius: ${t.radius}px</div>`;
          card.onclick = () => {
            if (!pendingBuildPos) {
              closeBuildModal();
              return;
            }
            objects.push({
              id: uid("b"),
              typeId: t.id,
              name: t.name,
              x: pendingBuildPos.x,
              y: pendingBuildPos.y,
              emoji: t.icon,
              radius: t.radius,
              base: t.base,
              effect: t.effect,
              rotation: 0,
              createdAt: Date.now(),
            });
            computeBonuses();
            closeBuildModal();
          };
          buildGrid.appendChild(card);
        }
      }
      renderBuildGrid();

      /* ---------- Info popup ---------- */
      const infoPopup = document.getElementById("infoPopup");
      let selectedObject = null;
      function showInfoFor(obj, screenX, screenY) {
        selectedObject = obj;
        computeBonuses();
        const comp = obj.computed || obj.base || {};
        infoPopup.style.display = "block";
        infoPopup.style.pointerEvents = "auto";
        infoPopup.innerHTML = `<div class="popup" style="min-width:200px;">
    <div style="font-size:18px">${obj.emoji || ""} <strong>${
          obj.name
        }</strong></div>
    <div class="muted" style="margin-bottom:6px">radius: ${Math.round(
      obj.radius
    )} px • rotation: ${Math.round(obj.rotation || 0)}°</div>
    <div><strong>Comfort:</strong> ${Number(
      (comp.comfort || 0).toFixed(2)
    )}</div>
    <div><strong>Production:</strong> ${Number(
      (comp.production || 0).toFixed(2)
    )}</div>
    <div style="margin-top:8px;text-align:right"><button id="closeInfo">Close</button></div>
  </div>`;
        infoPopup.style.left = screenX + "px";
        infoPopup.style.top = screenY + "px";
        document.getElementById("closeInfo").onclick = () => closeInfoPopup();
      }
      function closeInfoPopup() {
        selectedObject = null;
        infoPopup.style.display = "none";
        infoPopup.style.pointerEvents = "none";
      }

      /* ---------- Pointer interactions: drag & rotate handle ---------- */
      const getClient = (e) => ({ x: e.clientX, y: e.clientY });
      function clientToCanvas(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      let pointerState = {
        mode: null, // 'drag', 'rotate', null
        target: null, // object
        start: null, // initial positions
        startRotation: 0,
        offset: { x: 0, y: 0 },
      };

      const HANDLE_DISTANCE = 36; // px from object center where handle sits
      const HANDLE_RADIUS = 9; // handle clickable radius

      function getRotateHandlePos(o) {
        const angle = ((o.rotation || 0) * Math.PI) / 180;
        const hx = o.x + Math.cos(angle) * (o.radius + HANDLE_DISTANCE);
        const hy = o.y + Math.sin(angle) * (o.radius + HANDLE_DISTANCE);
        return { x: hx, y: hy };
      }

      function findObjectAt(x, y) {
        // reverse iterate placed objects then bonfire
        for (let i = objects.length - 1; i >= 0; i--) {
          const o = objects[i];
          const r = 18;
          if (Math.hypot(x - o.x, y - o.y) <= r) return o;
        }
        const bfR = 24;
        if (Math.hypot(x - bonfire.x, y - bonfire.y) <= bfR) return bonfire;
        return null;
      }

      function findHandleUnder(x, y) {
        // check selected object first (only show handle for selected)
        const o = selectedObject;
        if (!o) return null;
        const h = getRotateHandlePos(o);
        if (Math.hypot(x - h.x, y - h.y) <= HANDLE_RADIUS) return o;
        return null;
      }

      // pointer down
      canvas.addEventListener("mousedown", (ev) => {
        const c = clientToCanvas(ev.clientX, ev.clientY);
        const x = c.x,
          y = c.y;
        // if clicking rotate handle of selected -> begin rotate
        const handleTarget = findHandleUnder(x, y);
        if (handleTarget) {
          pointerState.mode = "rotate";
          pointerState.target = handleTarget;
          pointerState.start = { cx: x, cy: y };
          pointerState.startRotation = handleTarget.rotation || 0;
          closeInfoPopup();
          closeBuildModal();
          return;
        }
        // else if clicking on object -> begin drag (or select)
        const obj = findObjectAt(x, y);
        if (obj) {
          pointerState.mode = "drag";
          pointerState.target = obj;
          pointerState.offset = { x: x - obj.x, y: y - obj.y };
          // select it & show info popup (screen coords)
          const rect = canvas.getBoundingClientRect();
          showInfoFor(obj, ev.clientX, ev.clientY);
          return;
        }
        // clicked empty space -> open build modal
        closeInfoPopup();
        openBuildModal(x, y);
      });

      // pointer move
      canvas.addEventListener("mousemove", (ev) => {
        const c = clientToCanvas(ev.clientX, ev.clientY);
        const x = c.x,
          y = c.y;

        if (pointerState.mode === "drag" && pointerState.target) {
          const o = pointerState.target;
          o.x = x - pointerState.offset.x;
          o.y = y - pointerState.offset.y;
          computeBonuses();
          // update popup position if visible
          if (selectedObject === o) {
            infoPopup.style.left = ev.clientX + "px";
            infoPopup.style.top = ev.clientY + "px";
          }
        } else if (pointerState.mode === "rotate" && pointerState.target) {
          const o = pointerState.target;
          // compute angle between object's center and current pointer, convert to degrees
          const angleRad = Math.atan2(y - o.y, x - o.x);
          let deg = (angleRad * 180) / Math.PI;
          // Normalize and store
          o.rotation = deg;
          computeBonuses();
          if (selectedObject === o) {
            // update popup rotation text if shown
            const closeBtn = document.getElementById("closeInfo");
            if (closeBtn) {
              // rebuild small info content quickly:
              showInfoFor(
                o,
                infoPopup.style.left
                  ? parseFloat(infoPopup.style.left)
                  : ev.clientX,
                infoPopup.style.top
                  ? parseFloat(infoPopup.style.top)
                  : ev.clientY
              );
            }
          }
        } else {
          // nothing: possibly change cursor when hovering handle
          const h = findHandleUnder(x, y);
          if (h) {
            canvas.style.cursor = "crosshair";
          } else {
            const maybe = findObjectAt(x, y);
            canvas.style.cursor = maybe ? "grab" : "crosshair";
          }
        }
      });

      // pointer up
      window.addEventListener("mouseup", (ev) => {
        if (pointerState.mode) {
          pointerState.mode = null;
          pointerState.target = null;
          pointerState.start = null;
          pointerState.offset = { x: 0, y: 0 };
          computeBonuses();
        }
      });

      // touch support (basic)
      canvas.addEventListener("touchstart", (ev) => {
        if (ev.touches && ev.touches[0]) {
          const t = ev.touches[0];
          canvas.dispatchEvent(
            new MouseEvent("mousedown", {
              clientX: t.clientX,
              clientY: t.clientY,
            })
          );
        }
      });
      canvas.addEventListener("touchmove", (ev) => {
        if (ev.touches && ev.touches[0]) {
          const t = ev.touches[0];
          canvas.dispatchEvent(
            new MouseEvent("mousemove", {
              clientX: t.clientX,
              clientY: t.clientY,
            })
          );
        }
      });
      canvas.addEventListener("touchend", () => {
        window.dispatchEvent(new MouseEvent("mouseup"));
      });

      /* ---------- Keyboard shortcuts ---------- */
      document.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "d") {
          showRadii = !showRadii;
        }
        if (e.key.toLowerCase() === "r" && selectedObject) {
          selectedObject.rotation = ((selectedObject.rotation || 0) + 15) % 360;
          computeBonuses();
        }
      });

      /* ---------- Drawing ---------- */
      function drawGrid(cell = 32) {
        ctx.save();
        ctx.strokeStyle = "rgba(0,0,0,0.03)";
        ctx.lineWidth = 1;
        const w = canvas.width / dpr,
          h = canvas.height / dpr;
        for (let gx = 0; gx <= w; gx += cell) {
          ctx.beginPath();
          ctx.moveTo(gx, 0);
          ctx.lineTo(gx, h);
          ctx.stroke();
        }
        for (let gy = 0; gy <= h; gy += cell) {
          ctx.beginPath();
          ctx.moveTo(0, gy);
          ctx.lineTo(w, gy);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawEmoji(ch, x, y, size = 28) {
        ctx.save();
        ctx.font = size + "px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(ch, x, y);
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

        drawGrid(32);

        // radii
        if (showRadii) {
          ctx.save();
          ctx.globalAlpha = 0.08;
          ctx.beginPath();
          ctx.fillStyle = "#ffcc88";
          ctx.arc(bonfire.x, bonfire.y, bonfire.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          ctx.save();
          ctx.globalAlpha = 0.06;
          for (const o of objects) {
            ctx.beginPath();
            ctx.arc(o.x, o.y, o.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#99ccff";
            ctx.fill();
          }
          ctx.restore();
        }

        // draw connections to selected object showing donors
        if (selectedObject) {
          ctx.save();
          ctx.lineWidth = 1.5;
          for (const donor of [bonfire, ...objects]) {
            if (donor === selectedObject) continue;
            const d = dist(donor, selectedObject);
            if (d <= donor.radius) {
              const strength = Math.max(0, 1 - d / donor.radius);
              ctx.strokeStyle = `rgba(60,120,220,${0.2 + 0.6 * strength})`;
              ctx.beginPath();
              ctx.moveTo(selectedObject.x, selectedObject.y);
              ctx.lineTo(donor.x, donor.y);
              ctx.stroke();
            }
          }
          ctx.restore();
        }

        // draw bonfire label + emoji
        drawEmoji(bonfire.emoji, bonfire.x, bonfire.y, 36);
        ctx.font = "12px system-ui, Arial";
        ctx.fillStyle = "#444";
        ctx.textAlign = "center";
        ctx.fillText("Bonfire", bonfire.x, bonfire.y + 30);

        // draw objects (and rotation indicator)
        for (const o of objects) {
          // draw object emoji
          drawEmoji(o.emoji, o.x, o.y, 28);

          // draw rotation wedge/arrow to indicate rotation visually
          ctx.save();
          ctx.translate(o.x, o.y);
          ctx.rotate(((o.rotation || 0) * Math.PI) / 180);
          // small directional line from center outward
          ctx.beginPath();
          ctx.strokeStyle = "rgba(0,0,0,0.25)";
          ctx.lineWidth = 2;
          ctx.moveTo(0, -8);
          ctx.lineTo(0, -(o.radius + 8));
          ctx.stroke();
          ctx.restore();
        }

        // draw rotate handle for selectedObject
        if (selectedObject) {
          const h = getRotateHandlePos(selectedObject);
          // handle circle
          ctx.save();
          ctx.beginPath();
          ctx.fillStyle = "#fff";
          ctx.strokeStyle = "#2b7cff";
          ctx.lineWidth = 2;
          ctx.arc(h.x, h.y, HANDLE_RADIUS, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          // little icon inside
          ctx.font = "12px serif";
          ctx.fillStyle = "#2b7cff";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("↻", h.x, h.y);
          ctx.restore();
        }

        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);

      /* ---------- Resources and game tick ---------- */
      let goods = 0;
      const goodsEl = document.getElementById("goods");
      const prodPerSecEl = document.getElementById("prodPerSec");
      const comfortAvgEl = document.getElementById("comfortAvg");

      function aggregateProduction() {
        computeBonuses();
        const all = [bonfire, ...objects];
        let totalProd = 0,
          totalComfort = 0;
        for (const o of all) {
          totalProd += o.computed?.production || 0;
          totalComfort += o.computed?.comfort || 0;
        }
        const comfortAvg = all.length ? totalComfort / all.length : 0;
        return { totalProd, comfortAvg };
      }

      // tick every 1 second: add production -> goods
      setInterval(() => {
        const agg = aggregateProduction();
        // production may be fractional; add rounded small fraction (we'll add exact value but display with 2 decimals)
        goods += agg.totalProd;
        // clamp / format not necessary
        goodsEl.textContent = Number(goods.toFixed(2));
        prodPerSecEl.textContent = Number(agg.totalProd.toFixed(2));
        comfortAvgEl.textContent = Number(agg.comfortAvg.toFixed(2));
      }, 1000);

      /* ---------- Utilities & interactions ---------- */
      // clicking canvas: either select object or build
      canvas.addEventListener("mousedown", (ev) => {
        /* handled above */
      });

      // clicking outside modal closes it
      buildModal.addEventListener("click", (ev) => {
        if (ev.target === buildModal) closeBuildModal();
      });
      // clicking empty area to start building handled earlier; but we still add general listener for touch/mouse
      canvas.addEventListener("click", (ev) => {
        // If a modal is open do nothing
        if (buildModal.style.display === "flex") return;
        const p = clientToCanvas(ev.clientX, ev.clientY);
        const found = findObjectAt(p.x, p.y);
        if (found) {
          showInfoFor(found, ev.clientX, ev.clientY);
        } else {
          openBuildModal(p.x, p.y);
        }
      });

      /* ---------- Bonfire initial position & demo objects ---------- */
      function recalcBonfire() {
        bonfire.x = canvas.width / dpr / 2;
        bonfire.y = canvas.height / dpr / 2;
      }
      recalcBonfire();
      window.addEventListener("resize", recalcBonfire);

      // add demo hut
      objects.push({
        id: uid("b"),
        typeId: "hut",
        name: "Hut",
        x: bonfire.x + 80,
        y: bonfire.y - 20,
        emoji: "🏠",
        radius: 120,
        base: { comfort: 5, production: 1 },
        effect: { comfort: 1 },
        rotation: 0,
      });
      computeBonuses();

      /* ---------- Small polish: hide popup when pressing Escape ---------- */
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeInfoPopup();
          closeBuildModal();
        }
      });
    </script>
  </body>
</html>
