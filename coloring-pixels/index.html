<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Collective Pixel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        cursor: crosshair;
      }
      #cooldown {
        position: fixed;
        bottom: 12px;
        left: 12px;
        color: #aaa;
        font-family: monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="cooldown"></div>

    <!-- Firebase CDN -->
    <!-- <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script> -->

    <script>
      /* =======================
   CONFIG
======================= */

      const FIREBASE_CONFIG = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
      };

      const GRID_SIZE = 200;
      const PIXEL_SIZE = 4;
      const COOLDOWN_MS = 1;
      const DEFAULT_COLOR = "#ffffff";

      /* =======================
   INIT
======================= */

      // firebase.initializeApp(FIREBASE_CONFIG);

      // const auth = firebase.auth();
      // const db = firebase.firestore();

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const cooldownLabel = document.getElementById("cooldown");

      canvas.width = GRID_SIZE * PIXEL_SIZE;
      canvas.height = GRID_SIZE * PIXEL_SIZE;

      function resize() {
        const scale = Math.min(
          window.innerWidth / canvas.width,
          window.innerHeight / canvas.height
        );
        canvas.style.transform = `scale(${scale})`;
        canvas.style.transformOrigin = "top left";
      }
      window.addEventListener("resize", resize);
      resize();

      /* =======================
   AUTH
======================= */

      let uid = 1;
      let lastPlacementAt = 0;

      // auth.signInAnonymously();

      // auth.onAuthStateChanged(async (user) => {
      //   if (!user) return;
      //   uid = user.uid;

      //   const userRef = db.collection("users").doc(uid);
      //   const snap = await userRef.get();
      //   if (snap.exists) {
      //     lastPlacementAt = snap.data().lastPlacementAt || 0;
      //   }
      // });

      /* =======================
   DRAWING
======================= */

      function drawPixel(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * PIXEL_SIZE, y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
      }

      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      /* =======================
   REALTIME LISTENER
======================= */

      // db.collection("pixels").onSnapshot((snapshot) => {
      //   snapshot.docChanges().forEach((change) => {
      //     const { x, y, color } = change.doc.data();
      //     drawPixel(x, y, color);
      //   });
      // });

      /* =======================
   INPUT
======================= */

      canvas.addEventListener("click", async (e) => {
        if (!uid) return;

        const now = Date.now();
        if (now - lastPlacementAt < COOLDOWN_MS) return;

        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / PIXEL_SIZE);
        const y = Math.floor((e.clientY - rect.top) / PIXEL_SIZE);

        if (x < 0 || y < 0 || x >= GRID_SIZE || y >= GRID_SIZE) return;

        const pixelId = `${x}_${y}`;
        // const pixelRef = db.collection("pixels").doc(pixelId);
        // const userRef = db.collection("users").doc(uid);

        try {
          // await db.runTransaction(async (tx) => {
          //   tx.set(pixelRef, {
          //     x,
          //     y,
          //     color: DEFAULT_COLOR,
          //     updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          //     userId: uid,
          //   });

          //   tx.set(
          //     userRef,
          //     {
          //       lastPlacementAt:
          //         firebase.firestore.FieldValue.serverTimestamp(),
          //     },
          //     { merge: true }
          //   );
          // });
          drawPixel(x, y, DEFAULT_COLOR);
          lastPlacementAt = now;
        } catch (err) {
          console.error(err);
        }
      });

      /* =======================
   COOLDOWN UI
======================= */

      setInterval(() => {
        const remaining = Math.max(
          0,
          COOLDOWN_MS - (Date.now() - lastPlacementAt)
        );
        cooldownLabel.textContent =
          remaining > 0
            ? `Next pixel in ${Math.ceil(remaining / 1000)}s`
            : "You may place a pixel";
      }, 250);
    </script>
  </body>
</html>
