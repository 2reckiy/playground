<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forge Master: Market Trends</title>
    <style>
        :root {
            --bg: #0f0f13;
            --window: #1c1c24;
            --border: #343442;
            --accent: #ff9f43;
            --text: #d1d1e0;
            --panel-h: #252530;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px;
        }

        /* --- Layout --- */
        header {
            height: 50px;
            background: #000;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        .stat {
            background: #222;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        .stat span {
            color: var(--accent);
            font-weight: bold;
        }

        .qty-bar {
            background: var(--panel-h);
            padding: 8px;
            display: flex;
            justify-content: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .qty-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 2px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .qty-btn.active {
            background: var(--accent);
            color: #000;
        }

        main {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 10px;
            padding: 10px;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--window);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: var(--panel-h);
            padding: 8px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* --- Market Graph --- */
        .graph-container {
            height: 120px;
            background: #0a0a0f;
            border: 1px solid #333;
            margin-bottom: 10px;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- Icon Grid --- */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 8px;
        }

        .icon-item {
            aspect-ratio: 1/1;
            background: #2a2a35;
            border: 2px solid #3f3f4f;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .icon-item .badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #000;
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 4px;
        }

        /* --- Forge & Rows --- */
        .forge-display {
            text-align: center;
            padding: 10px;
            background: #14141b;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .prog-bg {
            background: #000;
            height: 8px;
            border-radius: 4px;
            margin: 8px 0;
            border: 1px solid #333;
            overflow: hidden;
        }

        .prog-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9f43, #ff6b6b);
            width: 0%;
            transition: width 0.1s linear;
        }

        .row-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2a2a35;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 4px;
            cursor: pointer;
            border: 1px solid transparent;
            width: 100%;
            text-align: left;
            color: inherit;
        }

        .row-item:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .req-tag {
            font-size: 10px;
            background: #1a1a20;
            padding: 2px 4px;
            border-radius: 3px;
            margin-right: 2px;
        }

        .q-Common {
            border-color: #444;
        }

        .q-Fine {
            border-color: #3498db;
        }

        .q-Masterwork {
            border-color: #f1c40f;
        }

        footer {
            height: 30px;
            background: #000;
            font-size: 11px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            color: #666;
        }
    </style>
</head>

<body>

    <header>
        <div class="stat">💰 <span id="ui-gold">0</span></div>
        <div class="stat">Rank <span id="ui-lvl">1</span></div>
        <div class="stat">XP <span id="ui-xp">0/100</span></div>
    </header>

    <div class="qty-bar">
        <button class="qty-btn active" onclick="game.setQty(1)">x1</button>
        <button class="qty-btn" onclick="game.setQty(10)">x10</button>
        <button class="qty-btn" onclick="game.setQty(25)">x25</button>
        <button class="qty-btn" onclick="game.setQty(100)">x100</button>
    </div>

    <main>
        <div class="panel">
            <div class="panel-header">Market Analysis</div>
            <div class="scroll">
                <div class="graph-container"><canvas id="marketCanvas"></canvas></div>
                <div id="ui-market"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">The Great Anvil</div>
            <div class="scroll">
                <div class="forge-display">
                    <div id="forge-icon" style="font-size:32px">🔥</div>
                    <div id="forge-name" style="font-weight:bold;">Forge Idle</div>
                    <div class="prog-bg">
                        <div id="forge-fill" class="prog-fill"></div>
                    </div>
                    <div id="ui-queue" style="font-size:10px; opacity:0.6">Queue: Empty</div>
                </div>
                <div id="ui-recipes"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                Warehouse
                <span style="color:var(--accent); cursor:pointer" onclick="game.sellAll()">[Sell Current Qty]</span>
            </div>
            <div class="scroll">
                <div class="icon-grid" id="ui-inventory"></div>
            </div>
        </div>
    </main>

    <footer>
        <div id="ui-log">Ready. Monitor the graph for price drops!</div>
    </footer>

    <script>
        const CONFIG = {
            resources: [
                { id: 'iron', name: 'Iron', emoji: '🪨', basePrice: 10, color: '#ff4757' },
                { id: 'wood', name: 'Wood', emoji: '🪵', basePrice: 5, color: '#2ed573' }
            ],
            recipes: [
                { id: 'dagger', name: 'Dagger', emoji: '🗡️', lv: 1, cost: { iron: 2 }, time: 1500, xp: 15, val: 35 },
                { id: 'axe', name: 'Hatchet', emoji: '🪓', lv: 1, cost: { iron: 1, wood: 3 }, time: 2500, xp: 25, val: 65 },
                { id: 'sword', name: 'Broadsword', emoji: '⚔️', lv: 2, cost: { iron: 6 }, time: 5000, xp: 60, val: 170 }
            ]
        };

        class MarketHistory {
            constructor() {
                this.history = { iron: [1], wood: [1], sell: [1] };
                this.maxDataPoints = 30;
            }

            addPoint(mods) {
                for (let key in mods) {
                    this.history[key].push(mods[key]);
                    if (this.history[key].length > this.maxDataPoints) this.history[key].shift();
                }
            }

            draw(canvasId) {
                const canvas = document.getElementById(canvasId);
                const ctx = canvas.getContext('2d');
                const w = canvas.width = canvas.offsetWidth;
                const h = canvas.height = canvas.offsetHeight;

                ctx.clearRect(0, 0, w, h);
                ctx.strokeStyle = '#333';
                ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke(); // Baseline

                const drawLine = (data, color) => {
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const step = w / (this.maxDataPoints - 1);
                    data.forEach((val, i) => {
                        const x = i * step;
                        const y = h - (val * (h / 2)); // Scale: 1.0 is middle
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    });
                    ctx.stroke();
                };

                drawLine(this.history.iron, '#ff4757');
                drawLine(this.history.wood, '#2ed573');
                drawLine(this.history.sell, '#ff9f43');
            }
        }

        class Player {
            constructor() {
                this.gold = 300; this.level = 1; this.xp = 0; this.nextLevelXp = 100;
                this.resources = { iron: 10, wood: 10 };
                this.inventory = [];
            }
        }

        class Forge {
            constructor(player) {
                this.player = player;
                this.queue = [];
                this.isBusy = false;
                this.onUpdate = null;
            }

            add(recipe, qty) {
                for (let i = 0; i < qty; i++) this.queue.push(recipe);
                if (!this.isBusy) this.next();
            }

            next() {
                if (this.queue.length === 0) {
                    this.isBusy = false;
                    this.resetUI();
                    this.onUpdate();
                    return;
                }
                const recipe = this.queue[0];
                for (let res in recipe.cost) {
                    if (this.player.resources[res] < recipe.cost[res]) {
                        this.isBusy = false;
                        this.onUpdate();
                        return;
                    }
                }
                for (let res in recipe.cost) this.player.resources[res] -= recipe.cost[res];
                this.queue.shift();
                this.isBusy = true;
                this.startCraft(recipe);
            }

            startCraft(recipe) {
                let start = null;
                const duration = recipe.time / (1 + (this.player.level * 0.25));
                const step = (ts) => {
                    if (!start) start = ts;
                    const progress = (ts - start) / duration;
                    document.getElementById('forge-fill').style.width = Math.min(progress * 100, 100) + "%";
                    document.getElementById('forge-icon').innerText = recipe.emoji;
                    document.getElementById('forge-name').innerText = recipe.name;
                    document.getElementById('ui-queue').innerText = `Queue: ${this.queue.length} items`;

                    if (progress < 1) requestAnimationFrame(step);
                    else {
                        const roll = Math.random() * this.player.level;
                        const q = roll > 8 ? "Masterwork" : (roll > 4 ? "Fine" : "Common");
                        this.player.inventory.push({ ...recipe, quality: q });
                        this.player.xp += recipe.xp;
                        if (this.player.xp >= this.player.nextLevelXp) {
                            this.player.level++; this.player.xp = 0; this.player.nextLevelXp *= 2;
                        }
                        this.onUpdate();
                        this.next();
                    }
                };
                requestAnimationFrame(step);
            }

            resetUI() {
                document.getElementById('forge-fill').style.width = "0%";
                document.getElementById('forge-icon').innerText = "🔥";
                document.getElementById('forge-name').innerText = "Forge Idle";
                document.getElementById('ui-queue').innerText = "Queue: Empty";
            }
        }

        class GameEngine {
            constructor() {
                this.player = new Player();
                this.forge = new Forge(this.player);
                this.marketHistory = new MarketHistory();
                this.mods = { iron: 1, wood: 1, sell: 1 };
                this.qty = 1;

                this.forge.onUpdate = () => this.updateUI();

                setInterval(() => {
                    this.mods.iron = 0.5 + Math.random();
                    this.mods.wood = 0.5 + Math.random();
                    this.mods.sell = 0.7 + Math.random() * 0.8;
                    this.marketHistory.addPoint(this.mods);
                    this.marketHistory.draw('marketCanvas');
                    this.updateUI();
                }, 5000); // Faster updates for graph visibility

                this.updateUI();
                this.marketHistory.draw('marketCanvas');
            }

            setQty(n) {
                this.qty = n;
                document.querySelectorAll('.qty-btn').forEach(b =>
                    b.classList.toggle('active', parseInt(b.innerText.replace('x', '')) === n));
                this.updateUI();
            }

            buy(id) {
                const p = Math.ceil(CONFIG.resources.find(r => r.id === id).basePrice * this.mods[id]) * this.qty;
                if (this.player.gold >= p) { this.player.gold -= p; this.player.resources[id] += this.qty; this.updateUI(); }
            }

            sell(id, quality) {
                let sold = 0;
                const val = Math.floor(CONFIG.recipes.find(r => r.id === id).val * this.mods.sell);
                for (let i = this.player.inventory.length - 1; i >= 0; i--) {
                    if (this.player.inventory[i].id === id && this.player.inventory[i].quality === quality && sold < this.qty) {
                        this.player.inventory.splice(i, 1);
                        this.player.gold += val; sold++;
                    }
                }
                this.updateUI();
            }

            sellAll() {
                // This sells the current quantity of every item type in inventory
                const uniqueKeys = [...new Set(this.player.inventory.map(i => i.id + '|' + i.quality))];
                uniqueKeys.forEach(key => {
                    const [id, q] = key.split('|');
                    this.sell(id, q);
                });
            }

            updateUI() {
                document.getElementById('ui-gold').innerText = Math.floor(this.player.gold).toLocaleString();
                document.getElementById('ui-lvl').innerText = this.player.level;
                document.getElementById('ui-xp').innerText = `${this.player.xp}/${this.player.nextLevelXp}`;

                document.getElementById('ui-market').innerHTML = CONFIG.resources.map(res => {
                    const price = Math.ceil(res.basePrice * this.mods[res.id]) * this.qty;
                    return `<button class="row-item" onclick="game.buy('${res.id}')" ${this.player.gold < price ? 'disabled' : ''}>
                <span style="font-size:24px">${res.emoji}</span>
                <div style="flex:1"><strong>${res.name}</strong><br><small>Stock: ${this.player.resources[res.id]}</small></div>
                <div style="text-align:right"><strong>${price}g</strong><br><small style="color:${res.color}">Trend</small></div>
            </button>`;
                }).join('');

                document.getElementById('ui-recipes').innerHTML = CONFIG.recipes.filter(r => this.player.level >= r.lv).map(r => {
                    const can = Object.entries(r.cost).every(([id, amt]) => this.player.resources[id] >= amt * this.qty);
                    return `<button class="row-item" onclick="game.forge.add(CONFIG.recipes.find(x=>x.id==='${r.id}'), game.qty)" ${!can ? 'disabled' : ''}>
                <span style="font-size:20px">${r.emoji}</span>
                <div style="flex:1"><strong>${r.name}</strong><br>${Object.entries(r.cost).map(([id, amt]) => `<span class="req-tag">${CONFIG.resources.find(res => res.id === id).emoji}${amt * this.qty}</span>`).join('')}</div>
                <small>+${this.qty}</small>
            </button>`;
                }).join('');

                const groups = this.player.inventory.reduce((acc, item) => {
                    const k = item.id + item.quality; if (!acc[k]) acc[k] = { ...item, count: 0 }; acc[k].count++; return acc;
                }, {});
                document.getElementById('ui-inventory').innerHTML = Object.values(groups).map(item => `
            <div class="icon-item q-${item.quality}" onclick="game.sell('${item.id}', '${item.quality}')">
                <span class="emoji">${item.emoji}</span><span class="badge">x${item.count}</span>
                <div style="font-size:9px; color:#aaa;">${Math.floor(item.val * this.mods.sell)}g</div>
            </div>`).join('');
            }
        }
        const game = new GameEngine();
    </script>
</body>

</html>
