<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <title>LEGO Pixelizer — 1:1 Map</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 20px;
        background: #f0f0f0;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        align-items: flex-end;
      }
      label {
        font-size: 12px;
        font-weight: bold;
        display: flex;
        flex-direction: column;
      }
      input {
        padding: 4px;
        border: 1px solid #ccc;
      }

      .row {
        display: flex;
        gap: 20px;
      }
      .col {
        flex: 1;
      }

      .canvas-container {
        position: relative;
        cursor: move;
        border: 1px solid #000;
        display: inline-block;
      }
      #selector {
        position: absolute;
        border: 1px solid #00ff88;
        background: rgba(0, 255, 136, 0.1);
        pointer-events: none;
      }

      /* Zooming the output for display only */
      #outCanvas {
        image-rendering: pixelated;
        width: 100%; /* Scale to fit container visually */
        max-width: 500px;
        border: 1px solid #333;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <label>Файл: <input id="file" type="file" accept="image/*" /></label>
      <label
        >Ширина Кропу: <input id="cropW" type="number" value="640"
      /></label>
      <label
        >Висота Кропу: <input id="cropH" type="number" value="640"
      /></label>
      <label
        >К-сть Цеглинок (W): <input id="targetW" type="number" value="128"
      /></label>
      <label
        >К-сть Цеглинок (H): <input id="targetH" type="number" value="128"
      /></label>
      <label
        >Відтінки:
        <select id="shades">
          <option value="4">4</option>
          <option value="5" selected>5</option>
          <option value="6">6</option>
        </select>
      </label>
      <button id="dl">Скачати 1:1 PNG</button>
    </div>

    <div class="row">
      <div class="col">
        <div class="canvas-container" id="wrapper">
          <canvas id="origCanvas"></canvas>
          <div id="selector"></div>
        </div>
      </div>
      <div class="col">
        <div>Попередній перегляд (Масштабовано для зручності)</div>
        <canvas id="outCanvas"></canvas>
        <div id="info">Розмір файлу: 0x0 пікселів</div>
      </div>
    </div>

    <script>
      const fileIn = document.getElementById("file");
      const cropW = document.getElementById("cropW");
      const cropH = document.getElementById("cropH");
      const targetW = document.getElementById("targetW");
      const targetH = document.getElementById("targetH");
      const shadesS = document.getElementById("shades");
      const origCanvas = document.getElementById("origCanvas");
      const outCanvas = document.getElementById("outCanvas");
      const info = document.getElementById("info");

      let img = new Image(),
        loaded = false,
        isDragging = false,
        selX = 0,
        selY = 0;

      fileIn.onchange = (e) => {
        const url = URL.createObjectURL(e.target.files[0]);
        img.onload = () => {
          loaded = true;
          // Maintain a usable preview size for the original image
          const scale = 600 / img.width;
          origCanvas.width = 600;
          origCanvas.height = img.height * scale;
          origCanvas
            .getContext("2d")
            .drawImage(img, 0, 0, origCanvas.width, origCanvas.height);
          updateUI();
          process();
        };
        img.src = url;
      };

      [cropW, cropH, targetW, targetH, shadesS].forEach(
        (el) =>
          (el.oninput = () => {
            updateUI();
            process();
          }),
      );

      function updateUI() {
        if (!loaded) return;
        const s = document.getElementById("selector").style;
        s.width = cropW.value + "px";
        s.height = cropH.value + "px";
        s.display = "block";
        // Bounds check
        selX = Math.max(0, Math.min(selX, origCanvas.width - cropW.value));
        selY = Math.max(0, Math.min(selY, origCanvas.height - cropH.value));
        s.left = selX + "px";
        s.top = selY + "px";
      }

      document.getElementById("wrapper").onmousedown = () =>
        (isDragging = true);
      window.onmouseup = () => (isDragging = false);
      window.onmousemove = (e) => {
        if (!isDragging || !loaded) return;
        const rect = document.getElementById("wrapper").getBoundingClientRect();
        selX = e.clientX - rect.left - cropW.value / 2;
        selY = e.clientY - rect.top - cropH.value / 2;
        updateUI();
        process();
      };

      function process() {
        if (!loaded) return;

        const tw = parseInt(targetW.value);
        const th = parseInt(targetH.value);

        // 1. Set output to EXACT brick count (1 pixel = 1 brick)
        outCanvas.width = tw;
        outCanvas.height = th;
        info.innerText = `Розмір файлу: ${tw}x${th} пікселів (кожен піксель = 1 цеглинка)`;

        const ctx = outCanvas.getContext("2d");

        // 2. Sample from the selector area directly into the tiny output
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(
          origCanvas,
          selX,
          selY,
          cropW.value,
          cropH.value,
          0,
          0,
          tw,
          th,
        );

        // 3. Grayscale Quantization
        const imgData = ctx.getImageData(0, 0, tw, th);
        const d = imgData.data;
        const step = 255 / (parseInt(shadesS.value) - 1);

        for (let i = 0; i < d.length; i += 4) {
          const lum = 0.2126 * d[i] + 0.7152 * d[i + 1] + 0.0722 * d[i + 2];
          const v = Math.round(Math.round(lum / step) * step);
          d[i] = d[i + 1] = d[i + 2] = v;
        }
        ctx.putImageData(imgData, 0, 0);
      }

      document.getElementById("dl").onclick = () => {
        const link = document.createElement("a");
        link.download = "brick_map_1to1.png";
        link.href = outCanvas.toDataURL();
        link.click();
      };
    </script>
  </body>
</html>
