<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entity Manager Engine</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;

        background: #fff;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 15px;
        left: 15px;
        color: orange;
        font-family: sans-serif;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <script>
      class Cooldown {
        constructor(seconds) {
          this.duration = seconds;
          this.timer = 0;
          this.isReady = true;
        }

        update(dt) {
          if (this.timer > 0) this.timer = Math.max(0, this.timer - dt);

          this.isReady = this.timer === 0;
        }

        trigger() {
          if (this.timer > 0) return false; // Still on cooldown
          this.timer = this.duration;
          return true; // Successfully triggered
        }

        get progress() {
          // Returns 0.0 to 1.0
          return this.timer / this.duration;
        }
      }

      const DEFAULT_SETTINGS = {
        canvasId: "gameCanvas",
        fullScreen: true,
        centered: true,
        scaleToFit: true,
        width: 800, // Used if fullScreen is false
        height: 600, // Used if fullScreen is false
        padding: 0, // Internal canvas margin
        fpsCap: 60,
        debug: true,
        clearColor: "rgba(0, 0, 0, 1)",
        timeScale: 1.0,
        paused: false,

        customCursor: true,
        cursorColor: "#00ff00",
        hideSystemCursor: false,
      };

      /**
       * THE ENGINE (The Core)
       */
      class GameEngine {
        constructor(userSettings) {
          this.settings = { ...DEFAULT_SETTINGS, ...userSettings };

          this.canvas = document.getElementById(this.settings.canvasId);
          this.ctx = this.canvas.getContext("2d");

          this.manager = new EntityManager();
          this.lastTime = 0;

          this.init();
        }

        init() {
          if (this.settings.hideSystemCursor) {
            this.canvas.style.cursor = "none";
          }

          this.setupEvents();
          this.resize(); // Initial sizing based on settings
          requestAnimationFrame((t) => this.loop(t));
        }

        setupEvents() {
          window.addEventListener("resize", () => this.resize());

          window.addEventListener("mousemove", (e) => {
            const rect = this.canvas.getBoundingClientRect();

            // Divide by the actual rendered width vs internal width to get the correct scale
            const scaleX = this.canvas.width / rect.width;
            const scaleY = this.canvas.height / rect.height;

            this.manager.broadcast("onMouseMove", {
              x: (e.clientX - rect.left) * scaleX,
              y: (e.clientY - rect.top) * scaleY,
            });
          });

          window.addEventListener("keydown", (e) => {
            if (e.key === "p") this.settings.paused = !this.settings.paused;
            if (e.key === "s") this.settings.timeScale = 0.2;
            if (e.key === "f") this.settings.timeScale = 2;
            this.manager.broadcast("onKeyDown", e.code);
          });

          window.addEventListener("keyup", (e) => {
            if (e.key === "s" || e.key === "f") this.settings.timeScale = 1.0; // Return to Normal
          });
        }

        resize() {
          // 1. Determine Internal Resolution
          if (this.settings.fullScreen) {
            this.width = window.innerWidth;
            this.height = window.innerHeight;
          } else {
            this.width = this.settings.width;
            this.height = this.settings.height;
          }

          // Set the buffer size (Internal resolution)
          this.canvas.width = this.width;
          this.canvas.height = this.height;

          // 2. Handle Visual Scaling (CSS)
          let scale = 1;

          if (this.settings.scaleToFit && !this.settings.fullScreen) {
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;

            // Calculate the ratio of screen to canvas
            const scaleX = screenW / this.width;
            const scaleY = screenH / this.height;

            // Use the smaller ratio to ensure it fits both width and height
            scale = Math.min(scaleX, scaleY, 1); // We use 1 to prevent "scaling up" and getting blurry
          }

          // 3. Apply Positioning and Scale
          if (this.settings.centered) {
            this.canvas.style.position = "absolute";
            this.canvas.style.left = "50%";
            this.canvas.style.top = "50%";
            // Combine centering translate with our calculated scale
            this.canvas.style.transform = `translate(-50%, -50%) scale(${scale})`;
          } else {
            this.canvas.style.transformOrigin = "top left";
            this.canvas.style.transform = `scale(${scale})`;
          }

          // Notify entities of the INTERNAL resolution
          this.manager.broadcast("onResize", { w: this.width, h: this.height });
        }

        loop(now) {
          const deltaTime = (now - this.lastTime) / 1000;
          const minFrameTime = 1 / this.settings.fpsCap;

          if (deltaTime >= minFrameTime) {
            this.lastTime = now - (deltaTime % minFrameTime);

            // --- TIME SCALING LOGIC ---
            // If paused, we set effective dt to 0.
            // Otherwise, we multiply the real dt by our scale factor.
            let effectiveDt = this.settings.paused
              ? 0
              : deltaTime * this.settings.timeScale;

            this.ctx.fillStyle = this.settings.clearColor;
            this.ctx.fillRect(0, 0, this.width, this.height);

            // Entities receive the 'scaled' time
            this.manager.update(effectiveDt, this.width, this.height);
            this.manager.draw(this.ctx, this.width, this.height);

            if (this.settings.debug) this.drawDebug(deltaTime, effectiveDt);
          }

          requestAnimationFrame((t) => this.loop(t));
        }

        drawDebug(dt) {
          this.ctx.fillStyle = "white";
          this.ctx.font = "12px monospace";
          this.ctx.fillText(`FPS: ${Math.round(1 / dt)}`, 10, 20);
          this.ctx.fillText(
            `Entities: ${this.manager.entities.length}`,
            10,
            35,
          );
        }
      }

      /**
       * ENTITY MANAGER
       * The bridge between the Engine and the Game Logic
       */
      class EntityManager {
        constructor() {
          this.entities = [];
          this._needsSort = false;
        }

        add(entity, zIndex = 0) {
          entity.zIndex = zIndex;
          this.entities.push(entity);
          this._needsSort = true;

          // Trigger initial setup for the entity immediately
          // assuming 'this.lastWidth' and 'this.lastHeight' are stored in Manager
          if (typeof entity.onMount === "function") {
            entity.onMount();
          }
          return entity;
        }

        sortEntities() {
          if (this._needsSort) {
            this.entities.sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));
            this._needsSort = false;
          }
        }

        update(dt, w, h) {
          this.sortEntities();

          for (let i = this.entities.length - 1; i >= 0; i--) {
            this.entities[i].update(dt, w, h);
            // Optional: Remove dead entities
            if (this.entities[i].isDead) this.entities.splice(i, 1);
          }
        }

        draw(ctx, w, h) {
          for (let entity of this.entities) {
            entity.draw(ctx, w, h);
          }
        }

        onResize(w, h) {
          for (let entity of this.entities) {
            if (typeof entity.resize === "function") {
              entity.resize(w, h);
            }
          }
        }

        broadcast(eventName, data) {
          for (let entity of this.entities) {
            if (typeof entity[eventName] === "function") {
              entity[eventName](data);
            }
          }
        }
      }

      class CustomCursor {
        constructor(settings) {
          this.zIndex = 9999; // Ensure it's ALWAYS on top
          this.x = 0;
          this.y = 0;
          this.color = settings.cursorColor || "#fff";
          this.size = 10;
          this.isPointer = false; // Toggle for "hand" style
        }

        onMouseMove(pos) {
          this.x = pos.x;
          this.y = pos.y;
        }

        // Example of reacting to game state
        setPointer(state) {
          this.isPointer = state;
        }

        update() {
          // You can add "laziness" or smoothing to the cursor here
          // this.x += (targetX - this.x) * 0.1;
        }

        draw(ctx) {
          ctx.save();
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 2;

          ctx.beginPath();
          ctx.moveTo(this.x - 10, this.y);
          ctx.lineTo(this.x + 10, this.y);
          ctx.moveTo(this.x, this.y - 10);
          ctx.lineTo(this.x, this.y + 10);
          ctx.stroke();

          ctx.restore();
        }
      }

      class ParticleSystem {
        constructor(w, h, count) {
          this.mode = "RAIN";
          this.mouse = { x: w / 2, y: h / 2 };
          this.count = count;
          this.sparks = [];
          this.initSparks(w, h);
        }

        initSparks(w, h) {
          this.sparks = [];
          for (let i = 0; i < this.count; i++) {
            this.sparks.push(new Spark(w, h, this.mode, this.mouse, true));
          }
        }

        update(dt, w, h) {
          for (let s of this.sparks) s.update(dt, w, h, this.mode, this.mouse);
        }

        draw(ctx) {
          ctx.globalCompositeOperation = "lighter";
          for (let s of this.sparks) {
            const opacity = this.mode === "EMITTER" ? s.life : 0.7;
            ctx.fillStyle = `hsla(${20 + s.life * 40}, 100%, 50%, ${opacity})`;
            ctx.fillRect(s.x | 0, s.y | 0, s.size, s.size);
          }
          ctx.globalCompositeOperation = "source-over";
        }

        onMouseMove(pos) {
          this.mouse.x = pos.x;
          this.mouse.y = pos.y;
        }

        onKeyDown(key) {
          if (key === "Space") {
            this.mode = this.mode === "RAIN" ? "EMITTER" : "RAIN";
            this.sparks.forEach((s) =>
              s.init(
                window.innerWidth,
                window.innerHeight,
                this.mode,
                this.mouse,
                true,
              ),
            );
          }
        }
      }

      class Spark {
        constructor(w, h, mode, mouse, isInitial, autoInit) {
          this.init(w, h, mode, mouse, isInitial, autoInit);
        }

        init(w, h, mode, mouse, isInitial = false, autoInit = false) {
          this.life = isInitial ? Math.random() : 1.0;
          this.decay = Math.random() * 0.6 + 0.2;
          this.autoInit = autoInit;

          if (mode === "RAIN") {
            this.x = Math.random() * w;
            this.y = isInitial ? Math.random() * h : -10;
            this.vx = (Math.random() - 0.5) * 50;
            this.vy = Math.random() * 200 + 100;
            this.size = Math.random() * 6 + 1;
          } else {
            this.x = mouse.x;
            this.y = mouse.y;
            const a = Math.random() * Math.PI * 2;
            const f = Math.random() * 300;
            this.vx = Math.cos(a) * f;
            this.vy = Math.sin(a) * f;
            this.size = Math.random() * 3 + 1;
          }
        }

        update(dt, w, h, mode, mouse) {
          this.x += this.vx * dt;
          this.y += this.vy * dt;
          if (mode === "EMITTER") {
            this.life -= this.decay * dt;
            this.vy += 200 * dt;
          }
          if (
            this.autoInit &&
            (this.y > h || this.life <= 0 || this.x < 0 || this.x > w)
          ) {
            this.init(w, h, mode, mouse);
          }
        }
      }

      class BackgroundGrid {
        constructor() {
          this.zIndex = 0;
        }
        update() {} // Static background
        draw(ctx, w, h) {
          ctx.strokeStyle = "#111";
          ctx.lineWidth = 1;
          for (let x = 0; x < w; x += 50) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, h);
            ctx.stroke();
          }
          for (let y = 0; y < h; y += 50) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(w, y);
            ctx.stroke();
          }
        }
      }

      class StaticBackground {
        constructor(w, h) {
          this.zIndex = -1;
          this.cache = document.createElement("canvas");
          this.cacheCtx = this.cache.getContext("2d");
          this.needsRedraw = true;
          this.resize(w, h);
        }

        resize(w, h) {
          this.cache.width = w;
          this.cache.height = h;
          this.needsRedraw = true;
        }

        // This is the "Heavy" logic that only runs ONCE
        renderCache() {
          const ctx = this.cacheCtx;
          const w = this.cache.width;
          const h = this.cache.height;

          ctx.clearRect(0, 0, w, h);
          ctx.strokeStyle = "#1a1a1a";
          ctx.lineWidth = 1;

          // Draw thousands of lines or complex shapes here
          for (let x = 0; x < w; x += 30) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, h);
            ctx.stroke();
          }
          for (let y = 0; y < h; y += 30) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(w, y);
            ctx.stroke();
          }

          this.needsRedraw = false;
          console.log("Background Cache Generated");
        }

        update() {
          // Static entities usually don't need logic updates
        }

        draw(ctx) {
          if (this.needsRedraw) this.renderCache();

          // This is ultra-fast: 1 GPU command regardless of how many lines are in the grid
          ctx.drawImage(this.cache, 0, 0);
        }
      }

      class Player {
        static zIndex = 10;

        constructor(settings) {
          this.zIndex = Player.zIndex;
          this.x = 100;
          this.y = 100;

          this.shootAbility = new Cooldown(5);
        }

        onKeyDown(key) {
          if (key === "Space") {
            this.tryToFire();
          }
        }

        tryToFire() {
          if (this.shootAbility.trigger()) {
            console.log("BOOM!");
          } else {
            console.log("Weapon still cooling down...");
          }
        }

        update(dt) {
          this.shootAbility.update(dt);
        }

        draw(ctx) {
          // Visual feedback for the cooldown
          ctx.fillStyle = this.shootAbility.isReady ? "#0f0" : "#f00";
          ctx.fillRect(this.x, this.y, 50, 50);

          // Draw a simple cooldown bar
          if (!this.shootAbility.isReady) {
            const progress = this.shootAbility.progress;
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.fillRect(this.x, this.y + 55, 50 * progress, 5);
          }
        }
      }

      class PulsingSparkSystem {
        constructor(w, h, settings) {
          this.zIndex = 10;
          this.mode = "EMITTER";
          this.mouse = { x: w / 2, y: h / 2 };

          // Cooldown: Pulse every 0.8 seconds
          this.pulseRate = 5;
          this.pulseTimer = 0;

          this.sparks = [];
          this.maxSparks = 1000;

          // Pre-fill the array with "dead" sparks (life = 0)
          for (let i = 0; i < this.maxSparks; i++) {
            this.sparks.push(
              new Spark(w, h, this.mode, this.mouse, false, false),
            );
            this.sparks[i].life = 0;
          }
        }

        onMouseMove(pos) {
          this.mouse = pos;
        }

        update(dt, w, h) {
          // 1. Handle Pulse Timing
          this.pulseTimer -= dt;

          if (this.pulseTimer <= 0) {
            this.emitPulse(w, h);
            this.pulseTimer = this.pulseRate; // Reset cooldown
          }

          // 2. Update all sparks
          for (let s of this.sparks) {
            if (s.life > 0) {
              s.update(dt, w, h, this.mode, this.mouse);
            }
          }
        }

        emitPulse(w, h) {
          // Find 50 "dead" sparks and give them new life
          let emitted = 0;
          for (let s of this.sparks) {
            if (s.life <= 0) {
              s.init(w, h, this.mode, this.mouse, false);
              emitted++;
            }
            if (emitted >= 50) break; // Burst size
          }
        }

        draw(ctx) {
          ctx.globalCompositeOperation = "lighter";
          for (let s of this.sparks) {
            if (s.life > 0) {
              ctx.fillStyle = `hsla(${10 + s.life * 60}, 100%, 50%, ${s.life})`;
              ctx.fillRect(s.x | 0, s.y | 0, s.size, s.size);
            }
          }
          ctx.globalCompositeOperation = "source-over";
        }
      }

      class GameOfLife {
        constructor(w, h, cellSize = 10) {
          this.zIndex = 1;
          this.cellSize = cellSize;
          this.cols = Math.floor(w / cellSize);
          this.rows = Math.floor(h / cellSize);

          // Double buffering: current state and next state
          this.grid = this.createGrid();
          this.nextGrid = this.createGrid();

          // Timer for simulation speed (separate from engine FPS)
          this.stepCooldown = new Cooldown(0.1);
        }

        createGrid() {
          return Array.from({ length: this.cols }, () =>
            new Uint8Array(this.rows)
              .fill(0)
              .map(() => (Math.random() > 1 ? 1 : 0)),
          );
        }

        onMouseMove({ x, y }) {
          // Allow drawing on the grid with the mouse
          const col = Math.floor(x / this.cellSize);
          const row = Math.floor(y / this.cellSize);
          if (col >= 0 && col < this.cols && row >= 0 && row < this.rows) {
            this.grid[col][row] = 1;
          }
        }

        update(dt) {
          this.stepCooldown.update(dt);
          if (this.stepCooldown.trigger()) {
            this.computeNextGeneration();
          }
        }

        computeNextGeneration() {
          for (let x = 0; x < this.cols; x++) {
            for (let y = 0; y < this.rows; y++) {
              const neighbors = this.countNeighbors(x, y);
              const state = this.grid[x][y];

              // Conway's Rules
              if (state === 1 && (neighbors < 2 || neighbors > 3)) {
                this.nextGrid[x][y] = 0; // Death
              } else if (state === 0 && neighbors === 3) {
                this.nextGrid[x][y] = 1; // Birth
              } else {
                this.nextGrid[x][y] = state; // Survival
              }
            }
          }

          // Swap buffers (fast)
          let temp = this.grid;
          this.grid = this.nextGrid;
          this.nextGrid = temp;
        }

        countNeighbors(x, y) {
          let sum = 0;
          for (let i = -1; i < 2; i++) {
            for (let j = -1; j < 2; j++) {
              // Wrap around edges (Toroidal world)
              const col = (x + i + this.cols) % this.cols;
              const row = (y + j + this.rows) % this.rows;
              sum += this.grid[col][row];
            }
          }
          sum -= this.grid[x][y];
          return sum;
        }

        draw(ctx) {
          ctx.fillStyle = "#00ff44";
          for (let x = 0; x < this.cols; x++) {
            for (let y = 0; y < this.rows; y++) {
              if (this.grid[x][y] === 1) {
                ctx.fillRect(
                  x * this.cellSize,
                  y * this.cellSize,
                  this.cellSize - 1,
                  this.cellSize - 1,
                );
              }
            }
          }
        }
      }

      class Cell {
        constructor(col, row, x, y, size) {
          this.col = col;
          this.row = row;
          this.x = x;
          this.y = y;
          this.size = size;
          this.data = {}; // Store anything (life state, terrain type, etc.)
        }

        // Generic handler that the Grid can trigger
        handleEvent(type, payload) {
          console.log(type, payload);
        }
      }

      class Grid {
        constructor(settings = {}) {
          this.zIndex = 0;
          this.cells = [];

          // Settings with defaults
          this.config = {
            containerWidth: settings.width,
            containerHeight: settings.height,
            cellSize: settings.cellSize || 20,
            cols: settings.cols || null, // If null, calculate based on screen
            rows: settings.rows || null,
            fitToScreen: settings.fitToScreen ?? true,
            gap: settings.gap || 1,
            ...settings,
          };
        }

        onMount() {
          this.cells = [];

          // Calculate grid dimensions
          if (this.config.fitToScreen) {
            this.cols = Math.floor(
              this.config.containerWidth / this.config.cellSize,
            );
            this.rows = Math.floor(
              this.config.containerHeight / this.config.cellSize,
            );
          } else {
            this.config.cellSize = Math.min(
              (this.config.containerWidth / this.config.cols) | 0,
              (this.config.containerHeight / this.config.rows) | 0,
            );

            this.cols = this.config.cols;
            this.rows = this.config.rows;
          }

          // Generate Cells
          for (let c = 0; c < this.cols; c++) {
            for (let r = 0; r < this.rows; r++) {
              const x = c * this.config.cellSize;
              const y = r * this.config.cellSize;
              this.cells.push(new Cell(c, r, x, y, this.config.cellSize));
            }
          }
        }

        onResize({ w, h }) {
          this.cells = [];

          // Calculate grid dimensions
          if (this.config.fitToScreen) {
            this.cols = Math.floor(w / this.config.cellSize);
            this.rows = Math.floor(h / this.config.cellSize);
          } else {
            this.config.cellSize = Math.min(
              (this.config.containerWidth / this.config.cols) | 0,
              (this.config.containerHeight / this.config.rows) | 0,
            );

            this.cols = this.config.cols;
            this.rows = this.config.rows;
          }

          // Generate Cells
          for (let c = 0; c < this.cols; c++) {
            for (let r = 0; r < this.rows; r++) {
              const x = c * this.config.cellSize;
              const y = r * this.config.cellSize;
              this.cells.push(new Cell(c, r, x, y, this.config.cellSize));
            }
          }
        }

        // Map screen coordinates to a specific cell
        getCellAt(x, y) {
          const c = Math.floor(x / this.config.cellSize);
          const r = Math.floor(y / this.config.cellSize);

          if (c < 0 || c >= this.cols || r < 0 || r >= this.rows) return null;
          return this.cells[c * this.rows + r];
        }

        onMouseMove(pos) {
          const cell = this.getCellAt(pos.x, pos.y);
          if (cell) {
            this.cells.forEach((c) => (c.isHovered = false)); // Reset
            cell.isHovered = true;
            cell.handleEvent("hover", pos);
          }
        }

        update(dt) {
          // Optional: Update cell-based logic (like Game of Life)
        }

        draw(ctx) {
          ctx.strokeStyle = "#333";
          const s = this.config.cellSize;
          const g = this.config.gap;

          for (let cell of this.cells) {
            ctx.fillStyle = cell.isHovered ? "#444" : "#111";
            ctx.fillRect(cell.x + g, cell.y + g, s - g * 2, s - g * 2);
          }
        }
      }

      const engine = new GameEngine({
        fullScreen: true,
        clearColor: "#fff",
      });

      const gridSettings = {
        cols: 30,
        rows: 30,
        fitToScreen: false,
        gap: 1,
        width: engine.width,
        height: engine.height,
      };

      const myGrid = new Grid(gridSettings);
      engine.manager.add(myGrid, 1);
    </script>
  </body>
</html>
