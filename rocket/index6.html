<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Minimalist Rocket Dev</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a0c;
            font-family: monospace;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #modal-content {
            background: #1a1a1f;
            border: 2px solid #00ff41;
            padding: 40px;
            color: #00ff41;
            text-align: center;
            box-shadow: 0 0 20px #00ff4144;
        }

        #retry-btn {
            background: #00ff41;
            color: #0a0a0c;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        #retry-btn:hover {
            background: #00cc33;
        }

        #hangar-btn {
            background: #ffffff;
            color: #0a0a0c;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        #hangar-btn:hover {
            background: #cdcdcd;
        }

        #hangar-screen {
            position: absolute;
            top: 50%;
            right: 50%;
            transform: translate(50%, -50%);
            width: 80vw;
            max-height: 80vh;
            background: rgba(10, 10, 12, 0.95);
            border: 2px solid #00ff41;
            padding: 20px;
            z-index: 1000;
            font-family: monospace;
            color: #00ff41;
            box-shadow: -10px 0 30px rgba(0, 255, 65, 0.1);
            overflow-y: auto;
        }

        .constructor-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* 3 columns wide */
            grid-gap: 10px;
            margin: 20px 0;
            padding: 10px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px inset #00ff41;
        }

        .grid-slot {
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid rgba(0, 255, 65, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
        }

        .grid-slot:hover {
            background: rgba(0, 255, 65, 0.2);
        }

        .grid-slot.occupied {
            font-size: 18px;
            border-color: #00ff41;
        }

        .hangar-layout {
            display: flex;
            justify-content: space-around;
            padding: 50px;
            color: #00ff41;
            font-family: monospace;
        }

        .blueprint-view {
            border: 2px dashed #00ff41;
            padding: 20px;
            min-width: 200px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
        }

        .blueprint-item {
            margin: 5px;
            padding: 10px;
            border: 1px solid #00ff41;
            text-align: center;
            cursor: pointer;
        }

        .blueprint-item:hover {
            background: rgba(255, 65, 65, 0.2);
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="modal-overlay" style="display: none;">
        <div id="modal-content">
            <h1 id="modal-title">MISSION REPORT</h1>
            <p id="modal-msg"></p>
            <div id="modal-stats"></div>
            <button id="retry-btn">RELAUNCH</button>
            <button id="hangar-btn">HANGAR</button>
        </div>
    </div>

    <div id="hangar-screen" style="display:none;">
        <div class="hangar-layout">
            <div class="inventory">
                <h3>PARTS</h3>
                <button onclick="game.addPart('FUEL_TANK')">+[TANK]+</button>
                <button onclick="game.addPart('ENGINE')">+[ENG]+</button>
            </div>

            <div class="blueprint-view">
                <h3>ROCKET ASSEMBLY</h3>
                <div id="blueprint-list"></div>
                <button class="launch-btn" onclick="game.startMission()">LAUNCH</button>
            </div>

            <div class="stats-view">
                <h3>STATS</h3>
                <div id="rocket-stats"></div>
            </div>
        </div>
    </div>

    <div id="ui">
        <button id="hangar-btn" onclick="game.renderHangar()">HANGAR</button>
        <h2>MISSION CONTROL</h2>
        <div id="stats">ALTITUDE: 0m<br>FUEL: 100%<br>SPEED: 0 m/s</div>
    </div>

    <script>
        const GROUND_INIT_ALTITUDE = 50;
        const ROCKET_INIT_ALTITUDE = 70;

        const PARTS_CATALOG = {
            ENGINE: { name: "Engine", symbol: "|_|", weight: 50, thrust: 5000, fuel: 0, cost: 500 },
            FUEL_TANK: { name: "Fuel Tank", symbol: "| |", weight: 100, thrust: 0, fuel: 1500, cost: 200 },
            NOSE_CONE: { name: "Nose Cone", symbol: "/\\", weight: 20, thrust: 0, fuel: 0, cost: 100 }
        };

        /**
         * BASE MODULE CLASS
         * Every part of the rocket inherits from this.
         */
        class Module {
            constructor({ name, symbol, weight, fuel = 0, thrust = 0, stability = 1 }) {
                this.name = name;
                this.weight = weight;
                this.fuel = fuel;
                this.thrust = thrust;
                this.stability = stability;
                this.symbol = symbol;
            }
        }

        /**
         * ROCKET CLASS
         * Manages the assembly and physics of the modules.
         */
        class Rocket {
            constructor() {
                this.modules = [];
                this.y = 0;
                this.x = 0;
                this.velocity = 0;      // Vertical Speed
                this.velocityX = 0;     // Horizontal Speed (Inertia!)
                this.fuel = 0;
                this.acceleration = 0;
                this.tilt = 0;
                this.angularVelocity = 0;
                this.isCrashed = false;
                this.isIgnited = false;
                this.crashTimer = 0;

                this.maxAltitude = 0;
            }

            buildFromBlueprint(blueprint) {
                this.modules = [];
                blueprint.forEach(partKey => {
                    const data = PARTS_CATALOG[partKey];
                    if (!data) {
                        console.warn(`Unknown part: ${partKey}`);
                        return;
                    }
                    // Create a module object based on the catalog
                    this.modules.push(new Module(data));
                });
                this.reset(); // Refill fuel and reset position
            }

            addModule(mod) {
                this.modules.push(mod);
                this.reset(); // Refill fuel and reset position
            }

            getTotalWeight() {
                // Sum weight of modules + current fuel weight (fuel has mass!)
                const hardwareWeight = this.modules.reduce((sum, m) => sum + m.weight, 0);
                return hardwareWeight + (this.fuel * 0.5);
            }

            getTotalThrust() {
                return this.modules.reduce((sum, m) => sum + m.thrust, 0);
            }

            getStabilityRating() {
                // Higher stability = harder to tilt. Fins help!
                return this.modules.reduce((sum, m) => sum + (m.stability || 0), 0);
            }

            reset() {
                this.x = 0;
                this.y = 0;
                this.velocity = 0;
                this.velocityX = 0;
                this.tilt = 0;
                this.angularVelocity = 0;
                this.acceleration = 0;
                // Refill fuel based on modules
                this.fuel = this.modules.reduce((sum, m) => sum + m.fuel, 0);
                this.maxAltitude = 0;
                this.crashTimer = 0;
                this.isIgnited = false;
                this.isCrashed = false;
            }

            // F = ma -> a = F/m
            update(dt, windForce) {
                if (!this.isIgnited || this.isCrashed) return;

                const fastDt = dt * 2.5;
                const stability = this.getStabilityRating();
                const m = this.getTotalWeight();
                const T = (this.fuel > 0) ? this.getTotalThrust() : 0;
                const g = 9.8;

                // 1. VERTICAL CALCULATION
                // Fy = T * cos(theta) - (m * g)
                let thrustY = T * Math.cos(this.tilt);
                let weightForce = m * g;
                let netForceY = thrustY - weightForce;

                this.acceleration = netForceY / m;
                this.velocity += this.acceleration * fastDt;

                if (this.y <= 0 && this.velocity <= 0) {
                    this.y = 0;
                    this.velocity = 0;
                    this.acceleration = 0;
                    // Don't allow tilt/horizontal movement on the pad
                    this.velocityX = 0;
                    this.angularVelocity = 0;
                    this.tilt = 0;
                } else {
                    // 2. HORIZONTAL & TILT (Only unlock once we leave the ground)
                    let thrustX = T * Math.sin(this.tilt);
                    let accX = thrustX / m;
                    this.velocityX += accX * fastDt;

                    // Rotation
                    let stability = this.getStabilityRating();
                    let stabilityMultiplier = (this.fuel > 0) ? 1.0 : 0.5;

                    // 1. TORQUE FROM WIND
                    // We scale the windForce down significantly (0.01 to 0.05)
                    let windTorque = windForce * 0.02;
                    // 2. RESTORING FORCE (Gravity/Aerodynamics)
                    // This pulls the rocket back toward 0 (upright) based on stability.
                    // The more it tilts, the harder stability pulls it back.
                    let restoringTorque = -this.tilt * (stability * stabilityMultiplier);
                    // 3. APPLY TO ANGULAR VELOCITY
                    // Force = Torque / "Inertia" (We'll use mass as a proxy for inertia)
                    let netTorque = (windTorque + restoringTorque) / (m / 100);

                    this.angularVelocity += netTorque * fastDt;
                    // Add a bit of 'Damping' so it doesn't spin forever
                    this.angularVelocity *= 0.96;
                    this.tilt += this.angularVelocity * fastDt;
                }

                this.y += this.velocity * fastDt;
                this.x += this.velocityX * fastDt;

                if (this.fuel > 0) {
                    this.fuel -= (T * 0.05) * dt;
                    if (this.fuel < 0) this.fuel = 0;
                }

                if (this.y > this.maxAltitude) this.maxAltitude = this.y;
            }

            draw(ctx, canvas) {
                // Calculate screen position
                const screenX = Math.floor((canvas.width / 2) + this.x);
                const screenY = canvas.height - ROCKET_INIT_ALTITUDE;

                ctx.save();
                ctx.translate(screenX, screenY);

                if (this.isCrashed) {
                    this.drawCrashAnimation(ctx);
                } else {
                    ctx.rotate(this.tilt);
                    this.drawNormal(ctx);
                }

                ctx.restore(); // Reset rotation for UI
            }

            drawNormal(ctx) {
                ctx.font = "bold 14px monospace";
                ctx.textAlign = "center";
                let offset = 0;
                this.modules.forEach((mod, index) => {
                    if (index === 0 && this.fuel > 0 && this.isIgnited) {
                        ctx.fillStyle = "#ff5839";
                        ctx.fillText("vvv", 0, 10 + (Math.random() * 5));
                    }
                    ctx.fillStyle = "#00ff41";
                    ctx.fillText(mod.symbol, 0, -offset);
                    offset += 20;
                });
            }

            drawCrashAnimation(ctx) {
                // crashTimer controls the progression of the collapse
                this.crashTimer = Math.min(this.crashTimer + 0.05, 6);

                ctx.font = "bold 14px monospace";
                ctx.fillStyle = "#ff4141";
                ctx.textAlign = "center";

                // The floor level relative to the rocket's translation point (0,0)
                // Since we translated to the ground level, 0 is the floor.
                const floorY = 10;

                this.modules.forEach((mod, index) => {
                    ctx.save();

                    // 1. HORIZONTAL SLIDE
                    // Pieces slide outward based on their index (left/right)
                    const direction = (index % 2 === 0) ? 1 : -1;
                    const slideDist = direction * (index + 1) * this.crashTimer * 7;

                    // 2. VERTICAL COLLAPSE
                    // Gravity pulls them down, but we clamp it at the floorY
                    let yOffset = (this.crashTimer * 50); // Falling speed

                    // This is the "Stay on ground" logic:
                    if (yOffset > floorY) {
                        yOffset = floorY; // Don't fall through the floor
                    }

                    ctx.translate(slideDist, yOffset);

                    // 3. THE TUMBLED ROTATION
                    // Stop spinning once the piece hits the ground (timer > some value)
                    // or just let them settle at a fixed random-looking angle
                    const rotationAngle = Math.min(this.crashTimer * 2, 10) * (index + 1) * direction;
                    ctx.rotate(rotationAngle);

                    // 4. DRAW SYMBOL
                    ctx.fillText(mod.symbol, 0, 0);

                    ctx.restore();
                });
            }
        }

        class Star {
            constructor(canvas) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                // Stars at different "depths" move at different speeds
                this.depth = Math.random() * 0.5 + 0.1;
            }

            draw(ctx, canvas, rocketY) {
                // 1. Calculate the star's position based on altitude
                // Note: We subtract because as we go UP, the stars move DOWN.
                let relativeY = (this.y + (rocketY * this.depth)) % canvas.height;

                // 2. The ground line moves DOWN as rocketY increases
                const currentGroundY = (canvas.height - GROUND_INIT_ALTITUDE) + rocketY;

                // 3. Only draw if the star is above the ground line
                if (relativeY < currentGroundY) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.depth})`;
                    ctx.beginPath();
                    ctx.arc(this.x, relativeY, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        /**
         * ENGINE / CORE GAME LOOP
         */
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.rocket = new Rocket();
                this.stars = [];
                this.lastTime = 0;

                this.wind = 0;
                this.windTarget = 0;
                this.windTimer = 0;

                this.credits = 0;
                this.blueprint = ["ENGINE", "FUEL_TANK", "NOSE_CONE"];

                window.addEventListener('resize', () => this.resize());
                window.addEventListener('keydown', (e) => { if (e.code === 'Space') this.rocket.isIgnited = true; });

                this.resize();

                this.initRocket();

                requestAnimationFrame((t) => this.loop(t));
            }

            generateStars() {
                this.stars = [];
                for (let i = 0; i < 100; i++) {
                    this.stars.push(new Star(this.canvas));
                }
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.generateStars(); // Regrow stars on resize
            }

            initRocket() {
                this.rocket.buildFromBlueprint(this.blueprint);
            }

            drawSky() {
                const alt = this.rocket.y;

                // Darkness factor: 0 at ground, 1 at 10k meters
                let darkness = Math.min(alt / 10000, 1);

                // Start with a Deep Atmospheric Blue: RGB(20, 30, 60)
                // Fade to Space Black: RGB(0, 0, 0)
                let r = Math.floor(20 * (1 - darkness));
                let g = Math.floor(30 * (1 - darkness));
                let b = Math.floor(60 * (1 - darkness));

                // Fill the background
                this.ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Subtle Horizon Glow (White/Light Blue)
                if (alt < 5000) {
                    let glowOpacity = (1 - (alt / 5000)) * 0.2;
                    let gradient = this.ctx.createLinearGradient(0, this.canvas.height - 400, 0, this.canvas.height - 150);

                    gradient.addColorStop(0, "rgba(0, 0, 0, 0)"); // Clear at the top
                    gradient.addColorStop(1, `rgba(100, 150, 255, ${glowOpacity})`); // Soft Blue at the bottom

                    this.ctx.fillStyle = gradient;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
            }

            drawGround(rocketY) {
                const groundBaseY = this.canvas.height - GROUND_INIT_ALTITUDE;
                const currentGroundY = groundBaseY + rocketY; // Moves down as rocket goes up

                // Only draw the ground if it's still visible on screen
                if (currentGroundY < this.canvas.height + 200) {
                    this.ctx.strokeStyle = "#00ff41";
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, currentGroundY);
                    this.ctx.lineTo(this.canvas.width, currentGroundY);
                    this.ctx.stroke();

                    // Draw the "Dirt" under the line so stars don't show through
                    this.ctx.fillStyle = "#0a0a0c";
                    this.ctx.fillRect(0, currentGroundY + 2, this.canvas.width, this.canvas.height);

                    // Draw some "Launch Pad" details
                    for (let i = -2; i <= 2; i++) {
                        let padX = (this.canvas.width / 2) + (i * 40);
                        this.ctx.strokeRect(padX - 10, currentGroundY - 6, 20, 5);
                    }
                }
            }

            drawWindIndicator() {
                const anchorX = this.canvas.width - 150; // The fixed position of the "|"
                const cy = 100;

                const maxLen = 3;
                const absWind = Math.abs(this.wind);
                const force = Math.min(Math.round(absWind), maxLen);

                this.ctx.fillStyle = "#00ff41";
                this.ctx.font = "12px monospace";
                this.ctx.textAlign = "center";
                this.ctx.fillText("WIND", anchorX, cy - 20);

                this.ctx.font = "bold 12px monospace";

                if (this.wind > 0.5 && force > 0) {
                    // WIND EAST: Anchor is on the left
                    const arrow = "|" + "=".repeat(force - 1) + ">";
                    this.ctx.textAlign = "left";
                    this.ctx.fillText(arrow, anchorX, cy + 10);
                } else if (this.wind < -0.5 && force > 0) {
                    // WIND WEST: Anchor is on the right
                    const arrow = "<" + "=".repeat(force - 1) + "|";
                    this.ctx.textAlign = "right";
                    this.ctx.fillText(arrow, anchorX, cy + 10);
                } else {
                    // CALM: Just the anchor
                    this.ctx.textAlign = "center";
                    this.ctx.fillText("|", anchorX, cy + 10);
                }

                // Numerical readout centered under the anchor
                this.ctx.textAlign = "center";
                this.ctx.font = "10px monospace";
                this.ctx.fillText(`${absWind.toFixed(1)} kN`, anchorX, cy + 35);
            }

            checkFlightStatus() {
                const rocket = this.rocket;
                if (rocket.isCrashed) return; // Don't check status if already exploding

                // A. OFF-SCREEN CHECK
                const margin = 2;
                const halfWidth = this.canvas.width / 2;
                if (rocket.x < -halfWidth - margin || rocket.x > halfWidth + margin) {
                    this.triggerCrash("LOST IN SECTOR X: Out of Bounds");
                }

                // B. GROUND CHECK
                if (rocket.y <= 0) {
                    if (rocket.velocity < -15 || Math.abs(rocket.tilt) > 0.5) {
                        this.triggerCrash("CRITICAL FAILURE: Impact Detected");
                    } else if (rocket.isIgnited && rocket.velocity <= 0 && rocket.fuel <= 0) {
                        this.endRun("MISSION COMPLETE: Return to Hangar", rocket.maxAltitude);
                    }
                }
            }

            triggerCrash(message) {
                this.rocket.isCrashed = true;
                this.rocket.isIgnited = false;

                // Pause briefly to show the "Explosion" before the modal pops up
                setTimeout(() => {
                    this.endRun(message, this.rocket.maxAltitude);
                }, 1500); // 2 second delay
            }

            endRun(message, maxAltitude) {
                this.rocket.isIgnited = false;

                // Show the Modal
                const overlay = document.getElementById('modal-overlay');
                const msg = document.getElementById('modal-msg');
                const stats = document.getElementById('modal-stats');

                const retryBtn = document.getElementById('retry-btn');
                const hangarBtn = document.getElementById('hangar-btn');

                retryBtn.addEventListener('click', () => {
                    overlay.style.display = 'none';
                    this.retry();
                });
                hangarBtn.addEventListener('click', () => {
                    overlay.style.display = 'none';
                    this.renderHangar();
                });

                overlay.style.display = 'flex';
                msg.innerText = message;
                stats.innerHTML = `MAX ALTITUDE: ${Math.floor(maxAltitude)}m`;
            }

            retry() {
                this.rocket.reset();
            }

            resetRocket() {
                this.rocket.reset();
            }

            updateWind(dt) {
                this.windTimer -= dt;
                if (this.windTimer <= 0) {
                    // Pick a new wind force and duration
                    this.windTarget = (Math.random() - 0.5) * 10;
                    this.windTimer = 2 + Math.random() * 3; // Change every 2-5 seconds
                }

                // Smoothly transition to the new wind target (Interpolation)
                this.wind += (this.windTarget - this.wind) * dt;
            }

            loop(time) {
                const dt = (time - this.lastTime) / 1000;
                this.lastTime = time;

                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.updateWind(dt);

                // Update Physics
                this.rocket.update(dt, this.wind);

                // Referee Check
                this.checkFlightStatus();

                // Rendering
                this.drawSky();
                this.stars.forEach(star => star.draw(this.ctx, this.canvas, this.rocket.y));
                this.drawGround(this.rocket.y);
                this.drawWindIndicator();
                this.rocket.draw(this.ctx, this.canvas);

                // UPDATE UI
                document.getElementById('stats').innerHTML = `
                    ALTITUDE: ${Math.floor(this.rocket.y)}m<br>
                    FUEL: ${Math.max(0, Math.floor(this.rocket.fuel))} units<br>
                    SPEED: ${Math.floor(this.rocket.velocity)} m/s<br>
                    ACCEL: ${this.rocket.acceleration.toFixed(2)} m/s²<br>
                    WEIGHT: ${Math.floor(this.rocket.getTotalWeight())} kg<br>
                    THRUST: ${Math.floor(this.rocket.getTotalThrust())} kN<br>
                    STABILITY: ${this.rocket.getStabilityRating().toFixed(2)}
                `;

                requestAnimationFrame((t) => this.loop(t));
            }

            // HANGAR

            addPart(partKey) {
                // Engines should usually be at the bottom, Nose at top.
                // For now, let's just push to the stack
                this.blueprint.push(partKey);
                this.renderHangar();
            }

            removePart(index) {
                this.blueprint.splice(index, 1);
                this.renderHangar();
            }

            renderHangar() {
                document.getElementById('hangar-screen').style.display = 'block';
                const list = document.getElementById('blueprint-list');
                list.innerHTML = "";

                this.blueprint.forEach((partKey, index) => {
                    const div = document.createElement('div');
                    div.className = "blueprint-item";
                    div.innerText = PARTS_CATALOG[partKey].symbol;
                    div.onclick = () => this.removePart(index);
                    list.appendChild(div);
                });

                // Update Stats (Weight vs Thrust)
                this.rocket.buildFromBlueprint(this.blueprint);
                const stats = document.getElementById('rocket-stats');
                stats.innerHTML = `
                    WT: ${this.rocket.getTotalWeight()}kg<br>
                    THR: ${this.rocket.getTotalThrust()}kN<br>
                    STB: ${this.rocket.getStabilityRating().toFixed(1)}
                `;
            }

            startMission() {
                document.getElementById('hangar-screen').style.display = 'none';
            }
        }
        const game = new Game();
    </script>
</body>

</html>
