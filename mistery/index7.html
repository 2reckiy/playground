<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Stage 1 – Emergence</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0b0b0b;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      resize();
      window.addEventListener("resize", resize);

      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
      }

      /* =========================
   GLOBAL SYSTEM STATE
========================= */

      let energy = 80;
      let time = 0;
      let ended = false;

      const particles = [];
      const pairs = [];
      const ambient = [];

      const MAX_AMBIENT = 120;

      /* =========================
   UTILITIES
========================= */

      const rand = (a = 1, b = 0) => Math.random() * (a - b) + b;
      const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

      /* =========================
   ELEMENTARY PARTICLE
========================= */

      class ElementaryParticle {
        constructor(x, y, type) {
          this.x = x;
          this.y = y;
          this.vx = rand(0.4, -0.4);
          this.vy = rand(0.4, -0.4);

          this.type = type;
          this.connected = false;

          // Hidden characteristics
          this.lifetime = rand(0.2, 0.02);
          this.replication = rand(0.002, 0);
          this.mutation = rand(0.001, 0);
          this.affinity = rand(1.2, 0.6);

          this.age = 0;
        }

        update(dt) {
          this.age += dt;

          this.vx += rand(0.05, -0.05);
          this.vy += rand(0.05, -0.05);

          this.x += this.vx;
          this.y += this.vy;

          this.vx *= 0.96;
          this.vy *= 0.96;

          // Soft bounds
          this.x += (canvas.width / 2 - this.x) * 0.0003;
          this.y += (canvas.height / 2 - this.y) * 0.0003;

          // Replication
          if (Math.random() < this.replication * energy * 0.01) {
            spawnParticle(this.x + rand(10, -10), this.y + rand(10, -10));
          }

          // Decay
          if (Math.random() < this.lifetime * dt) {
            this.dead = true;
          }
        }

        draw(a) {
          ctx.fillStyle = this.type.color(a);
          if (this.type.shape === "circle") {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillRect(this.x - 4, this.y - 4, 8, 8);
          }
        }
      }

      /* =========================
   PAIR (BOND)
========================= */

      class Pair {
        constructor(a, b, strength) {
          this.a = a;
          this.b = b;
          this.strength = strength; // 1–4
          this.stability = rand(1, 0.5) * strength;
        }

        update(dt) {
          const dx = this.b.x - this.a.x;
          const dy = this.b.y - this.a.y;

          this.a.vx += dx * 0.002 * this.strength;
          this.a.vy += dy * 0.002 * this.strength;
          this.b.vx -= dx * 0.002 * this.strength;
          this.b.vy -= dy * 0.002 * this.strength;

          // Possible decay
          if (Math.random() > this.stability) {
            this.dead = true;
            this.a.connected = false;
            this.b.connected = false;
          }
        }

        draw(a) {
          ctx.strokeStyle = `rgba(0,255,255,${a * this.strength * 0.2})`;
          ctx.lineWidth = this.strength;
          ctx.beginPath();
          ctx.moveTo(this.a.x, this.a.y);
          ctx.lineTo(this.b.x, this.b.y);
          ctx.stroke();
        }
      }

      /* =========================
   PARTICLE TYPES
========================= */

      const TYPES = [
        { shape: "circle", color: (a) => `rgba(0,255,255,${a})`, rare: 0 },
        { shape: "circle", color: (a) => `rgba(255,255,0,${a})`, rare: 0.05 },
        { shape: "circle", color: (a) => `rgba(255,0,255,${a})`, rare: 0.08 },
        { shape: "square", color: (a) => `rgba(255,0,0,${a})`, rare: 0.1 },
        { shape: "square", color: (a) => `rgba(0,255,0,${a})`, rare: 0.12 },
        { shape: "square", color: (a) => `rgba(0,0,255,${a})`, rare: 0.15 },
      ];

      function randomType() {
        const r = Math.random();
        let acc = 0;
        for (const t of TYPES) {
          acc += 0.2 - t.rare;
          if (r < acc) return t;
        }
        return TYPES[0];
      }

      /* =========================
   AMBIENT ENERGY VISUAL
========================= */

      class Ambient {
        constructor() {
          this.x = rand(canvas.width);
          this.y = rand(canvas.height);
          this.a = rand(0.4, 0.05);
        }
        update() {
          this.x += rand(1, -1);
          this.y += rand(1, -1);
          this.a += rand(0.02, -0.02);
          this.a = Math.max(0, Math.min(1, this.a));
        }
        draw() {
          ctx.fillStyle = `rgba(0,255,255,${this.a})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      /* =========================
   SPAWNING
========================= */

      canvas.addEventListener("click", (e) => {
        if (ended) return;
        const cost = 1 + particles.length * 0.02;
        if (energy < cost) return;
        energy -= cost;
        spawnParticle(e.clientX, e.clientY);
      });

      function spawnParticle(x, y) {
        particles.push(new ElementaryParticle(x, y, randomType()));
      }

      /* =========================
   MAIN LOOP
========================= */

      let last = performance.now();
      function loop(now) {
        const dt = (now - last) / 1000;
        last = now;
        time += dt;

        update(dt);
        draw();

        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      /* =========================
   UPDATE
========================= */

      function update(dt) {
        if (ended) return;

        energy -= dt * (particles.length * 0.05 + pairs.length * 0.08);
        if (energy <= 0) ended = true;

        // Ambient scaling
        const target = Math.min(MAX_AMBIENT, Math.floor(energy * 2));
        console.log(
          "ambient.length, target, energy",
          ambient.length,
          target,
          energy
        );
        while (ambient.length < target) ambient.push(new Ambient());
        ambient.length = target;
        ambient.forEach((a) => a.update());

        particles.forEach((p) => p.update(dt));

        // Pair formation
        for (let i = 0; i < particles.length; i++) {
          const a = particles[i];
          if (a.connected) continue;
          for (let j = i + 1; j < particles.length; j++) {
            const b = particles[j];
            if (b.connected) continue;
            if (dist(a, b) < 90 * a.affinity) {
              const strength = Math.floor(rand(4, 1));
              if (Math.random() < 0.6) {
                a.connected = b.connected = true;
                pairs.push(new Pair(a, b, strength));
              }
              break;
            }
          }
        }

        pairs.forEach((p) => p.update(dt));

        // Cleanup
        for (let i = particles.length - 1; i >= 0; i--)
          if (particles[i].dead) particles.splice(i, 1);
        for (let i = pairs.length - 1; i >= 0; i--)
          if (pairs[i].dead) pairs.splice(i, 1);
      }

      /* =========================
   DRAW
========================= */

      function draw() {
        ctx.fillStyle = `rgba(10,10,10,0.25)`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ambient.forEach((a) => a.draw());

        const eFactor = Math.min(1, energy / 50);

        pairs.forEach((p) => p.draw(eFactor));
        particles.forEach((p) => p.draw(0.2 + eFactor * 0.8));
      }
    </script>
  </body>
</html>
