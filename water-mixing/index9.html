<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hex Factory | Hue-Perceptual Engine</title>
    <style>
      :root {
        --bg: #000;
        --surface: #0a0a0a;
        --border: #222;
        --accent: #38bdf8;
        --text: #fff;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      #header {
        flex-shrink: 0;
        padding: 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 10;
      }
      #result-hex {
        font-size: 5rem;
        font-weight: 900;
        font-family: monospace;
        line-height: 1;
        margin-bottom: 15px;
        letter-spacing: -4px;
      }
      .slots-container {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }
      .slot {
        width: 55px;
        height: 75px;
        border: 2px solid var(--border);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.02);
        transition: 0.2s;
      }
      .slot.active {
        border-color: var(--accent);
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
      }
      .chip {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .hud {
        display: flex;
        gap: 20px;
        align-items: center;
        font-size: 0.8rem;
        color: #666;
      }
      .auto-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: 800;
        cursor: pointer;
      }
      .auto-btn.on {
        background: #22c55e;
        color: #fff;
      }
      #palette-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
        grid-auto-rows: 55px;
        gap: 6px;
        align-content: start;
      }
      .species-group {
        width: 100%;
        height: 100%;
        border-radius: 4px;
        cursor: pointer;
        position: relative;
        transition: all 0.2s;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .species-group:hover {
        transform: scale(1.1);
        z-index: 5;
        outline: 2px solid white;
      }
      .strength-indicator {
        position: absolute;
        bottom: 2px;
        right: 2px;
        font-size: 8px;
        font-weight: bold;
        background: rgba(0, 0, 0, 0.6);
        padding: 1px 3px;
        border-radius: 3px;
        color: #38bdf8;
      }
    </style>
  </head>
  <body>
    <header id="header">
      <div id="result-hex">#000000</div>
      <div class="slots-container" id="slots-ui"></div>
      <div class="hud">
        <button id="auto-toggle" class="auto-btn" onclick="toggleAuto()">
          Auto-Evolve
        </button>
        <div id="stats">SPECIES: 3 | SHADES: 0</div>
      </div>
    </header>

    <main id="palette-container"></main>

    <script>
      const MAX_SLOTS = 3;
      const HUE_TOLERANCE = 0.03; // ~10 degrees on the color wheel. Highly effective for grouping.

      let speciesList = [];
      let slots = Array(MAX_SLOTS).fill(null);
      let activeSlotIndex = 0;
      let autoInterval = null;

      function hexToRgb(hex) {
        return {
          r: parseInt(hex.slice(1, 3), 16),
          g: parseInt(hex.slice(3, 5), 16),
          b: parseInt(hex.slice(5, 7), 16),
        };
      }

      function calculateStrength(rgb) {
        const max = Math.max(rgb.r, rgb.g, rgb.b);
        const min = Math.min(rgb.r, rgb.g, rgb.b);
        return Math.round(((max - min) / 255) * 100);
      }

      // function getHue(rgb) {
      //   let r = rgb.r / 255,
      //     g = rgb.g / 255,
      //     b = rgb.b / 255;
      //   let max = Math.max(r, g, b),
      //     min = Math.min(r, g, b),
      //     h;
      //   if (max === min) h = 0;
      //   else {
      //     let d = max - min;
      //     if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
      //     else if (max === g) h = (b - r) / d + 2;
      //     else h = (r - g) / d + 4;
      //     h /= 6;
      //   }
      //   return (h + 0.15) % 1; // Shifts wheel to keep Pinks/Reds together
      // }

      function getHue(rgb) {
        let r = rgb.r / 255,
          g = rgb.g / 255,
          b = rgb.b / 255;
        let max = Math.max(r, g, b),
          min = Math.min(r, g, b),
          h;
        if (max === min) h = 0;
        else {
          let d = max - min;
          if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
          else if (max === g) h = (b - r) / d + 2;
          else h = (r - g) / d + 4;
          h /= 6;
        }
        // No shifting here to keep the math pure for your debug
        return h;
      }

      // Initialize with RGB
      ["#FF0000", "#00FF00", "#0000FF"].forEach((h) => processDiscovery(h));

      function useIngredient(hex) {
        slots[activeSlotIndex] = hex;
        activeSlotIndex = (activeSlotIndex + 1) % slots.length;
        updateLogic();
      }

      function calculateMix() {
        const filled = slots.filter((s) => s !== null);
        if (filled.length === 0) return "#000000";
        let r2 = 0,
          g2 = 0,
          b2 = 0;
        filled.forEach((hex) => {
          const rgb = hexToRgb(hex);
          r2 += rgb.r ** 2;
          g2 += rgb.g ** 2;
          b2 += rgb.b ** 2;
        });
        const avg = (sum) =>
          Math.round(Math.sqrt(sum / filled.length))
            .toString(16)
            .padStart(2, "0");
        return `#${avg(r2)}${avg(g2)}${avg(b2)}`.toUpperCase();
      }

      function updateLogic() {
        const currentHex = calculateMix();
        document.getElementById("result-hex").innerText = currentHex;
        document.getElementById("result-hex").style.color = currentHex;
        if (slots.every((s) => s !== null)) processDiscovery(currentHex);
        renderSlots();
      }

      function processDiscovery(newHex) {
        const rgb = hexToRgb(newHex);
        const strength = calculateStrength(rgb);
        const hue = getHue(rgb);

        // GROUPING LOGIC: Find species based on HUE similarity
        let group = speciesList.find((s) => {
          const diff = Math.abs(s.hue - hue);
          const wrappedDiff = Math.min(diff, 1 - diff);
          return wrappedDiff < HUE_TOLERANCE;
        });

        if (!group) {
          speciesList.push({
            mainHex: newHex,
            ...rgb,
            strength,
            hue,
            shades: [],
          });
        } else {
          // USURPATION: The "Stronger" (purer) color takes the lead
          if (strength > group.strength) {
            group.shades.push(group.mainHex);
            group.mainHex = newHex;
            group.r = rgb.r;
            group.g = rgb.g;
            group.b = rgb.b;
            group.strength = strength;
            group.hue = hue;
          } else if (
            group.mainHex !== newHex &&
            !group.shades.includes(newHex)
          ) {
            group.shades.push(newHex);
          }
        }

        // Keep palette sorted by Hue (Rainbow)
        speciesList.sort((a, b) => a.hue - b.hue);
        renderPalette();
        updateStats();
      }

      function updateStats() {
        const totalShades = speciesList.reduce(
          (sum, s) => sum + s.shades.length,
          0,
        );
        document.getElementById("stats").innerText =
          `SPECIES: ${speciesList.length} | SHADES: ${totalShades}`;
      }

      function renderPalette() {
        const grid = document.getElementById("palette-container");
        grid.innerHTML = "";
        speciesList.forEach((group) => {
          const div = document.createElement("div");
          div.className = "species-group";
          div.style.backgroundColor = group.mainHex;
          div.onclick = () => useIngredient(group.mainHex);
          div.innerHTML = `<span class="strength-indicator">${group.strength}%</span>`;
          grid.appendChild(div);
        });
      }

      function renderSlots() {
        const ui = document.getElementById("slots-ui");
        ui.innerHTML = "";
        slots.forEach((color, i) => {
          const div = document.createElement("div");
          div.className = `slot ${i === activeSlotIndex ? "active" : ""}`;
          div.onclick = () => {
            activeSlotIndex = i;
            renderSlots();
          };
          if (color)
            div.innerHTML = `<div class="chip" style="background:${color}"></div>`;
          ui.appendChild(div);
        });
      }

      function toggleAuto() {
        const btn = document.getElementById("auto-toggle");
        if (autoInterval) {
          clearTimeout(autoInterval); // Switch to clearTimeout
          autoInterval = null;
          btn.innerText = "Auto-Evolve";
          btn.classList.remove("on");
        } else {
          btn.innerText = "Evolving...";
          btn.classList.add("on");
          autoStep(); // Start the loop
        }
      }
      function autoStep() {
        if (
          !autoInterval &&
          document.getElementById("auto-toggle").classList.contains("on")
        ) {
          // 1. Safety Check: Ensure speciesList actually has items
          if (speciesList.length > 0) {
            const randomIndex = Math.floor(Math.random() * speciesList.length);
            const entry = speciesList[randomIndex];

            // 2. Only proceed if the entry exists (prevents race condition errors)
            if (entry && entry.mainHex) {
              useIngredient(entry.mainHex);
            }
          }

          // 3. Schedule the NEXT step only after this one is done
          // This acts like a "heartbeat" that waits for the CPU to be ready
          autoInterval = setTimeout(autoStep, 40);
        }
      }

      renderPalette();
      renderSlots();
    </script>
  </body>
</html>
