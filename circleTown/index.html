<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>The Circular Forge - Dynamic Placement</title>
    <style>
        body {
            margin: 0;
            background: #050508;
            color: #fff;
            font-family: 'Consolas', monospace;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            padding: 15px;
            border: 1px solid #00f2ff;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: #111;
            padding: 10px;
            border-radius: 5px;
        }

        button {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            border-color: #00f2ff;
        }

        button.active {
            background: #00f2ff;
            color: #000;
        }

        .stat {
            color: #00f2ff;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div class="stat">ЦИТАДЕЛЬ РІВЕНЬ: <span id="citadel-lvl">1</span></div>
        <div class="stat">ЗОЛОТО: <span id="gold-val">100</span></div>
        <div class="stat">ЕНЕРГІЯ: <span id="energy-val">0</span></div>
    </div>

    <div class="controls">
        <button onclick="setMode('workshop')" id="btn-workshop">МАЙСТЕРНЯ (30°)</button>
        <button onclick="setMode('mine')" id="btn-mine">ШАХТА (45°)</button>
        <button onclick="upgradeCitadel()" style="border-color: #ffcc00;">UPGRADE CENTRE (50G)</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let state = {
            gold: 100,
            energy: 0,
            citadelLvl: 1,
            citadelRadius: 10,
            rings: [{ radius: 100, color: '#333', buildings: [] }],
            currentMode: 'workshop',
            mouseAngle: 0,
            mouseDist: 0,
            isHoveringRing: -1
        };

        const BUILDINGS = {
            workshop: { arc: 30 * (Math.PI / 180), color: '#00f2ff', cost: 20, prod: 'energy' },
            mine: { arc: 45 * (Math.PI / 180), color: '#ff4444', cost: 30, prod: 'gold' }
        };

        function setMode(mode) {
            state.currentMode = mode;
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode)?.classList.add('active');
        }

        function upgradeCitadel() {
            if (state.gold >= 50) {
                state.gold -= 50;
                state.citadelLvl++;
                state.citadelRadius += 15;
                // Додаємо нове кільце кожні 2 рівні
                if (state.citadelLvl % 2 === 0) {
                    const lastR = state.rings[state.rings.length - 1].radius;
                    state.rings.push({ radius: lastR + 20, color: '#333', buildings: [] });
                }
            }
        }

        canvas.addEventListener('mousemove', (e) => {
            const x = e.clientX - canvas.width / 2;
            const y = e.clientY - canvas.height / 2;
            state.mouseDist = Math.sqrt(x * x + y * y);
            state.mouseAngle = (Math.atan2(y, x) + Math.PI * 2) % (Math.PI * 2);

            state.isHoveringRing = -1;
            state.rings.forEach((r, i) => {
                if (Math.abs(state.mouseDist - r.radius) < 20) state.isHoveringRing = i;
            });
        });

        canvas.addEventListener('click', () => {
            if (state.isHoveringRing !== -1) {
                placeBuilding(state.isHoveringRing);
            }
        });

        function placeBuilding(ringIdx) {
            const type = state.currentMode;
            const data = BUILDINGS[type];
            if (state.gold < data.cost) return;

            const ring = state.rings[ringIdx];
            const halfArc = data.arc / 2;

            // Перевірка колізій
            const hasCollision = ring.buildings.some(b => {
                const diff = Math.abs(state.mouseAngle - b.angle);
                const dist = Math.min(diff, Math.PI * 2 - diff);
                return dist < (data.arc + b.arc) / 2;
            });

            if (!hasCollision) {
                state.gold -= data.cost;
                ring.buildings.push({
                    type,
                    angle: state.mouseAngle,
                    arc: data.arc,
                    color: data.color
                });
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // 1. Центр
            ctx.beginPath();
            ctx.arc(cx, cy, state.citadelRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#fff';
            ctx.fill();
            ctx.shadowBlur = 0;

            // 2. Кільця та Будівлі
            state.rings.forEach((ring, i) => {
                // Малюємо лінію кільця
                ctx.beginPath();
                ctx.arc(cx, cy, ring.radius, 0, Math.PI * 2);
                ctx.strokeStyle = (state.isHoveringRing === i) ? '#555' : '#222';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Будівлі на кільці
                ring.buildings.forEach(b => {
                    ctx.beginPath();
                    ctx.arc(cx, cy, ring.radius, b.angle - b.arc / 2, b.angle + b.arc / 2);
                    ctx.strokeStyle = b.color;
                    ctx.lineWidth = 10;
                    ctx.stroke();

                    // Продакшн
                    if (BUILDINGS[b.type].prod === 'gold') state.gold += 0.01;
                    else state.energy += 0.01;
                });
            });

            // 3. Ghost Building
            if (state.isHoveringRing !== -1) {
                const ring = state.rings[state.isHoveringRing];
                const data = BUILDINGS[state.currentMode];
                ctx.beginPath();
                ctx.arc(cx, cy, ring.radius, state.mouseAngle - data.arc / 2, state.mouseAngle + data.arc / 2);
                ctx.strokeStyle = data.color;
                ctx.globalAlpha = 0.3;
                ctx.lineWidth = 12;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            document.getElementById('gold-val').innerText = Math.floor(state.gold);
            document.getElementById('energy-val').innerText = Math.floor(state.energy);
            document.getElementById('citadel-lvl').innerText = state.citadelLvl;

            requestAnimationFrame(draw);
        }

        setMode('workshop');
        draw();
    </script>
</body>

</html>
