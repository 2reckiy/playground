<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refactored Pixel Water</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Courier New", monospace;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #stats {
        position: absolute;
        top: 15px;
        left: 15px;
        color: #00ffcc;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.8);
        padding: 12px;
        border: 1px solid #00ffcc;
      }
    </style>
  </head>
  <body>
    <div id="stats">
      VOLUME: <span id="v-pool">0</span> | H: <span id="h-val">0</span>
    </div>
    <canvas id="canvas"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const vPoolEl = document.getElementById("v-pool");
      const hValEl = document.getElementById("h-val");

      // Configuration
      const PIXEL = 10;
      const DROP_SIDE = 10;
      const DROP_VALUE = (DROP_SIDE / PIXEL) * (DROP_SIDE / PIXEL); // Normalized to grid units
      const MIN_SPREAD_HEIGHT = 2;

      let width, height;
      let totalVolume = 0;
      let drops = [];

      // --- 1. Jitter & Surface Management ---
      class SurfaceManager {
        constructor(width) {
          this.offsets = new Array(width).fill(0);
          this.damping = 0.85;
          this.propagation = 0.15;
        }

        applyImpulse(x, strength) {
          if (this.offsets[x] !== undefined) {
            this.offsets[x] = strength;
          }
        }

        update() {
          for (let i = 0; i < this.offsets.length; i++) {
            this.offsets[i] *= this.damping;
            // Wave propagation logic
            if (i > 0)
              this.offsets[i - 1] +=
                (this.offsets[i] - this.offsets[i - 1]) * this.propagation;
            if (i < this.offsets.length - 1)
              this.offsets[i + 1] +=
                (this.offsets[i] - this.offsets[i + 1]) * this.propagation;
          }
        }

        getOffset(x) {
          return this.offsets[x] || 0;
        }
      }

      // --- 2. Grid Splash Management ---
      class SplashManager {
        constructor() {
          this.particles = [];
        }

        create(gx, gy) {
          for (let i = 0; i < 4; i++) {
            this.particles.push({
              x: gx,
              y: gy,
              vx: (Math.random() - 0.5) * 1.2,
              vy: -Math.random() * 1.5,
              life: 1.0,
            });
          }
        }

        updateAndDraw(ctx) {
          this.particles = this.particles.filter((p) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.1; // Gravity
            p.life -= 0.05;

            ctx.fillStyle = `rgba(0, 242, 255, ${p.life})`;
            // Snap to grid for "Grid Splashes"
            ctx.fillRect(
              Math.floor(p.x) * PIXEL,
              Math.floor(p.y) * PIXEL,
              PIXEL / 2,
              PIXEL / 2,
            );

            return p.life > 0;
          });
        }
      }

      let surface, splashes;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        width = Math.ceil(canvas.width / PIXEL);
        height = Math.ceil(canvas.height / PIXEL);
        surface = new SurfaceManager(width);
        splashes = new SplashManager();
      }

      window.addEventListener("resize", resize);
      resize();

      // --- 3. Mathematical Pool Calculation ---
      function calculatePoolDimensions() {
        let pW, pH;
        let potentialWidth = totalVolume / MIN_SPREAD_HEIGHT;

        if (potentialWidth < width) {
          pW = potentialWidth;
          pH = MIN_SPREAD_HEIGHT;
        } else {
          pW = width;
          pH = totalVolume / width;
        }
        return { w: pW, h: pH };
      }

      class Drop {
        constructor(x) {
          this.gx = Math.floor(x / PIXEL);
          this.gy = 0;
          this.vel = 1;
        }
        update() {
          this.gy += this.vel;
          this.vel += 0.2;
          const pool = calculatePoolDimensions();
          const surfaceY = height - pool.h;

          if (this.gy >= surfaceY) {
            totalVolume += DROP_VALUE;
            surface.applyImpulse(this.gx, 2);
            splashes.create(this.gx, surfaceY);
            return false;
          }
          return true;
        }
        draw() {
          ctx.fillStyle = "#00f2ff";
          ctx.fillRect(
            this.gx * PIXEL,
            Math.floor(this.gy) * PIXEL,
            DROP_SIDE,
            DROP_SIDE,
          );
        }
      }

      function loop() {
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const pool = calculatePoolDimensions();
        vPoolEl.innerText = totalVolume.toFixed(0);
        hValEl.innerText = pool.h.toFixed(1);

        surface.update();

        // Draw Pool
        if (totalVolume > 0) {
          const startX = (width - pool.w) / 2;
          for (let i = 0; i < pool.w; i++) {
            const xIdx = Math.floor(startX + i);
            const jitter = surface.getOffset(xIdx);

            const x = (startX + i) * PIXEL;
            const y = (height - pool.h + jitter) * PIXEL;

            ctx.fillStyle = "#005a8d";
            ctx.fillRect(x, y, PIXEL, (pool.h - jitter) * PIXEL);

            ctx.fillStyle = "#00f2ff"; // Surface highlight
            ctx.fillRect(x, y, PIXEL, 2);
          }
        }

        drops = drops.filter((d) => d.update());
        drops.forEach((d) => d.draw());
        splashes.updateAndDraw(ctx);

        requestAnimationFrame(loop);
      }

      window.addEventListener("mousedown", (e) =>
        drops.push(new Drop(e.clientX)),
      );
      loop();
    </script>
  </body>
</html>
