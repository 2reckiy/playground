<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynasty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=IM+Fell+English:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <!-- ═══════════════════════════════════════════════════════════════
     STYLES
     Light parchment / illuminated-manuscript aesthetic.
     CSS variables drive all colours — easy to retheme.
═══════════════════════════════════════════════════════════════ -->
    <style>
      /* ── Reset ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── Tokens ── */
      :root {
        /* Parchment palette */
        --clr-bg: #f2ead8;
        --clr-bg-deep: #e8dfc5;
        --clr-ink: #1e160a;
        --clr-ink-mid: #4a3820;
        --clr-ink-faint: #8c7a5e;
        --clr-ink-ghost: #c4b49a;

        /* Accent – player house gold */
        --clr-gold: #b07d18;
        --clr-gold-light: #d4a53a;
        --clr-gold-faint: rgba(176, 125, 24, 0.15);

        /* UI surfaces */
        --clr-surface: rgba(242, 234, 216, 0.96);
        --clr-surface-alt: rgba(232, 223, 197, 0.98);
        --clr-border: rgba(176, 125, 24, 0.32);
        --clr-border-soft: rgba(176, 125, 24, 0.16);

        /* Semantic */
        --clr-good: #2a6e3a;
        --clr-bad: #8b2020;
        --clr-neutral: #4a5e7a;

        /* Typography */
        --font-display: "Cormorant Garamond", Georgia, serif;
        --font-body: "IM Fell English", Georgia, serif;

        /* Layout */
        --hud-h: 48px;
        --panel-radius: 4px;

        /* Transitions */
        --t-fast: 120ms ease;
        --t-mid: 220ms ease;
      }

      /* ── Base ── */
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--clr-bg);
        color: var(--clr-ink);
        font-family: var(--font-body);
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Canvas ── */
      #canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        cursor: grab;
        display: block;
      }
      #canvas.dragging {
        cursor: grabbing;
      }

      /* ════════════════════════════════
   HUD  — top bar
════════════════════════════════ */
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--hud-h);
        display: flex;
        align-items: center;
        gap: 0;
        background: var(--clr-surface-alt);
        border-bottom: 1px solid var(--clr-border);
        pointer-events: none;
        z-index: 10;
        user-select: none;
      }

      .hud-section {
        display: flex;
        align-items: center;
        height: 100%;
        padding: 0 18px;
        gap: 10px;
        pointer-events: all;
      }
      .hud-section + .hud-section {
        border-left: 1px solid var(--clr-border-soft);
      }
      .hud-section.grow {
        flex: 1;
      }
      .hud-section.center {
        justify-content: center;
      }
      .hud-section.right {
        justify-content: flex-end;
        margin-left: auto;
      }

      /* Dynasty name */
      #hud-dynasty-name {
        font-family: var(--font-display);
        font-size: 19px;
        font-weight: 700;
        color: var(--clr-gold);
        letter-spacing: 0.06em;
      }
      #hud-year {
        font-family: var(--font-display);
        font-size: 14px;
        color: var(--clr-ink-mid);
        font-style: italic;
      }
      #hud-members {
        font-size: 12px;
        color: var(--clr-ink-faint);
      }

      /* Speed controls */
      .speed-btn {
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        padding: 4px 10px;
        background: transparent;
        border: 1px solid var(--clr-border-soft);
        color: var(--clr-ink-faint);
        border-radius: var(--panel-radius);
        cursor: pointer;
        transition: all var(--t-fast);
      }
      .speed-btn:hover {
        background: var(--clr-gold-faint);
        border-color: var(--clr-border);
        color: var(--clr-ink-mid);
      }
      .speed-btn.active {
        background: var(--clr-gold-faint);
        border-color: var(--clr-gold);
        color: var(--clr-gold);
      }

      #speed-label {
        font-size: 11px;
        color: var(--clr-ink-ghost);
        font-style: italic;
      }

      /* Legacy score */
      #hud-legacy-label {
        font-size: 10px;
        color: var(--clr-ink-faint);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      #hud-legacy-val {
        font-family: var(--font-display);
        font-size: 20px;
        font-weight: 700;
        color: var(--clr-ink-mid);
      }

      /* Proposals bell */
      #proposals-btn {
        font-family: var(--font-display);
        font-size: 13px;
        font-weight: 600;
        padding: 5px 14px;
        background: transparent;
        border: 1px solid var(--clr-border);
        color: var(--clr-ink-mid);
        border-radius: var(--panel-radius);
        cursor: pointer;
        transition: all var(--t-fast);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #proposals-btn:hover {
        background: var(--clr-gold-faint);
      }
      #proposals-badge {
        background: var(--clr-bad);
        color: #fff;
        font-size: 10px;
        font-family: var(--font-display);
        font-weight: 700;
        border-radius: 8px;
        padding: 1px 5px;
        display: none;
      }
      #proposals-badge.visible {
        display: inline-block;
      }

      /* Key hints */
      #key-hints {
        font-size: 10px;
        color: var(--clr-ink-ghost);
        font-style: italic;
        pointer-events: none;
      }

      /* ════════════════════════════════
   Event log — bottom right
════════════════════════════════ */
      #event-log {
        position: fixed;
        bottom: 18px;
        right: 18px;
        width: 280px;
        max-height: 200px;
        overflow-y: auto;
        display: flex;
        flex-direction: column-reverse;
        gap: 1px;
        pointer-events: none;
        z-index: 10;
      }
      .ev-item {
        font-size: 12px;
        color: var(--clr-ink-mid);
        line-height: 1.5;
        padding: 3px 8px;
        background: var(--clr-surface);
        border-left: 2px solid var(--clr-ink-ghost);
        border-radius: 0 var(--panel-radius) var(--panel-radius) 0;
        animation: ev-in var(--t-mid) both;
      }
      .ev-item.good {
        border-color: var(--clr-good);
        color: var(--clr-good);
      }
      .ev-item.bad {
        border-color: var(--clr-bad);
        color: var(--clr-bad);
      }
      .ev-item.gold {
        border-color: var(--clr-gold);
        color: var(--clr-gold);
      }
      .ev-year {
        font-size: 10px;
        opacity: 0.55;
        margin-right: 5px;
      }
      @keyframes ev-in {
        from {
          opacity: 0;
          transform: translateX(8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* ════════════════════════════════
   Generic Panel (modals, drawers)
════════════════════════════════ */
      .panel {
        background: var(--clr-surface-alt);
        border: 1px solid var(--clr-border);
        border-radius: var(--panel-radius);
        box-shadow:
          0 4px 32px rgba(30, 22, 10, 0.12),
          0 1px 4px rgba(30, 22, 10, 0.08);
      }
      .panel-title {
        font-family: var(--font-display);
        font-size: 16px;
        font-weight: 700;
        color: var(--clr-ink);
        letter-spacing: 0.06em;
      }
      .panel-sub {
        font-size: 12px;
        color: var(--clr-ink-faint);
        font-style: italic;
        margin-top: 2px;
      }

      /* Close button */
      .btn-close {
        position: absolute;
        top: 10px;
        right: 12px;
        background: none;
        border: none;
        font-size: 20px;
        color: var(--clr-ink-ghost);
        cursor: pointer;
        line-height: 1;
        transition: color var(--t-fast);
      }
      .btn-close:hover {
        color: var(--clr-ink);
      }

      /* ════════════════════════════════
   Overlay backdrop
════════════════════════════════ */
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(30, 22, 10, 0.35);
        display: none;
        z-index: 50;
        cursor: default;
      }
      #overlay.visible {
        display: block;
      }

      /* ════════════════════════════════
   Person Modal
════════════════════════════════ */
      #person-modal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 420px;
        padding: 22px;
        display: none;
        z-index: 60;
        position: fixed;
      }
      #person-modal.visible {
        display: block;
      }

      #pm-avatar {
        float: right;
        margin-left: 14px;
        width: 80px;
        height: 80px;
        border: 1px solid var(--clr-border);
        border-radius: var(--panel-radius);
        background: var(--clr-bg);
      }

      .trait-row {
        display: flex;
        align-items: center;
        margin-bottom: 6px;
        gap: 8px;
      }
      .trait-label {
        font-family: var(--font-display);
        font-size: 11px;
        font-weight: 600;
        color: var(--clr-ink-faint);
        letter-spacing: 0.06em;
        width: 90px;
        flex-shrink: 0;
      }
      .trait-bar {
        flex: 1;
        height: 3px;
        background: var(--clr-bg-deep);
        border-radius: 2px;
        overflow: hidden;
      }
      .trait-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--clr-ink-ghost),
          var(--clr-ink-mid)
        );
        border-radius: 2px;
        transition: width 0.4s ease;
      }
      .trait-val {
        font-size: 11px;
        color: var(--clr-ink-faint);
        width: 26px;
        text-align: right;
      }

      .modal-actions {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .action-btn {
        font-family: var(--font-display);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.05em;
        padding: 5px 13px;
        background: transparent;
        border: 1px solid var(--clr-border);
        color: var(--clr-ink-mid);
        border-radius: var(--panel-radius);
        cursor: pointer;
        transition: all var(--t-fast);
      }
      .action-btn:hover {
        background: var(--clr-gold-faint);
        border-color: var(--clr-gold);
        color: var(--clr-gold);
      }
      .action-btn.danger {
        border-color: rgba(139, 32, 32, 0.35);
        color: var(--clr-bad);
      }
      .action-btn.danger:hover {
        background: rgba(139, 32, 32, 0.08);
      }

      /* ════════════════════════════════
   Proposals Panel
════════════════════════════════ */
      #proposals-panel {
        position: fixed;
        top: calc(var(--hud-h) + 8px);
        right: 18px;
        width: 290px;
        max-height: 340px;
        overflow-y: auto;
        display: none;
        z-index: 20;
        padding: 14px;
      }
      #proposals-panel.visible {
        display: block;
      }

      .proposal-item {
        padding: 10px 0;
        border-bottom: 1px solid var(--clr-border-soft);
      }
      .proposal-item:last-child {
        border-bottom: none;
      }
      .proposal-text {
        font-size: 12.5px;
        color: var(--clr-ink-mid);
        line-height: 1.5;
        margin-bottom: 7px;
      }
      .proposal-text strong {
        color: var(--clr-ink);
      }
      .proposal-btns {
        display: flex;
        gap: 6px;
      }
      .prop-btn {
        font-family: var(--font-display);
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: var(--panel-radius);
        cursor: pointer;
        transition: all var(--t-fast);
      }
      .prop-btn.accept {
        background: rgba(42, 110, 58, 0.1);
        border: 1px solid rgba(42, 110, 58, 0.4);
        color: var(--clr-good);
      }
      .prop-btn.accept:hover {
        background: rgba(42, 110, 58, 0.2);
      }
      .prop-btn.decline {
        background: rgba(139, 32, 32, 0.07);
        border: 1px solid rgba(139, 32, 32, 0.3);
        color: var(--clr-bad);
      }
      .prop-btn.decline:hover {
        background: rgba(139, 32, 32, 0.14);
      }

      /* ════════════════════════════════
   Setup Screen
════════════════════════════════ */
      #setup-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--clr-bg);
        z-index: 100;
      }
      /* decorative background lines */
      #setup-screen::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 39px,
            var(--clr-border-soft) 39px,
            var(--clr-border-soft) 40px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 39px,
            var(--clr-border-soft) 39px,
            var(--clr-border-soft) 40px
          );
        opacity: 0.5;
        pointer-events: none;
      }

      #setup-card {
        position: relative;
        width: 500px;
        padding: 36px 36px 30px;
      }
      .setup-title {
        font-family: var(--font-display);
        font-size: 38px;
        font-weight: 700;
        color: var(--clr-ink);
        letter-spacing: 0.08em;
        text-align: center;
        margin-bottom: 4px;
      }
      .setup-subtitle {
        font-size: 14px;
        font-style: italic;
        color: var(--clr-ink-faint);
        text-align: center;
        margin-bottom: 28px;
      }
      /* horizontal rule ornament */
      .ornament {
        text-align: center;
        font-size: 18px;
        color: var(--clr-gold);
        letter-spacing: 0.5em;
        margin: 10px 0 24px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .form-field {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .form-field.full {
        grid-column: 1 / -1;
      }
      .form-label {
        font-family: var(--font-display);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: var(--clr-ink-faint);
        text-transform: uppercase;
      }
      .form-input,
      .form-select {
        font-family: var(--font-body);
        font-size: 14px;
        padding: 8px 11px;
        background: var(--clr-bg);
        border: 1px solid var(--clr-border);
        color: var(--clr-ink);
        border-radius: var(--panel-radius);
        outline: none;
        transition: border-color var(--t-fast);
      }
      .form-input:focus,
      .form-select:focus {
        border-color: var(--clr-gold);
      }
      .form-select option {
        background: var(--clr-bg);
      }

      .start-btn {
        width: 100%;
        margin-top: 24px;
        font-family: var(--font-display);
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 12px;
        background: var(--clr-ink);
        color: var(--clr-bg);
        border: none;
        border-radius: var(--panel-radius);
        cursor: pointer;
        transition:
          background var(--t-fast),
          transform var(--t-fast);
      }
      .start-btn:hover {
        background: var(--clr-ink-mid);
      }
      .start-btn:active {
        transform: scale(0.99);
      }

      /* ════════════════════════════════
   Milestone banner
════════════════════════════════ */
      #milestone-banner {
        position: fixed;
        top: calc(var(--hud-h) + 16px);
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 28px;
        text-align: center;
        pointer-events: none;
        z-index: 30;
        display: none;
      }
      #milestone-banner.visible {
        display: block;
        animation: ms-anim 3.6s forwards;
      }
      @keyframes ms-anim {
        0% {
          opacity: 0;
          transform: translateX(-50%) translateY(-6px);
        }
        12% {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        80% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      #ms-title {
        font-family: var(--font-display);
        font-size: 15px;
        font-weight: 700;
        color: var(--clr-gold);
        letter-spacing: 0.1em;
      }
      #ms-body {
        font-size: 12px;
        font-style: italic;
        color: var(--clr-ink-mid);
        margin-top: 3px;
      }

      /* ════════════════════════════════
   Scrollbar
════════════════════════════════ */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--clr-ink-ghost);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <!-- ════════════════════════════════════════════
     CANVAS
════════════════════════════════════════════ -->
    <canvas id="canvas"></canvas>

    <!-- ════════════════════════════════════════════
     HUD
════════════════════════════════════════════ -->
    <div id="hud">
      <!-- Left: dynasty info -->
      <div class="hud-section" style="min-width: 200px">
        <span id="hud-dynasty-name">—</span>
        <span id="hud-members" style="display: none"></span>
      </div>

      <!-- Center: year + speed -->
      <div class="hud-section center grow">
        <span id="hud-year" style="margin-right: 14px">—</span>
        <button class="speed-btn" id="btn-pause" title="Pause [Space]">
          ⏸
        </button>
        <button class="speed-btn active" id="btn-s1" title="Speed 1 [1]">
          ×1
        </button>
        <button class="speed-btn" id="btn-s2" title="Speed 2 [2]">×2</button>
        <button class="speed-btn" id="btn-s3" title="Speed 3 [3]">×5</button>
        <button class="speed-btn" id="btn-s4" title="Speed 4 [4]">×10</button>
        <span id="speed-label">— yr/s</span>
      </div>

      <!-- Right: legacy + proposals + hints -->
      <div class="hud-section" style="gap: 16px">
        <div
          style="display: flex; flex-direction: column; align-items: flex-end"
        >
          <span id="hud-legacy-label">Legacy</span>
          <span id="hud-legacy-val">0</span>
        </div>
        <button id="proposals-btn" title="Marriage proposals">
          ⚭ Proposals
          <span id="proposals-badge"></span>
        </button>
        <span id="key-hints">H=home &nbsp;·&nbsp; scroll=zoom</span>
      </div>
    </div>

    <!-- ════════════════════════════════════════════
     EVENT LOG
════════════════════════════════════════════ -->
    <div id="event-log"></div>

    <!-- ════════════════════════════════════════════
     PROPOSALS PANEL
════════════════════════════════════════════ -->
    <div id="proposals-panel" class="panel">
      <div class="panel-title" style="margin-bottom: 10px">⚭ Proposals</div>
      <div id="proposals-list"></div>
    </div>

    <!-- ════════════════════════════════════════════
     OVERLAY
════════════════════════════════════════════ -->
    <div id="overlay"></div>

    <!-- ════════════════════════════════════════════
     PERSON MODAL
════════════════════════════════════════════ -->
    <div id="person-modal" class="panel">
      <button class="btn-close" id="pm-close">×</button>
      <canvas id="pm-avatar"></canvas>
      <div class="panel-title" id="pm-name">—</div>
      <div class="panel-sub" id="pm-sub">—</div>
      <div style="clear: both; margin-top: 12px" id="pm-traits"></div>
      <div class="modal-actions" id="pm-actions"></div>
    </div>

    <!-- ════════════════════════════════════════════
     MILESTONE BANNER
════════════════════════════════════════════ -->
    <div id="milestone-banner" class="panel">
      <div id="ms-title"></div>
      <div id="ms-body"></div>
    </div>

    <!-- ════════════════════════════════════════════
     SETUP SCREEN
════════════════════════════════════════════ -->
    <div id="setup-screen">
      <div id="setup-card" class="panel">
        <h1 class="setup-title">DYNASTY</h1>
        <p class="setup-subtitle">Forge a bloodline. Outlast the centuries.</p>
        <div class="ornament">✦ ✦ ✦</div>

        <div class="form-grid">
          <div class="form-field">
            <label class="form-label" for="in-dynasty">Dynasty Name</label>
            <input
              class="form-input"
              id="in-dynasty"
              value="Aldric"
              maxlength="18"
            />
          </div>
          <div class="form-field">
            <label class="form-label" for="in-founder">Founder's Name</label>
            <input
              class="form-input"
              id="in-founder"
              value="Edmund"
              maxlength="18"
            />
          </div>
          <div class="form-field">
            <label class="form-label" for="in-npc">Rival Houses (2–30)</label>
            <input
              class="form-input"
              id="in-npc"
              type="number"
              value="8"
              min="2"
              max="30"
            />
          </div>
          <div class="form-field">
            <label class="form-label" for="in-year">Starting Year</label>
            <input

      /* ═══════════════════════════════════════════════════════════════
   RNG  — seeded LCG.
   All randomness flows through here so worlds are reproducible.
═══════════════════════════════════════════════════════════════ */
      class RNG {
        static _seed = 12345;

        static setSeed(s) {
          RNG._seed = s >>> 0 || 1;
        }

        /** Returns a float in [0, 1) */
        static next() {
          RNG._seed = (Math.imul(1664525, RNG._seed) + 1013904223) >>> 0;
          return RNG._seed / 0x100000000;
        }

        /** Float in [lo, hi) */
        static float(lo = 0, hi = 1) {
          return lo + RNG.next() * (hi - lo);
        }

        /** Integer in [lo, hi] inclusive */
        static int(lo, hi) {
          return Math.floor(RNG.float(lo, hi + 1 - 1e-9));
        }

        /** Boolean with probability p */
        static bool(p = 0.5) {
          return RNG.next() < p;
        }

        /** Pick a random element from an array */
        static pick(arr) {
          return arr[RNG.int(0, arr.length - 1)];
        }

        /**
         * Box-Muller Gaussian.
         * @param {number} mean
         * @param {number} sd
         */
        static gauss(mean = 0, sd = 1) {
          let u, v, r;
          do {
            u = RNG.float(-1, 1);
            v = RNG.float(-1, 1);
            r = u * u + v * v;
          } while (r === 0 || r >= 1);
          return mean + sd * u * Math.sqrt((-2 * Math.log(r)) / r);
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   GENOME  — diploid loci system.

   Each person carries two alleles (paternal + maternal) per locus.
   Discrete loci: HAIR, EYE, SKIN — dominance determines phenotype.
   Quantitative loci: HEIGHT, HEALTH, INTEL, CHARM, AGGR, FERT
     — phenotype = additive mean of both alleles, with micro-mutations.
═══════════════════════════════════════════════════════════════ */

      // Dominance order: lower index = more dominant
      const HAIR_DOM = [0, 1, 2, 3, 4, 5]; // black, brown, auburn, red, blonde, white
      const EYE_DOM = [0, 1, 2, 3, 4]; // brown, hazel, green, blue, grey
      const SKIN_DOM = [0, 1, 2, 3, 4]; // very-dark … fair (co-dominant → average)

      const HAIR_NAMES = ["Black", "Brown", "Auburn", "Red", "Blonde", "White"];
      const EYE_NAMES = ["Brown", "Hazel", "Green", "Blue", "Grey"];
      const SKIN_NAMES = ["Very Dark", "Dark", "Medium", "Light", "Fair"];

      /** CSS colours matching the phenotype indices above */
      const HAIR_CSS = [
        "#1a1008",
        "#4a2810",
        "#7a3810",
        "#9a2e10",
        "#c8a030",
        "#d0c8b0",
      ];
      const EYE_CSS = ["#5c3810", "#7a5830", "#2e6830", "#2858a0", "#7090a0"];
      const SKIN_CSS = ["#3a2010", "#6a3820", "#a07040", "#c49468", "#f0d8b8"];

      const QUANT_LOCI = ["HEIGHT", "HEALTH", "INTEL", "CHARM", "AGGR", "FERT"];

      class Genome {
        /**
         * @param {Object|null} alleles — if null, generates a random genome
         */
        constructor(alleles = null) {
          this.alleles = alleles ?? Genome._random();
        }

        /** Generate a random diploid genome */
        static _random() {
          const a = {
            HAIR: [RNG.int(0, 5), RNG.int(0, 5)],
            EYE: [RNG.int(0, 4), RNG.int(0, 4)],
            SKIN: [RNG.int(0, 4), RNG.int(0, 4)],
          };
          for (const g of QUANT_LOCI) {
            a[g] = [RNG.float(15, 85), RNG.float(15, 85)];
          }
          return a;
        }

        /**
         * Mendelian cross — one allele from each parent, with mutation.
         * @param {Genome} fg   Father's genome
         * @param {Genome} mg   Mother's genome
         * @returns {Genome}
         */
        static cross(fg, mg) {
          const pa = fg.alleles,
            ma = mg.alleles;
          const child = {};

          for (const locus of Object.keys(pa)) {
            let a0 = pa[locus][RNG.int(0, 1)];
            let a1 = ma[locus][RNG.int(0, 1)];

            // Quantitative loci can mutate
            if (QUANT_LOCI.includes(locus)) {
              if (RNG.bool(CONFIG.GENE_MUTATION_CHANCE))
                a0 = Math.max(
                  0,
                  Math.min(100, a0 + RNG.gauss(0, CONFIG.GENE_MUTATION_SD)),
                );
              if (RNG.bool(CONFIG.GENE_MUTATION_CHANCE))
                a1 = Math.max(
                  0,
                  Math.min(100, a1 + RNG.gauss(0, CONFIG.GENE_MUTATION_SD)),
                );
            }
            child[locus] = [a0, a1];
          }
          return new Genome(child);
        }

        /**
         * Compute observable phenotype from genotype.
         * @returns {Object} phenotype map
         */
        phenotype() {
          const a = this.alleles;

          // Discrete: pick the more dominant allele
          const dominant = (dom, pair) =>
            HAIR_DOM.indexOf(pair[0]) <= HAIR_DOM.indexOf(pair[1])
              ? pair[0]
              : pair[1];

          const hairIdx = dominant(HAIR_DOM, a.HAIR);
          const eyeIdx =
            HAIR_DOM.indexOf(a.EYE[0]) <= HAIR_DOM.indexOf(a.EYE[1])
              ? a.EYE[0]
              : a.EYE[1];
          const skinIdx = Math.round((a.SKIN[0] + a.SKIN[1]) / 2); // co-dominant blend

          // Quantitative: additive mean
          const q = {};
          for (const g of QUANT_LOCI) {
            q[g] = (a[g][0] + a[g][1]) / 2;
          }

          return {
            // Discrete
            hair: hairIdx,
            hairName: HAIR_NAMES[hairIdx],
            hairCss: HAIR_CSS[hairIdx],
            eye: eyeIdx,
            eyeName: EYE_NAMES[eyeIdx],
            eyeCss: EYE_CSS[eyeIdx],
            skin: skinIdx,
            skinName: SKIN_NAMES[skinIdx],
            skinCss: SKIN_CSS[skinIdx],
            // Quantitative (0–100)
            height: q.HEIGHT,
            health: q.HEALTH,
            intel: q.INTEL,
            charm: q.CHARM,
            aggr: q.AGGR,
            fert: q.FERT,
          };
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   PERSON  — pure data object.
   No simulation logic lives here — only computed getters.
═══════════════════════════════════════════════════════════════ */
      let _personId = 0;

      class Person {
        /**
         * @param {Object} opts
         * @param {string}  opts.name
         * @param {'M'|'F'} opts.gender
         * @param {number}  opts.birthYear
         * @param {number}  opts.houseId         — current house (changes on marriage)
         * @param {Genome}  opts.genome
         * @param {number|null} opts.fatherId
         * @param {number|null} opts.motherId
         */
        constructor({
          name,
          gender,
          birthYear,
          houseId,
          genome,
          fatherId = null,
          motherId = null,
        }) {
          this.id = ++_personId;
          this.name = name;
          this.gender = gender;
          this.birthYear = birthYear;
          this.deathYear = null;
          this.houseId = houseId; // current house
          this.birthHouseId = houseId; // natal house (never changes)
          this.genome = genome;
          this.ph = genome.phenotype(); // cached phenotype

          // Relations
          this.fatherId = fatherId;
          this.motherId = motherId;
          this.spouseId = null;
          this.childrenIds = [];

          // Simulation state
          this.lastChildYear = birthYear;

          // Compute lifespan from health trait + difficulty mod
          const mod = CONFIG.DIFFICULTY_MODS[CONFIG.DIFFICULTY];
          this.lifespan = Math.max(
            16,
            (CONFIG.LIFESPAN_BASE + this.ph.health * CONFIG.LIFESPAN_HEALTH) *
              mod.lifespan +
              RNG.gauss(0, CONFIG.LIFESPAN_SD),
          );
        }

        // ── Getters ──────────────────────────────
        get alive() {
          return this.deathYear === null;
        }
        get dead() {
          return this.deathYear !== null;
        }
        get married() {
          return this.spouseId !== null;
        }

        /** Age in current world year */
        age(worldYear) {
          return worldYear - this.birthYear;
        }

        /** Fraction of lifespan consumed */
        lifeFraction(worldYear) {
          return this.age(worldYear) / this.lifespan;
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   HOUSE  — pure data object.
═══════════════════════════════════════════════════════════════ */
      let _houseId = 0;

      class House {
        /**
         * @param {Object} opts
         * @param {string}  opts.name
         * @param {string}  opts.colour    — CSS hex
         * @param {boolean} opts.isPlayer
         */
        constructor({ name, colour, isPlayer = false }) {
          this.id = ++_houseId;
          this.name = name;
          this.colour = colour;
          this.isPlayer = isPlayer;

          // Member registry
          this.memberIds = []; // all members ever (living + dead)
          this.founderId = null;

          // World-space position of this house's tree origin
          this.worldX = 0;
          this.worldY = 0;

          // Coat-of-arms blueprint (used by renderer)
          this.coaPattern = RNG.int(0, 6);
          this.coaCharge = RNG.int(0, 4);
        }

        // ── Computed getters (need World reference passed in) ─────────
        getMembers(world) {
          return this.memberIds
            .map((id) => world.getPerson(id))
            .filter(Boolean);
        }
        getLiving(world) {
          return this.getMembers(world).filter((p) => p.alive);
        }
        getSize(world) {
          return this.getLiving(world).length;
        }
        isExtinct(world) {
          return this.getSize(world) === 0;
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   WORLD  — state container.
   Holds all data. No simulation logic — that belongs to Sim.
═══════════════════════════════════════════════════════════════ */
      class World {
        constructor() {
          this.year = 0;
          this.houses = []; // House[]
          this._persons = new Map(); // id → Person
          this.playerHouseId = null;
          this.proposals = []; // {proposerId, candidateId}[]
          this.legacyScore = 0;
          this.milestonesHit = new Set();
        }

        // ── Person registry ───────────────────────────────────────────
        addPerson(person) {
          this._persons.set(person.id, person);
          const house = this.getHouse(person.houseId);
          if (house && !house.memberIds.includes(person.id)) {
            house.memberIds.push(person.id);
          }
        }

        getPerson(id) {
          return this._persons.get(id) ?? null;
        }
        getAllPersons() {
          return [...this._persons.values()];
        }
        getAllLiving() {
          return this.getAllPersons().filter((p) => p.alive);
        }

        // ── House helpers ─────────────────────────────────────────────
        getHouse(id) {
          return this.houses.find((h) => h.id === id) ?? null;
        }
        getPlayerHouse() {
          return this.getHouse(this.playerHouseId);
        }

        // ── Derived stats ─────────────────────────────────────────────
        get totalLiving() {
          return this.getAllLiving().length;
        }
        get playerSize() {
          return this.getPlayerHouse()?.getSize(this) ?? 0;
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   TREE LAYOUT  — BFS generational placement.
   Pure function: takes a House + World, returns a position map.
   Returns  { [personId]: {x, y} }  in house-local coordinates.
═══════════════════════════════════════════════════════════════ */
      class TreeLayout {
        /**
         * @param {House} house
         * @param {World} world
         * @returns {Object} posMap  { personId → {x, y} }
         */
        static compute(house, world) {
          const members = house.getMembers(world);
          if (!members.length) return {};

          const memberSet = new Set(house.memberIds);
          const genMap = new Map(); // personId → generation
          const visited = new Set();

          // Roots: members with no parent born in this house
          const roots = members.filter((p) => {
            const f = p.fatherId ? world.getPerson(p.fatherId) : null;
            const m = p.motherId ? world.getPerson(p.motherId) : null;
            const fInHouse =
              f && f.birthHouseId === house.id && memberSet.has(f.id);
            const mInHouse =
              m && m.birthHouseId === house.id && memberSet.has(m.id);
            return !fInHouse && !mInHouse;
          });

          // BFS from roots
          const queue = roots.map((r) => ({ person: r, gen: 0 }));
          for (let i = 0; i < queue.length; i++) {
            const { person, gen } = queue[i];
            if (visited.has(person.id)) continue;
            visited.add(person.id);
            genMap.set(person.id, gen);

            // Spouse shares generation
            if (person.spouseId) {
              const sp = world.getPerson(person.spouseId);
              if (sp && memberSet.has(sp.id) && !visited.has(sp.id)) {
                queue.push({ person: sp, gen });
              }
            }

            // Children one generation down
            for (const cid of person.childrenIds) {
              const child = world.getPerson(cid);
              if (child && memberSet.has(cid) && !visited.has(cid)) {
                queue.push({ person: child, gen: gen + 1 });
              }
            }
          }

          // Assign generation 0 to anyone not reached (e.g. disconnected branches)
          for (const p of members) {
            if (!genMap.has(p.id)) genMap.set(p.id, 0);
          }

          // Group by generation
          const byGen = new Map();
          for (const p of members) {
            const g = genMap.get(p.id);
            if (!byGen.has(g)) byGen.set(g, []);
            byGen.get(g).push(p);
          }

          // Assign (x, y) positions
          const CW = CONFIG.CARD_W + CONFIG.H_GAP;
          const CH = CONFIG.CARD_H + CONFIG.V_GAP;
          const posMap = {};

          for (const [gen, persons] of byGen) {
            const totalWidth = persons.length * CW - CONFIG.H_GAP;
            persons.forEach((p, i) => {
              posMap[p.id] = {
                x: i * CW - totalWidth / 2,
                y: gen * CH,
              };
            });
          }

          return posMap;
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   RENDERER  — draws the world onto the canvas.
   Owns its own Camera.  Reads World + TreeLayout data.
   No simulation logic here.
═══════════════════════════════════════════════════════════════ */
      class Camera {
        constructor() {
          this.x = 0; // world-space centre
          this.y = 0;
          this.z = 0.3; // zoom (1 = 1:1)
        }

        /** World-space → screen-space */
        toScreen(wx, wy, canvasW, canvasH) {
          return {
            x: (wx - this.x) * this.z + canvasW / 2,
            y: (wy - this.y) * this.z + canvasH / 2,
          };
        }

        /** Screen-space → world-space */
        toWorld(sx, sy, canvasW, canvasH) {
          return {
            x: (sx - canvasW / 2) / this.z + this.x,
            y: (sy - canvasH / 2) / this.z + this.y,
          };
        }

        /** Zoom toward a screen-space anchor point */
        zoomAt(factor, sx, sy, canvasW, canvasH) {
          const before = this.toWorld(sx, sy, canvasW, canvasH);
          this.z = Math.max(
            CONFIG.ZOOM_MIN,
            Math.min(CONFIG.ZOOM_MAX, this.z * factor),
          );
          const after = this.toWorld(sx, sy, canvasW, canvasH);
          this.x += before.x - after.x;
          this.y += before.y - after.y;
        }

        /** Pan by delta in screen pixels */
        pan(dx, dy) {
          this.x -= dx / this.z;
          this.y -= dy / this.z;
        }
      }

      class Renderer {
        /**
         * @param {HTMLCanvasElement} canvas
         */
        constructor(canvas) {
          this.canvas = canvas;
          this.ctx = canvas.getContext("2d");
          this.camera = new Camera();

          // Layout cache: { [houseId]: { [personId]: {x,y} } }
          this._layoutCache = {};
          this._layoutDirty = true;

          this._resize();
          window.addEventListener("resize", () => this._resize());
        }

        _resize() {
          this.canvas.width = window.innerWidth;
          this.canvas.height = window.innerHeight;
        }

        markDirty() {
          this._layoutDirty = true;
        }

        /** Recompute tree layouts for all houses */
        rebuildLayouts(world) {
          for (const house of world.houses) {
            this._layoutCache[house.id] = TreeLayout.compute(house, world);
          }
          this._layoutDirty = false;
        }

        /** Returns position map for a house (world-local coords) */
        getLayout(houseId) {
          return this._layoutCache[houseId] ?? {};
        }

        // ── Hit-testing ───────────────────────────────────────────────
        /**
         * Returns the Person under screen position (sx, sy), or null.
         */
        hitTest(sx, sy, world) {
          const { x: wx, y: wy } = this.camera.toWorld(
            sx,
            sy,
            this.canvas.width,
            this.canvas.height,
          );
          const hw = CONFIG.CARD_W / 2,
            hh = CONFIG.CARD_H / 2;

          for (const house of world.houses) {
            const layout = this.getLayout(house.id);
            for (const [pidStr, pos] of Object.entries(layout)) {
              const cx = house.worldX + pos.x;
              const cy = house.worldY + pos.y;
              if (
                wx >= cx - hw &&
                wx <= cx + hw &&
                wy >= cy - hh &&
                wy <= cy + hh
              ) {
                return world.getPerson(Number(pidStr));
              }
            }
          }
          return null;
        }

        // ── Main draw ─────────────────────────────────────────────────
        draw(world) {
          if (!world) return;
          if (this._layoutDirty) this.rebuildLayouts(world);

          const { ctx, canvas } = this;
          const W = canvas.width,
            H = canvas.height;
          ctx.clearRect(0, 0, W, H);

          this._drawBackground(W, H);
          this._drawGrid(W, H);

          // Draw player house last (on top)
          const sorted = [...world.houses].sort((a, b) =>
            a.isPlayer ? 1 : b.isPlayer ? -1 : 0,
          );
          for (const house of sorted) {
            this._drawHouse(house, world, W, H);
          }
        }

        // ── Background ───────────────────────────────────────────────
        _drawBackground(W, H) {
          const { ctx } = this;
          ctx.fillStyle = "#f2ead8";
          ctx.fillRect(0, 0, W, H);
        }

        // ── Grid ─────────────────────────────────────────────────────
        _drawGrid(W, H) {
          const { ctx, camera } = this;
          const gs = 400;
          const tl = camera.toWorld(0, 0, W, H);
          const br = camera.toWorld(W, H, W, H);

          ctx.save();
          ctx.strokeStyle = "rgba(176,125,24,0.10)";
          ctx.lineWidth = 1;
          ctx.setLineDash([2, 6]);

          const sx = Math.floor(tl.x / gs) * gs;
          const sy = Math.floor(tl.y / gs) * gs;

          for (let wx = sx; wx < br.x + gs; wx += gs) {
            const p = camera.toScreen(wx, 0, W, H);
            ctx.beginPath();
            ctx.moveTo(p.x, 0);
            ctx.lineTo(p.x, H);
            ctx.stroke();
          }
          for (let wy = sy; wy < br.y + gs; wy += gs) {
            const p = camera.toScreen(0, wy, W, H);
            ctx.beginPath();
            ctx.moveTo(0, p.y);
            ctx.lineTo(W, p.y);
            ctx.stroke();
          }
          ctx.setLineDash([]);
          ctx.restore();
        }

        // ── House cluster ─────────────────────────────────────────────
        _drawHouse(house, world, W, H) {
          const { ctx, camera } = this;
          const z = camera.z;

          const layout = this.getLayout(house.id);
          const members = house.getMembers(world);
          if (!members.length) return;

          // Cull entire house if its centre is far off-screen
          const origin = camera.toScreen(house.worldX, house.worldY, W, H);
          if (
            origin.x < -3000 ||
            origin.x > W + 3000 ||
            origin.y < -3000 ||
            origin.y > H + 3000
          )
            return;

          // ── House label ───────────────────────────────────────────
          if (z > 0.1) {
            const fontSize = Math.max(9, Math.min(18, z * 42));
            ctx.save();
            ctx.font = `600 ${fontSize}px 'Cormorant Garamond', serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = house.isPlayer
              ? house.colour
              : this._hexAlpha(house.colour, 0.6);

            ctx.fillText(`House ${house.name}`, origin.x, origin.y - 54 * z);

            const living = house.getSize(world);
            ctx.font = `italic ${fontSize * 0.65}px 'IM Fell English', serif`;
            ctx.fillStyle = house.isExtinct(world)
              ? "rgba(139,32,32,0.55)"
              : "rgba(74,56,32,0.5)";
            ctx.fillText(
              house.isExtinct(world)
                ? "— extinct —"
                : `${living} member${living !== 1 ? "s" : ""}`,
              origin.x,
              origin.y - 38 * z,
            );
            ctx.restore();
          }

          // ── Connectors ───────────────────────────────────────────
          for (const person of members) {
            const pp = layout[person.id];
            if (!pp) continue;
            const ps = camera.toScreen(
              house.worldX + pp.x,
              house.worldY + pp.y,
              W,
              H,
            );

            // Parent → child lines
            for (const cid of person.childrenIds) {
              const cp = layout[cid];
              if (!cp) continue;
              const cs = camera.toScreen(
                house.worldX + cp.x,
                house.worldY + cp.y,
                W,
                H,
              );

              const halfCard = (CONFIG.CARD_H / 2) * z;
              const midY = (ps.y + cs.y) / 2;

              ctx.save();
              ctx.strokeStyle = house.isPlayer
                ? "rgba(139,94,26,0.25)"
                : "rgba(74,56,32,0.15)";
              ctx.lineWidth = Math.max(0.5, z * 1.2);
              ctx.beginPath();
              ctx.moveTo(ps.x, ps.y + halfCard);
              ctx.lineTo(ps.x, midY);
              ctx.lineTo(cs.x, midY);
              ctx.lineTo(cs.x, cs.y - halfCard);
              ctx.stroke();
              ctx.restore();
            }

            // Spouse connector (M side only, to avoid double-draw)
            if (person.spouseId && person.gender === "M") {
              const sp = layout[person.spouseId];
              if (sp) {
                const ss = camera.toScreen(
                  house.worldX + sp.x,
                  house.worldY + sp.y,
                  W,
                  H,
                );
                const halfCard = (CONFIG.CARD_W / 2) * z;
                ctx.save();
                ctx.strokeStyle = "rgba(139,32,32,0.28)";
                ctx.lineWidth = Math.max(0.4, z * 0.9);
                ctx.setLineDash([4 * z, 3 * z]);
                ctx.beginPath();
                ctx.moveTo(ps.x + halfCard, ps.y);
                ctx.lineTo(ss.x - halfCard, ss.y);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
              }
            }
          }

          // ── Cards (drawn after connectors) ────────────────────────
          for (const person of members) {
            const pp = layout[person.id];
            if (!pp) continue;

            const sc = camera.toScreen(
              house.worldX + pp.x,
              house.worldY + pp.y,
              W,
              H,
            );

            // Card-level cull
            const cw = CONFIG.CARD_W * z,
              ch = CONFIG.CARD_H * z;
            if (
              sc.x + cw / 2 < 0 ||
              sc.x - cw / 2 > W ||
              sc.y + ch / 2 < 0 ||
              sc.y - ch / 2 > H
            )
              continue;

            this._drawCard(person, sc.x, sc.y, house, world, z);
          }
        }

        // ── Card ─────────────────────────────────────────────────────
        _drawCard(person, cx, cy, house, world, z) {
          const { ctx } = this;
          const cw = CONFIG.CARD_W * z;
          const ch = CONFIG.CARD_H * z;
          const x = cx - cw / 2;
          const y = cy - ch / 2;
          const r = 4 * z;

          // Below ~14px wide just draw a dot
          if (cw < 14) {
            ctx.fillStyle = person.dead ? "rgba(139,94,26,0.25)" : house.colour;
            ctx.beginPath();
            ctx.arc(cx, cy, Math.max(2, cw / 3), 0, Math.PI * 2);
            ctx.fill();
            return;
          }

          ctx.save();

          // Drop shadow
          if (z > 0.2) {
            ctx.shadowColor = "rgba(30,22,10,0.14)";
            ctx.shadowBlur = 8 * z;
            ctx.shadowOffsetY = 2 * z;
          }

          // Card fill
          ctx.fillStyle = person.dead
            ? "rgba(232,223,197,0.70)"
            : house.isPlayer
              ? "#fdf8ee"
              : "#f8f3e8";
          this._rrect(x, y, cw, ch, r);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.shadowOffsetY = 0;

          // Card border
          ctx.strokeStyle = person.dead
            ? "rgba(139,94,26,0.22)"
            : house.isPlayer
              ? this._hexAlpha(house.colour, 0.75)
              : this._hexAlpha(house.colour, 0.45);
          ctx.lineWidth = Math.max(0.5, z * (house.isPlayer ? 1.8 : 1.1));
          this._rrect(x, y, cw, ch, r);
          ctx.stroke();

          // CoA watermark (only when card large enough)
          if (z > 0.18) {
            this._drawCoA(ctx, x, y, cw, ch, house, person.dead, z);
          }

          // Face avatar
          if (z > 0.14) {
            this._drawFace(
              ctx,
              x + cw * 0.05,
              y + ch * 0.08,
              ch * 0.6,
              person,
              person.dead,
            );
          }

          // Text
          if (z > 0.16) {
            const nameSize = Math.max(5, z * 9);
            const subSize = Math.max(4, z * 7.5);
            const textX = x + cw * 0.43;

            ctx.fillStyle = person.dead
              ? "rgba(139,94,26,0.55)"
              : "rgba(30,22,10,0.90)";
            ctx.font = `600 ${nameSize}px 'Cormorant Garamond', serif`;
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";

            const displayName =
              person.name.length > 9
                ? person.name.slice(0, 9) + "."
                : person.name;
            ctx.fillText(displayName, textX, y + ch * 0.3);

            ctx.fillStyle = "rgba(74,56,32,0.65)";
            ctx.font = `italic ${subSize}px 'IM Fell English', serif`;
            const ageStr = person.dead
              ? `✝ ${Math.floor(person.age(world.year))}`
              : `${Math.floor(person.age(world.year))} yrs`;
            ctx.fillText(ageStr, textX, y + ch * 0.5);

            // Gender glyph
            const gColour =
              person.gender === "M"
                ? "rgba(30,79,139,0.65)"
                : "rgba(139,30,72,0.65)";
            ctx.fillStyle = gColour;
            ctx.font = `${subSize * 1.4}px serif`;
            ctx.fillText(
              person.gender === "M" ? "♂" : "♀",
              textX + cw * 0.32,
              y + ch * 0.5,
            );

            // Status icons
            if (z > 0.3) {
              let ix = x + cw * 0.06,
                iy = y + ch * 0.85;
              const isz = z * 7;
              ctx.font = `${isz}px serif`;

              if (person.married) {
                ctx.fillStyle = "rgba(139,32,32,0.7)";
                ctx.fillText("♥", ix, iy);
                ix += isz * 1.4;
              }
              if (person.ph.health < 30) {
                ctx.fillStyle = "rgba(139,32,32,0.7)";
                ctx.fillText("☠", ix, iy);
                ix += isz * 1.4;
              }
              if (person.ph.intel > 75) {
                ctx.fillStyle = "rgba(30,79,139,0.65)";
                ctx.fillText("✦", ix, iy);
                ix += isz * 1.4;
              }
              if (person.childrenIds.length > 0) {
                ctx.fillStyle = "rgba(42,110,58,0.65)";
                ctx.font = `${isz * 0.85}px 'Cormorant Garamond', serif`;
                ctx.fillText(`⚘${person.childrenIds.length}`, ix, iy);
              }
            }
          }

          ctx.restore();
        }

        // ── Coat of Arms watermark ────────────────────────────────────
        _drawCoA(ctx, x, y, cw, ch, house, dead, z) {
          ctx.save();
          ctx.globalAlpha = dead ? 0.04 : 0.1;
          ctx.fillStyle = house.colour;
          ctx.strokeStyle = house.colour;

          const cx_ = x + cw / 2,
            cy_ = y + ch / 2;
          const sz = Math.min(cw, ch) * 0.38;
          ctx.lineWidth = sz * 0.13;

          switch (house.coaPattern) {
            case 0: // Cross
              ctx.fillRect(
                cx_ - sz * 0.08,
                cy_ - sz * 0.45,
                sz * 0.16,
                sz * 0.9,
              );
              ctx.fillRect(
                cx_ - sz * 0.45,
                cy_ - sz * 0.08,
                sz * 0.9,
                sz * 0.16,
              );
              break;
            case 1: // Diamond
              ctx.beginPath();
              ctx.moveTo(cx_, cy_ - sz * 0.48);
              ctx.lineTo(cx_ + sz * 0.38, cy_);
              ctx.lineTo(cx_, cy_ + sz * 0.48);
              ctx.lineTo(cx_ - sz * 0.38, cy_);
              ctx.closePath();
              ctx.fill();
              break;
            case 2: // Chevron
              ctx.beginPath();
              ctx.moveTo(cx_ - sz * 0.45, cy_ + sz * 0.2);
              ctx.lineTo(cx_, cy_ - sz * 0.28);
              ctx.lineTo(cx_ + sz * 0.45, cy_ + sz * 0.2);
              ctx.stroke();
              break;
            case 3: // Three circles (orbs)
              for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.arc(
                  cx_ + (i - 1) * sz * 0.34,
                  cy_,
                  sz * 0.12,
                  0,
                  Math.PI * 2,
                );
                ctx.fill();
              }
              break;
            case 4: // Star
              this._star(ctx, cx_, cy_, 5, sz * 0.42, sz * 0.18);
              ctx.fill();
              break;
            case 5: // Saltire (X)
              ctx.beginPath();
              ctx.moveTo(cx_ - sz * 0.38, cy_ - sz * 0.38);
              ctx.lineTo(cx_ + sz * 0.38, cy_ + sz * 0.38);
              ctx.stroke();
              ctx.beginPath();
              ctx.moveTo(cx_ + sz * 0.38, cy_ - sz * 0.38);
              ctx.lineTo(cx_ - sz * 0.38, cy_ + sz * 0.38);
              ctx.stroke();
              break;
            case 6: // Pile (triangle)
              ctx.beginPath();
              ctx.moveTo(cx_, cy_ - sz * 0.45);
              ctx.lineTo(cx_ + sz * 0.4, cy_ + sz * 0.35);
              ctx.lineTo(cx_ - sz * 0.4, cy_ + sz * 0.35);
              ctx.closePath();
              ctx.fill();
              break;
          }
          ctx.restore();
        }

        // ── Face ─────────────────────────────────────────────────────
        _drawFace(ctx, x, y, sz, person, dead) {
          const { hairCss, eyeCss, skinCss } = person.ph;
          ctx.save();
          if (dead) ctx.globalAlpha = 0.45;

          // Neck
          ctx.fillStyle = skinCss;
          ctx.fillRect(x + sz * 0.33, y + sz * 0.6, sz * 0.14, sz * 0.22);

          // Head
          ctx.fillStyle = skinCss;
          ctx.beginPath();
          ctx.ellipse(
            x + sz * 0.4,
            y + sz * 0.36,
            sz * 0.25,
            sz * 0.29,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();

          // Hair
          ctx.fillStyle = hairCss;
          if (person.gender === "M") {
            ctx.beginPath();
            ctx.ellipse(
              x + sz * 0.4,
              y + sz * 0.19,
              sz * 0.25,
              sz * 0.13,
              0,
              Math.PI,
              0,
              true,
            );
            ctx.fill();
          } else {
            ctx.beginPath();
            ctx.ellipse(
              x + sz * 0.4,
              y + sz * 0.17,
              sz * 0.3,
              sz * 0.16,
              0,
              Math.PI,
              0,
              true,
            );
            ctx.fill();
            ctx.fillRect(x + sz * 0.12, y + sz * 0.16, sz * 0.08, sz * 0.32);
            ctx.fillRect(x + sz * 0.55, y + sz * 0.16, sz * 0.08, sz * 0.32);
          }

          // Ears
          ctx.fillStyle = skinCss;
          ctx.beginPath();
          ctx.ellipse(
            x + sz * 0.14,
            y + sz * 0.36,
            sz * 0.05,
            sz * 0.07,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(
            x + sz * 0.66,
            y + sz * 0.36,
            sz * 0.05,
            sz * 0.07,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();

          // Eyes
          ctx.fillStyle = eyeCss;
          ctx.beginPath();
          ctx.ellipse(
            x + sz * 0.28,
            y + sz * 0.35,
            sz * 0.07,
            sz * 0.05,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(
            x + sz * 0.52,
            y + sz * 0.35,
            sz * 0.07,
            sz * 0.05,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();

          // Pupils
          ctx.fillStyle = "rgba(0,0,0,0.75)";
          ctx.beginPath();
          ctx.arc(x + sz * 0.28, y + sz * 0.35, sz * 0.033, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(x + sz * 0.52, y + sz * 0.35, sz * 0.033, 0, Math.PI * 2);
          ctx.fill();

          // Eyebrows
          ctx.strokeStyle = hairCss;
          ctx.lineWidth = sz * 0.022;
          ctx.beginPath();
          ctx.moveTo(x + sz * 0.21, y + sz * 0.26);
          ctx.lineTo(x + sz * 0.35, y + sz * 0.24);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + sz * 0.45, y + sz * 0.24);
          ctx.lineTo(x + sz * 0.59, y + sz * 0.26);
          ctx.stroke();

          // Nose
          ctx.strokeStyle = "rgba(0,0,0,0.18)";
          ctx.lineWidth = sz * 0.018;
          ctx.beginPath();
          ctx.arc(
            x + sz * 0.4,
            y + sz * 0.45,
            sz * 0.06,
            0.1 * Math.PI,
            0.9 * Math.PI,
          );
          ctx.stroke();

          // Mouth
          ctx.strokeStyle = "rgba(0,0,0,0.30)";
          ctx.lineWidth = sz * 0.022;
          ctx.beginPath();
          ctx.arc(
            x + sz * 0.4,
            y + sz * 0.52,
            sz * 0.09,
            0.15 * Math.PI,
            0.85 * Math.PI,
          );
          ctx.stroke();

          // Collar / body
          ctx.fillStyle = person.gender === "M" ? "#2a3a6a" : "#6a2a38";
          ctx.beginPath();
          ctx.moveTo(x + sz * 0.18, y + sz * 0.82);
          ctx.lineTo(x + sz * 0.62, y + sz * 0.82);
          ctx.lineTo(x + sz * 0.7, y + sz * 1.0);
          ctx.lineTo(x + sz * 0.1, y + sz * 1.0);
          ctx.closePath();
          ctx.fill();

          ctx.restore();
        }

        // ── Helpers ───────────────────────────────────────────────────
        _rrect(x, y, w, h, r) {
          const ctx = this.ctx;
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.arcTo(x + w, y, x + w, y + r, r);
          ctx.lineTo(x + w, y + h - r);
          ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
          ctx.lineTo(x + r, y + h);
          ctx.arcTo(x, y + h, x, y + h - r, r);
          ctx.lineTo(x, y + r);
          ctx.arcTo(x, y, x + r, y, r);
          ctx.closePath();
        }

        _star(ctx, cx, cy, pts, ro, ri) {
          ctx.beginPath();
          for (let i = 0; i < pts * 2; i++) {
            const r = i % 2 === 0 ? ro : ri;
            const a = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
            i === 0
              ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
              : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
          }
          ctx.closePath();
        }

        _hexAlpha(hex, alpha) {
          if (!hex || hex.length < 7) return `rgba(139,94,26,${alpha})`;
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          return `rgba(${r},${g},${b},${alpha})`;
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   SIM  — year-tick simulation engine.
   All game logic lives here.  Mutates World.
═══════════════════════════════════════════════════════════════ */
      class Sim {
        /**
         * @param {World}   world
         * @param {function(string, string)} logFn   (message, type)
         */
        constructor(world, logFn) {
          this.world = world;
          this._log = logFn; // (msg, type='n'|'good'|'bad'|'gold') → void
        }

        /** Advance the simulation by one year. */
        tick() {
          const W = this.world;
          W.year++;
          const mod = CONFIG.DIFFICULTY_MODS[CONFIG.DIFFICULTY];

          this._processDeaths(mod);
          this._processBirths(mod);
          this._npcBehaviour(mod);
          this._generateProposals();
          this._checkMilestones();
          this._updateScore();
        }

        // ── Deaths ────────────────────────────────────────────────────
        _processDeaths(mod) {
          const W = this.world;
          for (const p of W.getAllLiving()) {
            // Skip sandbox-immortal player members
            if (
              CONFIG.DIFFICULTY === "sandbox" &&
              p.birthHouseId === W.playerHouseId
            )
              continue;

            const frac = p.lifeFraction(W.year);

            // Natural death at end of lifespan
            if (frac >= 1) {
              this._kill(p, "age");
              continue;
            }

            // Age-weighted illness risk
            if (frac > 0.7 && p.age(W.year) > 2) {
              const risk = ((1 - p.ph.health / 100) * 0.006) / mod.lifespan;
              if (RNG.bool(risk)) {
                this._kill(p, "illness");
              }
            }
          }
        }

        _kill(person, cause) {
          const W = this.world;
          person.deathYear = W.year;

          // Dissolve marriage
          if (person.spouseId) {
            const sp = W.getPerson(person.spouseId);
            if (sp) sp.spouseId = null;
            person.spouseId = null;
          }

          // Log if player house
          const ph = W.getPlayerHouse();
          if (ph && ph.memberIds.includes(person.id)) {
            const msg =
              cause === "illness"
                ? `${person.name} perished of illness, aged ${Math.floor(person.age(W.year))}.`
                : `${person.name} passed away peacefully, aged ${Math.floor(person.age(W.year))}.`;
            this._log(msg, "bad");
          }
        }

        // ── Births ────────────────────────────────────────────────────
        _processBirths(mod) {
          const W = this.world;
          for (const mother of W.getAllLiving()) {
            if (mother.gender !== "F" || !mother.married) continue;
            const father = W.getPerson(mother.spouseId);
            if (!father || !father.alive) continue;

            const age = mother.age(W.year);
            if (age < 14 || age > 46) continue;
            if (W.year - mother.lastChildYear < CONFIG.CHILD_GAP_YRS) continue;

            const prob =
              (mother.ph.fert / 100) * CONFIG.FERTILITY_BASE * mod.fertility;
            if (!RNG.bool(prob)) continue;

            this._birth(mother, father);
          }
        }

        _birth(mother, father) {
          const W = this.world;
          const gender = RNG.bool(0.5) ? "M" : "F";
          const genome = Genome.cross(father.genome, mother.genome);

          const child = new Person({
            name: RNG.pick(gender === "M" ? NAMES.male : NAMES.female),
            gender,
            birthYear: W.year,
            houseId: father.houseId,
            genome,
            fatherId: father.id,
            motherId: mother.id,
          });

          W.addPerson(child);
          mother.childrenIds.push(child.id);
          father.childrenIds.push(child.id);
          mother.lastChildYear = W.year;

          // Log if player house involvement
          const ph = W.getPlayerHouse();
          if (
            ph &&
            (ph.memberIds.includes(father.id) ||
              ph.memberIds.includes(mother.id))
          ) {
            this._log(
              `${child.name} born to ${mother.name} & ${father.name}.`,
              "good",
            );
            W.legacyScore += 50;
          }
        }

        // ── NPC Behaviour ─────────────────────────────────────────────
        _npcBehaviour(mod) {
          const W = this.world;
          for (const house of W.houses) {
            if (house.isPlayer) continue;

            // Intra-house marriages
            this._npcIntraMarry(house, mod);

            // Revive extinct houses occasionally
            if (house.isExtinct(W) && RNG.bool(0.04)) {
              this._npcSeedHouse(house);
            }
          }

          // Cross-house NPC marriages
          if (RNG.bool(0.15 * mod.npcActivity)) {
            this._npcCrossMarry();
          }
        }

        _npcIntraMarry(house, mod) {
          const W = this.world;
          const living = house.getLiving(W);
          const singles = living.filter(
            (p) =>
              !p.married &&
              p.age(W.year) >= CONFIG.MARRY_AGE_MIN &&
              p.age(W.year) <= CONFIG.MARRY_AGE_MAX,
          );

          for (const s of singles) {
            if (!RNG.bool(0.06 * mod.npcActivity)) continue;
            // Find a spouse candidate in any other house
            const candidates = this._findSpouseCandidates(s);
            if (candidates.length) {
              this._doMarry(s, RNG.pick(candidates));
            }
          }
        }

        _npcCrossMarry() {
          const W = this.world;
          const npcHouses = W.houses.filter(
            (h) => !h.isPlayer && !h.isExtinct(W),
          );
          if (npcHouses.length < 2) return;

          const h1 = RNG.pick(npcHouses);
          const h2 = RNG.pick(npcHouses.filter((h) => h.id !== h1.id));

          const singles1 = h1
            .getLiving(W)
            .filter((p) => !p.married && p.age(W.year) >= CONFIG.MARRY_AGE_MIN);
          const singles2 = h2
            .getLiving(W)
            .filter((p) => !p.married && p.age(W.year) >= CONFIG.MARRY_AGE_MIN);

          for (const a of singles1) {
            const partner = singles2.find(
              (b) => b.gender !== a.gender && !b.married,
            );
            if (partner) {
              this._doMarry(a, partner);
              break;
            }
          }
        }

        _npcSeedHouse(house) {
          const W = this.world;
          const gender = RNG.bool(0.5) ? "M" : "F";
          const p = new Person({
            name: RNG.pick(gender === "M" ? NAMES.male : NAMES.female),
            gender,
            birthYear: W.year - RNG.int(22, 40),
            houseId: house.id,
            genome: new Genome(),
          });
          W.addPerson(p);
          if (!house.founderId) house.founderId = p.id;
        }

        // ── Marriages ─────────────────────────────────────────────────
        _doMarry(p1, p2) {
          if (p1.married || p2.married) return;

          p1.spouseId = p2.id;
          p2.spouseId = p1.id;

          // Wife moves to husband's house
          const W = this.world;
          const wife = p1.gender === "F" ? p1 : p2;
          const husb = p1.gender === "M" ? p1 : p2;

          if (wife.houseId !== husb.houseId) {
            const oldHouse = W.getHouse(wife.houseId);
            if (oldHouse)
              oldHouse.memberIds = oldHouse.memberIds.filter(
                (id) => id !== wife.id,
              );
            wife.houseId = husb.houseId;
            const newHouse = W.getHouse(husb.houseId);
            if (newHouse && !newHouse.memberIds.includes(wife.id)) {
              newHouse.memberIds.push(wife.id);
            }
          }
        }

        acceptProposal(proposerId, candidateId) {
          const W = this.world;
          const a = W.getPerson(proposerId);
          const b = W.getPerson(candidateId);
          if (!a || !b || a.married || b.married) return false;

          this._doMarry(a, b);
          W.proposals = W.proposals.filter(
            (pr) =>
              !(pr.proposerId === proposerId && pr.candidateId === candidateId),
          );

          const bh = W.getHouse(b.birthHouseId);
          this._log(
            `${a.name} wed ${b.name} of House ${bh?.name ?? "?"}.`,
            "gold",
          );
          W.legacyScore += 30;
          return true;
        }

        arrangeMarriage(playerId, candidateId) {
          const W = this.world;
          const a = W.getPerson(playerId);
          const b = W.getPerson(candidateId);
          if (!a || !b || a.married || b.married) return false;

          this._doMarry(a, b);
          const bh = W.getHouse(b.birthHouseId);
          this._log(
            `${a.name} wed ${b.name} of House ${bh?.name ?? "?"}.`,
            "gold",
          );
          W.legacyScore += 30;
          return true;
        }

        _findSpouseCandidates(person) {
          const W = this.world;
          const results = [];
          for (const house of W.houses) {
            if (house.id === person.houseId) continue;
            for (const p of house.getLiving(W)) {
              if (
                p.gender !== person.gender &&
                !p.married &&
                p.age(W.year) >= CONFIG.MARRY_AGE_MIN &&
                p.age(W.year) <= CONFIG.MARRY_AGE_MAX
              ) {
                results.push(p);
              }
            }
          }
          return results;
        }

        // ── Proposals ─────────────────────────────────────────────────
        _generateProposals() {
          const W = this.world;
          if (!RNG.bool(0.1)) return;

          const ph = W.getPlayerHouse();
          if (!ph) return;

          const pSingles = ph
            .getLiving(W)
            .filter(
              (p) =>
                !p.married &&
                p.age(W.year) >= CONFIG.MARRY_AGE_MIN &&
                p.age(W.year) <= CONFIG.MARRY_AGE_MAX,
            );
          if (!pSingles.length) return;

          const target = RNG.pick(pSingles);

          for (const house of W.houses) {
            if (house.isPlayer || house.isExtinct(W)) continue;
            const cands = house
              .getLiving(W)
              .filter(
                (p) =>
                  p.gender !== target.gender &&
                  !p.married &&
                  p.age(W.year) >= CONFIG.MARRY_AGE_MIN &&
                  p.age(W.year) <= CONFIG.MARRY_AGE_MAX,
              );
            if (!cands.length) continue;
            if (!RNG.bool(0.3)) continue;

            const cand = RNG.pick(cands);
            const dup = W.proposals.some(
              (pr) =>
                (pr.proposerId === target.id && pr.candidateId === cand.id) ||
                (pr.proposerId === cand.id && pr.candidateId === target.id),
            );
            if (!dup) {
              W.proposals.push({ proposerId: target.id, candidateId: cand.id });
              break;
            }
          }
        }

        // ── Milestones ────────────────────────────────────────────────
        _checkMilestones() {
          const W = this.world;
          const age = W.year - CONFIG.START_YEAR;
          const ph = W.getPlayerHouse();

          for (const ms of CONFIG.MILESTONES) {
            if (age >= ms && !W.milestonesHit.has(ms)) {
              W.milestonesHit.add(ms);
              W.legacyScore += ms * 12;
              this._log(`Dynasty milestone: ${ms} years survived!`, "gold");
              return { milestone: ms, size: ph?.getSize(W) ?? 0 };
            }
          }
          return null;
        }

        // ── Score ─────────────────────────────────────────────────────
        _updateScore() {
          const ph = this.world.getPlayerHouse();
          if (ph && !ph.isExtinct(this.world)) {
            this.world.legacyScore += ph.getSize(this.world) * 0.4;
          }
        }

        // ── Win / Lose ────────────────────────────────────────────────
        checkConditions() {
          const W = this.world;
          const ph = W.getPlayerHouse();

          // Loss: extinction
          if (ph && ph.isExtinct(W)) return "extinction";

          // Win: gene dominance
          const all = W.getAllLiving();
          if (!all.length) return null;

          const withBlood = all.filter((p) =>
            this._hasPlayerBlood(p, W, new Map()),
          ).length;
          if ((withBlood / all.length) * 100 >= CONFIG.WIN_DOMINANCE)
            return "dominance";

          return null;
        }

        _hasPlayerBlood(person, world, cache) {
          if (cache.has(person.id)) return cache.get(person.id);
          if (person.birthHouseId === world.playerHouseId) {
            cache.set(person.id, true);
            return true;
          }

          const f = person.fatherId ? world.getPerson(person.fatherId) : null;
          const m = person.motherId ? world.getPerson(person.motherId) : null;
          const r =
            (f && this._hasPlayerBlood(f, world, cache)) ||
            (m && this._hasPlayerBlood(m, world, cache));
          cache.set(person.id, r);
          return r;
        }
      }

      /* ═══════════════════════════════════════════════════════════════
   UI MANAGER  — owns all HTML overlay interactions.
   Communicates back to GameEngine via callbacks.
═══════════════════════════════════════════════════════════════ */
      class UIManager {
        /**
         * @param {Object} callbacks  — { onAcceptProposal, onDeclineProposal, onArrangeMarriage, onRename }
         */
        constructor(callbacks) {
          this._cb = callbacks;
          this._proposalsPanelOpen = false;

          this._els = {
            dynastyName: document.getElementById("hud-dynasty-name"),
            year: document.getElementById("hud-year"),
            members: document.getElementById("hud-members"),
            legacyVal: document.getElementById("hud-legacy-val"),
            propsBadge: document.getElementById("proposals-badge"),
            propsPanel: document.getElementById("proposals-panel"),
            propsList: document.getElementById("proposals-list"),
            propsBtn: document.getElementById("proposals-btn"),
            eventLog: document.getElementById("event-log"),
            overlay: document.getElementById("overlay"),
            personModal: document.getElementById("person-modal"),
            pmName: document.getElementById("pm-name"),
            pmSub: document.getElementById("pm-sub"),
            pmAvatar: document.getElementById("pm-avatar"),
            pmTraits: document.getElementById("pm-traits"),
            pmActions: document.getElementById("pm-actions"),
            pmClose: document.getElementById("pm-close"),
            msBanner: document.getElementById("milestone-banner"),
            msTitle: document.getElementById("ms-title"),
            msBody: document.getElementById("ms-body"),
          };

          this._bindPersistent();
        }

        _bindPersistent() {
          this._els.propsBtn.addEventListener("click", () =>
            this.toggleProposalsPanel(),
          );
          this._els.pmClose.addEventListener("click", () =>
            this.closePersonModal(),
          );
          this._els.overlay.addEventListener("click", () => {
            this.closePersonModal();
            this.closeProposalsPanel();
          });
        }

        // ── HUD ───────────────────────────────────────────────────────
        updateHUD(world) {
          const ph = world.getPlayerHouse();
          if (!ph) return;

          this._els.dynastyName.textContent = `House ${ph.name}`;
          this._els.year.textContent = `Anno Domini ${world.year}`;
          this._els.members.textContent = `${ph.getSize(world)} living`;
          this._els.members.style.display = "inline";
          this._els.legacyVal.textContent = Math.floor(
            world.legacyScore,
          ).toLocaleString();

          const pCount = world.proposals.length;
          this._els.propsBadge.textContent = pCount;
          this._els.propsBadge.classList.toggle("visible", pCount > 0);
        }

        // ── Event log ─────────────────────────────────────────────────
        pushEvent(msg, type = "n", year = null) {
          const el = document.createElement("div");
          el.className = `ev-item ${type === "good" ? "good" : type === "bad" ? "bad" : type === "gold" ? "gold" : ""}`;
          const yr = year ?? "—";
          el.innerHTML = `<span class="ev-year">${yr}</span>${msg}`;
          this._els.eventLog.prepend(el);
          // Keep log to 40 entries
          while (this._els.eventLog.children.length > 40) {
            this._els.eventLog.lastChild.remove();
          }
        }

        // ── Proposals Panel ───────────────────────────────────────────
        toggleProposalsPanel() {
          this._proposalsPanelOpen = !this._proposalsPanelOpen;
          this._els.propsPanel.classList.toggle(
            "visible",
            this._proposalsPanelOpen,
          );
        }
        closeProposalsPanel() {
          this._proposalsPanelOpen = false;
          this._els.propsPanel.classList.remove("visible");
        }

        renderProposals(world) {
          const list = this._els.propsList;
          list.innerHTML = "";

          if (!world.proposals.length) {
            list.innerHTML =
              '<div style="color:var(--clr-ink-faint);font-style:italic;font-size:12px;padding:6px 0">No pending proposals.</div>';
            return;
          }

          for (const pr of world.proposals) {
            const a = world.getPerson(pr.proposerId);
            const b = world.getPerson(pr.candidateId);
            if (!a || !b) continue;

            const bh = world.getHouse(b.birthHouseId);

            const item = document.createElement("div");
            item.className = "proposal-item";
            item.innerHTML = `
        <div class="proposal-text">
          House <strong>${bh?.name ?? "?"}</strong> proposes
          <strong>${b.name}</strong>
          (${b.gender === "M" ? "♂" : "♀"} ${Math.floor(b.age(world.year))})
          for <strong>${a.name}</strong>
        </div>
        <div class="proposal-btns">
          <button class="prop-btn accept">Accept</button>
          <button class="prop-btn decline">Decline</button>
        </div>`;

            item.querySelector(".accept").addEventListener("click", () => {
              this._cb.onAcceptProposal(pr.proposerId, pr.candidateId);
              this.renderProposals(world);
              this.updateHUD(world);
            });
            item.querySelector(".decline").addEventListener("click", () => {
              this._cb.onDeclineProposal(pr.proposerId, pr.candidateId);
              this.renderProposals(world);
              this.updateHUD(world);
            });
            list.appendChild(item);
          }
        }

        // ── Person Modal ──────────────────────────────────────────────
        openPersonModal(person, world, renderer) {
          const house = world.getHouse(person.houseId);
          const isPlayer = house?.isPlayer ?? false;
          const yr = world.year;

          this._els.pmName.textContent = person.name;
          const status = person.dead
            ? `Deceased · aged ${Math.floor(person.age(yr))}`
            : `${Math.floor(person.age(yr))} years · ${person.gender === "M" ? "Male" : "Female"} · ${person.married ? "Married" : "Unmarried"}`;
          this._els.pmSub.textContent = `${house ? "House " + house.name : ""} · ${status}`;
