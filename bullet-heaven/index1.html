<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Canvas RPG Click-to-Move</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #1c1a23;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      /* ======================
   PLAYER
====================== */
      const player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 12,

        speed: 280, // max speed (px/sec)
        accel: 12, // responsiveness (higher = snappier)
        stopRadius: 6, // arrival distance

        vx: 0,
        vy: 0,

        targetX: null,
        targetY: null,
      };

      /* ======================
   INPUT
====================== */
      canvas.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        player.targetX = e.clientX - rect.left;
        player.targetY = e.clientY - rect.top;
      });

      /* ======================
   GAME LOOP
====================== */
      let lastTime = performance.now();

      function update(dt) {
        if (player.targetX === null) return;

        const dx = player.targetX - player.x;
        const dy = player.targetY - player.y;
        const dist = Math.hypot(dx, dy);

        // Stop condition
        if (dist < player.stopRadius) {
          player.vx *= 0.8;
          player.vy *= 0.8;

          if (Math.hypot(player.vx, player.vy) < 5) {
            player.vx = 0;
            player.vy = 0;
            player.targetX = null;
            player.targetY = null;
          }
          return;
        }

        // Direction
        const dirX = dx / dist;
        const dirY = dy / dist;

        // Slow down near target (arrival behavior)
        const slowFactor = Math.min(dist / 120, 1);

        const desiredVx = dirX * player.speed * slowFactor;
        const desiredVy = dirY * player.speed * slowFactor;

        // Smooth acceleration toward desired velocity
        player.vx += (desiredVx - player.vx) * player.accel * dt;
        player.vy += (desiredVy - player.vy) * player.accel * dt;

        // Apply velocity
        player.x += player.vx * dt;
        player.y += player.vy * dt;
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Target marker
        if (player.targetX !== null) {
          ctx.strokeStyle = "#cdcdcd";
          ctx.beginPath();
          ctx.arc(player.targetX, player.targetY, 2, 0, Math.PI * 2);
          ctx.fillStyle = "#fff";
          ctx.fill();
        }

        // Player
        ctx.fillStyle = "#712ca8";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function loop(now) {
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      requestAnimationFrame(loop);
    </script>
  </body>
</html>
