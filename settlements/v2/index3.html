<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settlement - Management UI</title>
    <style>
        :root {
            --bg-panel: rgba(255, 255, 255, 0.95);
            --border-color: #d1d8e0;
            --text-main: #2d3436;
            --accent: #0984e3;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #f1f2f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-main);
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* Stockpile UI */
        #stockpile {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-panel);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        /* Sidebar UI */
        #sidebar {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 280px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.05);
        }

        #sidebar.minimized {
            transform: translateX(240px);
        }

        #toggle-sidebar {
            width: 40px;
            height: 40px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 4px 0 0 4px;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        #settler-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Settler Card */
        .settler-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .settler-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: #dfe6e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .settler-name {
            font-weight: bold;
            flex-grow: 1;
        }

        .stat-row {
            margin-bottom: 4px;
        }

        .progress-bg {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 2px;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .role-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            color: white;
            text-transform: uppercase;
        }

        .role-food {
            background: #27ae60;
        }

        .role-wood {
            background: #7f8c8d;
        }
    </style>
</head>

<body>

    <div id="stockpile">
        <div style="font-size: 0.7rem; color: #636e72; text-transform: uppercase;">Stockpile</div>
        🍎 Food: <span id="ui-food">0</span> | 🪵 Wood: <span id="ui-wood">0</span>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <button id="toggle-sidebar">◀</button>
            <span style="margin-left: 10px;">Population</span>
        </div>
        <div id="settler-list">
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const TILE_SIZE = 50;
        const NAMES = ["Aria", "Boran", "Cael", "Dara", "Ewan", "Fia", "Garek", "Hilda"];
        const AVATARS = ["👨‍🌾", "👩‍🌾", "🧑‍🌾", "🧔", "👱‍♀️", "👵", "👴"];

        class Tile {
            constructor(type) {
                this.type = type;
                this.amount = (type === 'GRASS') ? 0 : 20 + Math.random() * 30;
                this.maxAmount = this.amount;
            }
        }

        class Settler {
            constructor(x, y, role) {
                this.x = x; this.y = y; this.role = role;
                this.name = NAMES[Math.floor(Math.random() * NAMES.length)] + " " + (Math.floor(Math.random() * 99));
                this.avatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];
                this.type = 'settler';

                // Base Stats
                this.speed = 0.4 + Math.random() * 0.5;
                this.strength = 5 + Math.random() * 5;
                this.attentiveness = 0.2 + Math.random() * 0.4;

                // Needs
                this.hunger = 0;
                this.fatigue = 0;

                this.inventory = 0;
                this.state = 'searching'; // searching, gathering, returning, resting
                this.velocity = { x: 0, y: 0 };
                this.domElement = this.createUI();
            }

            update(engine) {
                this.hunger += 0.015;
                this.fatigue += 0.01;

                if ((this.hunger > 85 || this.fatigue > 90) && this.state !== 'resting') this.state = 'returning';

                switch (this.state) {
                    case 'searching': this.wander(engine); break;
                    case 'gathering': this.work(engine); break;
                    case 'returning':
                        this.moveTowards(engine.bonfirePos.x, engine.bonfirePos.y);
                        if (this.isNear(engine.bonfirePos)) {
                            engine.resources[this.role] += Math.floor(this.inventory);
                            this.inventory = 0;
                            if (this.hunger > 40 && engine.resources.food > 0) { engine.resources.food--; this.hunger = 0; }
                            if (this.fatigue > 60) this.state = 'resting';
                            else if (this.hunger < 40) this.state = 'searching';
                        }
                        break;
                    case 'resting':
                        this.fatigue -= 0.15;
                        if (this.fatigue <= 0) this.state = 'searching';
                        break;
                }
                this.updateUI();
            }

            wander(engine) {
                if (Math.random() < 0.02) {
                    const angle = Math.random() * Math.PI * 2;
                    this.velocity.x = Math.cos(angle) * this.speed;
                    this.velocity.y = Math.sin(angle) * this.speed;
                }
                this.x += this.velocity.x; this.y += this.velocity.y;
                const tile = engine.getTile(Math.floor(this.x / TILE_SIZE), Math.floor(this.y / TILE_SIZE));
                const target = this.role === 'food' ? 'BUSH' : 'FOREST';
                if (tile && tile.type === target && tile.amount > 0) this.state = 'gathering';
            }

            work(engine) {
                const tile = engine.getTile(Math.floor(this.x / TILE_SIZE), Math.floor(this.y / TILE_SIZE));
                if (tile && tile.amount > 0) {
                    const harvest = 0.01 * this.attentiveness;
                    tile.amount -= harvest;
                    this.inventory += harvest;
                    this.fatigue += 0.04;
                    if (this.inventory >= this.strength) this.state = 'returning';
                } else { this.state = 'searching'; }
            }

            moveTowards(tx, ty) {
                const dx = tx - this.x; const dy = ty - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 5) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }

            isNear(pos) { return Math.abs(this.x - pos.x) < 20 && Math.abs(this.y - pos.y) < 20; }


            createUI() {
                const div = document.createElement('div');
                div.className = 'settler-card';
                div.innerHTML = `
            <div class="settler-header">
                <div class="avatar">${this.avatar}</div>
                <div class="settler-name">${this.name}</div>
                <span class="role-badge role-${this.role === 'food' ? 'food' : 'wood'}">${this.role}</span>
            </div>
            <div class="stat-row">
                <div style="display:flex; justify-content:space-between; font-size: 0.7rem;">
                    <span>Hunger</span><span class="val-hunger">0%</span>
                </div>
                <div class="progress-bg"><div class="progress-fill fill-hunger" style="background:#e67e22; width:0%"></div></div>
            </div>
            <div class="stat-row">
                <div style="display:flex; justify-content:space-between; font-size: 0.7rem;">
                    <span>Fatigue</span><span class="val-fatigue">0%</span>
                </div>
                <div class="progress-bg"><div class="progress-fill fill-fatigue" style="background:#9b59b6; width:0%"></div></div>
            </div>
            <div style="font-size: 0.7rem; color: #636e72; margin-top:5px;">State: <span class="val-state">Searching</span></div>
        `;
                document.getElementById('settler-list').appendChild(div);
                return div;
            }

            updateUI() {
                this.domElement.querySelector('.fill-hunger').style.width = `${this.hunger}%`;
                this.domElement.querySelector('.val-hunger').innerText = `${Math.floor(this.hunger)}%`;
                this.domElement.querySelector('.fill-fatigue').style.width = `${this.fatigue}%`;
                this.domElement.querySelector('.val-fatigue').innerText = `${Math.floor(this.fatigue)}%`;
                this.domElement.querySelector('.val-state').innerText = this.state.charAt(0).toUpperCase() + this.state.slice(1);
            }
        }

        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.entities = [];
                this.grid = [];
                this.resources = { food: 10, brushwood: 0 };
                this.bonfirePlaced = false;
                this.bonfirePos = { x: 0, y: 0 };

                // Sidebar Toggle
                const btn = document.getElementById('toggle-sidebar');
                btn.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('minimized');
                    btn.innerText = document.getElementById('sidebar').classList.contains('minimized') ? '▶' : '◀';
                });

                this.init();
            }

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.generateWorld();
                this.canvas.addEventListener('click', (e) => this.handleInput(e));
                requestAnimationFrame(() => this.loop());
            }

            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }

            generateWorld() {
                const cols = Math.ceil(window.innerWidth / TILE_SIZE);
                const rows = Math.ceil(window.innerHeight / TILE_SIZE);
                for (let x = 0; x < cols; x++) {
                    this.grid[x] = [];
                    for (let y = 0; y < rows; y++) {
                        const r = Math.random();
                        let type = 'GRASS';
                        if (r > 0.94) type = 'FOREST';
                        else if (r > 0.90) type = 'BUSH';
                        this.grid[x][y] = new Tile(type);
                    }
                }
            }

            getTile(x, y) { return (this.grid[x] && this.grid[x][y]) ? this.grid[x][y] : null; }

            handleInput(e) {
                if (!this.bonfirePlaced) {
                    this.bonfirePos = { x: e.clientX, y: e.clientY };
                    this.bonfirePlaced = true;
                    for (let i = 0; i < 4; i++) {
                        this.entities.push(new Settler(this.bonfirePos.x, this.bonfirePos.y, i % 2 === 0 ? 'food' : 'brushwood'));
                    }
                }
            }

            update() {
                this.entities.forEach(ent => ent.update(this));
                document.getElementById('ui-food').innerText = Math.floor(this.resources.food);
                document.getElementById('ui-wood').innerText = Math.floor(this.resources.brushwood);
            }

            render() {
                Renderer.drawWorld(this.ctx, this.grid);
                if (this.bonfirePlaced) Renderer.drawBonfire(this.ctx, this.bonfirePos);
                this.entities.forEach(ent => Renderer.drawSettler(this.ctx, ent));
            }

            loop() { this.update(); this.render(); requestAnimationFrame(() => this.loop()); }
        }

        class Renderer {
            static drawWorld(ctx, grid) {
                for (let x = 0; x < grid.length; x++) {
                    for (let y = 0; y < grid[x].length; y++) {
                        const tile = grid[x][y];
                        if (tile.type === 'GRASS') ctx.fillStyle = '#f9fbf2';
                        else {
                            const intensity = 0.4 + (tile.amount / tile.maxAmount) * 0.6;
                            ctx.fillStyle = tile.type === 'FOREST' ? `rgba(180, 210, 160, ${intensity})` : `rgba(180, 200, 240, ${intensity})`;
                        }
                        ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
            static drawBonfire(ctx, pos) { ctx.font = '30px Arial'; ctx.textAlign = 'center'; ctx.fillText('🔥', pos.x, pos.y + 10); }
            static drawSettler(ctx, ent) {
                ctx.fillStyle = ent.role === 'food' ? '#27ae60' : '#7f8c8d';
                ctx.beginPath(); ctx.arc(ent.x, ent.y, 6, 0, Math.PI * 2); ctx.fill();
                if (ent.inventory > 1) { ctx.fillStyle = '#2d3436'; ctx.beginPath(); ctx.arc(ent.x + 4, ent.y - 4, 2, 0, Math.PI * 2); ctx.fill(); }
            }
        }

        new GameEngine();
    </script>
</body>

</html>
