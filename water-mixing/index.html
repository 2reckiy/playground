<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Merge Prototype</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1a1a1a;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="ui">
      <div id="color1">Color A: #00FFFF</div>
      <div id="color2">Color B: #FF00FF</div>
      <div id="mixed">Result: #8080FF</div>
    </div>

    <canvas id="liquidCanvas"></canvas>

    <script>
      const canvas = document.getElementById("liquidCanvas");
      const ctx = canvas.getContext("2d");
      const ui = {
        a: document.getElementById("color1"),
        b: document.getElementById("color2"),
        res: document.getElementById("mixed"),
      };

      let width, height;

      const colorA = "#00FF00"; // Cyan
      const colorB = "#0000ff"; // Magenta

      function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
      }

      function rgbToHex(r, g, b) {
        return (
          "#" +
          [r, g, b]
            .map((x) => Math.round(x).toString(16).padStart(2, "0"))
            .join("")
        );
      }

      function mix1(hex1, hex2) {
        const c1 = hexToRgb(hex1);
        const c2 = hexToRgb(hex2);
        // Average the channels
        return rgbToHex(
          (c1.r + c2.r) / 2,
          (c1.g + c2.g) / 2,
          (c1.b + c2.b) / 2,
        );
      }

      // Mathematically accurate mixing (Gamma Correction aware)
      function mix2(color1, color2) {
        const c1 = hexToRgb(color1);
        const c2 = hexToRgb(color2);
        // We square the values, average them, then take the square root
        // This prevents the "dark middle" effect
        const r = Math.sqrt((c1.r ** 2 + c2.r ** 2) / 2);
        const g = Math.sqrt((c1.g ** 2 + c2.g ** 2) / 2);
        const b = Math.sqrt((c1.b ** 2 + c2.b ** 2) / 2);

        return rgbToHex(r, g, b);
      }

      const mixedHex = mix2(colorA, colorB);

      ui.a.innerText = colorA;
      ui.a.style.color = colorA;
      ui.b.innerText = colorB;
      ui.b.style.color = colorB;
      ui.res.innerText = `Result: ${mixedHex.toUpperCase()}`;
      ui.res.style.color = mixedHex;

      // Liquid object definition
      class Liquid {
        constructor(x, y, w, h, color, speed) {
          this.x = x;
          this.y = y;
          this.w = w;
          this.h = h;
          this.color = color; // Expects rgba string
          this.speed = speed;
        }

        draw() {
          ctx.fillStyle = this.color;
          ctx.fillRect(this.x, this.y, this.w, this.h);
        }

        update() {}
      }

      const liquids = [];

      function init() {
        resize();
        // Create two overlapping liquids with 60% opacity
        liquids.push(
          new Liquid(width * 0.5, height * 0.3, 300, 200, colorA, 2),
        );
        liquids.push(
          new Liquid(width * 0.5, height * 0.35, 300, 200, colorB, -2),
        );

        animate();
      }

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }

      function animate() {
        // Clear canvas with a slight trail effect or pure clear
        ctx.clearRect(0, 0, width, height);

        // Set the global composite operation
        // 'source-over' is default, but 'screen' or 'multiply' can create different mix effects
        ctx.globalCompositeOperation = "screen";

        liquids.forEach((liquid) => {
          liquid.update();
          liquid.draw();
        });

        ctx.fillStyle = mixedHex;
        ctx.fillRect(width * 0.5, height * 0.35 + 300, 300, 200);

        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", resize);
      init();
    </script>
  </body>
</html>
