<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Neo Brutalist Clicker – Button Flash</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff44f;
        overflow: hidden;
        font-family: system-ui;
      }
      canvas {
        display: block;
        position: absolute;
        inset: 0;
      }
      #score {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 48px;
        font-weight: 900;
        color: #000;
      }
      #button {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: #ff4d6d;
        border: 6px solid #000;
        box-shadow: 8px 8px 0 #000;
        font-size: 32px;
        font-weight: 900;
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        cursor: pointer;
        transition: background 0.15s linear, transform 0.1s ease-out;
      }
      #button:active {
        transform: translate(-46%, -46%) scale(0.95);
        box-shadow: 4px 4px 0 #000;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="score">0</div>
    <div id="button">CLICK</div>

    <script>
      /* =======================
   CANVAS SETUP
======================= */
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      /* =======================
   GENERIC PARTICLE CLASS
======================= */
      class Particle {
        constructor() {
          this.active = false;
        }
        init(x, y, options = {}) {
          this.active = true;
          this.startX = x + (Math.random() - 0.5) * (options.spawnSpread || 40);
          this.x = this.startX;
          this.y = y;
          this.age = 0;
          this.life = options.life || 1.2;
          this.speedY = options.speedY || 220;
          this.swayAmp = options.swayAmp || 18;
          this.swayFreq = options.swayFreq || 6;
          this.phase = Math.random() * Math.PI * 2;
          this.text = options.text || "+1";
          this.font = options.font || "900 32px system-ui";
          this.color = options.color || "#4d96ff";
          this.strokeColor = options.strokeColor || "#000";
        }
        update(dt) {
          if (!this.active) return;
          this.age += dt;
          this.y -= this.speedY * dt;
          if (this.age >= this.life || this.y < -50) this.active = false;
        }
        draw(ctx) {
          if (!this.active) return;
          const sway =
            Math.sin(this.age * this.swayFreq + this.phase) * this.swayAmp;
          const alpha = 1 - this.age / this.life;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = this.color;
          ctx.strokeStyle = this.strokeColor;
          ctx.lineWidth = 4;
          ctx.font = this.font;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.strokeText(this.text, this.startX + sway, this.y);
          ctx.fillText(this.text, this.startX + sway, this.y);
          ctx.globalAlpha = 1;
        }
      }

      /* =======================
   PARTICLE POOL
======================= */
      class ParticlePool {
        constructor(size) {
          this.pool = Array.from({ length: size }, () => new Particle());
        }
        spawn(x, y, options = {}) {
          for (const p of this.pool)
            if (!p.active) {
              p.init(x, y, options);
              return;
            }
        }
        update(dt) {
          for (const p of this.pool) if (p.active) p.update(dt);
        }
        draw(ctx) {
          for (const p of this.pool) if (p.active) p.draw(ctx);
        }
      }

      /* =======================
   GAME VARIABLES
======================= */
      const pool = new ParticlePool(512);
      const button = document.getElementById("button");
      const scoreEl = document.getElementById("score");

      let score = 0;
      let combo = 0;
      let lastClickTime = 0;
      const comboTimeout = 1000; // ms

      /* =======================
   HELPER FUNCTIONS
======================= */
      function getRandomColor() {
        const r = 150 + Math.floor(Math.random() * 105);
        const g = 150 + Math.floor(Math.random() * 105);
        const b = 150 + Math.floor(Math.random() * 105);
        return `rgb(${r},${g},${b})`;
      }

      function flashButton() {
        const color = getRandomColor();
        button.style.background = color;
        button.style.transform = "translate(-50%, -50%) scale(1.1)";
        setTimeout(() => {
          button.style.background = "#ff4d6d";
          button.style.transform = "translate(-50%, -50%) scale(1)";
        }, 100);
      }

      /* =======================
   CLICK HANDLER
======================= */
      function addClick(x, y) {
        const now = performance.now();
        if (now - lastClickTime < comboTimeout) {
          combo++;
        } else {
          combo = 1;
        }
        lastClickTime = now;

        let multiplier = 1;
        let text = "+1";
        let color = "#4d96ff";

        if (combo >= 5) {
          multiplier = 2;
          text = "+2";
          color = getRandomColor();
          flashButton();
        }
        if (combo >= 10) {
          multiplier = 5;
          text = "+5";
          color = getRandomColor();
          flashButton();
        }

        score += multiplier;
        scoreEl.textContent = score;

        pool.spawn(x, y, { text, color });
      }

      button.addEventListener("click", () => {
        const rect = button.getBoundingClientRect();
        addClick(rect.left + rect.width / 2, rect.top);
      });

      /* =======================
   AUTO-CLICK (optional)
======================= */
      // let autoClick = true;
      // setInterval(()=>{
      //   if(autoClick){
      //     const rect = button.getBoundingClientRect();
      //     addClick(rect.left+rect.width/2, rect.top);
      //   }
      // },200);

      /* =======================
   MAIN LOOP
======================= */
      let lastTime = performance.now();
      function loop(now) {
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        pool.update(dt);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pool.draw(ctx);

        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
