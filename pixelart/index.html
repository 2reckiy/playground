<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pixel Converter</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }

        canvas {
            border: 4px solid #444;
            max-width: 100%;
            image-rendering: pixelated;
            margin-top: 20px;
        }

        .controls {
            background: #333;
            padding: 20px;
            border-radius: 8px;
            display: grid;
            gap: 10px;
        }

        input {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Pixel Art Converter</h1>

    <div class="controls">
        <input type="file" id="upload" accept="image/*">
        <label>Pixel Size: <input type="range" id="pixelSize" min="2" max="50" value="10"></label>
        <label>Color Depth: <input type="range" id="colorDepth" min="2" max="256" value="16"></label>
        <button id="download">Download Image</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const pixelSlider = document.getElementById('pixelSize');
        const colorSlider = document.getElementById('colorDepth');
        let originalImage = null;

        upload.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage = new Image();
                originalImage.onload = processImage;
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        [pixelSlider, colorSlider].forEach(s => s.addEventListener('input', processImage));

        // The 4x4 Bayer Matrix for dithering patterns
        const bayer = [
            [0, 8, 2, 10],
            [12, 4, 14, 6],
            [3, 11, 1, 9],
            [15, 7, 13, 5]
        ];

        const palettes = {
            gameboy: [
                { r: 15, g: 56, b: 15 }, { r: 48, g: 98, b: 48 },
                { r: 139, g: 172, b: 15 }, { r: 155, g: 188, b: 15 }
            ],
            pico8: [
                { r: 0, g: 0, b: 0 }, { r: 29, g: 43, b: 83 }, { r: 126, g: 37, b: 83 }, { r: 0, g: 135, b: 81 },
                { r: 171, g: 82, b: 54 }, { r: 95, g: 87, b: 79 }, { r: 194, g: 195, b: 199 }, { r: 255, g: 241, b: 232 },
                { r: 255, g: 0, b: 77 }, { r: 255, g: 163, b: 0 }, { r: 255, g: 236, b: 39 }, { r: 0, g: 228, b: 54 },
                { r: 41, g: 173, b: 255 }, { r: 131, g: 118, b: 156 }, { r: 255, g: 119, b: 168 }, { r: 255, g: 204, b: 170 }
            ],
            c64: [
                { r: 0, g: 0, b: 0 }, { r: 255, g: 255, b: 255 }, { r: 136, g: 0, b: 0 }, { r: 170, g: 255, b: 238 },
                { r: 204, g: 68, b: 204 }, { r: 0, g: 204, b: 85 }, { r: 0, g: 0, b: 170 }, { r: 238, g: 238, b: 119 },
                { r: 221, g: 136, b: 85 }, { r: 102, g: 68, b: 0 }, { r: 255, g: 119, b: 119 }, { r: 51, g: 51, b: 51 },
                { r: 119, g: 119, b: 119 }, { r: 170, g: 255, b: 102 }, { r: 0, g: 136, b: 255 }, { r: 187, g: 187, b: 187 }
            ]
        };

        function getNearestColor(r, g, b, palette) {
            let minDistance = Infinity;
            let closest = palette[0];

            palette.forEach(color => {
                // Euclidean distance (we can skip the Square Root for performance)
                const distance = Math.pow(r - color.r, 2) +
                    Math.pow(g - color.g, 2) +
                    Math.pow(b - color.b, 2);

                if (distance < minDistance) {
                    minDistance = distance;
                    closest = color;
                }
            });
            return closest;
        }

        function processImage() {
            if (!originalImage) return;

            canvas.width = originalImage.width;
            canvas.height = originalImage.height;

            const size = parseInt(pixelSlider.value);
            const depth = parseInt(colorSlider.value);

            // Draw original to get data
            ctx.drawImage(originalImage, 0, 0);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            // Clear canvas to draw our new pixels
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += size) {
                for (let x = 0; x < canvas.width; x += size) {
                    const i = (y * canvas.width + x) * 4;

                    // Get Bayer Matrix value (scaled to 0-255 range)
                    const threshold = bayer[(y / size) % 4][(x / size) % 4] * (255 / 16);

                    // Apply dithering adjustment before snapping to palette
                    let r = data[i] + (threshold / depth);
                    let g = data[i + 1] + (threshold / depth);
                    let b = data[i + 2] + (threshold / depth);

                    // Quantize (Snap to Palette)
                    const ditheredR = data[i] + (threshold / 4); // Subtle dither
                    const ditheredG = data[i + 1] + (threshold / 4);
                    const ditheredB = data[i + 2] + (threshold / 4);

                    const finalColor = getNearestColor(ditheredR, ditheredG, ditheredB, palettes.gameboy);

                    ctx.fillStyle = `rgb(${finalColor.r},${finalColor.g},${finalColor.b})`;
                    ctx.fillRect(x, y, size, size);
                    ctx.fillRect(x, y, size, size);
                }
            }
        }

        document.getElementById('download').onclick = () => {
            const link = document.createElement('a');
            link.download = 'pixel-art.png';
            link.href = canvas.toDataURL();
            link.click();
        };
    </script>
</body>

</html>
