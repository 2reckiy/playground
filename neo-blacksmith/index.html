<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON & INK | Blacksmith Sim</title>
    <style>
        :root {
            --bg: #f0f0f0;
            --primary: #ff5e5e;
            --secondary: #00f5d4;
            --accent: #fee440;
            --dark: #000000;
            --border: 4px solid #000;
            --shadow: 6px 6px 0px #000;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        /* Neo-Brutalism UI Components */
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background: var(--accent);
            border: var(--border);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            text-align: center;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .card {
            background: white;
            border: var(--border);
            padding: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .btn {
            background: var(--primary);
            border: var(--border);
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: 0.1s;
            width: 100%;
            margin-top: 10px;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        .btn-buy {
            background: var(--secondary);
        }

        .inventory-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .inventory-item {
            border-bottom: 2px solid #000;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-val {
            font-weight: 900;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>IRON & INK SMITHY</h1>
            <p>LEVEL: <span id="lvl" class="stat-val">1</span> | GOLD: $<span id="gold" class="stat-val">100</span></p>
        </header>

        <div class="dashboard">
            <div class="sidebar">
                <div class="card">
                    <h3>RESOURCES</h3>
                    <p>Iron: <span id="res-iron" class="stat-val">10</span></p>
                    <button class="btn btn-buy" onclick="engine.buyResource('iron')">Buy Iron ($10)</button>
                </div>

                <div class="card" style="background: var(--secondary);">
                    <h3>FORGE</h3>
                    <button class="btn" style="height: 100px; font-size: 1.5rem;" onclick="engine.forgeItem()">FORGE (1
                        Iron)</button>
                </div>
            </div>

            <div class="main-content">
                <div class="card">
                    <h3>STASH (Inventory)</h3>
                    <div id="inventory-container" class="inventory-list">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. DATA ENTITIES
        class Item {
            constructor(name, type, value, quality) {
                this.id = Date.now() + Math.random();
                this.name = name;
                this.type = type; // Weapon / Armor
                this.value = value;
                this.quality = quality;
            }
        }

        // 2. PLAYER STATE
        class Blacksmith {
            constructor() {
                this.level = 1;
                this.gold = 100;
                this.resources = { iron: 10 };
                this.inventory = [];
            }

            addExperience() {
                this.level += 0.1;
            }
        }

        // 3. THE ORCHESTRATOR
        class GameEngine {
            constructor() {
                this.player = new Blacksmith();
                this.itemTypes = [
                    { name: 'Dull Sword', type: 'Weapon', minVal: 15 },
                    { name: 'Rusty Plate', type: 'Armor', minVal: 20 },
                    { name: 'Sharp Dagger', type: 'Weapon', minVal: 25 },
                    { name: 'Iron Shield', type: 'Armor', minVal: 30 }
                ];
                this.init();
            }

            init() {
                this.updateUI();
            }

            buyResource(type) {
                if (this.player.gold >= 10) {
                    this.player.gold -= 10;
                    this.player.resources[type] += 5;
                    this.updateUI();
                } else {
                    alert("Not enough gold!");
                }
            }

            forgeItem() {
                if (this.player.resources.iron >= 1) {
                    this.player.resources.iron -= 1;

                    // Random Logic based on player level
                    const randomBlueprint = this.itemTypes[Math.floor(Math.random() * this.itemTypes.length)];
                    const quality = (Math.random() * this.player.level).toFixed(1);
                    const finalValue = Math.floor(randomBlueprint.minVal * (1 + parseFloat(quality)));

                    const newItem = new Item(randomBlueprint.name, randomBlueprint.type, finalValue, quality);

                    this.player.inventory.push(newItem);
                    this.player.addExperience();
                    this.updateUI();
                } else {
                    alert("Need more Iron!");
                }
            }

            sellItem(id) {
                const itemIndex = this.player.inventory.findIndex(i => i.id === id);
                if (itemIndex > -1) {
                    this.player.gold += this.player.inventory[itemIndex].value;
                    this.player.inventory.splice(itemIndex, 1);
                    this.updateUI();
                }
            }

            updateUI() {
                document.getElementById('gold').innerText = Math.floor(this.player.gold);
                document.getElementById('lvl').innerText = this.player.level.toFixed(1);
                document.getElementById('res-iron').innerText = this.player.resources.iron;

                const invContainer = document.getElementById('inventory-container');
                invContainer.innerHTML = '';

                this.player.inventory.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'inventory-item';
                    div.innerHTML = `
                    <span><strong>${item.name}</strong> (Q: ${item.quality})</span>
                    <button class="btn btn-buy" style="width: auto; margin:0;" onclick="engine.sellItem(${item.id})">Sell $${item.value}</button>
                `;
                    invContainer.appendChild(div);
                });
            }
        }

        // Start Game
        const engine = new GameEngine();
    </script>

</body>

</html>
