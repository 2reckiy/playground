<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settlement - Rectangular Grid</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #f4f1ea;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #4a4a4a;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #dcd7c9;
            pointer-events: none;
        }

        #debug-console {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 220px;
            background: rgba(45, 45, 45, 0.9);
            color: #00ffcc;
            font-family: monospace;
            font-size: 10px;
            padding: 10px;
            border-radius: 4px;
            max-height: 300px;
            overflow: hidden;
            border-left: 3px solid #bcab96;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 8px;
        }

        .stat-label {
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            color: #999;
        }

        .stat-val {
            color: #444;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div class="stat-row"><span class="stat-label">Day</span> <span class="stat-val" id="ui-time">1</span></div>
        <div class="stat-row"><span class="stat-label">Food</span> <span class="stat-val" id="ui-food">0</span></div>
        <div class="stat-row"><span class="stat-label">Wood</span> <span class="stat-val" id="ui-wood">0</span></div>
        <div class="stat-row"><span class="stat-label">Size</span> <span class="stat-val" id="ui-size">0x0</span></div>
    </div>
    <div id="debug-console"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const PALETTE = {
            bg: '#ffffff', gridLine: '#bcab9616',
            tiles: ['#ffffff3f', '#a3b18a3f', '#e9edc93f', '#e07a5f3f'],
            settler: '#ff112f'
        };

        const TILE_SIZE = 32;

        // NEW: Rectangular dimensions
        const GRID_WIDTH = 14;
        const GRID_HEIGHT = 8;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let resources = { food: 20, wood: 10 };
        let grid = [];
        let settlers = [];
        let logs = [];
        let offsetX, offsetY;
        let lastTime = performance.now();
        let totalPlayTime = 0;

        const CONFIG = {
            MOVE_SPEED: 90,
            GATHER_BASE_RATE: 25,
            EAT_RATE: 40,
            HUNGER_PER_MIN: 12,
            DAY_LENGTH: 60
        };

        function debugLog(msg) {
            logs.unshift(`> ${msg}`);
            if (logs.length > 10) logs.pop();
            document.getElementById('debug-console').innerHTML = logs.join('<br>');
        }

        function getTileCenter(gx, gy) {
            return {
                x: offsetX + gx * TILE_SIZE + TILE_SIZE / 2,
                y: offsetY + gy * TILE_SIZE + TILE_SIZE / 2
            };
        }

        function init() {
            resize();

            // Initialize rectangular grid
            grid = [];
            for (let y = 0; y < GRID_HEIGHT; y++) {
                grid[y] = [];
                for (let x = 0; x < GRID_WIDTH; x++) {
                    let r = Math.random();
                    grid[y][x] = r > 0.92 ? 1 : (r > 0.85 ? 2 : 0);
                }
            }

            // Place bonfire roughly in the middle
            const midX = Math.floor(GRID_WIDTH / 2);
            const midY = Math.floor(GRID_HEIGHT / 2);
            grid[midY][midX] = 3;

            const startPos = getTileCenter(midX, midY);
            for (let i = 0; i < 3; i++) {
                settlers.push({
                    id: i + 1, px: startPos.x, py: startPos.y,
                    hunger: 0, state: 'idle', targetGrid: null, progress: 0,
                    inventory: { type: null, amount: 0 },
                    personalSpeed: 0.9 + Math.random() * 0.4,
                    personalWork: 0.8 + Math.random() * 0.4
                });
            }

            document.getElementById('ui-size').innerText = `${GRID_WIDTH}x${GRID_HEIGHT}`;
            debugLog(`Card created: ${GRID_WIDTH}x${GRID_HEIGHT}`);
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            // Set logical size (CSS)
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';

            // Set actual internal resolution (Physical pixels)
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;

            // Scale all drawing operations by the dpr
            ctx.scale(dpr, dpr);

            // Calculate offsets (Logical)
            offsetX = Math.floor((window.innerWidth - GRID_WIDTH * TILE_SIZE) / 2);
            offsetY = Math.floor((window.innerHeight - GRID_HEIGHT * TILE_SIZE) / 2);

            // Disable image smoothing for a crisp, pixel-art look
            ctx.imageSmoothingEnabled = false;
        }

        function gameLoop(currentTime) {
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            totalPlayTime += dt;

            update(dt);
            draw();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            settlers.forEach(s => {
                s.hunger += (CONFIG.HUNGER_PER_MIN / 60) * dt;

                if (s.state === 'idle') {
                    if (s.hunger > 65) {
                        s.state = 'moving';
                        s.targetGrid = { x: Math.floor(GRID_WIDTH / 2), y: Math.floor(GRID_HEIGHT / 2), action: 'eat' };
                    } else {
                        findWork(s);
                    }
                }

                if (s.state === 'moving' && s.targetGrid) {
                    const target = getTileCenter(s.targetGrid.x, s.targetGrid.y);
                    const dx = target.x - s.px;
                    const dy = target.y - s.py;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const frameSpeed = CONFIG.MOVE_SPEED * s.personalSpeed * dt;

                    if (dist > frameSpeed) {
                        s.px += (dx / dist) * frameSpeed;
                        s.py += (dy / dist) * frameSpeed;
                    } else {
                        s.px = target.x; s.py = target.y;
                        s.state = 'acting';
                        s.progress = 0;
                    }
                }

                if (s.state === 'acting') {
                    let rate = s.targetGrid.action === 'gather' ? CONFIG.GATHER_BASE_RATE * s.personalWork : CONFIG.EAT_RATE;
                    s.progress += rate * dt;
                    if (s.progress >= 100) completeAction(s);
                }
            });
        }

        function findWork(s) {
            let type = Math.random() > 0.5 ? 1 : 2;
            // Search rectangular grid
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    if (grid[y][x] === type) {
                        s.targetGrid = { x, y, action: 'gather' };
                        s.state = 'moving';
                        return;
                    }
                }
            }
        }

        function completeAction(s) {
            const action = s.targetGrid.action;
            const midX = Math.floor(GRID_WIDTH / 2);
            const midY = Math.floor(GRID_HEIGHT / 2);

            if (action === 'gather') {
                s.inventory.type = grid[s.targetGrid.y][s.targetGrid.x] === 1 ? 'wood' : 'food';
                s.inventory.amount = 5;
                s.targetGrid = { x: midX, y: midY, action: 'deliver' };
                s.state = 'moving';
            } else if (action === 'eat') {
                if (resources.food > 0) { resources.food--; s.hunger = 0; }
                s.state = 'idle';
            } else if (action === 'deliver') {
                resources[s.inventory.type] += s.inventory.amount;
                s.inventory = { type: null, amount: 0 };
                s.state = 'idle';
            }
            s.progress = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.fillStyle = PALETTE.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Rectangular Card Border
            // ctx.strokeStyle = PALETTE.cardBorder;
            // ctx.lineWidth = 2;
            // ctx.strokeRect(offsetX, offsetY, GRID_WIDTH * TILE_SIZE, GRID_HEIGHT * TILE_SIZE);

            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    ctx.fillStyle = PALETTE.tiles[grid[y][x]];
                    const tx = Math.floor(offsetX + x * TILE_SIZE);
                    const ty = Math.floor(offsetY + y * TILE_SIZE);

                    ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);

                    ctx.strokeStyle = PALETTE.gridLine;
                    ctx.lineWidth = 1;
                    ctx.strokeRect(tx, ty, TILE_SIZE, TILE_SIZE);
                }
            }

            settlers.forEach(s => {
                ctx.fillStyle = PALETTE.settler;
                ctx.beginPath();
                ctx.arc(Math.floor(s.px), Math.floor(s.py), Math.floor(TILE_SIZE * 0.2), 0, Math.PI * 2);
                ctx.fill();

                if (s.state === 'acting') {
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(Math.floor(s.px), Math.floor(s.py), Math.floor(TILE_SIZE * 0.2 + 3), -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * (s.progress / 100)));
                    ctx.stroke();
                }
                ctx.fillStyle = '#e07a5f';
                ctx.fillRect(Math.floor(s.px) - Math.floor(TILE_SIZE * 0.2 * 0.5), Math.floor(s.py) + Math.floor(TILE_SIZE * 0.2 * 0.5) + Math.floor(TILE_SIZE * 0.2 + 3), (s.hunger / 100) * 20, 3);
            });
        }

        function updateUI() {
            document.getElementById('ui-food').innerText = Math.floor(resources.food);
            document.getElementById('ui-wood').innerText = Math.floor(resources.wood);
            document.getElementById('ui-time').innerText = Math.floor(totalPlayTime / CONFIG.DAY_LENGTH) + 1;
        }

        window.addEventListener('resize', resize);
        init();
    </script>
</body>

</html>
