<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashlight vs. Aura Prototype</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
        }

        button {
            background: #00ffcc;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background: #00cca3;
        }

        b {
            color: #00ffcc;
        }
    </style>
</head>

<body>

    <div id="ui">
        <h3 style="margin-top:0">Vision System</h3>
        <p>Current Mode: <span id="mode-text"><b>360° Aura</b></span></p>
        <button onclick="toggleMode()">Switch Vision Mode</button>
        <p style="font-size: 0.8em; color: #ccc;">Click to move. Flashlight follows movement.</p>
    </div>

    <div id="game-container">
        <canvas id="worldCanvas"></canvas>
        <canvas id="fogCanvas"></canvas>
    </div>

    <script>
        const worldCanvas = document.getElementById('worldCanvas');
        const fogCanvas = document.getElementById('fogCanvas');
        const wCtx = worldCanvas.getContext('2d');
        const fCtx = fogCanvas.getContext('2d');
        const modeText = document.getElementById('mode-text');

        let mode = 'aura'; // 'aura' or 'flashlight'

        const player = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            targetX: window.innerWidth / 2,
            targetY: window.innerHeight / 2,
            angle: 0,
            speed: 4,
            radius: 12,
            visionRadius: 250,
            coneWidth: Math.PI / 4 // 45 degrees
        };

        const secrets = [
            { x: 300, y: 200, color: 'gold', label: 'Relic' },
            { x: 900, y: 600, color: '#ff4444', label: 'Trap' },
            { x: 150, y: 700, color: '#44aaff', label: 'Water' }
        ];

        function toggleMode() {
            mode = mode === 'aura' ? 'flashlight' : 'aura';
            modeText.innerHTML = mode === 'aura' ? "<b>360° Aura</b>" : "<b>Flashlight</b>";
        }

        function resize() {
            worldCanvas.width = fogCanvas.width = window.innerWidth;
            worldCanvas.height = fogCanvas.height = window.innerHeight;
        }

        window.addEventListener('mousedown', (e) => {
            player.targetX = e.clientX;
            player.targetY = e.clientY;
        });

        window.addEventListener('resize', resize);

        function update() {
            const dx = player.targetX - player.x;
            const dy = player.targetY - player.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 1) {
                // Update Angle only when moving
                player.angle = Math.atan2(dy, dx);

                if (distance > player.speed) {
                    player.x += (dx / distance) * player.speed;
                    player.y += (dy / distance) * player.speed;
                } else {
                    player.x = player.targetX;
                    player.y = player.targetY;
                }
            }
        }

        function draw() {
            // 1. WORLD LAYER
            wCtx.fillStyle = '#111';
            wCtx.fillRect(0, 0, worldCanvas.width, worldCanvas.height);

            wCtx.strokeStyle = '#222';
            for (let i = 0; i < worldCanvas.width; i += 80) {
                wCtx.beginPath(); wCtx.moveTo(i, 0); wCtx.lineTo(i, worldCanvas.height); wCtx.stroke();
            }

            secrets.forEach(s => {
                wCtx.fillStyle = s.color;
                wCtx.beginPath(); wCtx.arc(s.x, s.y, 8, 0, Math.PI * 2); wCtx.fill();
            });

            wCtx.fillStyle = '#00ffcc';
            wCtx.beginPath(); wCtx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); wCtx.fill();

            // 2. FOG LAYER
            fCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
            fCtx.fillStyle = 'rgba(0, 0, 0, 0.98)';
            fCtx.fillRect(0, 0, fogCanvas.width, fogCanvas.height);

            fCtx.globalCompositeOperation = 'destination-out';

            const grad = fCtx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.visionRadius);
            grad.addColorStop(0, 'rgba(0, 0, 0, 1)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            fCtx.fillStyle = grad;

            fCtx.beginPath();
            if (mode === 'aura') {
                // 360 Degree Circle
                fCtx.arc(player.x, player.y, player.visionRadius, 0, Math.PI * 2);
            } else {
                // Flashlight Cone
                fCtx.moveTo(player.x, player.y);
                fCtx.arc(
                    player.x, player.y,
                    player.visionRadius,
                    player.angle - player.coneWidth,
                    player.angle + player.coneWidth
                );
                fCtx.lineTo(player.x, player.y);
            }
            fCtx.fill();

            fCtx.globalCompositeOperation = 'source-over';

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        resize();
        draw();
    </script>
</body>

</html>
